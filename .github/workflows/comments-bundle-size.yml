name: Comments bundle-size guard (NFR-02)
# Enforces split size thresholds (NFR-02 amended 2026-05-25):
#
#   Authoring-controlled bucket (comments.js + comments.css):
#     soft warn  >20 KB (20480 bytes)
#     hard fail  >40 KB (40960 bytes)
#
#   Vendored bucket (diff-match-patch.js):
#     ceiling fail  >100 KB (102400 bytes)  — no soft warn; one cap.

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute bundle sizes
        id: sizes
        run: |
          AUTH_SIZE=$(du -b \
            plugins/pmos-toolkit/skills/_shared/html-authoring/assets/comments.js \
            plugins/pmos-toolkit/skills/_shared/html-authoring/assets/comments.css \
            | awk '{s+=$1} END {print s}')
          VEND_SIZE=$(du -b \
            plugins/pmos-toolkit/skills/_shared/html-authoring/assets/diff-match-patch.js \
            | awk '{print $1}')
          echo "auth=$AUTH_SIZE" >> "$GITHUB_OUTPUT"
          echo "vend=$VEND_SIZE" >> "$GITHUB_OUTPUT"
          echo "Authoring bundle: $AUTH_SIZE bytes | Vendored bundle: $VEND_SIZE bytes"

      - name: Evaluate authoring-controlled threshold
        env:
          AUTH_SIZE: ${{ steps.sizes.outputs.auth }}
        run: |
          AUTH_SOFT=20480   # 20 KB
          AUTH_HARD=40960   # 40 KB

          if [ "$AUTH_SIZE" -gt "$AUTH_HARD" ]; then
            echo "::error::comments authoring bundle ${AUTH_SIZE} bytes exceeds hard threshold (40 KB) — slim comments.js or comments.css"
            exit 1
          elif [ "$AUTH_SIZE" -gt "$AUTH_SOFT" ]; then
            echo "::warning::comments authoring bundle ${AUTH_SIZE} bytes exceeds soft threshold (20 KB) — consider trimming authoring assets"
          else
            echo "comments authoring bundle ${AUTH_SIZE} bytes — within soft threshold (20 KB). OK."
          fi

      - name: Evaluate vendored ceiling
        env:
          VEND_SIZE: ${{ steps.sizes.outputs.vend }}
        run: |
          VEND_CEILING=102400   # 100 KB

          if [ "$VEND_SIZE" -gt "$VEND_CEILING" ]; then
            echo "::error::comments vendored bundle ${VEND_SIZE} bytes exceeds ceiling (100 KB) — review diff-match-patch.js or replace with a lighter library"
            exit 1
          else
            echo "comments vendored bundle ${VEND_SIZE} bytes — under ceiling (100 KB). OK."
          fi

      - name: Summary
        env:
          AUTH_SIZE: ${{ steps.sizes.outputs.auth }}
          VEND_SIZE: ${{ steps.sizes.outputs.vend }}
        run: |
          echo "comments bundle — authoring: ${AUTH_SIZE} bytes (limit 20480 soft / 40960 hard); vendored: ${VEND_SIZE} bytes (ceiling 102400)."
