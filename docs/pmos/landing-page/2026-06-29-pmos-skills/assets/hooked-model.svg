<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Hooked Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Hooked Model</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">A 4-phase loop for habit-forming products</text>

  <!-- loop arrows around center -->
  <g fill="none" stroke="#5b6680" stroke-width="2">
    <path d="M 320 120 A 120 90 0 0 1 440 210" marker-end="url(#ah)"/>
    <path d="M 440 230 A 120 90 0 0 1 320 320" marker-end="url(#ah)"/>
    <path d="M 300 320 A 120 90 0 0 1 200 230" marker-end="url(#ah)"/>
    <path d="M 200 210 A 120 90 0 0 1 300 120" marker-end="url(#ah)"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- center label -->
  <circle cx="320" cy="220" r="36" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">repeat</text>
  <text x="320" y="231" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">= habit</text>

  <!-- Top: Trigger -->
  <g>
    <rect x="240" y="78" width="160" height="46" rx="10" fill="#2563eb"/>
    <text x="320" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">1. Trigger</text>
    <text x="320" y="116" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dbe6ff">external cue &#8594; internal cue</text>
  </g>

  <!-- Right: Action -->
  <g>
    <rect x="452" y="197" width="150" height="46" rx="10" fill="#0ea5a4"/>
    <text x="527" y="219" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">2. Action</text>
    <text x="527" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d6f5f4">simplest behavior for reward</text>
  </g>

  <!-- Bottom: Variable Reward -->
  <g>
    <rect x="232" y="318" width="176" height="50" rx="10" fill="#f59e0b"/>
    <text x="320" y="338" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">3. Variable Reward</text>
    <text x="320" y="354" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3a2e10">Tribe &#183; Hunt &#183; Self</text>
  </g>

  <!-- Left: Investment -->
  <g>
    <rect x="38" y="197" width="150" height="46" rx="10" fill="#1d2438"/>
    <text x="113" y="219" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">4. Investment</text>
    <text x="113" y="235" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b9c0d4">stored value loads next trigger</text>
  </g>
</svg>
