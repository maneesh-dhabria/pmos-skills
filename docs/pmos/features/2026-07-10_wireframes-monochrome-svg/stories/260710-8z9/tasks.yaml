    ac: [AC1, AC2, AC3, AC6]
    deps: [T1]
    parallel: true
    status: done
    evidence: "feedback 8 files: overlays from Modal primitive, S1-S4 kept, lint 8/8 exit 0, 0 retired ids"
    detail: >
