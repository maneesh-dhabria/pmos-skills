  - id: T9
    title: "README counts + cross-reference claim; whole-inventory dangling-cite gate + full lint sweep"
    ac: [AC2, AC4, AC5]
    deps: [T2, T3, T4, T5, T6, T7, T8]
    parallel: false
    status: done
    evidence: "README intro+template reconciled to SVG-from-primitives; counts 7/8/6/8/4/4/4=41; dangling-cite gate=0 explicit; all 41 skeletons lint exit 0"
    detail: >
      In patterns/README.md: confirm the stated file count (41) and per-category counts (navigation 7, forms 8,
      data-display 6, feedback 8, actions 4, layout 4, content 4) match the actual inventory — measured true at plan
      time, so this is a guard, not a change unless a batch renamed a file. Update the sentence that Best-practices
      are "cross-referenced to reference/eval-rubric.md heuristic IDs" so it is still true of the NEW survivor id set
      (AC5). Also sweep README.md itself for any retired-id token in its prose. Then run the dangling-cite GATE:
      `grep -rEo '\b(A1|A2|A3|A4|A5|D1|D2|D3|D4)\b' patterns/*/*.md patterns/README.md | wc -l` MUST print 0 —
      assert the count is zero explicitly (amendment A1); a zero exit code is not sufficient. Re-run
      `node scripts/lint-wireframe-svg.mjs` across every skeleton in all 41 files (AC2). Any red skeleton or nonzero
      match count blocks the story.
  - id: T10
    title: "Skill-eval + hygiene lints green; frozen non-interactive block byte-identical; no regressions"
    ac: [AC8]
    deps: [T1, T2, T3, T4, T5, T6, T7, T8, T9]
    parallel: false
    status: done
    evidence: "skill-eval [D] exit 0; 4 hygiene lints PASS; frozen NI block byte-identical (lint-non-interactive-inline PASS); no mock-* survives; [J] COHERENT 0-defect"
    detail: >
      Run feature-sdlc/tools/skill-eval-check.sh --target claude-code on the wireframes skill DIR. Run the four
