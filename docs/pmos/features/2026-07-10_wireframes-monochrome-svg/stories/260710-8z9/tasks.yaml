# The bulk of epic 260710-grd. Recompose all 41 pattern `## Skeleton` blocks from the named SVG primitives
# (dep 260710-p5x) and re-point every heuristic cite from the retired set A1-A5/D1-D4 onto the survivor set
# N1-N10/F1-F2/G1-G4/S1-S4/C1-C3 (dep 260710-dsc) — one coherent cutover, no dual-dialect (D4). Hard rules
# carried from the design: (1) the judgment layer (Best practices / Common mistakes prose, When/Anatomy/States)
# is PRESERVED, never thinned (AC6); (2) skeletons are COMPOSITIONS of named primitives, never new geometry —
# a missing primitive routes back into the library, not a one-off (AC1); (3) the dangling-cite gate is the ERE
# `grep -Eo '\b(A1|A2|A3|A4|A5|D1|D2|D3|D4)\b'` asserting ZERO MATCHES explicitly, NOT a zero exit code — the
# seed's BRE was unfailable (amendment A1). The per-file procedure lives ONCE in skeleton-migration-runbook.md;
# every batch task cites it and states only its per-batch delta (which files, which retired ids present).
# Release prereqs (version bump / changelog / README-row / tag) are /complete-dev's at epic release — NOT tasks.
tasks:
  - id: T1
    title: "Author skeleton-migration-runbook.md — the single tested procedure every batch cites"
    ac: [AC1, AC3, AC6, AC7]
    deps: []
    parallel: false
    status: done
    evidence: "runbook confirmed against landed primitives.md (24 primitives) + eval-rubric survivor set; no drift"
    detail: >
      The runbook already drafted at
      docs/pmos/features/2026-07-10_wireframes-monochrome-svg/stories/260710-8z9/skeleton-migration-runbook.md is
      the canonical home for the 5-step per-file procedure, the retired-id -> disposition table (the load-bearing
      call: A1/A2/A3/A5 dropped, A4/D1/D2/D3/D4 restated-or-re-pointed), and the whole-inventory dangling-cite gate.
      In this task, CONFIRM the runbook against the freshly-landed reference/primitives.md and reference/grid-system.md
      (dep p5x) and reference/eval-rubric.md survivor set (dep dsc) — fix any primitive name / survivor-id that
      drifted from the drafted table. Verify the runbook's step 3 escalation path (primitive-gap note) points at the
      real primitives.md count-claim. No pattern file is edited in T1; this task freezes the procedure the 7 batches
      apply so the same call is not re-litigated 41 times.
  - id: T2
    title: "Batch — navigation (7 files): recompose skeletons + re-point cites"
    ac: [AC1, AC2, AC3, AC6]
    deps: [T1]
    parallel: true
    status: done
    evidence: "navigation 7 files: skeletons->primitives SVG, cites re-pointed, lint 7/7 exit 0, 0 retired ids"
    detail: >
      Apply the runbook to patterns/navigation/*.md (top-nav, side-nav, bottom-tab-bar, breadcrumbs, hamburger-menu,
      pagination, tabs). Per-batch delta: retired ids present are A1 A2 A3 A4 A5 D1 D2 D3 (bottom-tab-bar carries
      D2/D3 native-chrome notes -> restate structural bits as prose / F2, drop native-chrome specifics; side-nav is
      A2-only). Rewrite each `## Skeleton` to a primitives-only inline <svg> on the pattern's canvas token, 8px grid,
      closed palette, #d33 only under data-region="annotations", <text stroke="none">, viewBox matching. Preserve
      every When/Anatomy/States/Device block and the Best-practices/Common-mistakes PROSE. Run
      `node scripts/lint-wireframe-svg.mjs` on each skeleton (exit 0) and check every file against primitives.md
      BEFORE closing the batch (AC7). Touches only these 7 files — disjoint from every other batch.
  - id: T3
    title: "Batch — forms (8 files): recompose skeletons + re-point cites"
    ac: [AC1, AC2, AC3, AC6]
    deps: [T1]
    parallel: true
    status: done
    evidence: "forms 8 files: mock-*->input+label primitives, lint 8/8 exit 0, 0 retired ids"
    detail: >
      Apply the runbook to patterns/forms/*.md (text-input, textarea, select-dropdown, date-picker, file-upload,
      multi-step-form, inline-validation, search). Per-batch delta: heavy A4 (visible-label) and A3/D1 usage —
      A4 label prose is RESTATED without the id (or -> N6 for recall), A3 dropped, D1 44px -> lint / thumb-zone ->
      prose. text-input.md's skeleton currently uses mock-label/mock-input classes -> replace with the input
      primitive + label primitive. Same lint + primitives-check gate before closing (AC2, AC7). Touches only these
      8 files.
  - id: T4
    title: "Batch — data-display (6 files): recompose skeletons + re-point cites"
    ac: [AC1, AC2, AC3, AC6]
    deps: [T1]
    parallel: true
    status: done
    evidence: "data-display 6 files: table/stats from layout+content primitives, lint 6/6 exit 0, 0 retired ids"
    detail: >
      Apply the runbook to patterns/data-display/*.md (table, list, card-grid, detail-view, key-value-pair,
      stats-dashboard). Per-batch delta: mostly A1 (semantic-table) and A4 -> A1 dropped (SVG has no <th>/<dt>;
      re-point to G3 only where about visual hierarchy), A4 restated. table.md and stats-dashboard.md are the
      densest compositions — compose table rows / stat cards from the layout + content primitives, never bespoke
      rects. Lint + primitives-check before closing. Touches only these 6 files.
  - id: T5
