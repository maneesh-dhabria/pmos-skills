  - id: T8
    title: "Batch — content (4 files): recompose skeletons + re-point cites"
    ac: [AC1, AC2, AC3, AC6]
    deps: [T1]
    parallel: true
    status: done
    evidence: "content 4 files: single-primitive compositions, lint 4/4 exit 0, 0 retired ids"
    detail: >
      Apply the runbook to patterns/content/*.md (avatar, badge, progress-indicator, tooltip). Per-batch delta:
      avatar A4, badge A2, progress-indicator A1 A2 A4, tooltip A1 A3 A4 D1 -> A1/A2/A3 dropped, A4 restated, D1
