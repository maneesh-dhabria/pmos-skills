# Story C of epic 260710-grd (the /wireframes monochrome-SVG refactor). Binds 02_design.html D1, D2
# and amendments A3, A4, A5, A8, A9, A10. The house-style / fidelity story. Hard rules carried from the
# design: (1) the palette has ONE home — reference/grid-system.md, created by dep p5x — and every other
# copy CITES it, never restates it (§K, A3); (2) the SCREEN PAYLOAD goes monochrome (no accent/success/
# error/gradient/shadow/dark colour); CHROME (state tabs, device frame, footer) keeps colour; (3) #d33
# is quarantined to the .wf-anno annotation layer and appears NOWHERE else; (4) --fidelity fails all four
# §I tests, so it is a silent nl-sugar alias, NOT an argument-hint contract flag (A4); (5) under `mid`
# the overlay brands the CHROME only — the SVG payload is monochrome in EVERY mode (A9).
# Depends on 260710-p5x: grid-system.md (palette/canvas/type/size single home) must exist to cite.
# Release prereqs (version bump / changelog / README-row / tag) are /complete-dev's at epic release — NOT tasks.
tasks:
  - id: T1
    title: "wireframe.css — collapse screen payload to monochrome; chrome keeps colour (AC2, D1, A9)"
    ac: [AC2]
    deps: []
    parallel: false
    status: done
    evidence: >
      assets/wireframe.css: .mock-button--primary now ink-fill (var(--wf-text)/surface); .mock-button--danger
      ink-outline bold; .mock-img flat grey (gradient removed); .mock-card + .wf-fab box-shadow dropped;
      .wf-fab ink-fill; .wf-message--error/--success -> var(--wf-text); dark @media payload hue overrides
      (--wf-accent/-2) removed (chrome greys + shadow kept). grep -e '--wf-accent' shows only :root decl (26/27),
      an explanatory comment (48), and :focus-visible affordance (63) — NO screen-payload rule. box-shadow only on
      .wf-frame--* chrome device frames (173/174/189). :focus-visible + .placeholder kept; :root tokens intact.
    detail: >
      In plugins/pmos-toolkit/skills/wireframes/assets/wireframe.css strip colour from every SCREEN-PAYLOAD
      rule while leaving CHROME rules coloured. Payload rules to neutralise (use --wf-text / --wf-muted /
      --wf-surface greys + a hairline border, NO hue): .mock-button--primary (line 139, drop --wf-accent
      fill), .mock-button--danger (140, drop --wf-error fill), .wf-message--error (165) and
      .wf-message--success (166, drop --wf-error/--wf-success colour), .wf-fab (195, drop --wf-accent),
      .mock-img (146, replace the linear-gradient with a flat grey fill or striped placeholder), .mock-card
      box-shadow (137, drop --wf-shadow — payload carries no shadow). CHROME rules KEEP colour and are NOT
      touched: .wf-chrome / .wf-tab / .wf-tab[aria-selected] (95, already black/white), .wf-footer, the
      .wf-frame--* device frames incl. their box-shadow and the .wf-traffic macOS lights #ef4444/#f59e0b/
      #22c55e (176-178), .wf-notch #000, the mobile frame border #18181b. Two GLOBAL/affordance rules stay:
      :focus-visible (62, accessibility ring — keep --wf-accent) and the .placeholder striped grey (150,
      already neutral). The @media (prefers-color-scheme: dark) block (38-52): remove the payload-token
      overrides so the payload never re-hues in dark mode (AC2 "no dark-mode colour"); the chrome greys may
      remain. NET RESULT the AC pins: --wf-accent must no longer participate in ANY rule a SCREEN renders —
      after this edit it survives only in :focus-visible (affordance) and .wf-anno (retired in T2). Do NOT
      delete the token declarations (:root, 26-30) — design-overlay.css and the mapping in
      reference/design-md-to-css.md still reference the --wf-* namespace; only the SCREEN rules stop using
      the hues. Leave every selector name intact so no HTML template or lint breaks.
  - id: T2
    title: ".wf-anno + ::after recoloured to #d33; #d33 appears ONLY in the annotation layer (AC3)"
    ac: [AC3]
    deps: [T1]
    parallel: false
    status: done
    evidence: >
      assets/wireframe.css: .wf-anno outline -> `1px dashed #d33` (L103); .wf-anno::after background -> #d33,
      text stays #fff (L107). `grep -c '#d33' wireframe.css` == 2 (only the two annotation-layer rules).
      Because T1 removed --wf-accent from .wf-anno, the annotation-blue-bleed defect is gone; #d33 is the sole
      hue in an otherwise monochrome sheet. /prototype V4 NOT edited (colour-agnostic class-presence check whose
      class names do not even match live output — reasoning recorded here per AC3, not acted on).
    detail: >
      In wireframe.css re-colour the annotation layer to #d33 (a literal hex, the one reserved annotation
      colour): .wf-anno (line 102) outline becomes `1px dashed #d33`; .wf-anno::after (103-107) background
      becomes #d33 (text stays #fff). These two rules are the ONLY place #d33 may appear anywhere in the
      stylesheet — after the edit `grep -c '#d33' wireframe.css` must be exactly 2 and no other selector may
      use it. Because T1 removed --wf-accent from .wf-anno, the "annotation blue bleeding into the UI"
      defect the design names is gone: the annotation layer is now the sole hue in a monochrome sheet.
      RECON NOTE for the /prototype V4 assurance (AC3): V4 (prototype/reference/eval-rubric.md:77) is a
      CLASS-PRESENCE check — "Zero `.annotation`, `.state-tab`, `.wireframe-frame` artifacts" — it is
      colour-agnostic AND its class names do not even match the current wireframe output (.wf-anno /
      .wf-tab / .wf-frame). Re-colouring .wf-anno changes a CSS colour value only; it adds/removes no class
      and emits no new artifact, so V4 is unaffected. State this reason in the plan/commit; do NOT edit V4
      (that rubric belongs to /prototype and to sibling story 260710-dsc/n67, not xrh).
