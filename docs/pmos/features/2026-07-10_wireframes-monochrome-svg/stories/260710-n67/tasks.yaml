    title: "/msf-wf: re-point the rubric spot-check, extend the dangling-cite grep, cover a coordinate-adjacent SVG edit (AC7, AC8)"
    ac: [AC7, AC8]
    deps: [T2]
    parallel: false
    status: done
    evidence: "msf-wf forward guard (retired ids named nowhere, described by concept) + tests/svg-edit.test.js 2 cases PASS (retired-id grep 0 + coordinate-adjacent edit)"
    detail: >
      In plugins/pmos-toolkit/skills/msf-wf/SKILL.md the --apply-edits block is lines 181-188; the rubric spot-check
      cite `../wireframes/reference/eval-rubric.md` is at line 185 (the story header says :186 — verify against the
      live file and cite the true line). Story 260710-dsc rewrites eval-rubric.md to SVG-native ids (survivor set
      N1-N10/F1-F2/G1-G4/S1-S4/C1-C3; retired A1-A5/D1-D4); the FILE-path cite stays valid but must not name any
      RETIRED rubric id. Confirm msf-wf/SKILL.md names no retired id (a grep today returns zero hits) and, if the
      epic's dangling-cite gate is materialised as a script/list in this repo, add msf-wf/SKILL.md to its scan set
      using the pinned pattern `grep -Eo '\b(A1|A2|A3|A4|A5|D1|D2|D3|D4)\b'` (ERE, asserts zero matches — amendment
      A1). AC8: msf-wf/SKILL.md:184-185 applies approved edits via the `Edit` tool (substring replace), not the
      apply-edit shim; add a fixture test (reuse T2's wireframes_svg_mini.html) asserting a coordinate-adjacent
      substring Edit against the SVG payload — e.g. changing a <text> label next to an x=/y= attribute — lands
      cleanly and does not corrupt the surrounding coordinates (design §7 risk 3).
