    status: done
    evidence: "skill-eval [D] pass wireframes/prototype/design-crit; msf-wf 1 PRE-EXISTING residual (d-progress-tracking, absent on base main); 4 hygiene lints PASS; all node tests PASS; comments-coverage PASS; lint selftest 21"
    detail: >
      Run plugins/pmos-toolkit/skills/feature-sdlc/tools/skill-eval-check.sh --target claude-code against the DIR of
