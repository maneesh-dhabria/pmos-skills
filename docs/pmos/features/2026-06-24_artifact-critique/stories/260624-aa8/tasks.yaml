schema_version: 1
story: 260624-aa8
epic: 260624-kkw
route: skill
plugin: pmos-toolkit
spec: ../../02_design.html
skill_dir: plugins/pmos-toolkit/skills/artifact-critique
depends_on: [260624-fbd]
# Story B — the /artifact-critique SKILL.md, built on the fbd substrate (claim-time merged, D9, so
# _shared/critique-rubric/ is present in this worktree before skill-eval). The skill ORCHESTRATES;
# all rubric data is cited from the substrate (Inv-1), never restated.
#
# Design anchors (02_design.html): #skill-shape (phases 0–7), #findings-schema (the embedded JSON
# block aa8 emits), #eval-checks (the two-tier gate), #voice (persona + rubric + few-shot), #resolved
# (ingest/doc-type/emit contracts), #invariants (Inv-2 coverage, Inv-3 quote grounding, Inv-4
# no-padding, Inv-5 honesty, Inv-6 no /artifact cite), #substrate-map.
#
# Reference: feature-sdlc/reference/skill-patterns.md §A–§L is the authoring standard:
#   §H deterministic=hard-gate-script (critique-eval.mjs counts/string-matches; the model never does),
#   §I hybrid NL-first flags (--format html|md is a typed contract flag; doc-type-correction is NL),
#   §K one-fact-one-home (cite critique-rubric; do NOT restate axes/heuristics/scale/map/schema),
#   §L subagent dispatch (the advisory reviewer is a separate agent per reviewer-protocol.md).
# Host CLAUDE.md: canonical skill path plugins/pmos-toolkit/skills/artifact-critique/SKILL.md;
# non-interactive block byte-identical to _shared/non-interactive.md; AskUserQuestion (Recommended)
# or defer-only tag on every prompt; comments-coverage roster includes the new skill.
#
# Release prerequisites (version bump, changelog, README row, manifest version-sync, learnings header)
# are NOT tasks here — /complete-dev owns them at epic release.
#
# TDD posture: critique-eval.mjs (T5) is authored fail-first against fbd's anonymized fixtures, then
# the emit phase (T4) makes it green. skill-eval [D]+[J] (T7) is the closing quality gate.
tasks:
  - id: T1
    title: "Scaffold SKILL.md skeleton (frontmatter, phases 0–7, Track Progress, Platform Adaptation, NI block, learnings load-line) citing critique-rubric"
    ac: [AC1, AC8, AC10]
    deps: []
    parallel: false
    detail: >
      Per #skill-shape / host CLAUDE.md. Create plugins/pmos-toolkit/skills/artifact-critique/SKILL.md
      in eval-passing form up front (single-line quoted description with the trigger phrases; literal
      `## Phase N:` headings; Track Progress; Platform Adaptation; learnings load-line; reference ToCs).
      Author the canonical non-interactive block BYTE-IDENTICAL to skills/_shared/non-interactive.md.
      Frontmatter name=artifact-critique matches dir. Phases 0–7 stubs cite _shared/critique-rubric/
      (Inv-1) — no axis/heuristic/scale/map/schema text restated. Run
      `ls plugins/pmos-toolkit/skills/artifact-critique/` to confirm canonical-path registration.
  - id: T2
    title: "reference/ingest.md + Ingest phase (path/paste/Notion/PDF/image; full-context default; map-reduce verbatim-quote fallback)"
    ac: [AC2]
    deps: [T1]
    parallel: true
    detail: >
      Per #resolved (D6) / Inv-5. Author reference/ingest.md: resolve a doc path (md/html/pdf) or pasted
      content; traverse Notion exports (markdown under Private & Shared/…, images alongside); render PDF
      pages + read SVG/PNG and factor visuals into scoring; NAME unreadable visuals and do NOT score
      their possible content ABSENT; full-doc-in-context by default; map-reduce evidence-gathering
      (chunks return verbatim quotes + section refs, NEVER summaries) only past the real context limit;
      never silently truncate. Wire Phase 1 (Ingest) in SKILL.md to cite it.
  - id: T3
    title: "Doc-type detection + axis-scoring + deep-dive + weakest-claims phases (cite axes.md/heuristics.md/doc-types.md)"
    ac: [AC3, AC4]
    deps: [T1]
    parallel: true
    detail: >
      Per #skill-shape phases 2–5 / Inv-2/3/4. Phase 2 Doc-type detection: classify PRD/strategy/POV/
      roadmap/hybrid, DECLARE in the opening line (user-correctable interactively / assumption in NI),
      resolve the applicable-axis set from doc-types.md (union for hybrids), treat <WIP>/placeholder as
      a decision-blocking gap. Phase 3 single-pass axis scoring against axes.md checks + heuristics.md
      spine → ordinal verdict + reason (per-axis fan-out deferred — latency only). Phase 4 per-axis
      deep-dive: verbatim ≥40-char quote → interrogation → "What I'd want to see:". Phase 5 weakest-claims
      0–3 ranked + follow-ups, NEVER padded; STRONG freely given. All cite the substrate; none restate it.
  - id: T4
    title: "Synthesize + Emit phase — html-authoring artifact, Copy-markdown affordance, embedded pmos-critique-findings/v1 block, advisory hand-off prose"
    ac: [AC5]
    deps: [T2, T3]
    parallel: false
    detail: >
      Per #skill-shape phases 6–7 / #findings-schema (D1/D3). Phase 6 synthesize: opening framing
      ("push hardest on …", 1–3 things) + bottom-line (credit strengths, 3 must-dos). Phase 7 emit via
      _shared/html-authoring/ (inline comments overlay, wordmark/footer, <meta pmos:skill=
      artifact-critique>, kebab heading ids, cache-bust, index regen): bake the embedded
      <script id="pmos-critique-findings" type="application/json"> block (sentinel-wrapped,
      pmos-critique-findings/v1 — schema read from doc-types.md, Inv-1) + a "Copy markdown" affordance
      (button copies the full critique as markdown) + advisory hand-off prose pointing at /artifact.
      Resolve output_format/--format (html|md; both→html). In --format md, emit the findings JSON in a
      fenced block. The verdict-by-axis scorecard renders as a clean ordinal table.
  - id: T5
    title: "scripts/critique-eval.mjs — deterministic hard gate (fail-first against fbd fixtures)"
    ac: [AC6]
    deps: [T1]
    parallel: true
    detail: >
      Per #eval-checks / §H. Author scripts/critique-eval.mjs taking (extracted source text + parsed
      findings JSON) and asserting E-schema, E-axes-complete (all 10 in order), E-applicable-consistency
      (applicable=false ⇔ N/A; set matches resolved doc-type map incl. hybrid-union), E-quote-len (≥40),
      E-quote-in-source (whitespace-normalized verbatim substring — the quote verification mechanism),
      E-gap-named (every ABSENT/WEAK has a reason), E-weakest-ranked (0–3, ranks unique 1..n,
      source-verified quotes), E-opening (1–3 pushing_hardest_on). Exit 0/1(list fails)/2(script error —
      surfaced, NEVER silent pass). Read the schema/axis-enum from doc-types.md (Inv-1, no re-declare).
      Author fail-first; make green via T4 + a tests/ harness driving fbd's corpus-samples fixtures.
  - id: T6
    title: "reference/voice-rubric.md — persona + voice rules + curated few-shot exemplar lines + advisory reviewer wiring"
    ac: [AC7, AC6]
    deps: [T4]
    parallel: false
    detail: >
      Per #voice / reviewer-protocol.md. Author reference/voice-rubric.md: the unnamed "seasoned product
      leader" persona + explicit voice rules (take a position; no hedging; credit strengths BEFORE
      attacking; ground every critique in a quote; ventriloquize the executive reader) + ≤~12 curated
      few-shot exemplar lines drawn from fbd's anonymized corpus-samples (NO "Gokul Rajaram" attribution;
      pmos wordmark/footer). Wire the Phase-7 advisory reviewer: a SEPARATE agent per reviewer-protocol.md
      (≥40-char quote grounding, ≤2 loops) scoring grounding quality, fairness, voice adherence, and
      FLAGGING manufactured/nitpick findings — non-blocking, surfaced (never edits the artifact).
  - id: T7
    title: "Quality gates — skill-eval [D]+[J], 4 hygiene lints, audit-recommended, comments-coverage; standalone dogfood on a real doc"
    ac: [AC9]
    deps: [T2, T3, T4, T5, T6]
    parallel: false
    detail: >
      Per #invariants / host CLAUDE.md. Run feature-sdlc/tools/skill-eval-check.sh + the [J] judge half;
      lint-non-interactive-inline.sh, audit-recommended.sh, lint-flags-vs-hints.sh, lint-phase-refs.sh;
      add /artifact-critique to the comments-coverage roster. Standalone dogfood: run /artifact-critique
      on a real product doc (or one of fbd's anonymized samples), confirm the 10-axis scorecard +
      quote-grounded deep-dives + weakest-claims + embedded findings block + Copy-markdown all emit, and
      critique-eval.mjs exits 0 on the output. Confirm Inv-5 (honest "not visible in this doc") and
      Inv-6 (grep: no /artifact cite of critique-rubric). Carry only genuine pre-existing residuals.
