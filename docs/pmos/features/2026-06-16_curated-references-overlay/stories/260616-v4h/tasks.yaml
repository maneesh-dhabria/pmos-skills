  - id: T4
    title: Implement the deterministic prefilter (curated-references-match.mjs)
    status: pending
    deps: [T3]
    parallel: false
    spec_anchor: "#a-prefilter"
    notes: >
      Author plugins/pmos-learnkit/skills/_shared/topic-research/curated-references-match.mjs —
      zero-dep Node ESM. Exported pure function match({tags, corpus, k, scoreFloor}) plus a thin
      CLI. Score = sum over query-tag∩record-tag of w(tag)=log(N/(1+df(tag))) where N=corpus
      size, df=document frequency of the tag across the corpus. Multiply by a penalty factor when
      summary_grounded===false. Pre-reject records whose title matches the bot-wall / 4xx-5xx
      patterns. Skip records whose URL host is in HARD_BLOCKED_DOMAINS (["forbes.com"]).
      Stable sort (score desc, then id asc) for determinism. Return top-K. No Date/Math.random,
      no network, no API. Make T3 GREEN.
