  - id: T1
    title: Author guidelines.md — the library-viewer design contract
    status: done
    deps: []
    parallel: false
    spec_anchor: "#b-substrate"
    notes: >
      WHAT: NEW plugins/pmos-learnkit/skills/_shared/library-viewer/guidelines.md — the design
      guidelines every consumer (frameworks/primer/learn-list) follows. HOW: codify the three
      listing views (list default / detailed / compact); facet-dropdown + applied-filter-chip
      behaviour (OR within a facet, AND across facets, removable chips + Clear all); free-text
      search (multi-token AND, debounced); sorting (alpha within group, Uncategorized/untagged
      trail last); sidebar reader as layout-shift NOT overlay (preserves page scrollY, no
      backdrop, Escape-to-close, focus-return, deep-link hash); mobile rules (<=720px stacks,
      reader scrollIntoView); masthead/theme (PMOS wordmark + dynamic count from corpus length).
      Hard constraints section MUST state: offline from file://, zero external asset refs, zero
      runtime deps, NO ES modules in the EMITTED asset JS (the in-page <script> is plain
      var-style ES5-safe vanilla JS — only the BUILD tool is Node ESM), vanilla CSS only. Cite
      the existing build-library.mjs (frameworks) as the reference implementation. Must NOT name
      or branch on any single skill (D12 skill-agnostic). TEST: prose doc — no executable gate,
      but T6 cross-checks that the engine API matches the documented behaviour.
