    <h1 class="pmos-doc-title">Curated-references overlay + shared library-viewer substrate — epic design</h1>
<section id="summary">
<h2 id="summary-h">Summary</h2>
<p><strong>One epic, one plugin (<code>pmos-learnkit</code>), two coupled deliverables, four stories.</strong> This epic lets <code>/primer</code> and <code>/learn-list</code> draw on a personal, pre-curated reference corpus <em>in addition to</em> live web research, and — separately but in the same plugin — extracts the rediscovered "faceted listing page" into a shared substrate that all three learnkit browse views (<code>/frameworks</code>, <code>/primer</code>, and a new <code>/learn-list</code> reference viewer) share.</p>
<dl>
  <dt>Deliverable A — curated-references overlay</dt>
  <dd>An optional, if-present overlay feeds the existing topic-research candidate pool. The corpus contributes non-obvious, high-signal sources generic live search misses; the substrate's existing fetch-verify loop neutralizes corpus junk for free. <strong>No trust regression:</strong> every cited source is still fetched &amp; verified at run time, so the overlay can only <em>add</em> candidates, never inject an unverified claim.</dd>
  <dt>Deliverable B — shared library-viewer substrate + retrofits + new viewer</dt>
  <dd>Extract <code>_shared/library-viewer/</code> (design guidelines + a reusable zero-dependency Node-ESM component library: facet engine, view toggles, search, sorting, applied-filter chips, offline single-file emit, masthead/theme), proven by retrofitting the richest existing viewer (<code>/frameworks</code>), then retrofit <code>/primer</code> and build a new <code>/learn-list</code> reference viewer on top of it.</dd>
</dl>
<p>Define-loop note: <strong>route: skill</strong>. There is no epic-level <code>/spec</code>; this document <em>is</em> the cross-skill coherence contract the four stories cite by anchor.</p>
</section>

<section id="context-and-goals">
<h2 id="context-and-goals-h">Context &amp; goals</h2>
<p>Seed: the validated spike brief <code>curated-references-integration-brief.md</code> (2026-06-16, run against <code>pmos-learnkit</code> v0.21.0). A throwaway spike (matcher + a real fetch-verifying subagent) showed the corpus contributes genuinely high-signal sources; this epic productionises that finding. The brief is adopted as the design basis for Deliverable A; the maintainer added Deliverable B (the viewer + shared-substrate extraction) at define time.</p>
<p>"Improve <code>/primer</code> and <code>/learn-list</code> <strong>indirectly</strong>" means: the skills themselves stay general and shippable; all behavioural change lands in the shared <code>_shared/topic-research/</code> substrate they both inline. The skills gain only a one-line note that an optional overlay may augment the pool.</p>
<h3 id="evidence">Evidence from the spike (informative)</h3>
<ul>
  <li><strong>Retrieval quality:</strong> rarity-weighted tag overlap (down-weighting near-useless generic tags like <code>product</code>, present on ~65% of refs) cleanly surfaces on-topic, authoritative candidates. An off-domain topic naturally yields few low-scoring candidates — so a count/score threshold replaces any "is this a PM topic?" classifier.</li>
  <li><strong>Verification yield ~30%:</strong> a subagent triaged 30 → fetched top 10 → 9 verified. Value concentrates in 4–5 HIGH-marginal pieces generic search misses. ⇒ over-fetch ~3–4× the target count.</li>
  <li><strong>Pre-fetch junk signals:</strong> bot-wall titles ("Just a moment…", "Attention Required! | Cloudflare", "4xx/5xx") auto-reject before spending a fetch; <code>summary_grounded:false</code> predicts trouble; <code>forbes.com</code> is hard-blocked by the fetcher.</li>
</ul>
</section>

<section id="deliverable-a-overlay">
<h2 id="deliverable-a-overlay-h">Deliverable A — the curated-references overlay</h2>
<p>The corpus becomes a <strong>third candidate source</strong> in <code>sourcing.md</code>'s per-topic "Gather candidates" step. Everything downstream (hard gate, tier-rank, fetch-verify, grounded takeaway) already exists and treats curated candidates identically to live ones.</p>
<h3 id="a-overlay-file">A.1 — Overlay corpus (shipped, if-present)</h3>
<p><strong>Canonical location:</strong> <code>plugins/pmos-learnkit/skills/_shared/topic-research/curated-references.json</code> — a single shipped copy that is <em>both</em> the overlay the prefilter reads and the base the <code>/learn-list</code> viewer (Deliverable B) renders. Loaded if present, ignored if absent → the skills stay clean, general, shippable; the corpus is a pluggable layer the owner ships (or doesn't).</p>
<p><strong>Format = JSON</strong> (maintainer decision D-TOOL), not the brief's YAML: zero-dependency parse for both the Node prefilter and the Node viewer, consistent with <code>frameworks.json</code> / <code>primers-index.json</code>; no Python runtime added to an otherwise Python-free skill set. Per-record allowed fields only:</p>
<pre><code>{ "id", "url", "title", "source_type", "publication_date", "tags", "summary", "summary_grounded" }
meta: { schema_version, source, counts: { total, grounded, weak } }</code></pre>
<h3 id="a-prefilter">A.2 — Deterministic prefilter (ships beside the overlay)</h3>
<p>A tiny zero-dep Node-ESM script (<code>curated-references-match.mjs</code>): given a topic's query tags + the overlay, returns the top-K candidates by <strong>rarity-weighted tag overlap</strong> (IDF-style <code>w(tag) = log(N / (1 + df(tag)))</code>). It also pre-rejects bot-wall titles, down-weights <code>summary_grounded:false</code>, and applies a small hard-blocked-domain skip-list (e.g. <code>forbes.com</code>). Deterministic, no LLM, no API credits, reproducible. <em>Why a script, not the LLM:</em> ~1,800 entries is too large for a subagent to scan reliably; the prefilter narrows to a few dozen the subagent can reason over.</p>
<h3 id="a-subagent">A.3 — The curated-references subagent (the one new dispatch)</h3>
<p>One subagent during the research phase. For each outline topic it: (1) picks ~5–8 relevant tags from the corpus tag-vocabulary; (2) runs the prefilter → ~30 candidates; (3) reranks for relevance/authority/recency, drops residual junk; (4) hands survivors into <code>sourcing.md</code> step 1's candidate pool, where they are hard-gated, tier-ranked, fetch-verified, and grounded by the <em>existing</em> loop — exactly like live-search candidates. It runs once (all topics) returning a <code>topic → candidates[]</code> map (cheaper than per-topic).</p>
<h3 id="a-integration">A.4 — Substrate integration point (minimal diff)</h3>
<p><code>_shared/topic-research/sourcing.md</code>, "Rank-then-verify loop (per topic)", step 1 currently reads:</p>
<blockquote>1. <strong>Gather candidates</strong> from live search + the harvested curations (<code>canon.curations[].recurring_entries</code>) — cap the pool at ~3× the links-to-emit.</blockquote>
<p>Changes to add the overlay as a third source via the curated-references subagent (rarity-weighted prefilter → rerank), present only when <code>curated-references.json</code> exists, with the pool cap raised to ~3–4× the links-to-emit (the curated slice over-supplies because its verification yield is ~30%). <strong>No other step changes</strong> — steps 2–5 are origin-agnostic and already enforce the trust contract. <code>intake.md</code> gains a note that the curated slice rides the same top-N / depth dials.</p>
<h3 id="a-coverage-gate">A.5 — Coverage gate (no domain classifier)</h3>
<p>If the prefilter returns fewer than <strong>T</strong> candidates above score <strong>S</strong> for a topic, the subagent skips injection for that topic and logs it. The corpus's own coverage decides, per topic — which is what makes "auto for PM/startup topics" safe without a brittle classifier.</p>
<h3 id="a-flag">A.6 — Suppression control</h3>
<p>A <code>--no-curated</code> natural-language/flag control and a <code>curated_references: off</code> settings key suppress the overlay even when present.</p>
</section>

<section id="deliverable-b-viewer-substrate">
<h2 id="deliverable-b-viewer-substrate-h">Deliverable B — shared library-viewer substrate + retrofits + new viewer</h2>
<p>The faceted listing page (filters / views / sorting / search / offline single-file from <code>file://</code>) is currently rediscovered per skill: <code>/frameworks</code> (a ~796-line <code>build-library.mjs</code>), <code>/primer</code> (a ~265-line one), and would be a third copy for <code>/learn-list</code>. Three real consumers is the rule-of-three that justifies extraction now.</p>
<h3 id="b-substrate">B.1 — <code>_shared/library-viewer/</code> substrate</h3>
<dl>
  <dt><code>guidelines.md</code></dt><dd>Design guidelines: the three listing views (list / detailed / compact), facet-dropdown + applied-filter-chip behaviour (OR within a facet, AND across), search, sorting, the sidebar reader (layout-shift, not overlay), mobile rules, masthead/theme, and the offline-from-<code>file://</code> + zero-dep + no-ESM-in-assets constraints.</dd>
  <dt>reusable component library (zero-dep Node ESM)</dt><dd>A facet/index/render core the per-skill <code>build-library.mjs</code> scripts call: facet extraction + counts, the filter/search/sort engine, applied-filter chips, view toggles, single-file HTML emit, masthead/theme. The per-skill builder supplies only the corpus adapter (record → card fields) and any skill-specific extras (e.g. frameworks' inline diagrams, primer's dual-population linking).</dd>
  <dt>tests</dt><dd>Substrate-level unit tests for the engine, independent of any one consumer.</dd>
</dl>
<p><strong>Extraction discipline:</strong> the substrate is <em>derived by refactoring <code>/frameworks</code> (the richest viewer) onto it in the same story</em> (S2). A consumer-less abstraction is a premature abstraction; proving it against the hardest case first is what makes the API right. The substrate must preserve every shipped feature of each retrofitted viewer (no behavioural regression).</p>
<h3 id="b-learnlist-viewer">B.2 — New <code>/learn-list</code> reference viewer</h3>
<p>A thin <code>build-library.mjs</code> on the substrate that reads the shipped <code>curated-references.json</code> (Deliverable A's single copy) as its base, faceting on <code>tags</code>, <code>source_type</code>, <code>summary_grounded</code>, and publication date; plus a <code>browse</code>/<code>list</code> verb dispatch (and bare <code>/learn-list</code>) → a <code>#browse</code> phase that builds and opens <code>{docs_path}/learn-list/library.html</code>, mirroring <code>/frameworks</code> and <code>/primer</code>.</p>
</section>

<section id="corpus-and-pii">
<h2 id="corpus-and-pii-h">Corpus ship policy &amp; PII contract</h2>
<p>The maintainer decided to <strong>ship the corpus</strong> (resolving the brief's §7 open question). The spike export is already distilled to the allowed field set; this epic hardens the privacy contract at conversion time.</p>
<h3 id="pii-gate">PII scrub gate (hard, deterministic)</h3>
<ul>
  <li><strong>Field allowlist:</strong> the shipped JSON contains ONLY <code>id, url, title, source_type, publication_date, tags, summary, summary_grounded</code> per record (+ the <code>meta</code> counts). A deterministic test asserts no key matching <code>page_id|database_id|occurrence|snapshot|workspace|notion_*</code> leaks.</li>
  <li><strong>Re-mint <code>id</code> from <code>sha(url)</code></strong> at conversion so every id is provably content-derived, never a Notion page-id.</li>
  <li><strong>Genericise <code>meta.source</code></strong> — drop the <code>notion-reference-crawler</code> provenance string (use a neutral value, e.g. <code>curated-references</code>).</li>
  <li>Public <code>notion.site</code> / <code>notion.so</code> URLs that are the reference itself are legitimate and kept (audit of the spike found exactly one public published article, no private-workspace URLs).</li>
</ul>
<h3 id="junk-policy">Junk cleanup policy (informative, from brief §5)</h3>
<table>
  <thead><tr><th>Class</th><th>Signal</th><th>Policy</th></tr></thead>
  <tbody>
    <tr><td>DEAD</td><td>summary admits 404 / "no longer exists"</td><td>Exclude from export</td></tr>
    <tr><td>WEAK</td><td>content unavailable/inferred at collection</td><td>Keep, <code>summary_grounded:false</code>; prefilter deprioritizes; verification re-checks</td></tr>
    <tr><td>CLEAN</td><td>grounded summary</td><td>High-confidence pool</td></tr>
  </tbody>
</table>
<p>The shipped corpus = CLEAN + WEAK (DEAD excluded). The prefilter additionally auto-rejects bot-wall <em>titles</em> at match time without deleting the record (the URL may verify on a future run).</p>
</section>

<section id="cross-skill-coherence">
<h2 id="cross-skill-coherence-h">Cross-skill coherence contract</h2>
<p>The invariants the four stories must jointly honor:</p>
<ol>
  <li><strong>Substrate stays skill-agnostic (D12).</strong> The <code>_shared/topic-research/</code> changes (and the new <code>_shared/library-viewer/</code> substrate) never name or branch on <code>primer</code> / <code>learn-list</code> / <code>frameworks</code>; the existing <code>assert_substrate_skill_agnostic.sh</code> test stays green. The overlay is a skill-agnostic data file + a skill-agnostic prefilter + a skill-agnostic subagent contract.</li>
  <li><strong>Trust contract is inviolable.</strong> Curated candidates enter <em>only</em> at the candidate-pool step; the hard gate, tier-rank, fetch-verify, and grounded-takeaway steps are unchanged and origin-agnostic. No path lets a curated summary reach the artifact without a run-time fetch.</li>
  <li><strong>Single corpus copy.</strong> Exactly one <code>curated-references.json</code> ships (in <code>_shared/topic-research/</code>); the prefilter and the <code>/learn-list</code> viewer both read that path. Never ship the 850 KB-class file twice.</li>
  <li><strong>Shared-lib API stability + zero regression.</strong> The <code>_shared/library-viewer/</code> public API is fixed in S2 and consumed unchanged by S3/S4; each retrofit preserves its skill's shipped features (frameworks' diagrams + sidebar reader + multi-select; primer's dual-population Curated/Yours linking). Each skill's existing <code>build-library.test.sh</code> stays green.</li>
  <li><strong>Single plugin (D17).</strong> Every story targets <code>pmos-learnkit</code>; the whole epic releases as one <code>pmos-learnkit</code> version.</li>
</ol>
</section>

<section id="decisions">
<h2 id="decisions-h">Decision log (maintainer, define 2026-06-16)</h2>
<table>
  <thead><tr><th>ID</th><th>Decision</th><th>Rationale / rejected</th></tr></thead>
  <tbody>
    <tr><td>D-SHIP</td><td>Ship the corpus in <code>pmos-skills</code> (resolves brief §7).</td><td>The viewer needs a committed base; the owner wants it shipped. Rejected: local-only overlay.</td></tr>
    <tr><td>D-TOOL</td><td>Node ESM + JSON for prefilter <em>and</em> viewer; single canonical corpus copy in the substrate.</td><td>Repo-consistent, zero extra runtime dep, zero-dep parse. Rejected: Python+YAML (adds a runtime); Node+YAML (fragile bespoke parser).</td></tr>
    <tr><td>D-PII</td><td>Field allowlist + <code>sha(url)</code> id re-mint + generic <code>meta.source</code>, enforced by a deterministic scrub-gate test.</td><td>"Nothing specific about my Notion." Static/enriched fields only.</td></tr>
    <tr><td>D-VIEW</td><td>Extract <code>_shared/library-viewer/</code> AND retrofit all three viewers in this epic.</td><td>Rule-of-three; full DRY now. Rejected: substrate + new-consumer-only; no-substrate (third copy).</td></tr>
    <tr><td>D-PROVE</td><td>Fuse the extraction with the <code>/frameworks</code> retrofit (S2) — the richest viewer is the abstraction's proof.</td><td>Avoids a consumer-less premature abstraction. <code>/primer</code> (S3) and <code>/learn-list</code> (S4) follow.</td></tr>
    <tr><td>D-SPLIT</td><td>Four stories: S1 overlay engine; S2 substrate+frameworks; S3 primer retrofit; S4 learn-list viewer.</td><td>Each is one <code>/execute</code> / one PR vertical slice; D24 litmus holds (only story-level deps).</td></tr>
    <tr><td>D-EXPORT</td><td>The <code>nrc export-curated</code> regeneration tooling (brief §4) is OUT of scope — it lives in <code>notion-reference-crawler</code>, a different repo.</td><td>Recorded as a release-prereq pointer; the shipped corpus is a point-in-time export refreshed by that external command.</td></tr>
  </tbody>
</table>
</section>

<section id="story-map">
<h2 id="story-map-h">Story map</h2>
<table>
  <thead><tr><th>Story</th><th>Scope</th><th>route</th><th>deps</th></tr></thead>
  <tbody>
    <tr><td><code>260616-v4h</code> — Curated-references overlay engine</td><td>Ship <code>curated-references.json</code> (PII-scrubbed, id re-mint, scrub-gate test) + <code>curated-references-match.mjs</code> prefilter + the curated-references subagent contract + <code>sourcing.md</code> step-1 patch + <code>intake.md</code> dial note + coverage gate + <code>--no-curated</code> / settings key + one-line notes in <code>/primer</code> &amp; <code>/learn-list</code></td><td>skill</td><td>—</td></tr>
    <tr><td><code>260616-f7w</code> — Extract <code>_shared/library-viewer/</code> + retrofit <code>/frameworks</code></td><td><code>guidelines.md</code> + reusable zero-dep engine + tests, derived by refactoring frameworks' <code>build-library.mjs</code> onto it; preserves diagrams + sidebar reader + multi-select; <code>build-library.test.sh</code> green</td><td>skill</td><td>—</td></tr>
    <tr><td><code>260616-w1v</code> — Retrofit <code>/primer</code></td><td>Move primer's <code>build-library.mjs</code> onto the substrate; preserve dual-population Curated/Yours linking + facets; <code>build-library.test.sh</code> green</td><td>skill</td><td><code>260616-f7w</code></td></tr>
    <tr><td><code>260616-y9f</code> — <code>/learn-list</code> reference viewer (new)</td><td>Thin <code>build-library.mjs</code> on the substrate reading the shipped corpus + <code>browse</code>/<code>list</code> verb + <code>#browse</code> phase + tests</td><td>skill</td><td><code>260616-f7w</code>, <code>260616-v4h</code></td></tr>
  </tbody>
</table>
<p><strong>Build order:</strong> S1 and S2 are independent (parallel-buildable). S3 needs S2. S4 needs S2 (substrate) and S1 (corpus base). D9 claim-time merge brings each dep's branch into the dependent's worktree before build.</p>
</section>

<section id="risks-open-questions">
<h2 id="risks-open-questions-h">Risks &amp; open questions</h2>
<ul>
  <li><strong>Retrofit regression (B).</strong> S2/S3 refactor two already-shipped viewers. Mitigation: each skill's <code>build-library.test.sh</code> is the regression gate; the shared API is fixed in S2 and frozen for S3/S4; live dogfood of each browse page at build time.</li>
  <li><strong>Premature abstraction (B).</strong> Mitigated by D-PROVE — extract by refactoring the richest viewer first, not by speculative design.</li>
  <li><strong>Fetch-budget waste (A).</strong> ~30% yield ⇒ ~70% of curated candidates fail verification. Mitigated by pre-fetch wall-title/ungrounded rejection, the over-fetch ratio, and a per-topic cap on curated candidates.</li>
  <li><strong>Staleness (A).</strong> The overlay is a point-in-time export; recency-favoring rerank + the dial matrix's preference for current sources offset this. Re-export (external tooling, D-EXPORT) when the corpus grows materially.</li>
  <li><strong>Corpus size in git.</strong> ~850 KB JSON, comparable to the shipped <code>frameworks.json</code> (1.1 MB). Accepted.</li>
  <li><strong>Open:</strong> exact <code>T</code>/<code>S</code> coverage-gate thresholds and the per-topic curated cap are tuned during S1 build from the spike's §2a numbers (pricing 154 vs devrel 40).</li>
</ul>
</section>

<section id="release-prerequisites">
<h2 id="release-prerequisites-h">Release prerequisites (not <code>/execute</code> tasks)</h2>
<p>Per skill-mode scope rules, the following are handled by <code>/complete-dev</code> at release, NOT as <code>/execute</code> wave tasks: the single <code>pmos-learnkit</code> version bump (both manifests), the CHANGELOG entry, any README rows, manifest version-sync. External (different repo, out of scope here): add <code>nrc export-curated</code> to <code>notion-reference-crawler</code> implementing the brief §4 + §5 distillation so refreshing the overlay is one command + a copy.</p>
</section>
