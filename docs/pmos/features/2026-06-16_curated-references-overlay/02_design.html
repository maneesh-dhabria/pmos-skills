/* ---- 1. Design tokens ----------------------------------------------- */
:root {
  /* "Editorial Technical" — warm-paper canvas, ink text, hairline rules (story 260614-tcx). */
  --pmos-bg:        #f8f5ef;
  --pmos-surface:   #ffffff;
  --pmos-surface-2: #f1ede4;
  --pmos-surface-3: #e9e3d6;
  --pmos-border:    #e2dac9;
  --pmos-border-2:  #ece6da;
  /* Hairline section rule — quieter than a border, used under h2 + table heads. */
  --pmos-rule:      #d9cfbd;
  --pmos-text:      #201e1a;
  --pmos-muted:     #655e54;
  --pmos-faint:     #a59c8e;   /* decoration only — never body text (AA, FR-7) */
  /* Burnt-orange signal accent — shared by docs AND diagram themes (one palette). */
  --pmos-accent:        #b8431a;
  --pmos-accent-strong: #8f3413;
  --pmos-accent-bg:     #f6e4d6;
  /* Inline code — calm warm-grey on a light tint, NOT the loud accent (user feedback). */
  --pmos-code-bg:   #f1ece2;
  --pmos-code-fg:   #6f5848;
  --pmos-success:   #16a34a;
  --pmos-warning:   #b8651a;
  --pmos-error:     #b91c1c;

  --pmos-radius:    6px;
  --pmos-radius-lg: 12px;
  --pmos-shadow:    0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  --pmos-shadow-lg: 0 4px 14px rgba(0,0,0,.10), 0 12px 28px rgba(0,0,0,.08);

  /* Three-voice type system (story 260614-tcx): serif body, sans headings, mono structure.
     --pmos-font-serif → reading body; --pmos-font-sans → headings/UI; --pmos-font-display
     (bundled JetBrains Mono 700, see @font-face) → the structural layer (wordmark, section
     [NN] counters, table heads, eyebrows). Token names preserved — consumed across the repo. */
  --pmos-font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Charter", Georgia, "Times New Roman", serif;
  --pmos-font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --pmos-font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --pmos-font-display: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Reading measure (~65ch) + wide measure for full-bleed chrome and break-out blocks. */
  --pmos-measure: 730px;
  --pmos-wide:    880px;

  --pmos-fs-xs: 11px;
  --pmos-fs-sm: 12px;
  --pmos-fs-base: 14px;
  --pmos-fs-md: 15px;
  --pmos-fs-lg: 17px;
  --pmos-fs-xl: 22px;
  --pmos-fs-2xl: 28px;

  --pmos-sp-1: 4px;
  --pmos-sp-2: 8px;
  --pmos-sp-3: 12px;
  --pmos-sp-4: 16px;
  --pmos-sp-5: 24px;
  --pmos-sp-6: 32px;

  --pmos-sidebar-w: 280px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --pmos-bg:        #14110d;
    --pmos-surface:   #1b1813;
    --pmos-surface-2: #211d17;
    --pmos-surface-3: #2a251d;
    --pmos-border:    #322c23;
    --pmos-border-2:  #3d362b;
    --pmos-rule:      #4a4133;
    --pmos-text:      #f2ece1;
    --pmos-muted:     #b9ad9b;
    --pmos-faint:     #7c7160;
    --pmos-accent:        #e08a4a;
    --pmos-accent-strong: #f0a868;
    --pmos-accent-bg:     #3a210f;
    --pmos-code-bg:   #2a251d;
    --pmos-code-fg:   #d8c4a8;
  }
}

/* ---- 2. Reset + base ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--pmos-bg);
  color: var(--pmos-text);
  font-family: var(--pmos-font-serif);
  font-size: 17px;
  line-height: 1.66;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: var(--pmos-accent);
  text-decoration: none;
}
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 2px; border-radius: 2px; }

img, svg { max-width: 100%; height: auto; }

/* ---- 3. Typography -------------------------------------------------- */
h1, h2, h3, h4, h5, h6 {
  margin: 0 0 var(--pmos-sp-3);
  font-weight: 600;
  line-height: 1.3;
  color: var(--pmos-text);
}
/* Headings carry the sans face; the structural [NN] counter + wordmark stay mono (story 260614-tcx). */
h1, h2, h3 { font-family: var(--pmos-font-sans); }
h1 { font-size: 34px; font-weight: 700; line-height: 1.12; letter-spacing: -0.02em; margin-top: 0; }
h2 {
  font-size: 21px;
  font-weight: 700;
  text-transform: none;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: var(--pmos-sp-6) 0 var(--pmos-sp-3);
  padding-top: var(--pmos-sp-5);
  border-top: 1px solid var(--pmos-rule);
  position: relative;
}
h3 { font-size: 17px; font-weight: 600; margin: var(--pmos-sp-5) 0 var(--pmos-sp-2); position: relative; }
h4 { font-size: var(--pmos-fs-md); }
h5, h6 { font-size: var(--pmos-fs-sm); color: var(--pmos-muted); }

p { margin: 0 0 var(--pmos-sp-4); }

/* Calm warm-grey inline code — soft tint, not the loud accent (user feedback). */
pre, code, kbd, samp { font-family: var(--pmos-font-mono); }
code {
  background: var(--pmos-code-bg);
  color: var(--pmos-code-fg);
  padding: 1.5px 6px;
  border-radius: 4px;
  font-size: 0.82em;
}
pre {
  background: #2a2620;
  color: #f0e9dd;
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius-lg);
  padding: var(--pmos-sp-4) 18px;
  overflow-x: auto;
  margin: var(--pmos-sp-4) 0;
  font-size: 13px;
  line-height: 1.55;
}
pre code { background: transparent; color: inherit; padding: 0; font-size: inherit; }

blockquote {
  margin: var(--pmos-sp-3) 0;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-left: 3px solid var(--pmos-accent);
  background: var(--pmos-surface-2);
  color: var(--pmos-muted);
}

/* Eyebrow + labelled lead (story 260614-tcx, AC5) — mono uppercase kicker over the
   title; the lead is a serif standfirst introduced by a small mono chip. No italic
   left-rule "mission" block — the chip carries the role instead. */
.pmos-eyebrow {
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent);
  margin: 0 0 var(--pmos-sp-2);
}
.pmos-lead {
  font-family: var(--pmos-font-serif);
  font-size: 19px;
  line-height: 1.55;
  color: var(--pmos-text);
  margin: 0 0 var(--pmos-sp-5);
}
.pmos-lead-label {
  display: inline-block;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent-strong);
  background: var(--pmos-accent-bg);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 0.6ch;
}

/* ---- 4. Tables ------------------------------------------------------ */
/* Calmer tables (story 260614-tcx, AC6): mono uppercase heads, horizontal rules only
   (no vertical grid), zebra retained. Break-out width handled in §8. */
table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--pmos-sp-4) 0;
  font-size: 15px;
  line-height: 1.5;
}
caption { caption-side: top; text-align: left; font-style: italic; color: var(--pmos-muted); margin-bottom: var(--pmos-sp-2); }
thead th {
  background: transparent;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
  color: var(--pmos-muted);
  text-align: left;
  padding: 9px 14px;
  border-bottom: 2px solid var(--pmos-rule);
}
th, td {
  border: 0;
  border-bottom: 1px solid var(--pmos-border-2);
  padding: 11px 14px;
  vertical-align: top;
}
tbody tr:nth-child(even) td { background: var(--pmos-surface-2); }

/* ---- 5. Lists + DL -------------------------------------------------- */
ul, ol { margin: 0 0 var(--pmos-sp-3); padding-left: var(--pmos-sp-5); }
li { margin: var(--pmos-sp-1) 0; }
li > ul, li > ol { margin: var(--pmos-sp-1) 0; }

dl { margin: var(--pmos-sp-3) 0; }
dt {
  font-weight: 600;
  margin-top: var(--pmos-sp-3);
  color: var(--pmos-text);
}
dd { margin: var(--pmos-sp-1) 0 var(--pmos-sp-2) var(--pmos-sp-4); color: var(--pmos-muted); }

/* ---- 6. Figures ----------------------------------------------------- */
figure {
  margin: var(--pmos-sp-4) 0;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-3);
}
figure svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
figcaption {
  margin-top: var(--pmos-sp-2);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  font-style: italic;
  text-align: center;
}

/* ---- 7. Viewer chrome (index.html) --------------------------------- */
.pmos-viewer-shell {
  display: grid;
  grid-template-columns: var(--pmos-sidebar-w) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  background: var(--pmos-bg);
}

.pmos-toolbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-surface);
  border-bottom: 1px solid var(--pmos-border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pmos-toolbar h1 {
  margin: 0;
  font-size: var(--pmos-fs-md);
  font-weight: 600;
}
.pmos-toolbar .pmos-toolbar-meta {
  margin-left: auto;
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-muted);
}

.pmos-sidebar {
  background: var(--pmos-surface-2);
  border-right: 1px solid var(--pmos-border);
  overflow-y: auto;
  padding: var(--pmos-sp-3);
  height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
}
.pmos-sidebar-group {
  margin-bottom: var(--pmos-sp-4);
}
.pmos-sidebar-group-h {
  font-size: var(--pmos-fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--pmos-muted);
  margin: var(--pmos-sp-3) 0 var(--pmos-sp-2);
  padding: 0 var(--pmos-sp-2);
}
.pmos-sidebar-item {
  display: block;
  padding: var(--pmos-sp-1) var(--pmos-sp-3);
  border-radius: var(--pmos-radius);
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-text);
  text-decoration: none;
  margin: 1px 0;
}
.pmos-sidebar-item:hover {
  background: var(--pmos-surface-3);
  text-decoration: none;
}
.pmos-sidebar-item.is-active {
  background: var(--pmos-accent-bg);
  color: var(--pmos-accent-strong);
  font-weight: 500;
}
.pmos-sidebar-sub {
  display: block;
  padding: 2px var(--pmos-sp-3) 2px var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  text-decoration: none;
  border-radius: var(--pmos-radius);
}
.pmos-sidebar-sub:hover { color: var(--pmos-text); background: var(--pmos-surface-3); text-decoration: none; }
.pmos-sidebar-sub.is-active { color: var(--pmos-accent-strong); }

.pmos-main {
  background: var(--pmos-surface);
  border-left: 1px solid var(--pmos-border);
  height: calc(100vh - 48px);
  overflow: hidden;
}
.pmos-main iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.pmos-source-info {
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
}

/* ---- 8. Per-artifact body (template.html) -------------------------- */
/* Full-bleed toolbar bar (spans the viewport); inner content centered at the wide
   measure to line up with the prose column + its right break-out (story 260614-tcx). */
.pmos-artifact-toolbar {
  background: rgba(248, 245, 239, 0.86);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--pmos-rule);
  position: sticky;
  top: 0;
  z-index: 5;
}
.pmos-artifact-toolbar-inner {
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: 11px var(--pmos-sp-5);
}
@media (prefers-color-scheme: dark) {
  .pmos-artifact-toolbar { background: rgba(20, 17, 13, 0.86); }
}
/* Masthead wordmark (W11) — "pmos" in the display face + an accent block caret
   drawn in CSS (no glyph dependency). Appears top-left of every artifact toolbar. */
.pmos-wordmark {
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: var(--pmos-fs-lg);
  letter-spacing: -0.04em;
  color: var(--pmos-text);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-wordmark::after {
  content: "";
  display: inline-block;
  width: 0.32em;
  height: 0.95em;
  margin-left: 0.1em;
  background: var(--pmos-accent);
  border-radius: 1px;
  transform: translateY(0.05em);
}
/* Toolbar breadcrumb — a non-heading mono label (the real H1 lives in the body now,
   story 260614-tcx). .pmos-artifact-title kept as a back-compat alias. */
.pmos-crumb,
.pmos-artifact-title {
  margin: 0;
  font-family: var(--pmos-font-display);
  font-size: var(--pmos-fs-sm);
  font-weight: 400;
  color: var(--pmos-muted);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: var(--pmos-sp-3);
  border-left: 1px solid var(--pmos-border-2);
}
.pmos-artifact-actions { display: flex; gap: var(--pmos-sp-2); }

/* Body document title — the single real H1, opening the article column. */
.pmos-doc-title { margin: 0 0 var(--pmos-sp-5); }

.pmos-btn {
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: var(--pmos-fs-sm);
  padding: 4px 10px;
  border-radius: var(--pmos-radius);
  cursor: pointer;
  transition: background 0.12s;
}
.pmos-btn:hover { background: var(--pmos-surface-3); }
.pmos-btn:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 1px; }
.pmos-btn:active { background: var(--pmos-border-2); }
.pmos-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.pmos-artifact-body {
  max-width: var(--pmos-measure);
  margin: 0 auto;
  padding: 48px var(--pmos-sp-5) 96px;
  counter-reset: pmos-sec;
}
.pmos-artifact-body section {
  margin-bottom: var(--pmos-sp-5);
}

/* Break-out (story 260614-tcx, AC3): tables + code blocks extend past the reading
   measure to the RIGHT only — left edge stays aligned with the prose, capped at the
   wide measure. Symmetric centering would float them away from the text column. */
.pmos-artifact-body table,
.pmos-artifact-body pre,
.pmos-artifact-body figure {
  width: calc(100% + 150px);
  max-width: var(--pmos-wide);
  margin-left: 0;
}

/* Section signature (W11) — a zero-padded [NN] counter in the accent prefixes every
   content h2. CSS-generated, so it never enters the DOM text: heading ids, comment
   anchors, and Copy-MD all still see the clean heading. */
.pmos-artifact-body h2::before {
  counter-increment: pmos-sec;
  content: counter(pmos-sec, decimal-leading-zero);
  display: block;
  margin-bottom: 7px;
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0;
  color: var(--pmos-accent);
}

/* Section anchor-icon hover state — per-section Copy MD (FR-24) */
.pmos-artifact-body h2,
.pmos-artifact-body h3 {
  position: relative;
}
.pmos-section-anchor {
  position: absolute;
  left: -28px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 0;
  color: var(--pmos-faint);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  font-size: 13px;
  padding: 0;
}
.pmos-artifact-body h2:hover .pmos-section-anchor,
.pmos-artifact-body h3:hover .pmos-section-anchor,
.pmos-section-anchor:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  outline: none;
}
.pmos-section-anchor:hover { color: var(--pmos-accent-strong); }

/* :target highlight for anchor-scroll (FR-90) */
:target {
  scroll-margin-top: 64px;
  background: linear-gradient(transparent 0, var(--pmos-accent-bg) 0) no-repeat;
  background-size: 100% 0;
  animation: pmos-target-flash 1.4s ease-out;
}
@keyframes pmos-target-flash {
  0%   { background-size: 100% 100%; }
  60%  { background-size: 100% 100%; }
  100% { background-size: 100% 0; }
}

.pmos-artifact-footer {
  margin-top: var(--pmos-sp-6);
  border-top: 1px solid var(--pmos-rule);
}
.pmos-artifact-footer-inner {
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: var(--pmos-sp-4) var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5ch;
}
/* Footer wordmark (W11) — the brand mark, smaller than the toolbar lockup. */
.pmos-wordmark--footer {
  font-size: var(--pmos-fs-sm);
  margin-right: var(--pmos-sp-2);
}

/* Attribution — toolbar (right-aligned, small) and footer (inline after source).
   W11: dropped the 0.65-opacity italic ("legal boilerplate") for a visible,
   non-italic brand link that brightens to the accent on hover. */
.pmos-attribution {
  font-size: var(--pmos-fs-xs);
  font-style: normal;
  color: var(--pmos-muted);
  text-decoration: none;
  letter-spacing: 0.01em;
  opacity: 0.85;
  transition: opacity 120ms ease, color 120ms ease;
}
.pmos-attribution:hover,
.pmos-attribution:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}
.pmos-attribution--toolbar {
  margin-left: var(--pmos-sp-3);
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-attribution-sep {
  color: var(--pmos-muted);
  opacity: 0.5;
}

/* Toast (Copy confirmation) */
.pmos-toast {
  position: fixed;
  bottom: var(--pmos-sp-4);
  right: var(--pmos-sp-4);
  background: var(--pmos-text);
  color: var(--pmos-bg);
  font-size: var(--pmos-fs-sm);
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-radius: var(--pmos-radius);
  box-shadow: var(--pmos-shadow-lg);
  z-index: 100;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
}
.pmos-toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- 9. Quickstart banner (W04, FR-26) ----------------------------- */
.pmos-quickstart-banner {
  margin: var(--pmos-sp-3) auto;
  max-width: 880px;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  font-size: var(--pmos-fs-sm);
}
.pmos-quickstart-banner strong { color: var(--pmos-accent-strong); }
.pmos-quickstart-banner .pmos-quickstart-dismiss {
  margin-left: auto;
}

/* ---- 10. file:// fallback banner ----------------------------------- */
.pmos-fallback-banner {
  margin: 0;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: #fff7ed;
  border-bottom: 1px solid var(--pmos-warning);
  color: #9a3412;
  font-size: var(--pmos-fs-sm);
}
@media (prefers-color-scheme: dark) {
  .pmos-fallback-banner {
    background: #422006;
    color: #fdba74;
  }
}
.pmos-fallback-banner code {
  background: rgba(0,0,0,0.06);
  color: inherit;
}

/* ---- 11. Legacy MD shim (FR-22) ----------------------------------- */
.pmos-legacy-md {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--pmos-font-mono);
  font-size: var(--pmos-fs-sm);
  line-height: 1.5;
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-4);
  margin: var(--pmos-sp-3);
  max-width: calc(880px - 2 * var(--pmos-sp-3));
  overflow-x: auto;
}
.pmos-legacy-md-banner {
  background: var(--pmos-warning);
  color: #fff;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  font-size: var(--pmos-fs-sm);
  font-weight: 500;
}

/* ---- 12. Focus ring + keyboard nav (NFR-03) ----------------------- */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
  border-radius: 2px;
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
}

/* Skip link (a11y) */
.pmos-skip-link {
  position: absolute;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
.pmos-skip-link:focus {
  position: fixed;
  left: var(--pmos-sp-3);
  top: var(--pmos-sp-3);
  width: auto;
  height: auto;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  padding: var(--pmos-sp-2) var(--pmos-sp-3);
  border: 2px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  z-index: 200;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* Print */
@media print {
  .pmos-artifact-toolbar,
  .pmos-toolbar,
  .pmos-sidebar,
  .pmos-quickstart-banner,
  .pmos-fallback-banner,
  .pmos-toast,
  .pmos-section-anchor,
  .pmos-attribution--toolbar { display: none !important; }
  .pmos-viewer-shell { display: block; }
  .pmos-main { height: auto; }
  body { background: white; color: black; }
}

/* --- comments.css --- */
/* comments.css — pmos-toolkit html-authoring substrate.
 * Inline-doc-comments overlay styles.
 * "Editorial Technical" refresh (story 260614-tcx): the thread renders as a warm-paper
 * popover anchored to the annotation — NOT a white fixed side-panel. Commented text
 * gets a warm tint + thin accent underline. Token-driven, so it inherits the dark-mode
 * palette automatically. The inline <script id="pmos-comments"> persistence contract and
 * the serve.js /save path are unchanged — this is a presentation change only.
 * Refs: FR-02, FR-03, FR-04, FR-08, FR-10, FR-11, §10, §11.
 */

/* Commented text — a shade darker than the paper canvas + an inset accent underline.
   Applied to the selected range when a comment is opened (the persisted model stores a
   quote_hash, not the raw quote, so spans are highlighted in-session, not rehydrated). */
.pmos-cmt {
  background: #efe6d4;
  box-shadow: inset 0 -1px 0 var(--pmos-accent);
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
}
@media (prefers-color-scheme: dark) {
  .pmos-cmt { background: #34291a; }
}

.pmos-floating-btn {
  position: absolute;
  width: 30px;
  height: 30px;
  z-index: 9999;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: var(--pmos-shadow);
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

/* The thread popover — warm paper, accent left-border, anchored near the annotation by
   the JS (position:absolute + computed top/left). NO white card, NO full-height fixed
   drawer: it overlays the article, so opening/closing never reflows the body. */
.pmos-side-panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 340px;
  max-width: calc(100vw - 32px);
  max-height: 70vh;
  background: #f0e8d8;
  border: 1px solid var(--pmos-rule);
  border-left: 2px solid var(--pmos-accent);
  border-radius: 0 8px 8px 0;
  box-shadow: var(--pmos-shadow-lg);
  display: none;
  flex-direction: column;
  z-index: 9998;
  font-family: var(--pmos-font-sans);
  overflow: hidden;
}
.pmos-side-panel.open {
  display: flex;
}
@media (prefers-color-scheme: dark) {
  .pmos-side-panel { background: #241c12; }
}

.pmos-panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--pmos-rule);
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  font-size: 11px;
  color: var(--pmos-accent);
  display: flex;
  align-items: center;
}

.pmos-thread-list {
  padding: 8px;
  overflow-y: auto;
  flex: 1 1 auto;
}

.pmos-thread-card {
  padding: 12px 16px;
  border-bottom: 1px solid var(--pmos-border-2);
  font-size: 14px;
  color: var(--pmos-text);
}

/* Long threads collapse to a one-line summary; click expands in place. */
.pmos-thread-card.collapsed .pmos-thread-messages {
  display: none;
}
.pmos-thread-card.expanded .pmos-thread-messages {
  display: block;
}
.pmos-thread-messages {
  display: block;
}

.pmos-thread-card.collapsed .pmos-message:first-child {
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pmos-message {
  padding: 8px 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--pmos-text);
}
.pmos-message .pmos-author {
  font-weight: 700;
  font-size: 12.5px;
  color: var(--pmos-muted);
}

.pmos-thread-compose {
  padding: 12px;
  border-top: 1px solid var(--pmos-rule);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pmos-thread-compose textarea {
  border: 1px solid var(--pmos-border);
  border-radius: 4px;
  padding: 8px;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 64px;
}

.pmos-thread-compose button,
.pmos-compose-submit {
  align-self: flex-end;
  padding: 6px 14px;
  background: var(--pmos-accent);
  color: #fff;
  border: 1px solid var(--pmos-accent);
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.pmos-thread-compose button:hover,
.pmos-compose-submit:hover { background: var(--pmos-accent-strong); border-color: var(--pmos-accent-strong); }

.pmos-banner {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 12px 16px;
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: 6px;
  color: var(--pmos-accent-strong);
  z-index: 10000;
  cursor: pointer;
  font-family: var(--pmos-font-sans);
  font-size: 13px;
  box-shadow: var(--pmos-shadow);
}

.pmos-diagram-marker {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--pmos-accent);
  border-radius: 50%;
  pointer-events: auto;
  cursor: pointer;
}

/* Orphan banner — sticky-top warning inside the thread popover. */
[data-pmos-orphan-banner] {
  position: sticky;
  top: 0;

  Other tokens (Curated-references overlay + shared library-viewer substrate — epic design, <section id="summary">
<h2 id="summary-h">Summary</h2>
<p><strong>One epic, one plugin (<code>pmos-learnkit</code>), two coupled deliverables, four stories.</strong> This epic lets <code>/primer</code> and <code>/learn-list</code> draw on a personal, pre-curated reference corpus <em>in addition to</em> live web research, and — separately but in the same plugin — extracts the rediscovered "faceted listing page" into a shared substrate that all three learnkit browse views (<code>/frameworks</code>, <code>/primer</code>, and a new <code>/learn-list</code> reference viewer) share.</p>
<dl>
  <dt>Deliverable A — curated-references overlay</dt>
  <dd>An optional, if-present overlay feeds the existing topic-research candidate pool. The corpus contributes non-obvious, high-signal sources generic live search misses; the substrate's existing fetch-verify loop neutralizes corpus junk for free. <strong>No trust regression:</strong> every cited source is still fetched &amp; verified at run time, so the overlay can only <em>add</em> candidates, never inject an unverified claim.</dd>
  <dt>Deliverable B — shared library-viewer substrate + retrofits + new viewer</dt>
  <dd>Extract <code>_shared/library-viewer/</code> (design guidelines + a reusable zero-dependency Node-ESM component library: facet engine, view toggles, search, sorting, applied-filter chips, offline single-file emit, masthead/theme), proven by retrofitting the richest existing viewer (<code>/frameworks</code>), then retrofit <code>/primer</code> and build a new <code>/learn-list</code> reference viewer on top of it.</dd>
</dl>
<p>Define-loop note: <strong>route: skill</strong>. There is no epic-level <code>/spec</code>; this document <em>is</em> the cross-skill coherence contract the four stories cite by anchor.</p>
</section>

<section id="context-and-goals">
<h2 id="context-and-goals-h">Context &amp; goals</h2>
<p>Seed: the validated spike brief <code>curated-references-integration-brief.md</code> (2026-06-16, run against <code>pmos-learnkit</code> v0.21.0). A throwaway spike (matcher + a real fetch-verifying subagent) showed the corpus contributes genuinely high-signal sources; this epic productionises that finding. The brief is adopted as the design basis for Deliverable A; the maintainer added Deliverable B (the viewer + shared-substrate extraction) at define time.</p>
<p>"Improve <code>/primer</code> and <code>/learn-list</code> <strong>indirectly</strong>" means: the skills themselves stay general and shippable; all behavioural change lands in the shared <code>_shared/topic-research/</code> substrate they both inline. The skills gain only a one-line note that an optional overlay may augment the pool.</p>
<h3 id="evidence">Evidence from the spike (informative)</h3>
<ul>
  <li><strong>Retrieval quality:</strong> rarity-weighted tag overlap (down-weighting near-useless generic tags like <code>product</code>, present on ~65% of refs) cleanly surfaces on-topic, authoritative candidates. An off-domain topic naturally yields few low-scoring candidates — so a count/score threshold replaces any "is this a PM topic?" classifier.</li>
  <li><strong>Verification yield ~30%:</strong> a subagent triaged 30 → fetched top 10 → 9 verified. Value concentrates in 4–5 HIGH-marginal pieces generic search misses. ⇒ over-fetch ~3–4× the target count.</li>
  <li><strong>Pre-fetch junk signals:</strong> bot-wall titles ("Just a moment…", "Attention Required! | Cloudflare", "4xx/5xx") auto-reject before spending a fetch; <code>summary_grounded:false</code> predicts trouble; <code>forbes.com</code> is hard-blocked by the fetcher.</li>
</ul>
</section>

<section id="deliverable-a-overlay">
<h2 id="deliverable-a-overlay-h">Deliverable A — the curated-references overlay</h2>
<p>The corpus becomes a <strong>third candidate source</strong> in <code>sourcing.md</code>'s per-topic "Gather candidates" step. Everything downstream (hard gate, tier-rank, fetch-verify, grounded takeaway) already exists and treats curated candidates identically to live ones.</p>
<h3 id="a-overlay-file">A.1 — Overlay corpus (shipped, if-present)</h3>
<p><strong>Canonical location:</strong> <code>plugins/pmos-learnkit/skills/_shared/topic-research/curated-references.json</code> — a single shipped copy that is <em>both</em> the overlay the prefilter reads and the base the <code>/learn-list</code> viewer (Deliverable B) renders. Loaded if present, ignored if absent → the skills stay clean, general, shippable; the corpus is a pluggable layer the owner ships (or doesn't).</p>
<p><strong>Format = JSON</strong> (maintainer decision D-TOOL), not the brief's YAML: zero-dependency parse for both the Node prefilter and the Node viewer, consistent with <code>frameworks.json</code> / <code>primers-index.json</code>; no Python runtime added to an otherwise Python-free skill set. Per-record allowed fields only:</p>
<pre><code>{ "id", "url", "title", "source_type", "publication_date", "tags", "summary", "summary_grounded" }
meta: { schema_version, source, counts: { total, grounded, weak } }</code></pre>
<h3 id="a-prefilter">A.2 — Deterministic prefilter (ships beside the overlay)</h3>
<p>A tiny zero-dep Node-ESM script (<code>curated-references-match.mjs</code>): given a topic's query tags + the overlay, returns the top-K candidates by <strong>rarity-weighted tag overlap</strong> (IDF-style <code>w(tag) = log(N / (1 + df(tag)))</code>). It also pre-rejects bot-wall titles, down-weights <code>summary_grounded:false</code>, and applies a small hard-blocked-domain skip-list (e.g. <code>forbes.com</code>). Deterministic, no LLM, no API credits, reproducible. <em>Why a script, not the LLM:</em> ~1,800 entries is too large for a subagent to scan reliably; the prefilter narrows to a few dozen the subagent can reason over.</p>
<h3 id="a-subagent">A.3 — The curated-references subagent (the one new dispatch)</h3>
<p>One subagent during the research phase. For each outline topic it: (1) picks ~5–8 relevant tags from the corpus tag-vocabulary; (2) runs the prefilter → ~30 candidates; (3) reranks for relevance/authority/recency, drops residual junk; (4) hands survivors into <code>sourcing.md</code> step 1's candidate pool, where they are hard-gated, tier-ranked, fetch-verified, and grounded by the <em>existing</em> loop — exactly like live-search candidates. It runs once (all topics) returning a <code>topic → candidates[]</code> map (cheaper than per-topic).</p>
<h3 id="a-integration">A.4 — Substrate integration point (minimal diff)</h3>
<p><code>_shared/topic-research/sourcing.md</code>, "Rank-then-verify loop (per topic)", step 1 currently reads:</p>
<blockquote>1. <strong>Gather candidates</strong> from live search + the harvested curations (<code>canon.curations[].recurring_entries</code>) — cap the pool at ~3× the links-to-emit.</blockquote>
<p>Changes to add the overlay as a third source via the curated-references subagent (rarity-weighted prefilter → rerank), present only when <code>curated-references.json</code> exists, with the pool cap raised to ~3–4× the links-to-emit (the curated slice over-supplies because its verification yield is ~30%). <strong>No other step changes</strong> — steps 2–5 are origin-agnostic and already enforce the trust contract. <code>intake.md</code> gains a note that the curated slice rides the same top-N / depth dials.</p>
<h3 id="a-coverage-gate">A.5 — Coverage gate (no domain classifier)</h3>
<p>If the prefilter returns fewer than <strong>T</strong> candidates above score <strong>S</strong> for a topic, the subagent skips injection for that topic and logs it. The corpus's own coverage decides, per topic — which is what makes "auto for PM/startup topics" safe without a brittle classifier.</p>
<h3 id="a-flag">A.6 — Suppression control</h3>
<p>A <code>--no-curated</code> natural-language/flag control and a <code>curated_references: off</code> settings key suppress the overlay even when present.</p>
</section>

<section id="deliverable-b-viewer-substrate">
<h2 id="deliverable-b-viewer-substrate-h">Deliverable B — shared library-viewer substrate + retrofits + new viewer</h2>
<p>The faceted listing page (filters / views / sorting / search / offline single-file from <code>file://</code>) is currently rediscovered per skill: <code>/frameworks</code> (a ~796-line <code>build-library.mjs</code>), <code>/primer</code> (a ~265-line one), and would be a third copy for <code>/learn-list</code>. Three real consumers is the rule-of-three that justifies extraction now.</p>
<h3 id="b-substrate">B.1 — <code>_shared/library-viewer/</code> substrate</h3>
<dl>
  <dt><code>guidelines.md</code></dt><dd>Design guidelines: the three listing views (list / detailed / compact), facet-dropdown + applied-filter-chip behaviour (OR within a facet, AND across), search, sorting, the sidebar reader (layout-shift, not overlay), mobile rules, masthead/theme, and the offline-from-<code>file://</code> + zero-dep + no-ESM-in-assets constraints.</dd>
  <dt>reusable component library (zero-dep Node ESM)</dt><dd>A facet/index/render core the per-skill <code>build-library.mjs</code> scripts call: facet extraction + counts, the filter/search/sort engine, applied-filter chips, view toggles, single-file HTML emit, masthead/theme. The per-skill builder supplies only the corpus adapter (record → card fields) and any skill-specific extras (e.g. frameworks' inline diagrams, primer's dual-population linking).</dd>
  <dt>tests</dt><dd>Substrate-level unit tests for the engine, independent of any one consumer.</dd>
</dl>
<p><strong>Extraction discipline:</strong> the substrate is <em>derived by refactoring <code>/frameworks</code> (the richest viewer) onto it in the same story</em> (S2). A consumer-less abstraction is a premature abstraction; proving it against the hardest case first is what makes the API right. The substrate must preserve every shipped feature of each retrofitted viewer (no behavioural regression).</p>
<h3 id="b-learnlist-viewer">B.2 — New <code>/learn-list</code> reference viewer</h3>
<p>A thin <code>build-library.mjs</code> on the substrate that reads the shipped <code>curated-references.json</code> (Deliverable A's single copy) as its base, faceting on <code>tags</code>, <code>source_type</code>, <code>summary_grounded</code>, and publication date; plus a <code>browse</code>/<code>list</code> verb dispatch (and bare <code>/learn-list</code>) → a <code>#browse</code> phase that builds and opens <code>{docs_path}/learn-list/library.html</code>, mirroring <code>/frameworks</code> and <code>/primer</code>.</p>
</section>

<section id="corpus-and-pii">
<h2 id="corpus-and-pii-h">Corpus ship policy &amp; PII contract</h2>
<p>The maintainer decided to <strong>ship the corpus</strong> (resolving the brief's §7 open question). The spike export is already distilled to the allowed field set; this epic hardens the privacy contract at conversion time.</p>
<h3 id="pii-gate">PII scrub gate (hard, deterministic)</h3>
<ul>
  <li><strong>Field allowlist:</strong> the shipped JSON contains ONLY <code>id, url, title, source_type, publication_date, tags, summary, summary_grounded</code> per record (+ the <code>meta</code> counts). A deterministic test asserts no key matching <code>page_id|database_id|occurrence|snapshot|workspace|notion_*</code> leaks.</li>
  <li><strong>Re-mint <code>id</code> from <code>sha(url)</code></strong> at conversion so every id is provably content-derived, never a Notion page-id.</li>
  <li><strong>Genericise <code>meta.source</code></strong> — drop the <code>notion-reference-crawler</code> provenance string (use a neutral value, e.g. <code>curated-references</code>).</li>
  <li>Public <code>notion.site</code> / <code>notion.so</code> URLs that are the reference itself are legitimate and kept (audit of the spike found exactly one public published article, no private-workspace URLs).</li>
</ul>
<h3 id="junk-policy">Junk cleanup policy (informative, from brief §5)</h3>
<table>
  <thead><tr><th>Class</th><th>Signal</th><th>Policy</th></tr></thead>
  <tbody>
    <tr><td>DEAD</td><td>summary admits 404 / "no longer exists"</td><td>Exclude from export</td></tr>
    <tr><td>WEAK</td><td>content unavailable/inferred at collection</td><td>Keep, <code>summary_grounded:false</code>; prefilter deprioritizes; verification re-checks</td></tr>
    <tr><td>CLEAN</td><td>grounded summary</td><td>High-confidence pool</td></tr>
  </tbody>
</table>
<p>The shipped corpus = CLEAN + WEAK (DEAD excluded). The prefilter additionally auto-rejects bot-wall <em>titles</em> at match time without deleting the record (the URL may verify on a future run).</p>
</section>

<section id="cross-skill-coherence">
<h2 id="cross-skill-coherence-h">Cross-skill coherence contract</h2>
<p>The invariants the four stories must jointly honor:</p>
<ol>
  <li><strong>Substrate stays skill-agnostic (D12).</strong> The <code>_shared/topic-research/</code> changes (and the new <code>_shared/library-viewer/</code> substrate) never name or branch on <code>primer</code> / <code>learn-list</code> / <code>frameworks</code>; the existing <code>assert_substrate_skill_agnostic.sh</code> test stays green. The overlay is a skill-agnostic data file + a skill-agnostic prefilter + a skill-agnostic subagent contract.</li>
  <li><strong>Trust contract is inviolable.</strong> Curated candidates enter <em>only</em> at the candidate-pool step; the hard gate, tier-rank, fetch-verify, and grounded-takeaway steps are unchanged and origin-agnostic. No path lets a curated summary reach the artifact without a run-time fetch.</li>
  <li><strong>Single corpus copy.</strong> Exactly one <code>curated-references.json</code> ships (in <code>_shared/topic-research/</code>); the prefilter and the <code>/learn-list</code> viewer both read that path. Never ship the 850 KB-class file twice.</li>
  <li><strong>Shared-lib API stability + zero regression.</strong> The <code>_shared/library-viewer/</code> public API is fixed in S2 and consumed unchanged by S3/S4; each retrofit preserves its skill's shipped features (frameworks' diagrams + sidebar reader + multi-select; primer's dual-population Curated/Yours linking). Each skill's existing <code>build-library.test.sh</code> stays green.</li>
  <li><strong>Single plugin (D17).</strong> Every story targets <code>pmos-learnkit</code>; the whole epic releases as one <code>pmos-learnkit</code> version.</li>
</ol>
</section>

<section id="decisions">
<h2 id="decisions-h">Decision log (maintainer, define 2026-06-16)</h2>
<table>
  <thead><tr><th>ID</th><th>Decision</th><th>Rationale / rejected</th></tr></thead>
  <tbody>
    <tr><td>D-SHIP</td><td>Ship the corpus in <code>pmos-skills</code> (resolves brief §7).</td><td>The viewer needs a committed base; the owner wants it shipped. Rejected: local-only overlay.</td></tr>
    <tr><td>D-TOOL</td><td>Node ESM + JSON for prefilter <em>and</em> viewer; single canonical corpus copy in the substrate.</td><td>Repo-consistent, zero extra runtime dep, zero-dep parse. Rejected: Python+YAML (adds a runtime); Node+YAML (fragile bespoke parser).</td></tr>
    <tr><td>D-PII</td><td>Field allowlist + <code>sha(url)</code> id re-mint + generic <code>meta.source</code>, enforced by a deterministic scrub-gate test.</td><td>"Nothing specific about my Notion." Static/enriched fields only.</td></tr>
    <tr><td>D-VIEW</td><td>Extract <code>_shared/library-viewer/</code> AND retrofit all three viewers in this epic.</td><td>Rule-of-three; full DRY now. Rejected: substrate + new-consumer-only; no-substrate (third copy).</td></tr>
    <tr><td>D-PROVE</td><td>Fuse the extraction with the <code>/frameworks</code> retrofit (S2) — the richest viewer is the abstraction's proof.</td><td>Avoids a consumer-less premature abstraction. <code>/primer</code> (S3) and <code>/learn-list</code> (S4) follow.</td></tr>
    <tr><td>D-SPLIT</td><td>Four stories: S1 overlay engine; S2 substrate+frameworks; S3 primer retrofit; S4 learn-list viewer.</td><td>Each is one <code>/execute</code> / one PR vertical slice; D24 litmus holds (only story-level deps).</td></tr>
    <tr><td>D-EXPORT</td><td>The <code>nrc export-curated</code> regeneration tooling (brief §4) is OUT of scope — it lives in <code>notion-reference-crawler</code>, a different repo.</td><td>Recorded as a release-prereq pointer; the shipped corpus is a point-in-time export refreshed by that external command.</td></tr>
  </tbody>
</table>
</section>

</section>

<section id="risks-open-questions">
<h2 id="risks-open-questions-h">Risks &amp; open questions</h2>
<ul>
  <li><strong>Retrofit regression (B).</strong> S2/S3 refactor two already-shipped viewers. Mitigation: each skill's <code>build-library.test.sh</code> is the regression gate; the shared API is fixed in S2 and frozen for S3/S4; live dogfood of each browse page at build time.</li>
  <li><strong>Premature abstraction (B).</strong> Mitigated by D-PROVE — extract by refactoring the richest viewer first, not by speculative design.</li>
  <li><strong>Fetch-budget waste (A).</strong> ~30% yield ⇒ ~70% of curated candidates fail verification. Mitigated by pre-fetch wall-title/ungrounded rejection, the over-fetch ratio, and a per-topic cap on curated candidates.</li>
  <li><strong>Staleness (A).</strong> The overlay is a point-in-time export; recency-favoring rerank + the dial matrix's preference for current sources offset this. Re-export (external tooling, D-EXPORT) when the corpus grows materially.</li>
  <li><strong>Corpus size in git.</strong> ~850 KB JSON, comparable to the shipped <code>frameworks.json</code> (1.1 MB). Accepted.</li>
  <li><strong>Open:</strong> exact <code>T</code>/<code>S</code> coverage-gate thresholds and the per-topic curated cap are tuned during S1 build from the spike's §2a numbers (pricing 154 vs devrel 40).</li>
</ul>
</section>

<h2 id="release-prerequisites-h">Release prerequisites (not <code>/execute</code> tasks)</h2>
<p>Per skill-mode scope rules, the following are handled by <code>/complete-dev</code> at release, NOT as <code>/execute</code> wave tasks: the single <code>pmos-learnkit</code> version bump (both manifests), the CHANGELOG entry, any README rows, manifest version-sync. External (different repo, out of scope here): add <code>nrc export-curated</code> to <code>notion-reference-crawler</code> implementing the brief §4 + §5 distillation so refreshing the overlay is one command + a copy.</p>

/* ---- 1. Design tokens ----------------------------------------------- */
:root {
  /* "Editorial Technical" — warm-paper canvas, ink text, hairline rules (story 260614-tcx). */
  --pmos-bg:        #f8f5ef;
  --pmos-surface:   #ffffff;
  --pmos-surface-2: #f1ede4;
  --pmos-surface-3: #e9e3d6;
  --pmos-border:    #e2dac9;
  --pmos-border-2:  #ece6da;
  /* Hairline section rule — quieter than a border, used under h2 + table heads. */
  --pmos-rule:      #d9cfbd;
  --pmos-text:      #201e1a;
  --pmos-muted:     #655e54;
  --pmos-faint:     #a59c8e;   /* decoration only — never body text (AA, FR-7) */
  /* Burnt-orange signal accent — shared by docs AND diagram themes (one palette). */
  --pmos-accent:        #b8431a;
  --pmos-accent-strong: #8f3413;
  --pmos-accent-bg:     #f6e4d6;
  /* Inline code — calm warm-grey on a light tint, NOT the loud accent (user feedback). */
  --pmos-code-bg:   #f1ece2;
  --pmos-code-fg:   #6f5848;
  --pmos-success:   #16a34a;
  --pmos-warning:   #b8651a;
  --pmos-error:     #b91c1c;

  --pmos-radius:    6px;
  --pmos-radius-lg: 12px;
  --pmos-shadow:    0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  --pmos-shadow-lg: 0 4px 14px rgba(0,0,0,.10), 0 12px 28px rgba(0,0,0,.08);

  /* Three-voice type system (story 260614-tcx): serif body, sans headings, mono structure.
     --pmos-font-serif → reading body; --pmos-font-sans → headings/UI; --pmos-font-display
     (bundled JetBrains Mono 700, see @font-face) → the structural layer (wordmark, section
     [NN] counters, table heads, eyebrows). Token names preserved — consumed across the repo. */
  --pmos-font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Charter", Georgia, "Times New Roman", serif;
  --pmos-font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --pmos-font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --pmos-font-display: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Reading measure (~65ch) + wide measure for full-bleed chrome and break-out blocks. */
  --pmos-measure: 730px;
  --pmos-wide:    880px;

  --pmos-fs-xs: 11px;
  --pmos-fs-sm: 12px;
  --pmos-fs-base: 14px;
  --pmos-fs-md: 15px;
  --pmos-fs-lg: 17px;
  --pmos-fs-xl: 22px;
  --pmos-fs-2xl: 28px;

  --pmos-sp-1: 4px;
  --pmos-sp-2: 8px;
  --pmos-sp-3: 12px;
  --pmos-sp-4: 16px;
  --pmos-sp-5: 24px;
  --pmos-sp-6: 32px;

  --pmos-sidebar-w: 280px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --pmos-bg:        #14110d;
    --pmos-surface:   #1b1813;
    --pmos-surface-2: #211d17;
    --pmos-surface-3: #2a251d;
    --pmos-border:    #322c23;
    --pmos-border-2:  #3d362b;
    --pmos-rule:      #4a4133;
    --pmos-text:      #f2ece1;
    --pmos-muted:     #b9ad9b;
    --pmos-faint:     #7c7160;
    --pmos-accent:        #e08a4a;
    --pmos-accent-strong: #f0a868;
    --pmos-accent-bg:     #3a210f;
    --pmos-code-bg:   #2a251d;
    --pmos-code-fg:   #d8c4a8;
  }
}

/* ---- 2. Reset + base ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--pmos-bg);
  color: var(--pmos-text);
  font-family: var(--pmos-font-serif);
  font-size: 17px;
  line-height: 1.66;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: var(--pmos-accent);
  text-decoration: none;
}
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 2px; border-radius: 2px; }

img, svg { max-width: 100%; height: auto; }

/* ---- 3. Typography -------------------------------------------------- */
h1, h2, h3, h4, h5, h6 {
  margin: 0 0 var(--pmos-sp-3);
  font-weight: 600;
  line-height: 1.3;
  color: var(--pmos-text);
}
/* Headings carry the sans face; the structural [NN] counter + wordmark stay mono (story 260614-tcx). */
h1, h2, h3 { font-family: var(--pmos-font-sans); }
h1 { font-size: 34px; font-weight: 700; line-height: 1.12; letter-spacing: -0.02em; margin-top: 0; }
h2 {
  font-size: 21px;
  font-weight: 700;
  text-transform: none;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: var(--pmos-sp-6) 0 var(--pmos-sp-3);
  padding-top: var(--pmos-sp-5);
  border-top: 1px solid var(--pmos-rule);
  position: relative;
}
h3 { font-size: 17px; font-weight: 600; margin: var(--pmos-sp-5) 0 var(--pmos-sp-2); position: relative; }
h4 { font-size: var(--pmos-fs-md); }
h5, h6 { font-size: var(--pmos-fs-sm); color: var(--pmos-muted); }

p { margin: 0 0 var(--pmos-sp-4); }

/* Calm warm-grey inline code — soft tint, not the loud accent (user feedback). */
pre, code, kbd, samp { font-family: var(--pmos-font-mono); }
code {
  background: var(--pmos-code-bg);
  color: var(--pmos-code-fg);
  padding: 1.5px 6px;
  border-radius: 4px;
  font-size: 0.82em;
}
pre {
  background: #2a2620;
  color: #f0e9dd;
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius-lg);
  padding: var(--pmos-sp-4) 18px;
  overflow-x: auto;
  margin: var(--pmos-sp-4) 0;
  font-size: 13px;
  line-height: 1.55;
}
pre code { background: transparent; color: inherit; padding: 0; font-size: inherit; }

blockquote {
  margin: var(--pmos-sp-3) 0;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-left: 3px solid var(--pmos-accent);
  background: var(--pmos-surface-2);
  color: var(--pmos-muted);
}

/* Eyebrow + labelled lead (story 260614-tcx, AC5) — mono uppercase kicker over the
   title; the lead is a serif standfirst introduced by a small mono chip. No italic
   left-rule "mission" block — the chip carries the role instead. */
.pmos-eyebrow {
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent);
  margin: 0 0 var(--pmos-sp-2);
}
.pmos-lead {
  font-family: var(--pmos-font-serif);
  font-size: 19px;
  line-height: 1.55;
  color: var(--pmos-text);
  margin: 0 0 var(--pmos-sp-5);
}
.pmos-lead-label {
  display: inline-block;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent-strong);
  background: var(--pmos-accent-bg);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 0.6ch;
}

/* ---- 4. Tables ------------------------------------------------------ */
/* Calmer tables (story 260614-tcx, AC6): mono uppercase heads, horizontal rules only
   (no vertical grid), zebra retained. Break-out width handled in §8. */
table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--pmos-sp-4) 0;
  font-size: 15px;
  line-height: 1.5;
}
caption { caption-side: top; text-align: left; font-style: italic; color: var(--pmos-muted); margin-bottom: var(--pmos-sp-2); }
thead th {
  background: transparent;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
  color: var(--pmos-muted);
  text-align: left;
  padding: 9px 14px;
  border-bottom: 2px solid var(--pmos-rule);
}
th, td {
  border: 0;
  border-bottom: 1px solid var(--pmos-border-2);
  padding: 11px 14px;
  vertical-align: top;
}
tbody tr:nth-child(even) td { background: var(--pmos-surface-2); }

/* ---- 5. Lists + DL -------------------------------------------------- */
ul, ol { margin: 0 0 var(--pmos-sp-3); padding-left: var(--pmos-sp-5); }
li { margin: var(--pmos-sp-1) 0; }
li > ul, li > ol { margin: var(--pmos-sp-1) 0; }

dl { margin: var(--pmos-sp-3) 0; }
dt {
  font-weight: 600;
  margin-top: var(--pmos-sp-3);
  color: var(--pmos-text);
}
dd { margin: var(--pmos-sp-1) 0 var(--pmos-sp-2) var(--pmos-sp-4); color: var(--pmos-muted); }

/* ---- 6. Figures ----------------------------------------------------- */
figure {
  margin: var(--pmos-sp-4) 0;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-3);
}
figure svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
figcaption {
  margin-top: var(--pmos-sp-2);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  font-style: italic;
  text-align: center;
}

/* ---- 7. Viewer chrome (index.html) --------------------------------- */
.pmos-viewer-shell {
  display: grid;
  grid-template-columns: var(--pmos-sidebar-w) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  background: var(--pmos-bg);
}

.pmos-toolbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-surface);
  border-bottom: 1px solid var(--pmos-border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pmos-toolbar h1 {
  margin: 0;
  font-size: var(--pmos-fs-md);
  font-weight: 600;
}
.pmos-toolbar .pmos-toolbar-meta {
  margin-left: auto;
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-muted);
}

.pmos-sidebar {
  background: var(--pmos-surface-2);
  border-right: 1px solid var(--pmos-border);
  overflow-y: auto;
  padding: var(--pmos-sp-3);
  height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
}
.pmos-sidebar-group {
  margin-bottom: var(--pmos-sp-4);
}
.pmos-sidebar-group-h {
  font-size: var(--pmos-fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--pmos-muted);
  margin: var(--pmos-sp-3) 0 var(--pmos-sp-2);
  padding: 0 var(--pmos-sp-2);
}
.pmos-sidebar-item {
  display: block;
  padding: var(--pmos-sp-1) var(--pmos-sp-3);
  border-radius: var(--pmos-radius);
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-text);
  text-decoration: none;
  margin: 1px 0;
}
.pmos-sidebar-item:hover {
  background: var(--pmos-surface-3);
  text-decoration: none;
}
.pmos-sidebar-item.is-active {
  background: var(--pmos-accent-bg);
  color: var(--pmos-accent-strong);
  font-weight: 500;
}
.pmos-sidebar-sub {
  display: block;
  padding: 2px var(--pmos-sp-3) 2px var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  text-decoration: none;
  border-radius: var(--pmos-radius);
}
.pmos-sidebar-sub:hover { color: var(--pmos-text); background: var(--pmos-surface-3); text-decoration: none; }
.pmos-sidebar-sub.is-active { color: var(--pmos-accent-strong); }

.pmos-main {
  background: var(--pmos-surface);
  border-left: 1px solid var(--pmos-border);
  height: calc(100vh - 48px);
  overflow: hidden;
}
.pmos-main iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.pmos-source-info {
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
}

/* ---- 8. Per-artifact body (template.html) -------------------------- */
/* Full-bleed toolbar bar (spans the viewport); inner content centered at the wide
   measure to line up with the prose column + its right break-out (story 260614-tcx). */
.pmos-artifact-toolbar {
  background: rgba(248, 245, 239, 0.86);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--pmos-rule);
  position: sticky;
  top: 0;
  z-index: 5;
}
.pmos-artifact-toolbar-inner {
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: 11px var(--pmos-sp-5);
}
@media (prefers-color-scheme: dark) {
  .pmos-artifact-toolbar { background: rgba(20, 17, 13, 0.86); }
}
/* Masthead wordmark (W11) — "pmos" in the display face + an accent block caret
   drawn in CSS (no glyph dependency). Appears top-left of every artifact toolbar. */
.pmos-wordmark {
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: var(--pmos-fs-lg);
  letter-spacing: -0.04em;
  color: var(--pmos-text);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-wordmark::after {
  content: "";
  display: inline-block;
  width: 0.32em;
  height: 0.95em;
  margin-left: 0.1em;
  background: var(--pmos-accent);
  border-radius: 1px;
  transform: translateY(0.05em);
}
/* Toolbar breadcrumb — a non-heading mono label (the real H1 lives in the body now,
   story 260614-tcx). .pmos-artifact-title kept as a back-compat alias. */
.pmos-crumb,
.pmos-artifact-title {
  margin: 0;
  font-family: var(--pmos-font-display);
  font-size: var(--pmos-fs-sm);
  font-weight: 400;
  color: var(--pmos-muted);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: var(--pmos-sp-3);
  border-left: 1px solid var(--pmos-border-2);
}
.pmos-artifact-actions { display: flex; gap: var(--pmos-sp-2); }

/* Body document title — the single real H1, opening the article column. */
.pmos-doc-title { margin: 0 0 var(--pmos-sp-5); }

.pmos-btn {
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: var(--pmos-fs-sm);
  padding: 4px 10px;
  border-radius: var(--pmos-radius);
  cursor: pointer;
  transition: background 0.12s;
}
.pmos-btn:hover { background: var(--pmos-surface-3); }
.pmos-btn:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 1px; }
.pmos-btn:active { background: var(--pmos-border-2); }
.pmos-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.pmos-artifact-body {
  max-width: var(--pmos-measure);
  margin: 0 auto;
  padding: 48px var(--pmos-sp-5) 96px;
  counter-reset: pmos-sec;
}
.pmos-artifact-body section {
  margin-bottom: var(--pmos-sp-5);
}

/* Break-out (story 260614-tcx, AC3): tables + code blocks extend past the reading
   measure to the RIGHT only — left edge stays aligned with the prose, capped at the
   wide measure. Symmetric centering would float them away from the text column. */
.pmos-artifact-body table,
.pmos-artifact-body pre,
.pmos-artifact-body figure {
  width: calc(100% + 150px);
  max-width: var(--pmos-wide);
  margin-left: 0;
}

/* Section signature (W11) — a zero-padded [NN] counter in the accent prefixes every
   content h2. CSS-generated, so it never enters the DOM text: heading ids, comment
   anchors, and Copy-MD all still see the clean heading. */
.pmos-artifact-body h2::before {
  counter-increment: pmos-sec;
  content: counter(pmos-sec, decimal-leading-zero);
  display: block;
  margin-bottom: 7px;
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0;
  color: var(--pmos-accent);
}

/* Section anchor-icon hover state — per-section Copy MD (FR-24) */
.pmos-artifact-body h2,
.pmos-artifact-body h3 {
  position: relative;
}
.pmos-section-anchor {
  position: absolute;
  left: -28px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 0;
  color: var(--pmos-faint);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  font-size: 13px;
  padding: 0;
}
.pmos-artifact-body h2:hover .pmos-section-anchor,
.pmos-artifact-body h3:hover .pmos-section-anchor,
.pmos-section-anchor:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  outline: none;
}
.pmos-section-anchor:hover { color: var(--pmos-accent-strong); }

/* :target highlight for anchor-scroll (FR-90) */
:target {
  scroll-margin-top: 64px;
  background: linear-gradient(transparent 0, var(--pmos-accent-bg) 0) no-repeat;
  background-size: 100% 0;
  animation: pmos-target-flash 1.4s ease-out;
}
@keyframes pmos-target-flash {
  0%   { background-size: 100% 100%; }
  60%  { background-size: 100% 100%; }
  100% { background-size: 100% 0; }
}

.pmos-artifact-footer {
  margin-top: var(--pmos-sp-6);
  border-top: 1px solid var(--pmos-rule);
}
.pmos-artifact-footer-inner {
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: var(--pmos-sp-4) var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5ch;
}
/* Footer wordmark (W11) — the brand mark, smaller than the toolbar lockup. */
.pmos-wordmark--footer {
  font-size: var(--pmos-fs-sm);
  margin-right: var(--pmos-sp-2);
}

/* Attribution — toolbar (right-aligned, small) and footer (inline after source).
   W11: dropped the 0.65-opacity italic ("legal boilerplate") for a visible,
   non-italic brand link that brightens to the accent on hover. */
.pmos-attribution {
  font-size: var(--pmos-fs-xs);
  font-style: normal;
  color: var(--pmos-muted);
  text-decoration: none;
  letter-spacing: 0.01em;
  opacity: 0.85;
  transition: opacity 120ms ease, color 120ms ease;
}
.pmos-attribution:hover,
.pmos-attribution:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}
.pmos-attribution--toolbar {
  margin-left: var(--pmos-sp-3);
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-attribution-sep {
  color: var(--pmos-muted);
  opacity: 0.5;
}

/* Toast (Copy confirmation) */
.pmos-toast {
  position: fixed;
  bottom: var(--pmos-sp-4);
  right: var(--pmos-sp-4);
  background: var(--pmos-text);
  color: var(--pmos-bg);
  font-size: var(--pmos-fs-sm);
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-radius: var(--pmos-radius);
  box-shadow: var(--pmos-shadow-lg);
  z-index: 100;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
}
.pmos-toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- 9. Quickstart banner (W04, FR-26) ----------------------------- */
.pmos-quickstart-banner {
  margin: var(--pmos-sp-3) auto;
  max-width: 880px;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  font-size: var(--pmos-fs-sm);
}
.pmos-quickstart-banner strong { color: var(--pmos-accent-strong); }
.pmos-quickstart-banner .pmos-quickstart-dismiss {
  margin-left: auto;
}

/* ---- 10. file:// fallback banner ----------------------------------- */
.pmos-fallback-banner {
  margin: 0;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: #fff7ed;
  border-bottom: 1px solid var(--pmos-warning);
  color: #9a3412;
  font-size: var(--pmos-fs-sm);
}
@media (prefers-color-scheme: dark) {
  .pmos-fallback-banner {
    background: #422006;
    color: #fdba74;
  }
}
.pmos-fallback-banner code {
  background: rgba(0,0,0,0.06);
  color: inherit;
}

/* ---- 11. Legacy MD shim (FR-22) ----------------------------------- */
.pmos-legacy-md {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--pmos-font-mono);
  font-size: var(--pmos-fs-sm);
  line-height: 1.5;
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-4);
  margin: var(--pmos-sp-3);
  max-width: calc(880px - 2 * var(--pmos-sp-3));
  overflow-x: auto;
}
.pmos-legacy-md-banner {
  background: var(--pmos-warning);
  color: #fff;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  font-size: var(--pmos-fs-sm);
  font-weight: 500;
}

/* ---- 12. Focus ring + keyboard nav (NFR-03) ----------------------- */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
  border-radius: 2px;
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
}

/* Skip link (a11y) */
.pmos-skip-link {
  position: absolute;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
.pmos-skip-link:focus {
  position: fixed;
  left: var(--pmos-sp-3);
  top: var(--pmos-sp-3);
  width: auto;
  height: auto;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  padding: var(--pmos-sp-2) var(--pmos-sp-3);
  border: 2px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  z-index: 200;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* Print */
@media print {
  .pmos-artifact-toolbar,
  .pmos-toolbar,
  .pmos-sidebar,
  .pmos-quickstart-banner,
  .pmos-fallback-banner,
  .pmos-toast,
  .pmos-section-anchor,
  .pmos-attribution--toolbar { display: none !important; }
  .pmos-viewer-shell { display: block; }
  .pmos-main { height: auto; }
  body { background: white; color: black; }
}

/* --- comments.css --- */
/* comments.css — pmos-toolkit html-authoring substrate.
 * Inline-doc-comments overlay styles.
 * "Editorial Technical" refresh (story 260614-tcx): the thread renders as a warm-paper
 * popover anchored to the annotation — NOT a white fixed side-panel. Commented text
 * gets a warm tint + thin accent underline. Token-driven, so it inherits the dark-mode
 * palette automatically. The inline <script id="pmos-comments"> persistence contract and
 * the serve.js /save path are unchanged — this is a presentation change only.
 * Refs: FR-02, FR-03, FR-04, FR-08, FR-10, FR-11, §10, §11.
 */

/* Commented text — a shade darker than the paper canvas + an inset accent underline.
   Applied to the selected range when a comment is opened (the persisted model stores a
   quote_hash, not the raw quote, so spans are highlighted in-session, not rehydrated). */
.pmos-cmt {
  background: #efe6d4;
  box-shadow: inset 0 -1px 0 var(--pmos-accent);
  border-radius: 2px;
  padding: 0 1px;
  cursor: pointer;
}
@media (prefers-color-scheme: dark) {
  .pmos-cmt { background: #34291a; }
}

.pmos-floating-btn {
  position: absolute;
  width: 30px;
  height: 30px;
  z-index: 9999;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: var(--pmos-shadow);
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

/* The thread popover — warm paper, accent left-border, anchored near the annotation by
   the JS (position:absolute + computed top/left). NO white card, NO full-height fixed
   drawer: it overlays the article, so opening/closing never reflows the body. */
.pmos-side-panel {
  position: absolute;
  top: 0;
  left: 0;
  width: 340px;
  max-width: calc(100vw - 32px);
  max-height: 70vh;
  background: #f0e8d8;
  border: 1px solid var(--pmos-rule);
  border-left: 2px solid var(--pmos-accent);
  border-radius: 0 8px 8px 0;
  box-shadow: var(--pmos-shadow-lg);
  display: none;
  flex-direction: column;
  z-index: 9998;
  font-family: var(--pmos-font-sans);
  overflow: hidden;
}
.pmos-side-panel.open {
  display: flex;
}
@media (prefers-color-scheme: dark) {
  .pmos-side-panel { background: #241c12; }
}

.pmos-panel-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--pmos-rule);
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
  font-size: 11px;
  color: var(--pmos-accent);
  display: flex;
  align-items: center;
}

.pmos-thread-list {
  padding: 8px;
  overflow-y: auto;
  flex: 1 1 auto;
}

.pmos-thread-card {
  padding: 12px 16px;
  border-bottom: 1px solid var(--pmos-border-2);
  font-size: 14px;
  color: var(--pmos-text);
}

/* Long threads collapse to a one-line summary; click expands in place. */
.pmos-thread-card.collapsed .pmos-thread-messages {
  display: none;
}
.pmos-thread-card.expanded .pmos-thread-messages {
  display: block;
}
.pmos-thread-messages {
  display: block;
}

.pmos-thread-card.collapsed .pmos-message:first-child {
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.pmos-message {
  padding: 8px 0;
  font-size: 14px;
  line-height: 1.5;
  color: var(--pmos-text);
}
.pmos-message .pmos-author {
  font-weight: 700;
  font-size: 12.5px;
  color: var(--pmos-muted);
}

.pmos-thread-compose {
  padding: 12px;
  border-top: 1px solid var(--pmos-rule);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pmos-thread-compose textarea {
  border: 1px solid var(--pmos-border);
  border-radius: 4px;
  padding: 8px;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 64px;
}

.pmos-thread-compose button,
.pmos-compose-submit {
  align-self: flex-end;
  padding: 6px 14px;
  background: var(--pmos-accent);
  color: #fff;
  border: 1px solid var(--pmos-accent);
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.pmos-thread-compose button:hover,
.pmos-compose-submit:hover { background: var(--pmos-accent-strong); border-color: var(--pmos-accent-strong); }

.pmos-banner {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 12px 16px;
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: 6px;
  color: var(--pmos-accent-strong);
  z-index: 10000;
  cursor: pointer;
  font-family: var(--pmos-font-sans);
  font-size: 13px;
  box-shadow: var(--pmos-shadow);
}

.pmos-diagram-marker {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--pmos-accent);
  border-radius: 50%;
  pointer-events: auto;
  cursor: pointer;
}

/* Orphan banner — sticky-top warning inside the thread popover. */
[data-pmos-orphan-banner] {
  position: sticky;
  top: 0;
  padding: 8px 12px;
  background: var(--pmos-accent-bg);
  border-bottom: 1px solid var(--pmos-rule);
  color: var(--pmos-accent-strong);
  font-size: 12px;
  font-family: var(--pmos-font-sans);
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

[data-pmos-reattach-btn] {
  padding: 2px 8px;
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-rule);
  border-radius: 3px;
  color: var(--pmos-accent-strong);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
}
[data-pmos-reattach-btn]:hover {
  background: var(--pmos-surface-3);
}

[data-pmos-reattach-anchor] {
  width: 100%;
  padding: 4px 8px;
  border: 1px solid var(--pmos-border);
  border-radius: 3px;
  font-size: 12px;
  font-family: inherit;
  color: var(--pmos-text);
  background: var(--pmos-surface);
}

/* Diagram markers (16px circle overlaid on SVG anchors). */
