/* pmos-toolkit html-authoring substrate — vanilla CSS, ≤30 KB.
   FR-04, FR-90, NFR-02, NFR-03. No Tailwind. No @import. */

/* ---- 1. Design tokens ----------------------------------------------- */
:root {
  --pmos-bg:        #f5f5f7;
  --pmos-surface:   #ffffff;
  --pmos-surface-2: #fafafa;
  --pmos-surface-3: #f0f0f3;
  --pmos-border:    #d4d4d8;
  --pmos-border-2:  #e4e4e7;
  --pmos-text:      #18181b;
  --pmos-muted:     #71717a;
  --pmos-faint:     #a1a1aa;
  --pmos-accent:        #2563eb;
  --pmos-accent-strong: #1d4ed8;
  --pmos-accent-bg:     #dbeafe;
  --pmos-success:   #16a34a;
  --pmos-warning:   #d97706;
  --pmos-error:     #dc2626;

  --pmos-radius:    6px;
  --pmos-radius-lg: 12px;
  --pmos-shadow:    0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  --pmos-shadow-lg: 0 4px 14px rgba(0,0,0,.10), 0 12px 28px rgba(0,0,0,.08);

  --pmos-font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  --pmos-font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  --pmos-fs-xs: 11px;
  --pmos-fs-sm: 12px;
  --pmos-fs-base: 14px;
  --pmos-fs-md: 15px;
  --pmos-fs-lg: 17px;
  --pmos-fs-xl: 22px;
  --pmos-fs-2xl: 28px;

  --pmos-sp-1: 4px;
  --pmos-sp-2: 8px;
  --pmos-sp-3: 12px;
  --pmos-sp-4: 16px;
  --pmos-sp-5: 24px;
  --pmos-sp-6: 32px;

  --pmos-sidebar-w: 280px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --pmos-bg:        #0b0b0c;
    --pmos-surface:   #18181b;
    --pmos-surface-2: #1f1f23;
    --pmos-surface-3: #27272a;
    --pmos-border:    #2c2c30;
    --pmos-border-2:  #3a3a3f;
    --pmos-text:      #f4f4f5;
    --pmos-muted:     #a1a1aa;
    --pmos-faint:     #71717a;
    --pmos-accent:        #60a5fa;
    --pmos-accent-strong: #3b82f6;
    --pmos-accent-bg:     #1e3a8a;
  }
}

/* ---- 2. Reset + base ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--pmos-bg);
  color: var(--pmos-text);
  font-family: var(--pmos-font-sans);
  font-size: var(--pmos-fs-base);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: var(--pmos-accent);
  text-decoration: none;
}
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 2px; border-radius: 2px; }

img, svg { max-width: 100%; height: auto; }

/* ---- 3. Typography -------------------------------------------------- */
h1, h2, h3, h4, h5, h6 {
  margin: 0 0 var(--pmos-sp-3);
  font-weight: 600;
  line-height: 1.3;
  color: var(--pmos-text);
}
h1 { font-size: var(--pmos-fs-2xl); margin-top: 0; }
h2 {
  font-size: var(--pmos-fs-lg);
  margin: var(--pmos-sp-6) 0 var(--pmos-sp-3);
  padding-top: var(--pmos-sp-4);
  border-top: 1px solid var(--pmos-border-2);
  position: relative;
}
h3 { font-size: var(--pmos-fs-md); margin: var(--pmos-sp-5) 0 var(--pmos-sp-2); position: relative; }
h4 { font-size: var(--pmos-fs-base); }
h5, h6 { font-size: var(--pmos-fs-sm); color: var(--pmos-muted); }

p { margin: 0 0 var(--pmos-sp-3); }

pre, code, kbd, samp { font-family: var(--pmos-font-mono); font-size: 0.92em; }
code {
  background: var(--pmos-surface-3);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 0.88em;
}
pre {
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  overflow-x: auto;
  margin: var(--pmos-sp-3) 0;
  font-size: var(--pmos-fs-sm);
  line-height: 1.5;
}
pre code { background: transparent; padding: 0; }

blockquote {
  margin: var(--pmos-sp-3) 0;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-left: 3px solid var(--pmos-accent);
  background: var(--pmos-surface-2);
  color: var(--pmos-muted);
}

/* ---- 4. Tables ------------------------------------------------------ */
table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--pmos-sp-3) 0;
  font-size: var(--pmos-fs-sm);
}
caption { caption-side: top; text-align: left; font-style: italic; color: var(--pmos-muted); margin-bottom: var(--pmos-sp-2); }
thead th {
  background: var(--pmos-surface-2);
  font-weight: 600;
  text-align: left;
}
th, td {
  border: 1px solid var(--pmos-border-2);
  padding: var(--pmos-sp-2) var(--pmos-sp-3);
  vertical-align: top;
}
tbody tr:nth-child(even) td { background: var(--pmos-surface-2); }

/* ---- 5. Lists + DL -------------------------------------------------- */
ul, ol { margin: 0 0 var(--pmos-sp-3); padding-left: var(--pmos-sp-5); }
li { margin: var(--pmos-sp-1) 0; }
li > ul, li > ol { margin: var(--pmos-sp-1) 0; }

dl { margin: var(--pmos-sp-3) 0; }
dt {
  font-weight: 600;
  margin-top: var(--pmos-sp-3);
  color: var(--pmos-text);
}
dd { margin: var(--pmos-sp-1) 0 var(--pmos-sp-2) var(--pmos-sp-4); color: var(--pmos-muted); }

/* ---- 6. Figures ----------------------------------------------------- */
figure {
  margin: var(--pmos-sp-4) 0;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-3);
}
figure svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
figcaption {
  margin-top: var(--pmos-sp-2);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  font-style: italic;
  text-align: center;
}

/* ---- 7. Viewer chrome (index.html) --------------------------------- */
.pmos-viewer-shell {
  display: grid;
  grid-template-columns: var(--pmos-sidebar-w) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  background: var(--pmos-bg);
}

.pmos-toolbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-surface);
  border-bottom: 1px solid var(--pmos-border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pmos-toolbar h1 {
  margin: 0;
  font-size: var(--pmos-fs-md);
  font-weight: 600;
}
.pmos-toolbar .pmos-toolbar-meta {
  margin-left: auto;
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-muted);
}

.pmos-sidebar {
  background: var(--pmos-surface-2);
  border-right: 1px solid var(--pmos-border);
  overflow-y: auto;
  padding: var(--pmos-sp-3);
  height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
}
.pmos-sidebar-group {
  margin-bottom: var(--pmos-sp-4);
}
.pmos-sidebar-group-h {
  font-size: var(--pmos-fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--pmos-muted);
  margin: var(--pmos-sp-3) 0 var(--pmos-sp-2);
  padding: 0 var(--pmos-sp-2);
}
.pmos-sidebar-item {
  display: block;
  padding: var(--pmos-sp-1) var(--pmos-sp-3);
  border-radius: var(--pmos-radius);
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-text);
  text-decoration: none;
  margin: 1px 0;
}
.pmos-sidebar-item:hover {
  background: var(--pmos-surface-3);
  text-decoration: none;
}
.pmos-sidebar-item.is-active {
  background: var(--pmos-accent-bg);
  color: var(--pmos-accent-strong);
  font-weight: 500;
}
.pmos-sidebar-sub {
  display: block;
  padding: 2px var(--pmos-sp-3) 2px var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  text-decoration: none;
  border-radius: var(--pmos-radius);
}
.pmos-sidebar-sub:hover { color: var(--pmos-text); background: var(--pmos-surface-3); text-decoration: none; }
.pmos-sidebar-sub.is-active { color: var(--pmos-accent-strong); }

.pmos-main {
  background: var(--pmos-surface);
  border-left: 1px solid var(--pmos-border);
  height: calc(100vh - 48px);
  overflow: hidden;
}
.pmos-main iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.pmos-source-info {
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
}

/* ---- 8. Per-artifact body (template.html) -------------------------- */
.pmos-artifact-toolbar {
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  padding: var(--pmos-sp-3) var(--pmos-sp-5);
  background: var(--pmos-surface);
  border-bottom: 1px solid var(--pmos-border-2);
  position: sticky;
  top: 0;
  z-index: 5;
}
.pmos-artifact-title {
  margin: 0;
  font-size: var(--pmos-fs-lg);
  font-weight: 600;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.pmos-artifact-actions { display: flex; gap: var(--pmos-sp-2); }

.pmos-btn {
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: var(--pmos-fs-sm);
  padding: 4px 10px;
  border-radius: var(--pmos-radius);
  cursor: pointer;
  transition: background 0.12s;
}
.pmos-btn:hover { background: var(--pmos-surface-3); }
.pmos-btn:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 1px; }
.pmos-btn:active { background: var(--pmos-border-2); }
.pmos-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.pmos-artifact-body {
  max-width: 880px;
  margin: 0 auto;
  padding: var(--pmos-sp-5) var(--pmos-sp-5) var(--pmos-sp-6);
}
.pmos-artifact-body section {
  margin-bottom: var(--pmos-sp-5);
}

/* Section anchor-icon hover state — per-section Copy MD (FR-24) */
.pmos-artifact-body h2,
.pmos-artifact-body h3 {
  position: relative;
}
.pmos-section-anchor {
  position: absolute;
  left: -28px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 0;
  color: var(--pmos-faint);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  font-size: 13px;
  padding: 0;
}
.pmos-artifact-body h2:hover .pmos-section-anchor,
.pmos-artifact-body h3:hover .pmos-section-anchor,
.pmos-section-anchor:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  outline: none;
}
.pmos-section-anchor:hover { color: var(--pmos-accent-strong); }

/* :target highlight for anchor-scroll (FR-90) */
:target {
  scroll-margin-top: 64px;
  background: linear-gradient(transparent 0, var(--pmos-accent-bg) 0) no-repeat;
  background-size: 100% 0;
  animation: pmos-target-flash 1.4s ease-out;
}
@keyframes pmos-target-flash {
  0%   { background-size: 100% 100%; }
  60%  { background-size: 100% 100%; }
  100% { background-size: 100% 0; }
}

.pmos-artifact-footer {
  max-width: 880px;
  margin: var(--pmos-sp-5) auto 0;
  padding: var(--pmos-sp-3) var(--pmos-sp-5);
  border-top: 1px solid var(--pmos-border-2);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.5ch;
}

/* Subtle attribution — toolbar (right-aligned, small) and footer (inline after source) */
.pmos-attribution {
  font-size: var(--pmos-fs-xs);
  font-style: italic;
  color: var(--pmos-muted);
  text-decoration: none;
  letter-spacing: 0.01em;
  opacity: 0.65;
  transition: opacity 120ms ease;
}
.pmos-attribution:hover,
.pmos-attribution:focus-visible {
  opacity: 1;
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}
.pmos-attribution--toolbar {
  margin-left: var(--pmos-sp-3);
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-attribution-sep {
  color: var(--pmos-muted);
  opacity: 0.5;
}

/* Toast (Copy confirmation) */
.pmos-toast {
  position: fixed;
  bottom: var(--pmos-sp-4);
  right: var(--pmos-sp-4);
  background: var(--pmos-text);
  color: var(--pmos-bg);
  font-size: var(--pmos-fs-sm);
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-radius: var(--pmos-radius);
  box-shadow: var(--pmos-shadow-lg);
  z-index: 100;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
}
.pmos-toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- 9. Quickstart banner (W04, FR-26) ----------------------------- */
.pmos-quickstart-banner {
  margin: var(--pmos-sp-3) auto;
  max-width: 880px;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  font-size: var(--pmos-fs-sm);
}
.pmos-quickstart-banner strong { color: var(--pmos-accent-strong); }
.pmos-quickstart-banner .pmos-quickstart-dismiss {
  margin-left: auto;
}

/* ---- 10. file:// fallback banner ----------------------------------- */
.pmos-fallback-banner {
  margin: 0;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: #fff7ed;
  border-bottom: 1px solid var(--pmos-warning);
  color: #9a3412;
  font-size: var(--pmos-fs-sm);
}
@media (prefers-color-scheme: dark) {
  .pmos-fallback-banner {
    background: #422006;
    color: #fdba74;
  }
}
.pmos-fallback-banner code {
  background: rgba(0,0,0,0.06);
  color: inherit;
}

/* ---- 11. Legacy MD shim (FR-22) ----------------------------------- */
.pmos-legacy-md {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--pmos-font-mono);
  font-size: var(--pmos-fs-sm);
  line-height: 1.5;
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-4);
  margin: var(--pmos-sp-3);
  max-width: calc(880px - 2 * var(--pmos-sp-3));
  overflow-x: auto;
}
.pmos-legacy-md-banner {
  background: var(--pmos-warning);
  color: #fff;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  font-size: var(--pmos-fs-sm);
  font-weight: 500;
}

/* ---- 12. Focus ring + keyboard nav (NFR-03) ----------------------- */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
  border-radius: 2px;
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
}

/* Skip link (a11y) */
.pmos-skip-link {
  position: absolute;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
.pmos-skip-link:focus {
  position: fixed;
  left: var(--pmos-sp-3);
  top: var(--pmos-sp-3);
  width: auto;
  height: auto;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  padding: var(--pmos-sp-2) var(--pmos-sp-3);
  border: 2px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  z-index: 200;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* Print */
@media print {
  .pmos-artifact-toolbar,
  .pmos-toolbar,
  .pmos-sidebar,
  .pmos-quickstart-banner,
  .pmos-fallback-banner,
  .pmos-toast,
  .pmos-section-anchor,
  .pmos-attribution--toolbar { display: none !important; }
  .pmos-viewer-shell { display: block; }
  .pmos-main { height: auto; }
  body { background: white; color: black; }
}

/* --- comments.css --- */
/* comments.css — pmos-toolkit html-authoring substrate.
 * Inline-doc-comments overlay styles (T7).
 * Neutral zinc/grays + one warm warning red for the FSA banner.
 * Refs: FR-02, FR-03, FR-04, FR-10, FR-11, §10, §11.
 */

.pmos-floating-btn {
  position: absolute;
  width: 32px;
  height: 32px;
  z-index: 9999;
  background: #fff;
  border: 1px solid #d4d4d8;
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.pmos-side-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 360px;
  height: 100vh;
  background: #fafafa;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-left: 1px solid #e4e4e7;
  transform: translateX(100%);
  transition: transform 200ms ease;
  display: flex;
  flex-direction: column;
  z-index: 9998;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.pmos-side-panel.open {
  transform: translateX(0);
}

.pmos-panel-header {
  padding: 16px;
  border-bottom: 1px solid #e4e4e7;
  font-weight: 600;
  font-size: 14px;
  color: #18181b;
  display: flex;
  align-items: center;
}

.pmos-thread-list {
  padding: 8px;
  overflow-y: auto;
  flex: 1 1 auto;
}

.pmos-thread-card {
  padding: 12px;
  border-bottom: 1px solid #f4f4f5;
  font-size: 14px;
  color: #27272a;
}

.pmos-thread-card.collapsed .pmos-thread-messages {
  display: none;
}

.pmos-thread-card.expanded .pmos-thread-messages {
  display: block;
}

.pmos-thread-messages {
  display: block;
}

.pmos-message {
  padding: 8px 0;
  font-size: 14px;
  color: #3f3f46;
  line-height: 1.4;
}

.pmos-thread-compose {
  padding: 12px;
  border-top: 1px solid #e4e4e7;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.pmos-thread-compose textarea {
  border: 1px solid #d4d4d8;
  border-radius: 4px;
  padding: 8px;
  font-family: inherit;
  font-size: 14px;
  resize: vertical;
  min-height: 64px;
}

.pmos-thread-compose button,
.pmos-compose-submit {
  align-self: flex-end;
  padding: 6px 12px;
  background: #18181b;
  color: #fafafa;
  border: 1px solid #18181b;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}

.pmos-banner {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 12px 16px;
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 6px;
  color: #991b1b;
  z-index: 10000;
  cursor: pointer;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
  box-shadow: 0 4px 12px rgba(153, 27, 27, 0.08);
}

.pmos-diagram-marker {
  position: absolute;
  width: 12px;

<h2 id="overview">Overview</h2>
<p>Technical spec for authoring the <code>/magazine</code> skill in <strong>pmos-learnkit</strong> (Tier 3, target <code>claude-code</code>). The deliverable is a skill directory at <code>plugins/pmos-learnkit/skills/magazine/</code> conforming to <code>reference/skill-patterns.md §A–§F</code>. This spec turns the requirements + grill resolutions into concrete FRs and a file-level build plan; §A–§F flow in as the FR groups below so the resulting plan tasks are testable against the binary <code>skill-eval.md</code> rubric.</p>
</section>

<section id="skill-layout" data-pmos-section="skill-layout">
<h2 id="skill-layout">Skill directory layout</h2>
<pre><code>plugins/pmos-learnkit/skills/magazine/
  SKILL.md                       # entry point: frontmatter + phased body (≤500 lines target)
  reference/
    pipeline.md                  # Stage A + Stage B mechanics, per-item lifecycle, cursor rules
    config-schema.md             # feeds.yaml / tags.yaml / interest.yaml / state.json schemas
    issue-format.md              # issue HTML + library index contract; card structure; filters
    import.md                    # assisted import (CSV / OPML / image) flow
  scripts/
    fetch-feed.js                # discover: fetch one feed XML → windowed items JSON
    extract-article.js           # crawl: follow <link>, readability-extract → text (r.jina.ai fallback)
    transcribe.sh                # whisper detect + transcribe one enclosure (model + soft cap)
    magazine-state.js            # state.json ledger: lifecycle transitions, cursor, dedup
    render-issue.js              # items + state → self-contained issue HTML + library index.html
  tests/
    structure.test.sh            # structural assertions (frontmatter, sections, script presence)</code></pre>
<p>Layout satisfies §C (scripts under <code>scripts/</code>, docs under <code>reference/</code> one level deep, nothing loose in the root) and §E (bundled scripts with self-tests).</p>
</section>

<section id="fr-a-frontmatter" data-pmos-section="fr-a-frontmatter">
<h2 id="fr-a-frontmatter">FR-A — Frontmatter (§A, §F)</h2>
<ul>
<li><strong>FR-A1:</strong> <code>name: magazine</code> (lowercase, matches dir, ≤64).</li>
<li><strong>FR-A2:</strong> <code>description</code> ≤1024 chars — third-person what+when, ≥5 user-spoken triggers, no embedded step-list, assertive.</li>
<li><strong>FR-A3:</strong> <code>user-invocable: true</code>.</li>
<li><strong>FR-A4:</strong> <code>argument-hint</code> enumerates every parsed token: <code>[add &lt;url&gt; | remove &lt;name&gt; | list | add --from &lt;path&gt;] [--days N] [--feed &lt;name&gt;] [--max-per-feed N] [--format &lt;html|md|both&gt;] [--non-interactive] [--interactive]</code>.</li>
</ul>
</section>

<section id="fr-b-config" data-pmos-section="fr-b-config">
<h2 id="fr-b-config">FR-B — Config &amp; state model</h2>
<p>All under <code>~/.pmos/magazine/</code>. Schemas live in <code>reference/config-schema.md</code>.</p>
<ul>
<li><strong>FR-B1 <code>feeds.yaml</code>:</strong> list of <code>{name, url, type: newsletter|podcast, default_tags?, priority?, whisper_model?}</code>. The <code>whisper_model</code> per-feed override (grill resolution) defaults to <code>base</code>.</li>
<li><strong>FR-B2 <code>tags.yaml</code>:</strong> closed registry — <code>{tags: [...], seeded_at}</code>; LLM-seeded on first run, batch-approved; always includes <code>uncategorized</code>.</li>
<li><strong>FR-B3 <code>interest.yaml</code>:</strong> declared <code>{topics: [...], priority_feeds: [...]}</code> from a first-run interview; feeds Top-picks curation. Empty → curation falls back to item-intrinsic importance.</li>
<li><strong>FR-B4 <code>state.json</code>:</strong> <code>{cursors: {&lt;feed&gt;: &lt;iso-date&gt;}, items: {&lt;guid&gt;: {feed, link, title, published, status, failed_reason?, issue?}}}</code>. <code>status ∈ {discovered, downloaded, transcribed, summarized, rendered, failed}</code>. Managed exclusively through <code>magazine-state.js</code> (atomic temp-then-rename writes).</li>
<li><strong>FR-B5:</strong> <code>transcripts/&lt;guid&gt;.txt</code> and <code>crawl-cache/&lt;guid&gt;.txt</code> cache forever; audio deleted immediately after a successful transcript.</li>
</ul>
</section>

<section id="fr-c-stage-a" data-pmos-section="fr-c-stage-a">
<h2 id="fr-c-stage-a">FR-C — Stage A deterministic prep (scripts)</h2>
<ul>
<li><strong>FR-C1 <code>fetch-feed.js &lt;url&gt; [--since &lt;iso&gt;] [--max N]</code>:</strong> fetch feed XML (timeout, isolated — failure exits non-zero with a reason, never throws uncaught), parse RSS/Atom items, emit JSON array of <code>{guid, link, title, published, enclosure?, description}</code> windowed by <code>--since</code> / <code>--max</code>. Zero npm deps (built-in https + a minimal XML item walker). <code>--selftest</code> parses a bundled fixture feed.</li>
<li><strong>FR-C2 <code>extract-article.js &lt;url&gt;</code>:</strong> follow the link, readability-extract main text. Ladder: direct fetch + heuristic strip → fall back to <code>https://r.jina.ai/&lt;url&gt;</code> (the zero-dep reader endpoint learnkit already uses). Detect paywall/thin content → exit code signals <code>preview-only</code>. <code>--selftest</code> on a bundled HTML fixture.</li>
<li><strong>FR-C3 <code>transcribe.sh &lt;audio-url&gt; &lt;guid&gt; [--model base] [--cap-seconds N]</code>:</strong> detect <code>whisper</code>/<code>whisper.cpp</code> on PATH; if absent, exit code 3 (caller uses show-notes + install hint). Download audio to temp, transcribe, write <code>transcripts/&lt;guid&gt;.txt</code>, delete audio. Soft cap: warn + flag if elapsed &gt; cap, do not hard-kill. <code>--selftest</code> exercises the detect + no-whisper path.</li>
<li><strong>FR-C4:</strong> Stage A uses only deterministic tooling (no LLM), so it is headless/background-capable and resumable per-item from <code>state.json</code>.</li>
</ul>
</section>

<section id="fr-d-stage-b" data-pmos-section="fr-d-stage-b">
<h2 id="fr-d-stage-b">FR-D — Stage B in-session agent</h2>
<ul>
<li><strong>FR-D1 Summarize+tag:</strong> one subagent per ready item produces 3–5 bullets (soft ≤240 chars/bullet) + a read/listen link, sourced from <code>crawl-cache/</code> or <code>transcripts/</code>. Tags chosen only from <code>tags.yaml</code>; "no fit" flags a suggested addition rather than inventing a tag. Never fabricate from a thin source — emit a degraded card.</li>
<li><strong>FR-D2 Curate Top picks:</strong> a subagent ranks summarized items against <code>interest.yaml</code> (intrinsic-importance fallback).</li>
<li><strong>FR-D3 Render incrementally:</strong> after each item (or small batch) completes, re-run <code>render-issue.js</code> to re-emit the issue HTML + update <code>index.html</code>. Manual reload on <code>file://</code> (grill: no meta-refresh in v1).</li>
<li><strong>FR-D4 Degraded cards:</strong> failed items render with a reason flag; never silently dropped.</li>
<li><strong>FR-D5 Commit cursor:</strong> <code>magazine-state.js</code> advances each feed cursor only when the whole issue completes.</li>
</ul>
</section>

<section id="fr-e-output" data-pmos-section="fr-e-output">
<h2 id="fr-e-output">FR-E — Output contract (render-issue.js)</h2>
<ul>
<li><strong>FR-E1:</strong> Issue at <code>{docs_path}/magazine/{YYYY-MM-DD}_issue.html</code> — self-contained (inline CSS+JS), reusing the <code>_shared/html-authoring</code> chrome where applicable, plus a card-grid body and a client-side filter bar (feed multi-select + date range + tag chips). Works from <code>file://</code>.</li>
<li><strong>FR-E2:</strong> Each card: source badge, title, date, reading-time/episode-length, 3–5 bullets, tag chips, read/listen link, degraded-reason flag when applicable. A "Top picks" lane renders above the grid.</li>
<li><strong>FR-E3 Library <code>index.html</code>:</strong> lists every past issue with a client-side search box over a generated manifest of all items (title + tags + feed + date), per-issue dedup by GUID.</li>
<li><strong>FR-E4:</strong> v1 emits HTML only; <code>--format both</code> reserved for a later MD sidecar.</li>
</ul>
</section>

<section id="fr-f-commands" data-pmos-section="fr-f-commands">
<h2 id="fr-f-commands">FR-F — Command surface &amp; import</h2>
<ul>
<li><strong>FR-F1:</strong> Token-1 dispatch: <code>add</code> / <code>remove</code> / <code>list</code> are selectors only with the expected following arg shape (per <code>reference/import.md</code>); else the whole string is a build invocation.</li>
<li><strong>FR-F2 Assisted import (<code>add --from &lt;path&gt;</code>):</strong> accept CSV, OPML, or image (subscription-list screenshot). The agent extracts publication/show names, resolves candidate feed URLs (Substack → <code>&lt;name&gt;.substack.com/feed</code>; podcasts → search), validates each by fetching its XML, and batch-approves with the user before appending to <code>feeds.yaml</code>. Unresolved entries reported, never dropped. (OPML strict-spec import is the simplest case of the same flow.)</li>
<li><strong>FR-F3:</strong> v1 public feeds only; an auth-requiring feed is detected and reported honestly (→ v2).</li>
<li><strong>FR-F4 Dedup:</strong> v1 accepts duplicate GUIDs across feeds (grill resolution); no URL canonicalization.</li>
</ul>
</section>

<section id="fr-g-skill-conformance" data-pmos-section="fr-g-skill-conformance">
<h2 id="fr-g-skill-conformance">FR-G — Body &amp; conformance (§C, §D)</h2>
<ul>
<li><strong>FR-G1:</strong> SKILL.md body is imperative, explains non-obvious rationale, restrains all-caps emphasis.</li>
<li><strong>FR-G2:</strong> <code>## Platform Adaptation</code> section (no AskUserQuestion → numbered prompts; no subagents → sequential summarize; no <code>whisper</code> → show-notes + hint; no <code>r.jina.ai</code> reach → RSS-body fallback).</li>
<li><strong>FR-G3:</strong> learnings-load line reading <code>~/.pmos/learnings.md</code> entries under <code>## /magazine</code> at Phase 0.</li>
<li><strong>FR-G4:</strong> numbered <code>## Phase N: Capture Learnings</code> as the final phase.</li>
<li><strong>FR-G5:</strong> <code>## Track Progress</code> instruction (the skill has ≥3 phases).</li>
<li><strong>FR-G6:</strong> the canonical non-interactive block + <code>## Phase 0</code> pipeline-setup, mirroring the sibling learnkit skills (primer/learn-list).</li>
<li><strong>FR-G7:</strong> portable bundle paths (<code>${CLAUDE_PLUGIN_ROOT}</code> / <code>${CLAUDE_SKILL_DIR}</code>), never hard-coded absolute paths; reference files &gt;100 lines carry a ToC.</li>
</ul>
</section>

<section id="testing" data-pmos-section="testing">
<h2 id="testing">Testing strategy</h2>
<ul>
<li>Each bundled script ships a <code>--selftest</code> path exercised by <code>tests/structure.test.sh</code> (§E e-script-selftest, e-eval-driven).</li>
<li><code>tests/structure.test.sh</code> asserts: frontmatter present + <code>name: magazine</code>; <code>user-invocable: true</code>; <code>argument-hint</code> present; <code>## Platform Adaptation</code>, learnings-load line, numbered Capture-Learnings phase, <code>## Track Progress</code> all present; all four reference files exist; all five scripts exist and pass <code>--selftest</code>; no hard-coded absolute bundle paths.</li>

<section id="overview" data-pmos-section="overview">
<h2 id="overview">Overview</h2>
<p>Technical spec for authoring the <code>/magazine</code> skill in <strong>pmos-learnkit</strong> (Tier 3, target <code>claude-code</code>). The deliverable is a skill directory at <code>plugins/pmos-learnkit/skills/magazine/</code> conforming to <code>reference/skill-patterns.md §A–§F</code>. This spec turns the requirements + grill resolutions into concrete FRs and a file-level build plan; §A–§F flow in as the FR groups below so the resulting plan tasks are testable against the binary <code>skill-eval.md</code> rubric.</p>
</section>

<section id="skill-layout" data-pmos-section="skill-layout">
<h2 id="skill-layout">Skill directory layout</h2>
<pre><code>plugins/pmos-learnkit/skills/magazine/
  SKILL.md                       # entry point: frontmatter + phased body (≤500 lines target)
  reference/
    pipeline.md                  # Stage A + Stage B mechanics, per-item lifecycle, cursor rules
    config-schema.md             # feeds.yaml / tags.yaml / interest.yaml / state.json schemas
    issue-format.md              # issue HTML + library index contract; card structure; filters
    import.md                    # assisted import (CSV / OPML / image) flow
  scripts/
    fetch-feed.js                # discover: fetch one feed XML → windowed items JSON
    extract-article.js           # crawl: follow <link>, readability-extract → text (r.jina.ai fallback)
    transcribe.sh                # whisper detect + transcribe one enclosure (model + soft cap)
    magazine-state.js            # state.json ledger: lifecycle transitions, cursor, dedup
    render-issue.js              # items + state → self-contained issue HTML + library index.html
  tests/
    structure.test.sh            # structural assertions (frontmatter, sections, script presence)</code></pre>
<p>Layout satisfies §C (scripts under <code>scripts/</code>, docs under <code>reference/</code> one level deep, nothing loose in the root) and §E (bundled scripts with self-tests).</p>
</section>

<section id="fr-a-frontmatter" data-pmos-section="fr-a-frontmatter">
<h2 id="fr-a-frontmatter">FR-A — Frontmatter (§A, §F)</h2>
<ul>
<li><strong>FR-A1:</strong> <code>name: magazine</code> (lowercase, matches dir, ≤64).</li>
<li><strong>FR-A2:</strong> <code>description</code> ≤1024 chars — third-person what+when, ≥5 user-spoken triggers, no embedded step-list, assertive.</li>
<li><strong>FR-A3:</strong> <code>user-invocable: true</code>.</li>
<li><strong>FR-A4:</strong> <code>argument-hint</code> enumerates every parsed token: <code>[add &lt;url&gt; | remove &lt;name&gt; | list | add --from &lt;path&gt;] [--days N] [--feed &lt;name&gt;] [--max-per-feed N] [--format &lt;html|md|both&gt;] [--non-interactive] [--interactive]</code>.</li>
</ul>
</section>

<section id="fr-b-config" data-pmos-section="fr-b-config">
<h2 id="fr-b-config">FR-B — Config &amp; state model</h2>
<p>All under <code>~/.pmos/magazine/</code>. Schemas live in <code>reference/config-schema.md</code>.</p>
<ul>
<li><strong>FR-B1 <code>feeds.yaml</code>:</strong> list of <code>{name, url, type: newsletter|podcast, default_tags?, priority?, whisper_model?}</code>. The <code>whisper_model</code> per-feed override (grill resolution) defaults to <code>base</code>.</li>
<li><strong>FR-B2 <code>tags.yaml</code>:</strong> closed registry — <code>{tags: [...], seeded_at}</code>; LLM-seeded on first run, batch-approved; always includes <code>uncategorized</code>.</li>
<li><strong>FR-B3 <code>interest.yaml</code>:</strong> declared <code>{topics: [...], priority_feeds: [...]}</code> from a first-run interview; feeds Top-picks curation. Empty → curation falls back to item-intrinsic importance.</li>
<li><strong>FR-B4 <code>state.json</code>:</strong> <code>{cursors: {&lt;feed&gt;: &lt;iso-date&gt;}, items: {&lt;guid&gt;: {feed, link, title, published, status, failed_reason?, issue?}}}</code>. <code>status ∈ {discovered, downloaded, transcribed, summarized, rendered, failed}</code>. Managed exclusively through <code>magazine-state.js</code> (atomic temp-then-rename writes).</li>
<li><strong>FR-B5:</strong> <code>transcripts/&lt;guid&gt;.txt</code> and <code>crawl-cache/&lt;guid&gt;.txt</code> cache forever; audio deleted immediately after a successful transcript.</li>
</ul>
</section>

<section id="fr-c-stage-a" data-pmos-section="fr-c-stage-a">
<h2 id="fr-c-stage-a">FR-C — Stage A deterministic prep (scripts)</h2>
<ul>
<li><strong>FR-C1 <code>fetch-feed.js &lt;url&gt; [--since &lt;iso&gt;] [--max N]</code>:</strong> fetch feed XML (timeout, isolated — failure exits non-zero with a reason, never throws uncaught), parse RSS/Atom items, emit JSON array of <code>{guid, link, title, published, enclosure?, description}</code> windowed by <code>--since</code> / <code>--max</code>. Zero npm deps (built-in https + a minimal XML item walker). <code>--selftest</code> parses a bundled fixture feed.</li>
<li><strong>FR-C2 <code>extract-article.js &lt;url&gt;</code>:</strong> follow the link, readability-extract main text. Ladder: direct fetch + heuristic strip → fall back to <code>https://r.jina.ai/&lt;url&gt;</code> (the zero-dep reader endpoint learnkit already uses). Detect paywall/thin content → exit code signals <code>preview-only</code>. <code>--selftest</code> on a bundled HTML fixture.</li>
<li><strong>FR-C3 <code>transcribe.sh &lt;audio-url&gt; &lt;guid&gt; [--model base] [--cap-seconds N]</code>:</strong> detect <code>whisper</code>/<code>whisper.cpp</code> on PATH; if absent, exit code 3 (caller uses show-notes + install hint). Download audio to temp, transcribe, write <code>transcripts/&lt;guid&gt;.txt</code>, delete audio. Soft cap: warn + flag if elapsed &gt; cap, do not hard-kill. <code>--selftest</code> exercises the detect + no-whisper path.</li>
<li><strong>FR-C4:</strong> Stage A uses only deterministic tooling (no LLM), so it is headless/background-capable and resumable per-item from <code>state.json</code>.</li>
</ul>
</section>

<section id="fr-d-stage-b" data-pmos-section="fr-d-stage-b">
<h2 id="fr-d-stage-b">FR-D — Stage B in-session agent</h2>
<ul>
<li><strong>FR-D1 Summarize+tag:</strong> one subagent per ready item produces 3–5 bullets (soft ≤240 chars/bullet) + a read/listen link, sourced from <code>crawl-cache/</code> or <code>transcripts/</code>. Tags chosen only from <code>tags.yaml</code>; "no fit" flags a suggested addition rather than inventing a tag. Never fabricate from a thin source — emit a degraded card.</li>
<li><strong>FR-D2 Curate Top picks:</strong> a subagent ranks summarized items against <code>interest.yaml</code> (intrinsic-importance fallback).</li>
<li><strong>FR-D3 Render incrementally:</strong> after each item (or small batch) completes, re-run <code>render-issue.js</code> to re-emit the issue HTML + update <code>index.html</code>. Manual reload on <code>file://</code> (grill: no meta-refresh in v1).</li>
<li><strong>FR-D4 Degraded cards:</strong> failed items render with a reason flag; never silently dropped.</li>
<li><strong>FR-D5 Commit cursor:</strong> <code>magazine-state.js</code> advances each feed cursor only when the whole issue completes.</li>
</ul>
</section>

<section id="fr-e-output" data-pmos-section="fr-e-output">
<h2 id="fr-e-output">FR-E — Output contract (render-issue.js)</h2>
<ul>
<li><strong>FR-E1:</strong> Issue at <code>{docs_path}/magazine/{YYYY-MM-DD}_issue.html</code> — self-contained (inline CSS+JS), reusing the <code>_shared/html-authoring</code> chrome where applicable, plus a card-grid body and a client-side filter bar (feed multi-select + date range + tag chips). Works from <code>file://</code>.</li>
<li><strong>FR-E2:</strong> Each card: source badge, title, date, reading-time/episode-length, 3–5 bullets, tag chips, read/listen link, degraded-reason flag when applicable. A "Top picks" lane renders above the grid.</li>
<li><strong>FR-E3 Library <code>index.html</code>:</strong> lists every past issue with a client-side search box over a generated manifest of all items (title + tags + feed + date), per-issue dedup by GUID.</li>
<li><strong>FR-E4:</strong> v1 emits HTML only; <code>--format both</code> reserved for a later MD sidecar.</li>
</ul>
</section>

<section id="fr-f-commands" data-pmos-section="fr-f-commands">
<h2 id="fr-f-commands">FR-F — Command surface &amp; import</h2>
<ul>
<li><strong>FR-F1:</strong> Token-1 dispatch: <code>add</code> / <code>remove</code> / <code>list</code> are selectors only with the expected following arg shape (per <code>reference/import.md</code>); else the whole string is a build invocation.</li>
<li><strong>FR-F2 Assisted import (<code>add --from &lt;path&gt;</code>):</strong> accept CSV, OPML, or image (subscription-list screenshot). The agent extracts publication/show names, resolves candidate feed URLs (Substack → <code>&lt;name&gt;.substack.com/feed</code>; podcasts → search), validates each by fetching its XML, and batch-approves with the user before appending to <code>feeds.yaml</code>. Unresolved entries reported, never dropped. (OPML strict-spec import is the simplest case of the same flow.)</li>
<li><strong>FR-F3:</strong> v1 public feeds only; an auth-requiring feed is detected and reported honestly (→ v2).</li>
<li><strong>FR-F4 Dedup:</strong> v1 accepts duplicate GUIDs across feeds (grill resolution); no URL canonicalization.</li>
</ul>
</section>

<section id="fr-g-skill-conformance" data-pmos-section="fr-g-skill-conformance">
<h2 id="fr-g-skill-conformance">FR-G — Body &amp; conformance (§C, §D)</h2>
<ul>
<li><strong>FR-G1:</strong> SKILL.md body is imperative, explains non-obvious rationale, restrains all-caps emphasis.</li>
<li><strong>FR-G2:</strong> <code>## Platform Adaptation</code> section (no AskUserQuestion → numbered prompts; no subagents → sequential summarize; no <code>whisper</code> → show-notes + hint; no <code>r.jina.ai</code> reach → RSS-body fallback).</li>
<li><strong>FR-G3:</strong> learnings-load line reading <code>~/.pmos/learnings.md</code> entries under <code>## /magazine</code> at Phase 0.</li>
<li><strong>FR-G4:</strong> numbered <code>## Phase N: Capture Learnings</code> as the final phase.</li>
<li><strong>FR-G5:</strong> <code>## Track Progress</code> instruction (the skill has ≥3 phases).</li>
<li><strong>FR-G6:</strong> the canonical non-interactive block + <code>## Phase 0</code> pipeline-setup, mirroring the sibling learnkit skills (primer/learn-list).</li>
<li><strong>FR-G7:</strong> portable bundle paths (<code>${CLAUDE_PLUGIN_ROOT}</code> / <code>${CLAUDE_SKILL_DIR}</code>), never hard-coded absolute paths; reference files &gt;100 lines carry a ToC.</li>
</ul>
</section>

<section id="testing" data-pmos-section="testing">
<h2 id="testing">Testing strategy</h2>
<ul>
<li>Each bundled script ships a <code>--selftest</code> path exercised by <code>tests/structure.test.sh</code> (§E e-script-selftest, e-eval-driven).</li>
<li><code>tests/structure.test.sh</code> asserts: frontmatter present + <code>name: magazine</code>; <code>user-invocable: true</code>; <code>argument-hint</code> present; <code>## Platform Adaptation</code>, learnings-load line, numbered Capture-Learnings phase, <code>## Track Progress</code> all present; all four reference files exist; all five scripts exist and pass <code>--selftest</code>; no hard-coded absolute bundle paths.</li>
<li>Phase 6a runs <code>feature-sdlc/tools/skill-eval-check.sh --target claude-code &lt;skill_dir&gt;</code> (the 21 <code>[D]</code> checks) + the 20 <code>[J]</code> reviewer checks. Target: all pass.</li>
</ul>
</section>

<section id="release-prerequisites" data-pmos-section="release-prerequisites">
<h2 id="release-prerequisites">Release prerequisites</h2>
<p>Handoff contract for <code>/complete-dev</code> (Phase 8). These are <strong>NOT</strong> <code>/execute</code> tasks and MUST NOT appear in any plan wave (§G). <code>/complete-dev</code> is the sole writer; it computes concrete version numbers against <code>main</code> at merge time (bump <em>type</em> only is named here).</p>
<ul>
<li><strong>Version bump (minor):</strong> bump both <code>plugins/pmos-learnkit/.claude-plugin/plugin.json</code> and <code>plugins/pmos-learnkit/.codex-plugin/plugin.json</code> in sync (new skill = minor). No concrete numbers here.</li>
<li><strong>Changelog:</strong> prepend a user-facing entry to the canonical changelog file (resolved from repo conventions) describing the new <code>/magazine</code> digest skill.</li>
<li><strong>README:</strong> add a <code>/magazine</code> row to the pmos-learnkit skills listing.</li>
<li><strong>Learnings header bootstrap:</strong> append a <code>## /magazine</code> section header to <code>~/.pmos/learnings.md</code> if missing (idempotent).</li>
<li><strong>marketplace.json:</strong> no change (no per-plugin <code>version</code> field per repo invariant; skills auto-discovered from <code>./skills/</code>).</li>
</ul>
</section>
