schema_version: 1
story: 260613-h9r
epic: 260613-ev1
route: feature
plugin: pmos-toolkit
spec: ../../02_spec.html
# Single route:feature story for the html-authoring readability refresh. All edits are to the CANONICAL
# pmos-toolkit copy of _shared/html-authoring (style.css + template.html); pmos-learnkit gets the change
# via scripts/sync-shared.sh (T4), NOT by hand-editing its copy. Tasks T1–T2 edit one CSS file + one
# template → sequential (same files). T5 is this story's load-bearing live dogfood (AC8). NO release-
# prereq tasks (version/changelog/manifest) — those are /complete-dev's at Loop 3.
tasks:
  - id: T1
    title: "style.css — type scale + measure + tables + contrast (FR-1, FR-2, FR-4, FR-5)"
    ac: [AC1, AC2, AC4, AC5]
    deps: []
    parallel: false
    detail: >
      Edit plugins/pmos-toolkit/skills/_shared/html-authoring/assets/style.css.
      (1) §1 tokens: add `--pmos-fs-md2: 16px`.
      (2) §3 Typography: h2 → font-size var(--pmos-fs-lg) (17px), text-transform:none, letter-spacing
      -0.01em (keep the h2::before [NN] counter + border-top rule untouched); h3 → font-size
      var(--pmos-fs-md2) (16px), font-weight 600; leave h1 at fs-2xl (28px) — it now renders in body
      per T2. (3) Measure: `.pmos-artifact-body { max-width:720px }`; `html,body { font-size:
      var(--pmos-fs-md); line-height:1.6 }`; add `.pmos-artifact-body table, .pmos-artifact-body pre {
      max-width:820px; margin-inline:auto }`. (4) Tables: `table{font-size:13px}`; `th,td{border:0;
      border-bottom:1px solid var(--pmos-border-2)}`; `thead th{border-bottom:1px solid
      var(--pmos-border)}`; keep zebra `tbody tr:nth-child(even) td`. (5) Contrast: grep every
      `color: var(--pmos-faint)`; any TEXT context → `--pmos-muted`; leave borders/anchor-icon faint.
      TDD: write/extend a small assertion (regex over the built/inlined CSS, or a render+getComputedStyle
      check) that fails on the OLD values first, then make it pass.
    verify: >
      grep style.css shows fs-md2 token, h2 fs-lg + text-transform:none, h3 fs-md2 + 600, body fs-md +
      lh 1.6, .pmos-artifact-body max-width:720px, table/pre 820px breakout, table 13px + bottom-only
      borders; no `color: var(--pmos-faint)` remains on a text selector.

  - id: T2
    title: "template.html — emit a real body H1, demote toolbar title to breadcrumb (FR-3)"
    ac: [AC3]
    deps: [T1]
    parallel: false
    detail: >
      Edit plugins/pmos-toolkit/skills/_shared/html-authoring/template.html. Change the toolbar
      `<h1 class="pmos-artifact-title">{{title}}</h1>` to a non-heading element (`<p
      class="pmos-artifact-title">{{title}}</p>` — keep the class so its 12px-muted ellipsis styling is
      unchanged). Add `<h1 class="pmos-doc-title">{{title}}</h1>` as the FIRST child of `<main
      class="pmos-artifact-body">`, immediately before `{{content}}`. In style.css add `.pmos-doc-title
      { margin-bottom: var(--pmos-sp-5); }`. Do NOT touch render.js (it already replaceAll's {{title}}).
      Confirm `.pmos-artifact-title` non-h1 styling still reads as a breadcrumb (it may need the element
      selector loosened if it was `h1.pmos-artifact-title` — make it class-only).
    verify: >
      template.html has exactly one `<h1` (the body `.pmos-doc-title`), the toolbar title is a `<p>`;
      a fresh render of any content shows one body h1 at 28px and the toolbar title at 12px.

  - id: T3
    title: "Regression guard — sections.json, chrome-strip, counter, dark-mode (AC6)"
    ac: [AC6]
    deps: [T2]
    parallel: false
    detail: >
      Render a fixture doc (h1 + several h2/h3 + a table) through render.js. Assert:
      build_sections_json.js produces sections keyed off h2/h3 ONLY (the body h1 is excluded, counts
      unchanged from a no-h1 baseline); chrome-strip.js still strips toolbar/footer and leaves the body
      h1 + content; the `[NN]` counter sequence on h2 is unchanged (h1 carries no counter-increment);
      toggle prefers-color-scheme:dark and confirm the new sizes + table borders render with dark
      tokens. Add/extend a test under _shared/html-authoring/tests/ if a suitable harness exists.
    verify: >
      sections.json for the fixture excludes the body h1 and matches the pre-change h2/h3 set; chrome
      strip output retains body h1; counter sequence intact; dark-mode screenshot/computed-style sane.

  - id: T4
    title: "Propagate to consumers — sync-shared (FR-6, AC7)"
    ac: [AC7]
    deps: [T3]
    parallel: false
    detail: >
      Run `bash scripts/sync-shared.sh --from=pmos-toolkit` from repo root. Then
      `diff plugins/pmos-toolkit/skills/_shared/html-authoring/assets/style.css
      plugins/pmos-learnkit/skills/_shared/html-authoring/assets/style.css` and the same for
      template.html — both must be empty (byte-identical). sync-shared is intersection-only; both files
      pre-exist in both plugins so they are in the sync set (no bootstrap needed).
    verify: >
      diff of style.css and template.html between pmos-toolkit and pmos-learnkit copies is empty.

  - id: T5
    title: "Load-bearing live dogfood — re-render, screenshot, measure, judge (AC8)"
    ac: [AC8]
    deps: [T4]
    parallel: false
    detail: >
      Re-render a representative real pipeline doc through the refreshed substrate (e.g. re-emit this
      epic's 02_spec.html, or any feature-folder doc). Serve over http (python3 -m http.server) and load
      in Playwright at 1440x900. Capture before/after screenshots. Assert via getComputedStyle: body h1
      == 28px, every h2 == 17px with text-transform 'none', h3 == 16px weight 600, body == 15px,
      .pmos-artifact-body width ~720px, prose measure 60–75ch, table font 13px with no vertical borders,
      zero text nodes computing to #a8a29e. Independent blind judge reviews the after-screenshot against
      AC1–AC5 (is the hierarchy now skimmable? tables calmer? title visible?). Gaps → fix → re-run,
      cap 2 iterations, then accept-residuals-and-surface.
    verify: >
      after-render getComputedStyle assertions all pass; before/after screenshots attached; blind judge
      satisfied (or residuals accepted + surfaced loudly).
