<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>2048</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%23edc22e'/%3E%3Ctext x='16' y='22' font-family='Arial,sans-serif' font-size='12' font-weight='bold' text-anchor='middle' fill='%23fff'%3E2048%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --bg: #faf8ef; --board-bg: #bbada0; --cell-bg: #cdc1b4; --text-dark: #776e65;
    --text-light: #f9f6f2; --btn: #8f7a66; --btn-hover: #9f8b77;
    --overlay: rgba(238, 228, 218, 0.73);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text-dark);
    font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased; touch-action: manipulation;
  }
  #app { max-width: 520px; margin: 0 auto; padding: 16px; }
  header.top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  h1.brand { font-size: 56px; font-weight: 800; margin: 0; line-height: 1; color: var(--text-dark); }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: var(--board-bg); color: var(--text-light); border-radius: 6px;
    padding: 8px 14px; min-width: 78px; text-align: center; position: relative;
  }
  .score-box .label { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: .05em; color: #eee4da; }
  .score-box .val { font-size: 22px; font-weight: 800; }
  .sub { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 14px 0; flex-wrap: wrap; }
  .sub p { margin: 0; font-size: 14px; max-width: 280px; }
  .controls-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button.btn {
    background: var(--btn); color: var(--text-light); border: 0; border-radius: 6px;
    padding: 10px 14px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button.btn:hover { background: var(--btn-hover); }
  button.btn:disabled { opacity: .45; cursor: not-allowed; }
  button.btn:focus-visible, .size-opt:focus-visible, .dpad button:focus-visible { outline: 3px solid #f59563; outline-offset: 2px; }

  #board-wrap { position: relative; margin: 4px 0 16px; }
  #board {
    position: relative; background: var(--board-bg); border-radius: 8px; padding: var(--gap);
    display: grid; gap: var(--gap); --gap: 12px; touch-action: none; user-select: none;
  }
  .cell { background: var(--cell-bg); border-radius: 5px; width: 100%; aspect-ratio: 1 / 1; }
  #tiles { position: absolute; inset: var(--gap); pointer-events: none; }
  .tile {
    position: absolute; display: flex; align-items: center; justify-content: center;
    border-radius: 5px; font-weight: 800; background: #eee4da; color: var(--text-dark);
    transition: transform .12s ease, opacity .12s ease;
    will-change: transform; line-height: 1;
  }
  .tile.t2 { background: #eee4da; } .tile.t4 { background: #ede0c8; }
  .tile.t8 { background: #f2b179; color: var(--text-light); }
  .tile.t16 { background: #f59563; color: var(--text-light); }
  .tile.t32 { background: #f67c5f; color: var(--text-light); }
  .tile.t64 { background: #f65e3b; color: var(--text-light); }
  .tile.t128 { background: #edcf72; color: var(--text-light); }
  .tile.t256 { background: #edcc61; color: var(--text-light); }
  .tile.t512 { background: #edc850; color: var(--text-light); }
  .tile.t1024 { background: #edc53f; color: var(--text-light); }
  .tile.t2048 { background: #edc22e; color: var(--text-light); }
  .tile.big { background: #3c3a32; color: var(--text-light); }
  .tile.spawn { animation: pop .16s ease; }
  .tile.merged { animation: bump .14s ease; }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.14); } 100% { transform: scale(1); } }

  .dpad { display: grid; grid-template-columns: repeat(3, 56px); grid-template-rows: repeat(3, 56px); gap: 6px; justify-content: center; margin: 10px 0; }
  .dpad button { background: var(--btn); color: var(--text-light); border: 0; border-radius: 8px; font-size: 22px; cursor: pointer; }
  .dpad button:hover { background: var(--btn-hover); }
  .dpad .up { grid-column: 2; grid-row: 1; } .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .right { grid-column: 3; grid-row: 2; } .dpad .down { grid-column: 2; grid-row: 3; }
  .dpad .spacer { visibility: hidden; }

  .overlay {
    position: absolute; inset: 0; background: var(--overlay); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; z-index: 20; padding: 20px;
  }
  .overlay[hidden] { display: none; }
  .overlay h2 { font-size: 40px; margin: 0; color: var(--text-dark); }
  .overlay.win h2 { color: #edc22e; }
  .overlay p { margin: 0; font-size: 16px; }
  .start-card { background: #fff7; border-radius: 8px; padding: 18px; }
  .size-picker { display: flex; gap: 10px; justify-content: center; margin: 12px 0; }
  .size-opt {
    background: var(--cell-bg); color: var(--text-dark); border: 3px solid transparent;
    border-radius: 8px; padding: 12px 18px; font-size: 16px; font-weight: 800; cursor: pointer;
  }
  .size-opt[aria-pressed="true"] { border-color: var(--btn); background: #f2b179; color: var(--text-light); }
  footer.hint { font-size: 12px; color: #948b80; margin-top: 8px; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 40; }
  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none; } .tile.spawn, .tile.merged { animation: none; }
  }
  @media (max-width: 480px) {
    h1.brand { font-size: 42px; } #app { padding: 10px; }
    .dpad { grid-template-columns: repeat(3, 48px); grid-template-rows: repeat(3, 48px); }
  }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <h1 class="brand">2048</h1>
    <div class="scores">
      <div class="score-box"><div class="label">Score</div><div class="val" id="score" aria-live="polite">0</div></div>
      <div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
    </div>
  </header>

  <div class="sub">
    <p>Join the tiles, get to <b>2048!</b> Use arrows, WASD, swipe, or the D-pad.</p>
    <div class="controls-row">
      <button class="btn" id="btn-undo" title="Undo (U)" aria-label="Undo last move" disabled>↶ Undo</button>
      <button class="btn" id="btn-new" title="New game (N)" aria-label="New game">New game</button>
    </div>
  </div>

  <div id="board-wrap">
    <div id="board" role="grid" aria-label="2048 board">
      <div id="tiles"></div>
    </div>

    <div class="overlay start" id="overlay-start">
      <div class="start-card">
        <h2>2048</h2>
        <p>Choose a board size:</p>
        <div class="size-picker" role="group" aria-label="Board size">
          <button class="size-opt" data-size="4" aria-pressed="true">4×4</button>
          <button class="size-opt" data-size="5" aria-pressed="false">5×5</button>
          <button class="size-opt" data-size="6" aria-pressed="false">6×6</button>
        </div>
        <button class="btn" id="btn-play">Play</button>
      </div>
    </div>

    <div class="overlay win" id="overlay-win" hidden>
      <h2>You win!</h2>
      <p>You made a 2048 tile.</p>
      <div class="controls-row">
        <button class="btn" id="btn-keep">Keep playing</button>
        <button class="btn" id="btn-win-new">New game</button>
      </div>
    </div>

    <div class="overlay over" id="overlay-over" hidden>
      <h2>Game over</h2>
      <p id="over-score">No more moves.</p>
      <button class="btn" id="btn-over-new">New game</button>
    </div>
  </div>

  <div class="dpad" role="group" aria-label="Directional pad">
    <button class="up" data-dir="up" aria-label="Move up">▲</button>
    <button class="left" data-dir="left" aria-label="Move left">◀</button>
    <span class="spacer" aria-hidden="true"></span>
    <button class="right" data-dir="right" aria-label="Move right">▶</button>
    <button class="down" data-dir="down" aria-label="Move down">▼</button>
  </div>

  <footer class="hint">Moves: <span id="moves">0</span> · Arrows / WASD / swipe / D-pad to move · U undo · R or N new game · Esc closes overlays · No data is saved.</footer>
  <div class="sr-only" aria-live="assertive" id="announce"></div>
</div>
<canvas id="confetti" hidden></canvas>

<!-- ============================ ENGINE (pure logic, DOM-decoupled, timer-free) ============================ -->
<script>
(function (root) {
  'use strict';

  // Deterministic PRNG (mulberry32) → floats in [0, 1).
  function mulberry32(seed) {
    let a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function makeRng(seed) {
    if (seed === undefined || seed === null) seed = (Math.random() * 0xffffffff) >>> 0;
    return mulberry32(seed >>> 0);
  }

  // Collapse one line toward index 0: compress → merge each adjacent equal pair EXACTLY once → compress → pad.
  function collapseLine(line) {
    const nz = line.filter(function (v) { return v !== 0; });
    const out = []; let gained = 0, merges = 0;
    for (let i = 0; i < nz.length; i++) {
      if (i + 1 < nz.length && nz[i] === nz[i + 1]) {
        const m = nz[i] * 2; out.push(m); gained += m; merges += 1; i += 1; // skip the consumed partner
      } else {
        out.push(nz[i]);
      }
    }
    while (out.length < line.length) out.push(0);
    return { line: out, gained: gained, merges: merges };
  }

  // Index lists per direction, ordered so element 0 is the merge target (the edge tiles slide toward).
  function lineIndices(size, dir) {
    const lines = [];
    for (let i = 0; i < size; i++) {
      const idxs = [];
      for (let j = 0; j < size; j++) {
        let r, c;
        if (dir === 'left') { r = i; c = j; }
        else if (dir === 'right') { r = i; c = size - 1 - j; }
        else if (dir === 'up') { r = j; c = i; }
        else { r = size - 1 - j; c = i; } // down
        idxs.push(r * size + c);
      }
      lines.push(idxs);
    }
    return lines;
  }

  function emptyCells(state) {
    const out = [];
    for (let i = 0; i < state.board.length; i++) if (state.board[i] === 0) out.push(i);
    return out;
  }

  function spawnTile(state) {
    const empties = emptyCells(state);
    if (empties.length === 0) return null;
    const idx = empties[Math.floor(state.rng() * empties.length)];
    const value = state.rng() < 0.9 ? 2 : 4;
    state.board[idx] = value;
    return { index: idx, value: value };
  }

  function createState(opts) {
    opts = opts || {};
    const size = opts.size || 4;
    const state = {
      board: new Array(size * size).fill(0),
      size: size, score: 0, moves: 0, won: false, over: false,
      rng: makeRng(opts.seed),
    };
    spawnTile(state);
    spawnTile(state);
    return state;
  }

  function move(state, dir) {
    const size = state.size;
    const lines = lineIndices(size, dir);
    const next = state.board.slice();
    let moved = false, gained = 0, merges = 0;
    for (let l = 0; l < lines.length; l++) {
      const idxs = lines[l];
      const line = idxs.map(function (i) { return state.board[i]; });
      const res = collapseLine(line);
      gained += res.gained; merges += res.merges;
      for (let k = 0; k < idxs.length; k++) {
        if (next[idxs[k]] !== res.line[k]) moved = true;
        next[idxs[k]] = res.line[k];
      }
    }
    if (!moved) {
      return { board: state.board, score: state.score, moved: false, gained: 0, merges: 0, spawned: null };
    }
    state.board = next;
    state.score += gained;
    state.moves += 1;
    const spawned = spawnTile(state);
    if (hasWon(state)) state.won = true;
    if (!canMove(state)) state.over = true;
    return { board: state.board, score: state.score, moved: true, gained: gained, merges: merges, spawned: spawned };
  }

  function canMove(state) {
    const size = state.size, b = state.board;
    for (let i = 0; i < b.length; i++) if (b[i] === 0) return true;
    for (let r = 0; r < size; r++) {
      for (let c = 0; c < size; c++) {
        const v = b[r * size + c];
        if (c + 1 < size && b[r * size + c + 1] === v) return true;
        if (r + 1 < size && b[(r + 1) * size + c] === v) return true;
      }
    }
    return false;
  }

  function hasWon(state) {
    for (let i = 0; i < state.board.length; i++) if (state.board[i] >= 2048) return true;
    return false;
  }

  // One-deep undo snapshot helpers (the UI owns the single snapshot; the engine provides clone/restore).
  function snapshot(state) {
    return { board: state.board.slice(), score: state.score, moves: state.moves, won: state.won, over: state.over };
  }
  function restore(state, snap) {
    state.board = snap.board.slice(); state.score = snap.score; state.moves = snap.moves;
    state.won = snap.won; state.over = snap.over;
  }

  root.Game2048Engine = {
    makeRng: makeRng, collapseLine: collapseLine, lineIndices: lineIndices,
    createState: createState, move: move, spawnTile: spawnTile,
    canMove: canMove, hasWon: hasWon, emptyCells: emptyCells,
    snapshot: snapshot, restore: restore,
  };
})(typeof window !== 'undefined' ? window : (typeof globalThis !== 'undefined' ? globalThis : this));
</script>

<!-- ============================ UI / RENDER (DOM only; reads all rules from the engine) ============================ -->
<script>
if (typeof document !== 'undefined') (function () {
  'use strict';
  const E = window.Game2048Engine;
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const boardEl = document.getElementById('board');
  const tilesEl = document.getElementById('tiles');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const movesEl = document.getElementById('moves');
  const announceEl = document.getElementById('announce');
  const undoBtn = document.getElementById('btn-undo');
  const startOverlay = document.getElementById('overlay-start');
  const winOverlay = document.getElementById('overlay-win');
  const overOverlay = document.getElementById('overlay-over');
  const overScoreEl = document.getElementById('over-score');

  let state = null;
  let size = 4;
  let best = 0;            // session-only best (D9 — no persistence)
  let undoSnap = null;     // one-deep undo (D5)
  let canUndo = false;
  let dismissedWin = false; // "keep playing" was chosen
  let busy = false;

  function setSize(n) {
    size = n;
    document.querySelectorAll('.size-opt').forEach(function (b) {
      b.setAttribute('aria-pressed', String(Number(b.dataset.size) === n));
    });
  }

  // Compute tile geometry from the rendered board so absolutely-positioned tiles line up with the grid cells.
  function geom() {
    const styles = getComputedStyle(boardEl);
    const gap = parseFloat(styles.getPropertyValue('--gap')) || 12;
    const inner = boardEl.clientWidth - gap * 2;          // board padding == gap on each side
    const cell = (inner - gap * (size - 1)) / size;
    return { gap: gap, cell: cell };
  }

  function buildGrid() {
    // background cells
    boardEl.style.gridTemplateColumns = 'repeat(' + size + ', 1fr)';
    [].slice.call(boardEl.querySelectorAll('.cell')).forEach(function (c) { c.remove(); });
    for (let i = 0; i < size * size; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      boardEl.insertBefore(cell, tilesEl);
    }
  }

  function tileClass(v) {
    if (v > 2048) return 'big';
    return 't' + v;
  }
  function fontFor(cell, v) {
    const digits = String(v).length;
    let scale = 0.5;
    if (digits >= 4) scale = 0.34;
    else if (digits === 3) scale = 0.42;
    return Math.round(cell * scale) + 'px';
  }

  function render(opts) {
    opts = opts || {};
    const g = geom();
    tilesEl.innerHTML = '';
    for (let i = 0; i < state.board.length; i++) {
      const v = state.board[i];
      if (v === 0) continue;
      const r = Math.floor(i / size), c = i % size;
      const t = document.createElement('div');
      t.className = 'tile ' + tileClass(v);
      if (opts.spawnIdx === i) t.classList.add('spawn');
      if (opts.mergedIdx && opts.mergedIdx.indexOf(i) >= 0) t.classList.add('merged');
      t.style.width = g.cell + 'px';
      t.style.height = g.cell + 'px';
      t.style.fontSize = fontFor(g.cell, v);
      t.style.transform = 'translate(' + (c * (g.cell + g.gap)) + 'px,' + (r * (g.cell + g.gap)) + 'px)';
      t.textContent = v;
      t.setAttribute('role', 'gridcell');
      t.setAttribute('aria-label', v + ' at row ' + (r + 1) + ' column ' + (c + 1));
      tilesEl.appendChild(t);
    }
    scoreEl.textContent = state.score;
    bestEl.textContent = best;
    movesEl.textContent = state.moves;
    undoBtn.disabled = !canUndo;
  }

  function newGame() {
    state = E.createState({ size: size });
    undoSnap = null; canUndo = false; dismissedWin = false; busy = false;
    winOverlay.hidden = true; overOverlay.hidden = true; startOverlay.hidden = true;
    buildGrid();
    render();
    announce('New ' + size + ' by ' + size + ' game.');
  }

  function announce(msg) { announceEl.textContent = msg; }

  function doMove(dir) {
    if (busy || !state || startOverlay.hidden === false) return;
    if (!winOverlay.hidden || !overOverlay.hidden) return;
    const snap = E.snapshot(state);
    const before = state.score;
    const res = E.move(state, dir);
    if (!res.moved) return;                 // no-op: no spawn, no turn, undo unchanged
    undoSnap = snap; canUndo = true;
    if (state.score > best) best = state.score;
    // figure merged cells (cells whose value rose) for the bump animation — best-effort visual only
    const mergedIdx = [];
    if (res.gained > 0) {
      for (let i = 0; i < state.board.length; i++) {
        if (state.board[i] > (snap.board[i] || 0) && state.board[i] !== 0 && res.spawned && i !== res.spawned.index) mergedIdx.push(i);
      }
    }
    render({ spawnIdx: res.spawned ? res.spawned.index : -1, mergedIdx: mergedIdx });
    if (res.gained > 0) announce('Merged, +' + res.gained + '. Score ' + state.score + '.');
    if (state.won && !dismissedWin) { showWin(); return; }
    if (state.over) { showOver(); }
  }

  function undo() {
    if (!canUndo || !undoSnap) return;
    E.restore(state, undoSnap);
    canUndo = false; undoSnap = null;
    overOverlay.hidden = true;
    render();
    announce('Undo. Score ' + state.score + '.');
  }

  function showWin() {
    winOverlay.hidden = false;
    announce('You win! You reached 2048.');
    celebrate();
  }
  function keepPlaying() {
    dismissedWin = true; winOverlay.hidden = true;
    announce('Keep playing.');
  }
  function showOver() {
    overScoreEl.textContent = 'No more moves. Final score ' + state.score + '.';
    overOverlay.hidden = false;
    announce('Game over. Final score ' + state.score + '.');
  }

  // ---- confetti (win celebration; honors reduced motion) ----
  function celebrate() {
    if (reduceMotion) return;
    const canvas = document.getElementById('confetti');
    canvas.hidden = false;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const colors = ['#edc22e', '#f2b179', '#f67c5f', '#776e65', '#edcf72'];
    const N = 110;
    const parts = [];
    for (let i = 0; i < N; i++) {
      parts.push({
        x: Math.random() * canvas.width, y: -20 - Math.random() * canvas.height * 0.5,
        vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 4,
        sz: 5 + Math.random() * 7, color: colors[i % colors.length],
        rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 0.3,
      });
    }
    let frames = 0;
    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      parts.forEach(function (p) {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.fillRect(-p.sz / 2, -p.sz / 2, p.sz, p.sz); ctx.restore();
      });
      frames += 1;
      if (frames < 160) requestAnimationFrame(tick);
      else { canvas.hidden = true; ctx.clearRect(0, 0, canvas.width, canvas.height); }
    }
    requestAnimationFrame(tick);
  }

  // ---- input wiring ----
  const KEYMAP = {
    ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
    w: 'up', s: 'down', a: 'left', d: 'right', W: 'up', S: 'down', A: 'left', D: 'right',
  };
  document.addEventListener('keydown', function (e) {
    if (KEYMAP[e.key]) { e.preventDefault(); doMove(KEYMAP[e.key]); return; }
    if (e.key === 'u' || e.key === 'U') { e.preventDefault(); undo(); return; }
    if (e.key === 'n' || e.key === 'N' || e.key === 'r' || e.key === 'R') { e.preventDefault(); newGame(); return; }
    if (e.key === 'Escape') {
      if (!winOverlay.hidden) keepPlaying();
      else if (!overOverlay.hidden) overOverlay.hidden = true;
    }
  });

  // swipe (pointer): dominant axis past a threshold; preventDefault so the page doesn't scroll.
  let sx = 0, sy = 0, swiping = false;
  boardEl.addEventListener('pointerdown', function (e) { swiping = true; sx = e.clientX; sy = e.clientY; });
  boardEl.addEventListener('pointermove', function (e) { if (swiping) e.preventDefault(); }, { passive: false });
  boardEl.addEventListener('pointerup', function (e) {
    if (!swiping) return; swiping = false;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    const TH = 24;
    if (Math.abs(dx) < TH && Math.abs(dy) < TH) return;
    if (Math.abs(dx) > Math.abs(dy)) doMove(dx > 0 ? 'right' : 'left');
    else doMove(dy > 0 ? 'down' : 'up');
  });

  document.querySelectorAll('.dpad button[data-dir]').forEach(function (b) {
    b.addEventListener('click', function () { doMove(b.dataset.dir); });
  });
  document.querySelectorAll('.size-opt').forEach(function (b) {
    b.addEventListener('click', function () { setSize(Number(b.dataset.size)); });
  });
  document.getElementById('btn-play').addEventListener('click', newGame);
  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-keep').addEventListener('click', keepPlaying);
  document.getElementById('btn-win-new').addEventListener('click', newGame);
  document.getElementById('btn-over-new').addEventListener('click', newGame);

  window.addEventListener('resize', function () { if (state && startOverlay.hidden) render(); });

  // test seam — lets the Playwright e2e drive deterministic states without touching engine internals.
  window.__2048_TEST__ = {
    engine: E,
    getState: function () { return state; },
    setSize: setSize,
    newGame: newGame,
    move: doMove,
    undo: undo,
    // load a rigged board (row-major) of a given size; bypasses spawn so the e2e can reach win/over deterministically.
    loadBoard: function (board, sz, score) {
      size = sz || Math.round(Math.sqrt(board.length));
      setSize(size);
      buildGrid();
      state = E.createState({ size: size, seed: 1 });
      state.board = board.slice(); state.score = score || 0; state.moves = 0;
      state.won = E.hasWon(state); state.over = !E.canMove(state);
      undoSnap = null; canUndo = false; dismissedWin = false;
      startOverlay.hidden = true; winOverlay.hidden = true; overOverlay.hidden = true;
      render();
    },
    overlays: function () {
      return { start: !startOverlay.hidden, win: !winOverlay.hidden, over: !overOverlay.hidden };
    },
  };

  // initial state: show the start picker
  setSize(4);
  buildGrid();
})();
</script>
</body>
