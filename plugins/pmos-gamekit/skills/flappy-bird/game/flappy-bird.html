<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Flappy Bird</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234ec0ca'/%3E%3Ccircle cx='14' cy='16' r='7' fill='%23ffd43b' stroke='%23222' stroke-width='1.5'/%3E%3Ccircle cx='17' cy='14' r='1.6' fill='%23222'/%3E%3Cpath d='M20 16 l5 -2 v4 z' fill='%23ff8c42' stroke='%23222' stroke-width='1'/%3E%3C/svg%3E">
<style>
  :root{
    --sky:#4ec0ca; --sky2:#71d3dc; --ground:#ded895; --ground2:#c4ba6a;
    --pipe:#5bbf3a; --pipe-dk:#3f8f27; --bird:#ffd43b; --ink:#1e2330; --panel:#fffef7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:#15202b;
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:12px;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  #stage{
    position:relative; width:min(94vw, 56vh); aspect-ratio:360/640;
    border-radius:16px; overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.45); background:var(--sky);
  }
  canvas{position:absolute; inset:0; width:100%; height:100%; display:block}

  /* HUD */
  #hud{
    position:absolute; top:0; left:0; right:0; padding:10px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none; z-index:3; font-variant-numeric:tabular-nums;
  }
  #score{
    font-size:clamp(28px,7vw,46px); font-weight:800; color:#fff;
    text-shadow:0 2px 0 rgba(0,0,0,.35), 0 0 2px rgba(0,0,0,.5); line-height:1;
  }
  #best{
    text-align:right; font-weight:700; color:#fff; font-size:clamp(11px,2.6vw,14px);
    text-shadow:0 1px 2px rgba(0,0,0,.4); opacity:.95;
  }
  #best b{display:block; font-size:clamp(16px,4vw,22px)}

  /* pmos wordmark — subtle top-HUD attribution link; centered so it never
     overlaps score (left) or best (right); its own backing keeps it legible
     over every theme. pointer-events:auto re-enables the link inside the
     pointer-events:none HUD, and it sits above the canvas so a click on it
     is a navigation, never a flap. */
  #wordmark{
    position:absolute; left:50%; top:9px; transform:translateX(-50%);
    pointer-events:auto; z-index:4;
    font-size:clamp(9px,2.4vw,12px); font-weight:700; letter-spacing:.3px;
    color:#fff; text-decoration:none; opacity:.9; white-space:nowrap;
    background:rgba(20,32,43,.42); border:1px solid rgba(255,255,255,.18);
    padding:3px 9px; border-radius:999px; backdrop-filter:blur(2px);
  }
  #wordmark:hover{opacity:1}
  #wordmark:focus-visible{outline:3px solid #1d6fe0; outline-offset:2px}

  /* Overlays */
  .overlay{
    position:absolute; inset:0; z-index:4; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:22px; text-align:center;
    background:rgba(20,32,43,.46); backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex}
  .card{
    background:var(--panel); border-radius:18px; padding:20px 22px;
    box-shadow:0 12px 30px rgba(0,0,0,.3); max-width:88%;
    display:flex; flex-direction:column; gap:14px; align-items:center;
  }
  .card h1{margin:0; font-size:clamp(22px,6vw,30px); letter-spacing:.5px}
  .card h2{margin:0; font-size:clamp(18px,5vw,24px)}
  .card p{margin:0; font-size:clamp(13px,3.4vw,15px); color:#445; line-height:1.5}

  fieldset{border:0; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; width:100%}
  legend{font-weight:700; font-size:14px; margin-bottom:4px}
  .diffs{display:flex; gap:8px; justify-content:center}
  .diff{
    flex:1; cursor:pointer; border:2px solid #cfd3c4; border-radius:12px;
    background:#fff; padding:10px 6px; font:inherit; font-weight:700;
    display:flex; flex-direction:column; gap:3px; align-items:center; color:var(--ink);
  }
  .diff .sub{font-size:11px; font-weight:600; color:#778}
  .diff[aria-pressed="true"]{border-color:var(--pipe-dk); background:#eaf7e3; box-shadow:0 0 0 2px rgba(63,143,39,.25)}
  .diff:focus-visible, .btn:focus-visible, .diff:focus, .btn:focus{outline:3px solid #1d6fe0; outline-offset:2px}
  .btn{
    cursor:pointer; border:0; border-radius:12px; padding:12px 22px;
    font:inherit; font-weight:800; font-size:16px; color:#fff;
    background:var(--pipe-dk); box-shadow:0 4px 0 #2f6c1d;
  }
  .btn:active{transform:translateY(2px); box-shadow:0 2px 0 #2f6c1d}
  .hint{font-size:12px; color:#667; display:flex; align-items:center; gap:6px}
  .kbd{
    font:inherit; font-size:11px; font-weight:700; background:#eef0e6; color:#445;
    border:1px solid #cfd3c4; border-bottom-width:2px; border-radius:5px; padding:1px 6px;
  }
  .final{display:flex; gap:18px; justify-content:center}
  .final div{display:flex; flex-direction:column; gap:2px}
  .final .lbl{font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#889; font-weight:700}
  .final .val{font-size:clamp(24px,7vw,34px); font-weight:800; line-height:1}
  .nb{
    color:var(--pipe-dk); font-weight:800; font-size:14px; display:flex; align-items:center; gap:6px;
  }
  .controls{font-size:11px; color:#778; line-height:1.7}

  /* New-best celebratory flourish */
  #flourish{position:absolute; inset:0; z-index:5; pointer-events:none; overflow:hidden; display:none}
  #flourish.show{display:block}
  .spark{
    position:absolute; top:-14px; width:9px; height:14px; border-radius:2px; opacity:.95;
    animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(118%) rotate(540deg); opacity:.4 } }

  @media (prefers-reduced-motion: reduce){
    .btn:active{transform:none}
    #flourish{display:none !important}
    .spark{animation:none !important}
  }
  .sr{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap}
</style>
</head>
<body>
  <main id="stage" aria-label="Flappy Bird game stage">
    <canvas id="cv" width="360" height="640" role="img" aria-label="Flappy Bird play area"></canvas>

    <div id="hud" aria-hidden="false">
      <div id="score" aria-live="off">0</div>
      <a id="wordmark" href="https://github.com/maneesh-dhabria/pmos-skills" target="_blank" rel="noopener">pmos · flappy-bird</a>
      <div id="best">BEST<b id="bestVal">0</b></div>
    </div>

    <!-- Start / new-game overlay -->
    <div class="overlay show" id="startOv" role="dialog" aria-modal="true" aria-label="New game">
      <div class="card">
        <h1>🐤 Flappy Bird</h1>
        <fieldset>
          <legend id="diffLegend">Difficulty</legend>
          <div class="diffs" role="group" aria-labelledby="diffLegend">
            <button type="button" class="diff" data-diff="easy"   aria-pressed="false">Easy<span class="sub">wide · slow</span></button>
            <button type="button" class="diff" data-diff="normal" aria-pressed="true">Normal<span class="sub">balanced</span></button>
            <button type="button" class="diff" data-diff="hard"   aria-pressed="false">Hard<span class="sub">narrow · fast</span></button>
          </div>
        </fieldset>
        <button type="button" class="btn" id="playBtn">Play ▶</button>
        <p class="hint"><span class="kbd">Space</span> / <span class="kbd">↑</span> / tap to flap · <span class="kbd">P</span> pause · <span class="kbd">R</span> restart</p>
      </div>
    </div>

    <!-- Game-over overlay -->
    <div class="overlay" id="overOv" role="dialog" aria-modal="true" aria-label="Game over">
      <div class="card">
        <h2>Game Over</h2>
        <div class="nb" id="newBest" hidden>★ New best!</div>
        <div class="final">
          <div><span class="lbl">Score</span><span class="val" id="finalScore">0</span></div>
          <div><span class="lbl">Best</span><span class="val" id="finalBest">0</span></div>
        </div>
        <button type="button" class="btn" id="againBtn">Play again ↻</button>
        <p class="controls"><span class="kbd">R</span>/<span class="kbd">N</span> new game · <span class="kbd">Space</span> flap</p>
      </div>
    </div>

    <!-- Pause overlay -->
    <div class="overlay" id="pauseOv" role="dialog" aria-modal="true" aria-label="Paused">
      <div class="card">
        <h2>Paused</h2>
        <p>Press <span class="kbd">P</span> to resume.</p>
        <button type="button" class="btn" id="resumeBtn">Resume</button>
      </div>
    </div>

    <div id="flourish" aria-hidden="true"></div>
    <div class="sr" id="live" aria-live="polite"></div>
  </main>

<script>
/* ============================================================================
 * FlappyEngine — pure logic, DOM-decoupled, timer-free, seedable.
 * Stepped by an explicit dt (seconds) so simulation is deterministic and the
 * headless selftest can pin physics + transitions. No Date / performance.now.
 * Exposed on a global so tests/run.mjs can vm-extract and exercise it.
 * ==========================================================================*/
(function (root) {
  'use strict';

  var PIPE_W   = 60;    // pipe width (logical px)
  var BIRD_R   = 14;    // bird radius
  var GROUND_H = 96;    // ground strip height
  var TOP_MARGIN = 56;  // safe margin from the top for a gap
  var BOT_MARGIN = 24;  // safe margin above the ground for a gap

  // Difficulty bands: gap height DECREASES and scroll speed INCREASES easy->hard.
  var DIFFS = {
    easy:   { pipeGap: 200, pipeSpeed: 118, pipeSpacing: 250, gravity: 1150, flapV: -372 },
    normal: { pipeGap: 162, pipeSpeed: 150, pipeSpacing: 224, gravity: 1300, flapV: -402 },
    hard:   { pipeGap: 132, pipeSpeed: 188, pipeSpacing: 200, gravity: 1480, flapV: -432 }
  };

  function difficultyParams(level) {
    var d = DIFFS[level] || DIFFS.normal;
    // return a copy so callers cannot mutate the shared band table
    return { pipeGap: d.pipeGap, pipeSpeed: d.pipeSpeed, pipeSpacing: d.pipeSpacing,
             gravity: d.gravity, flapV: d.flapV };
  }

  // mulberry32 — deterministic PRNG; null/undefined seed -> a random 32-bit seed.
  function makeRng(seed) {
    var s;
    if (seed === null || seed === undefined) {
      s = (Math.floor(Math.random() * 0xffffffff)) >>> 0;
    } else {
      s = (seed >>> 0);
    }
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      var t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function gapBounds(state) {
    // valid range for the TOP of a gap so the whole gap fits above the ground
    var lo = TOP_MARGIN;
    var hi = state.groundY - BOT_MARGIN - state.params.pipeGap;
    if (hi < lo) hi = lo;
    return { lo: lo, hi: hi };
  }

  function spawnPipe(state, rng) {
    var r = rng || state.rng;
    var b = gapBounds(state);
    var gapY = b.lo + (b.hi - b.lo) * r();
    state.pipes.push({ x: state.width, gapY: gapY, gapH: state.params.pipeGap, scored: false });
    return state;
  }

  function createState(opts) {
    opts = opts || {};
    var width  = opts.width  || 360;
    var height = opts.height || 640;
    var difficulty = opts.difficulty || 'normal';
    var params = difficultyParams(difficulty);
    var groundY = height - GROUND_H;
    var state = {
      width: width, height: height, groundY: groundY,
      difficulty: difficulty, params: params,
      bird: { x: Math.round(width / 3), y: Math.round(height / 2), vy: 0, r: BIRD_R },
      pipes: [],
      score: 0, best: opts.best || 0,
      status: 'ready',
      seed: (opts.seed === undefined ? null : opts.seed),
      rng: makeRng(opts.seed === undefined ? null : opts.seed)
    };
    // queue the first pipe off the right edge; it hovers until the first flap.
    spawnPipe(state, state.rng);
    return state;
  }

  function flap(state) {
    if (state.status === 'over') return state;
    if (state.status === 'ready') state.status = 'playing';
    state.bird.vy = state.params.flapV;
    return state;
  }

  function circleRect(cx, cy, r, rx, ry, rw, rh) {
    var nx = cx < rx ? rx : (cx > rx + rw ? rx + rw : cx);
    var ny = cy < ry ? ry : (cy > ry + rh ? ry + rh : cy);
    var dx = cx - nx, dy = cy - ny;
    return (dx * dx + dy * dy) < (r * r);
  }

  function collides(state) {
    var b = state.bird;
    if (b.y + b.r >= state.groundY) return true;     // ground is lethal
    for (var i = 0; i < state.pipes.length; i++) {
      var p = state.pipes[i];
      // upper pipe rect: [0 .. gapY]; lower pipe rect: [gapY+gapH .. groundY]
      if (circleRect(b.x, b.y, b.r, p.x, 0, PIPE_W, p.gapY)) return true;
      var lowY = p.gapY + p.gapH;
      if (circleRect(b.x, b.y, b.r, p.x, lowY, PIPE_W, state.groundY - lowY)) return true;
    }
    return false;
  }

  function step(state, dt) {
    if (state.status !== 'playing') return state;   // 'ready' hovers, 'over' frozen
    var p = state.params, b = state.bird;

    // integrate gravity into velocity, then velocity into position
    b.vy += p.gravity * dt;
    b.y  += b.vy * dt;

    // ceiling clamp — the bird cannot rise above its radius; NOT lethal
    if (b.y < b.r) { b.y = b.r; if (b.vy < 0) b.vy = 0; }

    // scroll pipes left
    for (var i = 0; i < state.pipes.length; i++) state.pipes[i].x -= p.pipeSpeed * dt;

    // cull fully off-screen pipes
    while (state.pipes.length && (state.pipes[0].x + PIPE_W) < 0) state.pipes.shift();

    // spawn a new pipe once the last one has moved past the spacing threshold
    var last = state.pipes[state.pipes.length - 1];
    if (!last || last.x <= (state.width - p.pipeSpacing)) spawnPipe(state, state.rng);

    // scoring — exactly once per pipe, when its far edge passes the bird's x
    for (var j = 0; j < state.pipes.length; j++) {
      var pp = state.pipes[j];
      if (!pp.scored && (pp.x + PIPE_W) < b.x) {
        pp.scored = true;
        state.score += 1;
        if (state.score > state.best) state.best = state.score;
      }
    }

    // collision ends the run
    if (collides(state)) state.status = 'over';
    return state;
  }

  /* ===== Visual variety: pure registries + seedable picker (Inv-1) ========
   * Data-only theme/palette/bird registries and a pure pickVariants() on the
   * engine surface. The motif & bird DRAW functions live in the render layer;
   * only the metadata they read lives here, so the picker stays DOM-free,
   * seedable, and selftested. See 02_design.html #data-model / #picker.
   * ====================================================================== */

  var DEFAULT_PIPE = { light: '#5bbf3a', dark: '#3f8f27', shine: 'rgba(255,255,255,.22)' };

  // index 0 = sky (the default ready-preview); order is stable (selftests assert by id).
  var THEMES = [
    { id: 'sky',        grad: ['#a9e7ef', '#d8f6fa'], ground: { fill: '#ded895', top: '#c4ba6a' },
      pipe: null,                                                                lum: 'light', motif: 'clouds'   },
    { id: 'ocean',      grad: ['#9fdcea', '#cdeef5'], ground: { fill: '#2a6f7a', top: '#1d5560' },
      pipe: null,                                                                lum: 'mid',   motif: 'bubbles'  },
    { id: 'space',      grad: ['#0b0f2a', '#161b3d'], ground: { fill: '#0e1230', top: '#3a3f66', platform: true },
      pipe: { light: '#9aa7c7', dark: '#5b6690', shine: 'rgba(255,255,255,.30)' }, lum: 'dark',  motif: 'stars'    },
    { id: 'sunset',     grad: ['#ffd8a8', '#ffb3a0'], ground: { fill: '#7a4a52', top: '#5a343c' },
      pipe: { light: '#7b3f7a', dark: '#562a55', shine: 'rgba(255,255,255,.22)' }, lum: 'mid',   motif: 'sunhills' },
    { id: 'night-city', grad: ['#141a2e', '#28324f'], ground: { fill: '#10131f', top: '#2c3550' },
      pipe: { light: '#b0bcd6', dark: '#6b7595', shine: 'rgba(255,255,255,.26)' }, lum: 'dark',  motif: 'skyline'  },
    { id: 'forest',     grad: ['#cfe8b0', '#a9d98a'], ground: { fill: '#4a6b2a', top: '#37511f' },
      pipe: { light: '#6b4f2a', dark: '#4a371c', shine: 'rgba(255,255,255,.18)' }, lum: 'mid',   motif: 'hills'    },
    { id: 'cave',       grad: ['#1a1414', '#2c2220'], ground: { fill: '#171211', top: '#3a2c28' },
      pipe: { light: '#c9b39b', dark: '#8a7763', shine: 'rgba(255,255,255,.22)' }, lum: 'dark',  motif: 'stalac'   }
  ];

  // 5 bird colors {body, accent (belly/cheek), beak}. Shape & color are chosen independently.
  var PALETTE = [
    { id: 'sunflower', body: '#ffd43b', accent: '#fff3bf', beak: '#ff8c42', lum: 'light' },
    { id: 'coral',     body: '#ff6b6b', accent: '#ffd8d8', beak: '#d6336c', lum: 'mid'   },
    { id: 'sky-blue',  body: '#4dabf7', accent: '#d0ebff', beak: '#1971c2', lum: 'mid'   },
    { id: 'mint',      body: '#51cf66', accent: '#d3f9d8', beak: '#2f9e44', lum: 'mid'   },
    { id: 'grape',     body: '#cc5de8', accent: '#f3d9fa', beak: '#9c36b5', lum: 'mid'   }
  ];

  var BIRD_SHAPES = ['round', 'sparrow', 'duck', 'owl'];

  // Rec.601 luma in [0,1] on gamma-encoded channels — a cheap, deterministic
  // brightness proxy for the contrast gate. Hue is carried by the art; the
  // playability gate only needs the bird & pipes to differ in BRIGHTNESS from
  // the sky band where they are read.
  function hexLuma(hex) {
    var h = hex.charAt(0) === '#' ? hex.slice(1) : hex;
    var r = parseInt(h.slice(0, 2), 16);
    var g = parseInt(h.slice(2, 4), 16);
    var b = parseInt(h.slice(4, 6), 16);
    return (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  }

  var CONTRAST_THRESHOLD = 0.20;   // min luma delta the bird & pipes must clear vs the sky band

  function themeBgLuma(i)   { return hexLuma(THEMES[i].grad[0]); }
  function themePipeLuma(i) { var t = THEMES[i].pipe; return hexLuma(t ? t.light : DEFAULT_PIPE.light); }
  function colorLuma(i)     { return hexLuma(PALETTE[i].body); }

  // palette indices whose body luma clears the threshold against theme[bg]'s sky band.
  function contrastSafeColors(bg) {
    var ref = themeBgLuma(bg), out = [];
    for (var i = 0; i < PALETTE.length; i++) {
      if (Math.abs(ref - colorLuma(i)) >= CONTRAST_THRESHOLD) out.push(i);
    }
    return out;
  }

  // pure + seedable -> {bg, bird, color} integer indices.
  //  bg    != prevBg (D3 — never an immediate background repeat)
  //  color  = a contrast-safe palette index for bg (D2)
  //  bird   = any of the 4 shapes (free)
  function pickVariants(seed, prevBg) {
    var rng = makeRng(seed);
    var n = THEMES.length, bg;
    if (prevBg === null || prevBg === undefined) {
      bg = Math.floor(rng() * n) % n;
    } else {
      var k = Math.floor(rng() * (n - 1));   // choose among the other n-1 themes
      bg = (k < prevBg) ? k : k + 1;          // skip prevBg
    }
    var safe = contrastSafeColors(bg);
    var color = safe[Math.floor(rng() * safe.length) % safe.length];
    var bird = Math.floor(rng() * BIRD_SHAPES.length) % BIRD_SHAPES.length;
    return { bg: bg, bird: bird, color: color };
  }

  root.FlappyEngine = {
    createState: createState,
    difficultyParams: difficultyParams,
    flap: flap,
    step: step,
    spawnPipe: spawnPipe,
    collides: collides,
    makeRng: makeRng,
    THEMES: THEMES,
    PALETTE: PALETTE,
    BIRD_SHAPES: BIRD_SHAPES,
    DEFAULT_PIPE: DEFAULT_PIPE,
    pickVariants: pickVariants,
    contrast: {
      THRESHOLD: CONTRAST_THRESHOLD,
      luma: hexLuma,
      themeBg: themeBgLuma,
      themePipe: themePipeLuma,
      color: colorLuma,
      safeColors: contrastSafeColors
    },
    constants: { PIPE_W: PIPE_W, BIRD_R: BIRD_R, GROUND_H: GROUND_H, CONTRAST_THRESHOLD: CONTRAST_THRESHOLD }
  };
})(typeof window !== 'undefined' ? window : globalThis);


/* ============================================================================
 * Render / UI layer — consumes FlappyEngine. Guarded so the headless vm
 * (no document) only loads the engine above.
 * ==========================================================================*/
if (typeof document !== 'undefined') (function () {
  'use strict';
  var E = window.FlappyEngine;
  var W = 360, H = 640;
  var PIPE_W = E.constants.PIPE_W;

  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var scoreEl = document.getElementById('score');
  var bestEl  = document.getElementById('bestVal');
  var startOv = document.getElementById('startOv');
  var overOv  = document.getElementById('overOv');
  var pauseOv = document.getElementById('pauseOv');
  var flourish = document.getElementById('flourish');
  var live = document.getElementById('live');

  var state = null;
  var difficulty = 'normal';
  var sessionBest = 0;
  var paused = false;
  var running = false;     // rAF loop armed?
  var lastT = 0;
  var acc = 0;
  var STEP = 1 / 120;      // fixed-timestep (seconds)
  var birdFlap = 0;        // wing-flap animation phase (render only)
  var bobT = 0;            // ready-state hover bob (render only)
  var motifT = 0;          // slow render clock for subtle parallax motifs (render only)

  // active per-game visuals (set by pickVariants at newGame); sky preview is the default.
  var THEMES = E.THEMES, PALETTE = E.PALETTE, BIRD_SHAPES = E.BIRD_SHAPES, DEFAULT_PIPE = E.DEFAULT_PIPE;
  var activeBg = 0, activeBird = 0, activeColor = E.contrast.safeColors(0)[0];
  var prevBgIndex = 0;     // sky is the ready-preview; the first game re-rolls a different bg

  function announce(msg) { live.textContent = msg; }

  function newGame() {
    // re-roll a fresh, contrast-safe, non-repeating set of visuals for this game
    var v = E.pickVariants((Math.floor(Math.random() * 0xffffffff)) >>> 0, prevBgIndex);
    activeBg = v.bg; activeBird = v.bird; activeColor = v.color; prevBgIndex = v.bg;
    state = E.createState({ width: W, height: H, difficulty: difficulty, seed: null, best: sessionBest });
    paused = false;
    acc = 0; lastT = 0;
    overOv.classList.remove('show');
    pauseOv.classList.remove('show');
    startOv.classList.remove('show');
    flourish.classList.remove('show'); flourish.innerHTML = '';
    syncHud();
    arm();
    announce('New game, ' + difficulty + ' difficulty. Tap or press Space to flap.');
  }

  function arm() {
    if (running) return;
    running = true;
    lastT = 0;
    requestAnimationFrame(loop);
  }

  function syncHud() {
    scoreEl.textContent = state ? state.score : 0;
    bestEl.textContent = Math.max(sessionBest, state ? state.best : 0);
  }

  function doFlap() {
    if (!state || state.status === 'over' || paused) return;
    E.flap(state);
    birdFlap = 1;
  }

  function togglePause() {
    if (!state || state.status !== 'playing') return;
    paused = !paused;
    if (paused) {
      pauseOv.classList.add('show');
      announce('Paused.');
    } else {
      pauseOv.classList.remove('show');
      lastT = 0;            // drop the accumulated wall-clock gap
      announce('Resumed.');
      arm();
    }
  }

  function onOver() {
    var sb = state.score;
    var isNewBest = sb > sessionBest && sb > 0;
    if (sb > sessionBest) sessionBest = sb;
    document.getElementById('finalScore').textContent = state.score;
    document.getElementById('finalBest').textContent = sessionBest;
    document.getElementById('newBest').hidden = !isNewBest;
    overOv.classList.add('show');
    announce('Game over. Score ' + state.score + '. Best ' + sessionBest + '.' + (isNewBest ? ' New best!' : ''));
    if (isNewBest) celebrate();
  }

  function celebrate() {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    flourish.innerHTML = '';
    var colors = ['#ffd43b', '#5bbf3a', '#4ec0ca', '#ff8c42', '#ffffff'];
    for (var i = 0; i < 40; i++) {
      var s = document.createElement('span');
      s.className = 'spark';
      s.style.left = (Math.random() * 100) + '%';
      s.style.background = colors[i % colors.length];
      s.style.animationDuration = (0.9 + Math.random() * 0.8) + 's';
      s.style.animationDelay = (Math.random() * 0.25) + 's';
      flourish.appendChild(s);
    }
    flourish.classList.add('show');
    setTimeout(function () { flourish.classList.remove('show'); flourish.innerHTML = ''; }, 1700);
  }

  /* -- the fixed-timestep real-time loop ----------------------------------- */
  function loop(t) {
    if (!running) return;
    if (!state || state.status === 'over' || paused) {
      running = false;
      if (state && state.status === 'over') onOver();
      draw();
      return;
    }
    if (!lastT) lastT = t;
    var frame = (t - lastT) / 1000;
    if (frame > 0.25) frame = 0.25;   // clamp huge gaps (tab refocus)
    lastT = t;

    if (state.status === 'playing') {
      acc += frame;
      while (acc >= STEP) { E.step(state, STEP); acc -= STEP; if (state.status === 'over') break; }
    }
    bobT += frame; motifT += frame; birdFlap = Math.max(0, birdFlap - frame * 3);
    syncHud();
    draw();

    if (state.status === 'over') { running = false; onOver(); return; }
    requestAnimationFrame(loop);
  }

  /* -- drawing ------------------------------------------------------------- */
  function draw() {
    if (!state) return;
    var gy = state.groundY;
    var th = THEMES[activeBg];

    // sky gradient (per-theme)
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, th.grad[0]); g.addColorStop(1, th.grad[1]);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // subtle background motif (behind pipes)
    drawMotif(th.motif, gy);

    // pipes (per-theme tint, else default green)
    var pipe = th.pipe || DEFAULT_PIPE;
    for (var i = 0; i < state.pipes.length; i++) {
      drawPipe(state.pipes[i], gy, pipe);
    }

    // ground (per-theme)
    drawGround(th.ground, gy);

    // bird
    drawBird();

    // ready hint
    if (state.status === 'ready') {
      ctx.fillStyle = 'rgba(30,35,48,.55)';
      ctx.font = '700 18px system-ui,sans-serif';
      ctx.textAlign = 'center';
      var bob = Math.sin(bobT * 4) * 4;
      ctx.fillText('Tap / Space to start', W / 2, gy * 0.62 + bob);
    }
  }

  function drawPipe(p, gy, pipe) {
    var topH = p.gapY, lowY = p.gapY + p.gapH;
    ctx.fillStyle = pipe.light;
    ctx.fillRect(p.x, 0, PIPE_W, topH);
    ctx.fillRect(p.x, lowY, PIPE_W, gy - lowY);
    // lips
    ctx.fillStyle = pipe.dark;
    ctx.fillRect(p.x - 3, topH - 16, PIPE_W + 6, 16);
    ctx.fillRect(p.x - 3, lowY, PIPE_W + 6, 16);
    // highlight stripe (shape cue, not color-alone)
    ctx.fillStyle = pipe.shine;
    ctx.fillRect(p.x + 6, 0, 6, topH);
    ctx.fillRect(p.x + 6, lowY, 6, gy - lowY);
  }

  function drawGround(gnd, gy) {
    ctx.fillStyle = gnd.fill; ctx.fillRect(0, gy, W, H - gy);
    ctx.fillStyle = gnd.top;  ctx.fillRect(0, gy, W, gnd.platform ? 4 : 10);
    if (!gnd.platform) {
      ctx.fillStyle = 'rgba(0,0,0,.08)';
      for (var x = 0; x < W; x += 24) ctx.fillRect(x, gy + 12, 12, 6);
    }
  }

  /* -- background motifs: cheap, subtle, deterministic (render only) -------- */
  function cloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.arc(x - r * 0.9, y + 5, r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }
  function hill(baseX, gy, rw, peakY) {
    ctx.beginPath(); ctx.moveTo(baseX - rw, gy);
    ctx.quadraticCurveTo(baseX, peakY, baseX + rw, gy); ctx.closePath(); ctx.fill();
  }
  function drawMotif(motif, gy) {
    var t = motifT;
    ctx.save();
    if (motif === 'clouds') {
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      for (var i = 0; i < 3; i++) cloud(((i * 150 + t * 12) % (W + 120)) - 60, 70 + i * 60, 26 + i * 4);
    } else if (motif === 'bubbles') {
      ctx.fillStyle = 'rgba(255,255,255,.30)';
      for (var i = 0; i < 10; i++) {
        var by = gy - ((t * 20 + i * 61) % gy);
        ctx.beginPath(); ctx.arc((i * 53) % W, by, 3 + (i % 3), 0, Math.PI * 2); ctx.fill();
      }
    } else if (motif === 'stars') {
      for (var i = 0; i < 46; i++) {
        var tw = 0.5 + 0.5 * Math.sin(t * 2 + i);
        ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + 0.5 * tw).toFixed(3) + ')';
        ctx.fillRect((i * 73 + 13) % W, (i * 129 + 7) % (gy - 20), 2, 2);
      }
    } else if (motif === 'sunhills') {
      ctx.fillStyle = 'rgba(255,241,200,.9)';
      ctx.beginPath(); ctx.arc(W * 0.72, 96, 34, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(120,70,80,.32)';
      hill(0, gy, 140, gy - 120); hill(W, gy, 150, gy - 90);
    } else if (motif === 'skyline') {
      for (var i = 0; i < 7; i++) {
        var bx = i * 52 - ((t * 4) % 52), bw = 36, bh = 120 + ((i * 53) % 120);
        ctx.fillStyle = 'rgba(8,11,22,.85)';
        ctx.fillRect(bx, gy - bh, bw, bh);
        ctx.fillStyle = 'rgba(255,214,120,.6)';
        for (var wy = gy - bh + 10; wy < gy - 12; wy += 18)
          for (var wx = bx + 6; wx < bx + bw - 6; wx += 12)
            if ((wx + wy + i) % 3 === 0) ctx.fillRect(wx, wy, 4, 6);
      }
    } else if (motif === 'hills') {
      ctx.fillStyle = 'rgba(60,110,40,.38)'; hill(0, gy, 200, gy - 150);
      ctx.fillStyle = 'rgba(40,80,28,.42)'; hill(W, gy, 220, gy - 110);
    } else if (motif === 'stalac') {
      ctx.fillStyle = 'rgba(40,30,28,.6)';
      for (var i = 0; i < 8; i++) {
        var sx = i * 46 + 10, h = 30 + ((i * 37) % 70);
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx + 14, 0); ctx.lineTo(sx + 7, h); ctx.closePath(); ctx.fill();
      }
    }
    ctx.restore();
  }

  /* -- bird: one of 4 procedural silhouettes, painted in the active palette -- */
  function wing(col) {
    ctx.fillStyle = col.beak;
    var wy = -2 + (birdFlap > 0.5 ? -5 : 4);
    ctx.beginPath(); ctx.ellipse(-3, wy, 7, 4, -0.3, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  function eye(ex, ey) {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, ey, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1e2330'; ctx.beginPath(); ctx.arc(ex + 1.5, ey, 2, 0, Math.PI * 2); ctx.fill();
  }
  function drawRound(b, col) {
    ctx.fillStyle = col.body;
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = col.accent;
    ctx.beginPath(); ctx.arc(-2, 4, b.r * 0.55, 0, Math.PI * 2); ctx.fill();
    wing(col); eye(6, -4);
    ctx.fillStyle = col.beak;
    ctx.beginPath(); ctx.moveTo(b.r - 2, -1); ctx.lineTo(b.r + 7, 2); ctx.lineTo(b.r - 2, 5); ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  function drawSparrow(b, col) {
    ctx.fillStyle = col.body;
    ctx.beginPath(); ctx.ellipse(0, 0, b.r, b.r * 0.78, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // pointed tail
    ctx.beginPath(); ctx.moveTo(-b.r + 2, -2); ctx.lineTo(-b.r - 8, -5); ctx.lineTo(-b.r - 8, 3); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = col.accent;
    ctx.beginPath(); ctx.ellipse(-1, 4, b.r * 0.5, b.r * 0.4, 0, 0, Math.PI * 2); ctx.fill();
    wing(col); eye(6, -3);
    // long pointed beak
    ctx.fillStyle = col.beak;
    ctx.beginPath(); ctx.moveTo(b.r - 3, -1); ctx.lineTo(b.r + 10, 1.5); ctx.lineTo(b.r - 3, 4); ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  function drawDuck(b, col) {
    ctx.fillStyle = col.body;
    ctx.beginPath(); ctx.ellipse(0, 1, b.r * 1.15, b.r * 0.92, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = col.accent;
    ctx.beginPath(); ctx.ellipse(-1, 5, b.r * 0.6, b.r * 0.45, 0, 0, Math.PI * 2); ctx.fill();
    wing(col); eye(6, -4);
    // broad flat bill
    ctx.fillStyle = col.beak;
    ctx.beginPath(); ctx.ellipse(b.r + 3, 2, 7, 3.4, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  function drawOwl(b, col) {
    ctx.fillStyle = col.body;
    ctx.beginPath(); ctx.arc(0, 0, b.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // ear tufts
    ctx.beginPath(); ctx.moveTo(-b.r * 0.7, -b.r * 0.6); ctx.lineTo(-b.r * 0.3, -b.r * 1.2); ctx.lineTo(-b.r * 0.1, -b.r * 0.7); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(b.r * 0.1, -b.r * 0.7); ctx.lineTo(b.r * 0.3, -b.r * 1.2); ctx.lineTo(b.r * 0.7, -b.r * 0.6); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = col.accent;
    ctx.beginPath(); ctx.arc(0, 4, b.r * 0.6, 0, Math.PI * 2); ctx.fill();
    wing(col);
    // two big eyes
    eye(-3, -3); eye(7, -3);
    // small hooked beak between the eyes
    ctx.fillStyle = col.beak;
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(6, 2); ctx.lineTo(2, 4); ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  function drawBird() {
    var b = state.bird, col = PALETTE[activeColor];
    ctx.save();
    ctx.translate(b.x, b.y);
    var ang = Math.max(-0.5, Math.min(1.1, b.vy / 520));
    ctx.rotate(ang);
    ctx.strokeStyle = '#1e2330'; ctx.lineWidth = 2;
    var shape = BIRD_SHAPES[activeBird];
    if (shape === 'sparrow') drawSparrow(b, col);
    else if (shape === 'duck') drawDuck(b, col);
    else if (shape === 'owl') drawOwl(b, col);
    else drawRound(b, col);
    ctx.restore();
  }

  /* -- input --------------------------------------------------------------- */
  function setDifficulty(d) {
    difficulty = d;
    var btns = document.querySelectorAll('.diff');
    for (var i = 0; i < btns.length; i++) {
      btns[i].setAttribute('aria-pressed', btns[i].dataset.diff === d ? 'true' : 'false');
    }
  }

  document.querySelectorAll('.diff').forEach(function (btn) {
    btn.addEventListener('click', function () { setDifficulty(btn.dataset.diff); });
  });
  document.getElementById('playBtn').addEventListener('click', newGame);
  document.getElementById('againBtn').addEventListener('click', newGame);
  document.getElementById('resumeBtn').addEventListener('click', togglePause);

  // pointer / touch — flap (but not when a button was the target)
  function pointerFlap(e) {
    if (e.target.closest('button')) return;
    if (startOv.classList.contains('show') || overOv.classList.contains('show')) return;
    e.preventDefault();
    if (paused) return;
    doFlap();
  }
  cv.addEventListener('pointerdown', pointerFlap);

  document.addEventListener('keydown', function (e) {
    var k = e.key;
    if (k === ' ' || k === 'Spacebar' || k === 'ArrowUp' || k === 'Up') {
      e.preventDefault();
      if (startOv.classList.contains('show')) { newGame(); return; }
      if (overOv.classList.contains('show')) { newGame(); return; }
      doFlap();
    } else if (k === 'p' || k === 'P') {
      e.preventDefault(); togglePause();
    } else if (k === 'r' || k === 'R' || k === 'n' || k === 'N') {
      e.preventDefault(); newGame();
    }
  });

  // initial paint (ready preview behind the start overlay)
  state = E.createState({ width: W, height: H, difficulty: difficulty, seed: 1, best: 0 });
  draw();

  /* -- test hook: deterministic drive for the Playwright e2e --------------- */
  window.__FLAPPY_TEST__ = {
    newGame: function (opts) {
      opts = opts || {};
      if (opts.difficulty) setDifficulty(opts.difficulty);
      // deterministic variant pick so the e2e can pin a specific theme/bird/color
      var prev = (opts.prevBg === undefined ? prevBgIndex : opts.prevBg);
      var vseed = (opts.seed === undefined ? ((Math.floor(Math.random() * 0xffffffff)) >>> 0) : opts.seed);
      var v = E.pickVariants(vseed, prev);
      activeBg = v.bg; activeBird = v.bird; activeColor = v.color; prevBgIndex = v.bg;
      state = E.createState({ width: W, height: H, difficulty: difficulty, seed: (opts.seed === undefined ? null : opts.seed), best: sessionBest });
      paused = false; acc = 0; lastT = 0;
      startOv.classList.remove('show'); overOv.classList.remove('show'); pauseOv.classList.remove('show');
      flourish.classList.remove('show'); flourish.innerHTML = '';
      syncHud(); draw();
      return getState();
    },
    flap: function () { E.flap(state); birdFlap = 1; syncHud(); draw(); return getState(); },
    // advance the engine deterministically by n fixed steps (no rAF / wall-clock)
    advance: function (n, dt) {
      dt = dt || STEP;
      for (var i = 0; i < (n || 1); i++) { E.step(state, dt); if (state.status === 'over') break; }
      if (state.status === 'over') onOver();
      syncHud(); draw();
      return getState();
    },
    pause: togglePause,
    overlays: function () {
      return {
        start: startOv.classList.contains('show'),
        over: overOv.classList.contains('show'),
        pause: pauseOv.classList.contains('show'),
        newBest: !document.getElementById('newBest').hidden
      };
    },
    getState: getState
  };
  function getState() {
    return {
      status: state.status, score: state.score, best: state.best,
      birdY: state.bird.y, birdVY: state.bird.vy, birdX: state.bird.x,
      pipes: state.pipes.length, difficulty: difficulty,
      params: state.params, groundY: state.groundY, sessionBest: sessionBest,
      bg: activeBg, bird: activeBird, color: activeColor,
      themeId: THEMES[activeBg].id, birdId: BIRD_SHAPES[activeBird], colorId: PALETTE[activeColor].id,
      pipeList: state.pipes.map(function (p) { return { x: p.x, gapY: p.gapY, gapH: p.gapH }; })
    };
  }
})();
</script>
</body>
</html>
