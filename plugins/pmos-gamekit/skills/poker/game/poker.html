<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Poker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E%E2%99%A0%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:,">
<style>
  :root {
    --felt-a: #1d7a4a; --felt-b: #0c4f2c; --rail: #3a2417;
    --card-w: 50px; --card-h: 70px; --radius: 8px;
    --red: #d23b2c; --black: #1a1a1a;
    --gold: #f5d76e; --chip: #2d8fdd;
    --shadow: 0 2px 6px rgba(0,0,0,.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #12100e; color: #eafff0; min-height: 100%; overflow-x: hidden;
    user-select: none; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 9px 16px; background: rgba(0,0,0,.35); position: sticky; top: 0; z-index: 60;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  .stats { display: flex; gap: 14px; font-variant-numeric: tabular-nums; font-size: 13px; opacity: .92; }
  .stats b { font-weight: 700; color: var(--gold); }
  .controls { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  button.btn {
    font: inherit; font-size: 13px; cursor: pointer; color: #eafff0;
    background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.22);
    border-radius: 6px; padding: 6px 12px;
  }
  button.btn:hover:not(:disabled) { background: rgba(255,255,255,.22); }
  button.btn:active:not(:disabled) { transform: translateY(1px); }
  button.btn:disabled { opacity: .4; cursor: default; }
  button.btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 8px; }

  /* ---- Table ---- */
  .table-wrap { width: 100%; max-width: 860px; flex: 1; display: flex; align-items: center; justify-content: center; }
  .felt {
    position: relative; width: 100%; max-width: 820px; aspect-ratio: 16 / 10;
    background: radial-gradient(ellipse at 50% 42%, var(--felt-a), var(--felt-b) 72%);
    border: 14px solid var(--rail); border-radius: 46% / 50%;
    box-shadow: inset 0 0 60px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.5);
  }
  .center {
    position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .board { display: flex; gap: 5px; min-height: var(--card-h); }
  .pot { font-size: 14px; font-weight: 700; background: rgba(0,0,0,.35); padding: 3px 12px; border-radius: 20px; }
  .pot .chip-dot { color: var(--chip); }

  /* ---- Seats ---- */
  .seat {
    position: absolute; transform: translate(-50%,-50%); width: 128px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; z-index: 5;
  }
  .seat .holecards { display: flex; gap: 3px; height: var(--card-h); }
  .seat .nameplate {
    background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.18); border-radius: 8px;
    padding: 3px 9px; min-width: 96px; text-align: center; position: relative;
  }
  .seat .nameplate .nm { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .seat .nameplate .stk { font-size: 12px; color: var(--gold); font-variant-numeric: tabular-nums; }
  .seat.acting .nameplate { box-shadow: 0 0 0 2px var(--gold), 0 0 14px var(--gold); }
  .seat.folded { opacity: .42; }
  .seat.winner .nameplate { box-shadow: 0 0 0 2px #6bd96b, 0 0 18px #6bd96b; }
  .seat .badges { position: absolute; top: -9px; right: -9px; display: flex; gap: 2px; }
  .badge { font-size: 9px; font-weight: 800; border-radius: 50%; width: 17px; height: 17px;
    display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); }
  .badge.btn-badge { background: #fff; color: #111; }
  .badge.sb { background: var(--chip); color: #fff; }
  .badge.bb { background: #e08a2b; color: #fff; }
  .seat .betchip {
    font-size: 11px; font-weight: 700; background: rgba(0,0,0,.45); color: var(--gold);
    border-radius: 14px; padding: 1px 8px; min-height: 16px; font-variant-numeric: tabular-nums;
  }
  .seat .betchip:empty { visibility: hidden; }
  .seat .lastact { font-size: 10px; min-height: 12px; opacity: .85; text-transform: uppercase; letter-spacing: .5px; }

  /* ---- Cards ---- */
  .card {
    width: var(--card-w); height: var(--card-h); border-radius: var(--radius);
    background: #fdfdf8; box-shadow: var(--shadow); position: relative; flex: 0 0 auto;
    font-weight: 700; overflow: hidden;
  }
  .card .corner { position: absolute; top: 3px; left: 4px; line-height: 1; display: flex; flex-direction: column; align-items: center; }
  .card .corner .r { font-size: 16px; }
  .card .corner .s { font-size: 13px; }
  .card .pip { position: absolute; right: 5px; bottom: 4px; font-size: 19px; line-height: 1; }
  .card.red { color: var(--red); }
  .card.black { color: var(--black); }
  .card.back {
    background:
      radial-gradient(circle at 50% 38%, rgba(245,215,110,.28), rgba(245,215,110,0) 60%),
      repeating-linear-gradient(45deg, #1d7a4a, #1d7a4a 5px, #0c4f2c 5px, #0c4f2c 10px);
    border: 2px solid #fdfdf8;
  }
  .card.win-card { box-shadow: 0 0 0 2px var(--gold), var(--shadow); }
  .card.dealt { animation: deal .26s ease both; }
  @keyframes deal { from { transform: translateY(-16px) scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ---- Action bar ---- */
  .actionbar {
    width: 100%; max-width: 820px; background: rgba(0,0,0,.4); border-radius: 12px;
    padding: 10px 12px; display: flex; flex-direction: column; gap: 9px; min-height: 64px;
  }
  .actionbar .msg { font-size: 13px; min-height: 16px; text-align: center; opacity: .92; }
  .actionbar .msg b { color: var(--gold); }
  .betrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .betrow input[type=range] { flex: 1; min-width: 130px; max-width: 360px; accent-color: var(--gold); }
  .betrow .amt { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 64px; text-align: center; color: var(--gold); }
  .quickbets { display: flex; gap: 6px; }
  .quickbets button { font-size: 12px; padding: 5px 9px; }
  .mainacts { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .mainacts button { font-size: 14px; padding: 9px 18px; font-weight: 700; min-width: 92px; }
  button.act-fold { background: #7a2b2b; border-color: #a14040; }
  button.act-check { background: #2f6f3a; border-color: #46944f; }
  button.act-raise { background: #b9892a; border-color: #d7a73e; color: #1a1a1a; }
  .hidden { display: none !important; }

  /* ---- Log ---- */
  .log {
    width: 100%; max-width: 820px; max-height: 92px; overflow-y: auto; font-size: 11.5px;
    background: rgba(0,0,0,.28); border-radius: 8px; padding: 6px 10px; line-height: 1.5;
  }
  .log div { opacity: .85; } .log .hl { color: var(--gold); opacity: 1; }

  /* ---- Start / win overlays ---- */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,10,8,.86); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .panel {
    background: #16241b; border: 1px solid rgba(255,255,255,.16); border-radius: 16px;
    padding: 26px 30px; max-width: 460px; text-align: center; box-shadow: 0 14px 50px rgba(0,0,0,.6);
  }
  .panel h2 { margin: 0 0 6px; font-size: 24px; }
  .panel p { margin: 6px 0 16px; opacity: .85; font-size: 14px; line-height: 1.5; }
  .panel .opp-pick { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
  .panel .opp-pick button { min-width: 44px; padding: 9px 12px; font-size: 15px; font-weight: 700; }
  .panel .opp-pick button[aria-pressed=true] { background: var(--gold); color: #1a1a1a; border-color: var(--gold); }
  .panel .start-go { font-size: 16px; padding: 11px 26px; font-weight: 700; background: var(--gold); color: #1a1a1a; border-color: var(--gold); }
  .keyhint { font-size: 11px; opacity: .6; margin-top: 14px; line-height: 1.6; }

  /* ===== Layout: table column + collapsible references panel ===== */
  .layout { width: 100%; max-width: 1220px; display: flex; gap: 12px; align-items: flex-start; }
  .table-col { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  aside.refs {
    flex: 0 0 344px; width: 344px; align-self: stretch; max-height: 80vh;
    background: rgba(0,0,0,.34); border: 1px solid rgba(255,255,255,.13); border-radius: 14px;
    display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.45);
  }
  aside.refs.hidden { display: none !important; }
  .refs-head { display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .refs-tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
  .rtab {
    font: inherit; font-size: 12px; cursor: pointer; color: #d8efe0;
    background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16);
    border-radius: 999px; padding: 4px 10px;
  }
  .rtab[aria-selected=true] { background: var(--gold); color: #1a1a1a; border-color: var(--gold); font-weight: 700; }
  .rtab:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .refs-close { padding: 4px 9px; font-size: 13px; line-height: 1; }
  .refs-body { padding: 12px 14px; overflow-y: auto; font-size: 13px; line-height: 1.5; flex: 1; }
  .rpane.hidden { display: none; }
  .rpane h3 { margin: 0 0 8px; font-size: 14px; letter-spacing: .2px; }
  .rpane .lede { margin: 0 0 10px; font-size: 12px; opacity: .82; }
  .rpane .caveat { font-size: 11px; opacity: .72; font-style: italic; margin: 9px 0 0; }

  /* rankings */
  .rank-list { list-style: none; margin: 0; padding: 0; }
  .rank-list li { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.07); align-items: baseline; }
  .rank-list li:last-child { border-bottom: 0; }
  .rank-list .rk { color: var(--gold); font-weight: 700; min-width: 15px; font-variant-numeric: tabular-nums; }
  .rank-list .rbody .rn { font-weight: 700; }
  .rank-list .rbody .rx { display: block; opacity: .82; font-size: 12px; margin-top: 1px; }
  .glyph-r { color: #ff6f60; } .glyph-b { color: #d6efde; }

  /* preflop chart */
  .pf-selectors { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 9px; }
  .pf-selectors label { font-size: 11px; display: flex; flex-direction: column; gap: 3px; opacity: .92; }
  .pf-selectors select { font: inherit; font-size: 12px; padding: 3px 5px; border-radius: 6px;
    background: #16241b; color: #eafff0; border: 1px solid rgba(255,255,255,.22); }
  .pf-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 1px; }
  .pf-cell {
    font: 600 8.5px/1 ui-monospace, monospace; aspect-ratio: 1; border: 0; border-radius: 2px;
    color: #07120c; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
  }
  .pf-cell.raise { background: #4fae5e; }
  .pf-cell.call  { background: #4f90cc; }
  .pf-cell.fold  { background: #2a3a31; color: #88a195; }
  .pf-cell.unmodeled { background: #2c2926; color: #6c655d; }
  .pf-cell.sel { outline: 2px solid var(--gold); outline-offset: -1px; }
  .pf-cell:focus-visible { outline: 2px solid #fff; outline-offset: -1px; }
  .pf-legend { display: flex; gap: 11px; margin: 8px 0; font-size: 10.5px; opacity: .88; flex-wrap: wrap; }
  .pf-legend span { display: inline-flex; align-items: center; gap: 4px; }
  .pf-legend i { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }
  .pf-detail { margin-top: 9px; background: rgba(0,0,0,.32); border-radius: 8px; padding: 9px 11px; min-height: 54px; font-size: 12px; }
  .pf-detail .h { font-weight: 700; color: var(--gold); }
  .pf-detail .eq { font-variant-numeric: tabular-nums; }
  .pf-detail .ra { display: block; margin-top: 4px; opacity: .85; }

  /* pot odds card */
  .po-card h4 { margin: 13px 0 4px; font-size: 12.5px; color: var(--gold); }
  .po-card h4:first-child { margin-top: 0; }
  .po-card p { margin: 4px 0; }
  .po-card ul { margin: 4px 0; padding-left: 18px; }
  .po-card li { margin: 2px 0; }
  .po-card table { border-collapse: collapse; width: 100%; font-size: 12px; margin: 6px 0; }
  .po-card th, .po-card td { border: 1px solid rgba(255,255,255,.14); padding: 3px 6px; text-align: left; }
  .po-card th { background: rgba(255,255,255,.06); }
  .po-card code { background: rgba(255,255,255,.1); padding: .05em .3em; border-radius: 3px; font-size: 11.5px; }

  /* pmos wordmark */
  a.pmos-mark {
    font: 700 12px/1 system-ui, sans-serif; letter-spacing: .5px; text-decoration: none;
    color: #0e1a12; background: var(--gold); padding: 4px 9px; border-radius: 6px; opacity: .92;
  }
  a.pmos-mark:hover { opacity: 1; }
  a.pmos-mark:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

  /* per-street chip strip + hero highlight */
  .seat .chipstrip { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; min-height: 12px; }
  .seat .chipstrip .cs {
    font: 700 9px/1 system-ui; color: #1a1a1a; border-radius: 8px; padding: 1px 5px;
    font-variant-numeric: tabular-nums;
  }
  .seat .chipstrip .cs.P { background: #d8c47a; } .seat .chipstrip .cs.F { background: #9ad0a3; }
  .seat .chipstrip .cs.T { background: #7fc0d8; } .seat .chipstrip .cs.R { background: #d8a87f; }
  .seat.hero .nameplate { border-color: var(--gold); }

  @media (max-width: 880px) {
    .layout { flex-direction: column; }
    aside.refs {
      flex: none; width: auto; max-height: none;
      position: fixed; left: 8px; right: 8px; top: 54px; bottom: 8px; z-index: 80;
    }
  }
  @media (max-width: 560px) {
    :root { --card-w: 38px; --card-h: 54px; }
    .seat { width: 96px; }
    .seat .nameplate { min-width: 76px; }
    header h1 { font-size: 15px; }
    .mainacts button { min-width: 78px; padding: 8px 12px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card.dealt { animation: none; }
    .confetti-piece { animation: none !important; }
  }
</style>
</head>
<body>
<header>
  <h1>Poker</h1>
  <a class="pmos-mark" href="https://github.com/maneesh-dhabria/pmos-skills" target="_blank" rel="noopener" title="Built with pmos-skills — opens GitHub in a new tab">pmos</a>
  <div class="stats">
    <span>Blinds <b id="st-blinds">5 / 10</b></span>
    <span>Hand <b id="st-hand">0</b></span>
    <span>Your stack <b id="st-stack">0</b></span>
  </div>
  <div class="controls">
    <button class="btn" id="btn-refs" aria-expanded="false" aria-controls="refs">References</button>
    <button class="btn" id="btn-unit" aria-label="Toggle chip units between chips and big blinds">Show BB</button>
    <button class="btn" id="btn-next" disabled>Next hand</button>
    <button class="btn" id="btn-new">New game</button>
  </div>
</header>

<main>
  <div class="layout">
    <div class="table-col">
      <div class="table-wrap">
        <div class="felt" id="felt">
          <div class="center">
            <div class="board" id="board" aria-label="community cards"></div>
            <div class="pot" id="pot"><span class="chip-dot">●</span> <span id="pot-amt">0</span></div>
          </div>
          <!-- seats injected here -->
        </div>
      </div>

      <div class="actionbar" id="actionbar">
        <div class="msg" id="msg">Press <b>New game</b> to deal.</div>
        <div class="betrow hidden" id="betrow">
          <div class="quickbets" id="quickbets">
            <button class="btn" data-q="0.5">½ Pot</button>
            <button class="btn" data-q="0.75">¾ Pot</button>
            <button class="btn" data-q="1">Pot</button>
            <button class="btn" data-q="min">Min</button>
            <button class="btn" data-q="allin">All-in</button>
          </div>
          <input type="range" id="betslider" min="0" max="100" value="0" aria-label="raise amount">
          <span class="amt" id="betamt">0</span>
        </div>
        <div class="mainacts hidden" id="mainacts">
          <button class="btn act-fold" id="act-fold">Fold <span class="k">(F)</span></button>
          <button class="btn act-check" id="act-call">Check <span class="k">(C)</span></button>
          <button class="btn act-raise" id="act-raise">Raise <span class="k">(R)</span></button>
        </div>
      </div>

      <div class="log" id="log" aria-live="polite"></div>
    </div>

    <aside class="refs hidden" id="refs" aria-label="Poker references">
      <div class="refs-head">
        <div class="refs-tabs" role="tablist" aria-label="Reference sections">
          <button class="rtab" role="tab" data-tab="rankings" aria-selected="true">Hand rankings</button>
          <button class="rtab" role="tab" data-tab="preflop" aria-selected="false">Preflop chart</button>
          <button class="rtab" role="tab" data-tab="potodds" aria-selected="false">Pot odds</button>
        </div>
        <button class="btn refs-close" id="refs-close" aria-label="Close references">✕</button>
      </div>
      <div class="refs-body">
        <section class="rpane" data-pane="rankings" id="pane-rankings"></section>
        <section class="rpane hidden" data-pane="preflop" id="pane-preflop"></section>
        <section class="rpane hidden" data-pane="potodds" id="pane-potodds"></section>
      </div>
    </aside>
  </div>
</main>

<script>
/* =====================================================================
   PokerEngine — pure No-Limit Hold'em logic, no DOM. Exposed on window
   for vm tests. Ported from the poker-coach reference
   (core/{cards, eval/handEval, engine/gameEngine, engine/sidepots, bots}).
   ===================================================================== */
(function (root) {
  'use strict';

  // ---------------- cards ----------------
  var RANKS = ['2', '3', '4', '5', '6', '7', '8', '9', 'T', 'J', 'Q', 'K', 'A'];
  var SUITS = ['c', 'd', 'h', 's'];

  function rankOf(card) { return card[0]; }
  function suitOf(card) { return card[1]; }
  function rankValue(card) { return RANKS.indexOf(rankOf(card)) + 2; }

  function makeDeck() {
    var deck = [];
    for (var i = 0; i < RANKS.length; i++)
      for (var j = 0; j < SUITS.length; j++) deck.push(RANKS[i] + SUITS[j]);
    return deck;
  }

  function mulberry32(seed) {
    var a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6d2b79f5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  function shuffle(arr, rng) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(rng() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // ---------------- hand evaluator ----------------
  var HandCategory = {
    HighCard: 0, Pair: 1, TwoPair: 2, Trips: 3, Straight: 4,
    Flush: 5, FullHouse: 6, Quads: 7, StraightFlush: 8
  };

  function encode(parts) { return parts.reduce(function (acc, v) { return acc * 15 + v; }, 0); }

  function straightHigh(uniqueDesc) {
    var set = {}; for (var i = 0; i < uniqueDesc.length; i++) set[uniqueDesc[i]] = true;
    var vals = {}; for (var k = 0; k < uniqueDesc.length; k++) vals[uniqueDesc[k]] = true;
    if (set[14]) vals[1] = true;
    var sorted = Object.keys(vals).map(Number).sort(function (a, b) { return b - a; });
    var run = 1;
    for (var m = 1; m < sorted.length; m++) {
      if (sorted[m] === sorted[m - 1] - 1) { run++; if (run >= 5) return sorted[m] + 4; }
      else run = 1;
    }
    return null;
  }

  function rank5(cards) {
    if (cards.length !== 5) throw new Error('rank5 expects 5 cards');
    var vals = cards.map(rankValue).sort(function (a, b) { return b - a; });
    var suits = cards.map(suitOf);
    var isFlush = suits.every(function (s) { return s === suits[0]; });
    var counts = {};
    for (var i = 0; i < vals.length; i++) counts[vals[i]] = (counts[vals[i]] || 0) + 1;
    var groups = Object.keys(counts).map(function (k) { return [Number(k), counts[k]]; })
      .sort(function (a, b) { return b[1] - a[1] || b[0] - a[0]; });
    var uniqueDesc = Object.keys(counts).map(Number).sort(function (a, b) { return b - a; });
    var sHigh = straightHigh(uniqueDesc);
    var isStraight = sHigh !== null;

    if (isStraight && isFlush) return encode([HandCategory.StraightFlush, sHigh, 0, 0, 0, 0]);
    if (groups[0][1] === 4) {
      var kq = groups.filter(function (g) { return g[1] === 1; })[0][0];
      return encode([HandCategory.Quads, groups[0][0], kq, 0, 0, 0]);
    }
    if (groups[0][1] === 3 && groups[1] && groups[1][1] >= 2)
      return encode([HandCategory.FullHouse, groups[0][0], groups[1][0], 0, 0, 0]);
    if (isFlush) return encode([HandCategory.Flush].concat(vals));
    if (isStraight) return encode([HandCategory.Straight, sHigh, 0, 0, 0, 0]);
    if (groups[0][1] === 3) {
      var kt = groups.filter(function (g) { return g[1] === 1; }).map(function (g) { return g[0]; });
      return encode([HandCategory.Trips, groups[0][0], kt[0], kt[1], 0, 0]);
    }
    if (groups[0][1] === 2 && groups[1] && groups[1][1] === 2) {
      var pairHi = Math.max(groups[0][0], groups[1][0]);
      var pairLo = Math.min(groups[0][0], groups[1][0]);
      var kk = groups.filter(function (g) { return g[1] === 1; })[0][0];
      return encode([HandCategory.TwoPair, pairHi, pairLo, kk, 0, 0]);
    }
    if (groups[0][1] === 2) {
      var kp = groups.filter(function (g) { return g[1] === 1; }).map(function (g) { return g[0]; });
      return encode([HandCategory.Pair, groups[0][0], kp[0], kp[1], kp[2], 0]);
    }
    return encode([HandCategory.HighCard].concat(vals));
  }

  function combinations(arr, k) {
    var res = [], combo = [];
    (function rec(start) {
      if (combo.length === k) { res.push(combo.slice()); return; }
      for (var i = start; i < arr.length; i++) { combo.push(arr[i]); rec(i + 1); combo.pop(); }
    })(0);
    return res;
  }

  function rank7(cards) {
    if (cards.length < 5) throw new Error('rank7 expects >=5 cards');
    if (cards.length === 5) return rank5(cards);
    var best = 0, combos = combinations(cards, 5);
    for (var i = 0; i < combos.length; i++) { var s = rank5(combos[i]); if (s > best) best = s; }
    return best;
  }

  function categoryOf(score) { var s = score; for (var i = 0; i < 5; i++) s = Math.floor(s / 15); return s; }

  var RANK_WORD = { 14: 'Aces', 13: 'Kings', 12: 'Queens', 11: 'Jacks', 10: 'Tens', 9: 'Nines',
    8: 'Eights', 7: 'Sevens', 6: 'Sixes', 5: 'Fives', 4: 'Fours', 3: 'Threes', 2: 'Twos' };
  function rankWord(v) { return RANK_WORD[v] || String(v); }

  function winningCards(hole, board) {
    var all = hole.concat(board);
    if (all.length < 5) throw new Error('winningCards expects >=5 cards');
    var best = all.slice(0, 5), bestScore = -1, combos = combinations(all, 5);
    for (var i = 0; i < combos.length; i++) {

    }
    return best;

  function handCategoryLabel(cards) {
    var best = cards.length === 5 ? cards : winningCards(cards.slice(0, 2), cards.slice(2));
    var cat = categoryOf(rank5(best));
    var counts = {};
    for (var i = 0; i < best.length; i++) counts[rankValue(best[i])] = (counts[rankValue(best[i])] || 0) + 1;
    var groups = Object.keys(counts).map(function (k) { return [Number(k), counts[k]]; })
      .sort(function (a, b) { return b[1] - a[1] || b[0] - a[0]; });
    switch (cat) {
      case HandCategory.StraightFlush: return 'Straight Flush';
      case HandCategory.Quads: return 'Four of a Kind, ' + rankWord(groups[0][0]);
      case HandCategory.FullHouse: return 'Full House, ' + rankWord(groups[0][0]) + ' full of ' + rankWord(groups[1][0]);
      case HandCategory.Flush: return 'Flush, ' + rankWord(groups[0][0]) + ' high';
      case HandCategory.Straight: return 'Straight';
      case HandCategory.Trips: return 'Three of a Kind, ' + rankWord(groups[0][0]);
      case HandCategory.TwoPair: {
        var pairs = groups.filter(function (g) { return g[1] === 2; }).map(function (g) { return g[0]; });
        return 'Two Pair, ' + rankWord(pairs[0]) + ' & ' + rankWord(pairs[1]);
      }
      case HandCategory.Pair: return 'Pair of ' + rankWord(groups[0][0]);
      default: return 'High Card, ' + rankWord(groups[0][0]);
    }
  }

  // ---------------- side pots ----------------
  function buildSidePots(contribs) {
    var levelsSet = {};
    contribs.forEach(function (c) { if (c.committed > 0) levelsSet[c.committed] = true; });
    var levels = Object.keys(levelsSet).map(Number).sort(function (a, b) { return a - b; });
    var pots = [], prev = 0;
    for (var i = 0; i < levels.length; i++) {
      var level = levels[i], amount = 0, eligible = [];
      for (var j = 0; j < contribs.length; j++) {
        var c = contribs[j];
        var slice = Math.min(c.committed, level) - Math.min(c.committed, prev);
        amount += slice;
        if (c.committed >= level && !c.folded) eligible.push(c.seat);
      }
      if (amount > 0) pots.push({ amount: amount, eligible: eligible });
      prev = level;
    }
    return pots;
  }

  // ---------------- betting engine (Hand) ----------------
  var STREET_ORDER = ['preflop', 'flop', 'turn', 'river'];

  function Hand(input) {
    this.config = input.config;
    var n = input.seats.length;
    this.buttonIndex = (input.buttonIndex || 0) % n;
    this.street = 'preflop';
    this.board = [];
    this.currentBet = 0;
    this.lastRaiseSize = input.config.bigBlind;
    this.toAct = -1;
    this.awarded = false;

    this.deck = input.deck || shuffle(makeDeck(), input.rng);
    this.deckPtr = 0;
    var self = this;
    this.seatsState = input.seats.map(function (s) {
      var hole = (input.holeOverride && input.holeOverride[s.seat]) || [self.nextCard(), self.nextCard()];
      return { seat: s.seat, stack: s.stack, hole: hole, committedStreet: 0, committedTotal: 0,
        folded: false, allIn: false, hasActed: false };
    });
    this.fullBoard = input.boardOverride || [this.nextCard(), this.nextCard(), this.nextCard(), this.nextCard(), this.nextCard()];
    this.postBlinds();

  Hand.prototype.nextCard = function () { return this.deck[this.deckPtr++]; };
  Hand.prototype.idx = function (seat) {
    for (var i = 0; i < this.seatsState.length; i++) if (this.seatsState[i].seat === seat) return i;
    return -1;
  };
  Hand.prototype.at = function (i) { var n = this.seatsState.length; return this.seatsState[((i % n) + n) % n]; };

  Hand.prototype.postBlinds = function () {
    var n = this.seatsState.length;
    var sbPos = n === 2 ? this.buttonIndex : (this.buttonIndex + 1) % n;
    var bbPos = n === 2 ? (this.buttonIndex + 1) % n : (this.buttonIndex + 2) % n;
    this.post(sbPos, this.config.smallBlind);
    this.post(bbPos, this.config.bigBlind);
    this.currentBet = this.config.bigBlind;
    this.lastRaiseSize = this.config.bigBlind;
    this.toAct = this.findNextToAct((bbPos + 1) % n);
  };

  Hand.prototype.post = function (i, amount) {
    var s = this.at(i);
    var put = Math.min(amount, s.stack);
    s.stack -= put; s.committedStreet += put; s.committedTotal += put;
    if (s.stack === 0) s.allIn = true;
  };

  Hand.prototype.needsAction = function (s) {
    return !s.folded && !s.allIn && (!s.hasActed || s.committedStreet < this.currentBet);
  };

  Hand.prototype.findNextToAct = function (start) {
    var n = this.seatsState.length;
    for (var k = 0; k < n; k++) { var i = (start + k) % n; if (this.needsAction(this.at(i))) return i; }
    return -1;
  };

  Hand.prototype.notFolded = function () { return this.seatsState.filter(function (s) { return !s.folded; }); };
  Hand.prototype.canAct = function () { return this.seatsState.filter(function (s) { return !s.folded && !s.allIn; }); };

  Hand.prototype.holeOf = function (seat) { return this.at(this.idx(seat)).hole; };
  Hand.prototype.stackOf = function (seat) { return this.at(this.idx(seat)).stack; };
  Hand.prototype.isAllIn = function (seat) { return this.at(this.idx(seat)).allIn; };
  Hand.prototype.isFolded = function (seat) { return this.at(this.idx(seat)).folded; };
  Hand.prototype.committedOf = function (seat) { return this.at(this.idx(seat)).committedTotal; };
  Hand.prototype.committedStreetOf = function (seat) { return this.at(this.idx(seat)).committedStreet; };
  Hand.prototype.pot = function () { return this.seatsState.reduce(function (sum, s) { return sum + s.committedTotal; }, 0); };
  Hand.prototype.contenders = function () { return this.notFolded().map(function (s) { return s.seat; }); };

  Hand.prototype.legalActions = function () {
    var empty = { toAct: -1, actions: [], toCall: 0, minRaiseTo: 0, maxRaiseTo: 0 };
    if (this.street === 'complete' || this.toAct < 0) return empty;
    var s = this.at(this.toAct);
    var toCall = Math.min(this.currentBet - s.committedStreet, s.stack);
    var actions = ['fold'];
    if (this.currentBet - s.committedStreet === 0) actions.push('check'); else actions.push('call');
    var maxRaiseTo = s.committedStreet + s.stack;
    var canRaise = s.stack > toCall;
    var minRaiseTo = 0;
    if (canRaise) {
      actions.push(this.currentBet === 0 ? 'bet' : 'raise');
      var baseMin = this.currentBet === 0 ? this.config.bigBlind : this.currentBet + this.lastRaiseSize;
      minRaiseTo = Math.min(baseMin, maxRaiseTo);
    }
    return { toAct: this.at(this.toAct).seat, actions: actions, toCall: toCall, minRaiseTo: minRaiseTo, maxRaiseTo: maxRaiseTo };
  };

  Hand.prototype.apply = function (action) {
    if (this.street === 'complete' || this.toAct < 0) throw new Error('no action expected');
    var actorIndex = this.toAct;
    var s = this.at(actorIndex);
    switch (action.type) {
      case 'fold': s.folded = true; break;
      case 'check':
        if (this.currentBet - s.committedStreet !== 0) throw new Error('cannot check facing a bet');
        break;
      case 'call': {
        var put = Math.min(this.currentBet - s.committedStreet, s.stack);
        s.stack -= put; s.committedStreet += put; s.committedTotal += put;
        if (s.stack === 0) s.allIn = true;
        break;
      }
      case 'bet':
      case 'raise': {
        var target = action.amount || 0;
        var maxRaiseTo = s.committedStreet + s.stack;
        if (target > maxRaiseTo) throw new Error('raise exceeds stack');
        var baseMin = this.currentBet === 0 ? this.config.bigBlind : this.currentBet + this.lastRaiseSize;
        var isAllIn = target === maxRaiseTo;
        if (target < baseMin && !isAllIn) throw new Error('raise below minimum');
        var put2 = target - s.committedStreet;
        s.stack -= put2; s.committedStreet += put2; s.committedTotal += put2;
        if (s.stack === 0) s.allIn = true;
        var raiseSize = target - this.currentBet;
        if (raiseSize >= this.lastRaiseSize) {
          this.lastRaiseSize = raiseSize;
          for (var o = 0; o < this.seatsState.length; o++) {
            var ot = this.seatsState[o];
            if (ot !== s && !ot.folded && !ot.allIn) ot.hasActed = false;

    if (this.notFolded().length === 1) { this.street = 'complete'; this.toAct = -1; return; }
    var next = this.findNextToAct(actorIndex + 1);

  Hand.prototype.advanceStreet = function () {
    if (this.street === 'river') { this.street = 'complete'; this.toAct = -1; return; }
    var nextStreet = STREET_ORDER[STREET_ORDER.indexOf(this.street) + 1];
    this.street = nextStreet;
    if (nextStreet === 'flop') this.board = this.fullBoard.slice(0, 3);
    else if (nextStreet === 'turn') this.board = this.fullBoard.slice(0, 4);
    else if (nextStreet === 'river') this.board = this.fullBoard.slice(0, 5);
    this.currentBet = 0;
    this.lastRaiseSize = this.config.bigBlind;
    for (var i = 0; i < this.seatsState.length; i++) { this.seatsState[i].committedStreet = 0; this.seatsState[i].hasActed = false; }
    if (this.canAct().length < 2) { this.advanceStreet(); return; }

    var next = this.findNextToAct(start);

  Hand.prototype.bestAmong = function (eligible) {
    if (eligible.length === 1) return eligible.slice();
    var best = -1, winners = [];

      var s = this.at(this.idx(eligible[i]));
      var score = rank7(s.hole.concat(this.fullBoard));
      if (score > best) { best = score; winners = [eligible[i]]; }
      else if (score === best) winners.push(eligible[i]);

    return winners.sort(function (a, b) { return a - b; });
  };

  Hand.prototype.result = function () {
    var contribs = this.seatsState.map(function (s) { return { seat: s.seat, committed: s.committedTotal, folded: s.folded }; });
    var pots = buildSidePots(contribs);
    var net = {}, wonBySeat = {};
    for (var i = 0; i < this.seatsState.length; i++) net[this.seatsState[i].seat] = -this.seatsState[i].committedTotal;
    for (var p = 0; p < pots.length; p++) {
      var pot = pots[p];
      var winners = this.bestAmong(pot.eligible);
      var share = Math.floor(pot.amount / winners.length);
      var remainder = pot.amount - share * winners.length;
      for (var w = 0; w < winners.length; w++) {
        var extra = remainder > 0 ? 1 : 0; remainder -= extra;
        var amt = share + extra;
        wonBySeat[winners[w]] = (wonBySeat[winners[w]] || 0) + amt;

  // ---------------- bots ----------------
  var CATEGORY_STRENGTH = {};
  CATEGORY_STRENGTH[HandCategory.HighCard] = 0.15; CATEGORY_STRENGTH[HandCategory.Pair] = 0.42;
  CATEGORY_STRENGTH[HandCategory.TwoPair] = 0.62; CATEGORY_STRENGTH[HandCategory.Trips] = 0.75;
  CATEGORY_STRENGTH[HandCategory.Straight] = 0.85; CATEGORY_STRENGTH[HandCategory.Flush] = 0.9;
  CATEGORY_STRENGTH[HandCategory.FullHouse] = 0.95; CATEGORY_STRENGTH[HandCategory.Quads] = 0.98;
  CATEGORY_STRENGTH[HandCategory.StraightFlush] = 0.99;

  function preflopStrength(hole) {
    var a = rankValue(hole[0]), b = rankValue(hole[1]);
    var hi = Math.max(a, b), lo = Math.min(a, b);
    if (a === b) return Math.min(0.95, 0.5 + ((hi - 2) / 12) * 0.45);
    var s = 0.2 + ((hi - 2) / 12) * 0.25 + ((lo - 2) / 12) * 0.15;
    if (hole[0][1] === hole[1][1]) s += 0.07;
    if (hi - lo === 1) s += 0.06; else if (hi - lo === 2) s += 0.03;
    if (hi >= 12 && lo >= 10) s += 0.05;
    return Math.max(0.1, Math.min(0.85, s));
  }

    if (board.length === 0) return preflopStrength(hole);

  function decide(spot, params, rng) {

    function can(t) { return legal.actions.indexOf(t) >= 0; }
    var strength = handStrength(spot.hole, spot.board);

    function sizeTo(kind) {
      var target = Math.min(legal.maxRaiseTo,
        Math.max(legal.minRaiseTo, legal.minRaiseTo + Math.round(potBefore * params.raiseSizePct)));
      return { type: kind, amount: target };
    }

    if (legal.toCall === 0) {
      var wantValue = strength >= 0.6 && rng() < params.aggression;
      var wantBluff = strength < 0.35 && rng() < params.bluffFreq;
      if ((wantValue || wantBluff) && can('bet')) return sizeTo('bet');
      if (can('check')) return { type: 'check' };
      return can('call') ? { type: 'call' } : { type: 'fold' };
    }

    var potOdds = legal.toCall / (potBefore + legal.toCall);
    var stationSlack = params.callStation * 0.25;
    if (strength >= 0.7) {
      if (can('raise') && rng() < params.aggression) return sizeTo('raise');
      if (can('call')) return { type: 'call' };
    }
    if (strength + stationSlack >= potOdds + 0.05) {
      if (strength >= 0.6 && can('raise') && rng() < params.aggression * 0.5) return sizeTo('raise');
      if (can('call')) return { type: 'call' };
    }
    if (strength < 0.3 && can('raise') && rng() < params.bluffFreq * 0.5) return sizeTo('raise');
    if (rng() < params.callStation * 0.4 && can('call')) return { type: 'call' };
    return can('fold') ? { type: 'fold' } : can('check') ? { type: 'check' } : { type: 'call' };

  var STYLE_BASE = {

    'Calling Station': { vpip: 0.45, aggression: 0.25, bluffFreq: 0.05, callStation: 0.8, raiseSizePct: 0.5 }
  };
  var SKILL_MOD = {
    Beginner: { noise: 0.35, vpip: 0.08, aggression: -0.1, callStation: 0.2 },
    Intermediate: { noise: 0.15, vpip: 0.0, aggression: 0.0, callStation: 0.0 },

      p.className = 'confetti-piece';
      var size = 6 + Math.random() * 7;
      p.style.cssText = 'position:absolute;width:' + size + 'px;height:' + size + 'px;top:-20px;left:' +
        (Math.random() * 100) + '%;background:' + colors[i % colors.length] +
        ';border-radius:' + (Math.random() < .5 ? '50%' : '2px') + ';opacity:.9;';
      var dur = 1.6 + Math.random() * 1.4, delay = Math.random() * 0.5;
      p.animate([
        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
        { transform: 'translateY(102vh) rotate(' + (360 + Math.random() * 540) + 'deg)', opacity: .9 }
      ], { duration: dur * 1000, delay: delay * 1000, easing: 'cubic-bezier(.3,.6,.5,1)' });
      wrap.appendChild(p);
    }
    document.body.appendChild(wrap);
    setTimeout(function () { wrap.remove(); }, 3600);
  }

  // ---------- references panel (static: hand rankings, preflop chart, pot odds) ----------
  // The 9 hand categories, strongest first (adopted from poker-coach RankingsTab). Single home — §K.
  var HAND_RANKINGS = [
    { name: 'Straight Flush', ex: 'Five in a row, all one suit — e.g. 9♥ 8♥ 7♥ 6♥ 5♥ (Ace-high is a Royal Flush)' },
    { name: 'Four of a Kind', ex: 'All four of one rank — e.g. K♠ K♥ K♦ K♣' },
    { name: 'Full House', ex: 'Three of a kind plus a pair — e.g. Q Q Q · 7 7' },
    { name: 'Flush', ex: 'Any five of one suit — e.g. A♦ J♦ 8♦ 5♦ 2♦' },
    { name: 'Straight', ex: 'Five in a row, mixed suits — e.g. 8♠ 7♥ 6♦ 5♣ 4♠' },
    { name: 'Three of a Kind', ex: 'Three of one rank — e.g. 9 9 9' },
    { name: 'Two Pair', ex: 'Two different pairs — e.g. J J · 4 4' },
    { name: 'Pair', ex: 'Two cards of the same rank — e.g. 10 10' },
    { name: 'High Card', ex: 'No pair or better — your highest card plays, e.g. A-high' }
  ];

  var refsEl = document.getElementById('refs');
  var btnRefs = document.getElementById('btn-refs');
  var btnUnit = document.getElementById('btn-unit');
  var refsCloseBtn = document.getElementById('refs-close');
  var rtabs = [].slice.call(document.querySelectorAll('.rtab'));
  var rpanes = [].slice.call(document.querySelectorAll('.rpane'));
  var pfPos = null, pfFacing = null, pfGrid = null, pfDetail = null;
  var chartTouched = false; // once the user changes a chart selector, stop auto-defaulting to the hero seat

  function colorSuits(s) {
    return s.replace(/[♥♦]/g, function (g) { return '<span class="glyph-r">' + g + '</span>'; })
            .replace(/[♠♣]/g, function (g) { return '<span class="glyph-b">' + g + '</span>'; });
  }

  function buildRankings() {
    var items = HAND_RANKINGS.map(function (r, i) {
      return '<li><span class="rk">' + (i + 1) + '</span><span class="rbody">' +
        '<span class="rn">' + r.name + '</span><span class="rx">' + colorSuits(r.ex) + '</span></span></li>';
    }).join('');
    document.getElementById('pane-rankings').innerHTML =
      '<h3>Hand rankings</h3>' +
      '<p class="lede">Strongest at the top. The best five-card hand wins the pot.</p>' +
      '<ul class="rank-list">' + items + '</ul>';
  }

  function heroPositionLabel() {
    if (!table) return 'BTN';
    var n = table.seats.length;
    var dist = ((0 - table.buttonIndex) % n + n) % n; // hero is seats[0]; distance forward from the button
    var byDist = ['BTN', 'SB', 'BB', 'UTG', 'MP', 'CO'];
    return dist < byDist.length ? byDist[dist] : 'BTN';
  }

  var ACT_LABEL = { raise: 'Raise', call: 'Call (defend)', fold: 'Fold', unmodeled: 'Not modeled' };

  function wholeGridUnmodeled(pos, facing) {
    return (facing === 'vsraise' && pos !== 'BB') || (facing === 'unopened' && pos === 'BB');
  }

  function renderGrid() {
    var pos = pfPos.value, facing = pfFacing.value;
    pfGrid.innerHTML = '';
    E.allHands169().forEach(function (key) {
      var act = E.chartAction(key, pos, facing);
      var b = document.createElement('button');
      b.className = 'pf-cell ' + act;
      b.textContent = key;
      b.setAttribute('data-key', key);
      b.setAttribute('title', key + ' · ' + ACT_LABEL[act]);
      b.addEventListener('click', function () { selectCell(key, b); });
      pfGrid.appendChild(b);
    });
  }

  function selectCell(key, el) {
    var pos = pfPos.value, facing = pfFacing.value;
    var sel = pfGrid.querySelector('.pf-cell.sel'); if (sel) sel.classList.remove('sel');
    if (el) el.classList.add('sel');
    var act = E.chartAction(key, pos, facing);
    var eq = E.equityOf(key);
    pfDetail.innerHTML = '<span class="h">' + key + '</span> — ' + ACT_LABEL[act] +
      (eq != null ? ' · <span class="eq">' + eq + '% vs a random hand</span>' : '') +
      '<span class="ra">' + E.cellRationale(key, pos, facing, act) + '</span>';
  }

  function defaultDetail() {
    var pos = pfPos.value, facing = pfFacing.value;
    if (wholeGridUnmodeled(pos, facing)) {
      pfDetail.innerHTML = '<span class="h">Not modeled</span><span class="ra">' +
        E.cellRationale('AA', pos, facing, 'unmodeled') + '</span>';
    } else {
      pfDetail.innerHTML = 'Tap any hand for its action, win% vs a random hand, and why.';
    }
  }

  function buildPreflop() {
    var posOpts = E.POSITIONS.map(function (p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');
    document.getElementById('pane-preflop').innerHTML =
      '<h3>Preflop opening chart</h3>' +
      '<div class="pf-selectors">' +
        '<label>Position<select id="pf-pos">' + posOpts + '</select></label>' +
        '<label>Facing<select id="pf-facing">' +
          '<option value="unopened">First in (unopened)</option>' +
          '<option value="vsraise">Vs a raise</option></select></label>' +
      '</div>' +
      '<div class="pf-legend">' +
        '<span><i style="background:#4fae5e"></i>Raise</span>' +
        '<span><i style="background:#4f90cc"></i>Call / defend</span>' +
        '<span><i style="background:#2a3a31"></i>Fold</span>' +
        '<span><i style="background:#2c2926"></i>Not modeled</span>' +
      '</div>' +
      '<div class="pf-grid" id="pf-grid" role="grid" aria-label="169 starting hands"></div>' +
      '<div class="pf-detail" id="pf-detail"></div>' +
      '<p class="caveat">A transparent baseline, not solver output — a teaching reference, not live advice. ' +
      'Only raise-first-in (UTG–SB) and big-blind defense vs one raise are modeled.</p>';
    pfPos = document.getElementById('pf-pos');
    pfFacing = document.getElementById('pf-facing');
    pfGrid = document.getElementById('pf-grid');
    pfDetail = document.getElementById('pf-detail');
    function onChange() { chartTouched = true; renderGrid(); defaultDetail(); }
    pfPos.addEventListener('change', onChange);
    pfFacing.addEventListener('change', onChange);
    renderGrid();
    defaultDetail();
  }

  function applyChartDefault() {
    if (!pfPos) return;
    var hl = heroPositionLabel();
    pfPos.value = hl;
    pfFacing.value = (hl === 'BB') ? 'vsraise' : 'unopened';
    renderGrid();
    defaultDetail();
  }

  function buildPotOdds() {
    document.getElementById('pane-potodds').innerHTML =
      '<div class="po-card">' +
      '<h3>Pot odds &amp; the Rule of 2 &amp; 4</h3>' +
      '<p class="lede">How to do the math in your head — the method, not a per-hand readout.</p>' +
      '<h4>1 · Count your outs</h4>' +
      '<p>An <em>out</em> is a card that makes your hand. Common draws:</p>' +
      '<ul>' +
        '<li>Flush draw — <b>9</b> outs</li>' +
        '<li>Open-ended straight draw — <b>8</b> outs</li>' +
        '<li>Gutshot (inside) straight — <b>4</b> outs</li>' +
        '<li>Two overcards — <b>~6</b> outs (soft)</li>' +
      '</ul>' +
      '<h4>2 · Rule of 2 &amp; 4</h4>' +
      '<p>On the <b>flop</b>: outs × <b>4</b> ≈ chance to hit by the river. On the <b>turn</b>: outs × <b>2</b> ≈ chance to hit on the next card.</p>' +
      '<p class="caveat">Big-draw caveat: × 4 over-counts above ~12 outs — trim a few points.</p>' +
      '<h4>3 · Pot odds &amp; break-even</h4>' +
      '<p>Break-even % = <code>toCall / (pot + toCall)</code>. Example: pot 100, opponent bets 50 → you call 50 into 150, ' +
      'so <code>50 / (150 + 50) = 25%</code>. You need ≥ 25% equity to call.</p>' +
      '<table><thead><tr><th>Bet size</th><th>You call…</th><th>Break-even</th></tr></thead><tbody>' +
        '<tr><td>½ pot</td><td>0.5 into 2.0</td><td>~25%</td></tr>' +
        '<tr><td>¾ pot</td><td>0.75 into 2.5</td><td>~30%</td></tr>' +
        '<tr><td>Pot-sized</td><td>1.0 into 3.0</td><td>~33%</td></tr>' +
      '</tbody></table>' +
      '<h4>4 · Put it together</h4>' +
      '<p>Compare your chance-to-hit (Rule of 2 &amp; 4) to the price (break-even %). ' +
      '<b>Call when your equity beats the break-even number.</b></p>' +
      '</div>';
  }

  function selectTab(name) {
    rtabs.forEach(function (t) { t.setAttribute('aria-selected', t.getAttribute('data-tab') === name ? 'true' : 'false'); });
    rpanes.forEach(function (p) { p.classList.toggle('hidden', p.getAttribute('data-pane') !== name); });
  }

  function refsOpen() { return !refsEl.classList.contains('hidden'); }
  function openRefs() {
    refsEl.classList.remove('hidden');
    btnRefs.setAttribute('aria-expanded', 'true');
    if (!chartTouched) applyChartDefault();
  }
  function closeRefs() {
    refsEl.classList.add('hidden');
    btnRefs.setAttribute('aria-expanded', 'false');
    btnRefs.focus();
  }
  function toggleRefs() { refsOpen() ? closeRefs() : openRefs(); }

  function toggleUnit() {
    unit = (unit === 'chips') ? 'bb' : 'chips';
    btnUnit.textContent = (unit === 'chips') ? 'Show BB' : 'Show chips';
    if (hand) { renderAll(false); if (curLegal) showHumanControls(curLegal); }
  }

  function initRefs() {
    buildRankings();
    buildPreflop();
    buildPotOdds();
    selectTab('rankings');
    btnRefs.addEventListener('click', toggleRefs);
    refsCloseBtn.addEventListener('click', closeRefs);
    btnUnit.addEventListener('click', toggleUnit);
    rtabs.forEach(function (t) { t.addEventListener('click', function () { selectTab(t.getAttribute('data-tab')); }); });
  }

  // ---------- start overlay ----------
  function showStart() {
    var ov = document.createElement('div');
    ov.className = 'overlay'; ov.id = 'start-overlay';
    ov.innerHTML =
      '<div class="panel"><h2>Poker</h2>' +
      '<p>No-Limit Texas Hold\'em cash game vs. random heuristic bots. Blinds ' + SB + '/' + BB + ', everyone tops up to ' + START + ' each hand.</p>' +
      '<p>Open <b>References</b> any time for hand rankings, an interactive preflop chart, and pot-odds math.</p>' +
      '<p>How many opponents?</p>' +
      '<div class="opp-pick" id="opp-pick">' +
        '<button data-n="0" aria-pressed="true">Random</button>' +
        '<button data-n="1">1</button><button data-n="2">2</button><button data-n="3">3</button>' +
        '<button data-n="4">4</button><button data-n="5">5</button>' +
      '</div>' +
      '<button class="btn start-go" id="start-go">Deal</button>' +
      '<div class="keyhint">In-game keys: <b>F</b> fold · <b>C</b> check/call · <b>R</b> raise · <b>Enter</b> confirm raise · <b>N</b> next hand</div>' +
      '</div>';
    document.body.appendChild(ov);
    var picked = 0;
    ov.querySelectorAll('#opp-pick button').forEach(function (b) {
      b.addEventListener('click', function () {
        ov.querySelectorAll('#opp-pick button').forEach(function (x) { x.setAttribute('aria-pressed', 'false'); });
        b.setAttribute('aria-pressed', 'true');
        picked = Number(b.dataset.n);
      });
    });
    ov.querySelector('#start-go').addEventListener('click', function () {
      ov.remove();
      newGame(picked || undefined);
    });
    ov.querySelector('#start-go').focus();
  }

  // ---------- wiring ----------
  function wire() {
    btnFold.addEventListener('click', humanFold);
    btnCall.addEventListener('click', humanCall);
    btnRaise.addEventListener('click', humanRaise);
    btnNext.addEventListener('click', function () { if (!btnNext.disabled) nextHand(); });
    btnNew.addEventListener('click', function () {
      var ex = document.getElementById('start-overlay'); if (ex) return;
      showStart();
    });
    slider.addEventListener('input', function () { betamt.textContent = fmt(Number(slider.value)); });
    document.getElementById('quickbets').addEventListener('click', function (e) {
      var b = e.target.closest('button'); if (!b || !curLegal) return;
      var q = b.dataset.q, pot = hand.pot(), call = curLegal.toCall;
      if (q === 'min') sliderTo(curLegal.minRaiseTo);
      else if (q === 'allin') sliderTo(curLegal.maxRaiseTo);
      else { var frac = Number(q); sliderTo(curLegal.minRaiseTo + Math.round(pot * frac)); }
    });
    document.addEventListener('keydown', function (e) {
      var k = e.key.toLowerCase();
      if (k === 'escape' && refsOpen()) { e.preventDefault(); closeRefs(); return; }
      if (document.getElementById('start-overlay')) return;
      if (k === 'n' && !btnNext.disabled) { nextHand(); return; }
      if (!curLegal) return;
      if (k === 'f') { e.preventDefault(); humanFold(); }
      else if (k === 'c') { e.preventDefault(); humanCall(); }
      else if (k === 'r') { e.preventDefault(); if (!betrow.classList.contains('hidden')) slider.focus(); }
      else if (k === 'enter') { e.preventDefault(); if (!btnRaise.disabled) humanRaise(); }
    });
    document.getElementById('st-blinds').textContent = SB + ' / ' + BB;
    initRefs();
  }

  // ---------- deterministic test hook (AC9 side-pot e2e) ----------
  window.__POKER_TEST__ = {
    engine: E,
    getTable: function () { return table; },
    getHand: function () { return hand; },
    legal: function () { return hand ? hand.legalActions() : null; },
    act: function (action) { applyAndAdvance(action); },
    // Start a fully deterministic hand (custom stacks/holes/board) for the side-pot run-out.
    dealRigged: function (opts) {
      if (!table) newGame(opts.numBots || 2);
      // Reshape the table to the requested seat count if needed.
      if (opts.seatStacks) {
        var ids = Object.keys(opts.seatStacks).map(Number).sort(function (a, b) { return a - b; });
        var names = E.shuffle(BOT_NAMES, rng32());
        var seats = ids.map(function (id, i) {
          return { seat: id, name: id === 0 ? 'You' : names[i % names.length], isHuman: id === 0, stack: opts.seatStacks[id] };
        });
        var pmap = {};
        seats.forEach(function (s) { if (!s.isHuman) pmap[s.seat] = E.personaFor('TAG', 'Intermediate'); });
        table = { seats: seats, personas: pmap, buttonIndex: opts.buttonIndex || 0, handNo: table ? table.handNo : 0, rng: rng32() };
        buildSeats();
      }
      startHand(opts);
    },
    isHandOver: function () { return hand ? hand.isHandOver() : false; },
    result: function () { return hand ? hand.result() : null; },
    winnerSeats: function () { return winnerSeats; }
  };

  wire();
  showStart();
})();
}
</script>
</body>
</html>
