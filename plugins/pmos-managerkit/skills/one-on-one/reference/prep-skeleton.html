<!DOCTYPE html>
<!--
  1:1 prep-agenda skeleton — /one-on-one plan (pmos-managerkit).

  scripts/plan.mjs instantiates THIS template: it assembles the prep agenda from the report's record
  (header goals/themes/feedback, open action items, inbox) plus corpus-driven coached suggestions and
  the deterministic flags (status-creep / stale-action / career-due), then substitutes the {{tokens}}.
  Human-first ordering per 02_design.html §5. Self-contained HTML — no external assets (offline).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="pmos:skill" content="one-on-one">
<title>{{title}}</title>
<style>
  :root{
    --pmos-bg:#f8f5ef; --pmos-surface:#fff; --pmos-border:#e2dac9; --pmos-rule:#d9cfbd;
    --pmos-text:#201e1a; --pmos-muted:#655e54; --pmos-accent:#b8431a;
    --pmos-flag-bg:#fbeee6; --pmos-flag-border:#e6b9a3;
    --serif:Georgia,"Iowan Old Style",serif; --sans:-apple-system,Segoe UI,Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --pmos-bg:#1a1815; --pmos-surface:#232019; --pmos-border:#3a352c; --pmos-rule:#3a352c;
      --pmos-text:#ece7dc; --pmos-muted:#a89f8f; --pmos-accent:#e0824f; --pmos-flag-bg:#2e211a; --pmos-flag-border:#5a3a29; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--pmos-bg);color:var(--pmos-text);font-family:var(--serif);line-height:1.6;font-size:16px}
  main{max-width:46rem;margin:0 auto;padding:2.5rem 1.5rem 4rem}
  header.pmos-head{border-bottom:2px solid var(--pmos-accent);padding-bottom:1rem;margin-bottom:1.75rem}
  header.pmos-head h1{font-size:1.7rem;margin:0 0 .25rem}
  header.pmos-head .sub{font-family:var(--sans);color:var(--pmos-muted);font-size:.95rem}
  section{margin:1.75rem 0}
  section h2{font-family:var(--sans);font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;color:var(--pmos-accent);margin:0 0 .6rem;border-bottom:1px solid var(--pmos-rule);padding-bottom:.3rem}
  ul{margin:.3rem 0 .3rem 1.1rem;padding:0}
  li{margin:.3rem 0}
  .lead{font-size:1.12rem;font-style:italic;color:var(--pmos-text)}
  .muted{color:var(--pmos-muted)}
  .empty{color:var(--pmos-muted);font-style:italic}
  .tag{font-family:var(--sans);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--pmos-accent);border:1px solid var(--pmos-border);border-radius:.6rem;padding:.05rem .5rem;margin-right:.4rem}
  .flag{font-family:var(--sans);font-size:.9rem;background:var(--pmos-flag-bg);border:1px solid var(--pmos-flag-border);border-radius:.4rem;padding:.5rem .75rem;margin:.4rem 0}
  .flag b{color:var(--pmos-accent)}
  .q{font-family:var(--sans);font-size:.98rem}
</style>
</head>
<body>
<main data-output="oneonone-prep" data-report="{{handle}}">
<header class="pmos-head">
  <h1>{{report_name}} — 1:1 prep</h1>
  <div class="sub">{{subtitle}}</div>
</header>
{{body}}
<p class="muted" style="font-family:var(--sans);font-size:.8rem;margin-top:2.5rem">Generated by /one-on-one · {{generated}} · edit freely; this is a prep aid, not a record.</p>
</main>
</body>
</html>
