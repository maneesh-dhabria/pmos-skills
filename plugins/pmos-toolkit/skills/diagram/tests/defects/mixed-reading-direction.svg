<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title>Defect: mixed reading direction (left-right then bottom-up). Detectable only by vision review.</title>
  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="8" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 3 L 0 6 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect x="80" y="600" width="160" height="48" rx="8" ry="8" fill="#FFFFFF" stroke="#1C1917" stroke-width="2"/>
  <text x="160" y="624" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="600" fill="#1C1917">Step 1</text>
  <rect x="320" y="600" width="160" height="48" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="400" y="624" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">Step 2</text>
  <rect x="320" y="320" width="160" height="48" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="400" y="344" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">Step 3</text>
  <rect x="320" y="80" width="160" height="48" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="400" y="104" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">Step 4</text>
  <path d="M 240 624 L 320 624" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 400 600 L 400 368" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 400 320 L 400 128" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
