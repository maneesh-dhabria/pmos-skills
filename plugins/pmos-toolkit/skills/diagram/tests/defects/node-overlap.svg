<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title>Defect: two nodes overlap.</title>
  <rect x="200" y="376" width="240" height="48" rx="8" ry="8"
        fill="#FFFFFF" stroke="#1C1917" stroke-width="2"/>
  <text x="320" y="400" text-anchor="middle" dominant-baseline="middle"
        font-size="16" font-weight="600" fill="#1C1917">Node A</text>
  <rect x="400" y="376" width="240" height="48" rx="4" ry="4"
        fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="520" y="400" text-anchor="middle" dominant-baseline="middle"
        font-size="14" fill="#1C1917">Node B</text>
</svg>
