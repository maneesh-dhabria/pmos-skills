<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title>Defect: many edge crossings — connectors form an X across the canvas.</title>
  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="8" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 3 L 0 6 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect x="80" y="80" width="120" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="140" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">A</text>
  <rect x="1080" y="80" width="120" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="1140" y="100" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">B</text>
  <rect x="80" y="680" width="120" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="140" y="700" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">C</text>
  <rect x="1080" y="680" width="120" height="40" rx="4" ry="4" fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="1140" y="700" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#1C1917">D</text>
  <path d="M 200 100 L 1080 700" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 1080 100 L 200 700" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 200 100 L 1080 100" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 200 700 L 1080 700" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 200 100 L 200 700" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 1080 100 L 1080 700" fill="none" stroke="#57534E" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
