<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title>Three-step left-right flow: input, process, output.</title>
  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="8" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 3 L 0 6 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect x="160" y="376" width="200" height="48" rx="8" ry="8"
        fill="#FFFFFF" stroke="#1C1917" stroke-width="2"/>
  <text x="260" y="400" text-anchor="middle" dominant-baseline="middle"
        font-size="16" font-weight="600" fill="#1C1917">Input</text>
  <rect x="540" y="376" width="200" height="48" rx="4" ry="4"
        fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="640" y="400" text-anchor="middle" dominant-baseline="middle"
        font-size="14" fill="#1C1917">Process</text>
  <rect x="920" y="376" width="200" height="48" rx="4" ry="4"
        fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="1020" y="400" text-anchor="middle" dominant-baseline="middle"
        font-size="14" fill="#1C1917">Output</text>
  <path d="M 360 400 L 536 400" fill="none" stroke="#57534E" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <path d="M 740 400 L 916 400" fill="none" stroke="#57534E" stroke-width="1.5"
        marker-end="url(#arrow)"/>
</svg>
