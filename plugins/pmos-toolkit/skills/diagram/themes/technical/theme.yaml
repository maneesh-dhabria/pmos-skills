# Technical theme — codifies the original /diagram house style as theme tokens.
# This file is the canonical source for palette, typography, stroke, connector,
# and arrowhead choices for the default theme. Layout decisions (direction,
# canvas, placement) are NOT theme tokens and live in SKILL.md Phase 3 + style.md.
#
# See themes/_schema.json for the strict positive-list schema.
# See themes/technical/style.md for the human-readable spec mirroring this file.

name: technical
displayName: Technical

# Palette converges on the doc substrate's shared tokens (W11) — see
# themes/_shared-palette.yaml. A PMOS diagram and a PMOS doc share one accent
# (burnt-orange) and one ink (stone), so they read as one product.
surface:
  background: "#FFFFFF"
  muted: "#F6F5F3"

palette:
  ink: "#1C1917"
  inkMuted: "#57534E"
  warn: "#B91C1C"
  surface: "#FFFFFF"
  surfaceMuted: "#F6F5F3"
  accents:
    - name: accent
      hex: "#C2410C"

typography:
  body:
    stack: "Inter, ui-sans-serif, system-ui, -apple-system, sans-serif"
    weights: [400, 600]
    sizes: [12, 14, 16, 20]

connectors:
  mixingPermitted: false
  byRole:
    default:
      shape: orthogonal
      stroke: inkMuted
      dashed: false

arrowheads:
  style: filled-triangle
  sizes:
    default: "8x6"

chips:
  radius: 4
  padding: "4px 8px"
  fontSize: 12

nodeChrome:
  primaryStroke: ink
  primaryRadius: 8
  secondaryStroke: inkMuted
  secondaryRadius: 4

rubricOverrides:
  waive: []
  add: []

mindmap:
  supported: true
  defaultLayout: tree
  connector: curved
  nodeCap: 60

infographic:
  supported: false
