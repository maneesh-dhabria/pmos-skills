<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120"
     font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <title>Emphasis connector atom — 2px accent.</title>
  <defs>
    <marker id="arrow" viewBox="0 0 8 6" refX="8" refY="3"
            markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 8 3 L 0 6 z" fill="context-stroke"/>
    </marker>
  </defs>
  <rect x="40" y="40" width="120" height="40" rx="8" ry="8"
        fill="#FFFFFF" stroke="#1C1917" stroke-width="2"/>
  <text x="100" y="60" text-anchor="middle" dominant-baseline="middle"
        font-size="16" font-weight="600" fill="#1C1917">Source</text>
  <rect x="320" y="40" width="120" height="40" rx="4" ry="4"
        fill="#FFFFFF" stroke="#57534E" stroke-width="1.5"/>
  <text x="380" y="60" text-anchor="middle" dominant-baseline="middle"
        font-size="14" fill="#1C1917">Target</text>
  <path d="M 160 60 L 316 60" fill="none" stroke="#C2410C" stroke-width="2"
        marker-end="url(#arrow)"/>
</svg>
