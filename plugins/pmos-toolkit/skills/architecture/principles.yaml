# /architecture — plugin-owned principles.yaml (L1 + L2).
# Shipped verbatim with the pmos-toolkit plugin; replaced on plugin update.
# v1: 10 L1 universal rules + 4 L2 ts + 4 L2 py. delegated_pct = 8/18 = 0.444.
# v2 (BREAKING — T1 of architecture-deep-pass): `severity:` renamed to `disposition:`
#     with value-map (block→must_fix, warn→should_fix, info→wont_fix).
# Project-level L3 overrides + exemptions live at <repo>/.pmos/architecture/principles.yaml.
# Schema per spec §7.2 (FR-12): id, tier, stack, disposition, delegate_to, check, source, message, why.
# `source:` is MANDATORY non-empty (D9).
schema_version: 2

rules:
  # ── L1: universal (10 rules; cap is 15 per FR-21) ──────────────────────────

  - id: U001
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "file_loc_gt:500;exclude_generated"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u001"
    message: "No file > 500 LOC (excluding generated)."
    why: "Files past ~500 LOC are hard to load mentally — split by responsibility."

  - id: U002
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "function_loc_gt:100"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u002"
    message: "No function > 100 LOC."
    why: "100-LOC functions almost always do >1 thing; extract collaborators."

  - id: U003
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "positional_args_gt:4"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u003"
    message: "No constructor / function with > 4 positional args."
    why: "Long positional lists are call-site bugs waiting to happen — use an options object."

  - id: U004
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "regex:console\\.log|print\\(;paths:src/;exclude:tests/,scripts/"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u004"
    message: "No console.log / print() in src/ (allowed in scripts/, tests/)."
    why: "Stray print/log statements leak in prod and signal abandoned debugging."

  - id: U005
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "regex:TODO|FIXME|XXX;blame_older_than_days:90"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u005"
    message: "No TODO / FIXME / XXX older than 90 days."
    why: "TODOs older than a quarter are decisions, not reminders — file or delete them."

  - id: U006
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "path_depth_from_src_gt:4"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u006"
    message: "No file path > 4 directory levels deep from src/."
    why: "Deep nesting hides scope creep; flatten or reorganise."

  - id: U007
    tier: 1
    stack: null
    disposition: wont_fix
    delegate_to: grep
    check: "missing_top_of_file_purpose_comment"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u007"
    message: "Every file should carry a top-of-file purpose comment (warn-only)."
    why: "A 1-line purpose at the top makes the file's job legible to a cold reader."

  - id: U008
    tier: 1
    stack: null
    disposition: should_fix
    delegate_to: grep
    check: "commented_code_block_gt:5_lines"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u008"
    message: "No commented-out code blocks > 5 lines."
    why: "Dead code in comments rots; git remembers — delete it."

  - id: U009
    tier: 1
    stack: null
    disposition: must_fix
    delegate_to: grep
    check: "regex:(AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]+PRIVATE KEY-----|api[_-]?key\\s*=\\s*['\"][A-Za-z0-9_\\-]{16,}['\"])"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u009"
    message: "No hardcoded credentials / API-key patterns."
    why: "Secrets in source are an incident; use a secret manager."

  - id: U010
    tier: 1
    stack: null
    disposition: must_fix
    delegate_to: grep
    check: "regex:NotImplementedError|throw\\s+new\\s+Error\\(['\"]TBD['\"];exclude:tests/"
    source: "plugins/pmos-toolkit/skills/architecture/reference/l1-rationales.md#u010"
    message: "No NotImplementedError / throw new Error('TBD') on a main code path."
    why: "Stubs on main paths ship as 500s; either implement or remove the call site."

  # ── L2: TypeScript (4 rules; delegate_to: dependency-cruiser) ──────────────

  - id: TS001
    tier: 2
    stack: ts
    disposition: must_fix
    delegate_to: dependency-cruiser
    check: "depcruise:no-circular"
    source: "https://github.com/sverweij/dependency-cruiser/blob/main/doc/rules-reference.md#no-circular"
    message: "No circular imports."
    why: "Cycles make module init order undefined and break tree-shaking."

  - id: TS002
    tier: 2
    stack: ts
    disposition: must_fix
    delegate_to: dependency-cruiser
    check: "depcruise:forbidden:src/ui-not-to-src/db"
    source: "https://github.com/sverweij/dependency-cruiser/blob/main/doc/rules-reference.md#forbidden"
    message: "Layer boundary: src/ui/ may not import from src/db/."
    why: "UI must not couple to storage directly — go through a service layer."

  - id: TS003
    tier: 2
    stack: ts
    disposition: should_fix
    delegate_to: dependency-cruiser
    check: "depcruise:no-orphans"
    source: "https://github.com/sverweij/dependency-cruiser/blob/main/doc/rules-reference.md#no-orphans"
    message: "No orphan modules."
    why: "Files imported by nothing are dead weight — delete or wire them up."

  - id: TS004
    tier: 2
    stack: ts
    disposition: should_fix
    delegate_to: dependency-cruiser
    check: "depcruise:not-to-dev-dep"
    source: "https://github.com/sverweij/dependency-cruiser/blob/main/doc/rules-reference.md#not-to-dev-dep"
    message: "No dev-dep imports in prod code."
    why: "Dev deps aren't installed in prod — runtime ImportError."

  # ── L2: Python (4 rules; delegate_to: ruff) ────────────────────────────────

  - id: PY001
    tier: 2
    stack: py
    disposition: should_fix
    delegate_to: ruff
    check: "ruff:TID252"
    source: "https://docs.astral.sh/ruff/rules/relative-imports/"
    message: "No tidy-imports violations (TID252 — prefer absolute imports)."
    why: "Relative imports break when files move; absolute imports survive refactors."

  - id: PY002
    tier: 2
    stack: py
    disposition: should_fix
    delegate_to: ruff
    check: "ruff:F401"
    source: "https://docs.astral.sh/ruff/rules/unused-import/"
    message: "No unused imports (F401)."
    why: "Unused imports inflate the module graph and confuse the next reader."

  - id: PY003
    tier: 2
    stack: py
    disposition: should_fix
    delegate_to: ruff
    check: "ruff:F403,F405"
    source: "https://docs.astral.sh/ruff/rules/undefined-local-with-import-star/"
    message: "No star imports (F403 / F405)."
    why: "`from x import *` hides what's actually used and shadows local names."

  - id: PY004
    tier: 2
    stack: py
    disposition: must_fix
    delegate_to: ruff
    check: "ruff:B006"
    source: "https://docs.astral.sh/ruff/rules/mutable-argument-default/"
    message: "No mutable default args (B006)."
    why: "Mutable defaults are shared across calls — a Python footgun that ships bugs."
