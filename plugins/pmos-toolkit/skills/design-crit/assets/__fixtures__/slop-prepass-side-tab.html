<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slop-prepass fixture — side-tab tell</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 40px; background: #ffffff; color: #111827; }
  .card { width: 360px; padding: 24px; margin-bottom: 16px; background: #ffffff; }
  /* The known slop tell: a thick colored border on ONE side of a rounded card (side-tab). */
  .side-tab { border-left: 4px solid #6366f1; border-radius: 12px; }
  h2 { font-size: 20px; }
</style>
</head>
<body>
  <h1>Pricing</h1>
  <div class="card side-tab">
    <h2>Starter</h2>
    <p>A thick indigo accent runs down the left edge of this rounded card.</p>
  </div>
</body>
</html>
