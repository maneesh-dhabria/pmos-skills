name: geometric-monogram
displayName: Geometric Monogram
technique: Letterform / monogram marks built on a geometric grid — initials constructed from circles, squares, and consistent stroke modules.
palette:
  max_colors: 3
  ink: "#1C1917"
  accents:
    - hex: "#6D28D9"
      name: violet
stroke:
  single_weight: true
  min_effective_px: 1.0
fallback:
  requires_mono: false
  forces_icon_only: false
notes: >
  The monogram is constructed, not typeset — letterforms derive from a shared
  grid module so strokes stay one weight and the mark reads as a unit.
