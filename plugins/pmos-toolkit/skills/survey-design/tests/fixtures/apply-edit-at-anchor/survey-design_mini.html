<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="pmos:skill" content="survey-design">
  <title>Mini Survey Design Artifact (fixture)</title>
</head>
<body>
  <article>
    <h1>Mini Survey</h1>

    <section id="intro">
      <h2>Introduction</h2>
      <p>Thanks for participating in our trial conversion survey. Your answers (about 3 minutes) directly shape which onboarding gaps we fix first this quarter.</p>
    </section>

    <section id="screening">
      <h2>First, a quick check</h2>
      <form id="form">
        <div id="q-trial-role" class="question">
          <label for="q-trial-role-input">What is your role?</label>
          <select id="q-trial-role-input" name="q-trial-role">
            <option value="engineer">Engineer</option>
            <option value="designer">Designer</option>
            <option value="pm">Product Manager</option>
          </select>
        </div>
      </form>
    </section>

    <section id="outro">
      <h2>Thank you</h2>
      <p>We appreciate your feedback. Results will inform our Q3 roadmap priorities.</p>
    </section>

  </article>
</body>
</html>
