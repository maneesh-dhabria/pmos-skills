<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Backlog viewer</title>
<style>
  :root {
    --bg: #f7f8fa; --panel: #fff; --ink: #1c2330; --muted: #6b7480; --line: #e3e7ec;
    --chip: #eef1f5; --accent: #2563eb; --bar-bg: #e7ebf0; --bar-fill: #3b82f6;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: var(--ink); background: var(--bg); }
  header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 12px 20px; position: sticky; top: 0; z-index: 5; }
  .titlerow { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 17px; margin: 0; }
  .repo { color: var(--muted); font-size: 13px; }
  .gen { color: var(--muted); font-size: 12px; margin-left: auto; }
  .tabs { display: flex; gap: 4px; margin-top: 10px; }
  .tab { border: 1px solid var(--line); background: var(--bg); padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  button { font: inherit; }
  .filterbar { display: flex; gap: 16px; align-items: flex-start; margin-top: 12px; flex-wrap: wrap; }
  .facet { display: flex; flex-direction: column; gap: 3px; }
  .facet > .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  .facet .opts { display: flex; gap: 4px; flex-wrap: wrap; }
  .ftag { border: 1px solid var(--line); background: var(--panel); border-radius: 12px; padding: 2px 9px; font-size: 12px; cursor: pointer; user-select: none; }
  .ftag.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .bar-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .count { color: var(--muted); font-size: 12px; }
  .btn { border: 1px solid var(--line); background: var(--panel); border-radius: 6px; padding: 5px 12px; cursor: pointer; }
  .btn:hover { background: var(--chip); }
  main { padding: 18px 20px; max-width: 1100px; }
  /* badges */
  .badge { display: inline-block; border-radius: 4px; padding: 1px 7px; font-size: 11px; font-weight: 600; vertical-align: middle; }
  .s-inbox, .s-draft { background: #e7ebf0; color: #515b67; }
  .s-defining, .s-ready, .s-planned { background: #dbe8ff; color: #1e478e; }
  .s-in-progress { background: #fef0d6; color: #8a5a00; }
  .s-done, .s-released { background: #d7f0df; color: #1f6b3b; }
  .s-blocked { background: #fbdcdc; color: #9b2226; }
  .s-wontfix { background: #ecedef; color: #98a0aa; text-decoration: line-through; }
  .chip { display: inline-block; background: var(--chip); border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--muted); }
  .legend { color: var(--muted); font-size: 12px; margin-top: 5px; }
  .legend strong { color: var(--ink); font-weight: 600; }
  /* kind pills (FR-3) */
  .kind { display: inline-block; border-radius: 3px; padding: 0 5px; font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; vertical-align: middle; }
  .kind-epic { background: #e6dbff; color: #5b3ea8; }
  .kind-story { background: #eef1f5; color: #6b7480; }
  .lane-sub { font-size: 12px; color: var(--muted); margin: 2px 0 9px; }
  /* tree */
  .epic { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 10px; }
  .epic > .erow { display: flex; align-items: center; gap: 9px; padding: 11px 14px; cursor: pointer; flex-wrap: wrap; }
  .epic > .erow:hover { background: #fafbfc; }
  .caret { width: 12px; color: var(--muted); transition: transform .12s; }
  .epic.open .caret { transform: rotate(90deg); }
  .id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); }
  .etitle { font-weight: 600; }
  .progress { display: flex; align-items: center; gap: 7px; margin-left: auto; }
  .pbar { width: 110px; height: 7px; background: var(--bar-bg); border-radius: 4px; overflow: hidden; }
  .pfill { height: 100%; background: var(--bar-fill); }
  .pnum { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .stories { display: none; border-top: 1px solid var(--line); padding: 4px 0; }
  .epic.open .stories { display: block; }
  .srow { display: flex; align-items: center; gap: 9px; padding: 6px 14px 6px 34px; flex-wrap: wrap; }
  .srow:hover { background: #fafbfc; }
  .stitle { flex: 1 1 auto; }
  .blockedby { color: #9b2226; font-size: 12px; flex-basis: 100%; padding-left: 34px; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  /* queues */
  .lanes { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .lane { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; }
  .lane h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 0 0 4px; }
  .lane .sub { font-size: 12px; color: var(--muted); margin: 10px 0 4px; font-weight: 600; }
  .qitem { padding: 7px 0; border-top: 1px solid var(--line); }
  .qitem:first-of-type { border-top: 0; }
  .qcmd { display: block; font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; background: var(--chip); color: #2a3340; border-radius: 4px; padding: 3px 7px; margin-top: 4px; white-space: pre-wrap; word-break: break-all; }
  .lane .none { color: var(--muted); font-size: 13px; padding: 6px 0; }
  .banner { background: #fff4d6; border: 1px solid #f0d98a; color: #6b5310; padding: 14px 18px; border-radius: 8px; margin: 18px 20px; }
  code { font-family: ui-monospace, Menlo, monospace; }
</style>
</head>
<body>
<header>
  <div class="titlerow">
    <h1>Backlog viewer</h1>
    <span class="repo" id="repo"></span>
    <span class="gen" id="gen"></span>
  </div>
  <div class="legend">Epic ⊃ Story · Define → Build → Release · <strong>Tree</strong> = everything · <strong>Queues</strong> = what to do next</div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-view="tree">Tree</button>
    <button class="tab" data-view="queues">Queues</button>
  </div>
  <div class="filterbar" id="filterbar"></div>
</header>
<main id="main"><div class="empty">Loading…</div></main>

<script>
"use strict";
const STATE = { model: null, view: "tree", filters: { status: new Set(), route: new Set(), plugin: new Set() }, openEpics: new Set() };
// FR-7 tooltip copy for the unlabeled route chip.
const ROUTE_TIP = "route — how this item ships: feature (full pipeline) · skill (skill-eval gate) · lite (fast path)";

function badge(status) {
  return `<span class="badge s-${status || "draft"}">${status || "—"}</span>`;
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
// D5 (belt-and-suspenders): treat the stringified null/undefined literals as empty so no @null
// chip renders even if a model predates the parseScalar coercion fix.
function emptyish(v) {
  const s = String(v == null ? "" : v).trim().toLowerCase();
  return s === "" || s === "null" || s === "undefined";
}

// id → {kind, obj, epic} flat index, for resolving queue ids + filtering
function buildIndex(model) {
  const ix = new Map();
  for (const e of model.epics) {
    ix.set(e.id, { kind: "epic", obj: e, epic: e });
    for (const s of e.stories) ix.set(s.id, { kind: "story", obj: s, epic: e });
  }
  return ix;
}

function matchStory(s, epic) {
  const f = STATE.filters;
  if (f.status.size && !f.status.has(s.status)) return false;
  if (f.route.size && !f.route.has(s.route)) return false;
  if (f.plugin.size && !f.plugin.has(epic.plugin)) return false;
  return true;
}
function matchEpic(e) {
  const f = STATE.filters;
  // an epic matches if it passes its own status/route/plugin OR any of its stories match
  const epicSelf =
    (!f.status.size || f.status.has(e.status)) &&
    (!f.route.size || f.route.has(e.route)) &&
    (!f.plugin.size || f.plugin.has(e.plugin));
  if (f.status.size || f.route.size) {
    const anyStory = e.stories.some((s) => matchStory(s, e));
    return epicSelf || anyStory;
  }
  return epicSelf;
}

function renderFilters() {
  const m = STATE.model;
  const bar = document.getElementById("filterbar");
  // FR-4: one status filter is split into two labelled, lifecycle-ordered groups (Epic / Story).
  // Both write into the same `status` filter set — the match logic keys on the status string,
  // so the split is purely presentational. Older models without the grouped facets fall back
  // to the flat statuses list.
  const epicStatuses = m.facets.epic_statuses || m.facets.statuses;
  const storyStatuses = m.facets.story_statuses || [];
  const facets = [
    ["status", epicStatuses, "Epic status"],
    ["status", storyStatuses, "Story status"],
    ["route", m.facets.routes, "route"],
    ["plugin", m.facets.plugins, "plugin"],
  ];
  let html = "";
  for (const [key, vals, label] of facets) {
    if (!vals || !vals.length) continue;
    html += `<div class="facet"><span class="lbl">${label}</span><div class="opts">`;
    for (const v of vals) {
      const on = STATE.filters[key].has(v) ? " on" : "";
      html += `<span class="ftag${on}" data-facet="${key}" data-val="${esc(v)}">${esc(v)}</span>`;
    }
    html += `</div></div>`;
  }
  const total = countVisible();
  html += `<div class="bar-actions"><span class="count" id="count">${total}</span>
    <button class="btn" id="clear">Clear filters</button>
    <button class="btn" id="refresh">↻ Refresh</button></div>`;
  bar.innerHTML = html;
  bar.querySelectorAll(".ftag").forEach((el) =>
    el.addEventListener("click", () => {
      const set = STATE.filters[el.dataset.facet];
      const v = el.dataset.val;
      set.has(v) ? set.delete(v) : set.add(v);
      render();
    })
  );
  document.getElementById("clear").addEventListener("click", () => {
    for (const k of Object.keys(STATE.filters)) STATE.filters[k].clear();
    render();
  });
  document.getElementById("refresh").addEventListener("click", load);
}

function countVisible() {
  let n = 0;
  for (const e of STATE.model.epics) {
    if (!matchEpic(e)) continue;
    n++;
    for (const s of e.stories) if (matchStory(s, e)) n++;
  }
  return `${n} item${n === 1 ? "" : "s"}`;
}

function renderTree() {
  const m = STATE.model;
  const epics = m.epics.filter(matchEpic);
  if (!epics.length) return `<div class="empty">No items match the current filters.</div>`;
  let html = "";
  for (const e of epics) {
    const open = STATE.openEpics.has(e.id) ? " open" : "";
    const pct = e.progress.total ? Math.round((e.progress.done / e.progress.total) * 100) : 0;
    const chips = [e.route && `<span class="chip" title="${ROUTE_TIP}">${esc(e.route)}</span>`, e.plugin && `<span class="chip">${esc(e.plugin)}</span>`].filter(Boolean).join("");
    html += `<div class="epic${open}" data-epic="${esc(e.id)}">
      <div class="erow" data-toggle="${esc(e.id)}">
        <span class="caret">▶</span><span class="kind kind-epic">epic</span><span class="id">#${esc(e.id)}</span>
        <span class="etitle">${esc(e.title)}</span> ${badge(e.status)} ${chips}
        <span class="progress" title="${e.progress.done} of ${e.progress.total} stories done in this epic"><span class="pbar"><span class="pfill" style="width:${pct}%"></span></span>
          <span class="pnum">${e.progress.done}/${e.progress.total}${e.progress.blocked ? " · " + e.progress.blocked + " blocked" : ""}</span></span>
      </div><div class="stories">`;
    const stories = e.stories.filter((s) => matchStory(s, e));
    if (!stories.length) html += `<div class="srow" style="color:var(--muted)">no stories${e.stories.length ? " match the filter" : " yet"}</div>`;
    for (const s of stories) {
      const stale = s.claim_stale ? ` <span class="chip" title="claim older than 4h TTL">stale claim</span>` : "";
      const claim = !emptyish(s.claimed_by) ? ` <span class="chip">@${esc(s.claimed_by)}</span>` : "";
      html += `<div class="srow"><span class="kind kind-story">story</span><span class="id">#${esc(s.id)}</span>
        <span class="stitle">${esc(s.title)}</span> ${badge(s.status)}${s.route ? ` <span class="chip" title="${ROUTE_TIP}">${esc(s.route)}</span>` : ""}${claim}${stale}
        ${s.blocked_by ? `<div class="blockedby">⛔ blocked by: ${esc(s.blocked_by)}</div>` : ""}</div>`;
    }
    html += `</div></div>`;
  }
  return html;
}

function laneList(ids, fmt) {
  if (!ids || !ids.length) return `<div class="none">none</div>`;
  return ids.map(fmt).join("");
}

function titleFor(id) {
  const hit = STATE._ix.get(id);
  return hit ? hit.obj.title : "";
}

function renderQueues() {
  const q = STATE.model.queues;
  const epicCmd = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}<code class="qcmd">/feature-sdlc define ${esc(id)}</code></div>`;
  const storyGroom = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}<code class="qcmd">/backlog refine ${esc(id)}</code></div>`;
  const storyBlocked = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}<code class="qcmd">/feature-sdlc build --story ${esc(id)}</code></div>`;
  const staleClaim = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}<code class="qcmd">/backlog unclaim ${esc(id)}</code></div>`;
  // FR-6: Releases items carry a done/total progress badge.
  const progFor = (id) => { const h = STATE._ix.get(id); return h && h.obj && h.obj.progress ? h.obj.progress : null; };
  const relBadge = (id) => { const p = progFor(id); return p ? ` <span class="chip" title="${p.done} of ${p.total} stories done">${p.done}/${p.total}</span>` : ""; };
  const relReady = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}${relBadge(id)}<code class="qcmd">/complete-dev --epic ${esc(id)}</code></div>`;
  const relPlain = (id) => `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}${relBadge(id)}</div>`;

  // FR-3/FR-4/FR-5: one row per ready story, in the queue's own D22 order (never re-sorted here —
  // INV-4 keeps every read-side rule in serve-web-lib.mjs). Head row is the pick.
  const readyRow = (id) => {
    const hit = STATE._ix.get(id);
    const parent = hit && hit.epic ? hit.epic.id : "";
    const stale = hit && hit.obj && hit.obj.claim_stale;
    // Read the published pick rather than re-deriving it from the row index: the model already says
    // which row `build --next` takes, and INV-4 keeps read-side facts in serve-web-lib.mjs.
    const isPick = id === q.next.pick;
    const chips =
      (isPick ? ` <span class="chip" title="what /feature-sdlc build --next picks">next</span>` : "") +
      (stale ? ` <span class="chip" title="claim older than 4h TTL — /backlog unclaim ${esc(id)} to clear">stale claim</span>` : "");
    // D6: the lane is deliberately cross-epic, so without the parent the ordering looks arbitrary.
    const parentTag = parent ? ` <span class="id" title="parent epic">${esc(parent)}</span>` : "";
    const cmd = isPick ? `/feature-sdlc build --next` : `/feature-sdlc build --story ${id}`;
    return `<div class="qitem"><span class="id">#${esc(id)}</span> ${esc(titleFor(id))}${chips}${parentTag}<code class="qcmd">${esc(cmd)}</code></div>`;
  };

  const groom = q.groom;
  const queue = q.next.queue || [];
  const rel = q.releases;
  return `<div class="lanes">
    <div class="lane"><h2>Needs you</h2>
      <div class="lane-sub">Define, refine, unblock — human decisions</div>
      <div class="sub">Needs definition</div>${laneList(groom.needs_definition, epicCmd)}
      <div class="sub">Needs grooming</div>${laneList(groom.needs_grooming, storyGroom)}
      <div class="sub">Blocked</div>${laneList(groom.blocked, storyBlocked)}
      <div class="sub">Stale claims</div>${laneList(groom.stale_claims, staleClaim)}
    </div>
    <div class="lane"><h2>Ready to build</h2>
      <div class="lane-sub">Everything buildable now, in pick order</div>
      ${queue.length ? queue.map(readyRow).join("") : `<div class="none">nothing ready — run <code>/backlog groom</code></div>`}
    </div>
    <div class="lane"><h2>Releases</h2>
      <div class="lane-sub">Ready to ship, and what's still in progress</div>
      <div class="sub">Release-ready</div>${laneList(rel.release_ready, relReady)}
      <div class="sub">In progress</div>${laneList(rel.in_flight, relPlain)}
      <div class="sub">Blocked</div>${laneList(rel.blocked, relPlain)}
    </div>
  </div>`;
}

function render() {
  if (!STATE.model) return;
  renderFilters();
  const main = document.getElementById("main");
  main.innerHTML = STATE.view === "tree" ? renderTree() : renderQueues();
  document.getElementById("count").textContent = countVisible();
  if (STATE.view === "tree") {
    main.querySelectorAll("[data-toggle]").forEach((el) =>
      el.addEventListener("click", () => {
        const id = el.dataset.toggle;
        STATE.openEpics.has(id) ? STATE.openEpics.delete(id) : STATE.openEpics.add(id);
        render();
      })
    );
  }
}

function setView(v) {
  STATE.view = v;
  document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.view === v));
  render();
}

async function load() {
  try {
    const res = await fetch("/api/backlog", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const model = await res.json();
    STATE.model = model;
    STATE._ix = buildIndex(model);
    document.getElementById("repo").textContent = model.repo ? "· " + model.repo : "";
    document.getElementById("gen").textContent = "as of " + (model.generated_at || "").replace("T", " ").replace(/\..*$/, "");
    render();
  } catch (e) {
    showOffline();
  }
}

function showOffline() {
  document.getElementById("filterbar").innerHTML = "";
  document.getElementById("main").innerHTML = "";
  const b = document.createElement("div");
  b.className = "banner";
  b.innerHTML =
    "<strong>No backlog server.</strong> This viewer reads live data from a local server. " +
    "Start it with <code>/backlog web</code> (or <code>node backlog/scripts/serve-web.mjs</code>) and open the printed " +
    "<code>http://127.0.0.1:&lt;port&gt;/</code> URL. Opening this file directly from disk (<code>file://</code>) can only show this message.";
  document.querySelector("main").before(b);
}

document.getElementById("tabs").addEventListener("click", (e) => {
  if (e.target.dataset.view) setView(e.target.dataset.view);
});
window.addEventListener("focus", () => { if (STATE.model) load(); });
load();
</script>
</body>
</html>
