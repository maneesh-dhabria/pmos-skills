<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Minto Pyramid Principle diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Minto Pyramid Principle</text>
  <text x="320" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Lead with the answer, then justify downward</text>

  <!-- direction arrow -->
  <line x1="595" y1="90" x2="595" y2="350" stroke="#5b6680" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <text x="612" y="225" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(90 612 225)">Order of delivery</text>

  <!-- Tier 1: The Answer (apex) -->
  <polygon points="320,80 250,150 390,150" fill="#2563eb" stroke="#1d2438" stroke-width="1.5"/>
  <text x="320" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">The Answer</text>
  <text x="430" y="120" font-family="sans-serif" font-size="11" fill="#5b6680">Recommendation / thesis up front</text>

  <!-- Tier 2: Key Arguments -->
  <polygon points="250,156 390,156 430,236 210,236" fill="#0ea5a4" stroke="#1d2438" stroke-width="1.5"/>
  <text x="320" y="202" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Key Arguments</text>
  <text x="450" y="200" font-family="sans-serif" font-size="11" fill="#5b6680">Why the answer holds</text>

  <!-- Tier 3: Detailed Information -->
  <polygon points="210,242 430,242 490,340 150,340" fill="#f59e0b" stroke="#1d2438" stroke-width="1.5"/>
  <text x="320" y="296" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Detailed Information</text>
  <text x="320" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Data, context, evidence on demand</text>

  <text x="320" y="375" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#5b6680">Built for executive communication — never bury the lede</text>
</svg>
