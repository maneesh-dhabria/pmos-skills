<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Power User Curve diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Power User Curve</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">Histogram of users by days active per period — a "smile" reveals power users</text>

  <!-- Axes -->
  <line x1="80" y1="300" x2="600" y2="300" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="80" y1="90" x2="80" y2="300" stroke="#1d2438" stroke-width="1.5"/>
  <text x="48" y="200" font-family="sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 48 200)" text-anchor="middle"># of users</text>
  <text x="340" y="336" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Days active in the period (e.g. 1 – 30)</text>

  <!-- Smile-shaped histogram bars -->
  <g fill="#2563eb">
    <rect x="92"  y="120" width="32" height="180"/>
    <rect x="132" y="200" width="32" height="100"/>
    <rect x="172" y="244" width="32" height="56"/>
    <rect x="212" y="262" width="32" height="38"/>
    <rect x="252" y="270" width="32" height="30"/>
    <rect x="292" y="272" width="32" height="28"/>
    <rect x="332" y="270" width="32" height="30"/>
    <rect x="372" y="262" width="32" height="38"/>
    <rect x="412" y="248" width="32" height="52"/>
    <rect x="452" y="222" width="32" height="78"/>
    <rect x="492" y="176" width="32" height="124"/>
    <rect x="532" y="138" width="32" height="162" fill="#0ea5a4"/>
  </g>

  <!-- x labels -->
  <g font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">
    <text x="108" y="318">1</text>
    <text x="308" y="318">15</text>
    <text x="548" y="318">30</text>
  </g>

  <!-- Annotations -->
  <text x="108" y="112" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">casual</text>
  <text x="548" y="130" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0ea5a4" text-anchor="middle">power users</text>

  <!-- right-shift arrow -->
  <line x1="300" y1="358" x2="430" y2="358" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="300" y="382" font-family="sans-serif" font-size="11.5" fill="#f59e0b">Curve shifting right = product getting more engaging</text>
  <text x="80" y="382" font-family="sans-serif" font-size="11" fill="#5b6680">Tip: use a 7-day scale for weekly products</text>
</svg>
