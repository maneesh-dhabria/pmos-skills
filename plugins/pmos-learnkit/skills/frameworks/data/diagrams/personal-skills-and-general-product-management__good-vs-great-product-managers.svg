<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Good Vs. Great Product Managers diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Good vs. Great Product Managers</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Same craft, higher altitude — the move from delivering to elevating</text>

  <!-- Column headers -->
  <rect x="170" y="68" width="225" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="282" y="88" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">GOOD PMs</text>
  <rect x="403" y="68" width="225" height="30" rx="6" fill="#2563eb"/>
  <text x="515" y="88" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">GREAT PMs</text>

  <!-- Rows -->
  <g font-family="sans-serif">
    <!-- row template via repetition -->
    <!-- Impact -->
    <text x="24" y="122" font-size="12" font-weight="700" fill="#1d2438">Impact</text>
    <text x="178" y="122" font-size="11" fill="#5b6680">Deliver on team goals &amp; targets</text>
    <text x="411" y="122" font-size="11" fill="#1d2438">Improve the company's trajectory</text>
    <line x1="24" y1="132" x2="628" y2="132" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="156" font-size="12" font-weight="700" fill="#1d2438">Decisions</text>
    <text x="178" y="156" font-size="11" fill="#5b6680">Metrics-driven · answers &amp; data</text>
    <text x="411" y="156" font-size="11" fill="#1d2438">Metrics-informed · questions &amp; wisdom</text>
    <line x1="24" y1="166" x2="628" y2="166" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="190" font-size="12" font-weight="700" fill="#1d2438">Domain</text>
    <text x="178" y="190" font-size="11" fill="#5b6680">Research the domain deeply</text>
    <text x="411" y="190" font-size="11" fill="#1d2438">Become the world expert in it</text>
    <line x1="24" y1="200" x2="628" y2="200" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="224" font-size="12" font-weight="700" fill="#1d2438">Customers</text>
    <text x="178" y="224" font-size="11" fill="#5b6680">Listen to what customers say</text>
    <text x="411" y="224" font-size="11" fill="#1d2438">Hear the unsaid; sense where it's headed</text>
    <line x1="24" y1="234" x2="628" y2="234" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="258" font-size="12" font-weight="700" fill="#1d2438">Influence</text>
    <text x="178" y="258" font-size="11" fill="#5b6680">Win buy-in for their ideas</text>
    <text x="411" y="258" font-size="11" fill="#1d2438">Build shared passion &amp; ownership</text>
    <line x1="24" y1="268" x2="628" y2="268" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="292" font-size="12" font-weight="700" fill="#1d2438">Feedback</text>
    <text x="178" y="292" font-size="11" fill="#5b6680">Ask: "Does this make sense?"</text>
    <text x="411" y="292" font-size="11" fill="#1d2438">Ask: "What am I getting wrong?"</text>
    <line x1="24" y1="302" x2="628" y2="302" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="326" font-size="12" font-weight="700" fill="#1d2438">PRDs</text>
    <text x="178" y="326" font-size="11" fill="#5b6680">Write detailed specs up front</text>
    <text x="411" y="326" font-size="11" fill="#1d2438">Iterate so teams are rarely blocked</text>
    <line x1="24" y1="336" x2="628" y2="336" stroke="#e2e8f5" stroke-width="1"/>

    <text x="24" y="360" font-size="12" font-weight="700" fill="#1d2438">Focus</text>
    <text x="178" y="360" font-size="11" fill="#5b6680">Busy, often overwhelmed</text>
    <text x="411" y="360" font-size="11" fill="#1d2438">Focus on high-leverage work</text>
  </g>

  <!-- accent rails -->
  <rect x="170" y="68" width="3" height="304" fill="#5b6680"/>
  <rect x="403" y="68" width="3" height="304" fill="#2563eb"/>
  <text x="24" y="392" font-family="sans-serif" font-size="10" fill="#5b6680">Themed comparison across impact, decisions, research, influence &amp; craft</text>
</svg>
