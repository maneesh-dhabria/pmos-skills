<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="North Star Metrics (NSM) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">North Star Metrics (NSM)</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">One holistic primary metric for product value — seen through three lenses</text>

  <!-- Lens 1: Shreyas -->
  <rect x="32" y="78" width="576" height="92" rx="8" fill="#f4f7ff" stroke="#2563eb"/>
  <text x="46" y="100" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb">Shreyas Doshi — "chemical" your product deals in</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <text x="46" y="122">Oxytocin (trust) &#8594; Brand</text>
    <text x="240" y="122">Cortisol (stress) &#8594; Revenue</text>
    <text x="440" y="122">Dopamine &#8594; Usage freq.</text>
    <text x="46" y="142">Adrenaline &#8594; Session duration</text>
    <text x="240" y="142">Endorphins &#8594; Freemium conversion</text>
  </g>
  <text x="46" y="162" font-family="sans-serif" font-size="11" fill="#5b6680">Responsive to product changes &#183; a holistic representation of user value</text>

  <!-- Lens 2: Lenny -->
  <rect x="32" y="180" width="576" height="92" rx="8" fill="#ffffff" stroke="#0ea5a4"/>
  <text x="46" y="202" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Lenny Rachitsky — six categories</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <text x="46" y="224">Revenue (ARR, GMV)</text>
    <text x="240" y="224">Customer growth (paid users)</text>
    <text x="440" y="224">Consumption (nights booked)</text>
    <text x="46" y="244">Engagement (DAU / MAU)</text>
    <text x="240" y="244">Growth efficiency (LTV / CAC)</text>
    <text x="440" y="244">User experience (NPS)</text>
  </g>
  <text x="46" y="264" font-family="sans-serif" font-size="11" fill="#5b6680">Each NSM is driven by its own set of input metrics to improve</text>

  <!-- Lens 3: Reforge -->
  <rect x="32" y="282" width="576" height="100" rx="8" fill="#f4f7ff" stroke="#f59e0b"/>
  <text x="46" y="304" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Reforge — usually THREE North Stars</text>
  <g font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">
    <rect x="46" y="316" width="170" height="30" rx="5" fill="#fff" stroke="#5b6680"/>
    <text x="131" y="336">Acquisition</text>
    <rect x="235" y="316" width="170" height="30" rx="5" fill="#fff" stroke="#5b6680"/>
    <text x="320" y="336">Retention</text>
    <rect x="424" y="316" width="170" height="30" rx="5" fill="#fff" stroke="#5b6680"/>
    <text x="509" y="336">Monetization</text>
  </g>
  <text x="46" y="368" font-family="sans-serif" font-size="11.5" fill="#5b6680">Define each by: Unit of Value &#215; Quality &#215; Frequency</text>
</svg>
