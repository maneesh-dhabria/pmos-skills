<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="MINDSPACE diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">MINDSPACE</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Nine non-coercive levers of behaviour change — one per letter</text>

  <!-- 9 lever rows in 3 columns -->
  <!-- Column 1 -->
  <g font-family="sans-serif">
    <rect x="32" y="78" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="44" y="104" font-size="20" font-weight="700" fill="#2563eb">M</text>
    <text x="68" y="104" font-size="14" font-weight="700" fill="#1d2438">essenger</text>
    <text x="44" y="126" font-size="11.5" fill="#5b6680">We weigh who</text>
    <text x="44" y="142" font-size="11.5" fill="#5b6680">conveys information.</text>

    <rect x="32" y="174" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="44" y="200" font-size="20" font-weight="700" fill="#0ea5a4">D</text>
    <text x="64" y="200" font-size="14" font-weight="700" fill="#1d2438">efaults</text>
    <text x="44" y="222" font-size="11.5" fill="#5b6680">We follow the</text>
    <text x="44" y="238" font-size="11.5" fill="#5b6680">pre-set option.</text>

    <rect x="32" y="270" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="44" y="296" font-size="20" font-weight="700" fill="#f59e0b">A</text>
    <text x="64" y="296" font-size="14" font-weight="700" fill="#1d2438">ffect</text>
    <text x="44" y="318" font-size="11.5" fill="#5b6680">Emotions shape</text>
    <text x="44" y="334" font-size="11.5" fill="#5b6680">our actions.</text>
  </g>

  <!-- Column 2 -->
  <g font-family="sans-serif">
    <rect x="227" y="78" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="239" y="104" font-size="20" font-weight="700" fill="#0ea5a4">I</text>
    <text x="252" y="104" font-size="14" font-weight="700" fill="#1d2438">ncentives</text>
    <text x="239" y="126" font-size="11.5" fill="#5b6680">Mental shortcuts</text>
    <text x="239" y="142" font-size="11.5" fill="#5b6680">on losses &amp; rewards.</text>

    <rect x="227" y="174" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="239" y="200" font-size="20" font-weight="700" fill="#f59e0b">S</text>
    <text x="259" y="200" font-size="14" font-weight="700" fill="#1d2438">alience</text>
    <text x="239" y="222" font-size="11.5" fill="#5b6680">What's novel and</text>
    <text x="239" y="238" font-size="11.5" fill="#5b6680">relevant draws us.</text>

    <rect x="227" y="270" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="239" y="296" font-size="20" font-weight="700" fill="#2563eb">C</text>
    <text x="259" y="296" font-size="14" font-weight="700" fill="#1d2438">ommitments</text>
    <text x="239" y="318" font-size="11.5" fill="#5b6680">We honour public</text>
    <text x="239" y="334" font-size="11.5" fill="#5b6680">promises.</text>
  </g>

  <!-- Column 3 -->
  <g font-family="sans-serif">
    <rect x="422" y="78" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="434" y="104" font-size="20" font-weight="700" fill="#ef4444">N</text>
    <text x="456" y="104" font-size="14" font-weight="700" fill="#1d2438">orms</text>
    <text x="434" y="126" font-size="11.5" fill="#5b6680">We copy what</text>
    <text x="434" y="142" font-size="11.5" fill="#5b6680">others do.</text>

    <rect x="422" y="174" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="434" y="200" font-size="20" font-weight="700" fill="#ef4444">P</text>
    <text x="452" y="200" font-size="14" font-weight="700" fill="#1d2438">riming</text>
    <text x="434" y="222" font-size="11.5" fill="#5b6680">Subconscious cues</text>
    <text x="434" y="238" font-size="11.5" fill="#5b6680">sway choices.</text>

    <rect x="422" y="270" width="186" height="86" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="434" y="296" font-size="20" font-weight="700" fill="#2563eb">E</text>
    <text x="452" y="296" font-size="14" font-weight="700" fill="#1d2438">go</text>
    <text x="434" y="318" font-size="11.5" fill="#5b6680">We act to feel</text>
    <text x="434" y="334" font-size="11.5" fill="#5b6680">good about ourselves.</text>
  </g>

  <text x="32" y="384" font-family="sans-serif" font-size="11" fill="#5b6680">Dolan, Hallsworth, Halpern, King &amp; Vlaev — UK Cabinet Office / Institute for Government, 2010</text>
</svg>
