<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="How Might We diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">How Might We</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Reframe an insight into an optimistic, open-but-bounded question</text>

  <!-- Insight panel -->
  <rect x="32" y="90" width="180" height="90" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="122" y="114" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">INSIGHT / PAIN</text>
  <text x="122" y="138" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">"Travelers hate</text>
  <text x="122" y="153" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">long check-in lines."</text>
  <text x="122" y="170" font-family="sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">a problem, stated</text>

  <!-- Arrow -->
  <line x1="216" y1="135" x2="266" y2="135" stroke="#2563eb" stroke-width="2"/>
  <polygon points="266,130 276,135 266,140" fill="#2563eb"/>
  <text x="246" y="125" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">reframe</text>

  <!-- HMW panel -->
  <rect x="280" y="84" width="328" height="102" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="296" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">How might we</text>
  <text x="296" y="134" font-family="sans-serif" font-size="13" fill="#1d2438">speed travelers through</text>
  <text x="296" y="152" font-family="sans-serif" font-size="13" fill="#1d2438">the airport &#8230;?</text>
  <text x="296" y="174" font-family="sans-serif" font-size="10" fill="#5b6680">an invitation, open to many answers</text>

  <!-- Three-word decode -->
  <rect x="32" y="214" width="176" height="72" rx="8" fill="#f4f7ff"/>
  <text x="120" y="238" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">HOW</text>
  <text x="120" y="260" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">assumes a solution</text>
  <text x="120" y="275" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">exists &#8212; explore it</text>

  <rect x="232" y="214" width="176" height="72" rx="8" fill="#f4f7ff"/>
  <text x="320" y="238" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">MIGHT</text>
  <text x="320" y="260" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">gives permission to</text>
  <text x="320" y="275" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">fail &#8212; defer judgment</text>

  <rect x="432" y="214" width="176" height="72" rx="8" fill="#f4f7ff"/>
  <text x="520" y="238" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">WE</text>
  <text x="520" y="260" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">it&#8217;s a team sport</text>
  <text x="520" y="275" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">&#8212; build together</text>

  <!-- Goldilocks scope band -->
  <text x="32" y="318" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Tune the scope &#8212; not too narrow, not too broad</text>
  <line x1="32" y1="350" x2="608" y2="350" stroke="#5b6680" stroke-width="2"/>
  <circle cx="100" cy="350" r="6" fill="#ef4444"/>
  <text x="100" y="376" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">too narrow</text>
  <text x="100" y="389" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">(prescribes one fix)</text>
  <circle cx="320" cy="350" r="8" fill="#0ea5a4"/>
  <text x="320" y="376" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">just right</text>
  <text x="320" y="389" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">(invites many ideas)</text>
  <circle cx="540" cy="350" r="6" fill="#ef4444"/>
  <text x="540" y="376" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">too broad</text>
  <text x="540" y="389" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">(boils the ocean)</text>
</svg>
