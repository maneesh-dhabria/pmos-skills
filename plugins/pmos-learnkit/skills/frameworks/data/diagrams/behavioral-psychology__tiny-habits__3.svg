<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three ways to raise ability diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Raising Ability — Make the Behavior Easier</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Ability is the most reliable lever in B=MAP. Motivation fluctuates; ability grows with practice.</text>

  <!-- 5 difficulty factors strip -->
  <text x="24" y="90" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">What makes a behavior hard?</text>
  <g font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">
    <rect x="24" y="100" width="110" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="79" y="119">Time</text>
    <rect x="142" y="100" width="110" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="197" y="119">Money</text>
    <rect x="260" y="100" width="120" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="320" y="119">Physical effort</text>
    <rect x="388" y="100" width="118" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="447" y="119">Mental effort</text>
    <rect x="514" y="100" width="102" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="565" y="119">Fit to routine</text>
  </g>

  <!-- Three approaches -->
  <text x="24" y="170" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Three ways to make it easier</text>

  <!-- Approach 1 -->
  <g>
    <rect x="24" y="184" width="190" height="180" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="119" cy="226" r="22" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <path d="M108 230 L116 238 L132 218" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="119" y="278" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">Improve Skills</text>
    <text x="119" y="306" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Get better at the</text>
    <text x="119" y="322" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">behavior through</text>
    <text x="119" y="338" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">deliberate practice</text>
  </g>

  <!-- Approach 2 -->
  <g>
    <rect x="225" y="184" width="190" height="180" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="320" cy="226" r="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="310" y="218" width="20" height="14" rx="2" fill="none" stroke="#0ea5a4" stroke-width="2"/>
    <line x1="320" y1="212" x2="320" y2="218" stroke="#0ea5a4" stroke-width="2"/>
    <text x="320" y="278" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">Get Tools</text>
    <text x="320" y="296" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">&amp; Resources</text>
    <text x="320" y="324" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Remove obstacles</text>
    <text x="320" y="340" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">with the right kit</text>
  </g>

  <!-- Approach 3 -->
  <g>
    <rect x="426" y="184" width="190" height="180" rx="12" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="521" cy="226" r="22" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <rect x="510" y="220" width="6" height="12" fill="#f59e0b"/>
    <rect x="518" y="216" width="6" height="16" fill="#f59e0b"/>
    <rect x="526" y="212" width="6" height="20" fill="#f59e0b"/>
    <text x="521" y="278" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">Shrink It</text>
    <text x="521" y="306" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Break it into a</text>
    <text x="521" y="322" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">tiny step — floss</text>
    <text x="521" y="338" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">one tooth</text>
  </g>
</svg>
