<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="14 Point PM Onboarding Plan diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">14-Point PM Onboarding Plan</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">Four themes to cover, closing on 30-60-90 milestones</text>

  <!-- Column 1: Context -->
  <text x="30" y="70" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">CONTEXT &amp; MARKET</text>
  <g font-family="sans-serif" font-size="10.5" fill="#1d2438">
    <rect x="30" y="78" width="190" height="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="0.8"/><text x="40" y="93">1 &#183; Why &#8212; vision &amp; mission</text>
    <rect x="30" y="102" width="190" height="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="0.8"/><text x="40" y="117">2 &#183; Where you are today</text>
    <rect x="30" y="126" width="190" height="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="0.8"/><text x="40" y="141">3 &#183; Audience / personas</text>
    <rect x="30" y="150" width="190" height="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="0.8"/><text x="40" y="165">4 &#183; State of market (TAM/SOM)</text>
    <rect x="30" y="174" width="190" height="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="0.8"/><text x="40" y="189">5 &#183; Competition</text>
  </g>

  <!-- Column 2: Strategy & GTM -->
  <text x="230" y="70" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">STRATEGY &amp; GTM</text>
  <g font-family="sans-serif" font-size="10.5" fill="#1d2438">
    <rect x="230" y="78" width="190" height="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="0.8"/><text x="240" y="93">6 &#183; Product strategy</text>
    <rect x="230" y="102" width="190" height="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="0.8"/><text x="240" y="117">7 &#183; Metrics / North Star</text>
    <rect x="230" y="126" width="190" height="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="0.8"/><text x="240" y="141">8 &#183; Sales journey</text>
    <rect x="230" y="150" width="190" height="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="0.8"/><text x="240" y="165">9 &#183; Active workstreams</text>
    <rect x="230" y="174" width="190" height="22" fill="#ffffff" stroke="#0ea5a4" stroke-width="0.8"/><text x="240" y="189">10 &#183; Key customers (B2B)</text>
  </g>

  <!-- Column 3: People & Ops -->
  <text x="430" y="70" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">PEOPLE &amp; OPS</text>
  <g font-family="sans-serif" font-size="10.5" fill="#1d2438">
    <rect x="430" y="78" width="180" height="22" fill="#fffaf0" stroke="#f59e0b" stroke-width="0.8"/><text x="440" y="93">11 &#183; Team &amp; org chart</text>
    <rect x="430" y="102" width="180" height="22" fill="#fffaf0" stroke="#f59e0b" stroke-width="0.8"/><text x="440" y="117">12 &#183; Tools &amp; access</text>
    <rect x="430" y="126" width="180" height="22" fill="#fffaf0" stroke="#f59e0b" stroke-width="0.8"/><text x="440" y="141">13 &#183; Product processes</text>
  </g>

  <!-- 30-60-90 ladder (point 14) -->
  <text x="320" y="232" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">14 &#183; 30-60-90 Milestones</text>
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="80" y="318" width="140" height="42" fill="#ef4444" opacity="0.85"/>
    <text x="150" y="338" font-size="13" font-weight="700" fill="#ffffff">30 days</text>
    <text x="150" y="353" font-size="9.5" fill="#ffffff">learn &amp; absorb</text>

    <rect x="250" y="296" width="140" height="64" fill="#ef4444" opacity="0.7"/>
    <text x="320" y="328" font-size="13" font-weight="700" fill="#ffffff">60 days</text>
    <text x="320" y="343" font-size="9.5" fill="#ffffff">contribute</text>

    <rect x="420" y="266" width="140" height="94" fill="#ef4444" opacity="0.55"/>
    <text x="490" y="308" font-size="13" font-weight="700" fill="#ffffff">90 days</text>
    <text x="490" y="323" font-size="9.5" fill="#ffffff">own &amp; deliver</text>
  </g>
  <text x="320" y="382" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Tie each milestone to company &amp; team OKRs &#8212; define what success looks like</text>
</svg>
