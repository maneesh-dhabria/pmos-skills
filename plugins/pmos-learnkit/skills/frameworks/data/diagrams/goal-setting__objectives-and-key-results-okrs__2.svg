<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="The 6-step quarterly OKR process cycle diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Quarterly OKR Process</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Six recurring steps that drive OKRs through each quarter</text>

  <!-- cycle ring -->
  <circle cx="320" cy="232" r="116" fill="none" stroke="#dbe6ff" stroke-width="2" stroke-dasharray="4 5"/>
  <!-- rotation arrow heads on the ring -->
  <path d="M320 116 l-9 -6 l0 12 z" fill="#2563eb"/>

  <!-- center label -->
  <circle cx="320" cy="232" r="44" fill="#f4f7ff"/>
  <text x="320" y="228" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">QUARTERLY</text>
  <text x="320" y="246" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">CYCLE</text>

  <!-- Step 1: top -->
  <circle cx="320" cy="116" r="13" fill="#2563eb"/>
  <text x="320" y="121" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="320" y="92" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438" text-anchor="middle">Draft outcome-oriented OKRs</text>
  <text x="320" y="107" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">1&#8211;4 objectives, 2&#8211;4 KRs each</text>

  <!-- Step 2: top-right -->
  <circle cx="420" cy="174" r="13" fill="#0ea5a4"/>
  <text x="420" y="179" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="442" y="166" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Update quarterly</text>
  <text x="442" y="181" font-family="sans-serif" font-size="9.5" fill="#5b6680">not monthly, not annual</text>

  <!-- Step 3: bottom-right -->
  <circle cx="420" cy="290" r="13" fill="#f59e0b"/>
  <text x="420" y="295" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="442" y="284" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Share, align &amp; socialise</text>
  <text x="442" y="299" font-family="sans-serif" font-size="9.5" fill="#5b6680">leadership buy-in + stakeholders</text>

  <!-- Step 4: bottom -->
  <circle cx="320" cy="348" r="13" fill="#2563eb"/>
  <text x="320" y="353" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="320" y="378" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438" text-anchor="middle">Launch with quarterly kick-offs</text>

  <!-- Step 5: bottom-left -->
  <circle cx="220" cy="290" r="13" fill="#0ea5a4"/>
  <text x="220" y="295" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="198" y="284" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438" text-anchor="end">Reinforce &amp; review</text>
  <text x="198" y="299" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="end">at every org level</text>

  <!-- Step 6: top-left -->
  <circle cx="220" cy="174" r="13" fill="#f59e0b"/>
  <text x="220" y="179" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
  <text x="198" y="166" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438" text-anchor="end">Quarterly post-mortem</text>
  <text x="198" y="181" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="end">consistent scoring</text>
</svg>
