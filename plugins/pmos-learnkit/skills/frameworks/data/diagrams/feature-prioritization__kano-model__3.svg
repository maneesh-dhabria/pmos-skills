<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Kano attribute drift over time diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="bold" fill="#1d2438">Attribute Drift Over Time</text>
  <text x="320" y="50" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Today's delight becomes tomorrow's expectation, then a given</text>

  <!-- time arrow -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <line x1="80" y1="120" x2="560" y2="120" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="320" y="108" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2563eb" font-weight="bold">time &#8594;</text>

  <!-- stage 1: Attractive -->
  <rect x="70" y="160" width="150" height="120" rx="10" fill="#e6f6f5" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="145" y="190" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#0ea5a4">Attractive</text>
  <text x="145" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">Excites &amp; delights</text>
  <text x="145" y="228" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">customers when</text>
  <text x="145" y="244" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">first introduced</text>
  <text x="145" y="266" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#5b6680" font-style="italic">"a pleasant surprise"</text>

  <!-- stage 2: Performance -->
  <rect x="245" y="160" width="150" height="120" rx="10" fill="#eaf0ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="190" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#2563eb">Performance</text>
  <text x="320" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">Now an explicit</text>
  <text x="320" y="228" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">want — more is</text>
  <text x="320" y="244" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">better, less is worse</text>
  <text x="320" y="266" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#5b6680" font-style="italic">"customers compare it"</text>

  <!-- stage 3: Must-be -->
  <rect x="420" y="160" width="150" height="120" rx="10" fill="#fde7e7" stroke="#ef4444" stroke-width="1.5"/>
  <text x="495" y="190" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#ef4444">Must-be</text>
  <text x="495" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">Taken as given —</text>
  <text x="495" y="228" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">absence angers,</text>
  <text x="495" y="244" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">presence unnoticed</text>
  <text x="495" y="266" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#5b6680" font-style="italic">"a basic expectation"</text>

  <!-- drift arrows between stages -->
  <line x1="220" y1="220" x2="245" y2="220" stroke="#5b6680" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="395" y1="220" x2="420" y2="220" stroke="#5b6680" stroke-width="2" marker-end="url(#ar)"/>

  <!-- footer note -->
  <text x="320" y="328" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">Re-run Kano periodically: classifications decay, so re-survey to keep priorities current.</text>
</svg>
