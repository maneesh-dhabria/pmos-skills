<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Kanban - Agile diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Kanban Board</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Visualize flow, limit work-in-progress, pull from left to right</text>

  <!-- Columns -->
  <!-- Backlog -->
  <g font-family="sans-serif">
    <rect x="24" y="74" width="138" height="298" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="36" y="96" font-size="13" font-weight="700" fill="#1d2438">Backlog</text>
    <rect x="36" y="108" width="114" height="34" rx="5" fill="#ffffff" stroke="#5b6680"/>
    <rect x="36" y="150" width="114" height="34" rx="5" fill="#ffffff" stroke="#5b6680"/>
    <rect x="36" y="192" width="114" height="34" rx="5" fill="#ffffff" stroke="#5b6680"/>
    <rect x="36" y="234" width="114" height="34" rx="5" fill="#ffffff" stroke="#5b6680"/>

    <!-- To Do -->
    <rect x="174" y="74" width="138" height="298" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="186" y="96" font-size="13" font-weight="700" fill="#1d2438">To Do</text>
    <text x="300" y="96" font-size="11" font-weight="700" fill="#2563eb" text-anchor="end">WIP 3</text>
    <rect x="186" y="108" width="114" height="34" rx="5" fill="#ffffff" stroke="#2563eb"/>
    <rect x="186" y="150" width="114" height="34" rx="5" fill="#ffffff" stroke="#2563eb"/>
    <rect x="186" y="192" width="114" height="34" rx="5" fill="#ffffff" stroke="#2563eb"/>

    <!-- In Progress -->
    <rect x="324" y="74" width="138" height="298" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="336" y="96" font-size="13" font-weight="700" fill="#1d2438">In Progress</text>
    <text x="450" y="96" font-size="11" font-weight="700" fill="#ef4444" text-anchor="end">WIP 2</text>
    <rect x="336" y="108" width="114" height="34" rx="5" fill="#ffffff" stroke="#f59e0b"/>
    <rect x="336" y="150" width="114" height="34" rx="5" fill="#ffffff" stroke="#f59e0b"/>
    <rect x="336" y="192" width="114" height="34" rx="5" fill="#fff7ed" stroke="#ef4444" stroke-dasharray="4 3"/>
    <text x="393" y="213" font-size="10" fill="#ef4444" text-anchor="middle">limit reached</text>

    <!-- Done -->
    <rect x="474" y="74" width="142" height="298" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
    <text x="486" y="96" font-size="13" font-weight="700" fill="#1d2438">Done</text>
    <rect x="486" y="108" width="118" height="34" rx="5" fill="#ecfdf5" stroke="#0ea5a4"/>
    <rect x="486" y="150" width="118" height="34" rx="5" fill="#ecfdf5" stroke="#0ea5a4"/>
    <rect x="486" y="192" width="118" height="34" rx="5" fill="#ecfdf5" stroke="#0ea5a4"/>
    <rect x="486" y="234" width="118" height="34" rx="5" fill="#ecfdf5" stroke="#0ea5a4"/>
  </g>

  <!-- Flow arrow -->
  <g>
    <line x1="40" y1="350" x2="600" y2="350" stroke="#2563eb" stroke-width="2"/>
    <polygon points="600,350 590,345 590,355" fill="#2563eb"/>
    <text x="320" y="368" font-family="sans-serif" font-size="11" fill="#2563eb" text-anchor="middle" font-weight="700">continuous pull flow &#8594;</text>
  </g>
</svg>
