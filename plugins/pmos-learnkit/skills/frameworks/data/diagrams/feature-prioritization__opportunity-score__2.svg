<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Opportunity Score formula diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="42" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#1d2438">The Opportunity Score Formula</text>
  <text x="320" y="68" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b6680">Survey each outcome 1–10 on two questions, then compute the gap</text>

  <!-- Formula bar -->
  <g font-family="Helvetica,Arial,sans-serif">
    <!-- Importance term -->
    <rect x="44" y="110" width="150" height="58" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="119" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#2563eb">Importance</text>
    <text x="119" y="158" text-anchor="middle" font-size="11" fill="#5b6680">how much it matters</text>

    <text x="214" y="148" text-anchor="middle" font-size="30" font-weight="700" fill="#1d2438">+</text>

    <!-- max term -->
    <rect x="240" y="110" width="356" height="58" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="418" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#0ea5a4">max( Importance − Satisfaction , 0 )</text>
    <text x="418" y="156" text-anchor="middle" font-size="11" fill="#5b6680">the unmet-need gap — clamped so it never goes negative</text>
  </g>

  <!-- equals -->
  <text x="320" y="214" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#5b6680">OpScore =</text>

  <!-- Worked example -->
  <g font-family="Helvetica,Arial,sans-serif">
    <rect x="120" y="236" width="400" height="118" rx="10" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
    <text x="320" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#1d2438">Example</text>

    <text x="150" y="292" font-size="13" fill="#1d2438">Importance = <tspan font-weight="700" fill="#2563eb">9</tspan></text>
    <text x="150" y="316" font-size="13" fill="#1d2438">Satisfaction = <tspan font-weight="700" fill="#ef4444">3</tspan></text>

    <text x="350" y="292" font-size="13" fill="#1d2438">gap = max(9 − 3, 0) = <tspan font-weight="700" fill="#0ea5a4">6</tspan></text>
    <text x="350" y="324" font-size="16" fill="#1d2438">OpScore = 9 + 6 = <tspan font-weight="700" fill="#2563eb" font-size="18">15</tspan></text>

    <text x="320" y="348" text-anchor="middle" font-size="11" fill="#5b6680">High importance + low satisfaction → a strong opportunity</text>
  </g>
</svg>
