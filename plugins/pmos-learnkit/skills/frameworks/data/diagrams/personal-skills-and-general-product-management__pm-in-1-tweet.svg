<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PM in 1 Tweet diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438" text-anchor="middle">PM in 1 Tweet</text>
  <text x="320" y="55" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Shreyas Doshi — the role distilled into three borrowed strengths</text>

  <!-- Three overlapping circles (Venn) -->
  <g opacity="0.85">
    <circle cx="265" cy="200" r="100" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="2"/>
    <circle cx="375" cy="200" r="100" fill="#0ea5a4" fill-opacity="0.14" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="320" cy="290" r="100" fill="#f59e0b" fill-opacity="0.14" stroke="#f59e0b" stroke-width="2"/>
  </g>

  <!-- Labels -->
  <text x="205" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">Brain of an</text>
  <text x="205" y="168" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">ENGINEER</text>
  <text x="205" y="184" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">rigor · logic</text>

  <text x="436" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">Heart of a</text>
  <text x="436" y="168" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4" text-anchor="middle">DESIGNER</text>
  <text x="436" y="184" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">empathy · taste</text>

  <text x="320" y="345" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">Speech of a</text>
  <text x="320" y="363" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">DIPLOMAT</text>
  <text x="320" y="379" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">persuasion · trust</text>

  <!-- Center: the PM -->
  <circle cx="320" cy="225" r="34" fill="#1d2438"/>
  <text x="320" y="222" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">The</text>
  <text x="320" y="238" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">PM</text>
</svg>
