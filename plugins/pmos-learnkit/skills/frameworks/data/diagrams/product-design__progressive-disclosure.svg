<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Progressive Disclosure diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Progressive Disclosure</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Show the common few up front; reveal the advanced rest on request.</text>

  <!-- Layer 1: primary screen -->
  <rect x="32" y="82" width="300" height="130" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="48" y="106" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Initial screen</text>
  <text x="48" y="126" font-family="sans-serif" font-size="12" fill="#5b6680">The 80% — most common, important options</text>
  <rect x="48" y="138" width="268" height="18" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <rect x="48" y="162" width="268" height="18" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <rect x="48" y="186" width="160" height="18" rx="4" fill="#2563eb"/>
  <text x="128" y="199" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Advanced ▸</text>

  <!-- arrow: reveal on request -->
  <line x1="332" y1="195" x2="392" y2="195" stroke="#0ea5a4" stroke-width="2.5"/>
  <polygon points="392,189 404,195 392,201" fill="#0ea5a4"/>
  <text x="368" y="183" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">reveal</text>

  <!-- Layer 2: secondary screen -->
  <rect x="404" y="82" width="204" height="130" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="420" y="106" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Secondary screen</text>
  <text x="420" y="126" font-family="sans-serif" font-size="12" fill="#5b6680">The 20% — rare, expert options</text>
  <rect x="420" y="138" width="172" height="14" rx="3" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
  <rect x="420" y="158" width="172" height="14" rx="3" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
  <rect x="420" y="178" width="172" height="14" rx="3" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>

  <!-- payoff bars -->
  <text x="32" y="252" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Why split it</text>

  <rect x="32" y="266" width="576" height="40" rx="6" fill="#f4f7ff"/>
  <circle cx="56" cy="286" r="7" fill="#2563eb"/>
  <text x="74" y="290" font-family="sans-serif" font-size="12" fill="#1d2438">Lower cognitive load — fewer choices visible, faster first decision.</text>

  <rect x="32" y="314" width="576" height="40" rx="6" fill="#f4f7ff"/>
  <circle cx="56" cy="334" r="7" fill="#0ea5a4"/>
  <text x="74" y="338" font-family="sans-serif" font-size="12" fill="#1d2438">No power lost — every advanced feature still reachable, just deferred.</text>

  <text x="32" y="380" font-family="sans-serif" font-size="11" fill="#5b6680">Caution: hiding the wrong option becomes the dreaded "where is it?" — split by frequency, not by whim.</text>
</svg>
