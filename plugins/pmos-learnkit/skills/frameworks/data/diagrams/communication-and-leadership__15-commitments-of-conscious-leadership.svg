<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="15 Commitments of Conscious Leadership diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">15 Commitments of Conscious Leadership</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Every moment, leaders choose: above the line or below it</text>

  <!-- ABOVE THE LINE region -->
  <rect x="40" y="62" width="560" height="120" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
  <text x="60" y="86" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">ABOVE THE LINE</text>
  <text x="60" y="106" font-family="sans-serif" font-size="12" fill="#1d2438">Open &#183; Curious &#183; Committed to learning</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="60" y="130">&#10003;  Take radical responsibility &#8212; "I am the maker"</text>
    <text x="60" y="150">&#10003;  Approach with curiosity; play &amp; rest in genius</text>
    <text x="60" y="170">&#10003;  Speak candidly, feel feelings, appreciate, win-for-all</text>
  </g>

  <!-- THE LINE -->
  <line x1="40" y1="200" x2="600" y2="200" stroke="#1d2438" stroke-width="3"/>
  <text x="320" y="194" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">THE LINE &#8212; notice where you stand, then shift up</text>

  <!-- arrow shifting up -->
  <line x1="320" y1="300" x2="320" y2="218" stroke="#f59e0b" stroke-width="3"/>
  <polygon points="320,206 313,222 327,222" fill="#f59e0b"/>
  <text x="338" y="262" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b">conscious shift</text>

  <!-- BELOW THE LINE region -->
  <rect x="40" y="218" width="560" height="120" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="60" y="242" font-family="sans-serif" font-size="15" font-weight="700" fill="#ef4444">BELOW THE LINE</text>
  <text x="60" y="262" font-family="sans-serif" font-size="12" fill="#1d2438">Closed &#183; Defensive &#183; Committed to being right</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="60" y="286">&#10007;  Victim mentality &#8212; blame, shame, justify</text>
    <text x="60" y="306">&#10007;  Threat response: amygdala fires as if survival is at risk</text>
    <text x="60" y="326">&#10007;  Our evolutionary default &#8212; gravity pulls us here</text>
  </g>

  <text x="320" y="364" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">The work: recognize the line, locate yourself, and consciously move above it.</text>
</svg>
