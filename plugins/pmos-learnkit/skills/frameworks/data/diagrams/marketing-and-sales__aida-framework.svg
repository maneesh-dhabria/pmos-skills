<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="AIDA Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">AIDA Framework</text>
  <text x="320" y="54" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Four stages a buyer moves through before purchase</text>

  <!-- Funnel bands -->
  <!-- Awareness -->
  <polygon points="120,80 520,80 470,150 170,150" fill="#2563eb"/>
  <text x="320" y="118" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#ffffff">Awareness</text>
  <text x="320" y="136" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#e8eeff">First learns of the product — catch attention</text>

  <!-- Interest -->
  <polygon points="170,155 470,155 442,225 198,225" fill="#0ea5a4"/>
  <text x="320" y="192" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#ffffff">Interest</text>
  <text x="320" y="210" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#e7fbfa">Spark curiosity — features, benefits, value</text>

  <!-- Desire -->
  <polygon points="198,230 442,230 414,300 226,300" fill="#f59e0b"/>
  <text x="320" y="267" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#ffffff">Desire</text>
  <text x="320" y="285" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#fff6e6">Turn interest into want — proof, testimonials</text>

  <!-- Action -->
  <polygon points="226,305 414,305 386,372 254,372" fill="#ef4444"/>
  <text x="320" y="342" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#ffffff">Action</text>
  <text x="320" y="360" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#ffecec">Convert — clear call to action</text>

  <!-- Direction arrow -->
  <line x1="560" y1="92" x2="560" y2="360" stroke="#5b6680" stroke-width="2"/>
  <polygon points="560,372 555,358 565,358" fill="#5b6680"/>
  <text x="585" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(90 585 230)">narrowing toward purchase</text>
</svg>
