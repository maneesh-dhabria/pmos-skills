<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Feature Buckets diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Feature Buckets</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Sort every roadmap idea into four buckets to keep the mix balanced</text>

  <!-- Feature ideas funnel into buckets -->
  <text x="320" y="76" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680">feature ideas &#8595; sort into a bucket (one idea can land in several)</text>

  <!-- Bucket 1: Metrics Movers -->
  <rect x="30" y="92" width="142" height="220" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="30" y="92" width="142" height="40" rx="10" fill="#2563eb"/>
  <text x="101" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Metrics Movers</text>
  <text x="101" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Big needle-movers</text>
  <text x="101" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">on business &amp;</text>
  <text x="101" y="194" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">product metrics</text>
  <text x="101" y="222" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">with specific goals</text>
  <text x="101" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">&amp; strategies</text>
  <circle cx="101" cy="282" r="14" fill="#2563eb"/><text x="101" y="287" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff">&#9650;</text>

  <!-- Bucket 2: Customer Requests -->
  <rect x="184" y="92" width="142" height="220" rx="10" fill="#f0fbfa" stroke="#0ea5a4" stroke-width="2"/>
  <rect x="184" y="92" width="142" height="40" rx="10" fill="#0ea5a4"/>
  <text x="255" y="118" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Customer Requests</text>
  <text x="255" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Asked for directly</text>
  <text x="255" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">by customers</text>
  <text x="255" y="222" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">drive satisfaction</text>
  <text x="255" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">&amp; feedback loop</text>
  <circle cx="255" cy="282" r="14" fill="#0ea5a4"/><text x="255" y="287" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">&#9733;</text>

  <!-- Bucket 3: Delight -->
  <rect x="338" y="92" width="142" height="220" rx="10" fill="#fffaf0" stroke="#f59e0b" stroke-width="2"/>
  <rect x="338" y="92" width="142" height="40" rx="10" fill="#f59e0b"/>
  <text x="409" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Delight</text>
  <text x="409" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Surprise &amp; excite</text>
  <text x="409" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">from design or</text>
  <text x="409" y="194" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">tech insight</text>
  <text x="409" y="222" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">unique market</text>
  <text x="409" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">position</text>
  <circle cx="409" cy="282" r="14" fill="#f59e0b"/><text x="409" y="287" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#fff">&#9788;</text>

  <!-- Bucket 4: Strategic -->
  <rect x="492" y="92" width="142" height="220" rx="10" fill="#fff5f5" stroke="#ef4444" stroke-width="2"/>
  <rect x="492" y="92" width="142" height="40" rx="10" fill="#ef4444"/>
  <text x="563" y="118" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Strategic</text>
  <text x="563" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Bets on the future</text>
  <text x="563" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">learning &amp;</text>
  <text x="563" y="194" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">experimentation</text>
  <text x="563" y="222" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">data gathering for</text>
  <text x="563" y="238" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">future goals</text>
  <circle cx="563" cy="282" r="14" fill="#ef4444"/><text x="563" y="287" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff">&#9819;</text>

  <text x="320" y="345" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">A balanced roadmap draws from all four &#8212; the mix is the PM's judgement call.</text>
  <text x="320" y="366" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">The framework labels the buckets; it does not dictate the split or priority.</text>
</svg>
