<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Premortems diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Premortems</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Assume the project failed — surface why, then classify each risk.</text>

  <!-- Three risk-classification rows -->
  <g font-family="sans-serif">
    <!-- Tiger -->
    <rect x="32" y="86" width="576" height="58" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
    <circle cx="64" cy="115" r="14" fill="#ef4444"/>
    <text x="64" y="120" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">T</text>
    <text x="92" y="110" font-size="15" font-weight="700" fill="#1d2438">Tiger</text>
    <text x="92" y="130" font-size="12" fill="#5b6680">A real threat that will hurt us unless we act now.</text>

    <!-- Paper Tiger -->
    <rect x="32" y="152" width="576" height="58" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="64" cy="181" r="14" fill="#f59e0b"/>
    <text x="64" y="186" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
    <text x="92" y="176" font-size="15" font-weight="700" fill="#1d2438">Paper Tiger</text>
    <text x="92" y="196" font-size="12" fill="#5b6680">Looks scary to others, but you are not worried about it.</text>

    <!-- Elephant -->
    <rect x="32" y="218" width="576" height="58" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="64" cy="247" r="14" fill="#2563eb"/>
    <text x="64" y="252" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">E</text>
    <text x="92" y="242" font-size="15" font-weight="700" fill="#1d2438">Elephant</text>
    <text x="92" y="262" font-size="12" fill="#5b6680">A worry no one is talking about — name it out loud.</text>
  </g>

  <!-- Meeting flow strip -->
  <text x="32" y="305" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">MEETING FLOW</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <rect x="32" y="318" width="118" height="46" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="91" y="338" text-anchor="middle">List risks</text>
    <text x="91" y="354" text-anchor="middle" font-size="10" fill="#5b6680">silent, ≥2 each</text>

    <rect x="166" y="318" width="118" height="46" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="225" y="338" text-anchor="middle">+1 vote</text>
    <text x="225" y="354" text-anchor="middle" font-size="10" fill="#5b6680">5 votes each</text>

    <rect x="300" y="318" width="118" height="46" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="359" y="338" text-anchor="middle">Discuss</text>
    <text x="359" y="354" text-anchor="middle" font-size="10" fill="#5b6680">share top themes</text>

    <rect x="434" y="318" width="118" height="46" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="493" y="338" text-anchor="middle">Action plan</text>
    <text x="493" y="354" text-anchor="middle" font-size="10" fill="#5b6680">owners + track</text>

    <g stroke="#5b6680" stroke-width="1.5" fill="none">
      <path d="M150 341 L164 341" marker-end="url(#ar)"/>
      <path d="M284 341 L298 341" marker-end="url(#ar)"/>
      <path d="M418 341 L432 341" marker-end="url(#ar)"/>
    </g>
  </g>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
