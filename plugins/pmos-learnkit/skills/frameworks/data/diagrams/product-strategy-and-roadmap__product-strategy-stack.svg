<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Product Strategy Stack diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">The Product Strategy Stack</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Five layers — each one builds on the layer below it</text>

  <!-- stacked layers, narrowing toward the top (mission) -->
  <g font-family="sans-serif">
    <!-- Layer 5: Goals (top, narrowest) -->
    <rect x="200" y="66" width="240" height="46" rx="6" fill="#2563eb"/>
    <text x="320" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Product Goals</text>
    <text x="320" y="102" text-anchor="middle" font-size="9.5" fill="#dbe7ff">Outcomes that measure progress · quarterly</text>

    <!-- Layer 4: Roadmap -->
    <rect x="165" y="120" width="310" height="46" rx="6" fill="#3b82f6"/>
    <text x="320" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Product Roadmap</text>
    <text x="320" y="156" text-anchor="middle" font-size="9.5" fill="#e6f0ff">Sequence of features implementing strategy · 6–12 mo</text>

    <!-- Layer 3: Product Strategy (highlighted as the keystone) -->
    <rect x="125" y="174" width="390" height="50" rx="6" fill="#0ea5a4" stroke="#1d2438" stroke-width="1.5"/>
    <text x="320" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Product Strategy</text>
    <text x="320" y="212" text-anchor="middle" font-size="9.5" fill="#d7f5f3">Plan for how the product drives company strategy · 1–2 yr</text>

    <!-- Layer 2: Company Strategy -->
    <rect x="90" y="232" width="460" height="46" rx="6" fill="#5b6680"/>
    <text x="320" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Company Strategy</text>
    <text x="320" y="268" text-anchor="middle" font-size="9.5" fill="#dfe4ef">Logical plan to bring the mission into being · 1–3 yr</text>

    <!-- Layer 1: Mission (base, widest) -->
    <rect x="55" y="286" width="530" height="48" rx="6" fill="#1d2438"/>
    <text x="320" y="307" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Company Mission &amp; Vision</text>
    <text x="320" y="324" text-anchor="middle" font-size="9.5" fill="#c3cbdc">The change you want to bring to the world · aspirational</text>
  </g>

  <!-- builds-on arrow up the side -->
  <g font-family="sans-serif">
    <defs>
      <marker id="up" markerWidth="9" markerHeight="9" refX="4.5" refY="2" orient="auto">
        <path d="M0 9 L4.5 0 L9 9 Z" fill="#f59e0b"/>
      </marker>
    </defs>
    <line x1="600" y1="320" x2="600" y2="92" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#up)"/>
    <text x="612" y="210" text-anchor="middle" font-size="9.5" font-weight="600" fill="#f59e0b" transform="rotate(90 612 210)">each layer is a prerequisite</text>
  </g>

  <!-- footer: traps -->
  <text x="320" y="356" text-anchor="middle" font-size="10" font-weight="700" fill="#ef4444">Common traps:</text>
  <text x="320" y="372" text-anchor="middle" font-size="9.5" fill="#5b6680">Goals = Strategy · Hitting goals = strategic progress · Product = Company strategy · Goal → Roadmap</text>
</svg>
