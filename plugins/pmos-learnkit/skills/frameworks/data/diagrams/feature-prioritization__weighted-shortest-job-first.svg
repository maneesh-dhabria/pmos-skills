<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Weighted Shortest Job First diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Weighted Shortest Job First (WSJF)</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Sequence work by Cost of Delay &#247; Job Size &#8212; short, high-value jobs first</text>

  <!-- Formula -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="320" y="100" font-size="20" font-weight="700" fill="#1d2438">WSJF =</text>
    <line x1="370" y1="92" x2="600" y2="92" stroke="#1d2438" stroke-width="2"/>
    <text x="485" y="84" font-size="15" font-weight="700" fill="#2563eb">Cost of Delay</text>
    <text x="485" y="112" font-size="15" font-weight="700" fill="#f59e0b">Job Size</text>
  </g>

  <!-- CoD components -->
  <text x="24" y="150" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">Cost of Delay = sum of three estimates (each column normalized to smallest = 1)</text>
  <g font-family="sans-serif" font-size="12" text-anchor="middle" fill="#1d2438">
    <rect x="24" y="160" width="172" height="44" rx="8" fill="#eaf0ff" stroke="#cdddff"/>
    <text x="110" y="180" font-weight="700" fill="#2563eb">User / Business value</text>
    <text x="110" y="197" fill="#5b6680" font-size="11">how much is it worth?</text>

    <rect x="214" y="160" width="172" height="44" rx="8" fill="#e7faf9" stroke="#bdeeec"/>
    <text x="300" y="180" font-weight="700" fill="#0ea5a4">Time criticality</text>
    <text x="300" y="197" fill="#5b6680" font-size="11">does value decay fast?</text>

    <rect x="404" y="160" width="172" height="44" rx="8" fill="#fef5e7" stroke="#f6dcab"/>
    <text x="490" y="180" font-weight="700" fill="#f59e0b">Risk / opportunity</text>
    <text x="490" y="197" fill="#5b6680" font-size="11">what does it unlock?</text>
    <text x="600" y="186" font-size="22" font-weight="700" fill="#1d2438">+</text>
  </g>
  <text x="300" y="184" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438" text-anchor="middle"></text>
  <text x="205" y="186" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438" text-anchor="middle">+</text>
  <text x="395" y="186" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438" text-anchor="middle">+</text>

  <!-- Worked table -->
  <g font-family="sans-serif" font-size="12">
    <text x="24" y="240" font-weight="700" fill="#5b6680">Compare jobs &#8594;</text>
    <!-- headers -->
    <text x="150" y="240" text-anchor="middle" fill="#5b6680">CoD</text>
    <text x="250" y="240" text-anchor="middle" fill="#5b6680">Size</text>
    <text x="360" y="240" text-anchor="middle" fill="#5b6680">WSJF</text>
    <text x="520" y="240" text-anchor="middle" fill="#5b6680">Sequence</text>

    <!-- Job A (winner) -->
    <rect x="24" y="250" width="592" height="30" rx="6" fill="#eaf0ff"/>
    <text x="40" y="270" font-weight="700" fill="#1d2438">Job A</text>
    <text x="150" y="270" text-anchor="middle" fill="#1d2438">12</text>
    <text x="250" y="270" text-anchor="middle" fill="#1d2438">3</text>
    <text x="360" y="270" text-anchor="middle" font-weight="700" fill="#2563eb">4.0</text>
    <rect x="476" y="256" width="88" height="18" rx="9" fill="#2563eb"/><text x="520" y="269" text-anchor="middle" fill="#ffffff" font-weight="700">1st</text>

    <!-- Job B -->
    <rect x="24" y="286" width="592" height="30" rx="6" fill="#f4f7ff"/>
    <text x="40" y="306" font-weight="700" fill="#1d2438">Job B</text>
    <text x="150" y="306" text-anchor="middle" fill="#1d2438">10</text>
    <text x="250" y="306" text-anchor="middle" fill="#1d2438">5</text>
    <text x="360" y="306" text-anchor="middle" font-weight="700" fill="#0ea5a4">2.0</text>
    <rect x="476" y="292" width="88" height="18" rx="9" fill="#0ea5a4"/><text x="520" y="305" text-anchor="middle" fill="#ffffff" font-weight="700">2nd</text>

    <!-- Job C -->
    <rect x="24" y="322" width="592" height="30" rx="6" fill="#f4f7ff"/>
    <text x="40" y="342" font-weight="700" fill="#1d2438">Job C</text>
    <text x="150" y="342" text-anchor="middle" fill="#1d2438">8</text>
    <text x="250" y="342" text-anchor="middle" fill="#1d2438">8</text>
    <text x="360" y="342" text-anchor="middle" font-weight="700" fill="#9aa7c2">1.0</text>
    <rect x="476" y="328" width="88" height="18" rx="9" fill="#9aa7c2"/><text x="520" y="341" text-anchor="middle" fill="#ffffff" font-weight="700">3rd</text>
  </g>
  <text x="24" y="376" font-family="sans-serif" font-size="11" fill="#5b6680">Highest WSJF wins &#8212; biggest economic return per unit of effort.</text>
</svg>
