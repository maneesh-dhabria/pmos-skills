<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="5 Planes of User Experience diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Garrett&#8217;s 5 Planes of User Experience</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Stacked layers, each built on the one below &#8212; abstract to concrete</text>

  <!-- abstract/concrete axis -->
  <text x="40" y="90" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Abstract</text>
  <line x1="40" y1="98" x2="40" y2="320" stroke="#5b6680" stroke-width="1.2" marker-end="url(#dn)"/>
  <text x="40" y="338" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Concrete</text>

  <!-- 5 stacked planes, narrowing upward to suggest abstraction at top -->
  <g font-family="sans-serif">
    <!-- Surface (top, concrete) -->
    <rect x="90" y="84" width="460" height="44" rx="6" fill="#2563eb"/>
    <text x="110" y="106" font-size="14" font-weight="700" fill="#ffffff">Surface</text>
    <text x="110" y="121" font-size="10" fill="#dbe4ff">Sensory &amp; visual design, aesthetics, branding</text>

    <rect x="90" y="134" width="460" height="44" rx="6" fill="#0ea5a4"/>
    <text x="110" y="156" font-size="14" font-weight="700" fill="#ffffff">Skeleton</text>
    <text x="110" y="171" font-size="10" fill="#e6fffb">Layout, interface, wireframes &amp; prototypes</text>

    <rect x="90" y="184" width="460" height="44" rx="6" fill="#f59e0b"/>
    <text x="110" y="206" font-size="14" font-weight="700" fill="#ffffff">Structure</text>
    <text x="110" y="221" font-size="10" fill="#fff7e6">Interaction design + information architecture</text>

    <rect x="90" y="234" width="460" height="44" rx="6" fill="#5b6680"/>
    <text x="110" y="256" font-size="14" font-weight="700" fill="#ffffff">Scope</text>
    <text x="110" y="271" font-size="10" fill="#e6e9f0">Features, functions &amp; content &#8212; what we build</text>

    <!-- Strategy (bottom, abstract foundation) -->
    <rect x="90" y="284" width="460" height="46" rx="6" fill="#1d2438"/>
    <text x="110" y="307" font-size="14" font-weight="700" fill="#ffffff">Strategy</text>
    <text x="110" y="322" font-size="10" fill="#cdd3e0">The &#8220;why&#8221; &#8212; business goals &amp; user needs</text>
  </g>

  <!-- builds-on bracket -->
  <text x="575" y="200" font-family="sans-serif" font-size="10" fill="#5b6680" transform="rotate(90 575 200)" text-anchor="middle">each plane builds on the one below</text>

  <defs>
    <marker id="dn" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,0 L6,0 L3,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
