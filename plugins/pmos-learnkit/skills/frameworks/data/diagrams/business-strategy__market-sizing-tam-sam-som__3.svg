<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Bottom-up market sizing heuristic diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Bottom-Up Sizing Heuristic</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">A more useful way to estimate market size</text>

  <!-- Formula chain -->
  <rect x="28" y="92" width="160" height="70" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="108" y="124" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb"># of Customers</text>
  <text x="108" y="146" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">in your defined segment</text>

  <text x="208" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1d2438">&#215;</text>

  <rect x="228" y="92" width="184" height="70" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="124" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Avg. Revenue / Year</text>
  <text x="320" y="146" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">from your core revenue model</text>

  <text x="432" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#1d2438">=</text>

  <rect x="452" y="92" width="160" height="70" rx="10" fill="#2563eb" stroke="#2563eb" stroke-width="1.5"/>
  <text x="532" y="124" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Market Size ($)</text>
  <text x="532" y="146" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#dbe6ff">annual revenue potential</text>

  <!-- Connector down to revenue model detail -->
  <line x1="320" y1="162" x2="320" y2="196" stroke="#0ea5a4" stroke-width="1.5"/>
  <polygon points="320,202 314,192 326,192" fill="#0ea5a4"/>
  <text x="320" y="224" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Pick one core revenue model — keep it simple</text>

  <!-- Revenue model row -->
  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="40" y="244" width="130" height="120" rx="10" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="105" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Subscription</text>
    <text x="105" y="296" text-anchor="middle" font-size="11" fill="#5b6680">price &#215; periods</text>
    <text x="105" y="314" text-anchor="middle" font-size="11" fill="#5b6680">per year</text>

    <rect x="186" y="244" width="130" height="120" rx="10" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="251" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea5a4">Transaction</text>
    <text x="251" y="296" text-anchor="middle" font-size="11" fill="#5b6680">take-rate &#215;</text>
    <text x="251" y="314" text-anchor="middle" font-size="11" fill="#5b6680">spend / customer</text>

    <rect x="332" y="244" width="130" height="120" rx="10" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="397" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">Unit / Product</text>
    <text x="397" y="296" text-anchor="middle" font-size="11" fill="#5b6680">price &#215; units</text>
    <text x="397" y="314" text-anchor="middle" font-size="11" fill="#5b6680">bought / year</text>

    <rect x="478" y="244" width="130" height="120" rx="10" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
    <text x="543" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">Advertising</text>
    <text x="543" y="296" text-anchor="middle" font-size="11" fill="#5b6680">impressions &#215;</text>
    <text x="543" y="314" text-anchor="middle" font-size="11" fill="#5b6680">rate (CPM)</text>
  </g>
  <text x="320" y="384" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#5b6680">Examples — not exhaustive; focus on your primary stream</text>
</svg>
