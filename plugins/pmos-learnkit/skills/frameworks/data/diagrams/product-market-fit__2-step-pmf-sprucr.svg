<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="2-Step PMF (SPRUCR) diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">2-Step PMF (SPRUCR)</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">PMF = Working Product + Great Traction &#8212; &#8220;Nail, then Scale&#8221;</text>

  <!-- Step 1 -->
  <rect x="24" y="74" width="270" height="86" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="40" y="98" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">STEP 1 &#183; NAIL</text>
  <text x="40" y="120" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Product&#8211;Problem Fit</text>
  <text x="40" y="140" font-family="sans-serif" font-size="11" fill="#5b6680">Build an MVP fast, get user</text>
  <text x="40" y="154" font-family="sans-serif" font-size="11" fill="#5b6680">feedback &#8212; ideally get them to pay.</text>

  <!-- arrow -->
  <line x1="298" y1="117" x2="338" y2="117" stroke="#1d2438" stroke-width="2"/>
  <polygon points="338,111 350,117 338,123" fill="#1d2438"/>

  <!-- Step 2 -->
  <rect x="354" y="74" width="262" height="86" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="370" y="98" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">STEP 2 &#183; SCALE</text>
  <text x="370" y="120" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Motion&#8211;Market Fit</text>
  <text x="370" y="140" font-family="sans-serif" font-size="11" fill="#5b6680">Find the GTM motion to take it</text>
  <text x="370" y="154" font-family="sans-serif" font-size="11" fill="#5b6680">efficiently to many customers.</text>

  <!-- SPRUCR band header -->
  <text x="24" y="194" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">SPRUCR &#8212; the scaling motion you must build</text>

  <!-- SPRUCR rows -->
  <g font-family="sans-serif">
    <!-- S -->
    <circle cx="42" cy="222" r="14" fill="#2563eb"/>
    <text x="42" y="227" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
    <text x="66" y="219" font-size="12.5" font-weight="700" fill="#1d2438">Scalable GTM</text>
    <text x="66" y="234" font-size="11" fill="#5b6680">A working playbook you can ramp at will, no scale break.</text>

    <!-- P -->
    <circle cx="42" cy="258" r="14" fill="#2563eb"/>
    <text x="42" y="263" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">P</text>
    <text x="66" y="255" font-size="12.5" font-weight="700" fill="#1d2438">Predictable</text>
    <text x="66" y="270" font-size="11" fill="#5b6680">A clear input&#8211;output ratio: x spend &#8594; y units / conversions.</text>

    <!-- R -->
    <circle cx="42" cy="294" r="14" fill="#2563eb"/>
    <text x="42" y="299" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">R</text>
    <text x="66" y="291" font-size="12.5" font-weight="700" fill="#1d2438">Repeatable</text>
    <text x="66" y="306" font-size="11" fill="#5b6680">Growth keeps coming &#8212; the market is large enough to tap.</text>

    <!-- U -->
    <circle cx="362" cy="222" r="14" fill="#0ea5a4"/>
    <text x="362" y="227" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">U</text>
    <text x="386" y="219" font-size="12.5" font-weight="700" fill="#1d2438">Unit-Positive</text>
    <text x="386" y="234" font-size="11" fill="#5b6680">Revenue covers COGS + cost to acquire that unit.</text>

    <!-- C -->
    <circle cx="362" cy="258" r="14" fill="#0ea5a4"/>
    <text x="362" y="263" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
    <text x="386" y="255" font-size="12.5" font-weight="700" fill="#1d2438">Customer Acquisition</text>
    <text x="386" y="270" font-size="11" fill="#5b6680">Revenue/sales is the ultimate metric &#8212; demand &amp; love.</text>

    <!-- R (high retention) -->
    <circle cx="362" cy="294" r="14" fill="#f59e0b"/>
    <text x="362" y="299" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">R</text>
    <text x="386" y="291" font-size="12.5" font-weight="700" fill="#1d2438">High Retention</text>
    <text x="386" y="306" font-size="11" fill="#5b6680">No PMF without customers who stay and keep buying.</text>
  </g>

  <!-- footer pillars -->
  <line x1="24" y1="328" x2="616" y2="328" stroke="#e2e8f5" stroke-width="1"/>
  <text x="24" y="352" font-family="sans-serif" font-size="11" fill="#5b6680">Also necessary:</text>
  <rect x="120" y="340" width="140" height="20" rx="10" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.8"/>
  <text x="190" y="354" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438" text-anchor="middle">Large enough TAM</text>
  <rect x="272" y="340" width="160" height="20" rx="10" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.8"/>
  <text x="352" y="354" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438" text-anchor="middle">Nail before you Scale</text>
</svg>
