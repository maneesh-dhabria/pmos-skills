<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PLG product growth loop diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">The PLG Product Growth Loop</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Leads are generated by the product itself — usage compounds into new usage.</text>

  <!-- loop arrows (circular flow, clockwise) -->
  <g fill="none" stroke="#2563eb" stroke-width="2.5">
    <path d="M 320 110 A 120 95 0 0 1 432 245" marker-end="url(#ar)"/>
    <path d="M 432 245 A 120 95 0 0 1 320 340" marker-end="url(#ar)"/>
    <path d="M 320 340 A 120 95 0 0 1 208 245" marker-end="url(#ar)"/>
    <path d="M 208 245 A 120 95 0 0 1 320 110" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- four nodes -->
  <g font-family="sans-serif" text-anchor="middle">
    <!-- top: Sign up -->
    <circle cx="320" cy="110" r="46" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="320" y="106" font-size="12" font-weight="700" fill="#1d2438">New user</text>
    <text x="320" y="122" font-size="12" font-weight="700" fill="#1d2438">signs up</text>

    <!-- right: Use product -->
    <circle cx="455" cy="225" r="46" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="455" y="221" font-size="12" font-weight="700" fill="#1d2438">Uses the</text>
    <text x="455" y="237" font-size="12" font-weight="700" fill="#1d2438">product</text>

    <!-- bottom: Invite / value -->
    <circle cx="320" cy="340" r="46" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="336" font-size="12" font-weight="700" fill="#1d2438">Invites others</text>
    <text x="320" y="352" font-size="12" font-weight="700" fill="#1d2438">/ creates value</text>

    <!-- left: Attracts more -->
    <circle cx="185" cy="225" r="46" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="185" y="221" font-size="12" font-weight="700" fill="#1d2438">Attracts</text>
    <text x="185" y="237" font-size="12" font-weight="700" fill="#1d2438">more users</text>
  </g>

  <!-- center label -->
  <text x="320" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">Self-serve</text>
  <text x="320" y="237" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">growth loop</text>

  <text x="320" y="392" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-style="italic" fill="#5b6680">Product = acquisition, activation, retention &amp; monetization channel — minimal human touch.</text>
</svg>
