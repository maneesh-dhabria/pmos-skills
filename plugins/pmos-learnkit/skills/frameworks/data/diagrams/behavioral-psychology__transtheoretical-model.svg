<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Transtheoretical Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Transtheoretical Model</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Stages of Change — match the intervention to where the user is, not where you want them.</text>

  <!-- staged ladder: 5 ascending steps -->
  <!-- Precontemplation -->
  <rect x="32" y="318" width="108" height="54" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="86" y="342" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">1 · Pre-</text>
  <text x="86" y="357" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">contemplation</text>
  <text x="86" y="306" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">"no problem"</text>

  <!-- Contemplation -->
  <rect x="148" y="258" width="108" height="54" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="202" y="289" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">2 · Contemplation</text>
  <text x="202" y="246" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">weighing it</text>

  <!-- Preparation -->
  <rect x="264" y="198" width="108" height="54" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="318" y="229" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">3 · Preparation</text>
  <text x="318" y="186" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">intends soon</text>

  <!-- Action -->
  <rect x="380" y="138" width="108" height="54" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="434" y="169" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">4 · Action</text>
  <text x="434" y="126" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">doing it now</text>

  <!-- Maintenance -->
  <rect x="496" y="78" width="112" height="54" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="552" y="109" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">5 · Maintenance</text>
  <text x="552" y="66" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">sustains it</text>

  <!-- rising arrow -->
  <path d="M86 318 L202 258 L318 198 L434 138 L552 78" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 4"/>

  <!-- relapse loop -->
  <path d="M540 132 C470 230 360 300 260 318" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="392" y="262" font-family="sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">relapse → re-enter at an earlier stage</text>
</svg>
