<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Research by product phase diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="44" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Research by Product Phase</text>
  <text x="32" y="68" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Match the method's purpose to where you are in development</text>

  <!-- timeline arrow -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1d2438"/>
    </marker>
  </defs>
  <line x1="40" y1="118" x2="600" y2="118" stroke="#1d2438" stroke-width="2" marker-end="url(#arr)"/>
  <text x="40" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Early</text>
  <text x="600" y="106" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Late</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <!-- Generative -->
    <rect x="40" y="150" width="172" height="210" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="40" y="150" width="172" height="42" rx="10" fill="#2563eb"/>
    <text x="126" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Generative</text>
    <text x="126" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1d2438">Generate ideas</text>
    <text x="126" y="252" text-anchor="middle" font-size="11" fill="#5b6680">At the beginning,</text>
    <text x="126" y="268" text-anchor="middle" font-size="11" fill="#5b6680">before a design</text>
    <text x="126" y="284" text-anchor="middle" font-size="11" fill="#5b6680">exists — explore</text>
    <text x="126" y="300" text-anchor="middle" font-size="11" fill="#5b6680">the problem space</text>
    <text x="126" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#2563eb">"What should we build?"</text>

    <!-- Formative -->
    <rect x="234" y="150" width="172" height="210" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <rect x="234" y="150" width="172" height="42" rx="10" fill="#0ea5a4"/>
    <text x="320" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Formative</text>
    <text x="320" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1d2438">Improve design</text>
    <text x="320" y="252" text-anchor="middle" font-size="11" fill="#5b6680">During design,</text>
    <text x="320" y="268" text-anchor="middle" font-size="11" fill="#5b6680">iteratively refine</text>
    <text x="320" y="284" text-anchor="middle" font-size="11" fill="#5b6680">and fix usability</text>
    <text x="320" y="300" text-anchor="middle" font-size="11" fill="#5b6680">problems</text>
    <text x="320" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#0ea5a4">"How do we fix it?"</text>

    <!-- Summative -->
    <rect x="428" y="150" width="172" height="210" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="428" y="150" width="172" height="42" rx="10" fill="#f59e0b"/>
    <text x="514" y="178" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Summative</text>
    <text x="514" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#1d2438">Assess outcome</text>
    <text x="514" y="252" text-anchor="middle" font-size="11" fill="#5b6680">Near release,</text>
    <text x="514" y="268" text-anchor="middle" font-size="11" fill="#5b6680">measure against</text>
    <text x="514" y="284" text-anchor="middle" font-size="11" fill="#5b6680">earlier versions</text>
    <text x="514" y="300" text-anchor="middle" font-size="11" fill="#5b6680">or competitors</text>
    <text x="514" y="334" text-anchor="middle" font-size="11" font-style="italic" fill="#f59e0b">"How well does it work?"</text>
  </g>
</svg>
