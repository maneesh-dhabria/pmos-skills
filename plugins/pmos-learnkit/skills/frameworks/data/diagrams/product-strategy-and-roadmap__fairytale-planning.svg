<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Fairytale Planning diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Fairytale Planning</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Map the 5 planning elements onto the universal story arc</text>

  <!-- column headers -->
  <g font-family="sans-serif">
    <text x="155" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">PLANNING ELEMENT</text>
    <text x="470" y="74" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">FAIRYTALE BEAT</text>
  </g>

  <!-- story arc curve through the middle -->
  <path d="M 320 96 C 320 160 320 240 320 360" fill="none" stroke="#5b6680" stroke-width="0" />

  <g font-family="sans-serif">
    <!-- Row 1: Objectives -->
    <rect x="30" y="86" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="44" y="106" font-size="13" font-weight="700" fill="#2563eb">Objectives</text>
    <text x="44" y="122" font-size="10" fill="#5b6680">What we want; what if we don't?</text>
    <circle cx="320" cy="108" r="6" fill="#2563eb"/>
    <rect x="360" y="86" width="250" height="44" rx="6" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="374" y="103" font-size="11" font-style="italic" fill="#1d2438">"Once upon a time… an unsuspecting</text>
    <text x="374" y="118" font-size="11" font-style="italic" fill="#1d2438">hero. Every day, the way things are."</text>

    <!-- Row 2: Obstacles -->
    <rect x="30" y="140" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="44" y="160" font-size="13" font-weight="700" fill="#0ea5a4">Obstacles</text>
    <text x="44" y="176" font-size="10" fill="#5b6680">What stands in our way? (pick 1–3)</text>
    <circle cx="320" cy="162" r="6" fill="#0ea5a4"/>
    <rect x="360" y="140" width="250" height="44" rx="6" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="374" y="157" font-size="11" font-style="italic" fill="#1d2438">"But one day, a change… and so the</text>
    <text x="374" y="172" font-size="11" font-style="italic" fill="#1d2438">adventure begins."</text>

    <!-- Row 3: Actions -->
    <rect x="30" y="194" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="44" y="214" font-size="13" font-weight="700" fill="#2563eb">Actions</text>
    <text x="44" y="230" font-size="10" fill="#5b6680">How we overcome the obstacles</text>
    <circle cx="320" cy="216" r="6" fill="#2563eb"/>
    <rect x="360" y="194" width="250" height="44" rx="6" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="374" y="211" font-size="11" font-style="italic" fill="#1d2438">"It was almost impossible because</text>
    <text x="374" y="226" font-size="11" font-style="italic" fill="#1d2438">of the challenges…"</text>

    <!-- Row 4: Measures -->
    <rect x="30" y="248" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="44" y="268" font-size="13" font-weight="700" fill="#0ea5a4">Measures</text>
    <text x="44" y="284" font-size="10" fill="#5b6680">How we'll know we've succeeded</text>
    <circle cx="320" cy="270" r="6" fill="#0ea5a4"/>
    <rect x="360" y="248" width="250" height="44" rx="6" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="374" y="265" font-size="11" font-style="italic" fill="#1d2438">"…until finally, victory."</text>
    <text x="374" y="282" font-size="10" fill="#5b6680">clear quantifiable victory point</text>

    <!-- Row 5: Not Doing -->
    <rect x="30" y="302" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="44" y="322" font-size="13" font-weight="700" fill="#ef4444">Not Doing</text>
    <text x="44" y="338" font-size="10" fill="#5b6680">What we chose to skip to get here</text>
    <circle cx="320" cy="324" r="6" fill="#ef4444"/>
    <rect x="360" y="302" width="250" height="44" rx="6" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="374" y="319" font-size="11" font-style="italic" fill="#1d2438">"And forever after, the world</text>
    <text x="374" y="334" font-size="11" font-style="italic" fill="#1d2438">is different."</text>

    <!-- vertical spine connecting story dots -->
    <line x1="320" y1="108" x2="320" y2="324" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2 5"/>
    <polygon points="320,332 315,322 325,322" fill="#f59e0b"/>

    <text x="320" y="368" text-anchor="middle" font-size="11" fill="#5b6680">A plan that reads like a story is a plan people remember</text>
  </g>
</svg>
