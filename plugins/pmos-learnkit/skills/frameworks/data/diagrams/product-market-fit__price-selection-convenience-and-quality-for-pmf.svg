<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Price Selection Convenience and Quality for PMF diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Price · Selection · Convenience · Quality for PMF</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">4 value vectors × 2 approaches → 10x differentiation to find PMF</text>

  <!-- column headers -->
  <text x="386" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">Solve a problem</text>
  <text x="540" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">Create delight</text>

  <!-- row: Pricing -->
  <g>
    <rect x="24" y="104" width="280" height="60" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="40" y="130" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Pricing</text>
    <text x="40" y="150" font-family="sans-serif" font-size="11" fill="#5b6680">Same problem — lower the price barrier</text>
    <rect x="312" y="104" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="386" y="138" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">unbundle / scale /</text>
    <text x="386" y="152" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">cut supply cost</text>
    <rect x="466" y="104" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="540" y="138" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">cheap trial SKU /</text>
    <text x="540" y="152" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">new price model</text>
  </g>

  <!-- row: Selection -->
  <g>
    <rect x="24" y="172" width="280" height="60" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="40" y="198" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Selection</text>
    <text x="40" y="218" font-family="sans-serif" font-size="11" fill="#5b6680">Same price — better alternates / choice</text>
    <rect x="312" y="172" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="386" y="206" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">new ingredients /</text>
    <text x="386" y="220" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">tech substitute</text>
    <rect x="466" y="172" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="540" y="206" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">new buying construct /</text>
    <text x="540" y="220" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">flexible bundles</text>
  </g>

  <!-- row: Convenience -->
  <g>
    <rect x="24" y="240" width="280" height="60" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="40" y="266" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Convenience</text>
    <text x="40" y="286" font-family="sans-serif" font-size="11" fill="#5b6680">Same offer — remove friction / steps</text>
    <rect x="312" y="240" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="386" y="274" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">fewer steps /</text>
    <text x="386" y="288" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">less time</text>
    <rect x="466" y="240" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="540" y="281" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">instant gratification</text>
  </g>

  <!-- row: Quality -->
  <g>
    <rect x="24" y="308" width="280" height="60" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="40" y="334" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Quality</text>
    <text x="40" y="354" font-family="sans-serif" font-size="11" fill="#5b6680">Same offer — more trust / guarantees</text>
    <rect x="312" y="308" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="386" y="342" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">defined standards /</text>
    <text x="386" y="356" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">reliability</text>
    <rect x="466" y="308" width="148" height="60" rx="8" fill="#ffffff" stroke="#c3cfe6" stroke-width="1"/>
    <text x="540" y="342" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">guarantees /</text>
    <text x="540" y="356" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">curated best-only</text>
  </g>

  <text x="24" y="390" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680">Differentiation must be ~10x and compelling enough for users to try, stay, and pay.</text>
</svg>
