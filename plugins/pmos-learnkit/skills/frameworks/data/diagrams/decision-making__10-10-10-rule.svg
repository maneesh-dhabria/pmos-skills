<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="10/10/10 Rule diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">10/10/10 Rule</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Three emotional-distance horizons on one choice</text>

  <!-- horizon 1: 10 minutes -->
  <g>
    <rect x="40" y="92" width="170" height="250" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
    <circle cx="125" cy="138" r="26" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <text x="125" y="145" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#ef4444">10m</text>
    <text x="125" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">10 Minutes</text>
    <text x="125" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Immediate</text>
    <text x="125" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">gut &amp; emotion</text>
    <text x="125" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Relief? Fear?</text>
    <text x="125" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Awkwardness?</text>
  </g>

  <!-- horizon 2: 10 months -->
  <g>
    <rect x="235" y="92" width="170" height="250" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="320" cy="138" r="26" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="320" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#f59e0b">10mo</text>
    <text x="320" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">10 Months</text>
    <text x="320" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Medium-term</text>
    <text x="320" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">fallout</text>
    <text x="320" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Lived-with</text>
    <text x="320" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">consequences</text>
  </g>

  <!-- horizon 3: 10 years -->
  <g>
    <rect x="430" y="92" width="170" height="250" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="515" cy="138" r="26" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="515" y="145" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="700" fill="#0ea5a4">10y</text>
    <text x="515" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">10 Years</text>
    <text x="515" y="220" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Long-term</text>
    <text x="515" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">values</text>
    <text x="515" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Who you</text>
    <text x="515" y="292" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">want to be</text>
  </g>

  <!-- arrow across horizons -->
  <line x1="60" y1="358" x2="568" y2="358" stroke="#2563eb" stroke-width="2"/>
  <polygon points="568,358 558,353 558,363" fill="#2563eb"/>
  <text x="320" y="382" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#2563eb">Does short-term emotion override long-term values?</text>
</svg>
