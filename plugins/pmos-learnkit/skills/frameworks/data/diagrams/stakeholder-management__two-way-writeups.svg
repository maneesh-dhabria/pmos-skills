<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Two-Way Writeups diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Two-Way Writeups</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">How work gets presented &amp; discussed — an evolution in 3 phases</text>

  <!-- Step ladder rising left to right -->
  <!-- Phase 1 -->
  <rect x="30" y="250" width="180" height="120" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="120" y="276" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">PHASE 1 · 1980s</text>
  <text x="120" y="298" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Presentation</text>
  <text x="120" y="320" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Slides (PowerPoint).</text>
  <text x="120" y="336" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Clear story, but the</text>
  <text x="120" y="350" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">audience drifts.</text>

  <!-- Phase 2 -->
  <rect x="230" y="190" width="180" height="180" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="216" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">PHASE 2</text>
  <text x="320" y="236" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">One-Way Writeups</text>
  <text x="320" y="256" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Docs &amp; memos for comment.</text>
  <text x="320" y="278" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Drawbacks:</text>
  <text x="320" y="296" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">• don't know who read it</text>
  <text x="320" y="312" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">• feedback unstructured</text>
  <text x="320" y="328" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">• key questions buried</text>

  <!-- Phase 3 -->
  <rect x="430" y="110" width="180" height="260" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="1.5"/>
  <text x="520" y="136" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#dbe6ff">PHASE 3 · today</text>
  <text x="520" y="156" text-anchor="middle" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#ffffff">Two-Way Writeups</text>
  <text x="520" y="176" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">Treat the doc as a</text>
  <text x="520" y="190" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">guided conversation.</text>
  <text x="520" y="214" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ffffff">Tactics:</text>
  <text x="520" y="234" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">✓ Done-reading signal</text>
  <text x="520" y="254" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">✓ Structured pulse</text>
  <text x="520" y="272" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">  feedback</text>
  <text x="520" y="292" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">✓ Upvoted question</text>
  <text x="520" y="310" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">  table (Dory)</text>

  <!-- Upward arrows between steps -->
  <path d="M212 250 L228 210" stroke="#1d2438" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M412 190 L428 150" stroke="#1d2438" stroke-width="2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#1d2438"/>
    </marker>
  </defs>
</svg>
