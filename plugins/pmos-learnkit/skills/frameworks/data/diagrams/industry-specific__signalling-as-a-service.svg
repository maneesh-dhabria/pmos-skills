<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Signalling as a Service diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Signalling as a Service</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Free distribution, paid amplification</text>

  <!-- Stage 1: Message -->
  <rect x="32" y="92" width="170" height="150" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="117" y="120" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">1 · Signal Message</text>
  <text x="117" y="146" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1d2438">What you convey</text>
  <text x="117" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">"I am wealthy /</text>
  <text x="117" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">part of this tribe"</text>
  <text x="117" y="222" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680" font-style="italic">e.g. a Rolex watch</text>

  <!-- Stage 2: Distribution (FREE) -->
  <rect x="235" y="92" width="170" height="150" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="120" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">2 · Distribution</text>
  <text x="320" y="146" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1d2438">Reach others at scale</text>
  <text x="320" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Social feeds, likes,</text>
  <text x="320" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">views, comments</text>
  <rect x="270" y="208" width="100" height="22" rx="11" fill="#0ea5a4"/>
  <text x="320" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">FREE</text>

  <!-- Stage 3: Amplification (PAID) -->
  <rect x="438" y="92" width="170" height="150" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="523" y="120" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">3 · Amplification</text>
  <text x="523" y="146" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1d2438">Stand out of crowd</text>
  <text x="523" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Boost, Super Likes,</text>
  <text x="523" y="194" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">preferential reach</text>
  <rect x="473" y="208" width="100" height="22" rx="11" fill="#f59e0b"/>
  <text x="523" y="223" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">PAID</text>

  <!-- arrows -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <line x1="204" y1="167" x2="231" y2="167" stroke="#5b6680" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="407" y1="167" x2="434" y2="167" stroke="#5b6680" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- monetization band -->
  <rect x="32" y="276" width="576" height="92" rx="10" fill="#ffffff" stroke="#5b6680" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="320" y="300" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Where the money is</text>
  <text x="320" y="324" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">Software gives distribution away free — it can't monetize the hidden signal.</text>
  <text x="320" y="344" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">Revenue comes from users who pay to <tspan fill="#f59e0b" font-weight="700">amplify</tspan> and outcompete status rivals.</text>
  <text x="320" y="362" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680" font-style="italic">Julian Lehr</text>
</svg>
