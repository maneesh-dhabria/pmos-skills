<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Social Communication Map diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Social Communication Map</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Content source × sorting algorithm — Ben Thompson</text>

  <!-- axis labels -->
  <text x="330" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Sorting algorithm</text>
  <text x="150" y="396" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Chronological</text>
  <text x="510" y="396" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Algorithmic</text>

  <text x="22" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" transform="rotate(-90 22 206)">Content source</text>
  <text x="44" y="100" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680" transform="rotate(-90 44 100)">UGC (network)</text>
  <text x="44" y="312" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680" transform="rotate(-90 44 312)">Network (follow)</text>

  <!-- quadrants -->
  <!-- top-left: UGC + chronological -->
  <rect x="62" y="72" width="248" height="135" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="186" y="98" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#2563eb">Early web · search</text>
  <text x="186" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Decentralised UGC,</text>
  <text x="186" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">aggregated by search</text>
  <text x="186" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Google</text>

  <!-- top-right: UGC + algorithmic -->
  <rect x="310" y="72" width="248" height="135" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="434" y="98" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ef4444">The final stage</text>
  <text x="434" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Content from anywhere,</text>
  <text x="434" y="138" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">governed by the algorithm</text>
  <text x="434" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">TikTok</text>

  <!-- bottom-left: network + chronological -->
  <rect x="62" y="207" width="248" height="135" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="186" y="233" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0ea5a4">Your network, in order</text>
  <text x="186" y="257" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">One site holds your feed,</text>
  <text x="186" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">shown chronologically</text>
  <text x="186" y="313" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Early Facebook</text>

  <!-- bottom-right: network + algorithmic -->
  <rect x="310" y="207" width="248" height="135" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="434" y="233" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#f59e0b">Network, ranked</text>
  <text x="434" y="257" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Feed of people you follow,</text>
  <text x="434" y="273" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">ordered by the algorithm</text>
  <text x="434" y="313" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Facebook feed</text>

  <!-- center note on public/private layer -->
  <rect x="250" y="190" width="120" height="34" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="310" y="205" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-weight="700" fill="#2563eb">3rd layer:</text>
  <text x="310" y="217" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#5b6680">public vs private</text>
</svg>
