<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="The Working Genius diagram">
<rect width="640" height="400" fill="#ffffff"/>
<text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">The Working Genius (WIDGET)</text>
<text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Six types of work across the ideation-to-completion arc</text>

<!-- arc lane -->
<line x1="60" y1="120" x2="600" y2="120" stroke="#5b6680" stroke-width="1.5"/>
<text x="60" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">IDEATION</text>
<text x="288" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">ACTIVATION</text>
<text x="486" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">IMPLEMENTATION</text>

<!-- six nodes -->
<g font-family="sans-serif">
<circle cx="90" cy="120" r="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
<text x="90" y="126" font-size="18" font-weight="700" fill="#2563eb" text-anchor="middle">W</text>
<text x="90" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Wonder</text>
<text x="90" y="188" font-size="10" fill="#5b6680" text-anchor="middle">ask why</text>

<circle cx="192" cy="120" r="22" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
<text x="192" y="126" font-size="18" font-weight="700" fill="#2563eb" text-anchor="middle">I</text>
<text x="192" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Invention</text>
<text x="192" y="188" font-size="10" fill="#5b6680" text-anchor="middle">new ideas</text>

<circle cx="294" cy="120" r="22" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
<text x="294" y="126" font-size="18" font-weight="700" fill="#0ea5a4" text-anchor="middle">D</text>
<text x="294" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Discernment</text>
<text x="294" y="188" font-size="10" fill="#5b6680" text-anchor="middle">judge fit</text>

<circle cx="396" cy="120" r="22" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
<text x="396" y="126" font-size="18" font-weight="700" fill="#0ea5a4" text-anchor="middle">G</text>
<text x="396" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Galvanizing</text>
<text x="396" y="188" font-size="10" fill="#5b6680" text-anchor="middle">rally action</text>

<circle cx="498" cy="120" r="22" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
<text x="498" y="126" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">E</text>
<text x="498" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Enablement</text>
<text x="498" y="188" font-size="10" fill="#5b6680" text-anchor="middle">help others</text>

<circle cx="600" cy="120" r="22" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
<text x="600" y="126" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">T</text>
<text x="600" y="172" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Tenacity</text>
<text x="600" y="188" font-size="10" fill="#5b6680" text-anchor="middle">finish it</text>
</g>

<!-- per-person mapping legend -->
<rect x="32" y="230" width="576" height="138" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
<text x="48" y="256" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Each person maps all six into three bands:</text>

<circle cx="60" cy="288" r="9" fill="#2563eb"/>
<text x="80" y="293" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">2 Geniuses</text>
<text x="200" y="293" font-family="sans-serif" font-size="12" fill="#5b6680">— give energy &amp; joy; assign work here</text>

<circle cx="60" cy="318" r="9" fill="#f59e0b"/>
<text x="80" y="323" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">2 Competencies</text>
<text x="200" y="323" font-family="sans-serif" font-size="12" fill="#5b6680">— can do, neither love nor hate; rationed</text>

<circle cx="60" cy="348" r="9" fill="#ef4444"/>
<text x="80" y="353" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">2 Frustrations</text>
<text x="200" y="353" font-family="sans-serif" font-size="12" fill="#5b6680">— drain energy; avoid or offload</text>
</svg>
