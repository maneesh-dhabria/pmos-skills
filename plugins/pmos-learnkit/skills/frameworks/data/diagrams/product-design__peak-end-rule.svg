<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Peak-End Rule diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Peak-End Rule</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Memory weights the most intense moment and the ending — not the average.</text>

  <!-- axes -->
  <line x1="70" y1="320" x2="600" y2="320" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="70" y1="90" x2="70" y2="320" stroke="#5b6680" stroke-width="1.5"/>
  <text x="40" y="100" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(-90 40 100)">felt intensity</text>
  <text x="300" y="345" font-family="sans-serif" font-size="11" fill="#5b6680">time / duration (largely ignored)</text>

  <!-- experience curve -->
  <polyline points="70,300 130,260 190,150 230,110 270,200 330,240 400,230 470,250 540,180 600,140"
    fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- average line -->
  <line x1="70" y1="225" x2="600" y2="225" stroke="#5b6680" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="475" y="219" font-family="sans-serif" font-size="11" fill="#5b6680">average (discarded)</text>

  <!-- peak marker -->
  <circle cx="230" cy="110" r="8" fill="#ef4444"/>
  <text x="230" y="96" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">PEAK</text>
  <text x="230" y="82" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">most intense moment</text>

  <!-- end marker -->
  <circle cx="600" cy="140" r="8" fill="#0ea5a4"/>
  <text x="600" y="126" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="end">END</text>
  <text x="600" y="112" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">final moment</text>

  <!-- remembered value box -->
  <rect x="160" y="358" width="320" height="30" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <text x="320" y="378" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">remembered = (peak + end) ÷ 2</text>
</svg>
