<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="A/B Testing diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">A/B Testing</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Statistical significance: your conclusion vs. reality</text>

  <!-- axis labels -->
  <text x="240" y="96" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">REALITY</text>
  <text x="365" y="120" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">No real effect</text>
  <text x="525" y="120" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Real effect exists</text>

  <g transform="rotate(-90 120 240)">
    <text x="120" y="240" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">YOUR CONCLUSION</text>
  </g>
  <text x="150" y="200" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="end">Declare
    <tspan x="150" dy="15">"no effect"</tspan></text>
  <text x="150" y="305" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="end">Declare
    <tspan x="150" dy="15">"winner"</tspan></text>

  <!-- quadrants -->
  <rect x="285" y="135" width="160" height="105" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="365" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">Correct</text>
  <text x="365" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">true negative</text>

  <rect x="450" y="135" width="160" height="105" rx="8" fill="#fef2f2" stroke="#f59e0b" stroke-width="2"/>
  <text x="530" y="172" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">Type II error</text>
  <text x="530" y="192" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">false negative</text>
  <text x="530" y="208" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">missed a real win (&#946;)</text>

  <rect x="285" y="245" width="160" height="105" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="365" y="282" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">Type I error</text>
  <text x="365" y="302" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">false positive</text>
  <text x="365" y="318" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">false alarm (&#945;)</text>

  <rect x="450" y="245" width="160" height="105" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="530" y="288" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">Correct</text>
  <text x="530" y="310" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">true positive (power)</text>

  <text x="32" y="385" font-family="sans-serif" font-size="11" fill="#5b6680">Disprove the null hypothesis &#8226; outcomes: positive / negative / null &#8226; frequentist or Bayesian</text>
</svg>
