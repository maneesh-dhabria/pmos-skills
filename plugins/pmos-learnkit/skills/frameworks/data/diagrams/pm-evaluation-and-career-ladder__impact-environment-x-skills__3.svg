<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Skills four areas and IC to manager shift diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="bold" fill="#1d2438">Skills — within your control</text>
  <text x="320" y="50" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b6680">Four areas; their weight shifts as you move from IC to senior management</text>

  <!-- axis arrow IC -> Manager -->
  <line x1="150" y1="80" x2="610" y2="80" stroke="#1d2438" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1d2438"/>
    </marker>
  </defs>
  <text x="150" y="74" text-anchor="start" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#5b6680">IC</text>
  <text x="600" y="74" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#5b6680">Senior management</text>
  <text x="20" y="84" text-anchor="start" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Career stage →</text>

  <!-- four rows, each a tapering/growing bar to show shift -->
  <!-- Execution: heavy at IC, lighter at manager -->
  <rect x="150" y="100" width="130" height="30" rx="5" fill="#2563eb"/>
  <rect x="280" y="106" width="330" height="18" rx="5" fill="#cfe0ff"/>
  <text x="150" y="120" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff">  Execution</text>
  <text x="450" y="118" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">core of the role → judged on team's, not your own</text>

  <!-- Communication: grows -->
  <rect x="150" y="150" width="200" height="30" rx="5" fill="#0ea5a4"/>
  <rect x="350" y="156" width="260" height="18" rx="5" fill="#bdeeec"/>
  <text x="150" y="170" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#ffffff">  Communication</text>
  <text x="475" y="168" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">how / what / to whom — widens with seniority</text>

  <!-- Influence/Leadership: grows strongly -->
  <rect x="150" y="200" width="120" height="30" rx="5" fill="#bfe7ff"/>
  <rect x="270" y="200" width="340" height="30" rx="5" fill="#f59e0b"/>
  <text x="150" y="220" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1d2438">  Influence /</text>
  <text x="150" y="246" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1d2438">  Leadership</text>
  <text x="440" y="219" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">direct team → indirect influence across the company</text>

  <!-- Strategic Thinking: grows strongly -->
  <rect x="150" y="266" width="100" height="30" rx="5" fill="#cfe0ff"/>
  <rect x="250" y="266" width="360" height="30" rx="5" fill="#2563eb"/>
  <text x="150" y="286" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="bold" fill="#1d2438">  Strategic</text>
  <text x="430" y="285" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#ffffff">do the work → anticipate the work, see the bigger system</text>

  <!-- legend -->
  <rect x="150" y="330" width="14" height="14" rx="3" fill="#2563eb"/>
  <text x="170" y="342" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">primary weight at this stage</text>
  <rect x="360" y="330" width="14" height="14" rx="3" fill="#cfe0ff"/>
  <text x="380" y="342" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">still present, lower emphasis</text>

  <text x="320" y="372" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438" font-weight="bold">Execution is the pre-requisite; influence &amp; strategy carry the most weight as you advance.</text>
</svg>
