<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Customer Journey Mapping diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Customer Journey Mapping</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11.5" fill="#5b6680">Actor + scenario across phases — actions, mindsets &amp; an emotion line surface opportunities</text>

  <!-- Header band: actor + scenario -->
  <rect x="24" y="58" width="592" height="30" rx="6" fill="#1d2438"/>
  <text x="36" y="78" font-family="sans-serif" font-size="11" fill="#dbeafe"><tspan font-weight="700" fill="#ffffff">Actor:</tspan> car shopper   ·   <tspan font-weight="700" fill="#ffffff">Scenario + Expectations:</tspan> buy a new car, easily find info to decide</text>

  <!-- Phase columns -->
  <g font-family="sans-serif">
    <!-- row label column -->
    <rect x="24" y="96" width="92" height="200" fill="#ffffff"/>
    <text x="30" y="128" font-size="9.5" font-weight="700" fill="#5b6680">PHASES</text>
    <text x="30" y="168" font-size="9.5" font-weight="700" fill="#2563eb">ACTIONS</text>
    <text x="30" y="216" font-size="9.5" font-weight="700" fill="#0ea5a4">MINDSETS</text>
    <text x="30" y="270" font-size="9.5" font-weight="700" fill="#f59e0b">EMOTION</text>
  </g>

  <!-- 5 phase columns -->
  <g font-family="sans-serif">
    <!-- column backgrounds -->
    <rect x="120" y="96" width="96" height="200" rx="4" fill="#f4f7ff"/>
    <rect x="220" y="96" width="96" height="200" rx="4" fill="#ffffff"/>
    <rect x="320" y="96" width="96" height="200" rx="4" fill="#f4f7ff"/>
    <rect x="420" y="96" width="96" height="200" rx="4" fill="#ffffff"/>
    <rect x="520" y="96" width="96" height="200" rx="4" fill="#f4f7ff"/>

    <!-- phase titles -->
    <rect x="120" y="100" width="96" height="22" rx="4" fill="#2563eb"/><text x="168" y="115" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Engage</text>
    <rect x="220" y="100" width="96" height="22" rx="4" fill="#2563eb"/><text x="268" y="115" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Educate</text>
    <rect x="320" y="100" width="96" height="22" rx="4" fill="#2563eb"/><text x="368" y="115" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Research</text>
    <rect x="420" y="100" width="96" height="22" rx="4" fill="#2563eb"/><text x="468" y="115" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Evaluate</text>
    <rect x="520" y="100" width="96" height="22" rx="4" fill="#2563eb"/><text x="568" y="115" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">Justify</text>

    <!-- actions row -->
    <g font-size="8.5" fill="#1d2438" text-anchor="middle">
      <text x="168" y="156">sees an ad</text><text x="168" y="167">visits site</text>
      <text x="268" y="156">reads specs</text><text x="268" y="167">watches reviews</text>
      <text x="368" y="156">compares</text><text x="368" y="167">checks price</text>
      <text x="468" y="156">test drives</text><text x="468" y="167">negotiates</text>
      <text x="568" y="156">confirms</text><text x="568" y="167">tells friends</text>
    </g>

    <!-- mindsets row -->
    <g font-size="8.5" fill="#0e7490" text-anchor="middle" font-style="italic">
      <text x="168" y="200">"is this for me?"</text>
      <text x="268" y="200">"what fits my</text><text x="268" y="211">budget?"</text>
      <text x="368" y="200">"best value?"</text>
      <text x="468" y="200">"can I trust</text><text x="468" y="211">this dealer?"</text>
      <text x="568" y="200">"did I choose</text><text x="568" y="211">well?"</text>
    </g>
  </g>

  <!-- Emotion line -->
  <g>
    <polyline points="168,250 268,266 368,278 468,256 568,238" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <circle cx="168" cy="250" r="4" fill="#f59e0b"/>
    <circle cx="268" cy="266" r="4" fill="#f59e0b"/>
    <circle cx="368" cy="278" r="4" fill="#ef4444"/>
    <circle cx="468" cy="256" r="4" fill="#f59e0b"/>
    <circle cx="568" cy="238" r="4" fill="#0ea5a4"/>
    <text x="364" y="294" font-family="sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">low point</text>
  </g>

  <!-- Opportunities footer -->
  <rect x="24" y="312" width="592" height="58" rx="6" fill="#ecfdf5"/>
  <text x="36" y="332" font-family="sans-serif" font-size="11" font-weight="700" fill="#0e7490">OPPORTUNITIES — takeaways from the map</text>
  <text x="36" y="350" font-family="sans-serif" font-size="10" fill="#1d2438">Smooth the Research low point: a clear value comparison tool.   ·   Owner: PM   ·   Metric: research-to-evaluate rate</text>
  <text x="36" y="364" font-family="sans-serif" font-size="9" fill="#5b6680">Where the user dips emotionally is where the biggest UX opportunity lives.</text>
</svg>
