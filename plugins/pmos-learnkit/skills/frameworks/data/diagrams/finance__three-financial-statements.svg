<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three Financial Statements diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Three Financial Statements</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">Three views of one company: what it earned, what it&#8217;s worth, and where its cash moved.</text>

  <!-- Panel 1: Income Statement -->
  <rect x="24" y="76" width="186" height="252" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="24" y="76" width="186" height="44" rx="10" fill="#2563eb"/>
  <text x="117" y="98" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Income Statement</text>
  <text x="117" y="114" font-family="sans-serif" font-size="10.5" fill="#dbe6ff" text-anchor="middle">over a period</text>
  <text x="117" y="146" font-family="sans-serif" font-size="12" font-style="italic" fill="#2563eb" text-anchor="middle">&#8220;How did we earn?&#8221;</text>
  <g font-family="sans-serif" font-size="12" fill="#1d2438">
    <text x="40" y="180">Revenue</text>
    <text x="40" y="206">&#8722; Expenses</text>
    <line x1="40" y1="216" x2="194" y2="216" stroke="#5b6680" stroke-width="0.8"/>
    <text x="40" y="240" font-weight="700">= Net income</text>
  </g>
  <text x="117" y="306" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">profit after</text>
  <text x="117" y="320" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">all the bills</text>

  <!-- Panel 2: Balance Sheet -->
  <rect x="227" y="76" width="186" height="252" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <rect x="227" y="76" width="186" height="44" rx="10" fill="#0ea5a4"/>
  <text x="320" y="98" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Balance Sheet</text>
  <text x="320" y="114" font-family="sans-serif" font-size="10.5" fill="#d2f4f3" text-anchor="middle">at a point in time</text>
  <text x="320" y="146" font-family="sans-serif" font-size="12" font-style="italic" fill="#0ea5a4" text-anchor="middle">&#8220;What are we worth?&#8221;</text>
  <g font-family="sans-serif" font-size="12" fill="#1d2438">
    <text x="243" y="180">Assets (owns)</text>
    <text x="243" y="206">= Liabilities (owes)</text>
    <text x="243" y="228">+ Equity (invested)</text>
  </g>
  <text x="320" y="306" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">snapshot of</text>
  <text x="320" y="320" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">overall wealth</text>

  <!-- Panel 3: Cash Flow -->
  <rect x="430" y="76" width="186" height="252" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="430" y="76" width="186" height="44" rx="10" fill="#f59e0b"/>
  <text x="523" y="98" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#ffffff" text-anchor="middle">Cash Flow</text>
  <text x="523" y="114" font-family="sans-serif" font-size="10.5" fill="#fff1d6" text-anchor="middle">over a period</text>
  <text x="523" y="146" font-family="sans-serif" font-size="12" font-style="italic" fill="#d98a08" text-anchor="middle">&#8220;Where did cash go?&#8221;</text>
  <g font-family="sans-serif" font-size="12" fill="#1d2438">
    <text x="446" y="180">+ from operations</text>
    <text x="446" y="206">+/&#8722; investing</text>
    <text x="446" y="228">+/&#8722; financing</text>
  </g>
  <text x="523" y="306" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">cash on hand to</text>
  <text x="523" y="320" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">pay bills &amp; invest</text>

  <!-- linking arrows: net income -> balance sheet equity; cash -> balance sheet -->
  <line x1="210" y1="234" x2="227" y2="234" stroke="#5b6680" stroke-width="1.5"/>
  <polygon points="227,234 220,231 220,237" fill="#5b6680"/>
  <line x1="430" y1="202" x2="413" y2="202" stroke="#5b6680" stroke-width="1.5"/>
  <polygon points="413,202 420,199 420,205" fill="#5b6680"/>

  <text x="320" y="356" font-family="sans-serif" font-size="11.5" fill="#5b6680" text-anchor="middle">The statements interlock: net income flows into equity; cash ties back to the balance sheet.</text>
  <text x="320" y="382" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" font-style="italic">Read together, they tell the whole financial story.</text>
</svg>
