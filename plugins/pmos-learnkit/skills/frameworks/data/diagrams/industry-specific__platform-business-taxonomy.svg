<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Platform Business Taxonomy diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Platform Business Taxonomy</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Roger Martin's spectrum: how much the platform makes, x physical vs. digital</text>

  <!-- spectrum arrow under header -->
  <line x1="120" y1="74" x2="620" y2="74" stroke="#2563eb" stroke-width="2"/>
  <path d="M620 74 l-10 -5 v10 z" fill="#2563eb"/>
  <text x="120" y="68" font-family="sans-serif" font-size="10" fill="#5b6680">just connect</text>
  <text x="540" y="68" font-family="sans-serif" font-size="10" fill="#5b6680">make most / all</text>

  <!-- column headers (5 stages) -->
  <!-- 5 cols from x=120 width 100 each: 120,220,320,420,520 -->
  <g font-family="sans-serif" font-size="10" font-weight="700" fill="#1d2438" text-anchor="middle">
    <text x="170" y="92">Just Connect</text>
    <text x="270" y="92">Connect +</text><text x="270" y="103">Insights</text>
    <text x="370" y="92">Procure &amp; Sell</text>
    <text x="470" y="92">Make Key Piece</text>
    <text x="570" y="92">Make Most/All</text>
  </g>

  <!-- row labels -->
  <text x="20" y="160" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Physical</text>
  <text x="20" y="260" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Digital</text>

  <!-- Physical row cells y=115 h=90 -->
  <g font-family="sans-serif" font-size="9.5" fill="#1d2438">
    <rect x="120" y="115" width="100" height="90" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
    <text x="128" y="135">Charge cards</text><text x="128" y="149">Stock exchanges</text><text x="128" y="163">Telephone</text>

    <rect x="220" y="115" width="100" height="90" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
    <text x="228" y="135">American</text><text x="228" y="149">Express</text>

    <rect x="320" y="115" width="100" height="90" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
    <text x="328" y="135">Physical retail</text><text x="328" y="149">(buy + resell)</text>

    <rect x="420" y="115" width="100" height="90" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
    <text x="428" y="135">Newspapers</text><text x="428" y="149">Magazines, TV</text>

    <rect x="520" y="115" width="100" height="90" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
    <text x="528" y="135">Makers that</text><text x="528" y="149">modify goods</text><text x="528" y="163">they buy</text>
  </g>

  <!-- Digital row cells y=215 h=90 -->
  <g font-family="sans-serif" font-size="9.5" fill="#ffffff">
    <rect x="120" y="215" width="100" height="90" fill="#2563eb" stroke="#1d2438" stroke-width="0.6"/>
    <text x="128" y="235">eBay, Uber</text><text x="128" y="249">Airbnb, YouTube</text><text x="128" y="263">Amazon Mktpl.</text>

    <rect x="220" y="215" width="100" height="90" fill="#2563eb" stroke="#1d2438" stroke-width="0.6"/>
    <text x="228" y="235">Facebook</text><text x="228" y="249">TikTok</text>

    <rect x="320" y="215" width="100" height="90" fill="#2563eb" stroke="#1d2438" stroke-width="0.6"/>
    <text x="328" y="235">Amazon</text><text x="328" y="249">(infinite aisle</text><text x="328" y="263">to delivery)</text>

    <rect x="420" y="215" width="100" height="90" fill="#2563eb" stroke="#1d2438" stroke-width="0.6"/>
    <text x="428" y="235">Google</text><text x="428" y="249">iPhone +</text><text x="428" y="263">App Store</text>

    <rect x="520" y="215" width="100" height="90" fill="#2563eb" stroke="#1d2438" stroke-width="0.6"/>
    <text x="528" y="235">Microsoft, SAP</text><text x="528" y="249">Oracle</text>
  </g>

  <text x="24" y="340" font-family="sans-serif" font-size="11" fill="#5b6680">Thin "just-connect" value erodes; moving right (and combining digital + physical) earns the most durable position.</text>
</svg>
