<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Binstack Decisions diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Binstack Decisions</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Binary materiality + stack-ranked attributes &#8594; eliminate until one survives</text>

  <!-- Grid: attributes (rows, top = most important) x options P Q R -->
  <!-- column headers -->
  <text x="300" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">P</text>
  <text x="390" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Q</text>
  <text x="480" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">R</text>
  <text x="140" y="68" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">attributes (ranked)</text>
  <text x="140" y="80" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">&#9650; most important</text>

  <!-- Row 1: Revenue (top) -->
  <rect x="40" y="92" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="135" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">1. Revenue</text>
  <text x="135" y="129" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">material = +10% bump</text>
  <circle cx="300" cy="115" r="13" fill="#0ea5a4"/><text x="300" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">&#10003;</text>
  <circle cx="390" cy="115" r="13" fill="#0ea5a4"/><text x="390" y="120" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">&#10003;</text>
  <circle cx="480" cy="115" r="13" fill="none" stroke="#cbd2e0" stroke-width="2"/>
  <line x1="463" y1="98" x2="497" y2="132" stroke="#ef4444" stroke-width="2.5"/>

  <!-- Row 2: Retention -->
  <rect x="40" y="146" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="135" y="167" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">2. Retention</text>
  <text x="135" y="183" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">material = -20% churn</text>
  <circle cx="300" cy="169" r="13" fill="none" stroke="#cbd2e0" stroke-width="2"/>
  <line x1="283" y1="152" x2="317" y2="186" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="390" cy="169" r="13" fill="#0ea5a4"/><text x="390" y="174" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">&#10003;</text>
  <text x="480" y="173" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cbd2e0">out</text>

  <!-- Row 3: Cost -->
  <rect x="40" y="200" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="135" y="221" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">3. Cost saving</text>
  <text x="135" y="237" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">material = measurable</text>
  <text x="300" y="225" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cbd2e0">out</text>
  <circle cx="390" cy="223" r="13" fill="#0ea5a4"/><text x="390" y="228" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">&#10003;</text>
  <text x="480" y="227" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cbd2e0">out</text>

  <!-- Winner callout -->
  <rect x="40" y="266" width="560" height="44" rx="8" fill="#f0fbfa" stroke="#0ea5a4" stroke-width="2"/>
  <text x="60" y="293" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Winner: Q</text>
  <text x="155" y="293" font-family="sans-serif" font-size="12" fill="#1d2438">materially hits the top two attributes &#8212; survives the elimination.</text>

  <!-- process strip -->
  <text x="60" y="335" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">Process:</text>
  <text x="130" y="335" font-family="sans-serif" font-size="11" fill="#1d2438">cross out anyone who misses attribute #1 &#8594; repeat down the ranked list until one remains.</text>
  <text x="60" y="362" font-family="sans-serif" font-size="11" fill="#5b6680">No weights, no weighted averages &#8212; just material yes/no and a single ranked order.</text>
</svg>
