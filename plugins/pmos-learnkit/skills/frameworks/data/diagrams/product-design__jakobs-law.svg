<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Jakob's Law diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Jakob's Law</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Users spend most of their time on other products — convention &gt; novelty</text>

  <!-- Left: many familiar products -->
  <rect x="32" y="86" width="240" height="266" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="152" y="112" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Other products (most time)</text>

  <rect x="56" y="130" width="88" height="34" rx="6" fill="#ffffff" stroke="#5b6680"/>
  <text x="100" y="152" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Amazon</text>
  <rect x="160" y="130" width="88" height="34" rx="6" fill="#ffffff" stroke="#5b6680"/>
  <text x="204" y="152" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Google</text>
  <rect x="56" y="176" width="88" height="34" rx="6" fill="#ffffff" stroke="#5b6680"/>
  <text x="100" y="198" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">YouTube</text>
  <rect x="160" y="176" width="88" height="34" rx="6" fill="#ffffff" stroke="#5b6680"/>
  <text x="204" y="198" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Gmail</text>

  <text x="152" y="240" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">build a shared</text>
  <text x="152" y="258" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">mental model</text>

  <text x="152" y="296" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">logo top-left → home</text>
  <text x="152" y="314" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">cart top-right</text>
  <text x="152" y="332" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">search in the header</text>

  <!-- Arrow: transfer expectations -->
  <line x1="278" y1="219" x2="362" y2="219" stroke="#2563eb" stroke-width="2.5"/>
  <polygon points="362,219 350,213 350,225" fill="#2563eb"/>
  <text x="320" y="206" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">transfer</text>
  <text x="320" y="234" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">expectations</text>

  <!-- Right: your product, two paths -->
  <rect x="368" y="86" width="240" height="266" rx="10" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  <text x="488" y="112" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Your product</text>

  <rect x="388" y="132" width="200" height="92" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="488" y="156" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">Match convention</text>
  <text x="488" y="180" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">model fits → focus on task</text>
  <text x="488" y="200" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">low friction, no relearning</text>

  <rect x="388" y="240" width="200" height="92" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="488" y="264" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">Break convention</text>
  <text x="488" y="288" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">model breaks → confusion</text>
  <text x="488" y="308" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">novelty tax, churn risk</text>
</svg>
