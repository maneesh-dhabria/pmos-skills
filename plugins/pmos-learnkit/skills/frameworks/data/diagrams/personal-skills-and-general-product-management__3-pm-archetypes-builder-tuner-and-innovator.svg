<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="3 PM Archetypes Builder Tuner Innovator diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">3 PM Archetypes</text>
  <text x="20" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Match the PM to the product stage and the problem being solved</text>

  <!-- Builder card -->
  <rect x="20" y="70" width="190" height="240" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="20" y="70" width="190" height="40" rx="10" fill="#2563eb"/>
  <rect x="20" y="92" width="190" height="18" fill="#2563eb"/>
  <text x="115" y="96" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Builder</text>
  <text x="115" y="128" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#2563eb" text-anchor="middle">drives an existing roadmap</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="34" y="156">Better user experiences</text>
    <text x="34" y="182">Prioritizes features</text>
    <text x="34" y="208">Solves pressing problems</text>
    <text x="34" y="234">Weighs trade-offs</text>
    <text x="34" y="260">Refines processes</text>
  </g>
  <text x="115" y="294" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle" font-style="italic">Stage: mature product</text>

  <!-- Tuner card -->
  <rect x="225" y="70" width="190" height="240" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <rect x="225" y="70" width="190" height="40" rx="10" fill="#0ea5a4"/>
  <rect x="225" y="92" width="190" height="18" fill="#0ea5a4"/>
  <text x="320" y="96" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Tuner</text>
  <text x="320" y="128" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#0ea5a4" text-anchor="middle">moves a north-star metric</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="239" y="156">Analytical experiments</text>
    <text x="239" y="182">Idea generation</text>
    <text x="239" y="208">A/B testing</text>
    <text x="239" y="234">Prioritizes by impact</text>
    <text x="239" y="260">Tests on own users</text>
  </g>
  <text x="320" y="294" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle" font-style="italic">Stage: optimization</text>

  <!-- Innovator card -->
  <rect x="430" y="70" width="190" height="240" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="430" y="70" width="190" height="40" rx="10" fill="#f59e0b"/>
  <rect x="430" y="92" width="190" height="18" fill="#f59e0b"/>
  <text x="525" y="96" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Innovator</text>
  <text x="525" y="128" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#f59e0b" text-anchor="middle">finds product / market fit</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="444" y="156">Hypothesis-driven</text>
    <text x="444" y="182">Validates &amp; iterates</text>
    <text x="444" y="208">Prioritizes by risk</text>
    <text x="444" y="234">Pivot vs. iterate calls</text>
    <text x="444" y="260">Invents new solutions</text>
  </g>
  <text x="525" y="294" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle" font-style="italic">Stage: new product (0→1)</text>

  <!-- product lifecycle arrow -->
  <text x="20" y="344" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Product maturity →</text>
  <line x1="160" y1="340" x2="620" y2="340" stroke="#5b6680" stroke-width="1.5" marker-end="url(#a2)"/>
  <defs><marker id="a2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5b6680"/></marker></defs>
  <g font-family="sans-serif" font-size="10" fill="#5b6680">
    <text x="200" y="362">0→1 (Innovator)</text>
    <text x="350" y="362">scale (Tuner)</text>
    <text x="500" y="362">mature (Builder)</text>
  </g>
  <text x="20" y="386" font-family="sans-serif" font-size="10" fill="#5b6680">Savvy hiring managers pick the archetype that fits the stage's challenge.</text>
</svg>
