<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Financial Analysis diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Financial Analysis</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Quantify each initiative on one financial metric — discount future cash flows to today</text>

  <!-- cash flow timeline motif -->
  <g font-family="sans-serif">
    <line x1="40" y1="118" x2="600" y2="118" stroke="#5b6680" stroke-width="1.5"/>
    <text x="40" y="86" font-size="11" fill="#5b6680">Cash flows over time, each discounted to Present Value</text>
    <!-- outflow -->
    <rect x="48" y="118" width="34" height="34" fill="#ef4444" opacity="0.85"/>
    <text x="65" y="166" font-size="10" fill="#5b6680" text-anchor="middle">t0 invest</text>
    <!-- inflows shrinking (discount) -->
    <rect x="150" y="100" width="34" height="18" fill="#2563eb" opacity="0.9"/>
    <rect x="252" y="104" width="34" height="14" fill="#2563eb" opacity="0.75"/>
    <rect x="354" y="107" width="34" height="11" fill="#2563eb" opacity="0.6"/>
    <rect x="456" y="109" width="34" height="9" fill="#2563eb" opacity="0.45"/>
    <rect x="558" y="111" width="34" height="7" fill="#2563eb" opacity="0.3"/>
    <text x="167" y="96" font-size="9" fill="#5b6680" text-anchor="middle">t1</text>
    <text x="269" y="96" font-size="9" fill="#5b6680" text-anchor="middle">t2</text>
    <text x="371" y="96" font-size="9" fill="#5b6680" text-anchor="middle">t3</text>
    <text x="473" y="96" font-size="9" fill="#5b6680" text-anchor="middle">t4</text>
    <text x="575" y="96" font-size="9" fill="#5b6680" text-anchor="middle">t5</text>
    <text x="372" y="184" font-size="10" fill="#5b6680" text-anchor="middle" font-style="italic">discounting shrinks far-future value</text>
  </g>

  <!-- three technique cards -->
  <g font-family="sans-serif">
    <!-- NPV -->
    <rect x="24" y="210" width="184" height="160" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="24" y="210" width="184" height="30" rx="8" fill="#2563eb"/>
    <text x="116" y="230" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Net Present Value</text>
    <text x="116" y="262" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">NPV = &#931; PV(cash flows)</text>
    <text x="36" y="288" font-size="11" fill="#5b6680">Sum of discounted cash</text>
    <text x="36" y="304" font-size="11" fill="#5b6680">flows minus investment.</text>
    <text x="36" y="334" font-size="11" fill="#1d2438" font-weight="600">Decide: NPV &gt; 0 ?</text>
    <text x="36" y="352" font-size="10" fill="#5b6680">measures value created</text>

    <!-- IRR -->
    <rect x="228" y="210" width="184" height="160" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <rect x="228" y="210" width="184" height="30" rx="8" fill="#0ea5a4"/>
    <text x="320" y="230" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Internal Rate of Return</text>
    <text x="320" y="262" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">rate where NPV = 0</text>
    <text x="240" y="288" font-size="11" fill="#5b6680">The yield the project</text>
    <text x="240" y="304" font-size="11" fill="#5b6680">earns over its lifetime.</text>
    <text x="240" y="334" font-size="11" fill="#1d2438" font-weight="600">Decide: IRR &gt; hurdle?</text>
    <text x="240" y="352" font-size="10" fill="#5b6680">measures return %</text>

    <!-- Discounted Payback -->
    <rect x="432" y="210" width="184" height="160" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="432" y="210" width="184" height="30" rx="8" fill="#f59e0b"/>
    <text x="524" y="230" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">Disc. Payback Period</text>
    <text x="524" y="262" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">time until &#931;PV &gt; 0</text>
    <text x="444" y="288" font-size="11" fill="#5b6680">When running total of</text>
    <text x="444" y="304" font-size="11" fill="#5b6680">discounted flows recovers.</text>
    <text x="444" y="334" font-size="11" fill="#1d2438" font-weight="600">Shorter = less risk</text>
    <text x="444" y="352" font-size="10" fill="#5b6680">measures risk / time</text>
  </g>
</svg>
