<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three Coda tactics for two-way writeups diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Three Two-Way Tactics</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Each tactic fixes one drawback of a one-way doc — turning a writeup into a conversation</text>

  <!-- Tactic 1: Done Reading -->
  <rect x="24" y="80" width="190" height="290" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="119" cy="120" r="22" fill="#2563eb"/>
  <text x="119" y="127" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff">✓</text>
  <text x="119" y="166" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Done Reading</text>
  <line x1="44" y1="182" x2="194" y2="182" stroke="#dbe6ff" stroke-width="1.5"/>
  <text x="119" y="204" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ef4444">Fixes:</text>
  <text x="119" y="220" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">"Don't know who read it"</text>
  <text x="119" y="252" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#0ea5a4">How:</text>
  <text x="119" y="270" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">A reaction button at the</text>
  <text x="119" y="284" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">end asks "who has read</text>
  <text x="119" y="298" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">this?" — start the</text>
  <text x="119" y="312" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">discussion once key</text>
  <text x="119" y="326" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">stakeholders finish.</text>
  <text x="119" y="350" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#5b6680">2-3 buttons for long docs</text>

  <!-- Tactic 2: Pulse -->
  <rect x="225" y="80" width="190" height="290" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <circle cx="320" cy="120" r="22" fill="#0ea5a4"/>
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff">~</text>
  <text x="320" y="166" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Pulse</text>
  <line x1="245" y1="182" x2="395" y2="182" stroke="#dbe6ff" stroke-width="1.5"/>
  <text x="320" y="204" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ef4444">Fixes:</text>
  <text x="320" y="220" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">"Feedback unstructured"</text>
  <text x="320" y="252" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#0ea5a4">How:</text>
  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Ask a specific question</text>
  <text x="320" y="284" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">you need answered, not</text>
  <text x="320" y="298" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">"just comment."</text>
  <text x="320" y="320" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#5b6680">"How do you feel about</text>
  <text x="320" y="333" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#5b6680">the proposal?" · "What</text>
  <text x="320" y="346" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#5b6680">did we not think about?"</text>

  <!-- Tactic 3: Dory -->
  <rect x="426" y="80" width="190" height="290" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="521" cy="120" r="22" fill="#f59e0b"/>
  <text x="521" y="128" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#ffffff">▲</text>
  <text x="521" y="166" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Dory</text>
  <line x1="446" y1="182" x2="596" y2="182" stroke="#dbe6ff" stroke-width="1.5"/>
  <text x="521" y="204" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ef4444">Fixes:</text>
  <text x="521" y="220" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">"Key questions buried"</text>
  <text x="521" y="252" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#0ea5a4">How:</text>
  <text x="521" y="270" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">A table of questions at</text>
  <text x="521" y="284" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">the bottom. The team</text>
  <text x="521" y="298" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">adds questions, then</text>
  <text x="521" y="312" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">upvotes the important</text>
  <text x="521" y="326" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">ones to discuss.</text>
  <text x="521" y="350" text-anchor="middle" font-family="sans-serif" font-size="9.5" font-style="italic" fill="#5b6680">downvote the resolved</text>
</svg>
