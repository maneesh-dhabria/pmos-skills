<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Behaviour Change Wheel (COM-B) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Behaviour Change Wheel (COM-B)</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Diagnose the gap in C·O·M, then pick the matching intervention</text>

  <!-- Outer wheel: intervention functions -->
  <circle cx="320" cy="240" r="140" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">9 intervention functions</text>
  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Education · Training · Enablement · Environmental restructuring · Incentivisation · Persuasion · Restriction · Coercion · Modelling</text>

  <!-- Inner COM-B core, three wedges -->
  <circle cx="320" cy="240" r="92" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>

  <!-- Capability (top) -->
  <circle cx="320" cy="190" r="34" fill="#0ea5a4"/>
  <text x="320" y="186" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Capability</text>
  <text x="320" y="200" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">can they do it?</text>

  <!-- Opportunity (bottom-left) -->
  <circle cx="277" cy="270" r="34" fill="#f59e0b"/>
  <text x="277" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Opportunity</text>
  <text x="277" y="280" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">does context allow?</text>

  <!-- Motivation (bottom-right) -->
  <circle cx="363" cy="270" r="34" fill="#ef4444"/>
  <text x="363" y="266" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Motivation</text>
  <text x="363" y="280" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">do they want to?</text>

  <text x="320" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Behaviour</text>
</svg>
