<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="The 40% PMF benchmark gauge diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The 40% PMF Benchmark</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Q1 distribution — and why segmenting raises the signal</text>

  <!-- Gauge scale -->
  <text x="24" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">% answering "very disappointed"</text>
  <rect x="24" y="104" width="592" height="34" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <!-- below-threshold zone -->
  <rect x="24" y="104" width="236.8" height="34" rx="6" fill="#ef4444" opacity="0.18"/>
  <!-- above-threshold zone -->
  <rect x="260.8" y="104" width="355.2" height="34" fill="#0ea5a4" opacity="0.18"/>
  <!-- 40% threshold line -->
  <line x1="260.8" y1="96" x2="260.8" y2="150" stroke="#2563eb" stroke-width="2"/>
  <text x="260.8" y="166" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">40% threshold = PMF</text>
  <text x="40" y="126" font-family="sans-serif" font-size="10" fill="#1d2438">below 40% → no fit yet</text>
  <text x="600" y="126" font-family="sans-serif" font-size="10" fill="#1d2438" text-anchor="end">at/above 40% → product-market fit</text>
  <text x="24" y="184" font-family="sans-serif" font-size="9" fill="#5b6680">0%</text>
  <text x="616" y="184" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="end">100%</text>

  <!-- Segment-filter effect: two bars -->
  <text x="24" y="224" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Filter to high-expectation customers to find the real signal</text>

  <!-- All respondents bar: 22% -->
  <text x="24" y="262" font-family="sans-serif" font-size="11" fill="#5b6680">All respondents</text>
  <rect x="180" y="250" width="436" height="22" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <rect x="180" y="250" width="95.9" height="22" rx="4" fill="#5b6680"/>
  <text x="285" y="266" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">22%</text>

  <!-- HXC bar: 32% -->
  <text x="24" y="306" font-family="sans-serif" font-size="11" fill="#5b6680">High-expectation persona</text>
  <rect x="180" y="294" width="436" height="22" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <rect x="180" y="294" width="139.5" height="22" rx="4" fill="#2563eb"/>
  <text x="329" y="310" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">32%</text>

  <!-- 40% reference line across bars -->
  <line x1="354.4" y1="244" x2="354.4" y2="322" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="354.4" y="338" font-family="sans-serif" font-size="9" font-weight="700" fill="#2563eb" text-anchor="middle">40%</text>

  <text x="24" y="370" font-family="sans-serif" font-size="11" fill="#5b6680">Same survey, narrower segment → the "very disappointed" rate climbs toward the bar.</text>
  <text x="24" y="388" font-family="sans-serif" font-size="11" fill="#0ea5a4">Superhuman drove it 33% → ~58% across three quarters.</text>
</svg>
