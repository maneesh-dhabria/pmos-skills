<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Wizard of Oz MVP diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Wizard of Oz MVP</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Looks automated — a human secretly does the work behind the curtain</text>

  <!-- Front-stage panel (what the user sees) -->
  <rect x="36" y="86" width="248" height="266" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="112" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb">FRONT STAGE — what the user sees</text>

  <!-- User -->
  <circle cx="86" cy="172" r="16" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  <text x="86" y="207" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">User</text>
  <text x="86" y="222" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">makes a</text>
  <text x="86" y="235" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">request</text>

  <!-- Polished UI -->
  <rect x="138" y="146" width="118" height="86" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="197" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Finished-looking</text>
  <text x="197" y="186" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">product UI</text>
  <text x="197" y="208" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">feels instant &amp;</text>
  <text x="197" y="221" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">automated</text>

  <text x="160" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">User believes the magic is real —</text>
  <text x="160" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">demand is measured honestly.</text>

  <!-- The curtain -->
  <rect x="300" y="86" width="20" height="266" fill="#f59e0b" opacity="0.85"/>
  <text x="310" y="220" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" transform="rotate(90 310 220)">THE CURTAIN</text>

  <!-- Back-stage panel (the wizard) -->
  <rect x="336" y="86" width="268" height="266" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="470" y="112" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444">BACK STAGE — hidden human</text>

  <circle cx="392" cy="172" r="16" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="392" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">The Wizard</text>
  <text x="392" y="221" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">does the work</text>
  <text x="392" y="234" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">manually</text>

  <rect x="446" y="146" width="142" height="86" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.2"/>
  <text x="517" y="170" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#1d2438">No real engine yet:</text>
  <text x="517" y="190" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">person types replies,</text>
  <text x="517" y="205" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">picks results,</text>
  <text x="517" y="220" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">fulfils the order</text>

  <text x="470" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Validate desirability before</text>
  <text x="470" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">paying to build the automation.</text>

  <!-- Flow arrows -->
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#2563eb"/></marker>
  </defs>
  <line x1="104" y1="172" x2="134" y2="172" stroke="#2563eb" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="256" y1="172" x2="298" y2="172" stroke="#2563eb" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="322" y1="172" x2="372" y2="172" stroke="#ef4444" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ar)"/>
</svg>
