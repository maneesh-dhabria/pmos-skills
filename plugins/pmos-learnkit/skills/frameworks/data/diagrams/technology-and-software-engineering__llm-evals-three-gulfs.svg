<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="LLM Evals - Three Gulfs diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">LLM Evals — Three Gulfs</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Three failure surfaces, closed by an Analyze → Measure → Improve loop</text>

  <!-- Three nodes: Developer, Data, LLM Pipeline -->
  <!-- Developer -->
  <circle cx="110" cy="170" r="46" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="166" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Developer</text>
  <text x="110" y="184" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">/ PM intent</text>

  <!-- Data -->
  <circle cx="530" cy="170" r="46" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="530" y="170" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Data</text>
  <text x="530" y="188" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">real inputs</text>

  <!-- LLM Pipeline -->
  <circle cx="320" cy="320" r="46" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="316" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">LLM</text>
  <text x="320" y="334" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">pipeline</text>

  <!-- Gulf edges -->
  <!-- Comprehension: Developer <-> Data -->
  <line x1="156" y1="170" x2="484" y2="170" stroke="#2563eb" stroke-width="2"/>
  <rect x="250" y="150" width="140" height="22" rx="4" fill="#ffffff"/>
  <text x="320" y="166" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">① Comprehension</text>

  <!-- Specification: Developer <-> LLM -->
  <line x1="138" y1="207" x2="285" y2="288" stroke="#f59e0b" stroke-width="2"/>
  <rect x="120" y="232" width="130" height="22" rx="4" fill="#ffffff"/>
  <text x="185" y="248" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">② Specification</text>

  <!-- Generalization: LLM <-> Data -->
  <line x1="355" y1="288" x2="502" y2="207" stroke="#0ea5a4" stroke-width="2"/>
  <rect x="390" y="232" width="135" height="22" rx="4" fill="#ffffff"/>
  <text x="457" y="248" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">③ Generalization</text>

  <!-- Lifecycle loop banner -->
  <rect x="32" y="78" width="576" height="30" rx="6" fill="#f4f7ff"/>
  <text x="320" y="98" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Analyze  →  Measure  →  Improve   (repeat)</text>

  <!-- Gloss footnotes -->
  <text x="32" y="380" font-family="sans-serif" font-size="11" fill="#5b6680">① can't read all data  ·  ② can't fully spell intent in prompt  ·  ③ won't hold across unseen inputs</text>
</svg>
