<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="SLG lead-scoring funnel diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">The SLG Lead-Qualification Funnel</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Marketing fills the top; engagement score gates the hand-off to sales.</text>

  <!-- funnel: four stacked trapezoids narrowing downward -->
  <g font-family="sans-serif" text-anchor="middle">
    <!-- stage 1: top of funnel -->
    <path d="M 130 70 L 510 70 L 470 130 L 170 130 Z" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="320" y="96" font-size="12.5" font-weight="700" fill="#1d2438">Signups / leads</text>
    <text x="320" y="114" font-size="10.5" fill="#5b6680">Marketing fills top of funnel</text>

    <!-- stage 2: nurture -->
    <path d="M 170 140 L 470 140 L 430 200 L 210 200 Z" fill="#eef6f6" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="320" y="166" font-size="12.5" font-weight="700" fill="#1d2438">Engagement &amp; nurture</text>
    <text x="320" y="184" font-size="10.5" fill="#5b6680">Email, webinars, ads → score points</text>

    <!-- score threshold gate -->
    <line x1="120" y1="210" x2="520" y2="210" stroke="#ef4444" stroke-width="1.3" stroke-dasharray="5 4"/>
    <text x="525" y="214" text-anchor="start" font-family="sans-serif" font-size="9.5" font-weight="700" fill="#ef4444">score</text>
    <text x="525" y="226" text-anchor="start" font-family="sans-serif" font-size="9.5" font-weight="700" fill="#ef4444">threshold</text>

    <!-- stage 3: MQL -->
    <path d="M 210 220 L 430 220 L 390 280 L 250 280 Z" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="246" font-size="12.5" font-weight="700" fill="#1d2438">MQL — qualified</text>
    <text x="320" y="264" font-size="10.5" fill="#5b6680">Passed to sales team</text>

    <!-- stage 4: closed -->
    <path d="M 250 290 L 390 290 L 350 350 L 290 350 Z" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="320" y="318" font-size="12.5" font-weight="700" fill="#1d2438">Screen &amp; close</text>
    <text x="320" y="336" font-size="10.5" fill="#5b6680">Sales monetizes</text>
  </g>

  <text x="320" y="384" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-style="italic" fill="#5b6680">Best fit for high-price enterprise deals needing customization before use (e.g. Salesforce).</text>
</svg>
