<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Four key components of the flywheel diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Four Components of the Flywheel</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">What turns accumulated small efforts into compounding output</text>

  <!-- Row 1 -->
  <g>
    <rect x="40" y="82" width="270" height="128" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="74" cy="116" r="16" fill="#2563eb"/>
    <text x="74" y="121" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="104" y="121" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Momentum</text>
    <text x="60" y="150" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">Hard to start, but a massive wheel</text>
    <text x="60" y="168" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">in motion tends to stay in motion.</text>
  </g>

  <g>
    <rect x="330" y="82" width="270" height="128" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="364" cy="116" r="16" fill="#0ea5a4"/>
    <text x="364" y="121" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="394" y="121" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Feedback Loops</text>
    <text x="350" y="150" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">Faster spinning adds speed,</text>
    <text x="350" y="168" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">energy, and excitement.</text>
  </g>

  <!-- Row 2 -->
  <g>
    <rect x="40" y="226" width="270" height="128" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="74" cy="260" r="16" fill="#f59e0b"/>
    <text x="74" y="265" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="104" y="265" font-family="Helvetica, Arial, sans-serif" font-size="14.5" font-weight="700" fill="#1d2438">Compounding Return</text>
    <text x="60" y="294" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">Continuous small efforts accumulate</text>
    <text x="60" y="312" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">into impressive output over time.</text>
  </g>

  <g>
    <rect x="330" y="226" width="270" height="128" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
    <circle cx="364" cy="260" r="16" fill="#ef4444"/>
    <text x="364" y="265" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">4</text>
    <text x="394" y="265" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Direction</text>
    <text x="350" y="294" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">Effort focused one way sustains</text>
    <text x="350" y="312" font-family="Helvetica, Arial, sans-serif" font-size="11.5" fill="#5b6680">momentum; misplaced effort is waste.</text>
  </g>

  <text x="320" y="384" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Focusing direction on what you do best — the hedgehog principle — keeps all four working together.</text>
</svg>
