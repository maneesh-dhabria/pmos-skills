<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Cynefin Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Cynefin Framework</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Sort the situation, then pick the matching response</text>

  <!-- Quadrants -->
  <!-- Complex (top-left) -->
  <rect x="60" y="78" width="255" height="135" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="74" y="100" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">COMPLEX</text>
  <text x="74" y="122" font-family="sans-serif" font-size="12" fill="#5b6680">Cause &amp; effect clear only in</text>
  <text x="74" y="138" font-family="sans-serif" font-size="12" fill="#5b6680">hindsight; emergent</text>
  <text x="74" y="172" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Probe → Sense → Respond</text>
  <text x="74" y="190" font-family="sans-serif" font-size="11" fill="#5b6680">run safe-to-fail experiments</text>

  <!-- Complicated (top-right) -->
  <rect x="325" y="78" width="255" height="135" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="339" y="100" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">COMPLICATED</text>
  <text x="339" y="122" font-family="sans-serif" font-size="12" fill="#5b6680">Knowable; multiple right</text>
  <text x="339" y="138" font-family="sans-serif" font-size="12" fill="#5b6680">answers, needs expertise</text>
  <text x="339" y="172" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Sense → Analyze → Respond</text>
  <text x="339" y="190" font-family="sans-serif" font-size="11" fill="#5b6680">apply good practice / experts</text>

  <!-- Chaotic (bottom-left) -->
  <rect x="60" y="223" width="255" height="135" rx="6" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
  <text x="74" y="245" font-family="sans-serif" font-size="15" font-weight="700" fill="#ef4444">CHAOTIC</text>
  <text x="74" y="267" font-family="sans-serif" font-size="12" fill="#5b6680">No discernible cause &amp;</text>
  <text x="74" y="283" font-family="sans-serif" font-size="12" fill="#5b6680">effect; crisis</text>
  <text x="74" y="317" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Act → Sense → Respond</text>
  <text x="74" y="335" font-family="sans-serif" font-size="11" fill="#5b6680">act first to restore order</text>

  <!-- Clear (bottom-right) -->
  <rect x="325" y="223" width="255" height="135" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="339" y="245" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">CLEAR</text>
  <text x="339" y="267" font-family="sans-serif" font-size="12" fill="#5b6680">Obvious cause &amp; effect;</text>
  <text x="339" y="283" font-family="sans-serif" font-size="12" fill="#5b6680">known knowns</text>
  <text x="339" y="317" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Sense → Categorize → Respond</text>
  <text x="339" y="335" font-family="sans-serif" font-size="11" fill="#5b6680">apply best practice</text>

  <!-- Disorder center marker -->
  <circle cx="320" cy="218" r="20" fill="#ffffff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="320" y="222" font-family="sans-serif" font-size="10" font-weight="700" fill="#5b6680" text-anchor="middle">DIS-</text>
  <text x="320" y="233" font-family="sans-serif" font-size="10" font-weight="700" fill="#5b6680" text-anchor="middle">ORDER</text>

  <text x="60" y="382" font-family="sans-serif" font-size="11" fill="#5b6680">Ordered (right) vs un-ordered (left) — Disorder = not yet classified</text>
</svg>
