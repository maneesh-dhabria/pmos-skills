<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Design Sprint diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Design Sprint</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Five days: from problem to a tested prototype</text>

  <!-- progress arrow baseline -->
  <line x1="48" y1="300" x2="592" y2="300" stroke="#d6deef" stroke-width="2"/>

  <!-- 5 day steps as ascending ladder -->
  <!-- Day 1 Understand -->
  <g font-family="sans-serif">
    <rect x="48" y="240" width="96" height="56" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="96" y="232" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">DAY 1</text>
    <text x="96" y="266" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Understand</text>
    <text x="96" y="284" font-size="9.5" fill="#5b6680" text-anchor="middle">Research &amp; map</text>
    <circle cx="96" cy="300" r="6" fill="#2563eb"/>
  </g>
  <!-- Day 2 Diverge -->
  <g font-family="sans-serif">
    <rect x="160" y="206" width="96" height="56" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="208" y="198" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">DAY 2</text>
    <text x="208" y="232" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Diverge</text>
    <text x="208" y="250" font-size="9.5" fill="#5b6680" text-anchor="middle">Sketch ideas</text>
    <line x1="208" y1="262" x2="208" y2="300" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="208" cy="300" r="6" fill="#2563eb"/>
  </g>
  <!-- Day 3 Converge -->
  <g font-family="sans-serif">
    <rect x="272" y="172" width="96" height="56" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="320" y="164" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">DAY 3</text>
    <text x="320" y="198" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Converge</text>
    <text x="320" y="216" font-size="9.5" fill="#5b6680" text-anchor="middle">Storyboard</text>
    <line x1="320" y1="228" x2="320" y2="300" stroke="#0ea5a4" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="320" cy="300" r="6" fill="#0ea5a4"/>
  </g>
  <!-- Day 4 Prototype -->
  <g font-family="sans-serif">
    <rect x="384" y="138" width="96" height="56" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="432" y="130" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">DAY 4</text>
    <text x="432" y="164" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Prototype</text>
    <text x="432" y="182" font-size="9.5" fill="#5b6680" text-anchor="middle">Build realistic</text>
    <line x1="432" y1="194" x2="432" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="432" cy="300" r="6" fill="#f59e0b"/>
  </g>
  <!-- Day 5 Test -->
  <g font-family="sans-serif">
    <rect x="496" y="104" width="96" height="56" rx="8" fill="#1d2438" stroke="#1d2438" stroke-width="1.5"/>
    <text x="544" y="96" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">DAY 5</text>
    <text x="544" y="130" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Test</text>
    <text x="544" y="148" font-size="9.5" fill="#cdd6ec" text-anchor="middle">With real users</text>
    <line x1="544" y1="160" x2="544" y2="300" stroke="#1d2438" stroke-width="1.5" stroke-dasharray="3 3"/>
    <circle cx="544" cy="300" r="6" fill="#1d2438"/>
  </g>

  <text x="48" y="330" font-family="sans-serif" font-size="11" fill="#5b6680">Problem</text>
  <text x="592" y="330" font-family="sans-serif" font-size="11" fill="#1d2438" font-weight="700" text-anchor="end">Validated learning</text>
  <polygon points="586,294 600,300 586,306" fill="#1d2438"/>
</svg>
