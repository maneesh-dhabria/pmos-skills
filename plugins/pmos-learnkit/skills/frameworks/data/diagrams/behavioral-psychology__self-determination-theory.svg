<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Self-Determination Theory diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Self-Determination Theory</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Three needs feed intrinsic motivation — rewards can crowd it out</text>

  <!-- Three overlapping need circles (Venn) feeding center -->
  <circle cx="240" cy="180" r="92" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="2"/>
  <circle cx="400" cy="180" r="92" fill="#0ea5a4" fill-opacity="0.10" stroke="#0ea5a4" stroke-width="2"/>
  <circle cx="320" cy="262" r="92" fill="#f59e0b" fill-opacity="0.10" stroke="#f59e0b" stroke-width="2"/>

  <text x="196" y="150" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Autonomy</text>
  <text x="196" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">act by choice</text>

  <text x="444" y="150" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Competence</text>
  <text x="444" y="168" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">feel effective</text>

  <text x="320" y="300" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Relatedness</text>
  <text x="320" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">connect to others</text>

  <text x="320" y="206" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Intrinsic</text>
  <text x="320" y="224" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">motivation</text>

  <!-- Crowding-out warning -->
  <rect x="430" y="338" width="190" height="46" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="525" y="358" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Crowding-out</text>
  <text x="525" y="374" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">extrinsic rewards can erode it</text>
</svg>
