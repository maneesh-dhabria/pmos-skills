<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Objective equals Mission plus Measure diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1d2438">Objective = Mission + Measure</text>
  <text x="320" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b6680">The two parts that make a strategy objective complete</text>

  <!-- Mission card -->
  <rect x="48" y="98" width="240" height="150" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="168" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#2563eb">Mission</text>
  <text x="168" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d2438">An inspiring statement</text>
  <text x="168" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d2438">of your purpose</text>
  <text x="168" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">e.g. &#8220;Maximize customer</text>
  <text x="168" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">activation&#8221;</text>

  <!-- plus sign -->
  <text x="320" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#1d2438">+</text>

  <!-- Measure card -->
  <rect x="352" y="98" width="240" height="150" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="472" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0ea5a4">Measure</text>
  <text x="472" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d2438">A hard metric gauging</text>
  <text x="472" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1d2438">your progress</text>
  <text x="472" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">e.g. Users doing 20+</text>
  <text x="472" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">searches in first 3 days</text>

  <!-- Format template band -->
  <rect x="48" y="288" width="544" height="74" rx="10" fill="#1d2438"/>
  <text x="320" y="316" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff" font-weight="bold">Typical measure format</text>
  <text x="320" y="344" text-anchor="middle" font-family="monospace" font-size="14" fill="#f59e0b">Move [metric] from [baseline] to [target] by [date]</text>
</svg>
