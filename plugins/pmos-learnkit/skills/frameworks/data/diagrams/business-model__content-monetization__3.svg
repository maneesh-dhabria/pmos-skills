<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Advertising-based monetization formats diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Advertising Revenue Formats</text>
  <text x="32" y="62" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Four ways ad-supported content businesses charge advertisers</text>

  <!-- Row 1: Display -->
  <rect x="32" y="86" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="32" y="86" width="6" height="68" rx="3" fill="#2563eb"/>
  <circle cx="68" cy="120" r="16" fill="#2563eb"/>
  <rect x="60" y="113" width="16" height="14" rx="2" fill="#ffffff"/>
  <text x="100" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Display Advertising</text>
  <text x="100" y="136" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Sell ad space; charge per impression (priced per thousand views).</text>

  <!-- Row 2: PPC -->
  <rect x="32" y="162" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <rect x="32" y="162" width="6" height="68" rx="3" fill="#0ea5a4"/>
  <circle cx="68" cy="196" r="16" fill="#0ea5a4"/>
  <path d="M62 190 l10 8 -5 1 3 6 -3 1 -3 -6 -4 3 z" fill="#ffffff"/>
  <text x="100" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Pay Per Click (PPC)</text>
  <text x="100" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Charge only on click-through; fee set by advertiser's keyword bid.</text>

  <!-- Row 3: Affiliate -->
  <rect x="32" y="238" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="32" y="238" width="6" height="68" rx="3" fill="#f59e0b"/>
  <circle cx="68" cy="272" r="16" fill="#f59e0b"/>
  <text x="60" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">%</text>
  <text x="100" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Affiliate Advertising</text>
  <text x="100" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Earn commission on each sale referred from ads on your properties.</text>

  <!-- Row 4: Social/Intent -->
  <rect x="32" y="314" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="32" y="314" width="6" height="68" rx="3" fill="#ef4444"/>
  <circle cx="68" cy="348" r="16" fill="#ef4444"/>
  <circle cx="68" cy="348" r="7" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="68" cy="348" r="2" fill="#ffffff"/>
  <text x="100" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Social / Intent Targeted</text>
  <text x="100" y="364" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Target by interest or intent (social, search) for qualified conversions.</text>
</svg>
