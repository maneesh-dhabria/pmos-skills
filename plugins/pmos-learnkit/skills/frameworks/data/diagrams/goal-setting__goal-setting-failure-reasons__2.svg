<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Vicious cycle of goal-setting failure diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Vicious Cycle of Goal-Setting Failure</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">Each failure feeds the next, perpetuating unfeasible goals</text>

  <!-- arrowhead -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- four nodes around a loop -->
  <!-- top -->
  <rect x="240" y="78" width="160" height="54" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Set lofty goals</text>
  <text x="320" y="118" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">without commitments</text>

  <!-- right -->
  <rect x="438" y="173" width="170" height="54" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="523" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Team fails</text>
  <text x="523" y="213" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">loses credibility</text>

  <!-- bottom -->
  <rect x="240" y="268" width="160" height="54" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="290" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Leadership applies</text>
  <text x="320" y="308" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">more pressure</text>

  <!-- left -->
  <rect x="32" y="173" width="170" height="54" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="117" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Ambition rises,</text>
  <text x="117" y="213" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">feasibility &amp; alignment fall</text>

  <!-- curved arrows clockwise -->
  <path d="M400,108 C460,120 500,145 510,168" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M510,227 C500,255 455,275 405,288" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M240,294 C175,280 135,255 128,230" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M132,172 C140,145 180,120 238,108" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>

  <!-- center label -->
  <circle cx="320" cy="200" r="44" fill="#1d2438"/>
  <text x="320" y="196" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">VICIOUS</text>
  <text x="320" y="212" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">CYCLE</text>

  <text x="320" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#5b6680">Result: doing a lot while accomplishing very little</text>
</svg>
