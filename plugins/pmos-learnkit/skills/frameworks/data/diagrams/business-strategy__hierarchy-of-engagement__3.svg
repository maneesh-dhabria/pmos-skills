<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Level 3 self-sustaining virtuous loops cycle diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Level 3 — Self-Sustaining Virtuous Loops</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Three loops that keep users engaged long-term</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Cycle arcs between the three nodes -->
  <path d="M 250 130 A 150 150 0 0 1 410 130" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 440 175 A 150 150 0 0 1 360 320" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 300 320 A 150 150 0 0 1 220 175" fill="none" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Node 1: Network effects (top-left) -->
  <circle cx="210" cy="135" r="62" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">Network</text>
  <text x="210" y="139" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">Effects</text>
  <text x="210" y="158" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">More users =</text>
  <text x="210" y="171" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">more value</text>

  <!-- Node 2: User growth (top-right) -->
  <circle cx="450" cy="135" r="62" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="450" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">User</text>
  <text x="450" y="139" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Growth</text>
  <text x="450" y="158" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Inviting friends</text>
  <text x="450" y="171" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">drives growth</text>

  <!-- Node 3: Re-engagement (bottom) -->
  <circle cx="330" cy="320" r="62" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="308" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Re-engagement</text>
  <text x="330" y="327" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Notifications bring</text>
  <text x="330" y="340" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">lapsed users back</text>
</svg>
