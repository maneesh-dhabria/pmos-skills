<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Marketplace diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Marketplace</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Platform connects buyers &amp; sellers and takes a cut (take rate) of each transaction</text>

  <!-- Buyers (left) -->
  <rect x="34" y="150" width="140" height="86" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="104" y="184" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">Buyers</text>
  <text x="104" y="204" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Demand side</text>
  <text x="104" y="220" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">browse · request</text>

  <!-- Platform (center) -->
  <rect x="250" y="138" width="140" height="110" rx="14" fill="#1d2438"/>
  <text x="320" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Platform</text>
  <text x="320" y="198" font-family="sans-serif" font-size="10" fill="#9aa6c4" text-anchor="middle">Matches &amp; facilitates</text>
  <text x="320" y="216" font-family="sans-serif" font-size="10" fill="#9aa6c4" text-anchor="middle">the transaction</text>
  <text x="320" y="234" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">takes a % cut</text>

  <!-- Sellers (right) -->
  <rect x="466" y="150" width="140" height="86" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.6"/>
  <text x="536" y="184" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">Sellers</text>
  <text x="536" y="204" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Supply side</text>
  <text x="536" y="220" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">list · fulfill</text>

  <!-- Two-sided loop arrows -->
  <g>
    <!-- buyer -> platform (top) -->
    <path d="M174 170 L246 170" fill="none" stroke="#2563eb" stroke-width="1.8" marker-end="url(#mp)"/>
    <text x="210" y="162" font-family="sans-serif" font-size="9" fill="#2563eb" text-anchor="middle">demand</text>
    <!-- platform -> seller (top) -->
    <path d="M394 170 L462 170" fill="none" stroke="#0ea5a4" stroke-width="1.8" marker-end="url(#mp2)"/>
    <text x="428" y="162" font-family="sans-serif" font-size="9" fill="#0ea5a4" text-anchor="middle">matched</text>
    <!-- seller -> platform (bottom, goods/service) -->
    <path d="M462 216 L394 216" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#mp3)"/>
    <!-- platform -> buyer (bottom, goods/service) -->
    <path d="M246 216 L178 216" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#mp3)"/>
    <text x="320" y="270" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">goods / service flow back to the buyer</text>
  </g>

  <!-- type note -->
  <text x="24" y="296" font-family="sans-serif" font-size="10" fill="#5b6680">Two-sided (buyer↔seller) · Three-sided adds a delivery agent (DoorDash, Uber Eats)</text>

  <!-- Metrics row -->
  <g font-family="sans-serif">
    <rect x="24" y="312" width="144" height="44" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
    <text x="96" y="330" font-size="10" font-weight="700" fill="#f59e0b" text-anchor="middle">Liquidity / Match</text>
    <text x="96" y="346" font-size="9" fill="#5b6680" text-anchor="middle">% intent → conversion</text>

    <rect x="176" y="312" width="144" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
    <text x="248" y="330" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">GMV</text>
    <text x="248" y="346" font-size="9" fill="#5b6680" text-anchor="middle">$ flowing through</text>

    <rect x="328" y="312" width="144" height="44" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="400" y="330" font-size="10" font-weight="700" fill="#0ea5a4" text-anchor="middle">Bookings</text>
    <text x="400" y="346" font-size="9" fill="#5b6680" text-anchor="middle">completed txns / wk</text>

    <rect x="480" y="312" width="136" height="44" rx="6" fill="#f4f7ff" stroke="#ef4444" stroke-width="1"/>
    <text x="548" y="330" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">Supply Growth</text>
    <text x="548" y="346" font-size="9" fill="#5b6680" text-anchor="middle">new active supply</text>
  </g>
  <text x="24" y="378" font-family="sans-serif" font-size="10" fill="#5b6680">Examples: Airbnb, eBay, Uber, DoorDash</text>

  <defs>
    <marker id="mp" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#2563eb"/></marker>
    <marker id="mp2" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#0ea5a4"/></marker>
    <marker id="mp3" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#5b6680"/></marker>
  </defs>
</svg>
