<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="People + AI Guidebook diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">People + AI Guidebook</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Google PAIR — six chapters for human-centered AI products</text>

  <!-- UX / trust track -->
  <text x="32" y="86" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">UX &amp; TRUST</text>
  <!-- Practitioner track -->
  <text x="332" y="86" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">AI PRACTICE</text>

  <!-- Chapter 1 -->
  <rect x="32" y="96" width="270" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="46" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">1 · User Needs + Defining Success</text>
  <text x="46" y="134" font-family="sans-serif" font-size="11" fill="#5b6680">Is AI the right fit? Define reward fn.</text>

  <!-- Chapter 2 -->
  <rect x="332" y="96" width="276" height="48" rx="8" fill="#f0fdfa" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="346" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">2 · Data Collection + Evaluation</text>
  <text x="346" y="134" font-family="sans-serif" font-size="11" fill="#5b6680">Source, label, and test the data.</text>

  <!-- Chapter 3 -->
  <rect x="32" y="156" width="270" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="46" y="176" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">3 · Mental Models</text>
  <text x="46" y="194" font-family="sans-serif" font-size="11" fill="#5b6680">Set the right user expectations.</text>

  <!-- Chapter 4 -->
  <rect x="332" y="156" width="276" height="48" rx="8" fill="#f0fdfa" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="346" y="176" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">5 · Feedback + Control</text>
  <text x="346" y="194" font-family="sans-serif" font-size="11" fill="#5b6680">Let users steer &amp; teach the system.</text>

  <!-- Chapter 5 -->
  <rect x="32" y="216" width="270" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="46" y="236" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">4 · Explainability + Trust</text>
  <text x="46" y="254" font-family="sans-serif" font-size="11" fill="#5b6680">Explain output to calibrate trust.</text>

  <!-- Chapter 6 -->
  <rect x="332" y="216" width="276" height="48" rx="8" fill="#f0fdfa" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="346" y="236" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">6 · Errors + Graceful Failure</text>
  <text x="346" y="254" font-family="sans-serif" font-size="11" fill="#5b6680">Plan for when the model is wrong.</text>

  <!-- gen-AI band -->
  <rect x="32" y="288" width="576" height="78" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="48" y="312" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Generative-AI update (2023)</text>
  <text x="48" y="334" font-family="sans-serif" font-size="11.5" fill="#5b6680">New patterns for prompting, hallucination, and managing</text>
  <text x="48" y="350" font-family="sans-serif" font-size="11.5" fill="#5b6680">expectations of open-ended LLM output across all six chapters.</text>
</svg>
