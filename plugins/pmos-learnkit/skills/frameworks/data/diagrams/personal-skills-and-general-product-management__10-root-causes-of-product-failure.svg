<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="10 Root Causes of Product Failure diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">10 Root Causes of Product Failure</text>
  <text x="20" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Fake-agile waterfall concentrates risk at the very end</text>

  <!-- waterfall flow strip -->
  <g font-family="sans-serif" font-size="9.5" fill="#1d2438">
    <rect x="20" y="66" width="86" height="34" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="63" y="80" text-anchor="middle">Ideas from</text>
    <text x="63" y="92" text-anchor="middle">execs/sales</text>

    <rect x="112" y="66" width="86" height="34" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="155" y="80" text-anchor="middle">Roadmap &amp;</text>
    <text x="155" y="92" text-anchor="middle">business case</text>

    <rect x="204" y="66" width="86" height="34" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="247" y="80" text-anchor="middle">PM gathers</text>
    <text x="247" y="92" text-anchor="middle">requirements</text>

    <rect x="296" y="66" width="86" height="34" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="339" y="80" text-anchor="middle">Design &amp;</text>
    <text x="339" y="92" text-anchor="middle">build (late)</text>

    <rect x="388" y="66" width="86" height="34" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="431" y="80" text-anchor="middle">QA &amp;</text>
    <text x="431" y="92" text-anchor="middle">deploy</text>

    <rect x="480" y="66" width="140" height="34" rx="5" fill="#fde8e8" stroke="#ef4444"/>
    <text x="550" y="80" text-anchor="middle" fill="#ef4444" font-weight="700">Customer sees it</text>
    <text x="550" y="92" text-anchor="middle" fill="#ef4444">RISK realized — too late</text>
  </g>
  <!-- arrows between -->
  <g stroke="#5b6680" stroke-width="1.4" fill="none">
    <path d="M106 83 L112 83" marker-end="url(#ar)"/>
    <path d="M198 83 L204 83" marker-end="url(#ar)"/>
    <path d="M290 83 L296 83" marker-end="url(#ar)"/>
    <path d="M382 83 L388 83" marker-end="url(#ar)"/>
    <path d="M474 83 L480 83" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#5b6680"/></marker>
  </defs>

  <!-- the 10 causes -->
  <text x="20" y="128" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">The 10 root causes</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="20" y="150">1.  Sales / stakeholder-driven ideas</text>
    <text x="20" y="174">2.  Flawed business cases</text>
    <text x="20" y="198">3.  Feature-focused roadmaps</text>
    <text x="20" y="222">4.  PM reduced to project manager</text>
    <text x="20" y="246">5.  Design as an afterthought</text>
    <text x="330" y="150">6.  Engineering brought in too late</text>
    <text x="330" y="174">7.  Agile only for delivery</text>
    <text x="330" y="198">8.  Orphaned, project-centric work</text>
    <text x="330" y="222">9.  Late customer validation</text>
    <text x="330" y="246">10. Opportunity cost (unrecoverable)</text>
  </g>

  <!-- risk concentration banner -->
  <rect x="20" y="270" width="600" height="110" rx="8" fill="#f4f7ff" stroke="#5b6680"/>
  <text x="32" y="292" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Why it fails: risk is back-loaded</text>
  <!-- risk-over-time curve -->
  <g>
    <line x1="40" y1="362" x2="600" y2="362" stroke="#5b6680" stroke-width="1"/>
    <line x1="40" y1="362" x2="40" y2="306" stroke="#5b6680" stroke-width="1"/>
    <text x="40" y="377" font-family="sans-serif" font-size="9" fill="#5b6680">start</text>
    <text x="560" y="377" font-family="sans-serif" font-size="9" fill="#ef4444">launch</text>
    <path d="M40 360 C 300 358, 470 350, 560 312" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <circle cx="560" cy="312" r="5" fill="#ef4444"/>
    <text x="300" y="328" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">All validation deferred → risk spikes only at the end</text>
  </g>
</svg>
