<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Fractal sub-journeys within each 3x stage diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Stages Are Fractal</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">Each phase nests its own explore - expand - extract sub-journeys</text>

  <!-- Three top-level stages -->
  <!-- Explore -->
  <rect x="40" y="92" width="170" height="270" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="118" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#2563eb">Explore</text>

  <!-- Expand -->
  <rect x="235" y="92" width="170" height="270" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="118" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Expand</text>

  <!-- Extract -->
  <rect x="430" y="92" width="170" height="270" rx="12" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="515" y="118" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#b46508">Extract</text>

  <!-- nested sub-journeys: small e/x/X chips inside each -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">
    <!-- Explore nest -->
    <rect x="60" y="140" width="130" height="36" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="125" y="162" fill="#1d2438">sub-explore</text>
    <rect x="60" y="186" width="130" height="36" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="125" y="208" fill="#1d2438">sub-expand</text>
    <rect x="60" y="232" width="130" height="36" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="125" y="254" fill="#1d2438">sub-extract</text>

    <!-- Expand nest -->
    <rect x="255" y="140" width="130" height="36" rx="7" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="320" y="162" fill="#1d2438">sub-explore</text>
    <rect x="255" y="186" width="130" height="36" rx="7" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="320" y="208" fill="#1d2438">sub-expand</text>
    <rect x="255" y="232" width="130" height="36" rx="7" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="320" y="254" fill="#1d2438">sub-extract</text>

    <!-- Extract nest -->
    <rect x="450" y="140" width="130" height="36" rx="7" fill="#ffffff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="515" y="162" fill="#1d2438">sub-explore</text>
    <rect x="450" y="186" width="130" height="36" rx="7" fill="#ffffff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="515" y="208" fill="#1d2438">sub-expand</text>
    <rect x="450" y="232" width="130" height="36" rx="7" fill="#ffffff" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="515" y="254" fill="#1d2438">sub-extract</text>
  </g>

  <text x="320" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">The same three-phase pattern recurs at every level of zoom</text>
</svg>
