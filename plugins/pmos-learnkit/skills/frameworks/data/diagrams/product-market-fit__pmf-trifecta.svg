<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PMF Trifecta diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">PMF Trifecta</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">Escalating checkpoints confirm PMF &#8212; conclusive only when the trifecta lands together</text>

  <!-- Left: escalating ladder of checkpoints -->
  <text x="24" y="80" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Checkpoints (more volume &amp; certainty &#8594;)</text>

  <!-- CP1 -->
  <rect x="24" y="92" width="300" height="56" rx="9" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="38" y="112" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#2563eb">CP1 &#183; Leading-indicator survey</text>
  <text x="38" y="129" font-family="sans-serif" font-size="10.5" fill="#5b6680">Sean Ellis: &#8805;40% &#8220;very disappointed&#8221;</text>
  <text x="38" y="142" font-family="sans-serif" font-size="10.5" fill="#5b6680">without it. NPS as a value signal.</text>

  <!-- down arrow -->
  <line x1="174" y1="148" x2="174" y2="162" stroke="#1d2438" stroke-width="2"/>
  <polygon points="168,162 174,172 180,162" fill="#1d2438"/>

  <!-- CP2 -->
  <rect x="24" y="172" width="300" height="56" rx="9" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.4"/>
  <text x="38" y="192" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0ea5a4">CP2 &#183; Engagement data</text>
  <text x="38" y="209" font-family="sans-serif" font-size="10.5" fill="#5b6680">Core actions taken (not logins) that</text>
  <text x="38" y="222" font-family="sans-serif" font-size="10.5" fill="#5b6680">match the product&#8217;s real purpose.</text>

  <line x1="174" y1="228" x2="174" y2="242" stroke="#1d2438" stroke-width="2"/>
  <polygon points="168,242 174,252 180,242" fill="#1d2438"/>

  <!-- CP3 -->
  <rect x="24" y="252" width="300" height="56" rx="9" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.4"/>
  <text x="38" y="272" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#f59e0b">CP3 &#183; The retention curve</text>
  <text x="38" y="289" font-family="sans-serif" font-size="10.5" fill="#5b6680">Curve flattens &#8594; PMF for some</text>
  <text x="38" y="302" font-family="sans-serif" font-size="10.5" fill="#5b6680">audience. Who is it? How big?</text>

  <!-- phases band -->
  <rect x="24" y="324" width="300" height="52" rx="9" fill="#ffffff" stroke="#d8e0f0" stroke-width="1"/>
  <text x="38" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Phases of growth</text>
  <text x="38" y="362" font-family="sans-serif" font-size="10.5" fill="#5b6680">Traction (find PMF) &#8594; Transition &#8594; Growth</text>

  <!-- Right: the trifecta Venn -->
  <text x="478" y="80" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">The Trifecta</text>
  <text x="478" y="96" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">all three together = PMF for a large market</text>

  <g opacity="0.85">
    <circle cx="478" cy="160" r="64" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="1.4"/>
    <circle cx="438" cy="232" r="64" fill="#0ea5a4" fill-opacity="0.16" stroke="#0ea5a4" stroke-width="1.4"/>
    <circle cx="518" cy="232" r="64" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-width="1.4"/>
  </g>

  <text x="478" y="128" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#2563eb" text-anchor="middle">Top-line</text>
  <text x="478" y="142" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#2563eb" text-anchor="middle">growth</text>

  <text x="408" y="252" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0ea5a4" text-anchor="middle">Retention</text>

  <text x="548" y="246" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#f59e0b" text-anchor="middle">Meaningful</text>
  <text x="548" y="260" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#f59e0b" text-anchor="middle">usage</text>

  <circle cx="478" cy="205" r="20" fill="#1d2438"/>
  <text x="478" y="202" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">PM</text>
  <text x="478" y="214" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">F</text>

  <text x="478" y="328" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle" font-style="italic">The search for PMF never ends &#8212;</text>
  <text x="478" y="343" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle" font-style="italic">markets shift, so the product must adapt.</text>
</svg>
