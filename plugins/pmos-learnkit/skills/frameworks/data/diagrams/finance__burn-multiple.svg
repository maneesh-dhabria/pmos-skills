<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Burn Multiple diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Burn Multiple</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Capital efficiency &#8212; how much cash burned per $1 of new ARR. Lower is better.</text>

  <!-- Formula -->
  <g font-family="sans-serif">
    <text x="60" y="108" font-size="18" font-weight="700" fill="#1d2438">Burn Multiple =</text>
    <line x1="260" y1="100" x2="430" y2="100" stroke="#1d2438" stroke-width="2"/>
    <text x="345" y="92" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">Net Burn</text>
    <text x="345" y="120" font-size="15" font-weight="700" fill="#0ea5a4" text-anchor="middle">Net New ARR</text>
  </g>

  <!-- Gauge: efficiency bands, lower=better. Semicircle from 180 to 0 deg -->
  <!-- band arcs, radius 150, center 320,300 -->
  <g fill="none" stroke-width="34" stroke-linecap="butt">
    <path d="M 170 300 A 150 150 0 0 1 222 191" stroke="#0ea5a4"/>
    <path d="M 222 191 A 150 150 0 0 1 320 150" stroke="#22c55e"/>
    <path d="M 320 150 A 150 150 0 0 1 418 191" stroke="#f59e0b"/>
    <path d="M 418 191 A 150 150 0 0 1 470 300" stroke="#ef4444"/>
  </g>
  <!-- band labels -->
  <g font-family="sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    <text x="172" y="250" fill="#0ea5a4">&lt;1</text>
    <text x="172" y="264" fill="#5b6680" font-weight="400" font-size="9">amazing</text>
    <text x="250" y="178" fill="#16a34a">1&#8211;1.5</text>
    <text x="250" y="166" fill="#5b6680" font-weight="400" font-size="9">great</text>
    <text x="390" y="178" fill="#f59e0b">1.5&#8211;2</text>
    <text x="390" y="166" fill="#5b6680" font-weight="400" font-size="9">ok</text>
    <text x="468" y="250" fill="#ef4444">&gt;2</text>
    <text x="468" y="264" fill="#5b6680" font-weight="400" font-size="9">poor</text>
  </g>
  <!-- needle pointing to "great" zone -->
  <line x1="320" y1="300" x2="262" y2="195" stroke="#1d2438" stroke-width="4" stroke-linecap="round"/>
  <circle cx="320" cy="300" r="9" fill="#1d2438"/>
  <text x="320" y="334" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Lower burn per $ ARR &#8594; more efficient growth</text>

  <!-- catch-all note: issues that move the needle -->
  <g font-family="sans-serif" font-size="10.5" fill="#5b6680">
    <text x="24" y="364" font-weight="700" fill="#1d2438">Catch-all metric &#8212; any issue eventually shows up here:</text>
    <text x="24" y="382" fill="#ef4444" font-weight="700">&#8593; burn:</text>
    <text x="86" y="382">low margin &#183; weak sales efficiency</text>
    <text x="330" y="382" fill="#0ea5a4" font-weight="700">&#8595; ARR:</text>
    <text x="392" y="382">churn &#183; stalled growth</text>
  </g>
</svg>
