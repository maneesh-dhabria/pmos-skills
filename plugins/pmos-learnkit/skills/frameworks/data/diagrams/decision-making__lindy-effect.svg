<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Lindy Effect diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Lindy Effect</text>
  <text x="32" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">For non-perishable things, future life expectancy grows with current age</text>

  <!-- chart area -->
  <!-- axes -->
  <g stroke="#1d2438" stroke-width="1.5">
    <line x1="80" y1="300" x2="600" y2="300"/>
    <line x1="80" y1="300" x2="80" y2="80"/>
  </g>
  <text x="340" y="334" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">Age so far  (how long it has already lasted)  &#8594;</text>
  <text x="40" y="190" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" transform="rotate(-90 40 190)" text-anchor="middle">Expected future life  &#8594;</text>

  <!-- rising relationship line -->
  <line x1="80" y1="300" x2="600" y2="100" stroke="#2563eb" stroke-width="3"/>
  <polygon points="600,100 588,98 593,110" fill="#2563eb"/>
  <text x="430" y="150" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb" transform="rotate(-21 430 150)">The longer it has lasted, the longer it will</text>

  <!-- example markers along the line -->
  <g font-family="sans-serif">
    <circle cx="180" cy="262" r="5" fill="#f59e0b"/>
    <text x="172" y="252" font-size="10.5" fill="#5b6680" text-anchor="middle">New book</text>
    <text x="172" y="280" font-size="9.5" fill="#5b6680" text-anchor="middle">(likely forgotten)</text>

    <circle cx="340" cy="200" r="5" fill="#0ea5a4"/>
    <text x="340" y="190" font-size="10.5" fill="#5b6680" text-anchor="middle">QWERTY (~150 yrs)</text>

    <circle cx="500" cy="138" r="5" fill="#0ea5a4"/>
    <text x="500" y="128" font-size="10.5" fill="#5b6680" text-anchor="middle">Shakespeare (400+ yrs)</text>
  </g>

  <!-- footer takeaway -->
  <rect x="80" y="350" width="520" height="34" rx="6" fill="#f4f7ff"/>
  <text x="96" y="372" font-family="sans-serif" font-size="11" fill="#5b6680">Use it to bet on durability: prefer the time-tested tech, idea, or company over the brand-new.</text>
</svg>
