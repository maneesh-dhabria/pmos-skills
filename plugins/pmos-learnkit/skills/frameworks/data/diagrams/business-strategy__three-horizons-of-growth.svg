<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three Horizons of Growth diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Three Horizons of Growth</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Invest in core, emerging, and future bets in parallel — not in sequence</text>

  <!-- axes -->
  <line x1="80" y1="330" x2="610" y2="330" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="80" y1="330" x2="80" y2="90" stroke="#5b6680" stroke-width="1.5"/>
  <text x="345" y="362" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Time / maturity  →</text>
  <text x="58" y="200" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle" transform="rotate(-90 58 200)">Profit / value</text>

  <!-- H1 curve: mature, plateauing then declining -->
  <path d="M80 250 Q200 180 320 210 T560 320" fill="none" stroke="#2563eb" stroke-width="3"/>
  <!-- H2 curve: rising -->
  <path d="M200 320 Q340 300 440 230 T600 150" fill="none" stroke="#0ea5a4" stroke-width="3"/>
  <!-- H3 curve: nascent, climbing late -->
  <path d="M340 325 Q470 318 540 290 T605 220" fill="none" stroke="#f59e0b" stroke-width="3"/>

  <!-- labels -->
  <circle cx="150" cy="208" r="5" fill="#2563eb"/>
  <text x="162" y="206" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Horizon 1 — Defend &amp; extend core</text>
  <text x="162" y="223" font-family="sans-serif" font-size="11.5" fill="#5b6680">today's cash engine · ~0–2 yrs · ~70% of resources</text>

  <circle cx="300" cy="278" r="5" fill="#0ea5a4"/>
  <text x="312" y="276" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Horizon 2 — Emerging growth</text>
  <text x="312" y="293" font-family="sans-serif" font-size="11.5" fill="#5b6680">scaling new businesses · ~2–5 yrs · ~20%</text>

  <circle cx="380" cy="322" r="5" fill="#f59e0b"/>
  <text x="392" y="318" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Horizon 3 — Future options</text>
  <text x="392" y="334" font-family="sans-serif" font-size="11.5" fill="#5b6680">seeds &amp; experiments · 5+ yrs · ~10%</text>

  <text x="345" y="386" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" font-style="italic">All three run concurrently; H3 of today becomes H1 of tomorrow.</text>
</svg>
