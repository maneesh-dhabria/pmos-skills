<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Wardley Mapping diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Wardley Mapping</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Value chain (visible to user) plotted against evolution</text>

  <!-- plot panel -->
  <rect x="70" y="80" width="540" height="270" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>

  <!-- Y axis label: value chain -->
  <text x="44" y="215" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 44 215)">Value chain  (visible -> invisible)</text>
  <text x="78" y="98" font-family="sans-serif" font-size="11" fill="#5b6680">User need</text>
  <text x="78" y="338" font-family="sans-serif" font-size="11" fill="#5b6680">Infra</text>

  <!-- X axis evolution stages -->
  <line x1="70" y1="350" x2="610" y2="350" stroke="#1d2438" stroke-width="1.5"/>
  <text x="135" y="368" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Genesis</text>
  <text x="270" y="368" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Custom</text>
  <text x="405" y="368" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Product</text>
  <text x="540" y="368" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Commodity</text>
  <text x="320" y="388" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Evolution  -></text>
  <line x1="202" y1="80" x2="202" y2="350" stroke="#5b6680" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="337" y1="80" x2="337" y2="350" stroke="#5b6680" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="472" y1="80" x2="472" y2="350" stroke="#5b6680" stroke-width="0.5" stroke-dasharray="3 3"/>

  <!-- value chain nodes -->
  <!-- anchor: user need -->
  <circle cx="150" cy="105" r="7" fill="#2563eb"/>
  <text x="162" y="109" font-family="sans-serif" font-size="11" fill="#1d2438">Customer (need)</text>

  <circle cx="300" cy="160" r="7" fill="#2563eb"/>
  <text x="312" y="164" font-family="sans-serif" font-size="11" fill="#1d2438">Online checkout</text>

  <circle cx="420" cy="215" r="7" fill="#0ea5a4"/>
  <text x="432" y="219" font-family="sans-serif" font-size="11" fill="#1d2438">Payment platform</text>

  <circle cx="470" cy="275" r="7" fill="#f59e0b"/>
  <text x="482" y="279" font-family="sans-serif" font-size="11" fill="#1d2438">Compute</text>

  <circle cx="560" cy="320" r="7" fill="#ef4444"/>
  <text x="500" y="338" font-family="sans-serif" font-size="11" fill="#1d2438">Power (utility)</text>

  <!-- chain links -->
  <line x1="150" y1="105" x2="300" y2="160" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="300" y1="160" x2="420" y2="215" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="420" y1="215" x2="470" y2="275" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="470" y1="275" x2="560" y2="320" stroke="#1d2438" stroke-width="1.5"/>

  <!-- movement arrow -->
  <line x1="305" y1="130" x2="365" y2="130" stroke="#0ea5a4" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0ea5a4"/></marker></defs>
  <text x="335" y="124" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0ea5a4">components drift right</text>
</svg>
