<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Dual-track agile interleaving loop diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#1d2438">Dual-Track Agile</text>
  <text x="320" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Discovery and delivery run in parallel and continuously feed each other</text>

  <!-- Discovery track lane -->
  <rect x="60" y="92" width="520" height="78" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.6"/>
  <text x="80" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">Discovery track</text>
  <text x="80" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">Validate what to build — research, define, ideate, test ideas continuously</text>
  <g fill="none" stroke="#2563eb" stroke-width="2">
    <circle cx="430" cy="140" r="9"/><circle cx="465" cy="140" r="9"/><circle cx="500" cy="140" r="9"/>
  </g>

  <!-- Delivery track lane -->
  <rect x="60" y="230" width="520" height="78" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.6"/>
  <text x="80" y="256" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Delivery track</text>
  <text x="80" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">Build what's validated — develop, test, deploy, ship in iterations</text>
  <g fill="none" stroke="#0ea5a4" stroke-width="2">
    <rect x="421" y="266" width="18" height="18" rx="3"/><rect x="456" y="266" width="18" height="18" rx="3"/><rect x="491" y="266" width="18" height="18" rx="3"/>
  </g>

  <!-- Down arrow: validated ideas feed delivery -->
  <g>
    <path d="M210 170 L210 224" stroke="#1d2438" stroke-width="2.2" fill="none"/>
    <path d="M210 230 L204 220 L216 220 Z" fill="#1d2438"/>
    <rect x="124" y="186" width="172" height="22" rx="11" fill="#ffffff" stroke="#1d2438" stroke-width="1"/>
    <text x="210" y="201" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" fill="#1d2438">validated ideas feed delivery</text>
  </g>

  <!-- Up arrow: shipped feedback feeds discovery -->
  <g>
    <path d="M430 230 L430 176" stroke="#f59e0b" stroke-width="2.2" fill="none"/>
    <path d="M430 170 L424 180 L436 180 Z" fill="#f59e0b"/>
    <rect x="344" y="186" width="180" height="22" rx="11" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
    <text x="434" y="201" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" font-weight="600" fill="#f59e0b">shipped feedback feeds discovery</text>
  </g>

  <text x="320" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Two interleaved tracks, one continuous loop — also called dual-track scrum.</text>
</svg>
