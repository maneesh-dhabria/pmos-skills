<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Ethos Pathos Logos diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Ethos &#183; Pathos &#183; Logos</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Aristotle's three modes of persuasion for stakeholder buy-in</text>

  <!-- Three overlapping circles -->
  <g fill-opacity="0.22">
    <circle cx="250" cy="180" r="100" fill="#2563eb"/>
    <circle cx="390" cy="180" r="100" fill="#f59e0b"/>
    <circle cx="320" cy="290" r="100" fill="#0ea5a4"/>
  </g>
  <g fill="none" stroke-width="2">
    <circle cx="250" cy="180" r="100" stroke="#2563eb"/>
    <circle cx="390" cy="180" r="100" stroke="#f59e0b"/>
    <circle cx="320" cy="290" r="100" stroke="#0ea5a4"/>
  </g>

  <!-- centre: persuasion -->
  <text x="320" y="222" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Persuasion</text>

  <!-- labels -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="200" y="150" font-size="16" font-weight="700" fill="#2563eb">ETHOS</text>
    <text x="200" y="168" font-size="11" fill="#1d2438">Credibility</text>
    <text x="200" y="183" font-size="10" fill="#5b6680">expertise, track</text>
    <text x="200" y="196" font-size="10" fill="#5b6680">record, trust</text>

    <text x="440" y="150" font-size="16" font-weight="700" fill="#f59e0b">LOGOS</text>
    <text x="440" y="168" font-size="11" fill="#1d2438">Logic</text>
    <text x="440" y="183" font-size="10" fill="#5b6680">data, facts,</text>
    <text x="440" y="196" font-size="10" fill="#5b6680">clear structure</text>

    <text x="320" y="318" font-size="16" font-weight="700" fill="#0ea5a4">PATHOS</text>
    <text x="320" y="336" font-size="11" fill="#1d2438">Emotion</text>
    <text x="320" y="351" font-size="10" fill="#5b6680">stories, values,</text>
    <text x="320" y="364" font-size="10" fill="#5b6680">urgency</text>
  </g>
</svg>
