<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Narrative Commitments and Tasks (NCTs) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Narrative · Commitments · Tasks (NCTs)</text>
  <text x="32" y="58" font-family="sans-serif" font-size="13" fill="#5b6680">An OKR alternative: a qualitative story, measurable proof, and concrete actions</text>

  <!-- Narrative -->
  <rect x="32" y="82" width="576" height="78" rx="10" fill="#1d2438"/>
  <text x="52" y="108" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">NARRATIVE</text>
  <text x="52" y="130" font-family="sans-serif" font-size="12" fill="#ffffff">1–2 sentence qualitative description of the quarter's outcome —</text>
  <text x="52" y="148" font-family="sans-serif" font-size="12" fill="#ffffff">what the team wants to achieve and why it matters to the business.</text>

  <!-- down arrow -->
  <line x1="320" y1="160" x2="320" y2="178" stroke="#5b6680" stroke-width="2"/>
  <polygon points="314,178 320,190 326,178" fill="#5b6680"/>

  <!-- Commitments -->
  <rect x="32" y="192" width="576" height="92" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="52" y="216" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">COMMITMENTS</text>
  <text x="52" y="236" font-family="sans-serif" font-size="12" fill="#1d2438">3–5 objectively measurable goals — evidence of progress on the narrative.</text>
  <rect x="52" y="246" width="262" height="28" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1"/>
  <text x="64" y="265" font-family="sans-serif" font-size="11" fill="#1d2438">Metric: +10% onboarding completion</text>
  <rect x="326" y="246" width="262" height="28" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1"/>
  <text x="338" y="265" font-family="sans-serif" font-size="11" fill="#1d2438">Deliverable: launch new flow by Sep</text>

  <!-- down arrow -->
  <line x1="320" y1="284" x2="320" y2="302" stroke="#5b6680" stroke-width="2"/>
  <polygon points="314,302 320,314 326,302" fill="#5b6680"/>

  <!-- Tasks -->
  <rect x="32" y="316" width="576" height="64" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="52" y="340" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">TASKS</text>
  <text x="52" y="360" font-family="sans-serif" font-size="12" fill="#1d2438">Specific actions to achieve each commitment, assigned to people or teams.</text>
  <text x="52" y="375" font-family="sans-serif" font-size="11" fill="#5b6680">Flexible — fits new products / new markets better than rigid OKRs.</text>
</svg>
