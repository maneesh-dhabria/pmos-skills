<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Product Vs. Growth Vs. Brand Marketing diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Brand vs. Product vs. Growth Marketing</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Three disciplines, three questions about the same customer</text>

  <!-- Brand: WHY -->
  <g>
    <rect x="28" y="84" width="184" height="276" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="64" cy="120" r="18" fill="#2563eb"/>
    <text x="64" y="126" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">?</text>
    <text x="96" y="115" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Brand</text>
    <text x="96" y="132" font-family="sans-serif" font-size="11" fill="#2563eb">WHY we exist</text>
    <text x="48" y="166" font-family="sans-serif" font-size="11" fill="#5b6680">Emotional connection</text>
    <text x="48" y="190" font-family="sans-serif" font-size="11" fill="#5b6680">Company story</text>
    <text x="48" y="214" font-family="sans-serif" font-size="11" fill="#5b6680">Narrative positioning</text>
    <text x="48" y="238" font-family="sans-serif" font-size="11" fill="#5b6680">Brand identity</text>
    <line x1="48" y1="258" x2="192" y2="258" stroke="#cbd5e1" stroke-width="1"/>
    <text x="48" y="282" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Goal</text>
    <text x="48" y="302" font-family="sans-serif" font-size="11" fill="#5b6680">Awareness &amp; intent</text>
    <text x="48" y="322" font-family="sans-serif" font-size="11" fill="#5b6680">across every touchpoint</text>
  </g>

  <!-- Product: WHAT -->
  <g>
    <rect x="228" y="84" width="184" height="276" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="246" y="103" width="36" height="36" rx="8" fill="#0ea5a4"/>
    <rect x="256" y="113" width="16" height="16" rx="3" fill="#ffffff"/>
    <text x="296" y="115" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Product</text>
    <text x="296" y="132" font-family="sans-serif" font-size="11" fill="#0ea5a4">WHAT we deliver</text>
    <text x="248" y="166" font-family="sans-serif" font-size="11" fill="#5b6680">Value of each product</text>
    <text x="248" y="190" font-family="sans-serif" font-size="11" fill="#5b6680">Differentiation</text>
    <text x="248" y="214" font-family="sans-serif" font-size="11" fill="#5b6680">Packaging &amp; pricing</text>
    <text x="248" y="238" font-family="sans-serif" font-size="11" fill="#5b6680">Features made clear</text>
    <line x1="248" y1="258" x2="392" y2="258" stroke="#cbd5e1" stroke-width="1"/>
    <text x="248" y="282" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Goal</text>
    <text x="248" y="302" font-family="sans-serif" font-size="11" fill="#5b6680">Help users grasp the</text>
    <text x="248" y="322" font-family="sans-serif" font-size="11" fill="#5b6680">value &amp; impact</text>
  </g>

  <!-- Growth: HOW -->
  <g>
    <rect x="428" y="84" width="184" height="276" rx="12" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <path d="M446 138 L460 110 L474 124 L488 104" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="488" cy="104" r="4" fill="#f59e0b"/>
    <text x="498" y="115" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Growth</text>
    <text x="498" y="132" font-family="sans-serif" font-size="11" fill="#f59e0b">HOW we reach them</text>
    <text x="448" y="166" font-family="sans-serif" font-size="11" fill="#5b6680">Triggers &amp; channels</text>
    <text x="448" y="190" font-family="sans-serif" font-size="11" fill="#5b6680">Messaging</text>
    <text x="448" y="214" font-family="sans-serif" font-size="11" fill="#5b6680">Personalization</text>
    <text x="448" y="238" font-family="sans-serif" font-size="11" fill="#5b6680">Acquisition &amp; retention</text>
    <line x1="448" y1="258" x2="592" y2="258" stroke="#cbd5e1" stroke-width="1"/>
    <text x="448" y="282" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Goal</text>
    <text x="448" y="302" font-family="sans-serif" font-size="11" fill="#5b6680">Bring users to value</text>
    <text x="448" y="322" font-family="sans-serif" font-size="11" fill="#5b6680">&amp; keep them there</text>
  </g>

  <!-- connecting arrows -->
  <path d="M212 222 L228 222" stroke="#9aa6c2" stroke-width="2" marker-end="url(#a)"/>
  <path d="M412 222 L428 222" stroke="#9aa6c2" stroke-width="2" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#9aa6c2"/></marker>
  </defs>
</svg>
