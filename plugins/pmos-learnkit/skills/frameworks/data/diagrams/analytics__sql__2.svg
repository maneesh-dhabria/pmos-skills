<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="SQL JOIN types diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">SQL JOIN Types</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Combine rows from two tables (A, B) on a related column. Shaded region = rows returned.</text>

  <g font-family="sans-serif">
    <!-- INNER JOIN -->
    <g>
      <text x="125" y="92" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">INNER JOIN</text>
      <circle cx="105" cy="140" r="34" fill="none" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="145" cy="140" r="34" fill="none" stroke="#0ea5a4" stroke-width="1.5"/>
      <!-- overlap only -->
      <clipPath id="cL"><circle cx="105" cy="140" r="34"/></clipPath>
      <circle cx="145" cy="140" r="34" fill="#2563eb" opacity="0.40" clip-path="url(#cL)"/>
      <text x="90" y="118" font-size="11" fill="#5b6680">A</text>
      <text x="158" y="118" font-size="11" fill="#5b6680">B</text>
      <text x="125" y="194" font-size="10" fill="#5b6680" text-anchor="middle">only matching rows</text>
    </g>

    <!-- LEFT JOIN -->
    <g>
      <text x="320" y="92" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">LEFT JOIN</text>
      <circle cx="300" cy="140" r="34" fill="#2563eb" opacity="0.40" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="340" cy="140" r="34" fill="none" stroke="#0ea5a4" stroke-width="1.5"/>
      <text x="285" y="118" font-size="11" fill="#5b6680">A</text>
      <text x="353" y="118" font-size="11" fill="#5b6680">B</text>
      <text x="320" y="194" font-size="10" fill="#5b6680" text-anchor="middle">all of A + matches in B</text>
    </g>

    <!-- RIGHT JOIN -->
    <g>
      <text x="515" y="92" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">RIGHT JOIN</text>
      <circle cx="495" cy="140" r="34" fill="none" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="535" cy="140" r="34" fill="#0ea5a4" opacity="0.40" stroke="#0ea5a4" stroke-width="1.5"/>
      <text x="480" y="118" font-size="11" fill="#5b6680">A</text>
      <text x="548" y="118" font-size="11" fill="#5b6680">B</text>
      <text x="515" y="194" font-size="10" fill="#5b6680" text-anchor="middle">all of B + matches in A</text>
    </g>

    <!-- FULL OUTER JOIN -->
    <g>
      <text x="200" y="248" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">FULL OUTER JOIN</text>
      <circle cx="180" cy="300" r="34" fill="#2563eb" opacity="0.40" stroke="#2563eb" stroke-width="1.5"/>
      <circle cx="220" cy="300" r="34" fill="#0ea5a4" opacity="0.40" stroke="#0ea5a4" stroke-width="1.5"/>
      <text x="165" y="278" font-size="11" fill="#5b6680">A</text>
      <text x="233" y="278" font-size="11" fill="#5b6680">B</text>
      <text x="200" y="354" font-size="10" fill="#5b6680" text-anchor="middle">all rows from both tables</text>
    </g>

    <!-- CROSS JOIN -->
    <g>
      <text x="450" y="248" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">CROSS JOIN</text>
      <rect x="408" y="276" width="40" height="48" rx="4" fill="#f59e0b" opacity="0.35" stroke="#f59e0b"/>
      <text x="428" y="304" font-size="11" fill="#5b6680" text-anchor="middle">A</text>
      <text x="466" y="304" font-size="16" fill="#5b6680" text-anchor="middle">&#215;</text>
      <rect x="484" y="276" width="40" height="48" rx="4" fill="#ef4444" opacity="0.30" stroke="#ef4444"/>
      <text x="504" y="304" font-size="11" fill="#5b6680" text-anchor="middle">B</text>
      <text x="466" y="354" font-size="10" fill="#5b6680" text-anchor="middle">every row of A &#215; every row of B</text>
    </g>
  </g>

  <text x="24" y="388" font-family="sans-serif" font-size="11" fill="#5b6680">Choose the join by which unmatched rows you want to keep.</text>
</svg>
