<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Influence Without Authority diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Influence Without Authority</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Cohen &amp; Bradford: trade currencies the other side values — grounded in reciprocity</text>

  <!-- YOU panel -->
  <rect x="32" y="86" width="150" height="250" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="107" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">YOU</text>
  <text x="107" y="132" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">need cooperation</text>
  <text x="107" y="146" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">have no authority</text>

  <!-- ALLY panel -->
  <rect x="458" y="86" width="150" height="250" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="533" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">POTENTIAL ALLY</text>
  <text x="533" y="132" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">has their own goals,</text>
  <text x="533" y="146" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">pressures, currencies</text>

  <!-- exchange arrows -->
  <text x="320" y="100" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">EXCHANGE</text>
  <line x1="190" y1="118" x2="450" y2="118" stroke="#2563eb" stroke-width="2" marker-end="url(#ar)"/>
  <text x="320" y="113" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">you offer a currency they value</text>
  <line x1="450" y1="140" x2="190" y2="140" stroke="#0ea5a4" stroke-width="2" marker-end="url(#at)"/>
  <text x="320" y="155" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">they give cooperation back</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/></marker>
    <marker id="at" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#0ea5a4"/></marker>
  </defs>

  <!-- currencies ledger -->
  <text x="320" y="190" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">The 5 currency families</text>

  <g font-family="sans-serif">
    <rect x="200" y="204" width="240" height="24" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="212" y="221" font-size="11.5" font-weight="700" fill="#f59e0b">Inspiration</text>
    <text x="312" y="221" font-size="11" fill="#5b6680">vision, excellence, moral cause</text>

    <rect x="200" y="232" width="240" height="24" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.3"/>
    <text x="212" y="249" font-size="11.5" font-weight="700" fill="#2563eb">Task</text>
    <text x="312" y="249" font-size="11" fill="#5b6680">resources, help, info, support</text>

    <rect x="200" y="260" width="240" height="24" rx="5" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.3"/>
    <text x="212" y="277" font-size="11.5" font-weight="700" fill="#0ea5a4">Position</text>
    <text x="312" y="277" font-size="11" fill="#5b6680">recognition, visibility, contacts</text>

    <rect x="200" y="288" width="240" height="24" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.3"/>
    <text x="212" y="305" font-size="11.5" font-weight="700" fill="#ef4444">Relationship</text>
    <text x="312" y="305" font-size="11" fill="#5b6680">acceptance, belonging, support</text>

    <rect x="200" y="316" width="240" height="24" rx="5" fill="#ffffff" stroke="#1d2438" stroke-width="1.3"/>
    <text x="212" y="333" font-size="11.5" font-weight="700" fill="#1d2438">Personal</text>
    <text x="312" y="333" font-size="11" fill="#5b6680">gratitude, ownership, comfort</text>
  </g>

  <text x="320" y="366" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">1 Assume they're an ally  →  2 Know their world  →  3 Know your goals/currencies  →  4 Trade</text>
  <text x="320" y="384" font-family="sans-serif" font-size="11" font-style="italic" fill="#2563eb" text-anchor="middle">Law of reciprocity: pay before you ask, and the bank stays open.</text>
</svg>
