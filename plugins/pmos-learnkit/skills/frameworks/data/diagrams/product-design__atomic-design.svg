<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Atomic Design diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Atomic Design</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Five levels compose UI from reusable parts (Brad Frost)</text>

  <!-- Level 1: Atoms -->
  <g font-family="sans-serif">
    <circle cx="70" cy="120" r="11" fill="#2563eb"/>
    <circle cx="98" cy="120" r="11" fill="#0ea5a4"/>
    <circle cx="126" cy="120" r="11" fill="#f59e0b"/>
    <text x="160" y="116" font-size="15" font-weight="700" fill="#1d2438">Atoms</text>
    <text x="160" y="133" font-size="12" fill="#5b6680">button, input, label, color token</text>
  </g>

  <!-- arrow -->
  <text x="100" y="158" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">↓ combine</text>

  <!-- Level 2: Molecules -->
  <g font-family="sans-serif">
    <rect x="56" y="168" width="84" height="26" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <circle cx="70" cy="181" r="6" fill="#0ea5a4"/>
    <rect x="84" y="175" width="48" height="12" rx="3" fill="#2563eb"/>
    <text x="160" y="178" font-size="15" font-weight="700" fill="#1d2438">Molecules</text>
    <text x="160" y="194" font-size="12" fill="#5b6680">search field = label + input + button</text>
  </g>

  <text x="100" y="218" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">↓ group</text>

  <!-- Level 3: Organisms -->
  <g font-family="sans-serif">
    <rect x="48" y="228" width="100" height="34" rx="5" fill="#f4f7ff" stroke="#0ea5a4"/>
    <rect x="56" y="236" width="40" height="8" rx="2" fill="#f59e0b"/>
    <rect x="56" y="248" width="84" height="8" rx="2" fill="#2563eb"/>
    <text x="160" y="240" font-size="15" font-weight="700" fill="#1d2438">Organisms</text>
    <text x="160" y="256" font-size="12" fill="#5b6680">site header = logo + nav + search</text>
  </g>

  <text x="100" y="284" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">↓ assemble</text>

  <!-- Level 4: Templates -->
  <g font-family="sans-serif">
    <rect x="44" y="294" width="108" height="42" rx="5" fill="#ffffff" stroke="#f59e0b"/>
    <rect x="50" y="300" width="96" height="9" rx="2" fill="#e8edf7"/>
    <rect x="50" y="313" width="58" height="17" rx="2" fill="#e8edf7"/>
    <rect x="112" y="313" width="34" height="17" rx="2" fill="#e8edf7"/>
    <text x="160" y="312" font-size="15" font-weight="700" fill="#1d2438">Templates</text>
    <text x="160" y="328" font-size="12" fill="#5b6680">page skeleton, placeholder content</text>
  </g>

  <text x="100" y="358" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">↓ fill</text>

  <!-- Level 5: Pages -->
  <g font-family="sans-serif">
    <rect x="44" y="366" width="108" height="26" rx="5" fill="#2563eb"/>
    <text x="98" y="383" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">real content</text>
    <text x="160" y="376" font-size="15" font-weight="700" fill="#1d2438">Pages</text>
    <text x="160" y="390" font-size="12" fill="#5b6680">specific instance, tested with real data</text>
  </g>

  <!-- right panel: not linear note -->
  <rect x="430" y="92" width="178" height="120" rx="8" fill="#f4f7ff"/>
  <text x="444" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Mental model, not</text>
  <text x="444" y="134" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">a linear pipeline</text>
  <text x="444" y="158" font-family="sans-serif" font-size="12" fill="#5b6680">See an interface as a</text>
  <text x="444" y="174" font-family="sans-serif" font-size="12" fill="#5b6680">whole AND as parts at</text>
  <text x="444" y="190" font-family="sans-serif" font-size="12" fill="#5b6680">the same time.</text>
</svg>
