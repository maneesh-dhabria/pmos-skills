<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Hierarchy of Engagement diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Hierarchy of Engagement</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Three levels to building an enduring product</text>

  <!-- Pyramid: top = level 3, bottom = level 1 (foundation) -->
  <!-- Level 3 (apex) -->
  <polygon points="320,80 250,160 390,160" fill="#f59e0b" opacity="0.9"/>
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">3 · Self-</text>
  <text x="320" y="146" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">perpetuating</text>

  <!-- Level 2 (middle) -->
  <polygon points="250,162 390,162 450,242 190,242" fill="#0ea5a4" opacity="0.9"/>
  <text x="320" y="195" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">2 · Retaining users</text>
  <text x="320" y="216" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">accruing benefits + mounting losses</text>

  <!-- Level 1 (base) -->
  <polygon points="190,244 450,244 520,332 120,332" fill="#2563eb" opacity="0.92"/>
  <text x="320" y="278" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">1 · Growing engaged users</text>
  <text x="320" y="299" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">grow completion of the core action</text>
  <text x="320" y="316" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">(value &gt; raw user count)</text>

  <!-- side annotations -->
  <text x="470" y="120" font-family="sans-serif" font-size="11" fill="#5b6680">network effects,</text>
  <text x="470" y="135" font-family="sans-serif" font-size="11" fill="#5b6680">viral growth, re-engage</text>
  <text x="468" y="208" font-family="sans-serif" font-size="11" fill="#5b6680">intrinsic / extrinsic</text>
  <text x="468" y="223" font-family="sans-serif" font-size="11" fill="#5b6680">social / psychological</text>

  <!-- foundation note -->
  <text x="320" y="368" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Best engagement metric: cohort retention performance over time</text>
</svg>
