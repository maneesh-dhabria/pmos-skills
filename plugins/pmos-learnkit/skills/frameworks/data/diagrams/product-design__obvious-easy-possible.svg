<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Obvious Easy Possible diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Obvious &#183; Easy &#183; Possible</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Fried&#8217;s rule &#8212; match effort to how often a task is done</text>

  <!-- pyramid: 3 tiers -->
  <!-- OBVIOUS (apex) -->
  <polygon points="320,76 396,156 244,156" fill="#2563eb"/>
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">OBVIOUS</text>

  <!-- EASY (middle) -->
  <polygon points="244,160 396,160 452,240 188,240" fill="#0ea5a4"/>
  <text x="320" y="208" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">EASY</text>

  <!-- POSSIBLE (base) -->
  <polygon points="188,244 452,244 508,324 132,324" fill="#f59e0b"/>
  <text x="320" y="292" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">POSSIBLE</text>

  <!-- side annotations -->
  <g font-family="sans-serif">
    <line x1="396" y1="116" x2="540" y2="116" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="544" y="113" font-size="11" font-weight="600" fill="#1d2438">the core</text>
    <text x="544" y="128" font-size="10" fill="#5b6680">always present</text>

    <line x1="430" y1="200" x2="540" y2="200" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="544" y="197" font-size="11" font-weight="600" fill="#1d2438">frequent tasks</text>
    <text x="544" y="212" font-size="10" fill="#5b6680">few steps away</text>

    <line x1="486" y1="284" x2="540" y2="284" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="490" y="284" font-size="11" font-weight="600" fill="#1d2438" dx="54">occasional tasks</text>
    <text x="544" y="299" font-size="10" fill="#5b6680">reachable, not loud</text>
  </g>

  <!-- left axis label -->
  <text x="96" y="84" font-family="sans-serif" font-size="11" fill="#5b6680" font-weight="600">cost &#8593;</text>
  <text x="96" y="322" font-family="sans-serif" font-size="11" fill="#5b6680" font-weight="600">frequency &#8593;</text>

  <!-- bottom takeaway -->
  <text x="320" y="358" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d2438" font-weight="700">Ask &#8220;what must be obvious?&#8221; &#8212; obviousness costs space &amp; attention</text>
  <text x="320" y="376" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">richer than high / medium / low priority</text>
</svg>
