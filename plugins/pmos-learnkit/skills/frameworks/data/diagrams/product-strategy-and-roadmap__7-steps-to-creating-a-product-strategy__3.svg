<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Impact estimation via driver tree diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#1d2438">Estimating Impact: Narrative to Driver Tree</text>
  <text x="320" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b6680">Three steps to size the impact of each pillar</text>

  <!-- Step ladder -->
  <g font-family="Arial, sans-serif">
    <!-- step 1 -->
    <circle cx="52" cy="100" r="14" fill="#2563eb"/>
    <text x="52" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1</text>
    <text x="78" y="98" font-size="14" font-weight="bold" fill="#1d2438">Develop a narrative</text>
    <text x="78" y="116" font-size="12" fill="#5b6680">for how your pillar will create impact</text>

    <!-- step 2 -->
    <circle cx="52" cy="146" r="14" fill="#0ea5a4"/>
    <text x="52" y="151" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">2</text>
    <text x="78" y="144" font-size="14" font-weight="bold" fill="#1d2438">Express it as a driver tree</text>
    <text x="78" y="162" font-size="12" fill="#5b6680">decompose the metric into its drivers</text>

    <!-- step 3 -->
    <circle cx="52" cy="192" r="14" fill="#f59e0b"/>
    <text x="52" y="197" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">3</text>
    <text x="78" y="190" font-size="14" font-weight="bold" fill="#1d2438">Estimate the change</text>
    <text x="78" y="208" font-size="12" fill="#5b6680">in driver metrics from your baseline</text>
  </g>

  <!-- Driver tree illustration -->
  <text x="320" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5b6680">A driver tree</text>

  <!-- root -->
  <rect x="252" y="258" width="136" height="38" rx="8" fill="#1d2438"/>
  <text x="320" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Objective metric</text>

  <!-- connectors -->
  <line x1="290" y1="296" x2="160" y2="332" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="320" y1="296" x2="320" y2="332" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="350" y1="296" x2="480" y2="332" stroke="#5b6680" stroke-width="1.5"/>

  <!-- drivers -->
  <rect x="92" y="332" width="136" height="36" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="160" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d2438">Driver A</text>

  <rect x="252" y="332" width="136" height="36" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d2438">Driver B</text>

  <rect x="412" y="332" width="136" height="36" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1d2438">Driver C</text>
</svg>
