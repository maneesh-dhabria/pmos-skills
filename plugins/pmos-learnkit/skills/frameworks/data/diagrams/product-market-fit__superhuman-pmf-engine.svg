<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Superhuman PMF Engine diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Superhuman PMF Engine</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">A survey-fed loop that systematically raises % "very disappointed"</text>

  <!-- Survey core -->
  <rect x="232" y="150" width="176" height="120" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="176" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">PMF Survey</text>
  <text x="320" y="198" font-family="sans-serif" font-size="10" fill="#1d2438" text-anchor="middle">1. How would you feel if</text>
  <text x="320" y="211" font-family="sans-serif" font-size="10" fill="#1d2438" text-anchor="middle">you couldn't use it?</text>
  <text x="320" y="226" font-family="sans-serif" font-size="10" font-weight="700" fill="#0ea5a4" text-anchor="middle">→ % very disappointed</text>
  <text x="320" y="244" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">2. Who benefits most?</text>
  <text x="320" y="256" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">3. Main benefit?  4. Improve?</text>

  <!-- arrows of the loop -->
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- Step 1: top -->
  <rect x="218" y="78" width="204" height="50" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="98" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">1 · Segment</text>
  <text x="320" y="116" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">find fans · build high-expectation persona</text>

  <!-- Step 2: right -->
  <rect x="440" y="160" width="184" height="64" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="532" y="184" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">2 · Analyze</text>
  <text x="532" y="201" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">convert fence-sitters:</text>
  <text x="532" y="214" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">what resonates vs missing</text>

  <!-- Step 3: bottom -->
  <rect x="218" y="292" width="204" height="50" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="312" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">3 · Build Roadmap</text>
  <text x="320" y="330" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">double-down on loves · close gaps</text>

  <!-- Step 4: left -->
  <rect x="16" y="160" width="184" height="64" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="108" y="184" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">4 · Repeat</text>
  <text x="108" y="201" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">re-survey each cycle</text>
  <text x="108" y="214" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Superhuman: 33% → 58%</text>

  <!-- loop arrows -->
  <path d="M422 103 q70 8 105 52" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M532 224 q-30 60 -110 68" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M218 322 q-80 -8 -110 -56" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M108 160 q30 -60 110 -68" fill="none" stroke="#5b6680" stroke-width="1.5" marker-end="url(#ah)"/>
</svg>
