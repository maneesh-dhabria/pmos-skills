<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Software Testing diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="20" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Software Testing</text>
  <text x="20" y="49" font-family="sans-serif" font-size="12" fill="#5b6680">Two families of tests — what the system does vs. how well it does it</text>

  <!-- Root -->
  <rect x="250" y="64" width="140" height="34" rx="6" fill="#1d2438"/>
  <text x="320" y="86" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Software Testing</text>

  <!-- connectors root -> two families -->
  <path d="M320 98 L320 112 L165 112 L165 126" fill="none" stroke="#5b6680" stroke-width="1.5"/>
  <path d="M320 98 L320 112 L475 112 L475 126" fill="none" stroke="#5b6680" stroke-width="1.5"/>

  <!-- Functional family -->
  <rect x="40" y="126" width="250" height="32" rx="6" fill="#2563eb"/>
  <text x="165" y="147" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Functional Testing</text>
  <text x="165" y="174" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" font-style="italic">Does it meet the requirements?</text>

  <!-- Non-functional family -->
  <rect x="350" y="126" width="250" height="32" rx="6" fill="#0ea5a4"/>
  <text x="475" y="147" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Non-Functional Testing</text>
  <text x="475" y="174" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" font-style="italic">How well does it perform?</text>

  <!-- Functional children -->
  <g font-family="sans-serif">
    <rect x="40" y="186" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="52" y="205" font-size="12" font-weight="700" fill="#1d2438">Unit</text>
    <text x="52" y="221" font-size="10" fill="#5b6680">single component, by developer</text>

    <rect x="40" y="238" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="52" y="257" font-size="12" font-weight="700" fill="#1d2438">Integration</text>
    <text x="52" y="273" font-size="10" fill="#5b6680">modules together — interfaces, data flow</text>

    <rect x="40" y="290" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="52" y="309" font-size="12" font-weight="700" fill="#1d2438">System</text>
    <text x="52" y="325" font-size="10" fill="#5b6680">whole system vs. specified requirements</text>

    <rect x="40" y="342" width="250" height="44" rx="5" fill="#eef6ff" stroke="#2563eb" stroke-width="1.6"/>
    <text x="52" y="361" font-size="12" font-weight="700" fill="#1d2438">Acceptance (UAT)</text>
    <text x="52" y="377" font-size="10" fill="#5b6680">client tests real scenarios — then production</text>
  </g>

  <!-- arrow indicating progression -->
  <text x="300" y="208" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle" transform="rotate(90 300 285)">scope grows ↓</text>

  <!-- Non-functional children -->
  <g font-family="sans-serif">
    <rect x="350" y="186" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="362" y="205" font-size="12" font-weight="700" fill="#1d2438">Security</text>
    <text x="362" y="221" font-size="10" fill="#5b6680">threats, auth, malicious programs</text>

    <rect x="350" y="238" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="362" y="257" font-size="12" font-weight="700" fill="#1d2438">Performance</text>
    <text x="362" y="273" font-size="10" fill="#5b6680">stability &amp; response time under load</text>

    <rect x="350" y="290" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="362" y="309" font-size="12" font-weight="700" fill="#1d2438">Usability</text>
    <text x="362" y="325" font-size="10" fill="#5b6680">look, feel &amp; user-friendliness</text>

    <rect x="350" y="342" width="250" height="44" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.2"/>
    <text x="362" y="361" font-size="12" font-weight="700" fill="#1d2438">Compatibility</text>
    <text x="362" y="377" font-size="10" fill="#5b6680">across OS, browsers, hardware, network</text>
  </g>
</svg>
