<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PM Task Delegation Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438" text-anchor="middle">PM Task Delegation Framework</text>
  <text x="320" y="46" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Shreyas Doshi — what a PM decides solo vs. checks in on (× reversibility)</text>

  <!-- Y axis label -->
  <text x="22" y="210" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle" transform="rotate(-90 22 210)">Impact on business</text>
  <!-- X axis label -->
  <text x="370" y="392" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">PM's confidence in the decision  →</text>

  <!-- Column headers -->
  <text x="245" y="74" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">LOW confidence</text>
  <text x="495" y="74" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">HIGH confidence</text>

  <!-- Row labels -->
  <text x="44" y="120" font-family="sans-serif" font-size="10" font-weight="700" fill="#0ea5a4" text-anchor="start">High +</text>
  <text x="44" y="210" font-family="sans-serif" font-size="10" font-weight="700" fill="#5b6680" text-anchor="start">Low</text>
  <text x="44" y="300" font-family="sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="start">High −</text>

  <!-- Grid cells: 2 cols x 3 rows -->
  <!-- Row 1: high positive impact -->
  <rect x="120" y="82" width="250" height="84" rx="8" fill="#fef0e7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="138" y="103" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Box 3</text>
  <text x="138" y="124" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Check in</text>
  <text x="138" y="142" font-family="sans-serif" font-size="10" fill="#5b6680">High upside, unsure —</text>
  <text x="138" y="156" font-family="sans-serif" font-size="10" fill="#5b6680">get the manager's read</text>

  <rect x="380" y="82" width="240" height="84" rx="8" fill="#2563eb" stroke="#2563eb" stroke-width="1.5"/>
  <text x="398" y="103" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Box 6 ★</text>
  <text x="398" y="124" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Focus zone</text>
  <text x="398" y="142" font-family="sans-serif" font-size="10" fill="#dbe5ff">High impact + confident —</text>
  <text x="398" y="156" font-family="sans-serif" font-size="10" fill="#dbe5ff">spend most time here</text>

  <!-- Row 2: low impact -->
  <rect x="120" y="174" width="250" height="68" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="138" y="195" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">Box 1</text>
  <text x="138" y="214" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Decide solo</text>
  <text x="138" y="232" font-family="sans-serif" font-size="10" fill="#5b6680">Low stakes — just go</text>

  <rect x="380" y="174" width="240" height="68" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="398" y="195" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">Box 2</text>
  <text x="398" y="214" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Decide solo</text>
  <text x="398" y="232" font-family="sans-serif" font-size="10" fill="#5b6680">Low stakes &amp; sure — just go</text>

  <!-- Row 3: high negative impact -->
  <rect x="120" y="250" width="250" height="84" rx="8" fill="#fdeaea" stroke="#ef4444" stroke-width="1.5"/>
  <text x="138" y="271" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Box 4</text>
  <text x="138" y="292" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Check in</text>
  <text x="138" y="310" font-family="sans-serif" font-size="10" fill="#5b6680">Big downside, unsure —</text>
  <text x="138" y="324" font-family="sans-serif" font-size="10" fill="#5b6680">escalate before acting</text>

  <rect x="380" y="250" width="240" height="84" rx="8" fill="#fdeaea" stroke="#ef4444" stroke-width="1.5"/>
  <text x="398" y="271" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Box 5</text>
  <text x="398" y="292" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Check in</text>
  <text x="398" y="310" font-family="sans-serif" font-size="10" fill="#5b6680">Big downside, confident —</text>
  <text x="398" y="324" font-family="sans-serif" font-size="10" fill="#5b6680">still confirm together</text>

  <!-- Reversibility note -->
  <text x="320" y="350" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Boxes 1–2: junior PM decides solo · Boxes 3–6: check in with manager</text>
  <text x="320" y="365" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Reversible? be flexible. Irreversible? be far more careful.</text>
</svg>
