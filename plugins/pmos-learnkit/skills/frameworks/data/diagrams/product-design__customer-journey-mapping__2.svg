<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="The 5 key elements of a journey map diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Anatomy of a Journey Map</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11.5" fill="#5b6680">Every map shares 5 key elements — a reusable template, top to bottom</text>

  <g font-family="sans-serif">
    <!-- 1. Actor -->
    <rect x="24" y="62" width="592" height="44" rx="6" fill="#1d2438"/>
    <circle cx="50" cy="84" r="11" fill="#2563eb"/>
    <text x="50" y="88" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="72" y="80" font-size="12" font-weight="700" fill="#ffffff">Actor</text>
    <text x="72" y="96" font-size="9.5" fill="#dbeafe">The person or user who experiences the journey</text>

    <!-- 2. Scenario + Expectations -->
    <rect x="24" y="112" width="592" height="44" rx="6" fill="#eff4ff" stroke="#2563eb"/>
    <circle cx="50" cy="134" r="11" fill="#2563eb"/>
    <text x="50" y="138" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="72" y="130" font-size="12" font-weight="700" fill="#1d2438">Scenario + Expectations</text>
    <text x="72" y="146" font-size="9.5" fill="#5b6680">The situation, the actor's goal, and what they expect along the way</text>

    <!-- 3. Journey phases -->
    <rect x="24" y="162" width="592" height="40" rx="6" fill="#f4f7ff" stroke="#cbd5e1"/>
    <circle cx="50" cy="182" r="11" fill="#0ea5a4"/>
    <text x="50" y="186" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="72" y="178" font-size="12" font-weight="700" fill="#1d2438">Journey phases</text>
    <text x="72" y="194" font-size="9.5" fill="#5b6680">High-level stages that organize everything below them</text>

    <!-- 4. Actions, Mindsets, Emotions -->
    <rect x="24" y="208" width="592" height="86" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="50" cy="230" r="11" fill="#f59e0b"/>
    <text x="50" y="234" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="72" y="226" font-size="12" font-weight="700" fill="#1d2438">Actions, Mindsets &amp; Emotions</text>
    <text x="72" y="242" font-size="9.5" fill="#5b6680">Mapped within each phase</text>
    <rect x="72" y="250" width="168" height="36" rx="4" fill="#eff4ff"/>
    <text x="80" y="264" font-size="9.5" font-weight="700" fill="#2563eb">Actions</text>
    <text x="80" y="278" font-size="8.5" fill="#1d2438">behaviors &amp; steps taken</text>
    <rect x="248" y="250" width="168" height="36" rx="4" fill="#ecfeff"/>
    <text x="256" y="264" font-size="9.5" font-weight="700" fill="#0e7490">Mindsets</text>
    <text x="256" y="278" font-size="8.5" fill="#1d2438">thoughts &amp; questions</text>
    <rect x="424" y="250" width="184" height="36" rx="4" fill="#fffbeb"/>
    <text x="432" y="264" font-size="9.5" font-weight="700" fill="#b45309">Emotions</text>
    <text x="432" y="278" font-size="8.5" fill="#1d2438">a single line of ups &amp; downs</text>

    <!-- 5. Opportunities -->
    <rect x="24" y="300" width="592" height="44" rx="6" fill="#ecfdf5" stroke="#0ea5a4"/>
    <circle cx="50" cy="322" r="11" fill="#0ea5a4"/>
    <text x="50" y="326" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="72" y="318" font-size="12" font-weight="700" fill="#0e7490">Opportunities</text>
    <text x="72" y="334" font-size="9.5" fill="#1d2438">Insights from the map — plus ownership &amp; metrics — to optimize the experience</text>
  </g>

  <text x="24" y="364" font-family="sans-serif" font-size="9" fill="#5b6680">Read top→bottom: who, in what situation, moving through stages, doing/thinking/feeling — yielding what to improve.</text>
</svg>
