<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Objectives and Key Results (OKRs) diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Objectives &amp; Key Results (OKRs)</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">One inspiring objective &#8594; 2&#8211;5 measurable key results</text>

  <!-- Objective box -->
  <rect x="180" y="76" width="280" height="56" rx="10" fill="#2563eb"/>
  <text x="320" y="100" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">OBJECTIVE</text>
  <text x="320" y="119" font-family="sans-serif" font-size="11" fill="#dbe6ff" text-anchor="middle">Ambitious, qualitative &#8212; what to accomplish</text>

  <!-- connectors -->
  <path d="M320 132 L320 156 M110 156 L530 156" stroke="#5b6680" stroke-width="1.5" fill="none"/>
  <path d="M110 156 L110 176 M320 156 L320 176 M530 156 L530 176" stroke="#5b6680" stroke-width="1.5" fill="none"/>

  <!-- KR type 1: Outcome -->
  <rect x="24" y="176" width="172" height="92" rx="9" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="110" y="200" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">Outcome-metric KR</text>
  <text x="110" y="222" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">End result that</text>
  <text x="110" y="237" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">creates business value</text>
  <text x="110" y="257" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle" font-style="italic">measurable + time-bound</text>

  <!-- KR type 2: Output -->
  <rect x="234" y="176" width="172" height="92" rx="9" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="200" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">Output-metric KR</text>
  <text x="320" y="222" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">Ship a key feature</text>
  <text x="320" y="237" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">by a date</text>
  <text x="320" y="257" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle" font-style="italic">measurable + time-bound</text>

  <!-- KR type 3: KPI -->
  <rect x="444" y="176" width="172" height="92" rx="9" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="530" y="200" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">KPI input KR</text>
  <text x="530" y="222" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">Most influential input</text>
  <text x="530" y="237" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle">that drives outcomes</text>
  <text x="530" y="257" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle" font-style="italic">measurable + time-bound</text>

  <text x="320" y="290" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">A great objective balances all three key-result types</text>

  <!-- Quarterly cadence ribbon -->
  <rect x="24" y="312" width="592" height="64" rx="9" fill="#f4f7ff"/>
  <text x="34" y="332" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Quarterly cadence</text>
  <text x="34" y="362" font-family="sans-serif" font-size="11" fill="#5b6680">Draft &#8594; Align &amp; socialise &#8594; Launch &amp; review &#8594; Score in post-mortem</text>
  <circle cx="600" cy="344" r="4" fill="#2563eb"/>
  <text x="592" y="332" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">each KR has an owner &#8226;</text>
</svg>
