<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Principles of Persuasion diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">The Six Principles of Persuasion</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11" fill="#5b6680">Cialdini's levers that make people more likely to say yes</text>

  <!-- 3x2 grid of levers -->
  <g font-family="sans-serif">
    <!-- Reciprocity -->
    <rect x="24" y="66" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="50" cy="92" r="13" fill="#2563eb"/><text x="50" y="96" font-size="12" fill="#fff" text-anchor="middle">1</text>
    <text x="72" y="96" font-size="13" font-weight="700" fill="#1d2438">Reciprocity</text>
    <text x="38" y="124" font-size="9.5" fill="#5b6680">People repay what they</text>
    <text x="38" y="139" font-size="9.5" fill="#5b6680">receive.</text>
    <text x="38" y="166" font-size="9.5" font-style="italic" fill="#2563eb">Give value first,</text>
    <text x="38" y="181" font-size="9.5" font-style="italic" fill="#2563eb">then ask.</text>

    <!-- Scarcity -->
    <rect x="225" y="66" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="251" cy="92" r="13" fill="#0ea5a4"/><text x="251" y="96" font-size="12" fill="#fff" text-anchor="middle">2</text>
    <text x="273" y="96" font-size="13" font-weight="700" fill="#1d2438">Scarcity</text>
    <text x="239" y="124" font-size="9.5" fill="#5b6680">People want more of</text>
    <text x="239" y="139" font-size="9.5" fill="#5b6680">what is rare.</text>
    <text x="239" y="166" font-size="9.5" font-style="italic" fill="#0ea5a4">Show limited supply</text>
    <text x="239" y="181" font-size="9.5" font-style="italic" fill="#0ea5a4">or time.</text>

    <!-- Authority -->
    <rect x="426" y="66" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="452" cy="92" r="13" fill="#f59e0b"/><text x="452" y="96" font-size="12" fill="#fff" text-anchor="middle">3</text>
    <text x="474" y="96" font-size="13" font-weight="700" fill="#1d2438">Authority</text>
    <text x="440" y="124" font-size="9.5" fill="#5b6680">People defer to credible</text>
    <text x="440" y="139" font-size="9.5" fill="#5b6680">experts.</text>
    <text x="440" y="166" font-size="9.5" font-style="italic" fill="#f59e0b">Surface credentials</text>
    <text x="440" y="181" font-size="9.5" font-style="italic" fill="#f59e0b">&amp; expertise.</text>

    <!-- Commitment & consistency -->
    <rect x="24" y="208" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="50" cy="234" r="13" fill="#2563eb"/><text x="50" y="238" font-size="12" fill="#fff" text-anchor="middle">4</text>
    <text x="72" y="238" font-size="12.5" font-weight="700" fill="#1d2438">Consistency</text>
    <text x="38" y="266" font-size="9.5" fill="#5b6680">People align with prior</text>
    <text x="38" y="281" font-size="9.5" fill="#5b6680">commitments.</text>
    <text x="38" y="308" font-size="9.5" font-style="italic" fill="#2563eb">Get a small yes</text>
    <text x="38" y="323" font-size="9.5" font-style="italic" fill="#2563eb">before a big one.</text>

    <!-- Liking -->
    <rect x="225" y="208" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="251" cy="234" r="13" fill="#0ea5a4"/><text x="251" y="238" font-size="12" fill="#fff" text-anchor="middle">5</text>
    <text x="273" y="238" font-size="13" font-weight="700" fill="#1d2438">Liking</text>
    <text x="239" y="266" font-size="9.5" fill="#5b6680">People say yes to those</text>
    <text x="239" y="281" font-size="9.5" fill="#5b6680">they like.</text>
    <text x="239" y="308" font-size="9.5" font-style="italic" fill="#0ea5a4">Build rapport &amp;</text>
    <text x="239" y="323" font-size="9.5" font-style="italic" fill="#0ea5a4">common ground.</text>

    <!-- Social proof -->
    <rect x="426" y="208" width="190" height="130" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="452" cy="234" r="13" fill="#ef4444"/><text x="452" y="238" font-size="12" fill="#fff" text-anchor="middle">6</text>
    <text x="474" y="238" font-size="12.5" font-weight="700" fill="#1d2438">Social proof</text>
    <text x="440" y="266" font-size="9.5" fill="#5b6680">People follow what</text>
    <text x="440" y="281" font-size="9.5" fill="#5b6680">others do.</text>
    <text x="440" y="308" font-size="9.5" font-style="italic" fill="#ef4444">Show popularity</text>
    <text x="440" y="323" font-size="9.5" font-style="italic" fill="#ef4444">&amp; adoption.</text>
  </g>

  <text x="320" y="362" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Ethical use amplifies a genuine offer; misuse erodes the trust it depends on.</text>
</svg>
