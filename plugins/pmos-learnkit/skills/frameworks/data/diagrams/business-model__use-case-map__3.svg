<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Usage frequency user tiers diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#1d2438">Usage-Frequency User Tiers</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Define frequency at a high level across three user types</text>

  <!-- Pyramid: Power (top) -> Core -> Casual (base) -->
  <!-- Power tier -->
  <polygon points="320,80 268,150 372,150" fill="#2563eb"/>
  <text x="320" y="128" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Power</text>

  <!-- Core tier -->
  <polygon points="268,154 372,154 410,224 230,224" fill="#0ea5a4"/>
  <text x="320" y="198" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Core</text>

  <!-- Casual tier -->
  <polygon points="230,228 410,228 452,300 188,300" fill="#f59e0b"/>
  <text x="320" y="270" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Casual</text>

  <!-- Right-side descriptors -->
  <line x1="372" y1="115" x2="470" y2="115" stroke="#5b6680" stroke-width="1"/>
  <text x="476" y="111" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d2438">Highest frequency</text>
  <text x="476" y="127" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6680">Heaviest, most engaged</text>

  <line x1="410" y1="190" x2="470" y2="190" stroke="#5b6680" stroke-width="1"/>
  <text x="476" y="186" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d2438">Regular use</text>
  <text x="476" y="202" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6680">Steady, habitual base</text>

  <line x1="452" y1="264" x2="470" y2="264" stroke="#5b6680" stroke-width="1"/>
  <text x="476" y="260" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d2438">Lowest frequency</text>
  <text x="476" y="276" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6680">Occasional, widest reach</text>

  <!-- Frequency spectrum footer -->
  <text x="320" y="338" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#1d2438">Category sets the baseline cadence</text>
  <text x="320" y="362" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6680">daily • weekly • monthly • quarterly • yearly</text>
  <text x="320" y="382" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6680">e.g. social / music used far more often than education</text>
</svg>
