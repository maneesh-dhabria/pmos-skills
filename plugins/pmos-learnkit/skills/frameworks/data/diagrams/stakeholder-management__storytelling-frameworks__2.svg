<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Problem-Agitate-Solve narrative escalation diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="38" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Problem · Agitate · Solve (PAS)</text>
  <text x="320" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">A three-stage escalation that builds the pain before offering relief</text>

  <!-- ascending tension curve -->
  <path d="M 70 300 C 200 300 230 150 320 150 C 380 150 400 100 430 100" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 5" opacity="0.8"/>
  <text x="150" y="135" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#f59e0b" font-style="italic">rising stakeholder tension</text>

  <!-- Stage 1: Problem -->
  <g>
    <rect x="60" y="250" width="150" height="90" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="85" cy="278" r="13" fill="#2563eb"/>
    <text x="85" y="283" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="108" y="283" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Problem</text>
    <text x="75" y="307" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Name the pain the</text>
    <text x="75" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">customer faces today.</text>
  </g>

  <!-- Stage 2: Agitate -->
  <g>
    <rect x="245" y="200" width="150" height="90" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
    <circle cx="270" cy="228" r="13" fill="#ef4444"/>
    <text x="270" y="233" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="293" y="233" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Agitate</text>
    <text x="260" y="257" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Dig deeper, make</text>
    <text x="260" y="272" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">the pain felt.</text>
  </g>

  <!-- Stage 3: Solve -->
  <g>
    <rect x="430" y="150" width="150" height="90" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="455" cy="178" r="13" fill="#0ea5a4"/>
    <text x="455" y="183" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="478" y="183" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">Solve</text>
    <text x="445" y="207" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Present the relief —</text>
    <text x="445" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">your proposal.</text>
  </g>

  <!-- arrows -->
  <path d="M 213 285 L 242 250" stroke="#1d2438" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M 398 235 L 427 200" stroke="#1d2438" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1d2438"/>
    </marker>
  </defs>
</svg>
