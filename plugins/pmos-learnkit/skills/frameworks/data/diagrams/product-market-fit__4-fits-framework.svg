<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="4-Fits Framework diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">4-Fits Framework</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">Four interdependent fits to grow to $100M+ &#8212; align them as one loop</text>

  <!-- center hub -->
  <circle cx="320" cy="222" r="52" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
  <text x="320" y="216" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">$100M+</text>
  <text x="320" y="234" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">all 4 aligned</text>

  <!-- Fit 1: top -->
  <rect x="220" y="74" width="200" height="58" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.8"/>
  <text x="320" y="96" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">1 &#183; Market / Product</text>
  <text x="320" y="113" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Category, audience, problems,</text>
  <text x="320" y="126" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">motivations &#8596; value, hook, TTV</text>

  <!-- Fit 2: right -->
  <rect x="436" y="178" width="190" height="58" rx="10" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.8"/>
  <text x="531" y="200" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4" text-anchor="middle">2 &#183; Product / Channel</text>
  <text x="531" y="217" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Product tailored to one channel:</text>
  <text x="531" y="230" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">virality, paid, UGC&#8211;SEO</text>

  <!-- Fit 3: bottom -->
  <rect x="220" y="312" width="200" height="58" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="320" y="334" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">3 &#183; Channel / Model</text>
  <text x="320" y="351" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Channel set by how you charge</text>
  <text x="320" y="364" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">&amp; ARPU &#8596; CAC spectrum</text>

  <!-- Fit 4: left -->
  <rect x="14" y="178" width="190" height="58" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1.8"/>
  <text x="109" y="200" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">4 &#183; Model / Market</text>
  <text x="109" y="217" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">ARPU &#215; customers needed:</text>
  <text x="109" y="230" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Elephants&#8594;Moose&#8594;&#8230;&#8594;Flies</text>

  <!-- circular arrows between fits -->
  <g fill="none" stroke="#1d2438" stroke-width="2">
    <!-- 1 -> 2 (top to right) -->
    <path d="M408 130 A 120 120 0 0 1 480 176"/>
    <!-- 2 -> 3 (right to bottom) -->
    <path d="M480 238 A 120 120 0 0 1 408 312"/>
    <!-- 3 -> 4 (bottom to left) -->
    <path d="M232 312 A 120 120 0 0 1 160 238"/>
    <!-- 4 -> 1 (left to top) -->
    <path d="M160 176 A 120 120 0 0 1 232 130"/>
  </g>
  <g fill="#1d2438">
    <polygon points="480,176 472,166 484,166"/>
    <polygon points="408,312 416,306 414,317"/>
    <polygon points="160,238 168,244 156,247"/>
    <polygon points="232,130 226,140 238,140"/>
  </g>

  <text x="320" y="392" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" font-style="italic">Each fit shapes the next; when one breaks, revisit them all.</text>
</svg>
