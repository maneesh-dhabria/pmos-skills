<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="5-Step Pricing Strategy diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">5-Step Pricing Strategy</text>

  <!-- ascending ladder of 5 steps -->
  <!-- Step 1 -->
  <g>
    <rect x="40" y="300" width="108" height="60" rx="6" fill="#eef3ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="64" cy="318" r="11" fill="#2563eb"/>
    <text x="64" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <text x="94" y="322" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Value metric</text>
    <text x="94" y="340" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">Feature /</text>
    <text x="94" y="352" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">usage / outcome</text>
  </g>
  <!-- Step 2 -->
  <g>
    <rect x="158" y="240" width="108" height="60" rx="6" fill="#eef3ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="182" cy="258" r="11" fill="#2563eb"/>
    <text x="182" y="262" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <text x="212" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Assess WTP</text>
    <text x="212" y="280" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">Measure customer</text>
    <text x="212" y="292" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">willingness to pay</text>
  </g>
  <!-- Step 3 -->
  <g>
    <rect x="276" y="180" width="108" height="60" rx="6" fill="#e8f7f6" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="300" cy="198" r="11" fill="#0ea5a4"/>
    <text x="300" y="202" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <text x="330" y="202" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Drive growth</text>
    <text x="330" y="220" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">Pricing supports</text>
    <text x="330" y="232" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">compounding growth</text>
  </g>
  <!-- Step 4 -->
  <g>
    <rect x="394" y="120" width="108" height="60" rx="6" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="418" cy="138" r="11" fill="#f59e0b"/>
    <text x="418" y="142" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">4</text>
    <text x="448" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Cost of revenue</text>
    <text x="448" y="160" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">Margin, CAC &amp;</text>
    <text x="448" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">payback period</text>
  </g>
  <!-- Step 5 -->
  <g>
    <rect x="512" y="60" width="108" height="60" rx="6" fill="#eef3ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="536" cy="78" r="11" fill="#2563eb"/>
    <text x="536" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">5</text>
    <text x="566" y="82" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Test &amp; adjust</text>
    <text x="566" y="100" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">Iterate price &amp;</text>
    <text x="566" y="112" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">packaging</text>
  </g>

  <!-- connecting arrows up the ladder -->
  <g stroke="#5b6680" stroke-width="1.6" fill="none">
    <path d="M148 318 L156 296" marker-end="url(#ar)"/>
    <path d="M266 258 L274 236" marker-end="url(#ar)"/>
    <path d="M384 198 L392 176" marker-end="url(#ar)"/>
    <path d="M502 138 L510 116" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
