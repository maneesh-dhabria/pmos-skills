<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="6 Monetization Strategy Mistakes diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">6 Monetization Strategy Mistakes</text>

  <!-- Row 1 -->
  <g>
    <rect x="40" y="50" width="560" height="50" rx="6" fill="#fdecec" stroke="#ef4444" stroke-width="1.2"/>
    <circle cx="68" cy="75" r="14" fill="#ef4444"/>
    <text x="68" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="96" y="71" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Business-only view</text>
    <text x="96" y="89" font-family="sans-serif" font-size="11" fill="#5b6680">Price on cost/competition/targets, ignoring how customers perceive value</text>
  </g>
  <!-- Row 2 -->
  <g>
    <rect x="40" y="105" width="560" height="50" rx="6" fill="#eef3ff" stroke="#2563eb" stroke-width="1.2"/>
    <circle cx="68" cy="130" r="14" fill="#2563eb"/>
    <text x="68" y="135" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="96" y="126" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Growth silo</text>
    <text x="96" y="144" font-family="sans-serif" font-size="11" fill="#5b6680">Treat monetization as separate from growth &#8212; a false trade-off; it's an input too</text>
  </g>
  <!-- Row 3 -->
  <g>
    <rect x="40" y="160" width="560" height="50" rx="6" fill="#e8f7f6" stroke="#0ea5a4" stroke-width="1.2"/>
    <circle cx="68" cy="185" r="14" fill="#0ea5a4"/>
    <text x="68" y="190" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="96" y="181" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">All revenue is good</text>
    <text x="96" y="199" font-family="sans-serif" font-size="11" fill="#5b6680">Ignore contribution margin &amp; payback &#8212; not every dollar is worth the same</text>
  </g>
  <!-- Row 4 -->
  <g>
    <rect x="40" y="215" width="560" height="50" rx="6" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="68" cy="240" r="14" fill="#f59e0b"/>
    <text x="68" y="245" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="96" y="236" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Price-only thinking</text>
    <text x="96" y="254" font-family="sans-serif" font-size="11" fill="#5b6680">It's more than price: Scale, What, Amount &amp; When all shape the model</text>
  </g>
  <!-- Row 5 -->
  <g>
    <rect x="40" y="270" width="560" height="50" rx="6" fill="#eef3ff" stroke="#2563eb" stroke-width="1.2"/>
    <circle cx="68" cy="295" r="14" fill="#2563eb"/>
    <text x="68" y="300" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="96" y="291" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Set-and-forget</text>
    <text x="96" y="309" font-family="sans-serif" font-size="11" fill="#5b6680">Pick a strategy and never revisit it &#8212; revisit as product &amp; perception shift</text>
  </g>
  <!-- Row 6 -->
  <g>
    <rect x="40" y="325" width="560" height="50" rx="6" fill="#fdecec" stroke="#ef4444" stroke-width="1.2"/>
    <circle cx="68" cy="350" r="14" fill="#ef4444"/>
    <text x="68" y="355" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">6</text>
    <text x="96" y="346" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Short-term lever</text>
    <text x="96" y="364" font-family="sans-serif" font-size="11" fill="#5b6680">Discount to acquire &#8212; dilutes the quality of your customer base</text>
  </g>
</svg>
