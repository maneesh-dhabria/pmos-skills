<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Concierge MVP diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Concierge MVP</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Deliver the full service by hand before you build the product</text>

  <!-- Panel: manual now -->
  <rect x="40" y="84" width="260" height="264" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="170" y="112" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">NOW: Humans do it</text>
  <text x="170" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">overt, manual, a few customers</text>

  <circle cx="80" cy="172" r="6" fill="#2563eb"/>
  <text x="96" y="176" font-family="sans-serif" font-size="12.5" fill="#1d2438">Pick a few real customers</text>
  <circle cx="80" cy="206" r="6" fill="#2563eb"/>
  <text x="96" y="210" font-family="sans-serif" font-size="12.5" fill="#1d2438">Deliver value by hand,</text>
  <text x="96" y="226" font-family="sans-serif" font-size="12.5" fill="#1d2438">end to end, every step</text>
  <circle cx="80" cy="258" r="6" fill="#2563eb"/>
  <text x="96" y="262" font-family="sans-serif" font-size="12.5" fill="#1d2438">Customer knows it's hands-on</text>
  <circle cx="80" cy="292" r="6" fill="#2563eb"/>
  <text x="96" y="296" font-family="sans-serif" font-size="12.5" fill="#1d2438">Learn the real workflow</text>
  <circle cx="80" cy="326" r="6" fill="#2563eb"/>
  <text x="96" y="330" font-family="sans-serif" font-size="12.5" fill="#1d2438">No code written yet</text>

  <!-- Arrow -->
  <line x1="306" y1="216" x2="348" y2="216" stroke="#5b6680" stroke-width="2"/>
  <polygon points="348,210 360,216 348,222" fill="#5b6680"/>
  <text x="333" y="204" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">validated</text>

  <!-- Panel: automate later -->
  <rect x="366" y="84" width="234" height="264" rx="10" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="483" y="112" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">LATER: Automate</text>
  <text x="483" y="132" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">only the steps proven valuable</text>

  <circle cx="400" cy="172" r="6" fill="#0ea5a4"/>
  <text x="416" y="176" font-family="sans-serif" font-size="12.5" fill="#1d2438">Codify the proven steps</text>
  <circle cx="400" cy="206" r="6" fill="#0ea5a4"/>
  <text x="416" y="210" font-family="sans-serif" font-size="12.5" fill="#1d2438">Build software to scale</text>
  <circle cx="400" cy="240" r="6" fill="#0ea5a4"/>
  <text x="416" y="244" font-family="sans-serif" font-size="12.5" fill="#1d2438">Serve many customers</text>

  <text x="483" y="300" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">Drop steps that</text>
  <text x="483" y="316" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">customers didn't value</text>

  <text x="320" y="382" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#f59e0b">Caution: manual delivery does not prove it scales — only that it's wanted</text>
</svg>
