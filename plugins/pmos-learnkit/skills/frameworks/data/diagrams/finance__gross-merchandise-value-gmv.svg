<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Gross Merchandise Value (GMV) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Gross Merchandise Value (GMV)</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">Total value of goods sold through a marketplace &#8212; before any deductions</text>

  <!-- Formula row -->
  <g font-family="sans-serif" text-anchor="middle">
    <rect x="40" y="84" width="160" height="56" rx="8" fill="#0ea5a4"/>
    <text x="120" y="108" font-size="12" font-weight="700" fill="#ffffff">Average Order</text>
    <text x="120" y="125" font-size="12" font-weight="700" fill="#ffffff">Value</text>
    <text x="218" y="120" font-size="26" font-weight="700" fill="#5b6680">&#215;</text>
    <rect x="240" y="84" width="160" height="56" rx="8" fill="#f59e0b"/>
    <text x="320" y="108" font-size="12" font-weight="700" fill="#1d2438">Total</text>
    <text x="320" y="125" font-size="12" font-weight="700" fill="#1d2438">Transactions</text>
    <text x="418" y="120" font-size="26" font-weight="700" fill="#5b6680">=</text>
    <rect x="440" y="84" width="160" height="56" rx="8" fill="#2563eb"/>
    <text x="520" y="118" font-size="18" font-weight="700" fill="#ffffff">GMV</text>
  </g>

  <!-- Funnel: GMV at top, deductions peel away, revenue at bottom -->
  <text x="32" y="178" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">GMV is gross &#8212; revenue is what's left after deductions</text>

  <g font-family="sans-serif">
    <!-- top band: GMV -->
    <polygon points="120,196 520,196 480,238 160,238" fill="#2563eb"/>
    <text x="320" y="223" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">GMV (total sales value)</text>

    <!-- deductions -->
    <polygon points="160,242 480,242 452,278 188,278" fill="#eef2ff" stroke="#2563eb" stroke-width="0.8"/>
    <text x="320" y="265" font-size="11.5" fill="#1d2438" text-anchor="middle">&#8722; Discounts &amp; promotions</text>

    <polygon points="188,282 452,282 424,318 216,318" fill="#eef2ff" stroke="#2563eb" stroke-width="0.8"/>
    <text x="320" y="305" font-size="11.5" fill="#1d2438" text-anchor="middle">&#8722; Returns, delivery, marketing</text>

    <!-- bottom: revenue -->
    <polygon points="216,322 424,322 396,360 244,360" fill="#0ea5a4"/>
    <text x="320" y="346" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">Revenue (a slice of GMV)</text>
  </g>

  <!-- side labels -->
  <text x="556" y="218" font-family="sans-serif" font-size="10.5" fill="#5b6680">marketplace</text>
  <text x="556" y="232" font-family="sans-serif" font-size="10.5" fill="#5b6680">health signal</text>

  <text x="32" y="386" font-family="sans-serif" font-size="11.5" fill="#5b6680">Marketplace revenue = a function of GMV &#215; take-rate / fees. Bigger GMV, bigger fee base.</text>
</svg>
