<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Ease effort range buckets diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Ease — effort range buckets</text>
  <text x="32" y="64" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">Translate fuzzy effort into a 1–10 Ease score via fixed buckets (example mapping)</text>

  <!-- header -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <rect x="32" y="84" width="120" height="34" fill="#1d2438"/>
    <text x="92" y="106" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Ease score</text>
    <rect x="152" y="84" width="200" height="34" fill="#1d2438"/>
    <text x="252" y="106" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Estimated effort</text>
    <rect x="352" y="84" width="256" height="34" fill="#1d2438"/>
    <text x="480" y="106" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Typical meaning</text>
  </g>

  <!-- rows -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">
    <!-- row 1 hard -->
    <rect x="32" y="118" width="576" height="44" fill="#f4f7ff" stroke="#ffffff"/>
    <rect x="32" y="118" width="120" height="44" fill="#ef4444"/>
    <text x="92" y="145" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">1–2</text>
    <text x="164" y="145">&gt; 4 weeks / multi-team</text>
    <text x="366" y="145" fill="#5b6680">Hard — large build</text>

    <rect x="32" y="162" width="576" height="44" fill="#ffffff" stroke="#e6ebff"/>
    <rect x="32" y="162" width="120" height="44" fill="#f59e0b"/>
    <text x="92" y="189" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">3–4</text>
    <text x="164" y="189">2–4 weeks</text>
    <text x="366" y="189" fill="#5b6680">Sizable</text>

    <rect x="32" y="206" width="576" height="44" fill="#f4f7ff" stroke="#ffffff"/>
    <rect x="32" y="206" width="120" height="44" fill="#f59e0b"/>
    <text x="92" y="233" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">5–6</text>
    <text x="164" y="233">1–2 weeks</text>
    <text x="366" y="233" fill="#5b6680">Moderate</text>

    <rect x="32" y="250" width="576" height="44" fill="#ffffff" stroke="#e6ebff"/>
    <rect x="32" y="250" width="120" height="44" fill="#0ea5a4"/>
    <text x="92" y="277" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">7–8</text>
    <text x="164" y="277">2–5 days</text>
    <text x="366" y="277" fill="#5b6680">Small</text>

    <rect x="32" y="294" width="576" height="44" fill="#f4f7ff" stroke="#ffffff"/>
    <rect x="32" y="294" width="120" height="44" fill="#2563eb"/>
    <text x="92" y="321" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">9–10</text>
    <text x="164" y="321">&lt; 1 day / config change</text>
    <text x="366" y="321" fill="#5b6680">Trivial — quick win</text>
  </g>

  <text x="32" y="366" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Higher score = easier. Buckets keep Ease consistent across raters.</text>
</svg>
