<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Binary Materiality threshold diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Binary Materiality</text>
  <text x="320" y="49" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Collapse a fuzzy estimate onto one threshold: material (&#10003;) or not (&#10007;)</text>

  <!-- Gauge / scale: a horizontal magnitude axis with a threshold line -->
  <text x="60" y="92" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">Estimated effect size &#8594;</text>

  <!-- axis -->
  <line x1="60" y1="160" x2="580" y2="160" stroke="#1d2438" stroke-width="2"/>
  <!-- low / high end labels -->
  <text x="60" y="182" text-anchor="start" font-family="sans-serif" font-size="10" fill="#5b6680">incremental</text>
  <text x="580" y="182" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6680">large, measurable</text>

  <!-- not-material zone -->
  <rect x="60" y="108" width="260" height="52" fill="#f4f7ff" stroke="#cbd2e0" stroke-width="1.5"/>
  <text x="190" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">NOT material</text>
  <text x="190" y="147" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">too small to measure &#8594; score 0</text>

  <!-- material zone -->
  <rect x="320" y="108" width="260" height="52" fill="#f0fbfa" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="450" y="130" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">MATERIAL</text>
  <text x="450" y="147" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0ea5a4">curve visibly changes &#8594; score 1</text>

  <!-- threshold marker -->
  <line x1="320" y1="98" x2="320" y2="172" stroke="#ef4444" stroke-width="3"/>
  <text x="320" y="92" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">threshold</text>
  <circle cx="320" cy="160" r="5" fill="#ef4444"/>

  <!-- Concrete bars showing each measurable bar must clear the line -->
  <text x="320" y="222" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Write down the exact change &#8212; only large effects count</text>

  <!-- example rows -->
  <g font-family="sans-serif">
    <text x="60" y="262" font-size="11" fill="#1d2438">Revenue</text>
    <rect x="160" y="252" width="120" height="14" rx="3" fill="#cbd2e0"/>
    <rect x="160" y="252" width="220" height="14" rx="3" fill="#0ea5a4"/>
    <text x="395" y="263" font-size="10" fill="#5b6680">&#8805; +10% bump</text>

    <text x="60" y="294" font-size="11" fill="#1d2438">Retention</text>
    <rect x="160" y="284" width="120" height="14" rx="3" fill="#cbd2e0"/>
    <rect x="160" y="284" width="210" height="14" rx="3" fill="#2563eb"/>
    <text x="395" y="295" font-size="10" fill="#5b6680">&#8805; -20% cancellations</text>

    <text x="60" y="326" font-size="11" fill="#1d2438">Intuitiveness</text>
    <rect x="160" y="316" width="120" height="14" rx="3" fill="#cbd2e0"/>
    <rect x="160" y="316" width="205" height="14" rx="3" fill="#f59e0b"/>
    <text x="395" y="327" font-size="10" fill="#5b6680">&#8805; -40% support tickets</text>
  </g>

  <!-- threshold dashed line over bars -->
  <line x1="280" y1="246" x2="280" y2="334" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="320" y="364" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Forcing the number makes most ideas admit they are immaterial &#8212; no half-points, no weights.</text>
</svg>
