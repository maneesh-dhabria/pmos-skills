<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Psych Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Psych Framework</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Score a screen's emotional energy 0–100; every element adds or drains psych</text>

  <!-- Gauge scale 0..100 -->
  <text x="24" y="100" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">PSYCH SCALE</text>
  <rect x="24" y="110" width="592" height="26" rx="13" fill="#ef4444"/>
  <rect x="24" y="110" width="592" height="26" rx="13" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#0ea5a4"/>
    </linearGradient>
  </defs>
  <text x="28" y="156" font-family="sans-serif" font-size="11" fill="#1d2438">0 · exhausted, disinterested</text>
  <text x="612" y="156" text-anchor="end" font-family="sans-serif" font-size="11" fill="#1d2438">fully committed · 100</text>

  <!-- Running calculation -->
  <text x="24" y="200" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">RUNNING SCORE THROUGH THE FLOW</text>

  <!-- start node -->
  <rect x="24" y="214" width="150" height="62" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="99" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Initial psych</text>
  <text x="99" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">on entry, by judgment</text>
  <text x="99" y="269" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">e.g. urgent pain = high</text>

  <text x="186" y="250" font-family="sans-serif" font-size="18" fill="#5b6680">+</text>

  <!-- element scan -->
  <rect x="204" y="214" width="180" height="62" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="294" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Scan each element</text>
  <text x="294" y="254" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">top-right → bottom-left</text>
  <text x="294" y="269" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">sum +/- per element</text>

  <text x="396" y="250" font-family="sans-serif" font-size="18" fill="#5b6680">=</text>

  <!-- total -->
  <rect x="414" y="214" width="202" height="62" rx="8" fill="#2563eb"/>
  <text x="515" y="240" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Screen psych score</text>
  <text x="515" y="262" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dbe7ff">review as a team, fix drops</text>

  <!-- + / - element legend -->
  <rect x="24" y="300" width="290" height="78" rx="8" fill="#f4f7ff"/>
  <circle cx="42" cy="320" r="7" fill="#0ea5a4"/>
  <text x="42" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">+</text>
  <text x="58" y="324" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Adds psych</text>
  <text x="42" y="345" font-family="sans-serif" font-size="10" fill="#5b6680">Clear CTAs · trust signals ·</text>
  <text x="42" y="360" font-family="sans-serif" font-size="10" fill="#5b6680">positive imagery · plain language</text>

  <rect x="326" y="300" width="290" height="78" rx="8" fill="#f4f7ff"/>
  <circle cx="344" cy="320" r="7" fill="#ef4444"/>
  <text x="344" y="324" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">–</text>
  <text x="360" y="324" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Drains psych</text>
  <text x="344" y="345" font-family="sans-serif" font-size="10" fill="#5b6680">Complex forms · confusing nav ·</text>
  <text x="344" y="360" font-family="sans-serif" font-size="10" fill="#5b6680">no white space · friction</text>
</svg>
