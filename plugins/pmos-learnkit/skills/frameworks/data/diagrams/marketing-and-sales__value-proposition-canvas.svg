<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Value Proposition Canvas diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Value Proposition Canvas</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Achieve fit between what you offer and what the customer needs</text>

  <!-- Value Map: square (left) -->
  <g font-family="sans-serif">
    <rect x="40" y="74" width="240" height="288" rx="14" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="160" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#2563eb">Value Map</text>
    <text x="160" y="114" text-anchor="middle" font-size="11" fill="#5b6680">What you offer</text>

    <rect x="60" y="128" width="200" height="64" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="74" y="150" font-size="12" font-weight="700" fill="#1d2438">Products &amp; services</text>
    <text x="74" y="170" font-size="11" fill="#5b6680">the solutions you provide</text>

    <rect x="60" y="200" width="200" height="68" rx="8" fill="#ffffff" stroke="#0ea5a4"/>
    <text x="74" y="222" font-size="12" font-weight="700" fill="#0ea5a4">Pain relievers</text>
    <text x="74" y="242" font-size="11" fill="#5b6680">how you solve their</text>
    <text x="74" y="258" font-size="11" fill="#5b6680">problems</text>

    <rect x="60" y="276" width="200" height="68" rx="8" fill="#ffffff" stroke="#f59e0b"/>
    <text x="74" y="298" font-size="12" font-weight="700" fill="#f59e0b">Gain creators</text>
    <text x="74" y="318" font-size="11" fill="#5b6680">how you fulfill their</text>
    <text x="74" y="334" font-size="11" fill="#5b6680">desires</text>
  </g>

  <!-- Fit arrows in the middle -->
  <g>
    <text x="320" y="206" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Fit</text>
    <path d="M296 224 L344 224" stroke="#9aa6c2" stroke-width="2" marker-end="url(#vr)"/>
    <path d="M344 248 L296 248" stroke="#9aa6c2" stroke-width="2" marker-end="url(#vl)"/>
    <text x="320" y="278" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">align</text>
    <defs>
      <marker id="vr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#9aa6c2"/></marker>
      <marker id="vl" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#9aa6c2"/></marker>
    </defs>
  </g>

  <!-- Customer Profile: circle (right) -->
  <g font-family="sans-serif">
    <circle cx="478" cy="218" r="142" fill="#f4f7ff" stroke="#1d2438" stroke-width="2"/>
    <text x="478" y="98" text-anchor="middle" font-size="14" font-weight="700" fill="#1d2438">Customer Profile</text>
    <text x="478" y="114" text-anchor="middle" font-size="11" fill="#5b6680">What the customer needs</text>

    <!-- pie-ish thirds -->
    <text x="478" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Customer jobs</text>
    <text x="478" y="168" text-anchor="middle" font-size="11" fill="#5b6680">tasks they need to do</text>

    <line x1="370" y1="186" x2="586" y2="186" stroke="#cbd5e1"/>
    <text x="478" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#0ea5a4">Pains</text>
    <text x="478" y="236" text-anchor="middle" font-size="11" fill="#5b6680">problems &amp; frustrations</text>

    <line x1="372" y1="256" x2="584" y2="256" stroke="#cbd5e1"/>
    <text x="478" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">Gains</text>
    <text x="478" y="306" text-anchor="middle" font-size="11" fill="#5b6680">outcomes &amp; aspirations</text>
  </g>
</svg>
