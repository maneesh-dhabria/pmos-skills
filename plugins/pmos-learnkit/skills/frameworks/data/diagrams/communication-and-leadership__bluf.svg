<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="BLUF diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">BLUF — Bottom Line Up Front</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Lead with the conclusion; let detail follow for those who need it.</text>

  <!-- BLUF panel: the answer first -->
  <rect x="32" y="80" width="576" height="84" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="48" y="106" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">BLUF (sentence 1)</text>
  <text x="48" y="130" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">"Recommend we ship checkout v2 Thursday — need design sign-off by Tue."</text>
  <text x="48" y="152" font-family="sans-serif" font-size="12" fill="#5b6680">Decision + action + ask, before any context. Reader can act here and stop.</text>

  <!-- arrow down -->
  <path d="M320 164 L320 188" stroke="#5b6680" stroke-width="2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- supporting detail tiers -->
  <rect x="80" y="196" width="480" height="46" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="100" y="216" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Why / context</text>
  <text x="100" y="234" font-family="sans-serif" font-size="12" fill="#5b6680">Conversion lift, the facilities risk, the trade-off you weighed.</text>

  <rect x="112" y="252" width="416" height="44" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="271" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">Supporting detail</text>
  <text x="132" y="289" font-family="sans-serif" font-size="12" fill="#5b6680">Data tables, edge cases, links, appendix.</text>

  <rect x="144" y="306" width="352" height="42" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="164" y="324" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">Background</text>
  <text x="164" y="342" font-family="sans-serif" font-size="12" fill="#5b6680">Optional — only the deepest reader scrolls here.</text>

  <text x="32" y="380" font-family="sans-serif" font-size="12" fill="#5b6680">Inverted pyramid: each layer matters to fewer readers. Origin: US Army AR 25-50.</text>
</svg>
