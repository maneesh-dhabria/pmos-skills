<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Apple Pie Positions diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Apple Pie Positions</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Sounds smart &amp; hard to challenge — but adds little value here</text>

  <!-- Two contrasting gauges -->
  <g font-family="sans-serif">
    <!-- gauge 1: social safety HIGH -->
    <text x="60" y="105" font-size="13" font-weight="600" fill="#1d2438">Hard to push back on</text>
    <rect x="60" y="115" width="220" height="16" rx="8" fill="#eef2fb"/>
    <rect x="60" y="115" width="200" height="16" rx="8" fill="#0ea5a4"/>
    <text x="60" y="148" font-size="11" fill="#5b6680">Elevates the speaker · low personal risk</text>

    <!-- gauge 2: actual value LOW -->
    <text x="60" y="190" font-size="13" font-weight="600" fill="#1d2438">Actual value in this context</text>
    <rect x="60" y="200" width="220" height="16" rx="8" fill="#eef2fb"/>
    <rect x="60" y="200" width="48" height="16" rx="8" fill="#ef4444"/>
    <text x="60" y="233" font-size="11" fill="#5b6680">Often low, zero, or negative</text>

    <!-- The gap callout -->
    <rect x="60" y="258" width="220" height="92" rx="10" fill="#f4f7ff" stroke="#cbd5e8"/>
    <text x="76" y="282" font-size="13" font-weight="700" fill="#2563eb">Context-specific</text>
    <text x="76" y="304" font-size="11.5" fill="#5b6680">The same sentence can be the</text>
    <text x="76" y="320" font-size="11.5" fill="#5b6680">right focus — or an Apple Pie.</text>
    <text x="76" y="340" font-size="11.5" font-weight="600" fill="#1d2438">Good judgment decides which.</text>
  </g>

  <!-- Examples panel -->
  <g font-family="sans-serif">
    <rect x="320" y="92" width="270" height="180" rx="10" fill="#ffffff" stroke="#cbd5e8"/>
    <text x="336" y="115" font-size="13" font-weight="700" fill="#1d2438">Familiar examples</text>
    <g font-size="11.5" fill="#5b6680">
      <text x="336" y="140">&#8226; "Let's define the success metrics."</text>
      <text x="336" y="162">&#8226; "Do you have data to back that up?"</text>
      <text x="336" y="184">&#8226; "We need more scalable processes."</text>
      <text x="336" y="206">&#8226; "It's a two-way door — decide fast."</text>
      <text x="336" y="228">&#8226; "We need more metrics first."</text>
      <text x="336" y="250">&#8226; "Replace the meeting with written updates."</text>
    </g>

    <!-- tactics -->
    <rect x="320" y="284" width="270" height="66" rx="10" fill="#eef6f6" stroke="#0ea5a4"/>
    <text x="336" y="307" font-size="12.5" font-weight="700" fill="#0ea5a4">Tactic</text>
    <text x="336" y="326" font-size="11.5" fill="#1d2438">Name them as a team. A shared term</text>
    <text x="336" y="342" font-size="11.5" fill="#1d2438">removes stigma &amp; restores rigor.</text>
  </g>
</svg>
