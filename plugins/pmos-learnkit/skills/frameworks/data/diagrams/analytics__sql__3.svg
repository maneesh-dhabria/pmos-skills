<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="SQL window function anatomy diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Window Functions</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">A calculation across a set of rows ("window") &#8212; without collapsing them into one group.</text>

  <!-- syntax bar with labelled parts -->
  <g font-family="monospace">
    <rect x="24" y="74" width="592" height="40" rx="6" fill="#f4f7ff" stroke="#c5d6f9"/>
    <text x="40" y="99" font-size="13" fill="#2563eb" font-weight="700">function()</text>
    <text x="150" y="99" font-size="13" fill="#1d2438">OVER (</text>
    <text x="218" y="99" font-size="13" fill="#0ea5a4" font-weight="700">PARTITION BY col</text>
    <text x="400" y="99" font-size="13" fill="#f59e0b" font-weight="700">ORDER BY col</text>
    <text x="548" y="99" font-size="13" fill="#1d2438">)</text>
  </g>

  <!-- callouts -->
  <g font-family="sans-serif" font-size="10" fill="#5b6680">
    <line x1="80" y1="120" x2="80" y2="138" stroke="#2563eb" stroke-width="1"/>
    <text x="80" y="150" text-anchor="middle" fill="#2563eb" font-weight="700">what to compute</text>
    <text x="80" y="163" text-anchor="middle">ROW_NUMBER, RANK,</text>
    <text x="80" y="175" text-anchor="middle">SUM, AVG, LAG&#8230;</text>

    <line x1="290" y1="120" x2="290" y2="138" stroke="#0ea5a4" stroke-width="1"/>
    <text x="290" y="150" text-anchor="middle" fill="#0ea5a4" font-weight="700">split rows into groups</text>
    <text x="290" y="163" text-anchor="middle">resets the calc per partition</text>

    <line x1="455" y1="120" x2="455" y2="138" stroke="#f59e0b" stroke-width="1"/>
    <text x="455" y="150" text-anchor="middle" fill="#f59e0b" font-weight="700">order within group</text>
    <text x="455" y="163" text-anchor="middle">defines running / ranked sequence</text>
  </g>

  <!-- worked illustration: two partitions -->
  <text x="24" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Example: RANK() OVER (PARTITION BY region ORDER BY sales DESC)</text>

  <g font-family="sans-serif" font-size="11">
    <!-- partition A -->
    <rect x="24" y="222" width="280" height="150" rx="8" fill="none" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="40" y="242" font-weight="700" fill="#0ea5a4">PARTITION: region = US</text>
    <rect x="40" y="252" width="248" height="26" rx="4" fill="#0ea5a4" opacity="0.18"/>
    <text x="50" y="270" fill="#1d2438">sales 900</text><text x="250" y="270" fill="#2563eb" font-weight="700">rank 1</text>
    <rect x="40" y="284" width="248" height="26" rx="4" fill="#0ea5a4" opacity="0.13"/>
    <text x="50" y="302" fill="#1d2438">sales 700</text><text x="250" y="302" fill="#2563eb" font-weight="700">rank 2</text>
    <rect x="40" y="316" width="248" height="26" rx="4" fill="#0ea5a4" opacity="0.08"/>
    <text x="50" y="334" fill="#1d2438">sales 400</text><text x="250" y="334" fill="#2563eb" font-weight="700">rank 3</text>
    <text x="40" y="360" font-size="9" fill="#5b6680">rank resets at the next partition &#8595;</text>

    <!-- partition B -->
    <rect x="336" y="222" width="280" height="150" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="352" y="242" font-weight="700" fill="#f59e0b">PARTITION: region = EU</text>
    <rect x="352" y="252" width="248" height="26" rx="4" fill="#f59e0b" opacity="0.18"/>
    <text x="362" y="270" fill="#1d2438">sales 650</text><text x="562" y="270" fill="#2563eb" font-weight="700">rank 1</text>
    <rect x="352" y="284" width="248" height="26" rx="4" fill="#f59e0b" opacity="0.13"/>
    <text x="362" y="302" fill="#1d2438">sales 500</text><text x="562" y="302" fill="#2563eb" font-weight="700">rank 2</text>
    <rect x="352" y="316" width="248" height="26" rx="4" fill="#f59e0b" opacity="0.08"/>
    <text x="362" y="334" fill="#1d2438">sales 300</text><text x="562" y="334" fill="#2563eb" font-weight="700">rank 3</text>
    <text x="352" y="360" font-size="9" fill="#5b6680">every row kept &#8212; not collapsed</text>
  </g>
</svg>
