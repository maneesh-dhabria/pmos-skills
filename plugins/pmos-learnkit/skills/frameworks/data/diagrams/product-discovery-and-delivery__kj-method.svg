<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="KJ Method diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">KJ Method</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Bottom-up: cards &#8594; affinity clusters &#8594; titles &#8594; narrated themes</text>

  <!-- Stage 1: scattered cards -->
  <text x="32" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">1 &middot; Write observations on cards</text>
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <rect x="32" y="102" width="64" height="34" rx="4" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="40" y="123">obs A</text>
    <rect x="108" y="108" width="64" height="34" rx="4" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="116" y="129">obs B</text>
    <rect x="184" y="100" width="64" height="34" rx="4" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="192" y="121">obs C</text>
    <rect x="260" y="110" width="64" height="34" rx="4" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="268" y="131">obs D</text>
    <rect x="336" y="102" width="64" height="34" rx="4" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="344" y="123">obs E</text>
  </g>

  <!-- arrow down -->
  <path d="M320 152 L320 178" stroke="#5b6680" stroke-width="2" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- Stage 2: cluster by affinity -->
  <text x="32" y="200" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">2 &middot; Group by intrinsic affinity (no preset buckets)</text>
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <rect x="40" y="212" width="170" height="86" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="54" y="224" width="58" height="26" rx="3" fill="#f4f7ff" stroke="#5b6680"/><text x="62" y="241">obs A</text>
    <rect x="120" y="232" width="58" height="26" rx="3" fill="#f4f7ff" stroke="#5b6680"/><text x="128" y="249">obs C</text>
    <rect x="78" y="262" width="58" height="26" rx="3" fill="#f4f7ff" stroke="#5b6680"/><text x="86" y="279">obs E</text>

    <rect x="232" y="212" width="170" height="86" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="246" y="232" width="58" height="26" rx="3" fill="#f4f7ff" stroke="#5b6680"/><text x="254" y="249">obs B</text>
    <rect x="312" y="248" width="58" height="26" rx="3" fill="#f4f7ff" stroke="#5b6680"/><text x="320" y="265">obs D</text>
  </g>

  <!-- Stage 3: title clusters -->
  <text x="430" y="228" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">3 &middot; Title each cluster</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <rect x="430" y="238" width="178" height="30" rx="4" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="440" y="257">&#8220;Onboarding confusion&#8221;</text>
    <rect x="430" y="276" width="178" height="30" rx="4" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="440" y="295">&#8220;Trust in pricing&#8221;</text>
  </g>

  <!-- arrow down to themes -->
  <path d="M320 308 L320 332" stroke="#5b6680" stroke-width="2" marker-end="url(#a)"/>

  <!-- Stage 4: narrate -->
  <rect x="40" y="338" width="568" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="56" y="358" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">4 &middot; Narrate emergent themes</text>
  <text x="56" y="374" font-family="sans-serif" font-size="11" fill="#5b6680">Relate the titled clusters into a story &#8212; the insight nobody wrote on a single card.</text>
</svg>
