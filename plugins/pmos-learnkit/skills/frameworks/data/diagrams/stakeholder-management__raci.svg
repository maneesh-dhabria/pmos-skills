<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="RACI matrix diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">RACI Matrix</text>
  <text x="320" y="52" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Who does what on every task, decision &amp; milestone</text>

  <!-- Legend of the four roles -->
  <g font-family="sans-serif" font-size="11">
    <circle cx="78" cy="76" r="11" fill="#2563eb"/><text x="78" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">R</text>
    <text x="95" y="80" fill="#1d2438" font-weight="600">Responsible</text><text x="95" y="93" fill="#5b6680">does the work</text>

    <circle cx="248" cy="76" r="11" fill="#ef4444"/><text x="248" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">A</text>
    <text x="265" y="80" fill="#1d2438" font-weight="600">Accountable</text><text x="265" y="93" fill="#5b6680">owns &amp; decides</text>

    <circle cx="418" cy="76" r="11" fill="#0ea5a4"/><text x="418" y="80" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">C</text>
    <text x="435" y="80" fill="#1d2438" font-weight="600">Consulted</text><text x="435" y="93" fill="#5b6680">give input first</text>

    <circle cx="78" cy="112" r="11" fill="#f59e0b"/><text x="78" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">I</text>
    <text x="95" y="116" fill="#1d2438" font-weight="600">Informed</text><text x="95" y="129" fill="#5b6680">kept in the loop after</text>
  </g>

  <!-- Matrix -->
  <g font-family="sans-serif">
    <!-- column headers (roles) -->
    <text x="40" y="166" font-size="11" font-weight="700" fill="#5b6680">Task</text>
    <g text-anchor="middle" font-size="11" font-weight="700" fill="#1d2438">
      <text x="350" y="166">PM</text>
      <text x="430" y="166">Eng Lead</text>
      <text x="510" y="166">Design</text>
      <text x="585" y="166">Exec</text>
    </g>
    <line x1="40" y1="176" x2="600" y2="176" stroke="#1d2438" stroke-width="1.5"/>

    <!-- rows -->
    <g font-family="sans-serif">
      <!-- row template helper inlined -->
      <!-- row 1 -->
      <text x="40" y="206" font-size="11.5" fill="#1d2438">Define scope</text>
      <circle cx="350" cy="202" r="11" fill="#ef4444"/><text x="350" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A</text>
      <circle cx="430" cy="202" r="11" fill="#0ea5a4"/><text x="430" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C</text>
      <circle cx="510" cy="202" r="11" fill="#0ea5a4"/><text x="510" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C</text>
      <circle cx="585" cy="202" r="11" fill="#f59e0b"/><text x="585" y="206" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">I</text>

      <!-- row 2 -->
      <text x="40" y="242" font-size="11.5" fill="#1d2438">Build feature</text>
      <circle cx="350" cy="238" r="11" fill="#ef4444"/><text x="350" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A</text>
      <circle cx="430" cy="238" r="11" fill="#2563eb"/><text x="430" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">R</text>
      <circle cx="510" cy="238" r="11" fill="#0ea5a4"/><text x="510" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C</text>
      <circle cx="585" cy="238" r="11" fill="#f59e0b"/><text x="585" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">I</text>

      <!-- row 3 -->
      <text x="40" y="278" font-size="11.5" fill="#1d2438">UX design</text>
      <circle cx="350" cy="274" r="11" fill="#0ea5a4"/><text x="350" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C</text>
      <circle cx="430" cy="274" r="11" fill="#f59e0b"/><text x="430" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">I</text>
      <circle cx="510" cy="274" r="11" fill="#ef4444"/><text x="510" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A</text>
      <circle cx="585" cy="274" r="11" fill="#f59e0b"/><text x="585" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">I</text>

      <!-- row 4 -->
      <text x="40" y="314" font-size="11.5" fill="#1d2438">Launch sign-off</text>
      <circle cx="350" cy="310" r="11" fill="#2563eb"/><text x="350" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">R</text>
      <circle cx="430" cy="310" r="11" fill="#0ea5a4"/><text x="430" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">C</text>
      <circle cx="510" cy="310" r="11" fill="#f59e0b"/><text x="510" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">I</text>
      <circle cx="585" cy="310" r="11" fill="#ef4444"/><text x="585" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">A</text>
    </g>
    <line x1="40" y1="222" x2="600" y2="222" stroke="#e2e8f5"/>
    <line x1="40" y1="258" x2="600" y2="258" stroke="#e2e8f5"/>
    <line x1="40" y1="294" x2="600" y2="294" stroke="#e2e8f5"/>
  </g>

  <text x="320" y="356" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Rule of thumb: exactly one <tspan font-weight="700" fill="#ef4444">A</tspan> per row — one clear owner avoids decision paralysis.</text>
</svg>
