<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Internet Protocols diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Internet Protocols</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">Shared rules both sender &amp; receiver follow, stacked by layer</text>

  <!-- Application layer -->
  <rect x="24" y="68" width="592" height="92" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="40" y="88" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">Application layer — what users &amp; apps speak</text>

  <rect x="40" y="98" width="106" height="52" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="93" y="118" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">HTTP / S</text>
  <text x="93" y="134" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">the web · HTTPS</text>
  <text x="93" y="145" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">adds SSL/TLS</text>

  <rect x="154" y="98" width="106" height="52" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="207" y="118" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">DNS</text>
  <text x="207" y="134" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">name → IP</text>
  <text x="207" y="145" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">lookup</text>

  <rect x="268" y="98" width="106" height="52" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="321" y="118" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">SMTP</text>
  <text x="321" y="138" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">email transfer</text>

  <rect x="382" y="98" width="106" height="52" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
  <text x="435" y="118" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">FTP</text>
  <text x="435" y="138" font-family="sans-serif" font-size="8.5" fill="#5b6680" text-anchor="middle">file transfer</text>

  <!-- Transport layer -->
  <rect x="24" y="174" width="592" height="92" rx="8" fill="#ccfbf1" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="40" y="194" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Transport layer — how data moves end-to-end</text>

  <rect x="40" y="204" width="270" height="52" rx="5" fill="#ffffff" stroke="#0ea5a4" stroke-width="1"/>
  <text x="56" y="224" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">TCP</text>
  <text x="56" y="240" font-family="sans-serif" font-size="9" fill="#5b6680">Reliable, ordered, error-checked.</text>
  <text x="56" y="252" font-family="sans-serif" font-size="9" fill="#5b6680">Connection-based — web, email, files.</text>

  <rect x="330" y="204" width="270" height="52" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="346" y="224" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">UDP</text>
  <text x="346" y="240" font-family="sans-serif" font-size="9" fill="#5b6680">Connectionless, low-latency, loss-tolerant.</text>
  <text x="346" y="252" font-family="sans-serif" font-size="9" fill="#5b6680">Streaming, gaming, VoIP.</text>

  <!-- Internet layer -->
  <rect x="24" y="280" width="592" height="84" rx="8" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
  <text x="40" y="300" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Internet layer — addressing &amp; routing</text>
  <rect x="40" y="310" width="560" height="44" rx="5" fill="#ffffff" stroke="#1d2438" stroke-width="1"/>
  <text x="56" y="330" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">IP (Internet Protocol)</text>
  <text x="56" y="346" font-family="sans-serif" font-size="9.5" fill="#5b6680">Every device has a unique IP address; data is split into packets and delivered host-to-host across the internet.</text>
</svg>
