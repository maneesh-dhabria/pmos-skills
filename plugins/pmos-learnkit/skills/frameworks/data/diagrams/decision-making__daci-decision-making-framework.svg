<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="DACI Decision-Making Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">DACI Decision-Making Framework</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Four roles for ONE decision — name the decider, speed the call</text>

  <!-- D row -->
  <rect x="32" y="78" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="66" cy="112" r="18" fill="#2563eb"/>
  <text x="66" y="119" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">D</text>
  <text x="100" y="106" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Driver</text>
  <text x="100" y="128" font-family="sans-serif" font-size="13" fill="#5b6680">Owns the process — gathers input, frames options, drives to a decision by the deadline. (one)</text>

  <!-- A row -->
  <rect x="32" y="156" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <circle cx="66" cy="190" r="18" fill="#0ea5a4"/>
  <text x="66" y="197" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="100" y="184" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Approver</text>
  <text x="100" y="206" font-family="sans-serif" font-size="13" fill="#5b6680">Makes the final call and is accountable for it. (one)</text>

  <!-- C row -->
  <rect x="32" y="234" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="66" cy="268" r="18" fill="#f59e0b"/>
  <text x="66" y="275" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
  <text x="100" y="262" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Contributors</text>
  <text x="100" y="284" font-family="sans-serif" font-size="13" fill="#5b6680">Consulted for expertise — they shape but do not own the decision. (many)</text>

  <!-- I row -->
  <rect x="32" y="312" width="576" height="68" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="2"/>
  <circle cx="66" cy="346" r="18" fill="#5b6680"/>
  <text x="66" y="353" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">I</text>
  <text x="100" y="340" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Informed</text>
  <text x="100" y="362" font-family="sans-serif" font-size="13" fill="#5b6680">Told the outcome after the fact — affected, but no say. (many)</text>
</svg>
