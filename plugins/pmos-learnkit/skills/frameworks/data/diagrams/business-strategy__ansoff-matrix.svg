<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Ansoff Matrix diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Ansoff Matrix</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Four growth strategies by product &amp; market newness</text>

  <!-- axis labels -->
  <text x="320" y="88" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">PRODUCTS</text>
  <text x="220" y="106" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Existing</text>
  <text x="450" y="106" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New</text>

  <g font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">
    <text transform="translate(54 240) rotate(-90)" text-anchor="middle">MARKETS</text>
  </g>
  <text transform="translate(76 165) rotate(-90)" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Existing</text>
  <text transform="translate(76 315) rotate(-90)" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New</text>

  <!-- quadrants -->
  <!-- top-left: Market Penetration (lowest risk) -->
  <rect x="92" y="116" width="256" height="128" rx="8" fill="#f4f7ff" stroke="#2563eb"/>
  <text x="220" y="158" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Market Penetration</text>
  <text x="220" y="180" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Existing product &#8594; existing market</text>
  <text x="220" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Discounts, loyalty, more marketing</text>
  <text x="220" y="226" font-family="sans-serif" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">LOWEST RISK</text>

  <!-- top-right: Product Development -->
  <rect x="356" y="116" width="256" height="128" rx="8" fill="#f4f7ff" stroke="#0ea5a4"/>
  <text x="484" y="158" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Product Development</text>
  <text x="484" y="180" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New product &#8594; existing market</text>
  <text x="484" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New features, lines, variations</text>

  <!-- bottom-left: Market Development -->
  <rect x="92" y="252" width="256" height="128" rx="8" fill="#f4f7ff" stroke="#f59e0b"/>
  <text x="220" y="294" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Market Development</text>
  <text x="220" y="316" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Existing product &#8594; new market</text>
  <text x="220" y="336" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New geos, segments, channels</text>

  <!-- bottom-right: Diversification (highest risk) -->
  <rect x="356" y="252" width="256" height="128" rx="8" fill="#f4f7ff" stroke="#ef4444"/>
  <text x="484" y="294" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Diversification</text>
  <text x="484" y="316" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New product &#8594; new market</text>
  <text x="484" y="336" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">New sectors, acquisitions</text>
  <text x="484" y="362" font-family="sans-serif" font-size="10" font-weight="700" fill="#ef4444" text-anchor="middle">HIGHEST RISK</text>
</svg>
