<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Bullseye Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Bullseye Framework</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Find the one traction channel that moves growth, across 19 candidates</text>

  <!-- Concentric rings: outer (brainstorm) -> middle (test) -> inner (focus) -->
  <g transform="translate(200,240)">
    <circle cx="0" cy="0" r="130" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="86" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="0" cy="0" r="44" fill="#2563eb"/>

    <text x="0" y="-104" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">OUTER · all 19 channels</text>
    <text x="0" y="-60" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">MIDDLE · promising few</text>
    <text x="0" y="4" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">INNER</text>
    <text x="0" y="22" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">the one channel</text>
  </g>

  <!-- 5-step ladder on the right -->
  <g font-family="sans-serif">
    <text x="400" y="118" font-size="13" font-weight="700" fill="#1d2438">1. Brainstorm</text>
    <text x="400" y="136" font-size="11" fill="#5b6680">a viable idea per channel</text>

    <text x="400" y="170" font-size="13" font-weight="700" fill="#1d2438">2. Rank</text>
    <text x="400" y="188" font-size="11" fill="#5b6680">into 3 columns (A/B/C)</text>

    <text x="400" y="222" font-size="13" font-weight="700" fill="#f59e0b">3. Prioritize</text>
    <text x="400" y="240" font-size="11" fill="#5b6680">pick top 3 (the middle ring)</text>

    <text x="400" y="274" font-size="13" font-weight="700" fill="#0ea5a4">4. Test</text>
    <text x="400" y="292" font-size="11" fill="#5b6680">cheap parallel experiments</text>

    <text x="400" y="326" font-size="13" font-weight="700" fill="#2563eb">5. Focus</text>
    <text x="400" y="344" font-size="11" fill="#5b6680">double down on the winner</text>
  </g>

  <line x1="384" y1="100" x2="384" y2="350" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
