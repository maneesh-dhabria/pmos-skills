<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="User Persona diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">User Persona</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">A fictional yet realistic archetype of a target user</text>

  <!-- Persona card -->
  <rect x="32" y="84" width="220" height="284" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <!-- avatar -->
  <circle cx="142" cy="148" r="38" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="142" cy="138" r="14" fill="#2563eb"/>
  <path d="M118 176 a24 22 0 0 1 48 0 z" fill="#2563eb"/>
  <text x="142" y="214" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438" text-anchor="middle">Sarah, 34</text>
  <text x="142" y="234" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Operations Manager</text>
  <line x1="56" y1="250" x2="228" y2="250" stroke="#2563eb" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <text x="142" y="288" font-family="sans-serif" font-size="12" font-style="italic" fill="#1d2438" text-anchor="middle">"I need it fast</text>
  <text x="142" y="306" font-family="sans-serif" font-size="12" font-style="italic" fill="#1d2438" text-anchor="middle">and accurate —</text>
  <text x="142" y="324" font-family="sans-serif" font-size="12" font-style="italic" fill="#1d2438" text-anchor="middle">no time to fuss."</text>
  <text x="142" y="352" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Mobile-first · daily use</text>

  <!-- What to include -->
  <text x="288" y="104" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">What to include</text>

  <g font-family="sans-serif">
    <rect x="288" y="116" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="135" r="4" fill="#2563eb"/>
    <text x="320" y="132" font-size="12.5" font-weight="600" fill="#1d2438">Identity</text>
    <text x="320" y="148" font-size="11" fill="#5b6680">Name, age, gender, photo, occupation</text>

    <rect x="288" y="160" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="179" r="4" fill="#0ea5a4"/>
    <text x="320" y="176" font-size="12.5" font-weight="600" fill="#1d2438">Tag line</text>
    <text x="320" y="192" font-size="11" fill="#5b6680">What they do — useful, not witty</text>

    <rect x="288" y="204" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="223" r="4" fill="#f59e0b"/>
    <text x="320" y="220" font-size="12.5" font-weight="600" fill="#1d2438">Experience level</text>
    <text x="320" y="236" font-size="11" fill="#5b6680">Familiarity in your product's domain</text>

    <rect x="288" y="248" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="267" r="4" fill="#2563eb"/>
    <text x="320" y="264" font-size="12.5" font-weight="600" fill="#1d2438">Context of use</text>
    <text x="320" y="280" font-size="11" fill="#5b6680">Choice vs. required · frequency · device</text>

    <rect x="288" y="292" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="311" r="4" fill="#0ea5a4"/>
    <text x="320" y="308" font-size="12.5" font-weight="600" fill="#1d2438">Goals &amp; concerns</text>
    <text x="320" y="324" font-size="11" fill="#5b6680">Speed, accuracy, thoroughness</text>

    <rect x="288" y="336" width="320" height="38" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="306" cy="355" r="4" fill="#ef4444"/>
    <text x="320" y="352" font-size="12.5" font-weight="600" fill="#1d2438">Quote</text>
    <text x="320" y="368" font-size="11" fill="#5b6680">Sums up the persona's attitude</text>
  </g>
</svg>
