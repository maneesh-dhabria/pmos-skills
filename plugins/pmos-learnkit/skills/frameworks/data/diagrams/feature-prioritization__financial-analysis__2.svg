<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Internal Rate of Return diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="Helvetica,Arial,sans-serif" font-size="22" font-weight="700" fill="#1d2438">Internal Rate of Return (IRR)</text>
  <text x="32" y="62" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b6680">The discount rate at which NPV crosses zero</text>

  <!-- axes -->
  <line x1="90" y1="110" x2="90" y2="320" stroke="#1d2438" stroke-width="2"/>
  <line x1="90" y1="230" x2="600" y2="230" stroke="#1d2438" stroke-width="2"/>

  <!-- y axis label -->
  <text x="48" y="120" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">NPV</text>
  <text x="40" y="160" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0ea5a4">+</text>
  <text x="42" y="305" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#ef4444">&#8722;</text>

  <!-- x axis label -->
  <text x="500" y="252" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Discount rate &#8594;</text>

  <!-- downward NPV curve crossing zero -->
  <path d="M 100 130 C 220 150, 300 215, 360 230 C 430 247, 520 285, 595 300" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- zero crossing marker -->
  <circle cx="360" cy="230" r="6" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
  <line x1="360" y1="230" x2="360" y2="320" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="372" y="290" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#f59e0b">IRR</text>
  <text x="372" y="308" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">NPV = 0</text>

  <!-- annotations -->
  <text x="120" y="150" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#0ea5a4">low rate &#8594; NPV positive</text>
  <text x="460" y="280" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#ef4444">high rate &#8594; NPV negative</text>

  <text x="32" y="365" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1d2438">A higher IRR means future cash flows outweigh the initial investment.</text>
</svg>
