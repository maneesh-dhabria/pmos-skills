<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Good-Better-Best Pricing diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="40" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Good-Better-Best Pricing</text>
  <text x="40" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Three tiers spanning a range of willingness-to-pay</text>

  <!-- GOOD -->
  <rect x="40" y="90" width="170" height="270" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="125" y="120" font-family="sans-serif" font-size="17" font-weight="700" fill="#5b6680" text-anchor="middle">GOOD</text>
  <text x="125" y="146" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">Stripped entry</text>
  <text x="125" y="186" font-family="sans-serif" font-size="26" font-weight="700" fill="#1d2438" text-anchor="middle">$</text>
  <text x="125" y="240" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Attracts new /</text>
  <text x="125" y="256" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">price-sensitive</text>
  <text x="125" y="272" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">buyers</text>
  <text x="125" y="330" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">core features only</text>

  <!-- BETTER -->
  <rect x="235" y="90" width="170" height="270" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="235" y="90" width="170" height="26" rx="8" fill="#2563eb"/>
  <text x="320" y="108" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">MOST POPULAR (ANCHOR)</text>
  <text x="320" y="142" font-family="sans-serif" font-size="17" font-weight="700" fill="#2563eb" text-anchor="middle">BETTER</text>
  <text x="320" y="166" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">Mainstream</text>
  <text x="320" y="206" font-family="sans-serif" font-size="26" font-weight="700" fill="#1d2438" text-anchor="middle">$$</text>
  <text x="320" y="252" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Keeps existing</text>
  <text x="320" y="268" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">customers happy</text>
  <text x="320" y="330" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">today's product</text>

  <!-- BEST -->
  <rect x="430" y="90" width="170" height="270" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="515" y="120" font-family="sans-serif" font-size="17" font-weight="700" fill="#0ea5a4" text-anchor="middle">BEST</text>
  <text x="515" y="146" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">Premium</text>
  <text x="515" y="190" font-family="sans-serif" font-size="26" font-weight="700" fill="#1d2438" text-anchor="middle">$$$</text>
  <text x="515" y="240" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Captures high</text>
  <text x="515" y="256" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">willingness-</text>
  <text x="515" y="272" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">to-pay</text>
  <text x="515" y="330" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">feature-laden</text>

  <!-- WTP arrow -->
  <line x1="40" y1="385" x2="600" y2="385" stroke="#f59e0b" stroke-width="2" marker-end="url(#ah)"/>
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="44" y="378" font-family="sans-serif" font-size="11" fill="#f59e0b">low WTP</text>
  <text x="556" y="378" font-family="sans-serif" font-size="11" fill="#f59e0b" text-anchor="end">high WTP &#8594;</text>
</svg>
