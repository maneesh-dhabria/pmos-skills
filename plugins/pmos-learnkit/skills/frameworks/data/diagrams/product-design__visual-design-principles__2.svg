<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Gestalt principles diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Gestalt Principles</text>
  <text x="32" y="54" font-family="sans-serif" font-size="12.5" fill="#5b6680">How the mind groups many elements into one organized whole</text>

  <!-- Proximity -->
  <rect x="32" y="72" width="288" height="74" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <g fill="#2563eb">
    <circle cx="56" cy="98" r="4"/><circle cx="70" cy="98" r="4"/>
    <circle cx="56" cy="112" r="4"/><circle cx="70" cy="112" r="4"/>
    <circle cx="96" cy="105" r="4" opacity="0.4"/><circle cx="110" cy="105" r="4" opacity="0.4"/>
  </g>
  <text x="130" y="100" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Proximity</text>
  <text x="130" y="118" font-family="sans-serif" font-size="11" fill="#5b6680">Near things read as a group.</text>

  <!-- Similarity -->
  <rect x="336" y="72" width="272" height="74" rx="10" fill="#ffffff" stroke="#0ea5a4" stroke-width="1"/>
  <g>
    <circle cx="360" cy="98" r="4" fill="#0ea5a4"/><rect x="372" y="94" width="8" height="8" fill="#1d2438"/>
    <circle cx="396" cy="98" r="4" fill="#0ea5a4"/><rect x="408" y="94" width="8" height="8" fill="#1d2438"/>
    <circle cx="360" cy="116" r="4" fill="#0ea5a4"/><rect x="372" y="112" width="8" height="8" fill="#1d2438"/>
  </g>
  <text x="434" y="100" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Similarity</text>
  <text x="434" y="118" font-family="sans-serif" font-size="11" fill="#5b6680">Alike items feel related.</text>

  <!-- Closure -->
  <rect x="32" y="154" width="288" height="74" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <path d="M 60 200 A 22 22 0 1 1 90 184" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <text x="130" y="182" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Closure</text>
  <text x="130" y="200" font-family="sans-serif" font-size="11" fill="#5b6680">Mind completes a partial shape.</text>

  <!-- Continuation -->
  <rect x="336" y="154" width="272" height="74" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <path d="M 356 210 Q 386 178 416 192" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="356" cy="210" r="3" fill="#2563eb"/><circle cx="416" cy="192" r="3" fill="#2563eb"/>
  <text x="434" y="182" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Continuation</text>
  <text x="434" y="200" font-family="sans-serif" font-size="11" fill="#5b6680">Eye follows a smooth path.</text>

  <!-- Common region -->
  <rect x="32" y="236" width="288" height="74" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
  <rect x="52" y="262" width="60" height="32" rx="6" fill="none" stroke="#0ea5a4" stroke-width="1.5"/>
  <circle cx="68" cy="278" r="4" fill="#0ea5a4"/><circle cx="84" cy="278" r="4" fill="#0ea5a4"/><circle cx="100" cy="278" r="4" fill="#0ea5a4"/>
  <text x="130" y="264" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Common Region</text>
  <text x="130" y="282" font-family="sans-serif" font-size="11" fill="#5b6680">A shared border binds items.</text>

  <!-- Figure / Ground -->
  <rect x="336" y="236" width="272" height="74" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
  <rect x="356" y="262" width="32" height="32" rx="4" fill="#1d2438"/>
  <circle cx="372" cy="278" r="8" fill="#ffffff"/>
  <text x="434" y="264" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Figure / Ground</text>
  <text x="434" y="282" font-family="sans-serif" font-size="11" fill="#5b6680">Subject separates from background.</text>

  <!-- Symmetry & order -->
  <rect x="32" y="318" width="576" height="60" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
  <g stroke="#f59e0b" stroke-width="2" fill="none">
    <path d="M 64 332 l 12 12 l -12 12"/>
    <path d="M 96 332 l -12 12 l 12 12"/>
  </g>
  <text x="130" y="344" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438">Symmetry &amp; Order</text>
  <text x="130" y="362" font-family="sans-serif" font-size="11" fill="#5b6680">Balanced, ordered arrangements feel stable and complete.</text>
</svg>
