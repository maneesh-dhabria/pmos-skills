<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="User State Transition Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6680"/>
    </marker>
    <marker id="arg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#0ea5a4"/>
    </marker>
  </defs>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">User State Transition Model</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Count users in each state per period; find the leaky transitions</text>

  <!-- main chain -->
  <g font-family="sans-serif">
    <!-- Sign-up -->
    <rect x="24" y="78" width="120" height="46" rx="9" fill="#eff4ff" stroke="#2563eb" stroke-width="1.4"/>
    <text x="84" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Sign-Up</text>
    <text x="84" y="115" text-anchor="middle" font-size="9" fill="#5b6680">registers (New)</text>

    <!-- Activation -->
    <rect x="184" y="78" width="146" height="46" rx="9" fill="#ecfeff" stroke="#0ea5a4" stroke-width="1.4"/>
    <text x="257" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#0ea5a4">Activation</text>
    <text x="257" y="115" text-anchor="middle" font-size="9" fill="#5b6680">forms the habit</text>

    <!-- Engagement -->
    <rect x="370" y="78" width="146" height="46" rx="9" fill="#ecfeff" stroke="#0ea5a4" stroke-width="1.4"/>
    <text x="443" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#0ea5a4">Engagement</text>
    <text x="443" y="115" text-anchor="middle" font-size="9" fill="#5b6680">keeps using it</text>

    <!-- arrows -->
    <line x1="144" y1="101" x2="180" y2="101" stroke="#5b6680" stroke-width="1.6" marker-end="url(#ar)"/>
    <line x1="330" y1="101" x2="366" y2="101" stroke="#5b6680" stroke-width="1.6" marker-end="url(#ar)"/>
  </g>

  <!-- Activation sub-moments -->
  <g font-family="sans-serif" font-size="9.3" fill="#1d2438">
    <text x="184" y="152" font-size="9.5" font-weight="700" fill="#0ea5a4">3 activation moments</text>
    <rect x="184" y="160" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="194" y="174">Set-up → enable value</text>
    <rect x="184" y="186" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="194" y="200">Aha → first value felt</text>
    <rect x="184" y="212" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="194" y="226">Habit → curve flattens</text>
  </g>

  <!-- Engagement buckets -->
  <g font-family="sans-serif" font-size="9.3" fill="#1d2438">
    <text x="370" y="152" font-size="9.5" font-weight="700" fill="#0ea5a4">Engagement tiers</text>
    <rect x="370" y="160" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="380" y="174">Power — highest use</text>
    <rect x="370" y="186" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="380" y="200">Core — natural frequency</text>
    <rect x="370" y="212" width="146" height="22" rx="4" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="0.9"/>
    <text x="380" y="226">Casual — low but valued</text>
  </g>

  <!-- Dormant / Churn / Resurrection -->
  <g font-family="sans-serif">
    <rect x="370" y="288" width="146" height="44" rx="9" fill="#fffaf0" stroke="#f59e0b" stroke-width="1.4"/>
    <text x="443" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">Dormant</text>
    <text x="443" y="324" text-anchor="middle" font-size="9" fill="#5b6680">had habit, stopped</text>

    <rect x="184" y="288" width="146" height="44" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="1.4"/>
    <text x="257" y="309" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">Churned</text>
    <text x="257" y="324" text-anchor="middle" font-size="9" fill="#5b6680">gone, unlikely back</text>

    <!-- Engagement -> Dormant -->
    <line x1="443" y1="124" x2="443" y2="284" stroke="#5b6680" stroke-width="1.6" marker-end="url(#ar)" stroke-dasharray="5 3"/>
    <text x="450" y="210" font-size="9" fill="#5b6680">drops off</text>
    <!-- Dormant -> Churned -->
    <line x1="370" y1="310" x2="334" y2="310" stroke="#ef4444" stroke-width="1.6" marker-end="url(#ar)"/>
    <!-- Resurrection: Dormant -> Engagement (green back-loop) -->
    <path d="M516 300 C 580 280, 580 150, 518 105" fill="none" stroke="#0ea5a4" stroke-width="1.6" marker-end="url(#arg)" stroke-dasharray="5 3"/>
    <text x="560" y="205" text-anchor="middle" font-size="9" font-weight="700" fill="#0ea5a4">resurrect</text>
  </g>

  <!-- footnote -->
  <text x="24" y="372" font-family="sans-serif" font-size="9.5" fill="#5b6680">Simplest form: count New · Active · Dormant each period to spot which transition to improve.</text>
</svg>
