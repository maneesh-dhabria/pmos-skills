<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Four forces of switching diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Four Forces of Switching</text>
  <text x="320" y="54" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">The Switch interview teases apart what pushes the buyer to switch vs. what holds them back</text>

  <defs>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#0ea5a4"/>
    </marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- center: the switch -->
  <rect x="260" y="170" width="120" height="64" rx="10" fill="#1d2438"/>
  <text x="320" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">The Switch</text>
  <text x="320" y="217" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#9fb0d6">old way → new way</text>

  <!-- Header: Forces for change (left) push right -->
  <text x="120" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Forces FOR change  →</text>
  <!-- Header: Forces for status quo (right) push left -->
  <text x="520" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444">←  Forces for STATUS QUO</text>

  <!-- LEFT force 1: Problem (push) -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="28" y="112" width="190" height="56" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="44" y="136" font-size="13" font-weight="700" fill="#1d2438">Problem (push)</text>
    <text x="44" y="155" font-size="10.5" fill="#5b6680">pain with the current product</text>
    <line x1="218" y1="148" x2="258" y2="180" stroke="#0ea5a4" stroke-width="2" marker-end="url(#arrR)"/>
  </g>
  <!-- LEFT force 2: Attraction (pull) -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="28" y="236" width="190" height="56" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="44" y="260" font-size="13" font-weight="700" fill="#1d2438">Attraction (pull)</text>
    <text x="44" y="279" font-size="10.5" fill="#5b6680">appeal of the new solution</text>
    <line x1="218" y1="256" x2="258" y2="224" stroke="#0ea5a4" stroke-width="2" marker-end="url(#arrR)"/>
  </g>

  <!-- RIGHT force 3: Uncertainty (anxiety) -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="422" y="112" width="190" height="56" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="438" y="136" font-size="13" font-weight="700" fill="#1d2438">Uncertainty</text>
    <text x="438" y="155" font-size="10.5" fill="#5b6680">anxiety about the change</text>
    <line x1="422" y1="148" x2="382" y2="180" stroke="#ef4444" stroke-width="2" marker-end="url(#arrL)"/>
  </g>
  <!-- RIGHT force 4: Habits -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="422" y="236" width="190" height="56" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="438" y="260" font-size="13" font-weight="700" fill="#1d2438">Habits</text>
    <text x="438" y="279" font-size="10.5" fill="#5b6680">comfort of the existing way</text>
    <line x1="422" y1="256" x2="382" y2="224" stroke="#ef4444" stroke-width="2" marker-end="url(#arrL)"/>
  </g>

  <text x="320" y="338" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">A switch happens only when push + pull outweigh uncertainty + habit.</text>
  <text x="320" y="362" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10.5" fill="#5b6680" font-style="italic">Switch technique — Bob Moesta &amp; Chris Spiek</text>
</svg>
