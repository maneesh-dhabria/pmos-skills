<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Reverse Interview process diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Reverse Interview</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">The candidate interviews the company — a 5-step prep flow, then come more prepared than they do</text>

  <!-- 5-step horizontal flow -->
  <g font-family="sans-serif">
    <!-- step 1 -->
    <rect x="24" y="72" width="115" height="78" rx="7" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.3"/>
    <circle cx="42" cy="90" r="11" fill="#2563eb"/><text x="42" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text>
    <text x="60" y="94" font-size="11" font-weight="700" fill="#1d2438">Self +</text>
    <text x="34" y="118" font-size="10" fill="#1d2438">Advisory assess</text>
    <text x="34" y="134" font-size="9" fill="#5b6680">strengths &amp; gaps</text>

    <!-- step 2 -->
    <rect x="151" y="72" width="115" height="78" rx="7" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.3"/>
    <circle cx="169" cy="90" r="11" fill="#2563eb"/><text x="169" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2</text>
    <text x="187" y="94" font-size="11" font-weight="700" fill="#1d2438">Want</text>
    <text x="161" y="118" font-size="10" fill="#1d2438">Define criteria</text>
    <text x="161" y="134" font-size="9" fill="#5b6680">next-role wants</text>

    <!-- step 3 -->
    <rect x="278" y="72" width="115" height="78" rx="7" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.3"/>
    <circle cx="296" cy="90" r="11" fill="#2563eb"/><text x="296" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3</text>
    <text x="314" y="94" font-size="11" font-weight="700" fill="#1d2438">Fit</text>
    <text x="288" y="118" font-size="10" fill="#1d2438">Find companies</text>
    <text x="288" y="134" font-size="9" fill="#5b6680">match criteria</text>

    <!-- step 4 -->
    <rect x="405" y="72" width="115" height="78" rx="7" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.3"/>
    <circle cx="423" cy="90" r="11" fill="#2563eb"/><text x="423" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4</text>
    <text x="441" y="94" font-size="11" font-weight="700" fill="#1d2438">Filter</text>
    <text x="415" y="118" font-size="10" fill="#1d2438">Insider info</text>
    <text x="415" y="134" font-size="9" fill="#5b6680">connect, vet</text>

    <!-- step 5 -->
    <rect x="525" y="72" width="91" height="78" rx="7" fill="#2563eb"/>
    <circle cx="543" cy="90" r="11" fill="#ffffff"/><text x="543" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#2563eb">5</text>
    <text x="561" y="94" font-size="11" font-weight="700" fill="#ffffff">Prepared</text>
    <text x="535" y="118" font-size="9.5" fill="#dbe7ff">Come more</text>
    <text x="535" y="134" font-size="9.5" fill="#dbe7ff">prepared</text>

    <!-- connectors -->
    <path d="M139 111 L151 111" stroke="#2563eb" stroke-width="1.5" marker-end="url(#rar)"/>
    <path d="M266 111 L278 111" stroke="#2563eb" stroke-width="1.5" marker-end="url(#rar)"/>
    <path d="M393 111 L405 111" stroke="#2563eb" stroke-width="1.5" marker-end="url(#rar)"/>
    <path d="M520 111 L525 111" stroke="#2563eb" stroke-width="1.5" marker-end="url(#rar)"/>

    <!-- Step 5 unpacked: three things to come prepared -->
    <text x="24" y="186" font-size="12" font-weight="700" fill="#0ea5a4">Come more prepared than they do — three levers</text>

    <rect x="24" y="198" width="190" height="160" rx="7" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.3"/>
    <text x="36" y="220" font-size="11.5" font-weight="700" fill="#1d2438">1 · Weigh fit holistically</text>
    <text x="36" y="244" font-size="10" fill="#1d2438">Company × Team × Role</text>
    <text x="36" y="262" font-size="10" fill="#1d2438">— how they relate</text>
    <text x="36" y="288" font-size="10" fill="#5b6680">Company success drives</text>
    <text x="36" y="304" font-size="10" fill="#5b6680">your trajectory more</text>
    <text x="36" y="320" font-size="10" fill="#5b6680">than title or salary</text>

    <rect x="224" y="198" width="190" height="160" rx="7" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.3"/>
    <text x="236" y="220" font-size="11.5" font-weight="700" fill="#1d2438">2 · Ask off-script Qs</text>
    <text x="236" y="246" font-size="10" fill="#1d2438">• Give context (why)</text>
    <text x="236" y="270" font-size="10" fill="#1d2438">• Ask how it was used</text>
    <text x="236" y="282" font-size="9" fill="#5b6680">   in action (specific first)</text>
    <text x="236" y="306" font-size="10" fill="#1d2438">• Recast your</text>
    <text x="236" y="320" font-size="10" fill="#1d2438">   understanding back</text>

    <rect x="424" y="198" width="192" height="160" rx="7" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.3"/>
    <text x="436" y="220" font-size="11.5" font-weight="700" fill="#1d2438">3 · Dig deeper</text>
    <text x="436" y="246" font-size="10" fill="#1d2438">"Tell me more..."</text>
    <text x="436" y="266" font-size="10" fill="#1d2438">"Do you have an</text>
    <text x="436" y="280" font-size="10" fill="#1d2438">example?"</text>
    <text x="436" y="306" font-size="10" fill="#5b6680">If declined: who can</text>
    <text x="436" y="322" font-size="10" fill="#5b6680">answer? Follow up async</text>
  </g>

  <defs>
    <marker id="rar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 z" fill="#2563eb"/></marker>
  </defs>
</svg>
