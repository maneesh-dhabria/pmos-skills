<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PMF criterion three-level scoring scale diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Per-Criterion Scoring Scale</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Each criterion is rated on a three-point scale, then rolled up by stakeholder consensus</text>

  <!-- gradient bar -->
  <defs>
    <linearGradient id="scaleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#0ea5a4"/>
    </linearGradient>
  </defs>
  <rect x="80" y="120" width="480" height="22" rx="11" fill="url(#scaleGrad)"/>

  <!-- tick markers -->
  <circle cx="120" cy="131" r="9" fill="#ffffff" stroke="#ef4444" stroke-width="3"/>
  <circle cx="320" cy="131" r="9" fill="#ffffff" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="520" cy="131" r="9" fill="#ffffff" stroke="#0ea5a4" stroke-width="3"/>

  <!-- Weak -->
  <text x="120" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ef4444">Weak</text>
  <rect x="50" y="200" width="140" height="120" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="120" y="228" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">Signal points</text>
  <text x="120" y="246" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">away from PMF;</text>
  <text x="120" y="264" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">KPI below the</text>
  <text x="120" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">agreed</text>
  <text x="120" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">threshold</text>

  <!-- Unclear -->
  <text x="320" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Unclear</text>
  <rect x="250" y="200" width="140" height="120" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="228" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">Mixed or</text>
  <text x="320" y="246" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">insufficient</text>
  <text x="320" y="264" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">evidence; flag</text>
  <text x="320" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">caveats for</text>
  <text x="320" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">discussion</text>

  <!-- Strong -->
  <text x="520" y="178" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Strong</text>
  <rect x="450" y="200" width="140" height="120" rx="10" fill="#f0fdfa" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="520" y="228" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">Clear evidence</text>
  <text x="520" y="246" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">of fit; KPI at</text>
  <text x="520" y="264" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">or above the</text>
  <text x="520" y="282" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">agreed</text>
  <text x="520" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" fill="#1d2438">threshold</text>

  <text x="320" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#5b6680">Ratings across all six clusters feed a final PMF assessment reached by consensus</text>
</svg>
