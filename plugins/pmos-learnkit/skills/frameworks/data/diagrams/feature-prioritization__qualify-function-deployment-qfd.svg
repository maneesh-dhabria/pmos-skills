<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Qualify Function Deployment (QFD) diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">Quality Function Deployment (QFD)</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">House of Quality: weight each need x how well features meet it</text>

  <!-- Roof / correlation triangle -->
  <polygon points="320,70 400,150 240,150" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="280" y1="110" x2="360" y2="110" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>
  <text x="320" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">feature correlations</text>

  <!-- Importance column header -->
  <rect x="70" y="160" width="70" height="26" fill="#0ea5a4" opacity="0.15" stroke="#0ea5a4" stroke-width="1"/>
  <text x="105" y="177" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#1d2438">Importance</text>

  <!-- HOWs header (features) -->
  <rect x="140" y="160" width="320" height="26" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1"/>
  <text x="300" y="177" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#1d2438">HOWs — candidate features</text>

  <!-- Score column header -->
  <rect x="460" y="160" width="70" height="26" fill="#f59e0b" opacity="0.18" stroke="#f59e0b" stroke-width="1"/>
  <text x="495" y="177" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#1d2438">Score</text>

  <!-- WHATs side label -->
  <text x="40" y="250" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#1d2438" transform="rotate(-90 40 250)">WHATs — customer needs</text>

  <!-- Relationship grid: 4 needs (rows) x 4 features (cols) -->
  <!-- column x positions: 140..460 -> 4 cols of 80 -->
  <!-- row y positions: 186..306 -> 3 rows of 40 -->
  <!-- grid lines -->
  <g stroke="#d4ddf0" stroke-width="1">
    <line x1="140" y1="226" x2="460" y2="226"/>
    <line x1="140" y1="266" x2="460" y2="266"/>
    <line x1="220" y1="186" x2="220" y2="306"/>
    <line x1="300" y1="186" x2="300" y2="306"/>
    <line x1="380" y1="186" x2="380" y2="306"/>
  </g>
  <rect x="140" y="186" width="320" height="120" fill="none" stroke="#1d2438" stroke-width="1.2"/>

  <!-- importance weights column -->
  <rect x="70" y="186" width="70" height="120" fill="none" stroke="#1d2438" stroke-width="1.2"/>
  <text x="105" y="211" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">9</text>
  <text x="105" y="251" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">5</text>
  <text x="105" y="291" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">7</text>

  <!-- relationship symbols: 9 strong, 3 moderate, 1 weak -->
  <!-- row1 -->
  <circle cx="180" cy="206" r="8" fill="none" stroke="#2563eb" stroke-width="2"/><text x="180" y="210" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2563eb">9</text>
  <circle cx="260" cy="206" r="6" fill="#2563eb" opacity="0.35"/><text x="260" y="210" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1d2438">3</text>
  <text x="420" y="210" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5b6680">1</text>
  <!-- row2 -->
  <text x="180" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#5b6680">1</text>
  <circle cx="340" cy="246" r="8" fill="none" stroke="#2563eb" stroke-width="2"/><text x="340" y="250" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2563eb">9</text>
  <circle cx="420" cy="246" r="6" fill="#2563eb" opacity="0.35"/><text x="420" y="250" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1d2438">3</text>
  <!-- row3 -->
  <circle cx="260" cy="286" r="6" fill="#2563eb" opacity="0.35"/><text x="260" y="290" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1d2438">3</text>
  <circle cx="340" cy="286" r="8" fill="none" stroke="#2563eb" stroke-width="2"/><text x="340" y="290" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2563eb">9</text>

  <!-- score column with bars (sum of weight x relationship) -->
  <rect x="460" y="186" width="70" height="120" fill="none" stroke="#1d2438" stroke-width="1.2"/>
  <rect x="466" y="194" width="40" height="14" fill="#f59e0b" opacity="0.8"/><text x="510" y="205" text-anchor="end" font-family="sans-serif" font-size="9" fill="#1d2438">84</text>
  <rect x="466" y="234" width="58" height="14" fill="#f59e0b"/><text x="528" y="245" text-anchor="end" font-family="sans-serif" font-size="9" font-weight="700" fill="#1d2438">96</text>
  <rect x="466" y="274" width="22" height="14" fill="#f59e0b" opacity="0.6"/><text x="510" y="285" text-anchor="end" font-family="sans-serif" font-size="9" fill="#1d2438">39</text>

  <!-- legend -->
  <g font-family="sans-serif" font-size="9" fill="#5b6680">
    <circle cx="150" cy="332" r="6" fill="none" stroke="#2563eb" stroke-width="2"/><text x="162" y="335" fill="#1d2438">9 strong</text>
    <circle cx="240" cy="332" r="5" fill="#2563eb" opacity="0.35"/><text x="250" y="335" fill="#1d2438">3 moderate</text>
    <text x="335" y="335">1 weak / blank = none</text>
  </g>
  <text x="320" y="362" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">Feature score = Σ (need importance × relationship)</text>
  <text x="320" y="380" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#2563eb">→ ship the highest-scoring features first</text>
</svg>
