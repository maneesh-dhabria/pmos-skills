<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Kano functional-dysfunctional classification matrix diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="bold" fill="#1d2438">Kano Classification Matrix</text>
  <text x="320" y="46" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Pair each feature's functional &amp; dysfunctional answers to read its category</text>

  <!-- axis labels -->
  <text x="60" y="78" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="bold" fill="#2563eb">Dysfunctional answer  &#8594;</text>
  <text x="24" y="250" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="bold" fill="#2563eb" transform="rotate(-90 24 250)">Functional answer  &#8594;</text>

  <!-- column headers -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">
    <text x="245" y="92">Like</text>
    <text x="320" y="92">Expect</text>
    <text x="395" y="92">Neutral</text>
    <text x="470" y="92">Tolerate</text>
    <text x="545" y="92">Dislike</text>
  </g>
  <!-- row headers -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="9.5" fill="#5b6680" text-anchor="end">
    <text x="168" y="123">Like</text>
    <text x="168" y="161">Expect</text>
    <text x="168" y="199">Neutral</text>
    <text x="168" y="237">Tolerate</text>
    <text x="168" y="275">Dislike</text>
  </g>

  <!-- grid 5x5 starting x=175 y=100, cell 75x38 -->
  <!-- legend codes: M=Must-be A=Attractive P=Performance I=Indifferent R=Reverse Q=Questionable -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="bold" text-anchor="middle">
    <!-- row1 Like -->
    <rect x="175" y="100" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="212" y="124" fill="#5b6680">Q</text>
    <rect x="250" y="100" width="75" height="38" fill="#e6f6f5" stroke="#1d2438" stroke-width="0.6"/><text x="287" y="124" fill="#0ea5a4">A</text>
    <rect x="325" y="100" width="75" height="38" fill="#e6f6f5" stroke="#1d2438" stroke-width="0.6"/><text x="362" y="124" fill="#0ea5a4">A</text>
    <rect x="400" y="100" width="75" height="38" fill="#e6f6f5" stroke="#1d2438" stroke-width="0.6"/><text x="437" y="124" fill="#0ea5a4">A</text>
    <rect x="475" y="100" width="75" height="38" fill="#eaf0ff" stroke="#1d2438" stroke-width="0.6"/><text x="512" y="124" fill="#2563eb">P</text>
    <!-- row2 Expect -->
    <rect x="175" y="138" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="212" y="162" fill="#f59e0b">R</text>
    <rect x="250" y="138" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="287" y="162" fill="#5b6680">I</text>
    <rect x="325" y="138" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="362" y="162" fill="#5b6680">I</text>
    <rect x="400" y="138" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="437" y="162" fill="#5b6680">I</text>
    <rect x="475" y="138" width="75" height="38" fill="#fde7e7" stroke="#1d2438" stroke-width="0.6"/><text x="512" y="162" fill="#ef4444">M</text>
    <!-- row3 Neutral -->
    <rect x="175" y="176" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="212" y="200" fill="#f59e0b">R</text>
    <rect x="250" y="176" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="287" y="200" fill="#5b6680">I</text>
    <rect x="325" y="176" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="362" y="200" fill="#5b6680">I</text>
    <rect x="400" y="176" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="437" y="200" fill="#5b6680">I</text>
    <rect x="475" y="176" width="75" height="38" fill="#fde7e7" stroke="#1d2438" stroke-width="0.6"/><text x="512" y="200" fill="#ef4444">M</text>
    <!-- row4 Tolerate -->
    <rect x="175" y="214" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="212" y="238" fill="#f59e0b">R</text>
    <rect x="250" y="214" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="287" y="238" fill="#5b6680">I</text>
    <rect x="325" y="214" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="362" y="238" fill="#5b6680">I</text>
    <rect x="400" y="214" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="437" y="238" fill="#5b6680">I</text>
    <rect x="475" y="214" width="75" height="38" fill="#fde7e7" stroke="#1d2438" stroke-width="0.6"/><text x="512" y="238" fill="#ef4444">M</text>
    <!-- row5 Dislike -->
    <rect x="175" y="252" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="212" y="276" fill="#f59e0b">R</text>
    <rect x="250" y="252" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="287" y="276" fill="#f59e0b">R</text>
    <rect x="325" y="252" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="362" y="276" fill="#f59e0b">R</text>
    <rect x="400" y="252" width="75" height="38" fill="#fdeee0" stroke="#1d2438" stroke-width="0.6"/><text x="437" y="276" fill="#f59e0b">R</text>
    <rect x="475" y="252" width="75" height="38" fill="#f4f7ff" stroke="#1d2438" stroke-width="0.6"/><text x="512" y="276" fill="#5b6680">Q</text>
  </g>

  <!-- legend -->
  <g font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#1d2438">
    <text x="60" y="320" font-weight="bold">Legend</text>
    <rect x="60" y="330" width="12" height="12" fill="#fde7e7" stroke="#ef4444"/><text x="78" y="340">M = Must-be</text>
    <rect x="178" y="330" width="12" height="12" fill="#eaf0ff" stroke="#2563eb"/><text x="196" y="340">P = Performance</text>
    <rect x="318" y="330" width="12" height="12" fill="#e6f6f5" stroke="#0ea5a4"/><text x="336" y="340">A = Attractive</text>
    <rect x="60" y="352" width="12" height="12" fill="#f4f7ff" stroke="#5b6680"/><text x="78" y="362">I = Indifferent</text>
    <rect x="178" y="352" width="12" height="12" fill="#fdeee0" stroke="#f59e0b"/><text x="196" y="362">R = Reverse</text>
    <rect x="318" y="352" width="12" height="12" fill="#f4f7ff" stroke="#5b6680"/><text x="336" y="362">Q = Questionable</text>
  </g>
</svg>
