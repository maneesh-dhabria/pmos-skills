<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Johari Window diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="40" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Johari Window</text>
  <text x="40" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Self-awareness as a 2×2 — grown by disclosure &amp; feedback</text>

  <!-- column headers -->
  <text x="230" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">Known to self</text>
  <text x="470" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">Not known to self</text>

  <!-- row headers -->
  <text x="100" y="170" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle" transform="rotate(-90 100 170)">Known to others</text>
  <text x="100" y="290" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle" transform="rotate(-90 100 290)">Not known to others</text>

  <!-- quadrants -->
  <rect x="130" y="104" width="200" height="120" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="150" font-family="sans-serif" font-size="17" font-weight="700" fill="#2563eb" text-anchor="middle">OPEN</text>
  <text x="230" y="174" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">known to self</text>
  <text x="230" y="188" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">&amp; others</text>

  <rect x="330" y="104" width="200" height="120" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="430" y="150" font-family="sans-serif" font-size="17" font-weight="700" fill="#ef4444" text-anchor="middle">BLIND</text>
  <text x="430" y="174" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">others see,</text>
  <text x="430" y="188" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">you don't</text>

  <rect x="130" y="224" width="200" height="120" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="272" font-family="sans-serif" font-size="17" font-weight="700" fill="#f59e0b" text-anchor="middle">HIDDEN</text>
  <text x="230" y="296" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">you know,</text>
  <text x="230" y="310" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">others don't</text>

  <rect x="330" y="224" width="200" height="120" fill="#ffffff" stroke="#5b6680" stroke-width="2"/>
  <text x="430" y="272" font-family="sans-serif" font-size="17" font-weight="700" fill="#5b6680" text-anchor="middle">UNKNOWN</text>
  <text x="430" y="296" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">known to</text>
  <text x="430" y="310" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">neither</text>

  <!-- growth arrows -->
  <line x1="430" y1="104" x2="330" y2="104" stroke="#0ea5a4" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="380" y="98" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">feedback →</text>
  <line x1="130" y1="290" x2="130" y2="200" stroke="#0ea5a4" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="118" y="245" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle" transform="rotate(-90 118 245)">disclosure ↑</text>

  <text x="320" y="378" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Seek feedback to shrink BLIND · self-disclose to shrink HIDDEN → a bigger OPEN pane = more trust</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0ea5a4"/>
    </marker>
  </defs>
</svg>
