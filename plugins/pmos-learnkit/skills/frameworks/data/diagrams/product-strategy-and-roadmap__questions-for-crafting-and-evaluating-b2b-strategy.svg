<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Questions for Crafting and Evaluating B2B Strategy diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Crafting &amp; Evaluating B2B Strategy</text>
  <text x="320" y="49" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Three core questions, then stress-test the answer</text>

  <!-- Stage 1: Three core questions -->
  <text x="40" y="80" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">1 · CRAFT — answer three questions</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <rect x="40" y="90" width="180" height="50" rx="8" fill="#eff4ff" stroke="#2563eb" stroke-width="1.3"/>
    <text x="52" y="110" font-weight="700">Who?</text>
    <text x="52" y="128" font-size="10.5" fill="#5b6680">Which customer segments</text>

    <rect x="230" y="90" width="180" height="50" rx="8" fill="#eff4ff" stroke="#2563eb" stroke-width="1.3"/>
    <text x="242" y="110" font-weight="700">What?</text>
    <text x="242" y="128" font-size="10.5" fill="#5b6680">Differentiation we create</text>

    <rect x="420" y="90" width="180" height="50" rx="8" fill="#eff4ff" stroke="#2563eb" stroke-width="1.3"/>
    <text x="432" y="110" font-weight="700">How?</text>
    <text x="432" y="128" font-size="10.5" fill="#5b6680">How we reach them</text>
  </g>

  <!-- Stage 2: Inputs -->
  <text x="40" y="168" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">2 · GROUND IT — systematic inputs</text>
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <rect x="40" y="178" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="49" y="195">Current product situation</text>
    <rect x="231" y="178" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="240" y="195">Market size &amp; evolution</text>
    <rect x="422" y="178" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="431" y="195">Segment needs &amp; acuteness</text>

    <rect x="40" y="210" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="49" y="227">Competitor strengths/gaps</text>
    <rect x="231" y="210" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="240" y="227">Assets for differentiation</text>
    <rect x="422" y="210" width="178" height="26" rx="5" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="431" y="227">Execution approach</text>
  </g>

  <!-- Stage 3: Evaluation tests -->
  <text x="40" y="264" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">3 · STRESS-TEST — is it sound?</text>
  <g font-family="sans-serif" font-size="10.3" fill="#1d2438">
    <rect x="40" y="274" width="280" height="98" rx="8" fill="#fffaf0" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="52" y="292" fill="#5b6680" font-size="9.5" font-weight="700">CLARITY</text>
    <text x="52" y="308">Clear primary play? (broad diff /</text>
    <text x="52" y="322">cost / focused differentiation)</text>
    <text x="52" y="338">Specific, visualizable capabilities</text>
    <text x="52" y="354">Backed by credible execution</text>

    <rect x="330" y="274" width="270" height="98" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <text x="342" y="292" fill="#5b6680" font-size="9.5" font-weight="700">RED-FLAG CHECKS</text>
    <text x="342" y="308">Which 7 Powers leveraged / created?</text>
    <text x="342" y="324">Concrete non-obvious insight,</text>
    <text x="342" y="338">not obvious proclamation?</text>
    <text x="342" y="354">Unique — not just "be the best"?</text>
  </g>
</svg>
