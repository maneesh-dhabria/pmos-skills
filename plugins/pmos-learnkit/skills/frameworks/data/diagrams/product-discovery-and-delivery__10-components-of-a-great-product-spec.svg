<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="10 Components of A Great Product Spec diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">10 Components of a Great Product Spec</text>
  <text x="32" y="53" font-family="sans-serif" font-size="12" fill="#5b6680">A PRD communicates the what, why &amp; how — across three information types</text>

  <!-- Column 1: Context -->
  <rect x="28" y="70" width="186" height="312" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="28" y="70" width="186" height="36" rx="12" fill="#2563eb"/>
  <rect x="28" y="92" width="186" height="14" fill="#2563eb"/>
  <text x="121" y="94" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">CONTEXT</text>
  <text x="121" y="123" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Why · who it's for</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <text x="46" y="152">1. Opportunity</text>
    <text x="46" y="185">2. Target Audience</text>
    <text x="46" y="218">3. Customer Insights</text>
    <text x="46" y="251">4. Competitive Insights</text>
    <text x="46" y="284">5. Success Metrics</text>
  </g>

  <!-- Column 2: Implementation -->
  <rect x="227" y="70" width="186" height="312" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <rect x="227" y="70" width="186" height="36" rx="12" fill="#0ea5a4"/>
  <rect x="227" y="92" width="186" height="14" fill="#0ea5a4"/>
  <text x="320" y="94" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">IMPLEMENTATION</text>
  <text x="320" y="123" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">What you're building</text>
  <g font-family="sans-serif" font-size="11.5" fill="#1d2438">
    <text x="245" y="152">6. Scope</text>
    <text x="245" y="185">7. Experience</text>
    <text x="245" y="218">8. Implementation Details</text>
    <text x="245" y="251">9. Launch Plan</text>
    <text x="245" y="284">10. Investigative Metrics</text>
  </g>

  <!-- Column 3: FAQ -->
  <rect x="426" y="70" width="186" height="312" rx="12" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="426" y="70" width="186" height="36" rx="12" fill="#f59e0b"/>
  <rect x="426" y="92" width="186" height="14" fill="#f59e0b"/>
  <text x="519" y="94" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">FAQ</text>
  <text x="519" y="123" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Pre-empt questions</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="444" y="152">Answer the obvious</text>
    <text x="444" y="170">questions stakeholders</text>
    <text x="444" y="188">will raise up front.</text>
  </g>
  <g font-family="sans-serif" font-size="10.5" fill="#5b6680">
    <text x="444" y="224">Investigative metrics ask:</text>
    <text x="444" y="248">• Usage — how much used?</text>
    <text x="444" y="270">• Gaps — what's missing?</text>
    <text x="444" y="292">• UX — where to improve?</text>
  </g>

  <!-- bottom note -->
  <text x="320" y="398" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Set direction &amp; create space for creativity — not a prescriptive checklist</text>
</svg>
