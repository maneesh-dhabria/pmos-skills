<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Database selection factors diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Database Selection Factors</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">Seven dimensions to weigh before choosing an engine</text>

  <g font-family="sans-serif">
    <!-- Row 1: Scalability (with its vertical/horizontal sub-structure) -->
    <rect x="24" y="66" width="592" height="58" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <circle cx="46" cy="95" r="9" fill="#2563eb"/>
    <text x="46" y="99" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="66" y="90" font-size="13" font-weight="700" fill="#1d2438">Scalability</text>
    <text x="66" y="108" font-size="10" fill="#5b6680">Vertical = bigger server · Horizontal = more servers — match to expected growth.</text>

    <!-- Row 2: Performance -->
    <rect x="24" y="132" width="592" height="38" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="151" r="9" fill="#0ea5a4"/>
    <text x="46" y="155" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="66" y="148" font-size="13" font-weight="700" fill="#1d2438">Performance</text>
    <text x="66" y="163" font-size="10" fill="#5b6680">Query efficiency and the read-vs-write balance your project needs.</text>

    <!-- Row 3: Data Consistency -->
    <rect x="24" y="178" width="592" height="38" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="197" r="9" fill="#2563eb"/>
    <text x="46" y="201" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="66" y="194" font-size="13" font-weight="700" fill="#1d2438">Data Consistency</text>
    <text x="66" y="209" font-size="10" fill="#5b6680">Strong (financial) vs eventual (feeds, search) — pick per the user impact.</text>

    <!-- Row 4: Data Model -->
    <rect x="24" y="224" width="592" height="38" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="243" r="9" fill="#0ea5a4"/>
    <text x="46" y="247" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <text x="66" y="240" font-size="13" font-weight="700" fill="#1d2438">Data Model</text>
    <text x="66" y="255" font-size="10" fill="#5b6680">Fixed schema (integrity) vs flexible/schemaless (dynamic data).</text>

    <!-- Row 5: Security -->
    <rect x="24" y="270" width="592" height="38" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="289" r="9" fill="#ef4444"/>
    <text x="46" y="293" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
    <text x="66" y="286" font-size="13" font-weight="700" fill="#1d2438">Security</text>
    <text x="66" y="301" font-size="10" fill="#5b6680">Authentication, authorization, encryption, and data protection.</text>

    <!-- Row 6: Cost -->
    <rect x="24" y="316" width="592" height="38" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="335" r="9" fill="#f59e0b"/>
    <text x="46" y="339" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
    <text x="66" y="332" font-size="13" font-weight="700" fill="#1d2438">Cost</text>
    <text x="66" y="347" font-size="10" fill="#5b6680">Licensing and hosting fees plus ongoing maintenance and management.</text>

    <!-- Row 7: Community & Ecosystem -->
    <rect x="24" y="360" width="592" height="34" rx="6" fill="#ffffff" stroke="#e1e7f5" stroke-width="1.2"/>
    <circle cx="46" cy="377" r="9" fill="#2563eb"/>
    <text x="46" y="381" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">7</text>
    <text x="66" y="374" font-size="13" font-weight="700" fill="#1d2438">Community &amp; Ecosystem</text>
    <text x="66" y="389" font-size="10" fill="#5b6680">Docs, tutorials, forums, and integrations with other tools.</text>
  </g>
</svg>
