<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Situational Leadership diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Situational Leadership</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Flex your style to the person's development level for a given task</text>

  <!-- Axes -->
  <line x1="120" y1="100" x2="120" y2="350" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="120" y1="350" x2="600" y2="350" stroke="#5b6680" stroke-width="1.5"/>
  <text x="360" y="382" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Directive behaviour  &#8594;</text>
  <text x="108" y="225" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle" transform="rotate(-90 108 225)">Supportive behaviour  &#8594;</text>

  <!-- Quadrants: x split at 360, y split at 225 -->
  <!-- S3 Supporting: low directive, high supportive (top-left) -->
  <rect x="120" y="100" width="240" height="125" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="240" y="150" font-family="sans-serif" font-size="16" font-weight="700" fill="#0ea5a4" text-anchor="middle">S3 &#183; Supporting</text>
  <text x="240" y="172" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">ask, listen, co-decide</text>
  <text x="240" y="190" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">D3: able, unsure</text>

  <!-- S2 Coaching: high directive, high supportive (top-right) -->
  <rect x="360" y="100" width="240" height="125" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="150" font-family="sans-serif" font-size="16" font-weight="700" fill="#f59e0b" text-anchor="middle">S2 &#183; Coaching</text>
  <text x="480" y="172" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">explain, redirect, praise</text>
  <text x="480" y="190" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">D2: some skill, low morale</text>

  <!-- S4 Delegating: low directive, low supportive (bottom-left) -->
  <rect x="120" y="225" width="240" height="125" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="240" y="275" font-family="sans-serif" font-size="16" font-weight="700" fill="#2563eb" text-anchor="middle">S4 &#183; Delegating</text>
  <text x="240" y="297" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">trust, empower, get out of way</text>
  <text x="240" y="315" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">D4: able &amp; committed</text>

  <!-- S1 Directing: high directive, low supportive (bottom-right) -->
  <rect x="360" y="225" width="240" height="125" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="480" y="275" font-family="sans-serif" font-size="16" font-weight="700" fill="#ef4444" text-anchor="middle">S1 &#183; Directing</text>
  <text x="480" y="297" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">tell, show, supervise closely</text>
  <text x="480" y="315" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">D1: keen but new</text>

  <!-- Development arrow S1->S2->S3->S4 -->
  <text x="320" y="92" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle" font-weight="700">As the person grows:  D1 &#8594; D2 &#8594; D3 &#8594; D4</text>
</svg>
