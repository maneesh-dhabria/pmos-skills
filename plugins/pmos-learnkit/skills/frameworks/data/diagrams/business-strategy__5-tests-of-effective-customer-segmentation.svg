<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="5 Tests of Effective Customer Segmentation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">5 Tests of Effective Segmentation</text>
  <text x="20" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">A good (esp. B2B) segmentation passes all five — a checklist</text>

  <g font-family="sans-serif">
    <!-- Row 1 Reachable -->
    <rect x="20" y="70" width="600" height="58" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <rect x="32" y="86" width="26" height="26" rx="5" fill="#2563eb"/>
    <path d="M38,99 l5,5 l9,-11" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="92" font-size="14" font-weight="700" fill="#1d2438">1 · Reachable</text>
    <text x="72" y="112" font-size="11" fill="#5b6680">A reliable way to identify &amp; reach customers (creative execution is fine)</text>

    <!-- Row 2 Consistent needs -->
    <rect x="20" y="134" width="600" height="58" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <rect x="32" y="150" width="26" height="26" rx="5" fill="#2563eb"/>
    <path d="M38,163 l5,5 l9,-11" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="156" font-size="14" font-weight="700" fill="#1d2438">2 · Consistent needs</text>
    <text x="72" y="176" font-size="11" fill="#5b6680">Needs are consistent within a segment, with real variance across segments</text>

    <!-- Row 3 Product specific -->
    <rect x="20" y="198" width="600" height="58" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <rect x="32" y="214" width="26" height="26" rx="5" fill="#2563eb"/>
    <path d="M38,227 l5,5 l9,-11" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="220" font-size="14" font-weight="700" fill="#1d2438">3 · Product specific</text>
    <text x="72" y="240" font-size="11" fill="#5b6680">Specific to your product / category — other products wouldn't use it</text>

    <!-- Row 4 Prioritizable -->
    <rect x="20" y="262" width="600" height="58" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <rect x="32" y="278" width="26" height="26" rx="5" fill="#2563eb"/>
    <path d="M38,291 l5,5 l9,-11" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="284" font-size="14" font-weight="700" fill="#1d2438">4 · Prioritizable</text>
    <text x="72" y="304" font-size="11" fill="#5b6680">You can rank segments — clear on highest priority vs. not a priority</text>

    <!-- Row 5 Winnable -->
    <rect x="20" y="326" width="600" height="58" rx="6" fill="#eaf6f6" stroke="#0ea5a4"/>
    <rect x="32" y="342" width="26" height="26" rx="5" fill="#0ea5a4"/>
    <path d="M38,355 l5,5 l9,-11" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="72" y="348" font-size="14" font-weight="700" fill="#1d2438">5 · Winnable</text>
    <text x="72" y="368" font-size="11" fill="#5b6680">A differentiated value prop lets you plausibly win — and winning is worth it</text>
  </g>
</svg>
