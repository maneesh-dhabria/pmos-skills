<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Cohort Analysis diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Cohort Analysis</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Group customers by signup period, then watch each cohort age across months</text>

  <!-- column headers (cohort age) -->
  <text x="150" y="92" font-family="sans-serif" font-size="11" fill="#5b6680">Cohort age &#8594;</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">
    <text x="190" y="110">M0</text>
    <text x="255" y="110">M1</text>
    <text x="320" y="110">M3</text>
    <text x="385" y="110">M6</text>
    <text x="450" y="110">M9</text>
    <text x="515" y="110">M12</text>
  </g>
  <text x="60" y="92" font-family="sans-serif" font-size="11" fill="#5b6680">Signup cohort</text>

  <!-- heatmap rows: retention triangle, darker = higher retention -->
  <g font-family="sans-serif" font-size="11">
    <!-- Row Jan -->
    <text x="24" y="142" fill="#1d2438">Jan</text>
    <rect x="160" y="124" width="60" height="30" fill="#2563eb"/><text x="190" y="143" fill="#ffffff" text-anchor="middle">100</text>
    <rect x="225" y="124" width="60" height="30" fill="#3f78ec"/><text x="255" y="143" fill="#ffffff" text-anchor="middle">68</text>
    <rect x="290" y="124" width="60" height="30" fill="#7ba3f2"/><text x="320" y="143" fill="#ffffff" text-anchor="middle">52</text>
    <rect x="355" y="124" width="60" height="30" fill="#a8c2f6"/><text x="385" y="143" fill="#1d2438" text-anchor="middle">44</text>
    <rect x="420" y="124" width="60" height="30" fill="#c5d6f9"/><text x="450" y="143" fill="#1d2438" text-anchor="middle">40</text>
    <rect x="485" y="124" width="60" height="30" fill="#d8e3fb"/><text x="515" y="143" fill="#1d2438" text-anchor="middle">38</text>
    <!-- Row Feb -->
    <text x="24" y="177" fill="#1d2438">Feb</text>
    <rect x="160" y="159" width="60" height="30" fill="#2563eb"/><text x="190" y="178" fill="#ffffff" text-anchor="middle">100</text>
    <rect x="225" y="159" width="60" height="30" fill="#3f78ec"/><text x="255" y="178" fill="#ffffff" text-anchor="middle">71</text>
    <rect x="290" y="159" width="60" height="30" fill="#6e9bf1"/><text x="320" y="178" fill="#ffffff" text-anchor="middle">55</text>
    <rect x="355" y="159" width="60" height="30" fill="#9bb9f4"/><text x="385" y="178" fill="#1d2438" text-anchor="middle">47</text>
    <rect x="420" y="159" width="60" height="30" fill="#bcd0f8"/><text x="450" y="178" fill="#1d2438" text-anchor="middle">43</text>
    <rect x="485" y="159" width="60" height="30" fill="#eef3fd"/><text x="515" y="178" fill="#5b6680" text-anchor="middle">&#8212;</text>
    <!-- Row Mar -->
    <text x="24" y="212" fill="#1d2438">Mar</text>
    <rect x="160" y="194" width="60" height="30" fill="#2563eb"/><text x="190" y="213" fill="#ffffff" text-anchor="middle">100</text>
    <rect x="225" y="194" width="60" height="30" fill="#3870ea"/><text x="255" y="213" fill="#ffffff" text-anchor="middle">74</text>
    <rect x="290" y="194" width="60" height="30" fill="#6493f0"/><text x="320" y="213" fill="#ffffff" text-anchor="middle">59</text>
    <rect x="355" y="194" width="60" height="30" fill="#90b1f3"/><text x="385" y="213" fill="#1d2438" text-anchor="middle">50</text>
    <rect x="420" y="194" width="60" height="30" fill="#eef3fd"/><text x="450" y="213" fill="#5b6680" text-anchor="middle">&#8212;</text>
    <rect x="485" y="194" width="60" height="30" fill="#eef3fd"/><text x="515" y="213" fill="#5b6680" text-anchor="middle">&#8212;</text>
    <!-- Row Apr -->
    <text x="24" y="247" fill="#1d2438">Apr</text>
    <rect x="160" y="229" width="60" height="30" fill="#2563eb"/><text x="190" y="248" fill="#ffffff" text-anchor="middle">100</text>
    <rect x="225" y="229" width="60" height="30" fill="#3168e9"/><text x="255" y="248" fill="#ffffff" text-anchor="middle">78</text>
    <rect x="290" y="229" width="60" height="30" fill="#5b8def"/><text x="320" y="248" fill="#ffffff" text-anchor="middle">63</text>
    <rect x="355" y="229" width="60" height="30" fill="#eef3fd"/><text x="385" y="248" fill="#5b6680" text-anchor="middle">&#8212;</text>
    <rect x="420" y="229" width="60" height="30" fill="#eef3fd"/><text x="450" y="248" fill="#5b6680" text-anchor="middle">&#8212;</text>
    <rect x="485" y="229" width="60" height="30" fill="#eef3fd"/><text x="515" y="248" fill="#5b6680" text-anchor="middle">&#8212;</text>
  </g>
  <text x="160" y="276" font-family="sans-serif" font-size="10" fill="#5b6680">% of cohort retained (each cell = a fixed age). Diagonal blanks = not yet aged that far.</text>

  <!-- three lenses -->
  <text x="24" y="312" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Three lenses on the same grid</text>
  <g font-family="sans-serif" font-size="11">
    <rect x="24" y="324" width="190" height="56" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="344" font-weight="700" fill="#2563eb">LTV</text>
    <text x="34" y="362" fill="#5b6680">Cumulative value of a</text>
    <text x="34" y="375" fill="#5b6680">cohort by a fixed age</text>

    <rect x="226" y="324" width="190" height="56" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="236" y="344" font-weight="700" fill="#0ea5a4">Revenue retention</text>
    <text x="236" y="362" fill="#5b6680">% of initial revenue</text>
    <text x="236" y="375" fill="#5b6680">still active later</text>

    <rect x="428" y="324" width="188" height="56" rx="6" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="438" y="344" font-weight="700" fill="#f59e0b">Logo retention</text>
    <text x="438" y="362" fill="#5b6680">% of initial customers</text>
    <text x="438" y="375" fill="#5b6680">still using / paying</text>
  </g>
</svg>
