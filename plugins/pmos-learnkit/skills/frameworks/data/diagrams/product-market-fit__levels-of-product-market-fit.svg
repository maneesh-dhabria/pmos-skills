<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Levels of Product-Market Fit diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Levels of Product-Market Fit</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Todd Jackson's maturity ladder — PMF is a climb, not a switch</text>

  <!-- ascending staircase, 4 steps -->
  <!-- Nascent -->
  <rect x="32" y="300" width="140" height="60" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="102" y="324" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">1 · Nascent</text>
  <text x="102" y="343" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">3–5 design partners,</text>
  <text x="102" y="355" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">prove the problem</text>

  <!-- Developing -->
  <rect x="178" y="240" width="140" height="120" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="248" y="264" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">2 · Developing</text>
  <text x="248" y="283" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">repeatable sales,</text>
  <text x="248" y="295" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">demand still pushed</text>

  <!-- Strong -->
  <rect x="324" y="160" width="140" height="200" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="394" y="184" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">3 · Strong</text>
  <text x="394" y="203" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">demand pulls,</text>
  <text x="394" y="215" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">retention holds</text>

  <!-- Extreme -->
  <rect x="470" y="86" width="140" height="274" rx="6" fill="#2563eb" stroke="#2563eb" stroke-width="1.5"/>
  <text x="540" y="110" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">4 · Extreme</text>
  <text x="540" y="129" font-family="sans-serif" font-size="10.5" fill="#e0e8ff" text-anchor="middle">overwhelming pull,</text>
  <text x="540" y="141" font-family="sans-serif" font-size="10.5" fill="#e0e8ff" text-anchor="middle">efficient scale</text>

  <!-- climbing arrow -->
  <path d="M 40 290 L 540 78" stroke="#1d2438" stroke-width="1.5" stroke-dasharray="4 4" fill="none"/>
  <path d="M 540 78 l -11 2 l 6 9 z" fill="#1d2438"/>

  <!-- axis labels -->
  <text x="32" y="388" font-family="sans-serif" font-size="11" fill="#5b6680">Demand · Satisfaction · Efficiency rise with each level →</text>
  <text x="540" y="72" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">~60% never get past Level 2</text>
</svg>
