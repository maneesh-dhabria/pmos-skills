<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Eigenquestions diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Eigenquestions</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">The one question whose answer resolves the questions below it.</text>

  <!-- Eigenquestion node -->
  <rect x="150" y="80" width="340" height="62" rx="10" fill="#2563eb"/>
  <text x="320" y="106" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">EIGENQUESTION</text>
  <text x="320" y="126" font-family="sans-serif" font-size="12" fill="#dbe6ff" text-anchor="middle">"Is this market about consistency or comprehensiveness?"</text>

  <!-- connectors -->
  <g stroke="#5b6680" stroke-width="1.6" fill="none">
    <path d="M320 142 V168 M150 188 H490 M150 188 V206 M320 188 V206 M490 188 V206"/>
  </g>

  <!-- downstream decisions -->
  <g font-family="sans-serif">
    <rect x="48" y="208" width="180" height="70" rx="9" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="138" y="232" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Link out to 3rd-party</text>
    <text x="138" y="250" font-size="11.5" fill="#5b6680" text-anchor="middle">results?</text>
    <text x="138" y="268" font-size="11" fill="#0ea5a4" text-anchor="middle" font-weight="700">&#8594; No (consistency)</text>

    <rect x="232" y="208" width="176" height="70" rx="9" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="320" y="232" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Let creators opt</text>
    <text x="320" y="250" font-size="11.5" fill="#5b6680" text-anchor="middle">content out of devices?</text>
    <text x="320" y="268" font-size="11" fill="#0ea5a4" text-anchor="middle" font-weight="700">&#8594; Remove option</text>

    <rect x="412" y="208" width="180" height="70" rx="9" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
    <text x="502" y="232" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Allow 3rd-party</text>
    <text x="502" y="250" font-size="11.5" fill="#5b6680" text-anchor="middle">embed players?</text>
    <text x="502" y="268" font-size="11" fill="#0ea5a4" text-anchor="middle" font-weight="700">&#8594; Remove them</text>
  </g>

  <!-- principle band -->
  <rect x="48" y="306" width="544" height="64" rx="9" fill="#f4f7ff"/>
  <text x="64" y="330" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Reframe a deadlock into the eigenquestion</text>
  <text x="64" y="350" font-family="sans-serif" font-size="11.5" fill="#5b6680">Answer it once &#8594; many downstream decisions fall into place consistently.</text>
  <text x="64" y="366" font-family="sans-serif" font-size="11" fill="#f59e0b" font-weight="700">The most discriminating question in the decision space.</text>
</svg>
