<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="GO Product Roadmap diagram">
<rect width="640" height="400" fill="#ffffff"/>
<text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">GO Product Roadmap</text>
<text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Goal-oriented: each release led by the outcome it should achieve</text>

<!-- column headers -->
<g font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680">
<text x="92" y="92" text-anchor="middle">DATE</text>
<text x="200" y="92" text-anchor="middle">NAME</text>
<text x="328" y="92" text-anchor="middle">GOAL</text>
<text x="456" y="92" text-anchor="middle">FEATURES</text>
<text x="572" y="92" text-anchor="middle">METRICS</text>
</g>

<!-- GOAL is the organizing spine -->
<rect x="262" y="104" width="132" height="268" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>

<!-- Row 1 -->
<g>
<rect x="44" y="112" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="92" y="154" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1d2438">Q3</text>
<rect x="152" y="112" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="200" y="154" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d2438">Launch</text>
<text x="328" y="146" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Acquire</text>
<text x="328" y="164" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">new users</text>
<rect x="408" y="112" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="456" y="148" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">signup,</text>
<text x="456" y="163" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">onboarding</text>
<rect x="516" y="112" width="100" height="74" rx="6" fill="#ffffff" stroke="#0ea5a4"/>
<text x="566" y="154" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0ea5a4">10k signups</text>
</g>

<!-- Row 2 -->
<g>
<rect x="44" y="194" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="92" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1d2438">Q4</text>
<rect x="152" y="194" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="200" y="236" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d2438">Hook</text>
<text x="328" y="228" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Activate</text>
<text x="328" y="246" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">faster</text>
<rect x="408" y="194" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="456" y="230" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">templates,</text>
<text x="456" y="245" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">tips</text>
<rect x="516" y="194" width="100" height="74" rx="6" fill="#ffffff" stroke="#0ea5a4"/>
<text x="566" y="236" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0ea5a4">40% day-1</text>
</g>

<!-- Row 3 -->
<g>
<rect x="44" y="276" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="92" y="318" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1d2438">Q1</text>
<rect x="152" y="276" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="200" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#1d2438">Stay</text>
<text x="328" y="310" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Retain</text>
<text x="328" y="328" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">cohorts</text>
<rect x="408" y="276" width="96" height="74" rx="6" fill="#ffffff" stroke="#5b6680"/>
<text x="456" y="312" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">reminders,</text>
<text x="456" y="327" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">digests</text>
<rect x="516" y="276" width="100" height="74" rx="6" fill="#ffffff" stroke="#0ea5a4"/>
<text x="566" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0ea5a4">+15% W4</text>
</g>

<text x="328" y="390" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f59e0b">Features serve the goal; metrics prove it — not a feature wishlist</text>
</svg>
