<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="3-5-7 for execution diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">3-5-7 for Execution</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Do a few things flawlessly — accept flaws in the rest</text>

  <!-- Pyramid: 3 stacked bands, widening toward the base as scope grows -->
  <!-- Top band: Individual = 3 -->
  <polygon points="320,75 405,150 235,150" fill="#2563eb"/>
  <text x="320" y="122" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#ffffff">3</text>

  <!-- Middle band: Team = 5 -->
  <polygon points="235,158 405,158 470,235 170,235" fill="#0ea5a4"/>
  <text x="320" y="210" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#ffffff">5</text>

  <!-- Bottom band: Company = 7 -->
  <polygon points="170,243 470,243 540,325 100,325" fill="#f59e0b"/>
  <text x="320" y="298" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="700" fill="#ffffff">7</text>

  <!-- Right-side labels -->
  <text x="430" y="118" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Individual</text>
  <text x="430" y="135" font-family="sans-serif" font-size="11" fill="#5b6680">~3 things, flawless</text>

  <text x="495" y="200" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Team</text>
  <text x="495" y="217" font-family="sans-serif" font-size="11" fill="#5b6680">~5 things, flawless</text>

  <text x="555" y="290" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="end">Company</text>
  <text x="555" y="307" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="end">~7 things, flawless</text>

  <!-- Footer principle -->
  <text x="320" y="365" text-anchor="middle" font-family="sans-serif" font-size="12.5" fill="#1d2438">Choose those few wisely — they cover the bulk of success.</text>
  <text x="320" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Everything else: be OK with imperfection.</text>
</svg>
