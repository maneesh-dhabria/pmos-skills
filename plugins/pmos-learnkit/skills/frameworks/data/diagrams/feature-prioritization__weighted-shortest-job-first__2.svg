<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Cost of Delay accumulation over time diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Cost of Delay accumulates over time</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Every period a job is delayed, its lost economic value adds up &#8212; CoD is value &#215; duration.</text>

  <!-- axes -->
  <line x1="90" y1="90" x2="90" y2="320" stroke="#1d2438" stroke-width="2"/>
  <line x1="90" y1="320" x2="600" y2="320" stroke="#1d2438" stroke-width="2"/>
  <text x="60" y="100" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" transform="rotate(-90 60 200)">Cumulative value lost</text>
  <text x="345" y="350" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Delay duration (months)</text>

  <!-- accumulating area: value lost grows with delay -->
  <polygon points="90,320 90,320 210,290 330,230 450,150 570,110 570,320" fill="#2563eb" fill-opacity="0.14"/>
  <polyline points="90,320 210,290 330,230 450,150 570,110" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- month markers -->
  <g font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">
    <line x1="210" y1="320" x2="210" y2="325" stroke="#5b6680"/>
    <line x1="330" y1="320" x2="330" y2="325" stroke="#5b6680"/>
    <line x1="450" y1="320" x2="450" y2="325" stroke="#5b6680"/>
    <text x="210" y="338">1</text>
    <text x="330" y="338">2</text>
    <text x="450" y="338">3</text>
  </g>

  <!-- worked example callouts -->
  <circle cx="450" cy="150" r="5" fill="#f59e0b"/>
  <line x1="450" y1="150" x2="450" y2="320" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3"/>
  <rect x="338" y="116" width="170" height="44" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
  <text x="348" y="134" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">$100k / month</text>
  <text x="348" y="151" font-family="sans-serif" font-size="11" fill="#5b6680">&#215; 3 months = $300k CoD</text>

  <text x="90" y="376" font-family="sans-serif" font-size="11" fill="#5b6680">Higher Cost of Delay &#8594; the job earns a higher WSJF score and is sequenced sooner.</text>
</svg>
