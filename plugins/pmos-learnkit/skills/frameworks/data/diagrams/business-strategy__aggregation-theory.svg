<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Aggregation Theory diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Aggregation Theory</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Own the user relationship at zero marginal cost; commoditize modular suppliers</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrm" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- suppliers (left, modular) -->
  <text x="100" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">MODULAR SUPPLIERS</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <rect x="36" y="104" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="100" y="123" text-anchor="middle">Many, commoditized</text>
    <rect x="36" y="142" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="100" y="161" text-anchor="middle">Compete on aggregator</text>
    <rect x="36" y="180" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="100" y="199" text-anchor="middle">Often unpaid</text>
  </g>

  <!-- aggregator (center) -->
  <rect x="246" y="118" width="148" height="92" rx="10" fill="#2563eb"/>
  <text x="320" y="150" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">AGGREGATOR</text>
  <text x="320" y="172" font-family="sans-serif" font-size="10.5" fill="#dbe6ff" text-anchor="middle">Direct user relationship</text>
  <text x="320" y="187" font-family="sans-serif" font-size="10.5" fill="#dbe6ff" text-anchor="middle">Zero marginal cost</text>
  <text x="320" y="202" font-family="sans-serif" font-size="10.5" fill="#dbe6ff" text-anchor="middle">Best experience wins</text>

  <!-- users (right) -->
  <text x="540" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">USERS</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <rect x="476" y="104" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="540" y="123" text-anchor="middle">Exclusive relationship</text>
    <rect x="476" y="142" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="540" y="161" text-anchor="middle">Owned at scale</text>
    <rect x="476" y="180" width="128" height="30" rx="5" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="540" y="199" text-anchor="middle">Curate abundant supply</text>
  </g>

  <!-- flows -->
  <line x1="168" y1="157" x2="242" y2="157" stroke="#5b6680" stroke-width="2" marker-end="url(#arrm)"/>
  <line x1="398" y1="157" x2="472" y2="157" stroke="#2563eb" stroke-width="2" marker-end="url(#arr)"/>

  <!-- virtuous cycle -->
  <rect x="36" y="250" width="568" height="120" rx="10" fill="#f4f7ff"/>
  <text x="320" y="274" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Virtuous cycle &#8594; winner-take-all</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <rect x="60" y="290" width="150" height="58" rx="8" fill="#ffffff" stroke="#2563eb"/>
    <text x="135" y="315" text-anchor="middle" font-weight="700">More users</text>
    <text x="135" y="332" text-anchor="middle" fill="#5b6680">better experience</text>

    <rect x="245" y="290" width="150" height="58" rx="8" fill="#ffffff" stroke="#0ea5a4"/>
    <text x="320" y="315" text-anchor="middle" font-weight="700">More suppliers</text>
    <text x="320" y="332" text-anchor="middle" fill="#5b6680">accept the terms</text>

    <rect x="430" y="290" width="150" height="58" rx="8" fill="#ffffff" stroke="#f59e0b"/>
    <text x="505" y="315" text-anchor="middle" font-weight="700">Falling CAC</text>
    <text x="505" y="332" text-anchor="middle" fill="#5b6680">attracts more users</text>
  </g>
  <line x1="210" y1="319" x2="241" y2="319" stroke="#5b6680" stroke-width="2" marker-end="url(#arrm)"/>
  <line x1="395" y1="319" x2="426" y2="319" stroke="#5b6680" stroke-width="2" marker-end="url(#arrm)"/>
  <path d="M505 348 L505 360 L135 360 L135 350" fill="none" stroke="#5b6680" stroke-width="2" marker-end="url(#arrm)"/>
</svg>
