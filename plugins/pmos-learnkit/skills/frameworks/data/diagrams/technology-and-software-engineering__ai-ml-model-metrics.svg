<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="AI/ML Model Metrics diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">AI/ML Model Metrics</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Classification confusion matrix &amp; the precision–recall trade-off</text>

  <!-- Confusion matrix -->
  <text x="150" y="92" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">Predicted</text>
  <text x="206" y="112" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Positive</text>
  <text x="296" y="112" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Negative</text>
  <text x="40" y="172" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle" transform="rotate(-90 40 172)">Actual</text>
  <text x="62" y="148" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="end">Positive</text>
  <text x="62" y="218" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="end">Negative</text>

  <rect x="116" y="120" width="180" height="60" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="296" y="120" width="90" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="116" y="180" width="180" height="60" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="296" y="180" width="90" height="60" fill="#ccfbf1" stroke="#0ea5a4" stroke-width="1.5"/>

  <text x="206" y="146" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">True Positive</text>
  <text x="206" y="164" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">correctly caught</text>
  <text x="341" y="146" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">False Neg</text>
  <text x="341" y="164" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">missed</text>
  <text x="206" y="206" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">False Positive</text>
  <text x="206" y="224" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">false alarm</text>
  <text x="341" y="206" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">True Neg</text>

  <!-- Metric formulas -->
  <text x="116" y="270" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Precision = TP / (TP + FP)</text>
  <text x="116" y="288" font-family="sans-serif" font-size="10" fill="#5b6680">of predicted positives, how many were right</text>
  <text x="116" y="312" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Recall = TP / (TP + FN)</text>
  <text x="116" y="330" font-family="sans-serif" font-size="10" fill="#5b6680">of real positives, how many were found</text>
  <text x="116" y="354" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">F1 = harmonic mean of both (0–1; &gt;0.7 decent)</text>

  <!-- Trade-off panel -->
  <rect x="420" y="120" width="196" height="234" rx="8" fill="#f4f7ff" stroke="#1d2438" stroke-width="1"/>
  <text x="518" y="142" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Precision–Recall Trade-off</text>

  <text x="436" y="170" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Maximize Recall</text>
  <text x="436" y="187" font-family="sans-serif" font-size="10" fill="#5b6680">Cancer screening:</text>
  <text x="436" y="201" font-family="sans-serif" font-size="10" fill="#5b6680">catch every case;</text>
  <text x="436" y="215" font-family="sans-serif" font-size="10" fill="#5b6680">false alarms are ok.</text>

  <line x1="436" y1="232" x2="600" y2="232" stroke="#cbd5e1" stroke-width="1"/>

  <text x="436" y="256" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">Maximize Precision</text>
  <text x="436" y="273" font-family="sans-serif" font-size="10" fill="#5b6680">Credit-default model:</text>
  <text x="436" y="287" font-family="sans-serif" font-size="10" fill="#5b6680">a wrong "defaulter"</text>
  <text x="436" y="301" font-family="sans-serif" font-size="10" fill="#5b6680">flag loses a customer.</text>

  <line x1="436" y1="318" x2="600" y2="318" stroke="#cbd5e1" stroke-width="1"/>
  <text x="436" y="338" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Regression: MSE vs MAE</text>
  <text x="436" y="351" font-family="sans-serif" font-size="9.5" fill="#5b6680">MSE punishes outliers · MAE reads easier</text>
</svg>
