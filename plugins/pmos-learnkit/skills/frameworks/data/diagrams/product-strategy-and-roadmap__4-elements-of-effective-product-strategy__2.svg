<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="What a product strategy is NOT diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">What a Product Strategy Is NOT</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Five things commonly mistaken for strategy — each supports a strategy, none is one</text>

  <!-- Row: Goals or Metrics -->
  <g>
    <circle cx="44" cy="92" r="9" fill="#ef4444"/>
    <text x="44" y="96" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
    <text x="66" y="89" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Goals or Metrics</text>
    <text x="66" y="106" font-family="sans-serif" font-size="11" fill="#5b6680">Show what we want &amp; measure progress — not how or why.</text>
  </g>
  <line x1="66" y1="118" x2="616" y2="118" stroke="#f4f7ff" stroke-width="2"/>

  <!-- Row: Roadmaps -->
  <g>
    <circle cx="44" cy="146" r="9" fill="#ef4444"/>
    <text x="44" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
    <text x="66" y="143" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Roadmaps</text>
    <text x="66" y="160" font-family="sans-serif" font-size="11" fill="#5b6680">A list of features, experiments &amp; campaigns — just activities.</text>
  </g>
  <line x1="66" y1="172" x2="616" y2="172" stroke="#f4f7ff" stroke-width="2"/>

  <!-- Row: New Features or Products -->
  <g>
    <circle cx="44" cy="200" r="9" fill="#ef4444"/>
    <text x="44" y="204" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
    <text x="66" y="197" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">New Features or Products</text>
    <text x="66" y="214" font-family="sans-serif" font-size="11" fill="#5b6680">One of many methods to achieve a strategy — not the strategy.</text>
  </g>
  <line x1="66" y1="226" x2="616" y2="226" stroke="#f4f7ff" stroke-width="2"/>

  <!-- Row: Budgets -->
  <g>
    <circle cx="44" cy="254" r="9" fill="#ef4444"/>
    <text x="44" y="258" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
    <text x="66" y="251" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Budgets</text>
    <text x="66" y="268" font-family="sans-serif" font-size="11" fill="#5b6680">Allocating team &amp; money supports the strategy — isn't it.</text>
  </g>
  <line x1="66" y1="280" x2="616" y2="280" stroke="#f4f7ff" stroke-width="2"/>

  <!-- Row: Mission Statements -->
  <g>
    <circle cx="44" cy="308" r="9" fill="#ef4444"/>
    <text x="44" y="312" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>
    <text x="66" y="305" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Mission Statements</text>
    <text x="66" y="322" font-family="sans-serif" font-size="11" fill="#5b6680">Express long-term beliefs — strategy is how we fulfil them.</text>
  </g>

  <rect x="24" y="346" width="592" height="38" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="40" y="370" font-family="sans-serif" font-size="11" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">Strategy</tspan> = the coherent logic for how &amp; why — everything above merely serves it.</text>
</svg>
