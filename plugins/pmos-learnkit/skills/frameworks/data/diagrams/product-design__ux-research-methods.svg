<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="UX Research Methods diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">UX Research Methods</text>
  <text x="32" y="54" font-family="sans-serif" font-size="12.5" fill="#5b6680">Nielsen's map: pick a method by what it reveals (3rd axis: context of use)</text>

  <!-- Matrix area: x = Qual..Quant, y = Behavioral(top)..Attitudinal(bottom) -->
  <!-- axis frame -->
  <rect x="150" y="80" width="420" height="280" fill="#f4f7ff" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="360" y1="80" x2="360" y2="360" stroke="#94a3b8" stroke-width="1.2"/>
  <line x1="150" y1="220" x2="570" y2="220" stroke="#94a3b8" stroke-width="1.2"/>

  <!-- Y axis labels -->
  <text x="68" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Behavioral</text>
  <text x="68" y="167" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">what they do</text>
  <text x="68" y="288" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Attitudinal</text>
  <text x="68" y="305" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">what they say</text>

  <!-- X axis labels -->
  <text x="255" y="378" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Qualitative</text>
  <text x="255" y="394" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">why / how to fix</text>
  <text x="465" y="378" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">Quantitative</text>
  <text x="465" y="394" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">how many / how much</text>

  <!-- Quadrant example methods -->
  <g font-family="sans-serif" font-size="11">
    <!-- Behavioral + Qual -->
    <rect x="166" y="100" width="178" height="100" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
    <text x="255" y="120" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">Observe behavior</text>
    <text x="255" y="142" fill="#1d2438" text-anchor="middle">Usability testing</text>
    <text x="255" y="160" fill="#1d2438" text-anchor="middle">Field studies</text>
    <text x="255" y="178" fill="#1d2438" text-anchor="middle">Eye-tracking</text>

    <!-- Behavioral + Quant -->
    <rect x="376" y="100" width="178" height="100" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="465" y="120" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">Measure behavior</text>
    <text x="465" y="142" fill="#1d2438" text-anchor="middle">A/B testing</text>
    <text x="465" y="160" fill="#1d2438" text-anchor="middle">Analytics</text>
    <text x="465" y="178" fill="#1d2438" text-anchor="middle">Clickstream</text>

    <!-- Attitudinal + Qual -->
    <rect x="166" y="240" width="178" height="100" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
    <text x="255" y="260" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">Hear attitudes</text>
    <text x="255" y="282" fill="#1d2438" text-anchor="middle">Interviews</text>
    <text x="255" y="300" fill="#1d2438" text-anchor="middle">Focus groups</text>
    <text x="255" y="318" fill="#1d2438" text-anchor="middle">Card sorting</text>

    <!-- Attitudinal + Quant -->
    <rect x="376" y="240" width="178" height="100" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1"/>
    <text x="465" y="260" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">Measure attitudes</text>
    <text x="465" y="282" fill="#1d2438" text-anchor="middle">Surveys</text>
    <text x="465" y="300" fill="#1d2438" text-anchor="middle">Desirability</text>
    <text x="465" y="318" fill="#1d2438" text-anchor="middle">Questionnaires</text>
  </g>
</svg>
