<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Level 2 retention forces matrix diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Level 2 — Retaining Users: Two Forces</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Reasons to stay grow as reasons to leave mount</text>

  <!-- Accruing Benefits column -->
  <rect x="40" y="80" width="270" height="280" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="175" y="108" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#2563eb">Accruing Benefits</text>
  <text x="175" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Experience improves over time</text>

  <rect x="60" y="150" width="230" height="90" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="175" y="174" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Intrinsic</text>
  <text x="175" y="198" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">Accomplishment,</text>
  <text x="175" y="214" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">sense of community</text>

  <rect x="60" y="252" width="230" height="90" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="175" y="276" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Extrinsic</text>
  <text x="175" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">Discounts,</text>
  <text x="175" y="316" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">rewards</text>

  <!-- Mounting Losses column -->
  <rect x="330" y="80" width="270" height="280" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="465" y="108" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#ef4444">Mounting Losses</text>
  <text x="465" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">What users lose if they leave</text>

  <rect x="350" y="150" width="230" height="90" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="465" y="174" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Social</text>
  <text x="465" y="198" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">Connection with friends,</text>
  <text x="465" y="214" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">status in a community</text>

  <rect x="350" y="252" width="230" height="90" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="465" y="276" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Psychological</text>
  <text x="465" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">Sense of identity,</text>
  <text x="465" y="316" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#1d2438">productivity</text>
</svg>
