<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Proxy metric chain diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="38" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#1d2438">Proxy Metric Chain</text>
  <text x="320" y="60" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Translate strategy into a measurable signal, then into the work that moves it</text>

  <!-- Stage 1: Strategy -->
  <rect x="36" y="120" width="160" height="120" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="116" y="152" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#2563eb">1. Strategy</text>
  <text x="116" y="180" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">The defined product</text>
  <text x="116" y="196" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">strategy / desired</text>
  <text x="116" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">outcome</text>

  <!-- Stage 2: Proxy metric -->
  <rect x="240" y="120" width="160" height="120" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="152" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">2. Proxy Metric</text>
  <text x="320" y="180" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">A leading signal that</text>
  <text x="320" y="196" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">stands in for success</text>
  <text x="320" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">(e.g. Netflix hours)</text>

  <!-- Stage 3: Projects -->
  <rect x="444" y="120" width="160" height="120" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="524" y="152" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">3. Projects</text>
  <text x="524" y="180" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">The tactics chosen</text>
  <text x="524" y="196" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">to move the metric</text>
  <text x="524" y="212" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">on the roadmap</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <line x1="196" y1="180" x2="236" y2="180" stroke="#5b6680" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="180" x2="440" y2="180" stroke="#5b6680" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Feedback loop -->
  <path d="M524 240 C524 320, 116 320, 116 244" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>
  <text x="320" y="316" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#ef4444">Monitor the metric &#8594; revalidate &amp; reprioritize the strategy</text>
</svg>
