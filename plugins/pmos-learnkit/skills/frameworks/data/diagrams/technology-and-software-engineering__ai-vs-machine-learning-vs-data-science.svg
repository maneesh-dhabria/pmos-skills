<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="AI vs Machine Learning vs Data Science diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">AI vs. Machine Learning vs. Data Science</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">ML is nested inside AI; Data Science is a distinct field that overlaps both</text>

  <!-- AI outer -->
  <ellipse cx="250" cy="240" rx="220" ry="130" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="135" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">Artificial Intelligence</text>
  <text x="250" y="152" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">machines that mimic human reasoning &amp; decisions</text>
  <text x="118" y="300" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">NLP · vision · robotics</text>
  <text x="118" y="314" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">expert &amp; search systems</text>

  <!-- ML inner -->
  <ellipse cx="250" cy="262" rx="130" ry="86" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="230" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Machine Learning</text>
  <text x="250" y="247" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">learns patterns from data</text>
  <text x="250" y="261" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">— no explicit rules</text>
  <text x="250" y="282" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">supervised · unsupervised</text>
  <text x="250" y="295" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">reinforcement · deep learning</text>

  <!-- Data Science overlapping -->
  <ellipse cx="470" cy="250" rx="150" ry="118" fill="#ccfbf1" fill-opacity="0.55" stroke="#0ea5a4" stroke-width="2"/>
  <text x="520" y="155" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4" text-anchor="middle">Data Science</text>
  <text x="520" y="172" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">insight from data</text>
  <text x="552" y="222" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">stats + code +</text>
  <text x="552" y="236" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">domain expertise</text>
  <text x="556" y="278" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">collect · clean · model</text>
  <text x="556" y="291" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">visualize · communicate</text>

  <!-- overlap label -->
  <text x="392" y="252" font-family="sans-serif" font-size="9" font-weight="700" fill="#0ea5a4" text-anchor="middle">DS uses</text>
  <text x="392" y="264" font-family="sans-serif" font-size="9" font-weight="700" fill="#0ea5a4" text-anchor="middle">ML</text>

  <!-- footer key -->
  <text x="24" y="390" font-family="sans-serif" font-size="10" fill="#5b6680">Goal — AI: autonomy &amp; adaptation · ML: generalize from data · Data Science: actionable insight for decisions</text>
</svg>
