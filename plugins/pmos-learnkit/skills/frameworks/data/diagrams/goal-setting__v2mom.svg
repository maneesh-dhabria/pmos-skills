<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="V2MOM diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">V2MOM</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Five stacked questions that cascade for top-down alignment</text>

  <!-- 5 rows -->
  <!-- V -->
  <rect x="24" y="72" width="430" height="52" rx="8" fill="#2563eb"/>
  <circle cx="50" cy="98" r="15" fill="#ffffff"/>
  <text x="50" y="103" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">V</text>
  <text x="78" y="93" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Vision</text>
  <text x="78" y="111" font-family="sans-serif" font-size="11" fill="#dbe6ff">The big-picture goal &#8212; where we want to go</text>

  <!-- V (values) -->
  <rect x="24" y="130" width="430" height="52" rx="8" fill="#0ea5a4"/>
  <circle cx="50" cy="156" r="15" fill="#ffffff"/>
  <text x="50" y="161" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4" text-anchor="middle">V</text>
  <text x="78" y="151" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Values</text>
  <text x="78" y="169" font-family="sans-serif" font-size="11" fill="#e1fbfa">What matters most as we pursue the vision</text>

  <!-- M (methods) -->
  <rect x="24" y="188" width="430" height="52" rx="8" fill="#f59e0b"/>
  <circle cx="50" cy="214" r="15" fill="#ffffff"/>
  <text x="50" y="219" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">M</text>
  <text x="78" y="209" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Methods</text>
  <text x="78" y="227" font-family="sans-serif" font-size="11" fill="#fff3df">Actions to get there &#8212; listed in priority order</text>

  <!-- O (obstacles) -->
  <rect x="24" y="246" width="430" height="52" rx="8" fill="#ef4444"/>
  <circle cx="50" cy="272" r="15" fill="#ffffff"/>
  <text x="50" y="277" font-family="sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">O</text>
  <text x="78" y="267" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Obstacles</text>
  <text x="78" y="285" font-family="sans-serif" font-size="11" fill="#ffe2e2">Challenges we must overcome along the way</text>

  <!-- M (measures) -->
  <rect x="24" y="304" width="430" height="52" rx="8" fill="#1d2438"/>
  <circle cx="50" cy="330" r="15" fill="#ffffff"/>
  <text x="50" y="335" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">M</text>
  <text x="78" y="325" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Measures</text>
  <text x="78" y="343" font-family="sans-serif" font-size="11" fill="#c8cedd">Measurable results that show progress</text>

  <!-- Cascade panel -->
  <rect x="478" y="72" width="138" height="284" rx="9" fill="#f4f7ff"/>
  <text x="547" y="94" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Cascade</text>
  <!-- nested boxes -->
  <rect x="498" y="108" width="98" height="34" rx="5" fill="#2563eb"/>
  <text x="547" y="129" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Company</text>
  <rect x="510" y="156" width="86" height="34" rx="5" fill="#0ea5a4"/>
  <text x="553" y="177" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Function</text>
  <rect x="522" y="204" width="74" height="34" rx="5" fill="#f59e0b"/>
  <text x="559" y="225" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Team</text>
  <rect x="534" y="252" width="62" height="34" rx="5" fill="#1d2438"/>
  <text x="565" y="273" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">IC</text>
  <path d="M547 142 L547 156 M547 190 L553 204 M559 238 L565 252" stroke="#5b6680" stroke-width="1.3" fill="none"/>
  <text x="547" y="305" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Everyone writes</text>
  <text x="547" y="319" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">their own,</text>
  <text x="547" y="333" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">built on the one</text>
  <text x="547" y="347" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">above</text>
</svg>
