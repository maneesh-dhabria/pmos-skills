<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Statistical significance error types 2x2 grid diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Statistical Significance: Error Types</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Test conclusion vs. what is true in reality</text>

  <!-- Axis labels -->
  <text x="330" y="88" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438">Reality</text>
  <text x="200" y="106" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Null is true (no effect)</text>
  <text x="470" y="106" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Null is false (real effect)</text>

  <text x="36" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438" transform="rotate(-90 36 200)">Test conclusion</text>

  <text x="118" y="172" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Reject</text>
  <text x="118" y="186" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">null</text>
  <text x="118" y="300" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Fail to</text>
  <text x="118" y="314" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">reject</text>

  <!-- Top-left: Type I error (false positive) -->
  <rect x="130" y="118" width="240" height="120" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444">Type I error</text>
  <text x="250" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">False positive (α)</text>
  <text x="250" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Called a winner that</text>
  <text x="250" y="214" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">isn't real</text>

  <!-- Top-right: Correct (power) -->
  <rect x="380" y="118" width="240" height="120" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="500" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Correct</text>
  <text x="500" y="172" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">True positive (power, 1-β)</text>
  <text x="500" y="200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Detected a real effect</text>

  <!-- Bottom-left: Correct -->
  <rect x="130" y="246" width="240" height="120" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="250" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Correct</text>
  <text x="250" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">True negative</text>
  <text x="250" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">No effect, none claimed</text>

  <!-- Bottom-right: Type II error -->
  <rect x="380" y="246" width="240" height="120" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="290" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Type II error</text>
  <text x="500" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">False negative (β)</text>
  <text x="500" y="338" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Missed a real effect</text>
</svg>
