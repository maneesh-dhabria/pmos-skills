<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three types of prompts diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Three Types of Prompts</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12" fill="#5b6680">Without a prompt, behavior won't occur — even with high motivation and ability.</text>

  <!-- Person Prompt -->
  <g>
    <rect x="28" y="84" width="186" height="276" rx="12" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="121" cy="128" r="22" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
    <circle cx="121" cy="121" r="7" fill="#ef4444"/>
    <path d="M108 140 Q121 130 134 140" fill="none" stroke="#ef4444" stroke-width="2"/>
    <text x="121" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">Person Prompt</text>
    <text x="121" y="202" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Bodily urge</text>
    <text x="121" y="232" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Hunger, thirst,</text>
    <text x="121" y="248" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">a full bladder, fatigue</text>
    <text x="121" y="320" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680" text-anchor="middle">Usually</text>
    <text x="121" y="336" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680" text-anchor="middle">unreliable</text>
  </g>

  <!-- Context Prompt -->
  <g>
    <rect x="227" y="84" width="186" height="276" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="299" y="108" width="44" height="40" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <line x1="307" y1="122" x2="335" y2="122" stroke="#2563eb" stroke-width="2"/>
    <line x1="307" y1="132" x2="335" y2="132" stroke="#2563eb" stroke-width="2"/>
    <text x="320" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">Context Prompt</text>
    <text x="320" y="202" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Cue in your environment</text>
    <text x="320" y="232" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Sticky note, app alert,</text>
    <text x="320" y="248" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">phone ringing, a</text>
    <text x="320" y="264" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">colleague's reminder</text>
    <text x="320" y="320" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680" text-anchor="middle">Can overwhelm</text>
    <text x="320" y="336" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680" text-anchor="middle">or be ignored</text>
  </g>

  <!-- Action Prompt -->
  <g>
    <rect x="426" y="84" width="186" height="276" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="510" cy="128" r="22" fill="none" stroke="#0ea5a4" stroke-width="2"/>
    <path d="M510 110 A18 18 0 1 1 494 122" fill="none" stroke="#0ea5a4" stroke-width="2"/>
    <path d="M510 104 L510 116 L520 110 Z" fill="#0ea5a4"/>
    <text x="519" y="178" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">Action Prompt</text>
    <text x="519" y="202" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">An existing behavior</text>
    <text x="519" y="232" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">A habit you already do</text>
    <text x="519" y="248" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">cues the new one</text>
    <text x="519" y="264" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">(the "anchor")</text>
    <text x="519" y="320" font-family="sans-serif" font-size="11" font-weight="700" font-style="italic" fill="#0ea5a4" text-anchor="middle">Most reliable —</text>
    <text x="519" y="336" font-family="sans-serif" font-size="11" font-weight="700" font-style="italic" fill="#0ea5a4" text-anchor="middle">build habits here</text>
  </g>
</svg>
