<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="RICE Score diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">RICE Score</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">A single number to stack-rank features on one workstream</text>

  <!-- Formula bar -->
  <!-- numerator block -->
  <g font-family="sans-serif">
    <!-- Reach -->
    <rect x="60" y="90" width="120" height="58" rx="8" fill="#2563eb" opacity="0.12" stroke="#2563eb" stroke-width="1.5"/>
    <text x="120" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Reach</text>
    <text x="120" y="131" text-anchor="middle" font-size="9" fill="#5b6680">people affected</text>
    <text x="120" y="143" text-anchor="middle" font-size="9" fill="#5b6680">/ quarter</text>

    <text x="195" y="125" text-anchor="middle" font-size="22" fill="#1d2438">×</text>

    <!-- Impact -->
    <rect x="210" y="90" width="120" height="58" rx="8" fill="#0ea5a4" opacity="0.12" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="270" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea5a4">Impact</text>
    <text x="270" y="131" text-anchor="middle" font-size="9" fill="#5b6680">3 / 2 / 1 /</text>
    <text x="270" y="143" text-anchor="middle" font-size="9" fill="#5b6680">0.5 / 0.25</text>

    <text x="345" y="125" text-anchor="middle" font-size="22" fill="#1d2438">×</text>

    <!-- Confidence -->
    <rect x="360" y="90" width="120" height="58" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="420" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#1d2438">Confidence</text>
    <text x="420" y="131" text-anchor="middle" font-size="9" fill="#5b6680">100% / 80%</text>
    <text x="420" y="143" text-anchor="middle" font-size="9" fill="#5b6680">/ 50%</text>
  </g>

  <!-- Division line -->
  <line x1="60" y1="170" x2="480" y2="170" stroke="#1d2438" stroke-width="2.5"/>

  <!-- Effort denominator -->
  <rect x="210" y="184" width="120" height="50" rx="8" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="270" y="206" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444">Effort</text>
  <text x="270" y="224" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">person-months (all team)</text>

  <!-- Equals RICE -->
  <text x="510" y="160" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#1d2438">=</text>
  <rect x="528" y="120" width="92" height="80" rx="10" fill="#2563eb" stroke="#1d2438" stroke-width="1.5"/>
  <text x="574" y="153" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff">RICE</text>
  <text x="574" y="174" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ffffff">score</text>
  <text x="574" y="190" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dbe6ff">↑ = do first</text>

  <!-- Ranked output bars -->
  <text x="60" y="268" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Stack-rank features by score</text>
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <text x="60" y="290" >Feature A</text>
    <rect x="140" y="281" width="300" height="12" rx="3" fill="#2563eb"/>
    <text x="448" y="291" fill="#5b6680">9.6</text>

    <text x="60" y="312">Feature B</text>
    <rect x="140" y="303" width="210" height="12" rx="3" fill="#2563eb" opacity="0.7"/>
    <text x="358" y="313" fill="#5b6680">6.7</text>

    <text x="60" y="334">Feature C</text>
    <rect x="140" y="325" width="110" height="12" rx="3" fill="#2563eb" opacity="0.45"/>
    <text x="258" y="335" fill="#5b6680">3.5</text>
  </g>

  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Extends ICE by adding Reach. Watch for: subjectivity, oversimplification, short-term bias.</text>
</svg>
