<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="10 High Leverage Meetings for PM Leaders diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">10 High-Leverage Meetings for PM Leaders</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">A cadence of recurring + ad-hoc rituals (Shreyas Doshi)</text>

  <!-- Cadence column headers -->
  <g font-family="sans-serif" font-size="11" font-weight="700">
    <rect x="20" y="62" width="146" height="24" rx="6" fill="#eff4ff" stroke="#2563eb" stroke-width="1.1"/>
    <text x="93" y="79" text-anchor="middle" fill="#2563eb">High frequency</text>
    <rect x="174" y="62" width="146" height="24" rx="6" fill="#ecfeff" stroke="#0ea5a4" stroke-width="1.1"/>
    <text x="247" y="79" text-anchor="middle" fill="#0ea5a4">Weekly / Monthly</text>
    <rect x="328" y="62" width="146" height="24" rx="6" fill="#fffaf0" stroke="#f59e0b" stroke-width="1.1"/>
    <text x="401" y="79" text-anchor="middle" fill="#f59e0b">As-needed</text>
    <rect x="482" y="62" width="138" height="24" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.1"/>
    <text x="551" y="79" text-anchor="middle" fill="#5b6680">People / Culture</text>
  </g>

  <!-- rows helper: each is a rounded rect with number + label -->
  <g font-family="sans-serif" font-size="10">
    <!-- High frequency -->
    <rect x="20" y="94" width="146" height="56" rx="7" fill="#f8faff" stroke="#2563eb" stroke-width="1"/>
    <circle cx="38" cy="112" r="9" fill="#2563eb"/><text x="38" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>
    <text x="54" y="110" font-weight="700" fill="#1d2438">EOD Eng sync</text>
    <text x="54" y="123" font-size="8.6" fill="#5b6680">issues, dev, venting</text>
    <circle cx="38" cy="138" r="9" fill="#2563eb"/><text x="38" y="142" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>
    <text x="54" y="137" font-weight="700" fill="#1d2438">Weekly Sales sync</text>
    <text x="54" y="148" font-size="8.6" fill="#5b6680">deals, objections</text>

    <!-- Weekly/Monthly -->
    <rect x="174" y="94" width="146" height="170" rx="7" fill="#f6fefe" stroke="#0ea5a4" stroke-width="1"/>
    <circle cx="192" cy="112" r="9" fill="#0ea5a4"/><text x="192" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>
    <text x="208" y="110" font-weight="700" fill="#1d2438">2:2s — EM &amp; PM</text>
    <text x="208" y="123" font-size="8.6" fill="#5b6680">unblock, escalate</text>
    <circle cx="192" cy="150" r="9" fill="#0ea5a4"/><text x="192" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
    <text x="208" y="148" font-weight="700" fill="#1d2438">Monthly Exec review</text>
    <text x="208" y="161" font-size="8.6" fill="#5b6680">goals vs progress</text>
    <circle cx="192" cy="188" r="9" fill="#0ea5a4"/><text x="192" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">5</text>
    <text x="208" y="186" font-weight="700" fill="#1d2438">Biweekly Growth mtg</text>
    <text x="208" y="199" font-size="8.6" fill="#5b6680">metrics deep-dive</text>
    <circle cx="192" cy="226" r="9" fill="#0ea5a4"/><text x="192" y="230" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">6</text>
    <text x="208" y="224" font-weight="700" fill="#1d2438">Monthly career chat</text>
    <text x="208" y="237" font-size="8.6" fill="#5b6680">no projects, careers</text>

    <!-- As-needed -->
    <rect x="328" y="94" width="146" height="132" rx="7" fill="#fffdf7" stroke="#f59e0b" stroke-width="1"/>
    <circle cx="346" cy="112" r="9" fill="#f59e0b"/><text x="346" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">7</text>
    <text x="362" y="110" font-weight="700" fill="#1d2438">Product deep-dives</text>
    <text x="362" y="123" font-size="8.6" fill="#5b6680">proposals, mocks</text>
    <circle cx="346" cy="150" r="9" fill="#f59e0b"/><text x="346" y="154" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">8</text>
    <text x="362" y="148" font-weight="700" fill="#1d2438">Pre-mortems</text>
    <text x="362" y="161" font-size="8.6" fill="#5b6680">de-risk big launches</text>

    <!-- People/Culture -->
    <rect x="482" y="94" width="138" height="132" rx="7" fill="#f8faff" stroke="#5b6680" stroke-width="1"/>
    <circle cx="500" cy="112" r="9" fill="#5b6680"/><text x="500" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">9</text>
    <text x="516" y="110" font-weight="700" fill="#1d2438">New-member intro</text>
    <text x="516" y="123" font-size="8.6" fill="#5b6680">+ favorite dessert</text>
    <circle cx="500" cy="150" r="9" fill="#5b6680"/><text x="500" y="154" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">10</text>
    <text x="516" y="148" font-weight="700" fill="#1d2438">Birthday celebration</text>
    <text x="516" y="161" font-size="8.6" fill="#5b6680">favorite dessert</text>
  </g>

  <!-- footnote -->
  <text x="320" y="290" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Leverage spans execution, business, and people — culture rituals are deliberate, not afterthoughts.</text>
  <line x1="80" y1="305" x2="560" y2="305" stroke="#e2e8f5" stroke-width="1"/>
  <g font-family="sans-serif" font-size="9.5" fill="#1d2438" text-anchor="middle">
    <text x="160" y="330" font-weight="700" fill="#2563eb">Stay informed</text>
    <text x="160" y="344" fill="#5b6680">syncs 1–2</text>
    <text x="320" y="330" font-weight="700" fill="#0ea5a4">Steer &amp; unblock</text>
    <text x="320" y="344" fill="#5b6680">reviews 3–6</text>
    <text x="480" y="330" font-weight="700" fill="#f59e0b">Shape &amp; connect</text>
    <text x="480" y="344" fill="#5b6680">7–10</text>
  </g>
</svg>
