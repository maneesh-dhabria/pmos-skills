<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="7 Biases of Product Teams diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">7 Biases of Product Teams</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Cognitive traps that lead smart teams to build low-impact products</text>

  <!-- rows -->
  <g font-family="sans-serif">
    <!-- row template: number chip + name + one-liner -->
    <g>
      <rect x="24" y="68" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="85" r="11" fill="#2563eb"/><text x="44" y="89" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
      <text x="64" y="83" font-size="13" font-weight="700" fill="#1d2438">Execution Orientation</text>
      <text x="64" y="97" font-size="10.5" fill="#5b6680">Decide only by what is easy to execute right now</text>
    </g>
    <g>
      <rect x="24" y="106" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="123" r="11" fill="#2563eb"/><text x="44" y="127" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
      <text x="64" y="121" font-size="13" font-weight="700" fill="#1d2438">Bias for Building</text>
      <text x="64" y="135" font-size="10.5" fill="#5b6680">Start shipping before understanding problem &amp; domain</text>
    </g>
    <g>
      <rect x="24" y="144" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="161" r="11" fill="#2563eb"/><text x="44" y="165" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
      <text x="64" y="159" font-size="13" font-weight="700" fill="#1d2438">IKEA Effect</text>
      <text x="64" y="173" font-size="10.5" fill="#5b6680">Over-attached to work already invested; fear wasting it</text>
    </g>
    <g>
      <rect x="24" y="182" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="199" r="11" fill="#2563eb"/><text x="44" y="203" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
      <text x="64" y="197" font-size="13" font-weight="700" fill="#1d2438">Focusing Illusion</text>
      <text x="64" y="211" font-size="10.5" fill="#5b6680">Over-estimate problem severity while discussing it</text>
    </g>
    <g>
      <rect x="24" y="220" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="237" r="11" fill="#2563eb"/><text x="44" y="241" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
      <text x="64" y="235" font-size="13" font-weight="700" fill="#1d2438">Maslow's Hammer</text>
      <text x="64" y="249" font-size="10.5" fill="#5b6680">Lean on a familiar tool even when it doesn't fit</text>
    </g>
    <g>
      <rect x="24" y="258" width="588" height="34" rx="6" fill="#f4f7ff"/>
      <circle cx="44" cy="275" r="11" fill="#2563eb"/><text x="44" y="279" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
      <text x="64" y="273" font-size="13" font-weight="700" fill="#1d2438">Authority Approval</text>
      <text x="64" y="287" font-size="10.5" fill="#5b6680">Build to match leaders' beliefs / ease approval</text>
    </g>
    <g>
      <rect x="24" y="296" width="588" height="34" rx="6" fill="#fef2f2"/>
      <circle cx="44" cy="313" r="11" fill="#ef4444"/><text x="44" y="317" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">7</text>
      <text x="64" y="311" font-size="13" font-weight="700" fill="#1d2438">Russian Roulette</text>
      <text x="64" y="325" font-size="10.5" fill="#5b6680">Ignore catastrophic / PR-nightmare scenarios</text>
    </g>
  </g>

  <!-- combat strip -->
  <rect x="24" y="342" width="588" height="42" rx="6" fill="#0ea5a4"/>
  <text x="38" y="360" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">COMBAT:</text>
  <text x="38" y="376" font-family="sans-serif" font-size="10.5" fill="#ffffff">1. Recognize susceptibility   2. Name biases in the team   3. Drive culture change from leadership</text>
</svg>
