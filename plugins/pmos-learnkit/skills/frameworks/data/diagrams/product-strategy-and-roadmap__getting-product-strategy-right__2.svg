<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Cost-benefit curve diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Cost–Benefit Curve</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Does the benefit outweigh the cost &amp; effort of adopting the solution?</text>

  <!-- axes -->
  <line x1="90" y1="330" x2="600" y2="330" stroke="#1d2438" stroke-width="2"/>
  <line x1="90" y1="330" x2="90" y2="90" stroke="#1d2438" stroke-width="2"/>
  <text x="345" y="368" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Cost / effort to adopt &#8594;</text>
  <text x="62" y="210" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680" transform="rotate(-90 62 210)">Benefit delivered &#8594;</text>

  <!-- break-even diagonal -->
  <line x1="90" y1="330" x2="585" y2="100" stroke="#5b6680" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="500" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">break-even</text>

  <!-- benefit curve (diminishing returns) -->
  <path d="M90 330 C 200 150, 330 110, 600 100" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text x="430" y="138" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#2563eb" font-weight="600">benefit of solution</text>

  <!-- WIN zone marker (above break-even) -->
  <circle cx="210" cy="180" r="7" fill="#0ea5a4"/>
  <text x="224" y="178" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#0ea5a4">Worth building</text>
  <text x="224" y="194" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#5b6680">benefit &gt; cost: low hassle, high payoff</text>

  <!-- LOSE zone marker (below break-even) -->
  <circle cx="470" cy="280" r="7" fill="#ef4444"/>
  <text x="484" y="278" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#ef4444">A bigger hassle</text>
  <text x="484" y="294" font-family="Segoe UI, Arial, sans-serif" font-size="11.5" fill="#5b6680">cost &gt; benefit: drop it</text>
</svg>
