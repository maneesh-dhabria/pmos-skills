<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Operating Income diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Operating Income</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">Profit from core operations &#8212; revenue minus operating costs, before interest &amp; tax.</text>

  <!-- waterfall baseline -->
  <line x1="40" y1="320" x2="600" y2="320" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Revenue full bar -->
  <rect x="60" y="120" width="120" height="200" fill="#2563eb"/>
  <text x="120" y="110" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438" text-anchor="middle">Revenue</text>
  <text x="120" y="225" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">$1,000k</text>

  <!-- minus operating expenses (floating block down) -->
  <rect x="240" y="120" width="120" height="100" fill="#ef4444"/>
  <text x="300" y="110" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438" text-anchor="middle">&#8722; Operating exp.</text>
  <text x="300" y="166" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$500k</text>
  <text x="300" y="186" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">COGS, wages,</text>
  <text x="300" y="200" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">depreciation</text>

  <!-- connectors -->
  <line x1="180" y1="120" x2="240" y2="120" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="360" y1="220" x2="420" y2="220" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Operating income result -->
  <rect x="420" y="220" width="120" height="100" fill="#0ea5a4"/>
  <text x="480" y="210" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438" text-anchor="middle">Operating income</text>
  <text x="480" y="276" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">$500k</text>

  <!-- after note -->
  <rect x="60" y="346" width="520" height="40" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
  <text x="76" y="364" font-family="sans-serif" font-size="11.5" fill="#1d2438" font-weight="700">Still ahead (not yet deducted):</text>
  <text x="76" y="380" font-family="sans-serif" font-size="11.5" fill="#5b6680">interest &amp; taxes &#8594; subtract these from operating income to reach <tspan font-weight="700" fill="#1d2438">net income</tspan>.</text>
</svg>
