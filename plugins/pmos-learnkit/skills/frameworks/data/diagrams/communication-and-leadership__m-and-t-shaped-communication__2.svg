<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="M-Shaped communication zig-zag diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">M-Shaped Communication</text>
  <text x="320" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b6680">The common (poor) mode — zig-zag between detail and high level</text>

  <!-- vertical axis: abstraction level -->
  <line x1="90" y1="90" x2="90" y2="320" stroke="#1d2438" stroke-width="1.5"/>
  <text x="78" y="105" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5b6680">High</text>
  <text x="78" y="315" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#5b6680">Detail</text>
  <text x="40" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 40 210)">Level of abstraction</text>

  <!-- horizontal axis: time / flow -->
  <line x1="90" y1="320" x2="600" y2="320" stroke="#1d2438" stroke-width="1.5"/>
  <text x="345" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b6680">Time / order of speaking →</text>

  <!-- zig-zag M path: detail -> high -> detail -> high -> detail -->
  <polyline points="120,300 220,110 320,300 420,110 520,300"
            fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- nodes -->
  <circle cx="120" cy="300" r="7" fill="#ef4444"/>
  <circle cx="220" cy="110" r="7" fill="#ef4444"/>
  <circle cx="320" cy="300" r="7" fill="#ef4444"/>
  <circle cx="420" cy="110" r="7" fill="#ef4444"/>
  <circle cx="520" cy="300" r="7" fill="#ef4444"/>

  <!-- node labels -->
  <text x="120" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">Detail of</text>
  <text x="120" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">point A</text>

  <text x="220" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">Zoom out:</text>
  <text x="220" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">high-level</text>

  <text x="320" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">Detail of</text>
  <text x="320" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">point B</text>

  <text x="420" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">Zoom out</text>
  <text x="420" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">again</text>

  <text x="520" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">Detail of</text>
  <text x="520" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d2438">point C</text>

  <text x="320" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">Listener is whipsawed — never sure what matters most.</text>
</svg>
