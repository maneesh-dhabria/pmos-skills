<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Trust Equation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Trust Equation</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Trust = (Credibility + Reliability + Intimacy) ÷ Self-Orientation</text>

  <!-- Equation layout -->
  <text x="60" y="210" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Trust</text>
  <text x="118" y="210" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#5b6680">=</text>

  <!-- Numerator group -->
  <rect x="150" y="92" width="340" height="118" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#2563eb" font-weight="700">NUMERATOR — builds trust</text>

  <rect x="166" y="108" width="100" height="86" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="216" y="138" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Credibility</text>
  <text x="216" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">words —</text>
  <text x="216" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">"believe me?"</text>

  <text x="276" y="156" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#5b6680">+</text>

  <rect x="288" y="108" width="100" height="86" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="338" y="138" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Reliability</text>
  <text x="338" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">actions —</text>
  <text x="338" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">"deliver?"</text>

  <text x="398" y="156" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#5b6680">+</text>

  <rect x="410" y="108" width="64" height="86" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="442" y="138" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Intimacy</text>
  <text x="442" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">safety —</text>
  <text x="442" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">"safe?"</text>

  <!-- Division bar -->
  <line x1="150" y1="228" x2="490" y2="228" stroke="#1d2438" stroke-width="2.5"/>

  <!-- Denominator -->
  <rect x="240" y="244" width="160" height="76" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="320" y="276" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Self-Orientation</text>
  <text x="320" y="296" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">focus on me —</text>
  <text x="320" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">"in it for whom?"</text>

  <text x="320" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#ef4444" font-weight="700">DENOMINATOR — destroys trust</text>

  <text x="320" y="362" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Self-orientation is the lever: as it &#8594; 0, trust soars; as it grows, trust collapses.</text>
</svg>
