<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Prospect Theory diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Prospect Theory</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">The value function: kinked at the reference point, steeper for losses</text>

  <!-- axes -->
  <line x1="320" y1="90" x2="320" y2="370" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="90" y1="230" x2="600" y2="230" stroke="#5b6680" stroke-width="1.5"/>

  <!-- axis labels -->
  <text x="475" y="222" font-family="sans-serif" font-size="12" fill="#5b6680">Gains →</text>
  <text x="110" y="222" font-family="sans-serif" font-size="12" fill="#5b6680">← Losses</text>
  <text x="330" y="104" font-family="sans-serif" font-size="12" fill="#5b6680">Psychological value (+)</text>
  <text x="330" y="362" font-family="sans-serif" font-size="12" fill="#5b6680">Psychological value (−)</text>

  <!-- reference point -->
  <circle cx="320" cy="230" r="5" fill="#1d2438"/>
  <text x="328" y="250" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Reference point</text>

  <!-- gain curve: concave, shallow -->
  <path d="M320,230 C400,180 500,165 595,160" fill="none" stroke="#0ea5a4" stroke-width="3"/>
  <!-- loss curve: convex, steep -->
  <path d="M320,230 C260,300 180,335 100,348" fill="none" stroke="#ef4444" stroke-width="3"/>

  <!-- annotations -->
  <text x="430" y="150" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Gains: concave</text>
  <text x="430" y="166" font-family="sans-serif" font-size="11" fill="#5b6680">diminishing sensitivity</text>

  <text x="110" y="372" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">Losses: steeper (~2×)</text>

  <!-- symmetric reference markers showing asymmetry -->
  <line x1="430" y1="230" x2="430" y2="184" stroke="#0ea5a4" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="210" y1="230" x2="210" y2="320" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="195" y="338" font-family="sans-serif" font-size="10" fill="#5b6680">−$100 hurts</text>
  <text x="406" y="178" font-family="sans-serif" font-size="10" fill="#5b6680">+$100 pleases less</text>

  <!-- probability weighting note -->
  <rect x="32" y="86" width="170" height="58" rx="6" fill="#f4f7ff"/>
  <text x="42" y="106" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">Probability weighting</text>
  <text x="42" y="122" font-family="sans-serif" font-size="10" fill="#5b6680">Small probabilities are</text>
  <text x="42" y="135" font-family="sans-serif" font-size="10" fill="#5b6680">overweighted (lotteries, fear).</text>
</svg>
