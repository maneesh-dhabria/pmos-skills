<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Journey phases vary by scenario type diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Phases Vary by Scenario</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11.5" fill="#5b6680">There is no universal phase set — name the stages that fit the journey you're mapping</text>

  <g font-family="sans-serif" font-size="9.5" font-weight="700" text-anchor="middle">
    <!-- Row 1: E-commerce -->
    <rect x="24" y="68" width="150" height="56" rx="6" fill="#1d2438"/>
    <text x="99" y="92" font-size="11" fill="#ffffff">E-commerce</text>
    <text x="99" y="108" font-size="8.5" font-weight="400" fill="#dbeafe">buying Bluetooth speakers</text>

    <!-- Row 2: Luxury -->
    <rect x="24" y="172" width="150" height="56" rx="6" fill="#1d2438"/>
    <text x="99" y="196" font-size="11" fill="#ffffff">Luxury purchase</text>
    <text x="99" y="212" font-size="8.5" font-weight="400" fill="#dbeafe">buying a car</text>

    <!-- Row 3: B2B -->
    <rect x="24" y="276" width="150" height="56" rx="6" fill="#1d2438"/>
    <text x="99" y="300" font-size="11" fill="#ffffff">B2B rollout</text>
    <text x="99" y="316" font-size="8.5" font-weight="400" fill="#dbeafe">internal tool adoption</text>
  </g>

  <!-- E-commerce stages (5) -->
  <g font-family="sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="190" y="74" width="80" height="44" rx="5" fill="#2563eb"/><text x="230" y="100">discover</text>
    <rect x="278" y="74" width="80" height="44" rx="5" fill="#2563eb"/><text x="318" y="100">try</text>
    <rect x="366" y="74" width="80" height="44" rx="5" fill="#2563eb"/><text x="406" y="100">buy</text>
    <rect x="454" y="74" width="80" height="44" rx="5" fill="#2563eb"/><text x="494" y="100">use</text>
    <rect x="542" y="74" width="80" height="44" rx="5" fill="#2563eb"/><text x="582" y="96">seek</text><text x="582" y="108">support</text>
  </g>

  <!-- Luxury stages (5) -->
  <g font-family="sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="190" y="178" width="80" height="44" rx="5" fill="#0ea5a4"/><text x="230" y="204">engage</text>
    <rect x="278" y="178" width="80" height="44" rx="5" fill="#0ea5a4"/><text x="318" y="204">educate</text>
    <rect x="366" y="178" width="80" height="44" rx="5" fill="#0ea5a4"/><text x="406" y="204">research</text>
    <rect x="454" y="178" width="80" height="44" rx="5" fill="#0ea5a4"/><text x="494" y="204">evaluate</text>
    <rect x="542" y="178" width="80" height="44" rx="5" fill="#0ea5a4"/><text x="582" y="204">justify</text>
  </g>

  <!-- B2B stages (5) -->
  <g font-family="sans-serif" font-size="9.5" font-weight="700" fill="#ffffff" text-anchor="middle">
    <rect x="190" y="282" width="80" height="44" rx="5" fill="#f59e0b"/><text x="230" y="308">purchase</text>
    <rect x="278" y="282" width="80" height="44" rx="5" fill="#f59e0b"/><text x="318" y="308">adoption</text>
    <rect x="366" y="282" width="80" height="44" rx="5" fill="#f59e0b"/><text x="406" y="308">retention</text>
    <rect x="454" y="282" width="80" height="44" rx="5" fill="#f59e0b"/><text x="494" y="304">expan-</text><text x="494" y="316">sion</text>
    <rect x="542" y="282" width="80" height="44" rx="5" fill="#f59e0b"/><text x="582" y="304">advo-</text><text x="582" y="316">cacy</text>
  </g>

  <!-- direction arrows -->
  <g stroke="#cbd5e1" stroke-width="1.5" fill="none">
    <path d="M624 96 l6 0" marker-end="url(#a)"/>
  </g>
  <text x="24" y="362" font-family="sans-serif" font-size="9" fill="#5b6680">Same map structure, different stage names — phases organize the actions, mindsets, and emotions beneath them.</text>
</svg>
