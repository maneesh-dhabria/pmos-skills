<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Pretotyping diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Pretotyping</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Are you building the Right It? Fake the experience, measure real demand.</text>

  <!-- three-stage ladder -->
  <!-- stage 1 -->
  <rect x="40" y="84" width="560" height="74" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="74" cy="121" r="16" fill="#2563eb"/>
  <text x="74" y="126" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">1</text>
  <text x="104" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">The Right It vs. building It right</text>
  <text x="104" y="132" font-family="sans-serif" font-size="12" fill="#5b6680">Most ideas fail because nobody wants them — not because they're built badly.</text>
  <text x="104" y="149" font-family="sans-serif" font-size="12" fill="#5b6680">Test demand before you write a line of code.</text>

  <!-- stage 2 -->
  <rect x="40" y="170" width="560" height="92" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <circle cx="74" cy="216" r="16" fill="#0ea5a4"/>
  <text x="74" y="221" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">2</text>
  <text x="104" y="195" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Fake the core experience — pick a technique</text>
  <text x="104" y="216" font-family="sans-serif" font-size="12" fill="#5b6680">Mechanical Turk · Fake Door · Pinocchio · Façade · YouTube · One-Night Stand</text>
  <text x="104" y="234" font-family="sans-serif" font-size="12" fill="#5b6680">Human stands in for the machine · clickable door to nothing · non-functional mock-up.</text>
  <text x="104" y="252" font-family="sans-serif" font-size="12" fill="#5b6680">Orders of magnitude cheaper and faster than a prototype.</text>

  <!-- stage 3 -->
  <rect x="40" y="274" width="560" height="92" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="74" cy="320" r="16" fill="#f59e0b"/>
  <text x="74" y="325" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff">3</text>
  <text x="104" y="299" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Collect Your Own Data (YODA)</text>
  <text x="104" y="320" font-family="sans-serif" font-size="12" fill="#5b6680">Measure real behaviour with skin in the game — clicks, sign-ups, pre-orders.</text>
  <text x="104" y="338" font-family="sans-serif" font-size="12" fill="#5b6680">Quantify with a market-engagement hypothesis (XYZ): "≥ X% of Y will Z."</text>
  <text x="104" y="356" font-family="sans-serif" font-size="12" fill="#5b6680">Numerical proof beats opinions — then decide build / pivot / kill.</text>
</svg>
