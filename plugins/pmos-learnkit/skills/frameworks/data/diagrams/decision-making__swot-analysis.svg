<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="SWOT Analysis diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">SWOT Analysis</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Internal vs. external, helpful vs. harmful</text>

  <!-- axis labels -->
  <text x="200" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">HELPFUL</text>
  <text x="455" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">HARMFUL</text>
  <text x="40" y="160" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" transform="rotate(-90 40 160)">INTERNAL</text>
  <text x="40" y="300" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" transform="rotate(-90 40 300)">EXTERNAL</text>

  <!-- Strengths -->
  <rect x="70" y="90" width="255" height="140" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="85" y="118" font-family="sans-serif" font-size="16" font-weight="700" fill="#2563eb">Strengths</text>
  <text x="85" y="142" font-family="sans-serif" font-size="11" fill="#1d2438">Internal advantages over rivals</text>
  <text x="85" y="164" font-family="sans-serif" font-size="11" fill="#5b6680">Unique capabilities</text>
  <text x="85" y="184" font-family="sans-serif" font-size="11" fill="#5b6680">Valuable assets, brand</text>
  <text x="85" y="204" font-family="sans-serif" font-size="11" fill="#5b6680">Skilled workforce</text>

  <!-- Weaknesses -->
  <rect x="335" y="90" width="255" height="140" rx="10" fill="#fff5f5" stroke="#ef4444" stroke-width="2"/>
  <text x="350" y="118" font-family="sans-serif" font-size="16" font-weight="700" fill="#ef4444">Weaknesses</text>
  <text x="350" y="142" font-family="sans-serif" font-size="11" fill="#1d2438">Internal disadvantages</text>
  <text x="350" y="164" font-family="sans-serif" font-size="11" fill="#5b6680">Limited resources</text>
  <text x="350" y="184" font-family="sans-serif" font-size="11" fill="#5b6680">Outdated technology</text>
  <text x="350" y="204" font-family="sans-serif" font-size="11" fill="#5b6680">Poor market presence</text>

  <!-- Opportunities -->
  <rect x="70" y="240" width="255" height="140" rx="10" fill="#f0fbfa" stroke="#0ea5a4" stroke-width="2"/>
  <text x="85" y="268" font-family="sans-serif" font-size="16" font-weight="700" fill="#0ea5a4">Opportunities</text>
  <text x="85" y="292" font-family="sans-serif" font-size="11" fill="#1d2438">External tailwinds to seize</text>
  <text x="85" y="314" font-family="sans-serif" font-size="11" fill="#5b6680">Emerging market trends</text>
  <text x="85" y="334" font-family="sans-serif" font-size="11" fill="#5b6680">New customer segments</text>
  <text x="85" y="354" font-family="sans-serif" font-size="11" fill="#5b6680">Tech / regulatory shifts</text>

  <!-- Threats -->
  <rect x="335" y="240" width="255" height="140" rx="10" fill="#fffaf0" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="268" font-family="sans-serif" font-size="16" font-weight="700" fill="#f59e0b">Threats</text>
  <text x="350" y="292" font-family="sans-serif" font-size="11" fill="#1d2438">External headwinds to mitigate</text>
  <text x="350" y="314" font-family="sans-serif" font-size="11" fill="#5b6680">Intense competition</text>
  <text x="350" y="334" font-family="sans-serif" font-size="11" fill="#5b6680">Economic downturns</text>
  <text x="350" y="354" font-family="sans-serif" font-size="11" fill="#5b6680">Disruptive technologies</text>
</svg>
