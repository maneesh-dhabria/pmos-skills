<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Growing market three-signal test diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Growing-Market Test</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Over the next 5 years, does each answer trend up? Three &#8220;more&#8221; signals.</text>

  <!-- row 1 -->
  <g>
    <rect x="60" y="86" width="520" height="78" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="84" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">1 &#183; Reach</text>
    <text x="84" y="142" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Will MORE people have this problem?</text>
    <text x="520" y="135" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0ea5a4">&#8599;</text>
  </g>

  <!-- row 2 -->
  <g>
    <rect x="60" y="176" width="520" height="78" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="84" y="208" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">2 &#183; Frequency</text>
    <text x="84" y="232" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Will people have this problem MORE often?</text>
    <text x="520" y="225" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0ea5a4">&#8599;</text>
  </g>

  <!-- row 3 -->
  <g>
    <rect x="60" y="266" width="520" height="78" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="84" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#1d2438">3 &#183; Pain</text>
    <text x="84" y="322" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Will this problem HURT more?</text>
    <text x="520" y="315" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#0ea5a4">&#8599;</text>
  </g>

  <text x="320" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12.5" fill="#5b6680">Three &#8220;more / growing&#8221; answers &#8594; a market expanding beneath your product.</text>
</svg>
