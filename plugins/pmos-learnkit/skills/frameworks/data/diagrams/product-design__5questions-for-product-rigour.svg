<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="5 Questions for Product Rigour diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">5 Questions for Product Rigour</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">A checklist that gives product proposals and reviews structure</text>

  <g font-family="sans-serif">
    <!-- Q1 -->
    <rect x="40" y="72" width="560" height="48" rx="8" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="68" cy="96" r="16" fill="#2563eb"/>
    <text x="68" y="101" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="98" y="93" font-size="14" font-weight="700" fill="#1d2438">Who is the customer?</text>
    <text x="98" y="110" font-size="10" fill="#5b6680">Name the specific person you are building for</text>

    <!-- Q2 -->
    <rect x="40" y="128" width="560" height="48" rx="8" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="68" cy="152" r="16" fill="#0ea5a4"/>
    <text x="68" y="157" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="98" y="149" font-size="14" font-weight="700" fill="#1d2438">What is the problem / opportunity?</text>
    <text x="98" y="166" font-size="10" fill="#5b6680">The unmet need or gap worth pursuing</text>

    <!-- Q3 -->
    <rect x="40" y="184" width="560" height="48" rx="8" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="68" cy="208" r="16" fill="#f59e0b"/>
    <text x="68" y="213" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="98" y="205" font-size="14" font-weight="700" fill="#1d2438">What is the main customer benefit?</text>
    <text x="98" y="222" font-size="10" fill="#5b6680">The single clearest value they receive</text>

    <!-- Q4 -->
    <rect x="40" y="240" width="560" height="48" rx="8" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="68" cy="264" r="16" fill="#ef4444"/>
    <text x="68" y="269" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <text x="98" y="261" font-size="14" font-weight="700" fill="#1d2438">How do you know customers want this?</text>
    <text x="98" y="278" font-size="10" fill="#5b6680">The evidence &#8212; signals, research, validation</text>

    <!-- Q5 -->
    <rect x="40" y="296" width="560" height="48" rx="8" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="68" cy="320" r="16" fill="#1d2438"/>
    <text x="68" y="325" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
    <text x="98" y="317" font-size="14" font-weight="700" fill="#1d2438">What is the customer experience?</text>
    <text x="98" y="334" font-size="10" fill="#5b6680">End-to-end of how they encounter the solution</text>
  </g>
</svg>
