<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three grid types diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Three Grid Types</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Column adds rows to become modular; hierarchical sizes blocks by importance</text>

  <!-- ===== Column grid ===== -->
  <text x="120" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb">Column</text>
  <rect x="40" y="92" width="160" height="220" rx="5" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  <g fill="#2563eb" opacity="0.20">
    <rect x="54" y="104" width="28" height="196"/>
    <rect x="90" y="104" width="28" height="196"/>
    <rect x="126" y="104" width="28" height="196"/>
    <rect x="162" y="104" width="24" height="196"/>
  </g>
  <g stroke="#2563eb" stroke-width="1" fill="none">
    <rect x="54" y="104" width="28" height="196"/>
    <rect x="90" y="104" width="28" height="196"/>
    <rect x="126" y="104" width="28" height="196"/>
    <rect x="162" y="104" width="24" height="196"/>
  </g>
  <text x="120" y="332" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Vertical columns only</text>
  <text x="120" y="348" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">align content</text>

  <!-- ===== Modular grid ===== -->
  <text x="320" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Modular</text>
  <rect x="240" y="92" width="160" height="220" rx="5" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  <g fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4" stroke-width="1">
    <rect x="254" y="104" width="40" height="60"/>
    <rect x="300" y="104" width="40" height="60"/>
    <rect x="346" y="104" width="40" height="60"/>
    <rect x="254" y="170" width="40" height="60"/>
    <rect x="300" y="170" width="40" height="60"/>
    <rect x="346" y="170" width="40" height="60"/>
    <rect x="254" y="236" width="40" height="60"/>
    <rect x="300" y="236" width="40" height="60"/>
    <rect x="346" y="236" width="40" height="60"/>
  </g>
  <text x="320" y="332" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Columns + rows = modules</text>
  <text x="320" y="348" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">good for listings</text>

  <!-- ===== Hierarchical grid ===== -->
  <text x="520" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Hierarchical</text>
  <rect x="440" y="92" width="160" height="220" rx="5" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  <g fill="#f59e0b" opacity="0.20" stroke="#f59e0b" stroke-width="1">
    <rect x="454" y="104" width="132" height="80"/>
    <rect x="454" y="190" width="64" height="110"/>
    <rect x="524" y="190" width="62" height="52"/>
    <rect x="524" y="248" width="62" height="52"/>
  </g>
  <text x="520" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438" font-weight="600">most important</text>
  <text x="520" y="332" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Block size scales</text>
  <text x="520" y="348" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">with importance</text>

  <!-- progression arrows -->
  <g stroke="#5b6680" stroke-width="1.4" fill="none">
    <line x1="204" y1="200" x2="234" y2="200" marker-end="url(#ah)"/>
    <line x1="404" y1="200" x2="434" y2="200" marker-end="url(#ah)"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
