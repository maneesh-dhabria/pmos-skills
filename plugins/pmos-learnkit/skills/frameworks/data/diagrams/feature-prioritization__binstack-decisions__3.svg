<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Binstack elimination process decision tree diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Binstack Process</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Walk the ranked attributes top-down; eliminate until one item remains</text>

  <!-- Start -->
  <rect x="220" y="64" width="200" height="34" rx="17" fill="#2563eb"/>
  <text x="320" y="86" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Take next attribute (most important first)</text>

  <!-- Step 1: cross out non-addressers -->
  <rect x="180" y="118" width="280" height="38" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="320" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Cross out remaining items that don't</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">materially address this attribute</text>
  <line x1="320" y1="98" x2="320" y2="118" stroke="#1d2438" stroke-width="1.5"/>
  <polygon points="320,118 315,109 325,109" fill="#1d2438"/>

  <!-- Decision diamond: how many remain? -->
  <polygon points="320,176 430,222 320,268 210,222" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="218" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">How many items still</text>
  <text x="320" y="233" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">address it?</text>
  <line x1="320" y1="156" x2="320" y2="176" stroke="#1d2438" stroke-width="1.5"/>
  <polygon points="320,176 315,167 325,167" fill="#1d2438"/>

  <!-- Branch: zero -->
  <line x1="210" y1="222" x2="120" y2="222" stroke="#5b6680" stroke-width="1.5"/>
  <text x="165" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#5b6680">none</text>
  <rect x="40" y="200" width="80" height="44" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="80" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">skip to next</text>
  <text x="80" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">attribute</text>

  <!-- Branch: exactly one -->
  <line x1="320" y1="268" x2="320" y2="300" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="288" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#0ea5a4">exactly one</text>
  <rect x="240" y="300" width="160" height="40" rx="6" fill="#f0fbfa" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="318" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">That item wins</text>
  <text x="320" y="333" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#0ea5a4">&#8212; stop &#8212;</text>

  <!-- Branch: multiple -->
  <line x1="430" y1="222" x2="520" y2="222" stroke="#ef4444" stroke-width="1.5"/>
  <text x="475" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ef4444">multiple</text>
  <rect x="520" y="196" width="100" height="52" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="570" y="216" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">cross out the</text>
  <text x="570" y="230" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">others, then</text>
  <text x="570" y="244" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ef4444">loop &#8635;</text>

  <!-- loop back arrow from multiple to top -->
  <path d="M570 196 C570 110 540 81 420 81" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="420,81 429,76 429,86" fill="#ef4444"/>

  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">No weighted averages &#8212; a single ranked order plus material yes/no resolves every tie.</text>
</svg>
