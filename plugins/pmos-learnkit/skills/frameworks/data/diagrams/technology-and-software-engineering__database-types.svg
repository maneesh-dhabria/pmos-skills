<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Database Types diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Database Types</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">Pick by structure &amp; workload — then weigh the selection factors</text>

  <!-- 8 type cards, 2 cols x 4 rows -->
  <!-- col 1 -->
  <g font-family="sans-serif">
    <rect x="24" y="64" width="290" height="42" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="34" y="82" font-size="12" font-weight="700" fill="#2563eb">Relational (RDBMS)</text>
    <text x="34" y="98" font-size="9.5" fill="#5b6680">Tables + schema · ACID · complex txns — MySQL, Postgres</text>

    <rect x="24" y="110" width="290" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="34" y="128" font-size="12" font-weight="700" fill="#1d2438">NoSQL</text>
    <text x="34" y="144" font-size="9.5" fill="#5b6680">Flexible schema · scale · unstructured — Mongo, Cassandra</text>

    <rect x="24" y="156" width="290" height="42" rx="6" fill="#eff6ff" stroke="#0ea5a4" stroke-width="1"/>
    <text x="34" y="174" font-size="12" font-weight="700" fill="#0ea5a4">Columnar</text>
    <text x="34" y="190" font-size="9.5" fill="#5b6680">Stored by column · analytics &amp; BI — Redshift, BigQuery</text>

    <rect x="24" y="202" width="290" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="34" y="220" font-size="12" font-weight="700" fill="#1d2438">Graph</text>
    <text x="34" y="236" font-size="9.5" fill="#5b6680">Nodes + edges · relationships — Neo4j, Neptune</text>
  </g>
  <!-- col 2 -->
  <g font-family="sans-serif">
    <rect x="326" y="64" width="290" height="42" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1"/>
    <text x="336" y="82" font-size="12" font-weight="700" fill="#f59e0b">In-Memory</text>
    <text x="336" y="98" font-size="9.5" fill="#5b6680">RAM-resident · cache &amp; low latency — Redis, Memcached</text>

    <rect x="326" y="110" width="290" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="336" y="128" font-size="12" font-weight="700" fill="#1d2438">Time-Series</text>
    <text x="336" y="144" font-size="9.5" fill="#5b6680">Time-ordered writes · IoT &amp; monitoring — InfluxDB, Prometheus</text>

    <rect x="326" y="156" width="290" height="42" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="336" y="174" font-size="12" font-weight="700" fill="#2563eb">Document</text>
    <text x="336" y="190" font-size="9.5" fill="#5b6680">Semi-structured JSON · CMS &amp; catalogs — Mongo, CouchDB</text>

    <rect x="326" y="202" width="290" height="42" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <text x="336" y="220" font-size="12" font-weight="700" fill="#1d2438">Object</text>
    <text x="336" y="236" font-size="9.5" fill="#5b6680">Stores objects directly · OO apps, CAD — db4o, ObjectDB</text>
  </g>

  <!-- Selection factors band -->
  <rect x="24" y="256" width="592" height="128" rx="8" fill="#f4f7ff" stroke="#1d2438" stroke-width="1"/>
  <text x="40" y="278" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Selection factors</text>

  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <text x="40" y="302" font-weight="700">Scalability</text>
    <text x="40" y="316" font-size="9" fill="#5b6680">vertical vs horizontal</text>
    <text x="40" y="346" font-weight="700">Performance</text>
    <text x="40" y="360" font-size="9" fill="#5b6680">read vs write balance</text>

    <text x="214" y="302" font-weight="700">Consistency</text>
    <text x="214" y="316" font-size="9" fill="#5b6680">strong vs eventual</text>
    <text x="214" y="346" font-weight="700">Data model</text>
    <text x="214" y="360" font-size="9" fill="#5b6680">fixed vs flexible schema</text>

    <text x="400" y="302" font-weight="700">Security</text>
    <text x="400" y="316" font-size="9" fill="#5b6680">authn · authz · encryption</text>
    <text x="400" y="346" font-weight="700">Cost</text>
    <text x="400" y="360" font-size="9" fill="#5b6680">license · hosting · ops</text>

    <text x="520" y="302" font-weight="700">Ecosystem</text>
    <text x="520" y="316" font-size="9" fill="#5b6680">community · tools</text>
  </g>
</svg>
