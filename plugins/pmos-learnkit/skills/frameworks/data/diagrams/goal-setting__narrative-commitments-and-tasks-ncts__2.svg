<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Two types of NCT commitments diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="38" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Two Types of Commitments</text>
  <text x="320" y="62" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">3–5 objectively-measurable goals that prove progress on the narrative</text>

  <!-- Left card: Qualitative metrics -->
  <rect x="44" y="92" width="262" height="246" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="80" cy="128" r="16" fill="#2563eb"/>
  <text x="80" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">1</text>
  <text x="106" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1d2438">Qualitative</text>
  <text x="106" y="145" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1d2438">Metrics</text>
  <text x="64" y="182" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">A moved number that shows</text>
  <text x="64" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">the outcome improved.</text>
  <rect x="64" y="222" width="222" height="92" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="78" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1d2438">Example</text>
  <text x="78" y="272" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">“Increase onboarding</text>
  <text x="78" y="292" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">completion rate by 10%”</text>

  <!-- Right card: Deliverables -->
  <rect x="334" y="92" width="262" height="246" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <circle cx="370" cy="128" r="16" fill="#0ea5a4"/>
  <text x="370" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">2</text>
  <text x="396" y="125" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#1d2438">Deliverables</text>
  <text x="354" y="182" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">A shipped thing, due by a</text>
  <text x="354" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">committed date.</text>
  <rect x="354" y="222" width="222" height="92" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="368" y="248" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1d2438">Example</text>
  <text x="368" y="272" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">“Launch new onboarding</text>
  <text x="368" y="292" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">flow by September 2019”</text>

  <text x="320" y="372" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">The best teams leverage both types together.</text>
</svg>
