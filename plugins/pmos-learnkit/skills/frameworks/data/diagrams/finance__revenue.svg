<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Revenue diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Revenue</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">The top line &#8212; total income from business activity, before any costs are subtracted.</text>

  <!-- Formula -->
  <rect x="64" y="80" width="220" height="64" rx="10" fill="#2563eb"/>
  <text x="174" y="106" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Revenue =</text>
  <text x="174" y="128" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Avg. price &#215; units sold</text>

  <!-- Recognition methods -->
  <rect x="320" y="80" width="256" height="64" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
  <text x="332" y="100" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0ea5a4">When is a sale counted?</text>
  <text x="332" y="118" font-family="sans-serif" font-size="11" fill="#1d2438"><tspan font-weight="700">Accrual:</tspan> when delivered (incl. credit)</text>
  <text x="332" y="134" font-family="sans-serif" font-size="11" fill="#1d2438"><tspan font-weight="700">Cash:</tspan> only when payment is received</text>

  <!-- ledger stack: revenue at top, costs subtract down to net income -->
  <text x="320" y="186" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Where it sits on the income statement</text>

  <rect x="150" y="200" width="340" height="40" fill="#2563eb"/>
  <text x="166" y="225" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Revenue (top line)</text>
  <text x="474" y="225" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="end">$1,000k</text>

  <line x1="320" y1="240" x2="320" y2="260" stroke="#5b6680" stroke-width="1.5"/>
  <text x="334" y="256" font-family="sans-serif" font-size="11" fill="#ef4444">&#8722; costs &amp; expenses</text>

  <rect x="195" y="260" width="250" height="34" fill="#ef4444" opacity="0.9"/>
  <text x="211" y="282" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Costs subtracted</text>

  <line x1="320" y1="294" x2="320" y2="314" stroke="#5b6680" stroke-width="1.5"/>

  <rect x="225" y="314" width="190" height="40" fill="#0ea5a4"/>
  <text x="241" y="339" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">Net income</text>
  <text x="399" y="339" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="end">bottom line</text>

  <text x="320" y="382" font-family="sans-serif" font-size="11.5" fill="#5b6680" text-anchor="middle">Revenue is the starting point everything else is measured against.</text>
</svg>
