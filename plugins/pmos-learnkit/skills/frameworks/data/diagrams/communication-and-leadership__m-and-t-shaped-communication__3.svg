<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="T-Shaped communication overview-then-depth diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">T-Shaped Communication</text>
  <text x="320" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5b6680">Broad overview first, then prioritized depth on what matters</text>

  <!-- horizontal bar of the T: the overview across all points -->
  <rect x="80" y="92" width="480" height="58" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#1d2438">1 · Overview of all relevant main points</text>
  <text x="320" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b6680">Point A&#160;&#160;·&#160;&#160;Point B&#160;&#160;·&#160;&#160;Point C&#160;&#160;·&#160;&#160;Point D</text>

  <!-- markers across the bar -->
  <circle cx="160" cy="150" r="4" fill="#5b6680"/>
  <circle cx="270" cy="150" r="4" fill="#5b6680"/>
  <circle cx="320" cy="150" r="6" fill="#2563eb"/>
  <circle cx="430" cy="150" r="4" fill="#5b6680"/>
  <circle cx="500" cy="150" r="4" fill="#5b6680"/>

  <!-- the stem of the T: deep dive on the prioritized issue -->
  <line x1="320" y1="150" x2="320" y2="200" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="338" y="183" font-family="Arial, sans-serif" font-size="11" fill="#0ea5a4">Pick the one that needs most communication</text>

  <!-- stem boxes: progressive depth -->
  <rect x="225" y="202" width="190" height="44" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">2 · Depth on key issue</text>
  <text x="320" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6680">why it matters most</text>

  <line x1="320" y1="246" x2="320" y2="262" stroke="#0ea5a4" stroke-width="2"/>

  <rect x="245" y="264" width="150" height="44" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">3 · Background</text>
  <text x="320" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5b6680">context &amp; detail</text>

  <!-- depth axis hint -->
  <text x="455" y="258" font-family="Arial, sans-serif" font-size="11" fill="#5b6680" transform="rotate(90 455 258)">increasing depth ↓</text>

  <text x="320" y="382" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-style="italic" fill="#5b6680">Listener sees the whole map, then goes deep only where it counts.</text>
</svg>
