<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three ways to scale price diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="42" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Scale: Three Ways to Scale Price</text>
  <text x="32" y="66" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">How does our price scale as value grows for the customer?</text>

  <!-- ascending value/price arrow -->
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <line x1="60" y1="350" x2="60" y2="110" stroke="#5b6680" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="44" y="230" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 44 230)">value &amp; price increase &#8594;</text>

  <!-- Tier 1: Features -->
  <rect x="92" y="290" width="510" height="64" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="112" y="318" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#2563eb">1 &#183; Features</text>
  <text x="112" y="340" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">Pay more to unlock more features &#8212; tiered/good-better-best.</text>

  <!-- Tier 2: Usage -->
  <rect x="92" y="206" width="510" height="64" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="112" y="234" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#0ea5a4">2 &#183; Usage</text>
  <text x="112" y="256" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">The more you use, the more you pay &#8212; per user, per API request.</text>

  <!-- Tier 3: Outcome -->
  <rect x="92" y="122" width="510" height="64" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="112" y="150" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#f59e0b">3 &#183; Outcome</text>
  <text x="112" y="172" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">The more value you get, the more you pay &#8212; per lead, per ticket sale.</text>
</svg>
