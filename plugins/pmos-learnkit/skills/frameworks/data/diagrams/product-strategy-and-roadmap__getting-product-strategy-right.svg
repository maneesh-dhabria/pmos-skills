<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Getting Product Strategy Right diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Getting Product Strategy Right</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Work inside-out: survive hype cycles by answering two questions</text>

  <!-- concentric circles, work from inside to outside -->
  <g>
    <circle cx="250" cy="232" r="148" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="250" cy="232" r="108" fill="#eef4ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="250" cy="232" r="66" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  </g>

  <g font-family="sans-serif" text-anchor="middle">
    <!-- core -->
    <text x="250" y="222" font-size="12" font-weight="700" fill="#2563eb">Significant</text>
    <text x="250" y="238" font-size="12" font-weight="700" fill="#2563eb">Problem</text>
    <text x="250" y="254" font-size="9" fill="#5b6680">viable·feasible·desirable</text>

    <!-- ring 2 -->
    <text x="250" y="148" font-size="12" font-weight="700" fill="#0ea5a4">Growing Market</text>
    <text x="250" y="324" font-size="9" fill="#0ea5a4">more people · more often · hurts more</text>

    <!-- ring 3 -->
    <text x="250" y="108" font-size="12" font-weight="700" fill="#f59e0b">Extendable Brand</text>
    <text x="250" y="364" font-size="12" font-weight="700" fill="#f59e0b">Lasting Moats</text>
  </g>

  <!-- inside-out arrow -->
  <g font-family="sans-serif">
    <line x1="250" y1="232" x2="250" y2="100" stroke="#1d2438" stroke-width="0" />
    <path d="M 318 232 L 416 232" fill="none" stroke="#1d2438" stroke-width="1.5"/>
    <polygon points="424,232 414,227 414,237" fill="#1d2438"/>
    <text x="370" y="224" text-anchor="middle" font-size="9" fill="#5b6680">inside → out</text>
  </g>

  <!-- two questions panel -->
  <g font-family="sans-serif">
    <rect x="440" y="92" width="180" height="120" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="530" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">Question 1</text>
    <text x="455" y="134" font-size="10.5" fill="#1d2438">Are we tackling a</text>
    <text x="455" y="150" font-size="10.5" font-weight="700" fill="#1d2438">significant problem,</text>
    <text x="455" y="166" font-size="10.5" fill="#1d2438">for a</text>
    <text x="455" y="182" font-size="10.5" font-weight="700" fill="#0ea5a4">growing market?</text>

    <rect x="440" y="224" width="180" height="120" rx="8" fill="#fff7ec" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="530" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b">Question 2</text>
    <text x="455" y="266" font-size="10.5" fill="#1d2438">Can we attach it to an</text>
    <text x="455" y="282" font-size="10.5" font-weight="700" fill="#f59e0b">extendable brand</text>
    <text x="455" y="298" font-size="10.5" fill="#1d2438">&amp; defend it with</text>
    <text x="455" y="314" font-size="10.5" font-weight="700" fill="#ef4444">long-lasting moats?</text>
  </g>

  <text x="320" y="392" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">A robust strategy still stands when the hype fades</text>
</svg>
