<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Stack quality scale: great, incomplete, poor diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">Three States of a Strategy Stack</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">From all five layers connected (Great) to disconnected fragments (Poor)</text>

  <g font-family="sans-serif">
    <!-- legend for layers -->
    <text x="320" y="68" text-anchor="middle" font-size="9.5" fill="#5b6680">Layers: Mission · Company Strategy · Product Strategy · Roadmap · Goals</text>

    <!-- GREAT column -->
    <rect x="46" y="84" width="172" height="266" rx="8" fill="#e7f6f5" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="132" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#0ea5a4">GREAT</text>
    <text x="132" y="122" text-anchor="middle" font-size="9" fill="#5b6680">All five present &amp; linked</text>
    <!-- five connected blocks -->
    <rect x="72" y="134" width="120" height="34" rx="5" fill="#0ea5a4"/><text x="132" y="155" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Mission</text>
    <line x1="132" y1="168" x2="132" y2="174" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="72" y="174" width="120" height="34" rx="5" fill="#0ea5a4"/><text x="132" y="195" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Co. Strategy</text>
    <line x1="132" y1="208" x2="132" y2="214" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="72" y="214" width="120" height="34" rx="5" fill="#0ea5a4"/><text x="132" y="235" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Prod. Strategy</text>
    <line x1="132" y1="248" x2="132" y2="254" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="72" y="254" width="120" height="34" rx="5" fill="#0ea5a4"/><text x="132" y="275" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Roadmap</text>
    <line x1="132" y1="288" x2="132" y2="294" stroke="#0ea5a4" stroke-width="2"/>
    <rect x="72" y="294" width="120" height="34" rx="5" fill="#0ea5a4"/><text x="132" y="315" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Goals</text>

    <!-- INCOMPLETE column -->
    <rect x="234" y="84" width="172" height="266" rx="8" fill="#fef6e7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">INCOMPLETE</text>
    <text x="320" y="122" text-anchor="middle" font-size="9" fill="#5b6680">One or more layers missing</text>
    <rect x="260" y="134" width="120" height="34" rx="5" fill="#f59e0b"/><text x="320" y="155" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Mission</text>
    <line x1="320" y1="168" x2="320" y2="174" stroke="#f59e0b" stroke-width="2"/>
    <rect x="260" y="174" width="120" height="34" rx="5" fill="#f59e0b"/><text x="320" y="195" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Co. Strategy</text>
    <!-- gap: missing product strategy -->
    <rect x="260" y="214" width="120" height="34" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/><text x="320" y="235" text-anchor="middle" font-size="9" fill="#f59e0b">Prod. Strategy?</text>
    <rect x="260" y="254" width="120" height="34" rx="5" fill="#f59e0b"/><text x="320" y="275" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Roadmap</text>
    <line x1="320" y1="288" x2="320" y2="294" stroke="#f59e0b" stroke-width="2"/>
    <rect x="260" y="294" width="120" height="34" rx="5" fill="#f59e0b"/><text x="320" y="315" text-anchor="middle" font-size="9.5" font-weight="700" fill="#ffffff">Goals</text>

    <!-- POOR column -->
    <rect x="422" y="84" width="172" height="266" rx="8" fill="#fdecea" stroke="#ef4444" stroke-width="1.5"/>
    <text x="508" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#ef4444">POOR</text>
    <text x="508" y="122" text-anchor="middle" font-size="9" fill="#5b6680">Present but disconnected</text>
    <!-- scattered, unlinked blocks -->
    <rect x="436" y="134" width="104" height="32" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/><text x="488" y="154" text-anchor="middle" font-size="9.5" fill="#ef4444">Mission</text>
    <rect x="478" y="178" width="104" height="32" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/><text x="530" y="198" text-anchor="middle" font-size="9.5" fill="#ef4444">Co. Strategy</text>
    <rect x="436" y="222" width="104" height="32" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/><text x="488" y="242" text-anchor="middle" font-size="9" fill="#ef4444">Prod. Strategy</text>
    <rect x="480" y="266" width="104" height="32" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/><text x="532" y="286" text-anchor="middle" font-size="9.5" fill="#ef4444">Roadmap</text>
    <rect x="438" y="310" width="104" height="32" rx="5" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/><text x="490" y="330" text-anchor="middle" font-size="9.5" fill="#ef4444">Goals</text>
  </g>

  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#5b6680">Solid links = each layer flows into the next; dashed = missing; scattered = no connective logic, so goals can't be set.</text>
</svg>
