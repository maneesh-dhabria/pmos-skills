<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Disagree and Commit diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Disagree and Commit</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Dissent loudly before the call — then row hard after it.</text>

  <!-- Phase 1: Debate -->
  <rect x="32" y="86" width="248" height="240" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="156" y="114" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">1 · DEBATE</text>
  <text x="156" y="134" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Surface dissent fully</text>

  <rect x="52" y="154" width="208" height="38" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="156" y="178" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Voice the strongest objection</text>
  <rect x="52" y="200" width="208" height="38" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="156" y="224" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">No rank-pulling, real argument</text>
  <rect x="52" y="246" width="208" height="38" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="156" y="270" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Owner names the decision</text>
  <text x="156" y="306" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="700">Silence ≠ agreement</text>

  <!-- Arrow / gate -->
  <polygon points="288,196 320,180 320,232 288,216" fill="#0ea5a4"/>
  <text x="304" y="252" font-family="sans-serif" font-size="11" fill="#0ea5a4" text-anchor="middle" font-weight="700">DECIDE</text>

  <!-- Phase 2: Commit -->
  <rect x="360" y="86" width="248" height="240" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="484" y="114" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4" text-anchor="middle">2 · COMMIT</text>
  <text x="484" y="134" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Everyone rows, incl. dissenters</text>

  <rect x="380" y="154" width="208" height="38" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="484" y="178" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Back it like you chose it</text>
  <rect x="380" y="200" width="208" height="38" rx="6" fill="#ffffff" stroke="#5b6680" stroke-width="1"/>
  <text x="484" y="224" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">No re-litigating in the halls</text>
  <rect x="380" y="246" width="208" height="38" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="484" y="264" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Set a checkpoint to revisit</text>
  <text x="484" y="278" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">on new evidence</text>
  <text x="484" y="306" font-family="sans-serif" font-size="11" fill="#0ea5a4" text-anchor="middle" font-weight="700">Speed &gt; consensus</text>

  <text x="320" y="356" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle" font-style="italic">"I disagree, but let's go all in." — beats endless consensus-seeking.</text>
</svg>
