<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="BCG Growth-Share Matrix diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">BCG Growth-Share Matrix</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Allocate cash across the product portfolio by growth × relative share</text>

  <!-- Axis labels -->
  <text x="20" y="230" font-family="sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 20 230)" text-anchor="middle">Market growth rate  (high ↑ / low ↓)</text>
  <text x="360" y="392" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Relative market share  (high ← / low →)</text>

  <!-- Quadrants -->
  <!-- top-left: Star (high growth, high share) -->
  <rect x="180" y="80" width="240" height="135" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="120" font-family="sans-serif" font-size="18" font-weight="700" fill="#2563eb" text-anchor="middle">★ Stars</text>
  <text x="300" y="146" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">High growth · High share</text>
  <text x="300" y="168" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Invest to defend the lead</text>

  <!-- top-right: Question Mark -->
  <rect x="420" y="80" width="200" height="135" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="120" font-family="sans-serif" font-size="18" font-weight="700" fill="#f59e0b" text-anchor="middle">? Question Marks</text>
  <text x="520" y="146" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">High growth · Low share</text>
  <text x="520" y="168" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Bet big or exit</text>

  <!-- bottom-left: Cash Cow -->
  <rect x="180" y="215" width="240" height="135" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="300" y="255" font-family="sans-serif" font-size="18" font-weight="700" fill="#0ea5a4" text-anchor="middle">$ Cash Cows</text>
  <text x="300" y="281" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Low growth · High share</text>
  <text x="300" y="303" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Harvest to fund the rest</text>

  <!-- bottom-right: Dog -->
  <rect x="420" y="215" width="200" height="135" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="255" font-family="sans-serif" font-size="18" font-weight="700" fill="#ef4444" text-anchor="middle">✕ Dogs</text>
  <text x="520" y="281" font-family="sans-serif" font-size="12" fill="#1d2438" text-anchor="middle">Low growth · Low share</text>
  <text x="520" y="303" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Divest or hold cheaply</text>

  <!-- cash-flow hint -->
  <text x="300" y="378" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Cash flows from Cash Cows → into Stars and chosen Question Marks</text>
</svg>
