<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Disruptive Innovation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Disruptive Innovation</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">Cheaper, simpler entrants catch up and overtake incumbents from below or via new markets.</text>

  <!-- Axes -->
  <line x1="70" y1="76" x2="70" y2="320" stroke="#1d2438" stroke-width="2"/>
  <line x1="70" y1="320" x2="600" y2="320" stroke="#1d2438" stroke-width="2"/>
  <text x="58" y="200" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle" transform="rotate(-90 58 200)">Performance</text>
  <text x="335" y="346" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" text-anchor="middle">Time</text>

  <!-- Customer demand band (what mainstream needs) -->
  <line x1="70" y1="250" x2="600" y2="150" stroke="#5b6680" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="500" y="142" font-family="sans-serif" font-size="11" font-style="italic" fill="#5b6680">customer needs (mainstream)</text>

  <!-- Sustaining trajectory (incumbent) - steep, overshoots -->
  <path d="M70 230 C 250 150, 420 100, 590 88" fill="none" stroke="#2563eb" stroke-width="3"/>
  <circle cx="590" cy="88" r="4" fill="#2563eb"/>
  <text x="200" y="170" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Sustaining technology</text>
  <text x="200" y="186" font-family="sans-serif" font-size="11" fill="#5b6680">incumbents improve existing lines &#8594; overshoot</text>

  <!-- Disruptive trajectory - starts low, rises, crosses -->
  <path d="M150 308 C 320 290, 440 230, 575 130" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <circle cx="150" cy="308" r="4" fill="#f59e0b"/>
  <circle cx="575" cy="130" r="4" fill="#f59e0b"/>
  <text x="150" y="300" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">Disruptive technology</text>
  <text x="150" y="316" font-family="sans-serif" font-size="11" fill="#5b6680"></text>

  <!-- Foothold marker -->
  <circle cx="150" cy="308" r="11" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="120" y="338" font-family="sans-serif" font-size="11" fill="#ef4444">cheaper, simpler foothold</text>

  <!-- Crossover marker -->
  <circle cx="497" cy="183" r="9" fill="#ef4444"/>
  <text x="497" y="187" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">!</text>
  <text x="512" y="200" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">overtakes &amp; displaces</text>

  <!-- Two-types footer -->
  <rect x="32" y="356" width="576" height="38" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="46" y="380" font-family="sans-serif" font-size="12" fill="#5b6680"><tspan font-weight="700" fill="#1d2438">Two types:</tspan>  <tspan font-weight="700" fill="#f59e0b">Low-end</tspan> — enter existing market from the bottom   &#183;   <tspan font-weight="700" fill="#0ea5a4">New-market</tspan> — create a new segment with a low-cost version.</text>
</svg>
