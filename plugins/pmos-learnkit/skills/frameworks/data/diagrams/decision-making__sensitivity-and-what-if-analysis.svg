<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Sensitivity and What-If Analysis diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Sensitivity &amp; What-If Analysis</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Vary one input at a time — see which moves the outcome most</text>

  <!-- Tornado chart: baseline center line -->
  <line x1="320" y1="90" x2="320" y2="330" stroke="#1d2438" stroke-width="2"/>
  <text x="320" y="350" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Baseline outcome</text>
  <text x="170" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">← outcome lower</text>
  <text x="478" y="350" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">outcome higher →</text>

  <!-- helper: each variable a bar straddling the baseline; widest = most impactful (top) -->
  <!-- Price: most sensitive -->
  <text x="110" y="119" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Price</text>
  <rect x="170" y="106" width="150" height="22" fill="#ef4444"/>
  <rect x="320" y="106" width="150" height="22" fill="#2563eb"/>
  <text x="245" y="121" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">−</text>
  <text x="395" y="121" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffffff">+</text>

  <!-- Demand -->
  <text x="110" y="159" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Demand</text>
  <rect x="210" y="146" width="110" height="22" fill="#ef4444"/>
  <rect x="320" y="146" width="110" height="22" fill="#2563eb"/>

  <!-- Unit cost -->
  <text x="110" y="199" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Unit cost</text>
  <rect x="240" y="186" width="80" height="22" fill="#ef4444"/>
  <rect x="320" y="186" width="80" height="22" fill="#2563eb"/>

  <!-- Marketing -->
  <text x="110" y="239" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Marketing</text>
  <rect x="270" y="226" width="50" height="22" fill="#ef4444"/>
  <rect x="320" y="226" width="50" height="22" fill="#2563eb"/>

  <!-- Quality -->
  <text x="110" y="279" text-anchor="end" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Quality</text>
  <rect x="292" y="266" width="28" height="22" fill="#ef4444"/>
  <rect x="320" y="266" width="28" height="22" fill="#2563eb"/>

  <!-- impact axis arrow on left -->
  <text x="60" y="200" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" transform="rotate(-90 60 200)">most impactful  ↑</text>

  <!-- legend -->
  <rect x="430" y="300" width="14" height="14" fill="#ef4444"/>
  <text x="450" y="312" font-family="sans-serif" font-size="11" fill="#5b6680">input low</text>
  <rect x="520" y="300" width="14" height="14" fill="#2563eb"/>
  <text x="540" y="312" font-family="sans-serif" font-size="11" fill="#5b6680">input high</text>
</svg>
