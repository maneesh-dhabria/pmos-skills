<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Goal Setting Failure Reasons diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Goal-Setting Failure Reasons</text>
  <text x="32" y="58" font-family="sans-serif" font-size="13" fill="#5b6680">Five mistakes that feed a vicious cycle — busy, yet little gets accomplished</text>

  <!-- center -->
  <circle cx="320" cy="230" r="62" fill="#1d2438"/>
  <text x="320" y="222" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">VICIOUS</text>
  <text x="320" y="240" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle">CYCLE</text>
  <text x="320" y="258" font-family="sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">lost credibility</text>

  <!-- curved cycle arrows around center -->
  <g fill="none" stroke="#5b6680" stroke-width="2">
    <path d="M 320 152 A 78 78 0 0 1 388 191"/>
    <path d="M 398 200 A 78 78 0 0 1 398 260"/>
    <path d="M 388 269 A 78 78 0 0 1 320 308"/>
    <path d="M 252 269 A 78 78 0 0 1 242 200"/>
  </g>
  <polygon points="386,186 398,191 389,200" fill="#5b6680"/>
  <polygon points="398,260 394,272 387,262" fill="#5b6680"/>
  <polygon points="320,308 308,304 318,297" fill="#5b6680"/>
  <polygon points="242,200 246,188 253,198" fill="#5b6680"/>

  <!-- Five nodes around -->
  <!-- 1 top -->
  <rect x="216" y="92" width="208" height="44" rx="9" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="232" y="110" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">1 · Lofty goals, no commitments</text>
  <text x="232" y="127" font-family="sans-serif" font-size="11" fill="#5b6680">impress leadership, can't execute</text>

  <!-- 2 right -->
  <rect x="440" y="160" width="184" height="44" rx="9" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="456" y="178" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">2 · Chase metrics, not value</text>
  <text x="456" y="195" font-family="sans-serif" font-size="11" fill="#5b6680">wrong goal type for the stage</text>

  <!-- 3 bottom-right -->
  <rect x="412" y="262" width="212" height="44" rx="9" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="428" y="280" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">3 · More ambition, less feasible</text>
  <text x="428" y="297" font-family="sans-serif" font-size="11" fill="#5b6680">pressure raises the bar unrealistically</text>

  <!-- 4 bottom-left -->
  <rect x="16" y="262" width="216" height="44" rx="9" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="32" y="280" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">4 · Lost credibility &amp; alignment</text>
  <text x="32" y="297" font-family="sans-serif" font-size="11" fill="#5b6680">goals drift from what's achievable</text>

  <!-- 5 left -->
  <rect x="16" y="160" width="200" height="44" rx="9" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="32" y="178" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">5 · Lots done, little achieved</text>
  <text x="32" y="195" font-family="sans-serif" font-size="11" fill="#5b6680">busywork, minimal strategic progress</text>

  <!-- footnote -->
  <text x="320" y="332" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Four goal types fix mistake 2: Discovery · Input · Output · Outcome</text>
</svg>
