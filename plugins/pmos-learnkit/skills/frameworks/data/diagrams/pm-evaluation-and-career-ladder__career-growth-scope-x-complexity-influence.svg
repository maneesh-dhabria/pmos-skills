<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Career Growth equals Scope times Complexity to the power of Influence diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Career Growth Equation</text>

  <!-- Equation hero -->
  <rect x="60" y="56" width="520" height="74" rx="12" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
  <text x="320" y="104" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#1d2438">Growth = (<tspan fill="#2563eb">Scope</tspan> × <tspan fill="#f59e0b">Complexity</tspan>)<tspan font-size="17" baseline-shift="super" fill="#0ea5a4">Influence</tspan></text>

  <!-- Variable definitions -->
  <rect x="40" y="150" width="180" height="64" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb">Scope</text>
  <text x="130" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">scale / importance of</text>
  <text x="130" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">your domain &amp; work</text>

  <rect x="230" y="150" width="180" height="64" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#b3770a">Complexity</text>
  <text x="320" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">variables that make it hard:</text>
  <text x="320" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">people · tech · trade-offs</text>

  <rect x="420" y="150" width="180" height="64" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="510" y="172" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0a7c7b">Influence</text>
  <text x="510" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">radius of impact —</text>
  <text x="510" y="203" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">beyond your own team</text>

  <!-- Optimization order -->
  <text x="320" y="248" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Recommended order of optimization</text>

  <!-- Step 1 -->
  <rect x="40" y="262" width="166" height="74" rx="8" fill="#2563eb"/>
  <text x="123" y="288" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">1 · Scope</text>
  <text x="123" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dbe6ff">Focus on the most</text>
  <text x="123" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dbe6ff">impactful work first</text>

  <polygon points="210,299 232,289 232,309" fill="#5b6680"/>

  <!-- Step 2 -->
  <rect x="237" y="262" width="166" height="74" rx="8" fill="#0ea5a4"/>
  <text x="320" y="288" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">2 · Influence</text>
  <text x="320" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d4f3f2">Make work visible;</text>
  <text x="320" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d4f3f2">get stakeholder buy-in</text>

  <polygon points="407,299 429,289 429,309" fill="#5b6680"/>

  <!-- Step 3 -->
  <rect x="434" y="262" width="166" height="74" rx="8" fill="#f59e0b"/>
  <text x="517" y="288" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff">3 · Complexity</text>
  <text x="517" y="308" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff0d6">Hard to spot; surfaces</text>
  <text x="517" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff0d6">in long-unsolved problems</text>

  <!-- Pitfall -->
  <rect x="40" y="350" width="560" height="36" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="56" y="372" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Pitfall:</text>
  <text x="106" y="372" font-family="sans-serif" font-size="11" fill="#1d2438">chasing influence without real scope/complexity — short-term visibility, long-term exposed.</text>
</svg>
