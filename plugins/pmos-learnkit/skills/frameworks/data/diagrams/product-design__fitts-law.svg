<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Fitt's Law diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Fitt&#8217;s Law</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Acquisition time &#8593; with Distance (D), &#8595; with target Size (W)</text>

  <!-- formula -->
  <rect x="200" y="66" width="240" height="30" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="320" y="86" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#1d2438">Time &#8733; log&#8322;( D / W + 1 )</text>

  <!-- pointer start -->
  <circle cx="80" cy="200" r="9" fill="#1d2438"/>
  <text x="80" y="232" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">pointer</text>

  <!-- distance arrow to far small target -->
  <line x1="92" y1="200" x2="486" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#a2)"/>
  <text x="290" y="158" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="600">far + small &#8594; slow</text>

  <!-- distance arrow to near big target -->
  <line x1="92" y1="206" x2="232" y2="262" stroke="#0ea5a4" stroke-width="2" marker-end="url(#a3)"/>
  <text x="170" y="300" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0ea5a4" font-weight="600">near + big &#8594; fast</text>

  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/></marker>
    <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#0ea5a4"/></marker>
  </defs>

  <!-- far small target -->
  <rect x="498" y="148" width="26" height="26" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="511" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444">small W</text>
  <text x="511" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ef4444">big D</text>

  <!-- near big target -->
  <rect x="244" y="240" width="80" height="56" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="284" y="272" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#0ea5a4">big W</text>
  <text x="284" y="287" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0ea5a4">small D</text>

  <!-- takeaways -->
  <text x="64" y="350" font-family="sans-serif" font-size="11" fill="#1d2438" font-weight="700">Design moves:</text>
  <text x="64" y="368" font-family="sans-serif" font-size="11" fill="#5b6680">&#8226; size up frequent targets &#160; &#8226; cut travel distance</text>
  <text x="64" y="384" font-family="sans-serif" font-size="11" fill="#5b6680">&#8226; pad hit areas &#160; &#8226; group controls used in sequence</text>
</svg>
