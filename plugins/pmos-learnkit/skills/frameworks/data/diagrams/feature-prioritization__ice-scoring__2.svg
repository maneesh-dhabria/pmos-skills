<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Confidence meter evidence ladder diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Confidence Meter — evidence ladder</text>
  <text x="32" y="64" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">Stronger evidence raises the Confidence score you may claim (Itamar Gilad)</text>

  <!-- arrow axis -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <line x1="64" y1="350" x2="64" y2="92" stroke="#2563eb" stroke-width="2" marker-end="url(#ah)"/>
  <text x="40" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 40 200)">evidence strength</text>

  <!-- rungs, weakest at bottom -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
    <!-- weak -->
    <rect x="90" y="312" width="470" height="34" rx="6" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="104" y="334" font-size="14" font-weight="600" fill="#1d2438">Self-conviction / opinion</text>
    <text x="546" y="334" font-size="13" font-weight="700" fill="#ef4444" text-anchor="end">low</text>

    <rect x="90" y="266" width="470" height="34" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="104" y="288" font-size="14" font-weight="600" fill="#1d2438">Others' opinion / anecdote</text>

    <rect x="90" y="220" width="470" height="34" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="104" y="242" font-size="14" font-weight="600" fill="#1d2438">Market data / analogy</text>

    <rect x="90" y="174" width="470" height="34" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="104" y="196" font-size="14" font-weight="600" fill="#1d2438">Self / user survey, feedback</text>

    <rect x="90" y="128" width="470" height="34" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="104" y="150" font-size="14" font-weight="600" fill="#1d2438">Live A/B test, usage data</text>
    <text x="546" y="150" font-size="13" font-weight="700" fill="#2563eb" text-anchor="end">high</text>
  </g>

  <text x="90" y="382" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Map your best available evidence to a Confidence value (1–10) instead of guessing.</text>
</svg>
