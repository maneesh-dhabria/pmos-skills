<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="GLE Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="44" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">GLE Model</text>
  <text x="32" y="66" font-family="sans-serif" font-size="13" fill="#5b6680">Long-term product trajectory across three multi-year phases</text>

  <!-- timeline axis -->
  <line x1="32" y1="350" x2="608" y2="350" stroke="#5b6680" stroke-width="1.5"/>
  <polygon points="608,350 598,345 598,355" fill="#5b6680"/>
  <text x="32" y="372" font-family="sans-serif" font-size="11" fill="#5b6680">Years 0-5</text>
  <text x="262" y="372" font-family="sans-serif" font-size="11" fill="#5b6680">Years 5-10</text>
  <text x="492" y="372" font-family="sans-serif" font-size="11" fill="#5b6680">Years 10-15</text>

  <!-- Step 1: Get Big On -->
  <rect x="32" y="248" width="176" height="86" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="48" y="274" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">1 · Get Big On</text>
  <text x="48" y="296" font-family="sans-serif" font-size="11.5" fill="#1d2438">Pick the initial product</text>
  <text x="48" y="312" font-family="sans-serif" font-size="11.5" fill="#1d2438">that rides an early trend</text>
  <text x="48" y="328" font-family="sans-serif" font-size="11" fill="#5b6680">Netflix: DVDs</text>

  <!-- Step 2: Lead -->
  <rect x="232" y="178" width="176" height="86" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="248" y="204" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">2 · Lead</text>
  <text x="248" y="226" font-family="sans-serif" font-size="11.5" fill="#1d2438">Ride the next wave and</text>
  <text x="248" y="242" font-family="sans-serif" font-size="11.5" fill="#1d2438">take a leadership position</text>
  <text x="248" y="258" font-family="sans-serif" font-size="11" fill="#5b6680">Netflix: Streaming</text>

  <!-- Step 3: Expand -->
  <rect x="432" y="108" width="176" height="86" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="448" y="134" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">3 · Expand</text>
  <text x="448" y="156" font-family="sans-serif" font-size="11.5" fill="#1d2438">Leverage brand, scale &amp;</text>
  <text x="448" y="172" font-family="sans-serif" font-size="11.5" fill="#1d2438">network into new ground</text>
  <text x="448" y="188" font-family="sans-serif" font-size="11" fill="#5b6680">Netflix: Worldwide</text>

  <!-- ascending connectors -->
  <line x1="208" y1="270" x2="232" y2="221" stroke="#5b6680" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="408" y1="200" x2="432" y2="151" stroke="#5b6680" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
