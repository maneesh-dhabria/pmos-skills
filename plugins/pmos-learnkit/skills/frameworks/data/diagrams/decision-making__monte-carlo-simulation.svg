<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Monte Carlo Simulation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Monte Carlo Simulation</text>
  <text x="32" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Run many randomized trials over uncertain inputs &#8594; a distribution of outcomes</text>

  <!-- Stage 1: uncertain inputs -->
  <text x="36" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">1. Uncertain inputs</text>
  <g font-family="sans-serif" font-size="10.5">
    <rect x="36" y="104" width="150" height="34" rx="5" fill="#dbeafe"/>
    <text x="48" y="125" fill="#1d2438">Sales volume  (range)</text>
    <rect x="36" y="146" width="150" height="34" rx="5" fill="#dbeafe"/>
    <text x="48" y="167" fill="#1d2438">Price / unit  (range)</text>
    <rect x="36" y="188" width="150" height="34" rx="5" fill="#dbeafe"/>
    <text x="48" y="209" fill="#1d2438">Unit cost  (range)</text>
    <rect x="36" y="230" width="150" height="34" rx="5" fill="#dbeafe"/>
    <text x="48" y="251" fill="#1d2438">Fixed costs  (range)</text>
  </g>
  <text x="111" y="284" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">each = value + probability</text>

  <!-- arrow 1 -->
  <line x1="196" y1="184" x2="244" y2="184" stroke="#5b6680" stroke-width="2"/>
  <polygon points="244,184 234,179 234,189" fill="#5b6680"/>

  <!-- Stage 2: random draws / many runs -->
  <text x="256" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">2. Random draws &#215; N runs</text>
  <rect x="254" y="104" width="150" height="160" rx="6" fill="#ccfbf1"/>
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <text x="329" y="128" text-anchor="middle">model(profit) =</text>
    <text x="329" y="144" text-anchor="middle">vol&#215;price &#8722; cost</text>
  </g>
  <!-- stacked run rows suggesting thousands of trials -->
  <g stroke="#0ea5a4" stroke-width="1.2">
    <line x1="270" y1="160" x2="388" y2="160"/>
    <line x1="270" y1="172" x2="388" y2="172"/>
    <line x1="270" y1="184" x2="388" y2="184"/>
    <line x1="270" y1="196" x2="388" y2="196"/>
    <line x1="270" y1="208" x2="388" y2="208"/>
  </g>
  <text x="329" y="234" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">RNG picks one value</text>
  <text x="329" y="250" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">per input, thousands of times</text>

  <!-- arrow 2 -->
  <line x1="414" y1="184" x2="462" y2="184" stroke="#5b6680" stroke-width="2"/>
  <polygon points="462,184 452,179 452,189" fill="#5b6680"/>

  <!-- Stage 3: distribution histogram -->
  <text x="476" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">3. Outcome distribution</text>
  <g>
    <line x1="476" y1="252" x2="612" y2="252" stroke="#1d2438" stroke-width="1.5"/>
    <line x1="476" y1="252" x2="476" y2="112" stroke="#1d2438" stroke-width="1.5"/>
    <rect x="482" y="226" width="14" height="26" fill="#93c5fd"/>
    <rect x="498" y="200" width="14" height="52" fill="#60a5fa"/>
    <rect x="514" y="160" width="14" height="92" fill="#2563eb"/>
    <rect x="530" y="142" width="14" height="110" fill="#2563eb"/>
    <rect x="546" y="172" width="14" height="80" fill="#60a5fa"/>
    <rect x="562" y="200" width="14" height="52" fill="#60a5fa"/>
    <rect x="578" y="224" width="14" height="28" fill="#93c5fd"/>
    <rect x="594" y="238" width="14" height="14" fill="#93c5fd"/>
  </g>
  <text x="544" y="272" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">Year-1 net profit  &#8594;</text>

  <!-- footer -->
  <rect x="32" y="320" width="576" height="56" rx="6" fill="#f4f7ff"/>
  <text x="48" y="343" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">Read the spread, not a single point</text>
  <text x="48" y="362" font-family="sans-serif" font-size="10.5" fill="#5b6680">See the most-likely outcome and the probability of each &#8212; e.g. P(low profit) high &#8594; adjust price or strategy.</text>
</svg>
