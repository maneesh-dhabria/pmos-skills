<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Pros and Cons List diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Pros and Cons List</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Weight each outcome, then compare the columns</text>

  <!-- Column headers -->
  <rect x="40" y="80" width="170" height="38" rx="6" fill="#f4f7ff"/>
  <text x="125" y="104" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680">Option / Factor</text>
  <rect x="220" y="80" width="190" height="38" rx="6" fill="#e0f2f1"/>
  <text x="315" y="104" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">PROS  (+)</text>
  <rect x="420" y="80" width="180" height="38" rx="6" fill="#fde8e8"/>
  <text x="510" y="104" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444">CONS  (−)</text>

  <!-- Row 1: Option A -->
  <text x="50" y="150" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Option A</text>
  <text x="230" y="146" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Faster to ship</text>
  <text x="230" y="164" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Lower cost</text>
  <text x="430" y="146" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Limited scale</text>
  <!-- weight chips -->
  <rect x="372" y="135" width="34" height="16" rx="8" fill="#0ea5a4"/>
  <text x="389" y="147" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">+8</text>
  <rect x="562" y="135" width="34" height="16" rx="8" fill="#ef4444"/>
  <text x="579" y="147" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">−3</text>
  <line x1="40" y1="180" x2="600" y2="180" stroke="#e2e8f5" stroke-width="1"/>

  <!-- Row 2: Option B -->
  <text x="50" y="214" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Option B</text>
  <text x="230" y="210" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Scales well</text>
  <text x="430" y="210" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Higher cost</text>
  <text x="430" y="228" font-family="sans-serif" font-size="11.5" fill="#1d2438">• Slower build</text>
  <rect x="372" y="199" width="34" height="16" rx="8" fill="#0ea5a4"/>
  <text x="389" y="211" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">+5</text>
  <rect x="562" y="199" width="34" height="16" rx="8" fill="#ef4444"/>
  <text x="579" y="211" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">−7</text>
  <line x1="40" y1="244" x2="600" y2="244" stroke="#e2e8f5" stroke-width="1"/>

  <!-- column rule -->
  <line x1="216" y1="80" x2="216" y2="244" stroke="#e2e8f5" stroke-width="1"/>
  <line x1="416" y1="80" x2="416" y2="244" stroke="#e2e8f5" stroke-width="1"/>

  <!-- Steps / tally bar -->
  <rect x="40" y="266" width="560" height="98" rx="10" fill="#f4f7ff"/>
  <text x="60" y="292" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">Score &amp; decide</text>
  <text x="60" y="314" font-family="sans-serif" font-size="11.5" fill="#5b6680">1. Add a weight to each item by importance · 2. Sum each option · 3. Pick the heavier net</text>

  <!-- net tally bars -->
  <text x="60" y="340" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">A net +5</text>
  <rect x="135" y="330" width="120" height="13" rx="3" fill="#0ea5a4"/>
  <text x="60" y="358" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">B net −2</text>
  <rect x="135" y="348" width="48" height="13" rx="3" fill="#ef4444"/>
  <text x="430" y="350" font-family="sans-serif" font-size="11" font-style="italic" fill="#f59e0b">Watch for author bias in the framing</text>
</svg>
