<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Now-Next-Later Roadmap diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Now-Next-Later Roadmap</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">No dates — three horizons of decreasing certainty &amp; detail</text>

  <!-- NOW column -->
  <rect x="32" y="80" width="184" height="280" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="124" y="108" font-family="sans-serif" font-size="17" font-weight="700" fill="#2563eb" text-anchor="middle">NOW</text>
  <text x="124" y="128" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">committed · high detail</text>
  <rect x="48" y="142" width="152" height="34" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="124" y="163" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Scoped solution</text>
  <rect x="48" y="184" width="152" height="34" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="124" y="205" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">In active build</text>
  <rect x="48" y="226" width="152" height="34" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="124" y="247" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Discovery done</text>

  <!-- NEXT column -->
  <rect x="228" y="80" width="184" height="280" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="320" y="108" font-family="sans-serif" font-size="17" font-weight="700" fill="#0ea5a4" text-anchor="middle">NEXT</text>
  <text x="320" y="128" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">on deck · medium detail</text>
  <rect x="244" y="142" width="152" height="34" rx="5" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="163" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Problem framed</text>
  <rect x="244" y="184" width="152" height="34" rx="5" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="320" y="205" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Validating</text>

  <!-- LATER column -->
  <rect x="424" y="80" width="184" height="280" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <text x="516" y="108" font-family="sans-serif" font-size="17" font-weight="700" fill="#f59e0b" text-anchor="middle">LATER</text>
  <text x="516" y="128" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">directional · low detail</text>
  <rect x="440" y="142" width="152" height="34" rx="5" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="516" y="163" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Themes / bets</text>

  <!-- certainty gradient arrow -->
  <text x="320" y="392" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">certainty &amp; commitment decrease  →  options stay open</text>
</svg>
