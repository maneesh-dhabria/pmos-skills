<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Individual to aggregated empathy map diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1d2438">One-User vs. Aggregated Empathy Maps</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Synthesizing individual maps into a group view — a first step toward personas</text>

  <!-- Stage 1: individual maps -->
  <text x="105" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#2563eb">Individual maps</text>
  <text x="105" y="108" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">one interview / diary log each</text>

  <g>
    <rect x="45" y="130" width="120" height="70" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="105" y1="130" x2="105" y2="200" stroke="#2563eb" stroke-width="0.8"/>
    <line x1="45" y1="165" x2="165" y2="165" stroke="#2563eb" stroke-width="0.8"/>
    <text x="105" y="150" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#1d2438">User A</text>
  </g>
  <g>
    <rect x="45" y="220" width="120" height="70" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="105" y1="220" x2="105" y2="290" stroke="#2563eb" stroke-width="0.8"/>
    <line x1="45" y1="255" x2="165" y2="255" stroke="#2563eb" stroke-width="0.8"/>
    <text x="105" y="240" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#1d2438">User B</text>
  </g>
  <g>
    <rect x="45" y="310" width="120" height="55" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="105" y1="310" x2="105" y2="365" stroke="#2563eb" stroke-width="0.8"/>
    <line x1="45" y1="337" x2="165" y2="337" stroke="#2563eb" stroke-width="0.8"/>
    <text x="105" y="296" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">User C …</text>
  </g>

  <!-- Arrow: synthesize -->
  <text x="262" y="232" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-style="italic" fill="#5b6680">synthesize</text>
  <text x="262" y="246" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" font-style="italic" fill="#5b6680">common themes</text>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0ea5a4"/>
    </marker>
  </defs>
  <line x1="200" y1="255" x2="325" y2="255" stroke="#0ea5a4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: aggregated map -->
  <text x="430" y="92" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Aggregated map</text>
  <text x="430" y="108" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">group with similar behaviors</text>

  <g>
    <rect x="345" y="130" width="170" height="170" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <line x1="430" y1="130" x2="430" y2="300" stroke="#0ea5a4" stroke-width="1"/>
    <line x1="345" y1="215" x2="515" y2="215" stroke="#0ea5a4" stroke-width="1"/>
    <text x="387" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d2438">Says</text>
    <text x="473" y="160" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d2438">Thinks</text>
    <text x="387" y="248" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d2438">Does</text>
    <text x="473" y="248" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d2438">Feels</text>
    <circle cx="430" cy="215" r="15" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="430" y="219" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#f59e0b">group</text>
  </g>

  <!-- Arrow to personas -->
  <line x1="430" y1="300" x2="430" y2="340" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <defs>
    <marker id="arrowB" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <rect x="355" y="343" width="150" height="34" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="430" y="364" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1d2438">First step → Personas</text>
</svg>
