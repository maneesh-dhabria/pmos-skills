<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Creators, Synthesizers and Consumers (1/10/100 Rule) diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Creators, Synthesizers &amp; Consumers</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">The 1 / 10 / 100 rule of participation in social software</text>

  <!-- Pyramid: apex tiny (creators), middle (synthesizers), base wide (consumers) -->
  <!-- Tier 1: Creators (apex) -->
  <polygon points="320,76 354,134 286,134" fill="#2563eb"/>
  <!-- Tier 2: Synthesizers -->
  <polygon points="286,138 354,138 414,242 226,242" fill="#0ea5a4"/>
  <!-- Tier 3: Consumers (base) -->
  <polygon points="226,246 414,246 480,356 160,356" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>

  <!-- Tier labels inside -->
  <text x="320" y="120" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1%</text>
  <text x="320" y="200" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">10%</text>
  <text x="320" y="312" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438" text-anchor="middle">100%</text>

  <!-- Right-side annotations with leader lines -->
  <!-- Creators -->
  <line x1="354" y1="105" x2="500" y2="105" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="500" cy="105" r="3" fill="#2563eb"/>
  <text x="510" y="100" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#2563eb">~1% Creators</text>
  <text x="510" y="116" font-family="sans-serif" font-size="10" fill="#5b6680">Start a group or thread</text>

  <!-- Synthesizers -->
  <line x1="414" y1="195" x2="500" y2="195" stroke="#0ea5a4" stroke-width="1.5"/>
  <circle cx="500" cy="195" r="3" fill="#0ea5a4"/>
  <text x="510" y="190" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#0ea5a4">~10% Synthesizers</text>
  <text x="510" y="206" font-family="sans-serif" font-size="10" fill="#5b6680">Reply &amp; contribute content</text>

  <!-- Consumers -->
  <line x1="480" y1="312" x2="500" y2="312" stroke="#5b6680" stroke-width="1.5"/>
  <circle cx="500" cy="312" r="3" fill="#5b6680"/>
  <text x="510" y="307" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">100% Consumers</text>
  <text x="510" y="323" font-family="sans-serif" font-size="10" fill="#5b6680">Lurkers who benefit from it all</text>

  <!-- Left annotations -->
  <text x="120" y="100" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">few create</text>
  <text x="120" y="195" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">some shape</text>
  <text x="120" y="312" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">everyone reads</text>

  <!-- takeaway -->
  <rect x="24" y="372" width="592" height="22" rx="11" fill="#f4f7ff"/>
  <text x="320" y="387" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle" font-weight="700">A small active minority creates most of the value &#8212; you don't need 100% active to thrive</text>
</svg>
