<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Amazon Six Page Memo and PR/FAQ diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Amazon Six-Page Memo &amp; PR/FAQ</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Work backwards from the customer &#8212; narrative beats slideware</text>

  <!-- working backwards arrow -->
  <text x="55" y="92" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">CUSTOMER</text>
  <line x1="48" y1="100" x2="48" y2="360" stroke="#2563eb" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- Left: Six page memo -->
  <rect x="68" y="100" width="262" height="262" rx="10" fill="#f4f7ff" stroke="#1d2438" stroke-width="2"/>
  <text x="84" y="126" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Six-Page Memo</text>
  <text x="84" y="145" font-family="sans-serif" font-size="11" fill="#5b6680">Read silently for ~20 min, then discuss</text>

  <g font-family="sans-serif" font-size="12" fill="#1d2438">
    <rect x="84" y="156" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="173">1 &#183; Introduction</text>
    <rect x="84" y="186" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="203">2 &#183; Goals (success metrics)</text>
    <rect x="84" y="216" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="233">3 &#183; Tenets (guiding pillars)</text>
    <rect x="84" y="246" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="263">4 &#183; State of the business</text>
    <rect x="84" y="276" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="293">5 &#183; Lessons learned</text>
    <rect x="84" y="306" width="230" height="26" rx="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="94" y="323">6 &#183; Strategic priorities</text>
  </g>
  <text x="84" y="350" font-family="sans-serif" font-size="11" fill="#5b6680">+ appendix: data, graphs, examples</text>

  <!-- Right: PR/FAQ -->
  <rect x="346" y="100" width="262" height="262" rx="10" fill="#f4f7ff" stroke="#1d2438" stroke-width="2"/>
  <text x="362" y="126" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">PR / FAQ</text>
  <text x="362" y="145" font-family="sans-serif" font-size="11" fill="#5b6680">Future-dated &#8212; written as if already launched</text>

  <rect x="362" y="156" width="230" height="76" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="374" y="176" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">Press Release</text>
  <text x="374" y="195" font-family="sans-serif" font-size="11" fill="#5b6680">Headline &#183; the customer problem</text>
  <text x="374" y="212" font-family="sans-serif" font-size="11" fill="#5b6680">the solution &#183; the benefit</text>
  <text x="374" y="227" font-family="sans-serif" font-size="11" fill="#5b6680">a customer quote</text>

  <rect x="362" y="244" width="230" height="100" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="374" y="264" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">FAQ</text>
  <text x="374" y="283" font-family="sans-serif" font-size="11" fill="#5b6680">Customer-facing: who, why, cost</text>
  <text x="374" y="302" font-family="sans-serif" font-size="11" fill="#5b6680">Internal: tech, economics, risks,</text>
  <text x="374" y="319" font-family="sans-serif" font-size="11" fill="#5b6680">dependencies, hard questions</text>

  <text x="32" y="385" font-family="sans-serif" font-size="11" fill="#5b6680">Forces deep thinking &#8226; vets the idea before a line of code is written</text>
</svg>
