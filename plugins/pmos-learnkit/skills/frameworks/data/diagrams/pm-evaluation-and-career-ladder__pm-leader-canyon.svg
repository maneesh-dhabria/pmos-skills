<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PM Leader Canyon diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">PM Leader Canyon</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12.5" fill="#5b6680">Four transitions to cross from senior PM into product leadership</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <g font-family="sans-serif">
    <!-- canyon walls -->
    <path d="M150 78 L150 372 L120 372 L96 200 L120 78 Z" fill="#f4f7ff" stroke="#94a3b8" stroke-width="1"/>
    <path d="M490 78 L490 372 L520 372 L544 200 L520 78 Z" fill="#f4f7ff" stroke="#94a3b8" stroke-width="1"/>
    <text x="100" y="60" font-size="12.5" font-weight="700" fill="#2563eb" text-anchor="middle">Senior PM</text>
    <text x="540" y="60" font-size="12.5" font-weight="700" fill="#0ea5a4" text-anchor="middle">Product Leader</text>
    <text x="320" y="386" font-size="11" fill="#5b6680" text-anchor="middle">the canyon — needs new muscles, skills &amp; tools</text>

    <!-- four transition bridges -->
    <g>
      <line x1="152" y1="100" x2="488" y2="100" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <rect x="200" y="84" width="240" height="0" fill="none"/>
      <text x="320" y="95" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Depth</tspan> in one area → <tspan font-weight="700">Breadth</tspan> across many</text>
    </g>
    <g>
      <line x1="152" y1="170" x2="488" y2="170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <text x="320" y="165" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Doing</tspan> the job well → <tspan font-weight="700">Training</tspan> others</text>
    </g>
    <g>
      <line x1="152" y1="240" x2="488" y2="240" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <text x="320" y="227" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Using</tspan> the resources you have →</text>
      <text x="320" y="244" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Allocating</tspan> resources &amp; influencing</text>
    </g>
    <g>
      <line x1="152" y1="310" x2="488" y2="310" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow)"/>
      <text x="320" y="297" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Personal</tspan> scope →</text>
      <text x="320" y="314" font-size="12.5" fill="#1d2438" text-anchor="middle"><tspan font-weight="700">Creating scope</tspan> for the org</text>
    </g>
  </g>
</svg>
