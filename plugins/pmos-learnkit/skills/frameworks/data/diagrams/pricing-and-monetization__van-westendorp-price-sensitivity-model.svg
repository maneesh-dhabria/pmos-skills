<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Van Westendorp Price Sensitivity Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Van Westendorp Price Sensitivity Model</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">4 survey questions plotted as cumulative curves over price</text>

  <!-- plot frame -->
  <g>
    <line x1="90" y1="90" x2="90" y2="320" stroke="#1d2438" stroke-width="1.5"/>
    <line x1="90" y1="320" x2="560" y2="320" stroke="#1d2438" stroke-width="1.5"/>
    <text x="40" y="210" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(-90 40 210)" text-anchor="middle">% of respondents</text>
    <text x="325" y="345" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Price &#8594;</text>
  </g>

  <!-- Too cheap: high at low price, falls (red) -->
  <polyline points="90,110 200,150 320,230 440,295 560,312" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Not a bargain / cheap (rises with price) (teal) -->
  <polyline points="90,312 200,290 320,210 440,135 560,108" fill="none" stroke="#0ea5a4" stroke-width="2.5"/>
  <!-- Not expensive / moderate (falls) (amber) -->
  <polyline points="90,118 200,160 320,250 440,300 560,314" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- Too expensive (rises) (accent) -->
  <polyline points="90,314 200,300 320,225 440,150 560,112" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- Optimum Price Point: too cheap x too expensive -->
  <circle cx="320" cy="228" r="6" fill="#1d2438"/>
  <text x="320" y="200" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">OPP</text>
  <text x="320" y="186" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">Optimum Price Point</text>

  <!-- Point of Marginal Cheapness (lower bound): too cheap x not a bargain -->
  <circle cx="252" cy="263" r="5" fill="#0ea5a4"/>
  <text x="245" y="288" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">Marginal</text>
  <text x="245" y="299" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">Cheapness</text>

  <!-- Point of Marginal Expensiveness (upper bound): too expensive x not expensive -->
  <circle cx="392" cy="190" r="5" fill="#2563eb"/>
  <text x="425" y="172" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">Marginal</text>
  <text x="425" y="183" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">Expensiveness</text>

  <!-- acceptable price band -->
  <rect x="252" y="90" width="140" height="230" fill="#2563eb" opacity="0.06"/>
  <text x="322" y="84" font-family="sans-serif" font-size="9" fill="#2563eb" text-anchor="middle" font-weight="700">acceptable price range</text>

  <!-- legend -->
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <rect x="92" y="362" width="14" height="3" fill="#ef4444"/>
    <text x="110" y="366">Too cheap</text>
    <rect x="185" y="362" width="14" height="3" fill="#0ea5a4"/>
    <text x="203" y="366">Not a bargain</text>
    <rect x="300" y="362" width="14" height="3" fill="#f59e0b"/>
    <text x="318" y="366">Not expensive</text>
    <rect x="415" y="362" width="14" height="3" fill="#2563eb"/>
    <text x="433" y="366">Too expensive</text>
  </g>
</svg>
