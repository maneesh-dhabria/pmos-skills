<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Digital Marketing Channels diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Digital Marketing Channels</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11" fill="#5b6680">Ways to reach and convert your target audience, grouped by intent</text>

  <!-- Three columns by buyer intent -->
  <g font-family="sans-serif">
    <!-- Pull / discovery -->
    <rect x="24" y="66" width="190" height="26" rx="6" fill="#2563eb"/>
    <text x="119" y="84" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Search &amp; Content (pull)</text>

    <rect x="24" y="100" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="118" font-size="11" font-weight="600" fill="#1d2438">SEO</text>
    <text x="34" y="134" font-size="9" fill="#5b6680">Rank organically in search</text>

    <rect x="24" y="152" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="170" font-size="11" font-weight="600" fill="#1d2438">Content marketing</text>
    <text x="34" y="186" font-size="9" fill="#5b6680">Blogs, video, infographics</text>

    <rect x="24" y="204" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="222" font-size="11" font-weight="600" fill="#1d2438">SEM / Paid search (PPC)</text>
    <text x="34" y="238" font-size="9" fill="#5b6680">Pay-per-click on keywords</text>

    <rect x="24" y="256" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="274" font-size="11" font-weight="600" fill="#1d2438">Email marketing</text>
    <text x="34" y="290" font-size="9" fill="#5b6680">Targeted subscriber sends</text>
  </g>

  <g font-family="sans-serif">
    <!-- Push / awareness -->
    <rect x="225" y="66" width="190" height="26" rx="6" fill="#0ea5a4"/>
    <text x="320" y="84" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Paid &amp; Social (push)</text>

    <rect x="225" y="100" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="235" y="118" font-size="11" font-weight="600" fill="#1d2438">Social &#8212; organic</text>
    <text x="235" y="134" font-size="9" fill="#5b6680">Posts that build audience</text>

    <rect x="225" y="152" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="235" y="170" font-size="11" font-weight="600" fill="#1d2438">Social &#8212; paid</text>
    <text x="235" y="186" font-size="9" fill="#5b6680">Targeted ads, retargeting</text>

    <rect x="225" y="204" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="235" y="222" font-size="11" font-weight="600" fill="#1d2438">Display &amp; video</text>
    <text x="235" y="238" font-size="9" fill="#5b6680">Banners, CPM auctions</text>

    <rect x="225" y="256" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="235" y="274" font-size="11" font-weight="600" fill="#1d2438">Influencer marketing</text>
    <text x="235" y="290" font-size="9" fill="#5b6680">Borrow a creator's audience</text>
  </g>

  <g font-family="sans-serif">
    <!-- Earned / partner -->
    <rect x="426" y="66" width="190" height="26" rx="6" fill="#f59e0b"/>
    <text x="521" y="84" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">Earned &amp; Partner</text>

    <rect x="426" y="100" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="436" y="118" font-size="11" font-weight="600" fill="#1d2438">Word of mouth / referral</text>
    <text x="436" y="134" font-size="9" fill="#5b6680">Person-to-person spread</text>

    <rect x="426" y="152" width="190" height="46" rx="6" fill="#f4f7ff" stroke="#f59e0b"/>
    <text x="436" y="170" font-size="11" font-weight="600" fill="#1d2438">Affiliate marketing</text>
    <text x="436" y="186" font-size="9" fill="#5b6680">Commission on each sale</text>

    <rect x="426" y="204" width="190" height="98" rx="6" fill="#ffffff" stroke="#5b6680" stroke-dasharray="3 3"/>
    <text x="436" y="224" font-size="10" font-weight="600" fill="#1d2438">Pick a mix by:</text>
    <text x="436" y="244" font-size="9.5" fill="#5b6680">&#8226; Where your audience is</text>
    <text x="436" y="262" font-size="9.5" fill="#5b6680">&#8226; Pull (intent) vs push (reach)</text>
    <text x="436" y="280" font-size="9.5" fill="#5b6680">&#8226; CPM / PPC / commission cost</text>
    <text x="436" y="298" font-size="9.5" fill="#5b6680">&#8226; Trust earned vs paid for</text>
  </g>

  <line x1="24" y1="324" x2="616" y2="324" stroke="#e2e8f0"/>
  <text x="320" y="346" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Each channel has its own strengths and weaknesses &#8212; most growth uses several together.</text>
</svg>
