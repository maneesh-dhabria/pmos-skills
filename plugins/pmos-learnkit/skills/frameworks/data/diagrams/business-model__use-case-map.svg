<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Use Case Map diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Use Case Map</text>
  <text x="20" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Why the product exists — 5 components fill one sentence</text>

  <!-- Sentence frame -->
  <rect x="20" y="66" width="600" height="56" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
  <text x="32" y="88" font-family="sans-serif" font-size="12" fill="#1d2438">
    Our <tspan fill="#5b6680">[product]</tspan> targets <tspan font-weight="700" fill="#2563eb">[Persona]</tspan> to solve <tspan font-weight="700" fill="#ef4444">[Problem]</tspan>
  </text>
  <text x="32" y="108" font-family="sans-serif" font-size="12" fill="#1d2438">
    they hit every <tspan font-weight="700" fill="#f59e0b">[Frequency]</tspan>. They use <tspan font-weight="700" fill="#5b6680">[Alternatives]</tspan> today; we differ by <tspan font-weight="700" fill="#0ea5a4">[Value]</tspan>.
  </text>

  <!-- 5 component rows -->
  <g font-family="sans-serif">
    <!-- Problem -->
    <rect x="20" y="134" width="600" height="44" rx="5" fill="#fff0f0" stroke="#ef4444"/>
    <circle cx="44" cy="156" r="13" fill="#ef4444"/>
    <text x="44" y="161" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <text x="68" y="152" font-size="13" font-weight="700" fill="#1d2438">Problem</text>
    <text x="68" y="168" font-size="11" fill="#5b6680">In the user's words — Outcome · Motivation · Gap</text>

    <!-- Persona -->
    <rect x="20" y="184" width="600" height="44" rx="5" fill="#eef4ff" stroke="#2563eb"/>
    <circle cx="44" cy="206" r="13" fill="#2563eb"/>
    <text x="44" y="211" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <text x="68" y="202" font-size="13" font-weight="700" fill="#1d2438">Persona</text>
    <text x="68" y="218" font-size="11" fill="#5b6680">Attributes · Focus / Future segments · Anti-personas (B2B: user vs decider)</text>

    <!-- Alternatives -->
    <rect x="20" y="234" width="600" height="44" rx="5" fill="#f4f5f7" stroke="#5b6680"/>
    <circle cx="44" cy="256" r="13" fill="#5b6680"/>
    <text x="44" y="261" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <text x="68" y="252" font-size="13" font-weight="700" fill="#1d2438">Alternatives</text>
    <text x="68" y="268" font-size="11" fill="#5b6680">How they cope without you — Direct &amp; Indirect (incl. offline) competition</text>

    <!-- Frequency -->
    <rect x="20" y="284" width="600" height="44" rx="5" fill="#fff7e8" stroke="#f59e0b"/>
    <circle cx="44" cy="306" r="13" fill="#f59e0b"/>
    <text x="44" y="311" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <text x="68" y="302" font-size="13" font-weight="700" fill="#1d2438">Frequency</text>
    <text x="68" y="318" font-size="11" fill="#5b6680">How often the problem recurs — daily…yearly · power / core / casual users</text>

    <!-- Value -->
    <rect x="20" y="334" width="600" height="44" rx="5" fill="#eaf6f6" stroke="#0ea5a4"/>
    <circle cx="44" cy="356" r="13" fill="#0ea5a4"/>
    <text x="44" y="361" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
    <text x="68" y="352" font-size="13" font-weight="700" fill="#1d2438">Value</text>
    <text x="68" y="368" font-size="11" fill="#5b6680">Why pick you — Motivation (personal/financial/social) · USP + 3-5 benefits</text>
  </g>
</svg>
