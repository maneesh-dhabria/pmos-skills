<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Marginal Churn Contribution diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Marginal Churn Contribution (MCC)</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Allocate bundle revenue by churn impact, not by usage. &#8220;If I remove product X, how many leave?&#8221;</text>

  <!-- the two questions -->
  <g font-family="sans-serif">
    <rect x="24" y="68" width="288" height="50" rx="8" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="36" y="88" font-size="11" font-weight="700" fill="#ef4444">Remove X &#8594; churn?</text>
    <text x="36" y="106" font-size="10.5" fill="#5b6680">MCC: subscribers lost if X is dropped.</text>
    <rect x="328" y="68" width="288" height="50" rx="8" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="340" y="88" font-size="11" font-weight="700" fill="#0ea5a4">Add X &#8594; acquire?</text>
    <text x="340" y="106" font-size="10.5" fill="#5b6680">MSacC: new subs won if X is added.</text>
  </g>

  <!-- ESPN vs History Channel: usage equal, churn 20x apart -->
  <text x="24" y="146" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Worked example &#8212; same usage, 20&#215; different churn</text>

  <g font-family="sans-serif">
    <!-- ESPN -->
    <rect x="24" y="158" width="592" height="60" rx="8" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="40" y="184" font-size="12" font-weight="700" fill="#1d2438">ESPN</text>
    <text x="40" y="202" font-size="10" fill="#5b6680">same usage</text>
    <!-- churn bar (long) -->
    <rect x="150" y="172" width="430" height="16" rx="4" fill="#ef4444"/>
    <text x="566" y="184" font-size="10.5" font-weight="700" fill="#ffffff" text-anchor="end">high MCC &#8594; ~10M would churn</text>
    <text x="150" y="208" font-size="10" fill="#5b6680">carriage fee 20&#215; higher</text>

    <!-- History Channel -->
    <rect x="24" y="226" width="592" height="60" rx="8" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="40" y="252" font-size="12" font-weight="700" fill="#1d2438">History Ch.</text>
    <text x="40" y="270" font-size="10" fill="#5b6680">same usage</text>
    <!-- churn bar (short, 1/20) -->
    <rect x="150" y="240" width="22" height="16" rx="4" fill="#f59e0b"/>
    <text x="182" y="252" font-size="10.5" font-weight="700" fill="#5b6680">low MCC &#8594; few would churn</text>
    <text x="150" y="276" font-size="10" fill="#5b6680">carriage fee 1/20th of ESPN</text>
  </g>

  <!-- conclusion / spreading cost -->
  <rect x="24" y="300" width="592" height="44" rx="8" fill="#2563eb"/>
  <text x="40" y="320" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Spread the SuperFan value across the whole base</text>
  <text x="40" y="336" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">$6B ESPN churn risk &#247; 100M households &#8594; ~$60/yr ($5/mo) carriage fee for all.</text>

  <rect x="24" y="350" width="592" height="24" rx="6" fill="#f4f7ff"/>
  <text x="36" y="366" font-family="sans-serif" font-size="10.5" fill="#5b6680">When MCC is hard to measure, approximate price by <tspan font-weight="700" fill="#1d2438">SuperFan%</tspan>. The bundle is optimal when churn-based and SuperFan%-based shares agree.</text>
</svg>
