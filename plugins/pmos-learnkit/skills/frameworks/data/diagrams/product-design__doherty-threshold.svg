<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Doherty Threshold diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="40" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Doherty Threshold</text>
  <text x="40" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Response under ~400ms keeps users in flow; above it, attention leaks.</text>

  <!-- axes -->
  <line x1="90" y1="100" x2="90" y2="330" stroke="#1d2438" stroke-width="2"/>
  <line x1="90" y1="330" x2="600" y2="330" stroke="#1d2438" stroke-width="2"/>
  <text x="40" y="215" font-family="sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 40 215)">Engagement / flow</text>
  <text x="300" y="368" font-family="sans-serif" font-size="12" fill="#5b6680">System response time</text>

  <!-- threshold line at 400ms -->
  <line x1="320" y1="100" x2="320" y2="330" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="328" y="120" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444">~400ms threshold</text>

  <!-- engagement curve: high & flat below, dropping above -->
  <path d="M90 140 L320 140 C400 150 470 250 600 300" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- below-threshold zone -->
  <rect x="90" y="100" width="230" height="230" fill="#f4f7ff"/>
  <line x1="90" y1="100" x2="90" y2="330" stroke="#1d2438" stroke-width="2"/>
  <text x="120" y="200" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">In flow</text>
  <text x="120" y="220" font-family="sans-serif" font-size="12" fill="#5b6680">instant, addictive,</text>
  <text x="120" y="236" font-family="sans-serif" font-size="12" fill="#5b6680">productivity soars</text>

  <!-- redraw curve over panel -->
  <path d="M90 140 L320 140 C400 150 470 250 600 300" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- above-threshold zone -->
  <text x="430" y="180" font-family="sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Wait &amp; drift</text>
  <text x="430" y="200" font-family="sans-serif" font-size="12" fill="#5b6680">attention breaks,</text>
  <text x="430" y="216" font-family="sans-serif" font-size="12" fill="#5b6680">task abandoned</text>

  <!-- tick labels -->
  <text x="305" y="348" font-family="sans-serif" font-size="11" fill="#5b6680">400ms</text>
  <text x="86" y="348" font-family="sans-serif" font-size="11" fill="#5b6680">0</text>
</svg>
