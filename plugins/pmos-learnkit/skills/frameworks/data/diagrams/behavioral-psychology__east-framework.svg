<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="EAST Framework diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="40" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">EAST Framework</text>
  <text x="40" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">To encourage a behaviour, make it Easy · Attractive · Social · Timely</text>

  <!-- E -->
  <rect x="40" y="80" width="270" height="135" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="72" cy="112" r="18" fill="#2563eb"/>
  <text x="72" y="119" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">E</text>
  <text x="102" y="110" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Easy</text>
  <text x="102" y="130" font-family="sans-serif" font-size="11.5" fill="#5b6680">Reduce friction; harness defaults</text>
  <text x="60" y="158" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Pre-fill, auto-enroll, fewer steps</text>
  <text x="60" y="178" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Simplify the message &amp; the ask</text>
  <text x="60" y="198" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Make the desired path the default</text>

  <!-- A -->
  <rect x="330" y="80" width="270" height="135" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <circle cx="362" cy="112" r="18" fill="#0ea5a4"/>
  <text x="362" y="119" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="392" y="110" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Attractive</text>
  <text x="392" y="130" font-family="sans-serif" font-size="11.5" fill="#5b6680">Draw attention; design rewards</text>
  <text x="350" y="158" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Personalise; use salient cues</text>
  <text x="350" y="178" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Images, colour, novelty</text>
  <text x="350" y="198" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Well-timed incentives</text>

  <!-- S -->
  <rect x="40" y="230" width="270" height="135" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="72" cy="262" r="18" fill="#f59e0b"/>
  <text x="72" y="269" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
  <text x="102" y="260" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Social</text>
  <text x="102" y="280" font-family="sans-serif" font-size="11.5" fill="#5b6680">Show that others do it</text>
  <text x="60" y="308" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Social proof &amp; norms</text>
  <text x="60" y="328" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Networks; public commitments</text>
  <text x="60" y="348" font-family="sans-serif" font-size="11.5" fill="#5b6680">• “9 of 10 people pay on time”</text>

  <!-- T -->
  <rect x="330" y="230" width="270" height="135" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="362" cy="262" r="18" fill="#ef4444"/>
  <text x="362" y="269" font-family="sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">T</text>
  <text x="392" y="260" font-family="sans-serif" font-size="16" font-weight="700" fill="#1d2438">Timely</text>
  <text x="392" y="280" font-family="sans-serif" font-size="11.5" fill="#5b6680">Prompt at the right moment</text>
  <text x="350" y="308" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Hit moments of openness</text>
  <text x="350" y="328" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Consider immediate costs/benefits</text>
  <text x="350" y="348" font-family="sans-serif" font-size="11.5" fill="#5b6680">• Help plan the response</text>
</svg>
