<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three Factors Driving Motivation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Three Factors Driving Motivation</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Intrinsic drivers of creative work &#8212; not carrot &amp; stick</text>

  <!-- three pillars -->
  <g font-family="sans-serif">
    <!-- Autonomy -->
    <rect x="36" y="74" width="180" height="150" rx="12" fill="#2563eb"/>
    <text x="126" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Autonomy</text>
    <line x1="66" y1="124" x2="186" y2="124" stroke="#dbe6ff" stroke-width="1"/>
    <text x="126" y="148" text-anchor="middle" font-size="11" fill="#dbe6ff">freedom to choose</text>
    <text x="126" y="166" text-anchor="middle" font-size="11" fill="#dbe6ff">how &amp; what you work on</text>
    <text x="126" y="200" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="700">"self-direction"</text>

    <!-- Mastery -->
    <rect x="230" y="74" width="180" height="150" rx="12" fill="#0ea5a4"/>
    <text x="320" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Mastery</text>
    <line x1="260" y1="124" x2="380" y2="124" stroke="#d6f5f4" stroke-width="1"/>
    <text x="320" y="148" text-anchor="middle" font-size="11" fill="#d6f5f4">urge to improve and</text>
    <text x="320" y="166" text-anchor="middle" font-size="11" fill="#d6f5f4">get better at something</text>
    <text x="320" y="200" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="700">"progress &amp; skill"</text>

    <!-- Purpose -->
    <rect x="424" y="74" width="180" height="150" rx="12" fill="#f59e0b"/>
    <text x="514" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#1d2438">Purpose</text>
    <line x1="454" y1="124" x2="574" y2="124" stroke="#3a2e10" stroke-width="1" opacity="0.4"/>
    <text x="514" y="148" text-anchor="middle" font-size="11" fill="#3a2e10">work serves something</text>
    <text x="514" y="166" text-anchor="middle" font-size="11" fill="#3a2e10">larger than yourself</text>
    <text x="514" y="200" text-anchor="middle" font-size="10" fill="#1d2438" font-weight="700">"meaning"</text>
  </g>

  <!-- result bar -->
  <rect x="36" y="238" width="568" height="34" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="320" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">&#8594; sustained high performance &amp; satisfaction on creative, knowledge work</text>

  <!-- Motivation evolution ladder -->
  <text x="36" y="300" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Motivation evolves:</text>
  <g font-family="sans-serif" font-size="10">
    <rect x="36" y="310" width="176" height="56" rx="8" fill="#ffffff" stroke="#cdd8f0"/>
    <text x="48" y="330" font-weight="700" fill="#5b6680">1.0 &#183; Survival</text>
    <text x="48" y="348" fill="#5b6680">basic biological drive</text>

    <rect x="232" y="310" width="176" height="56" rx="8" fill="#ffffff" stroke="#cdd8f0"/>
    <text x="244" y="330" font-weight="700" fill="#5b6680">2.0 &#183; Reward / punish</text>
    <text x="244" y="345" fill="#5b6680">works for routine tasks;</text>
    <text x="244" y="358" fill="#ef4444">overjustification kills creativity</text>

    <rect x="428" y="310" width="176" height="56" rx="8" fill="#2563eb"/>
    <text x="440" y="330" font-weight="700" fill="#ffffff">3.0 &#183; Intrinsic</text>
    <text x="440" y="345" fill="#dbe6ff">autonomy + mastery</text>
    <text x="440" y="358" fill="#dbe6ff">+ purpose &#8212; for creative work</text>
  </g>

  <!-- arrows between ladder boxes -->
  <line x1="214" y1="338" x2="230" y2="338" stroke="#5b6680" stroke-width="2" marker-end="url(#ma)"/>
  <line x1="410" y1="338" x2="426" y2="338" stroke="#5b6680" stroke-width="2" marker-end="url(#ma)"/>
  <defs>
    <marker id="ma" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
