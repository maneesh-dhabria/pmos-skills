<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Two-tailed A/B test three possible outcomes diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Two-Tailed A/B Test: Three Outcomes</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Compare test variant against control within a threshold</text>

  <!-- Center decision node -->
  <rect x="250" y="78" width="140" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438">Test vs. Control</text>
  <text x="320" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">evaluate result</text>

  <!-- Connectors -->
  <path d="M290 126 L150 200" stroke="#5b6680" stroke-width="1.5" fill="none"/>
  <path d="M320 126 L320 200" stroke="#5b6680" stroke-width="1.5" fill="none"/>
  <path d="M350 126 L490 200" stroke="#5b6680" stroke-width="1.5" fill="none"/>

  <!-- Positive -->
  <rect x="40" y="200" width="180" height="140" rx="8" fill="#ffffff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="130" y="230" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Positive</text>
  <text x="130" y="258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Test &gt; Control</text>
  <text x="130" y="282" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Test performs better</text>
  <text x="130" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">than the control</text>

  <!-- Null -->
  <rect x="230" y="200" width="180" height="140" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="230" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#f59e0b">Null</text>
  <text x="320" y="258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Test ≈ Control</text>
  <text x="320" y="282" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Indistinguishable</text>
  <text x="320" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">within threshold</text>

  <!-- Negative -->
  <rect x="420" y="200" width="180" height="140" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="510" y="230" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#ef4444">Negative</text>
  <text x="510" y="258" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Control &gt; Test</text>
  <text x="510" y="282" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">Control performs</text>
  <text x="510" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680">better than the test</text>

  <text x="320" y="372" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10" fill="#5b6680" font-style="italic">A/B tests reveal direction, not magnitude — they don't quantify how much better or worse.</text>
</svg>
