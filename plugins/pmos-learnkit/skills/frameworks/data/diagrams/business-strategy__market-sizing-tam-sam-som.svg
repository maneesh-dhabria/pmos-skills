<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Market Sizing TAM SAM SOM diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Market Sizing — TAM / SAM / SOM</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Nested estimates of market potential; prefer bottom-up assumptions</text>

  <!-- Concentric circles -->
  <circle cx="230" cy="240" r="135" fill="#2563eb" opacity="0.14" stroke="#2563eb" stroke-width="2"/>
  <circle cx="230" cy="258" r="92" fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4" stroke-width="2"/>
  <circle cx="230" cy="288" r="48" fill="#f59e0b" opacity="0.28" stroke="#f59e0b" stroke-width="2"/>

  <text x="230" y="128" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb">TAM</text>
  <text x="230" y="196" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">SAM</text>
  <text x="230" y="292" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">SOM</text>

  <!-- right-side legend -->
  <rect x="392" y="100" width="216" height="60" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="406" y="124" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">TAM — Total Addressable</text>
  <text x="406" y="144" font-family="sans-serif" font-size="11.5" fill="#1d2438">Largest possible market in $</text>

  <rect x="392" y="170" width="216" height="60" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="406" y="194" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">SAM — Serviceable</text>
  <text x="406" y="214" font-family="sans-serif" font-size="11.5" fill="#1d2438">Narrower slice that fits you</text>

  <rect x="392" y="240" width="216" height="60" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="406" y="264" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">SOM — Obtainable</text>
  <text x="406" y="284" font-family="sans-serif" font-size="11.5" fill="#1d2438">% share you can realistically win</text>

  <!-- bottom-up note -->
  <text x="32" y="386" font-family="sans-serif" font-size="11.5" fill="#5b6680">Bottom-up &gt; top-down: ground in customer definition, revenue model, and GTM — SOM ≈ customers × avg revenue/yr.</text>
</svg>
