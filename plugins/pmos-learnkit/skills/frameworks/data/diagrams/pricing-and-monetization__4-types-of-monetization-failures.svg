<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="4 Types of Monetization Failures diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">4 Types of Monetization Failures</text>

  <!-- axis labels -->
  <text x="320" y="58" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Value captured by the company  &#8594;</text>
  <text x="40" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680" transform="rotate(-90 40 225)">Value delivered to customer  &#8594;</text>

  <!-- low / high tick labels -->
  <text x="180" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Low</text>
  <text x="460" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">High</text>
  <text x="78" y="345" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(-90 78 345)">Low</text>
  <text x="78" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(-90 78 135)">High</text>

  <!-- quadrant grid -->
  <g stroke="#1d2438" stroke-width="1.5" fill="none">
    <rect x="100" y="88" width="500" height="270" rx="6"/>
    <line x1="350" y1="88" x2="350" y2="358"/>
    <line x1="100" y1="223" x2="600" y2="223"/>
  </g>

  <!-- top-left: high value delivered, low captured = Minivations -->
  <rect x="106" y="94" width="238" height="123" rx="5" fill="#fff7e6"/>
  <text x="225" y="120" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Minivation</text>
  <text x="225" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Priced below value</text>
  <text x="225" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">delivered &#8212; money</text>
  <text x="225" y="176" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">left on the table</text>

  <!-- top-right: high value, high captured = Hidden Gem -->
  <rect x="356" y="94" width="238" height="123" rx="5" fill="#e8f7f6"/>
  <text x="475" y="120" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Hidden Gem</text>
  <text x="475" y="142" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Proven demand left</text>
  <text x="475" y="160" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">unmonetized &#8212; fear of</text>
  <text x="475" y="176" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">cannibalization</text>

  <!-- bottom-left: low value, low captured = Undead Product -->
  <rect x="106" y="229" width="238" height="123" rx="5" fill="#fdecec"/>
  <text x="225" y="255" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#ef4444">Undead Product</text>
  <text x="225" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Nobody wants it &#8212;</text>
  <text x="225" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">solves no real need,</text>
  <text x="225" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">no value created</text>

  <!-- bottom-right: low value, high captured = Feature Shock -->
  <rect x="356" y="229" width="238" height="123" rx="5" fill="#eef3ff"/>
  <text x="475" y="255" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Feature Shock</text>
  <text x="475" y="277" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d2438">Too many features</text>
  <text x="475" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">inflate price past</text>
  <text x="475" y="311" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">willingness to pay</text>

  <text x="320" y="386" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Avoid via early WTP conversations, segmentation, good/better/best bundling &amp; deliberate pricing strategy</text>
</svg>
