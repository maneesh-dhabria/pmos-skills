<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Tiny Habits diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Tiny Habits — B = MAP</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Behavior happens when Motivation, Ability &amp; Prompt converge above the Action Line</text>

  <!-- Action Line graph -->
  <g>
    <!-- axes -->
    <line x1="80" y1="320" x2="80" y2="80" stroke="#1d2438" stroke-width="1.5"/>
    <line x1="80" y1="320" x2="330" y2="320" stroke="#1d2438" stroke-width="1.5"/>
    <text x="62" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" transform="rotate(-90 62 200)" text-anchor="middle">High Motivation</text>
    <text x="205" y="340" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Hard to do  →  Easy to do (Ability)</text>

    <!-- Action line (curve) -->
    <path d="M88 92 Q150 130 200 200 T322 312" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <text x="296" y="128" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="end">Action Line</text>

    <!-- Above region label -->
    <text x="248" y="180" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">ABOVE → behavior happens</text>
    <text x="150" y="296" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">below → it doesn't</text>

    <!-- Prompt dot -->
    <circle cx="244" cy="150" r="6" fill="#2563eb"/>
    <text x="256" y="154" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Prompt fires here</text>
  </g>

  <!-- Right column: anchor recipe -->
  <g>
    <text x="380" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Anatomy of a Tiny Habit</text>

    <rect x="380" y="104" width="232" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="392" y="124" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">1 · Anchor Moment</text>
    <text x="392" y="142" font-family="sans-serif" font-size="11" fill="#5b6680">Existing routine that cues you (after I brush…)</text>

    <rect x="380" y="160" width="232" height="48" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="392" y="180" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">2 · New Tiny Behavior</text>
    <text x="392" y="198" font-family="sans-serif" font-size="11" fill="#5b6680">Shrunk version — floss one tooth, 2 push-ups</text>

    <rect x="380" y="216" width="232" height="48" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="392" y="236" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">3 · Instant Celebration</text>
    <text x="392" y="254" font-family="sans-serif" font-size="11" fill="#5b6680">Positive emotion now wires the habit in</text>

    <!-- arrows between -->
    <line x1="496" y1="152" x2="496" y2="160" stroke="#5b6680" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="496" y1="208" x2="496" y2="216" stroke="#5b6680" stroke-width="1.5" marker-end="url(#a)"/>
  </g>

  <!-- bottom takeaway -->
  <text x="80" y="380" font-family="sans-serif" font-size="11" fill="#5b6680">Motivation is fickle — make the behavior easier (raise Ability), then celebrate to encode it.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
