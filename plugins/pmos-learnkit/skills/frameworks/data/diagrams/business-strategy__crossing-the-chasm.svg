<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Crossing the Chasm diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Crossing the Chasm</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">The gap between early adopters and the pragmatist mainstream</text>

  <!-- baseline -->
  <line x1="40" y1="300" x2="600" y2="300" stroke="#5b6680" stroke-width="1.5"/>
  <text x="40" y="318" font-family="sans-serif" font-size="10" fill="#5b6680">Time / adoption &#8594;</text>

  <!-- bell-curve segments as adjacent bars on the curve -->
  <!-- Innovators -->
  <rect x="48" y="250" width="84" height="50" fill="#0ea5a4" opacity="0.85"/>
  <text x="90" y="278" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Innovators</text>
  <text x="90" y="240" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Enthusiasts</text>

  <!-- Early Adopters -->
  <rect x="132" y="200" width="84" height="100" fill="#2563eb" opacity="0.9"/>
  <text x="174" y="252" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Early</text>
  <text x="174" y="266" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Adopters</text>
  <text x="174" y="190" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Visionaries</text>

  <!-- THE CHASM gap -->
  <rect x="222" y="120" width="58" height="180" fill="#ffffff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="251" y="200" font-family="sans-serif" font-size="13" font-weight="700" fill="#ef4444" text-anchor="middle" transform="rotate(-90 251 200)">THE CHASM</text>

  <!-- Early Majority -->
  <rect x="286" y="150" width="100" height="150" fill="#2563eb" opacity="0.55"/>
  <text x="336" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Early</text>
  <text x="336" y="236" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Majority</text>
  <text x="336" y="140" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Pragmatists</text>

  <!-- Late Majority -->
  <rect x="386" y="150" width="100" height="150" fill="#f59e0b" opacity="0.55"/>
  <text x="436" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Late</text>
  <text x="436" y="236" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Majority</text>
  <text x="436" y="140" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Conservatives</text>

  <!-- Laggards -->
  <rect x="486" y="240" width="84" height="60" fill="#ef4444" opacity="0.5"/>
  <text x="528" y="274" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Laggards</text>
  <text x="528" y="230" font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">Skeptics</text>

  <!-- early market vs mainstream brackets -->
  <text x="130" y="76" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">EARLY MARKET</text>
  <text x="430" y="76" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">MAINSTREAM MARKET</text>
  <line x1="48" y1="84" x2="216" y2="84" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="286" y1="84" x2="570" y2="84" stroke="#1d2438" stroke-width="1.5"/>

  <!-- beachhead checklist -->
  <rect x="24" y="334" width="592" height="56" rx="8" fill="#f4f7ff"/>
  <text x="36" y="352" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Beachhead checklist (must pass all 4 to cross):</text>
  <g font-family="sans-serif" font-size="11" fill="#5b6680">
    <text x="36" y="372">&#10003; Target Customer</text>
    <text x="186" y="372">&#10003; Compelling Reason to Buy</text>
    <text x="396" y="372">&#10003; Whole Product</text>
    <text x="520" y="372">&#10003; Competition</text>
  </g>
</svg>
