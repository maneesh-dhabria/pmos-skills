<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Workflow lucrativeness ladder and migration path diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#1d2438">Lucrativeness Ladder &amp; Migration Path</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Where to fish first — and where to climb next</text>

  <!-- vertical "more lucrative" axis -->
  <text x="34" y="100" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#5b6680" transform="rotate(-90 34 230)">More lucrative · harder to win</text>
  <line x1="60" y1="350" x2="60" y2="92" stroke="#5b6680" stroke-width="1.5"/>
  <polygon points="60,84 55,96 65,96" fill="#5b6680"/>

  <!-- Rung 1: HiEv (top, widest value) -->
  <rect x="90" y="86" width="440" height="58" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="112" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#2563eb">1 · HiEv — High intensity, everyone</text>
  <text x="110" y="132" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5b6680">Most value &amp; moat. Capital-intensive, highly competitive — invest to win.</text>

  <!-- Rung 2: HiNi -->
  <rect x="120" y="156" width="410" height="54" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="140" y="180" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">2 · HiNi — High intensity, niche</text>
  <text x="140" y="199" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5b6680">Easiest to start &amp; compete. Best on-ramp — then migrate up.</text>

  <!-- Rung 3: LiEv -->
  <rect x="150" y="222" width="380" height="50" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="244" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#f59e0b">3 · LiEv — Low intensity, everyone</text>
  <text x="170" y="262" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5b6680">Great if you dominate it and charge org-wide.</text>

  <!-- Rung 4: LiNi -->
  <rect x="180" y="284" width="350" height="48" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="200" y="305" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#ef4444">4 · LiNi — Low intensity, niche</text>
  <text x="200" y="323" font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5b6680">Only viable with 5–10x superior tech &amp; reliably high price.</text>

  <!-- migration arrow: start HiNi, climb to HiEv -->
  <path d="M 560 183 C 600 183 600 115 545 115" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="545,115 558,110 556,122" fill="#2563eb"/>
  <text x="615" y="150" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" font-weight="700" fill="#2563eb" transform="rotate(90 615 150)">Migrate up once established</text>

  <text x="200" y="362" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Startups: start at HiNi, climb toward HiEv. Move off LiEv / LiNi whenever possible.</text>
</svg>
