<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="ARPU to CAC spectrum diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">The ARPU ↔ CAC Spectrum (Channel/Model Fit)</text>
  <text x="320" y="64" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#5b6680">Your monetization model determines which channels you can afford</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5a4"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="60" y="150" width="520" height="44" rx="22" fill="url(#spec)" opacity="0.85"/>

  <!-- Danger zone marker -->
  <rect x="250" y="142" width="140" height="60" rx="10" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="320" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ef4444">DANGER ZONE</text>

  <!-- Left end -->
  <text x="60" y="234" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Low ARPU</text>
  <text x="60" y="252" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">must use low-CAC channels</text>
  <text x="60" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">virality · UGC SEO · word of mouth</text>

  <!-- Right end -->
  <text x="580" y="234" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">High ARPU</text>
  <text x="580" y="252" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">can afford high-CAC channels</text>
  <text x="580" y="270" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">inside / outbound enterprise sales</text>

  <!-- Danger zone reasons -->
  <rect x="180" y="312" width="280" height="64" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="1"/>
  <text x="320" y="332" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438">Why the middle fails:</text>
  <text x="320" y="350" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">Too much friction for low-CAC channels,</text>
  <text x="320" y="366" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#5b6680">yet ARPU won't support higher-CAC channels.</text>
</svg>
