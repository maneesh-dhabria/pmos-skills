<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="3 Levels of Product Work diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">3 Levels of Product Work</text>
  <text x="20" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Balance all three — mismatched focus across them causes most team conflict</text>

  <!-- pyramid of three stacked tiers -->
  <!-- Optics (top, narrow) -->
  <path d="M280 70 L360 70 L390 130 L250 130 Z" fill="#f59e0b" opacity="0.92"/>
  <text x="320" y="98" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Optics</text>
  <text x="320" y="116" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle">leaders see your contribution</text>

  <!-- Impact (middle) -->
  <path d="M250 134 L390 134 L425 198 L215 198 Z" fill="#0ea5a4" opacity="0.92"/>
  <text x="320" y="162" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Impact</text>
  <text x="320" y="180" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle">effect on business &amp; the org</text>

  <!-- Execution (base, wide) -->
  <path d="M215 202 L425 202 L470 270 L170 270 Z" fill="#2563eb" opacity="0.95"/>
  <text x="320" y="230" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Execution</text>
  <text x="320" y="248" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle">designing &amp; delivering iterations</text>

  <!-- side labels -->
  <g font-family="sans-serif" font-size="10" fill="#5b6680">
    <text x="455" y="100">3 — visibility</text>
    <text x="455" y="166">2 — outcomes</text>
    <text x="490" y="232">1 — the work</text>
  </g>

  <!-- conflict note -->
  <rect x="20" y="294" width="600" height="92" rx="8" fill="#f4f7ff" stroke="#5b6680"/>
  <text x="32" y="316" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Mismatch = conflict</text>
  <g font-family="sans-serif" font-size="10.5" fill="#1d2438">
    <text x="32" y="338">PM fixated on Impact while team grinds on Execution</text>
    <text x="32" y="358">PM playing Optics while team chases Impact</text>
    <text x="32" y="378">Leaders must spot the gap, know their own default, and re-align expectations</text>
  </g>
  <text x="540" y="338" font-family="sans-serif" font-size="10.5" fill="#ef4444" text-anchor="end">e.g. "I shipped against</text>
  <text x="608" y="354" font-family="sans-serif" font-size="10.5" fill="#ef4444" text-anchor="end">the odds" (Execution)</text>
  <text x="608" y="370" font-family="sans-serif" font-size="10.5" fill="#ef4444" text-anchor="end">vs CEO: "not good</text>
  <text x="608" y="386" font-family="sans-serif" font-size="10.5" fill="#ef4444" text-anchor="end">enough" (Impact)</text>
</svg>
