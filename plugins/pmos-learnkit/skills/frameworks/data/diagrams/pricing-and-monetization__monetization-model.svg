<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Monetization Model diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Monetization Model</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Four levers that capture value &#8212; plus the friction each choice carries</text>

  <!-- Four lever cards -->
  <!-- Scale -->
  <g>
    <rect x="36" y="70" width="138" height="118" rx="8" fill="#eef3ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="105" y="96" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Scale</text>
    <text x="105" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">How price scales</text>
    <text x="105" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">with value</text>
    <text x="105" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Features</text>
    <text x="105" y="163" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Usage</text>
    <text x="105" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Outcome</text>
  </g>
  <!-- What -->
  <g>
    <rect x="190" y="70" width="138" height="118" rx="8" fill="#e8f7f6" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="259" y="96" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">What</text>
    <text x="259" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">What customers</text>
    <text x="259" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">pay for</text>
    <text x="259" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Features,</text>
    <text x="259" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">attributes &amp;</text>
    <text x="259" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">value prop</text>
  </g>
  <!-- Amount -->
  <g>
    <rect x="344" y="70" width="138" height="118" rx="8" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="413" y="96" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Amount</text>
    <text x="413" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">How much you</text>
    <text x="413" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">charge</text>
    <text x="413" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">AARPU, set by</text>
    <text x="413" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">WTP &#8212; $0 to</text>
    <text x="413" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">$100k+</text>
  </g>
  <!-- When -->
  <g>
    <rect x="498" y="70" width="138" height="118" rx="8" fill="#eef3ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="567" y="96" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">When</text>
    <text x="567" y="114" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">When you</text>
    <text x="567" y="126" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">charge</text>
    <text x="567" y="150" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Never (free)</text>
    <text x="567" y="165" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Transactional</text>
    <text x="567" y="180" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Recurring</text>
  </g>

  <!-- Friction spectrum -->
  <text x="320" y="240" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Monetization Friction Spectrum</text>
  <defs>
    <linearGradient id="fric" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5a4"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect x="60" y="258" width="520" height="22" rx="11" fill="url(#fric)"/>
  <text x="64" y="302" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4">Low friction</text>
  <text x="576" y="302" text-anchor="end" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444">High friction</text>
  <text x="64" y="318" font-family="sans-serif" font-size="10" fill="#5b6680">easier to convert &amp; engage</text>
  <text x="576" y="318" text-anchor="end" font-family="sans-serif" font-size="10" fill="#5b6680">harder to convert</text>

  <!-- example markers along spectrum -->
  <g font-family="sans-serif" font-size="10" fill="#1d2438">
    <line x1="120" y1="280" x2="120" y2="338" stroke="#5b6680" stroke-width="1"/>
    <text x="120" y="352" text-anchor="middle">Freemium</text>
    <line x1="320" y1="280" x2="320" y2="338" stroke="#5b6680" stroke-width="1"/>
    <text x="320" y="352" text-anchor="middle">Usage / pay-go</text>
    <line x1="520" y1="280" x2="520" y2="338" stroke="#5b6680" stroke-width="1"/>
    <text x="520" y="352" text-anchor="middle">Upfront enterprise</text>
  </g>
  <text x="320" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">A monetization model = Scale &#215; What &#215; Amount &#215; When, tuned for the lowest viable friction</text>
</svg>
