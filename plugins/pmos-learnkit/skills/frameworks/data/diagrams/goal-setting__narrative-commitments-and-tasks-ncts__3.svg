<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="NCTs versus OKRs decision diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="36" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">NCTs or OKRs? When to Choose</text>

  <!-- Decision diamond -->
  <polygon points="320,62 408,108 320,154 232,108" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="102" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#1d2438">New product,</text>
  <text x="320" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#1d2438">small team, or</text>
  <text x="320" y="134" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#1d2438">missing context?</text>

  <!-- Branch labels -->
  <line x1="232" y1="108" x2="150" y2="170" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="408" y1="108" x2="490" y2="170" stroke="#5b6680" stroke-width="1.5"/>
  <text x="178" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">YES</text>
  <text x="462" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#5b6680">NO</text>

  <!-- Left card: NCTs -->
  <rect x="40" y="172" width="240" height="190" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2.5"/>
  <text x="160" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#0ea5a4">Use NCTs</text>
  <text x="60" y="234" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• More flexible framework</text>
  <text x="60" y="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Narrative carries the “why”</text>
  <text x="60" y="286" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Fits exploration &amp;</text>
  <text x="74" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">new market opportunities</text>
  <text x="60" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Commitments keep it</text>
  <text x="74" y="348" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">measurable</text>

  <!-- Right card: OKRs -->
  <rect x="360" y="172" width="240" height="190" rx="12" fill="#ffffff" stroke="#5b6680" stroke-width="2"/>
  <text x="480" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#5b6680">Stay on OKRs</text>
  <text x="380" y="234" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Established product</text>
  <text x="380" y="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Shared context already</text>
  <text x="394" y="278" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">in place</text>
  <text x="380" y="304" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Objective + Key Results</text>
  <text x="380" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">• Common across mature</text>
  <text x="394" y="348" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#1d2438">product teams</text>
</svg>
