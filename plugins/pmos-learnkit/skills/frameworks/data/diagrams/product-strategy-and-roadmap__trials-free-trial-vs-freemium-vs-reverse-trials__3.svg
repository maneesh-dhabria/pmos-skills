<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Reverse trial dual-bucket conversion diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Why a Reverse Trial Captures Both Buckets</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">No hard cut-off, so non-payers still feed growth loops</text>

  <!-- entry node -->
  <rect x="40" y="170" width="150" height="70" rx="10" fill="#fffaf0" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b">Reverse trial</text>
  <text x="115" y="214" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">freemium + timed</text>
  <text x="115" y="226" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">access to paid features</text>

  <!-- split arrows -->
  <g stroke="#cfd8e8" stroke-width="2" fill="none" marker-end="url(#ah)">
    <path d="M190 192 C 260 150, 300 130, 372 130"/>
    <path d="M190 218 C 260 260, 300 280, 372 280"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#cfd8e8"/>
    </marker>
  </defs>

  <!-- when timer ends label -->
  <text x="262" y="206" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#5b6680">when the timer ends…</text>

  <!-- TOP bucket: pay -->
  <rect x="372" y="100" width="228" height="60" rx="10" fill="#eff4ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="486" y="124" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">~15% convert to paid</text>
  <text x="486" y="142" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#5b6680">saw the value of paid features — free-trial-grade rate</text>

  <!-- BOTTOM bucket: stay free -->
  <rect x="372" y="250" width="228" height="60" rx="10" fill="#ecfeff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="486" y="274" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">~25% stay on freemium</text>
  <text x="486" y="292" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#5b6680">not cut off — keep using and driving product usage</text>

  <!-- growth loop callout -->
  <rect x="372" y="330" width="228" height="44" rx="8" fill="#f4f7ff" stroke="#cfd8e8" stroke-width="1"/>
  <text x="486" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#1d2438">Both buckets feed growth loops</text>
  <text x="486" y="365" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">payers + active free users = more participants. e.g. Airtable</text>

  <!-- vs note left -->
  <text x="115" y="300" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">A plain free trial</text>
  <text x="115" y="313" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">loses the non-payers</text>
  <text x="115" y="326" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">at the cut-off.</text>
</svg>
