<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="22 Immutable Laws of Marketing diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">22 Immutable Laws of Marketing</text>
  <text x="320" y="49" text-anchor="middle" font-family="sans-serif" font-size="11.5" fill="#5b6680">22 rules grouped into 5 themes of competitive positioning</text>

  <!-- Column 1: Be First -->
  <rect x="20" y="64" width="146" height="320" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="20" y="64" width="146" height="30" rx="8" fill="#2563eb"/>
  <text x="93" y="84" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Be First</text>
  <text x="30" y="116" font-family="sans-serif" font-size="9.5" fill="#1d2438">1 Leadership</text>
  <text x="30" y="134" font-family="sans-serif" font-size="9.5" fill="#1d2438">2 Category</text>
  <text x="30" y="152" font-family="sans-serif" font-size="9.5" fill="#1d2438">3 Mind</text>

  <!-- Column 2: Perception & Focus -->
  <rect x="172" y="64" width="146" height="320" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <rect x="172" y="64" width="146" height="30" rx="8" fill="#0ea5a4"/>
  <text x="245" y="84" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Mind &amp; Focus</text>
  <text x="182" y="116" font-family="sans-serif" font-size="9.5" fill="#1d2438">4 Perception</text>
  <text x="182" y="134" font-family="sans-serif" font-size="9.5" fill="#1d2438">5 Focus (own a word)</text>
  <text x="182" y="152" font-family="sans-serif" font-size="9.5" fill="#1d2438">6 Exclusivity</text>
  <text x="182" y="170" font-family="sans-serif" font-size="9.5" fill="#1d2438">13 Sacrifice</text>
  <text x="182" y="188" font-family="sans-serif" font-size="9.5" fill="#1d2438">14 Attributes</text>
  <text x="182" y="206" font-family="sans-serif" font-size="9.5" fill="#1d2438">15 Candor</text>
  <text x="182" y="224" font-family="sans-serif" font-size="9.5" fill="#1d2438">16 Singularity</text>

  <!-- Column 3: Market Dynamics -->
  <rect x="324" y="64" width="146" height="320" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="324" y="64" width="146" height="30" rx="8" fill="#f59e0b"/>
  <text x="397" y="84" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Market Dynamics</text>
  <text x="334" y="116" font-family="sans-serif" font-size="9.5" fill="#1d2438">7 Ladder</text>
  <text x="334" y="134" font-family="sans-serif" font-size="9.5" fill="#1d2438">8 Duality</text>
  <text x="334" y="152" font-family="sans-serif" font-size="9.5" fill="#1d2438">9 Opposite</text>
  <text x="334" y="170" font-family="sans-serif" font-size="9.5" fill="#1d2438">10 Division</text>
  <text x="334" y="188" font-family="sans-serif" font-size="9.5" fill="#1d2438">12 Line Extension</text>

  <!-- Column 4: Time & Pitfalls -->
  <rect x="476" y="64" width="146" height="320" rx="8" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
  <rect x="476" y="64" width="146" height="30" rx="8" fill="#ef4444"/>
  <text x="549" y="84" text-anchor="middle" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff">Time &amp; Pitfalls</text>
  <text x="486" y="116" font-family="sans-serif" font-size="9.5" fill="#1d2438">11 Perspective</text>
  <text x="486" y="134" font-family="sans-serif" font-size="9.5" fill="#1d2438">17 Predictability</text>
  <text x="486" y="152" font-family="sans-serif" font-size="9.5" fill="#1d2438">18 Success</text>
  <text x="486" y="170" font-family="sans-serif" font-size="9.5" fill="#1d2438">19 Failure</text>
  <text x="486" y="188" font-family="sans-serif" font-size="9.5" fill="#1d2438">20 Hype</text>
  <text x="486" y="206" font-family="sans-serif" font-size="9.5" fill="#1d2438">21 Acceleration</text>
  <text x="486" y="224" font-family="sans-serif" font-size="9.5" fill="#1d2438">22 Resources</text>
</svg>
