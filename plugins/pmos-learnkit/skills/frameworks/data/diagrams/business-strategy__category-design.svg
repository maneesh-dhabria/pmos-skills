<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Category Design diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Category Design</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Name the problem, condition the market, become the category king</text>

  <!-- Flow: 4 staged steps to a crown -->
  <!-- Step 1 -->
  <rect x="32" y="92" width="170" height="78" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="44" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">1 · Discover</text>
  <text x="44" y="136" font-family="sans-serif" font-size="11.5" fill="#1d2438">Spot a problem</text>
  <text x="44" y="152" font-family="sans-serif" font-size="11.5" fill="#1d2438">the market can't</text>
  <text x="44" y="168" font-family="sans-serif" font-size="11.5" fill="#1d2438">yet name.</text>

  <!-- Step 2 -->
  <rect x="235" y="92" width="170" height="78" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="247" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#0ea5a4">2 · Name</text>
  <text x="247" y="136" font-family="sans-serif" font-size="11.5" fill="#1d2438">Frame &amp; name the</text>
  <text x="247" y="152" font-family="sans-serif" font-size="11.5" fill="#1d2438">category — the</text>
  <text x="247" y="168" font-family="sans-serif" font-size="11.5" fill="#1d2438">POV / POV doc.</text>

  <!-- Step 3 -->
  <rect x="438" y="92" width="170" height="78" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="450" y="116" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b">3 · Condition</text>
  <text x="450" y="136" font-family="sans-serif" font-size="11.5" fill="#1d2438">Lightning-strike</text>
  <text x="450" y="152" font-family="sans-serif" font-size="11.5" fill="#1d2438">moments teach</text>
  <text x="450" y="168" font-family="sans-serif" font-size="11.5" fill="#1d2438">the market.</text>

  <!-- arrows -->
  <path d="M202 131 L233 131" stroke="#5b6680" stroke-width="1.5" marker-end="url(#a)"/>
  <path d="M405 131 L436 131" stroke="#5b6680" stroke-width="1.5" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- Step 4 -> Category King -->
  <rect x="170" y="222" width="300" height="96" rx="10" fill="#2563eb"/>
  <text x="320" y="252" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">4 · Dominate — Category King</text>
  <text x="320" y="276" font-family="sans-serif" font-size="11.5" fill="#ffffff" text-anchor="middle">Define the category, own the demand you created.</text>
  <text x="320" y="298" font-family="sans-serif" font-size="11.5" fill="#ffffff" text-anchor="middle">Kings take ~76% of the category's economics.</text>

  <!-- crown glyph -->
  <path d="M300 200 l8 14 l12 -18 l12 18 l8 -14 l-4 22 l-32 0 z" fill="#f59e0b"/>

  <!-- arrows converging to king -->
  <path d="M117 170 L300 220" stroke="#5b6680" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M320 170 L320 220" stroke="#5b6680" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M523 170 L340 220" stroke="#5b6680" stroke-width="1.2" marker-end="url(#a)"/>

  <text x="320" y="350" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Examples: Salesforce (no-software / cloud CRM) · HubSpot (inbound marketing) · Uber (ridesharing)</text>
  <text x="320" y="372" font-family="sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">Compete on the category you design — not on features inside someone else's.</text>
</svg>
