<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Radical Candor diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Radical Candor</text>
  <text x="32" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Feedback that is kind &amp; clear: Care Personally + Challenge Directly</text>

  <!-- axis labels -->
  <text x="48" y="118" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" transform="rotate(-90 48 230)" text-anchor="middle">Care Personally  &#8594;</text>
  <text x="370" y="394" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">Challenge Directly  &#8594;</text>

  <!-- quadrant grid -->
  <g stroke="#1d2438" stroke-width="1.5">
    <line x1="72" y1="76" x2="72" y2="368"/>
    <line x1="72" y1="368" x2="612" y2="368"/>
  </g>

  <!-- Top-left: Ruinous Empathy (high care, low challenge) -->
  <rect x="74" y="78" width="268" height="143" fill="#fef3c7"/>
  <text x="208" y="118" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Ruinous Empathy</text>
  <text x="208" y="142" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Care, but won't challenge</text>
  <text x="208" y="160" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">&#8594; no accountability</text>

  <!-- Top-right: Radical Candor (ideal) -->
  <rect x="344" y="78" width="266" height="143" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="477" y="115" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">Radical Candor &#9733;</text>
  <text x="477" y="139" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">Care AND challenge</text>
  <text x="477" y="157" font-family="sans-serif" font-size="11" fill="#1d2438" text-anchor="middle">&#8594; supported &amp; accountable</text>

  <!-- Bottom-left: Manipulative Insincerity -->
  <rect x="74" y="223" width="268" height="143" fill="#f4f7ff"/>
  <text x="208" y="270" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Manipulative</text>
  <text x="208" y="289" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">Insincerity</text>
  <text x="208" y="312" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Neither &#8594; toxic, dishonest</text>

  <!-- Bottom-right: Obnoxious Aggression -->
  <rect x="344" y="223" width="266" height="143" fill="#fee2e2"/>
  <text x="477" y="270" font-family="sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="middle">Obnoxious Aggression</text>
  <text x="477" y="294" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Challenge, but no care</text>
  <text x="477" y="312" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">&#8594; hostile, attacking</text>
</svg>
