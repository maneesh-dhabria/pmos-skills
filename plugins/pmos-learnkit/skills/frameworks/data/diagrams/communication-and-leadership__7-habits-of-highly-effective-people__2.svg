<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="P/PC balance diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The P/PC Balance</text>
  <text x="20" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Effectiveness = balancing what you produce against the capacity to keep producing it.</text>

  <!-- Fulcrum / balance beam -->
  <polygon points="320,250 300,300 340,300" fill="#5b6680"/>
  <line x1="120" y1="170" x2="520" y2="170" stroke="#1d2438" stroke-width="4" stroke-linecap="round"/>
  <line x1="320" y1="170" x2="320" y2="250" stroke="#5b6680" stroke-width="3"/>

  <!-- Left pan: P -->
  <line x1="150" y1="170" x2="150" y2="205" stroke="#5b6680" stroke-width="1.5"/>
  <path d="M110 205 Q150 235 190 205 Z" fill="#dbe5ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#2563eb">P</text>
  <text x="150" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Production</text>
  <text x="150" y="242" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">the desired results</text>
  <text x="150" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">you produce now</text>

  <!-- Right pan: PC -->
  <line x1="490" y1="170" x2="490" y2="205" stroke="#5b6680" stroke-width="1.5"/>
  <path d="M450 205 Q490 235 530 205 Z" fill="#d2f3f1" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="490" y="135" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#0ea5a4">PC</text>
  <text x="490" y="225" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Production Capability</text>
  <text x="490" y="242" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">the asset / ability</text>
  <text x="490" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">that produces results</text>

  <!-- Imbalance notes -->
  <rect x="60" y="320" width="240" height="58" rx="6" fill="#f4f7ff" stroke="#ef4444" stroke-width="1"/>
  <text x="180" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Too much P</text>
  <text x="180" y="356" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Overuse the asset; it wears out</text>
  <text x="180" y="370" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">— future results collapse.</text>

  <rect x="340" y="320" width="240" height="58" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
  <text x="460" y="340" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b">Too much PC</text>
  <text x="460" y="356" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Tend the asset endlessly;</text>
  <text x="460" y="370" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">no results are ever harvested.</text>
</svg>
