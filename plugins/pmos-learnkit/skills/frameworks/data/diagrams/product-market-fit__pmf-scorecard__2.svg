<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="PMF scorecard five-step process diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Using the PMF Scorecard: 5-Step Process</text>
  <text x="320" y="56" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">A repeating cadence to align stakeholders on product-market fit</text>

  <!-- connector line -->
  <line x1="70" y1="150" x2="570" y2="150" stroke="#c7d2fe" stroke-width="3"/>

  <!-- Step 1 -->
  <circle cx="70" cy="150" r="26" fill="#2563eb"/>
  <text x="70" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
  <text x="70" y="206" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Strategy</text>
  <text x="70" y="226" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Align on why</text>
  <text x="70" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">PMF matters</text>

  <!-- Step 2 -->
  <circle cx="195" cy="150" r="26" fill="#2563eb"/>
  <text x="195" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
  <text x="195" y="206" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Consensus</text>
  <text x="195" y="226" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Agree KPIs &amp;</text>
  <text x="195" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">thresholds early</text>

  <!-- Step 3 -->
  <circle cx="320" cy="150" r="26" fill="#2563eb"/>
  <text x="320" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">3</text>
  <text x="320" y="206" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Measurement</text>
  <text x="320" y="226" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Capture agreed</text>
  <text x="320" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">KPIs accurately</text>

  <!-- Step 4 -->
  <circle cx="445" cy="150" r="26" fill="#2563eb"/>
  <text x="445" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">4</text>
  <text x="445" y="206" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Progress</text>
  <text x="445" y="226" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Share live via</text>
  <text x="445" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">a dashboard</text>

  <!-- Step 5 -->
  <circle cx="570" cy="150" r="26" fill="#0ea5a4"/>
  <text x="570" y="156" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">5</text>
  <text x="570" y="206" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Review</text>
  <text x="570" y="226" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Re-align on</text>
  <text x="570" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">status, repeat</text>

  <!-- loop-back arrow from Review to Strategy -->
  <path d="M 570 290 C 570 340, 70 340, 70 290" fill="none" stroke="#5b6680" stroke-width="2" stroke-dasharray="6 5"/>
  <polygon points="70,288 64,300 76,300" fill="#5b6680"/>
  <text x="320" y="356" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-style="italic" fill="#5b6680">Repeat the cadence — B2B PMF typically takes 18–24 months</text>
</svg>
