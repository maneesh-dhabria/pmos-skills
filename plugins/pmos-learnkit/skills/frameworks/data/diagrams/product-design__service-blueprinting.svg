<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Service Blueprinting diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Service Blueprinting</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Front-stage above the line of visibility, back-stage below it</text>

  <!-- Lanes -->
  <!-- Physical evidence -->
  <rect x="32" y="74" width="576" height="44" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
  <text x="40" y="100" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">PHYSICAL EVIDENCE</text>
  <rect x="200" y="84" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>
  <rect x="320" y="84" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>
  <rect x="440" y="84" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>

  <!-- Customer actions -->
  <rect x="32" y="122" width="576" height="44" fill="#ffffff" stroke="#5b6680" stroke-width="0.6"/>
  <text x="40" y="148" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">CUSTOMER ACTIONS</text>
  <rect x="200" y="132" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>
  <rect x="320" y="132" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>
  <rect x="440" y="132" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>

  <!-- Line of interaction -->
  <line x1="32" y1="166" x2="608" y2="166" stroke="#1d2438" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="612" y="170" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="end" transform="translate(0,12)"></text>

  <!-- Front-stage -->
  <rect x="32" y="170" width="576" height="44" fill="#ffffff" stroke="#5b6680" stroke-width="0.6"/>
  <text x="40" y="196" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">FRONT-STAGE (onstage contact)</text>
  <rect x="200" y="180" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>
  <rect x="320" y="180" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>
  <rect x="440" y="180" width="80" height="24" fill="#eff4ff" stroke="#2563eb"/>

  <!-- LINE OF VISIBILITY -->
  <line x1="32" y1="216" x2="608" y2="216" stroke="#ef4444" stroke-width="2.5"/>
  <text x="320" y="231" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">LINE OF VISIBILITY</text>

  <!-- Back-stage -->
  <rect x="32" y="236" width="576" height="44" fill="#ffffff" stroke="#5b6680" stroke-width="0.6"/>
  <text x="40" y="262" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b">BACK-STAGE (backstage contact)</text>
  <rect x="200" y="246" width="80" height="24" fill="#fff7ec" stroke="#f59e0b"/>
  <rect x="320" y="246" width="80" height="24" fill="#fff7ec" stroke="#f59e0b"/>
  <rect x="440" y="246" width="80" height="24" fill="#fff7ec" stroke="#f59e0b"/>

  <!-- Line of internal interaction -->
  <line x1="32" y1="280" x2="608" y2="280" stroke="#1d2438" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Support processes -->
  <rect x="32" y="284" width="576" height="44" fill="#f4f7ff" stroke="#5b6680" stroke-width="0.6"/>
  <text x="40" y="310" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">SUPPORT PROCESSES &amp; SYSTEMS</text>
  <rect x="200" y="294" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>
  <rect x="320" y="294" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>
  <rect x="440" y="294" width="80" height="24" fill="#ffffff" stroke="#0ea5a4"/>

  <!-- Time axis arrow -->
  <line x1="200" y1="346" x2="560" y2="346" stroke="#5b6680" stroke-width="1.2" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <text x="200" y="368" font-family="sans-serif" font-size="11" fill="#5b6680">time / steps of the journey  &#8594;</text>
</svg>
