<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Atomic Habits diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Atomic Habits — The Habit Loop</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Four stages, each shaped by one of the four laws of behavior change.</text>

  <!-- loop arrows around center -->
  <g fill="none" stroke="#cbd5f5" stroke-width="2">
    <path d="M 320 130 A 130 110 0 0 1 450 240" marker-end="url(#ah)"/>
    <path d="M 450 240 A 130 110 0 0 1 320 350" marker-end="url(#ah)"/>
    <path d="M 320 350 A 130 110 0 0 1 190 240" marker-end="url(#ah)"/>
    <path d="M 190 240 A 130 110 0 0 1 320 130" marker-end="url(#ah)"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- center label -->
  <text x="320" y="235" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#5b6680">HABIT</text>
  <text x="320" y="252" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#5b6680">LOOP</text>

  <!-- Cue (top) -->
  <g>
    <rect x="248" y="92" width="144" height="56" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="320" y="116" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">1. Cue</text>
    <text x="320" y="135" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Make it obvious</text>
  </g>

  <!-- Craving (right) -->
  <g>
    <rect x="452" y="212" width="156" height="56" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="530" y="236" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">2. Craving</text>
    <text x="530" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Make it attractive</text>
  </g>

  <!-- Response (bottom) -->
  <g>
    <rect x="248" y="332" width="144" height="56" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <text x="320" y="356" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">3. Response</text>
    <text x="320" y="375" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Make it easy</text>
  </g>

  <!-- Reward (left) -->
  <g>
    <rect x="32" y="212" width="156" height="56" rx="10" fill="#f4f7ff" stroke="#ef4444" stroke-width="2"/>
    <text x="110" y="236" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">4. Reward</text>
    <text x="110" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Make it satisfying</text>
  </g>

  <text x="320" y="396" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">1% better every day · build the system, not just the goal · shape identity, not outcomes</text>
</svg>
