<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="3x Explore Expand Extract diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">3x — Explore · Expand · Extract</text>
  <text x="20" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Three stages of product development — each needs different priorities &amp; OKRs</text>

  <!-- axes -->
  <line x1="60" y1="330" x2="620" y2="330" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="60" y1="330" x2="60" y2="90" stroke="#5b6680" stroke-width="1.5"/>
  <text x="40" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" transform="rotate(-90 40 200)">Value of the business</text>
  <text x="340" y="356" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Stage of product development (approx. over time)</text>

  <!-- S-curve: value accrues mostly in extract -->
  <path d="M60,322 C150,318 180,300 210,280 C260,248 280,180 360,150 C440,122 520,110 620,104"
        fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- stage dividers -->
  <line x1="247" y1="90" x2="247" y2="330" stroke="#cdd6ea" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="433" y1="90" x2="433" y2="330" stroke="#cdd6ea" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- stage labels + boxes -->
  <g font-family="sans-serif">
    <!-- Explore -->
    <rect x="68" y="98" width="170" height="78" rx="5" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="78" y="118" font-size="13" font-weight="700" fill="#2563eb">Explore</text>
    <text x="78" y="135" font-size="10" fill="#1d2438">Find product-market fit</text>
    <text x="78" y="149" font-size="10" fill="#5b6680">Validate viable ROI</text>
    <text x="78" y="167" font-size="10" fill="#5b6680">OKR: learning &amp; signal</text>

    <!-- Expand -->
    <rect x="255" y="98" width="170" height="78" rx="5" fill="#fff7e8" stroke="#f59e0b"/>
    <text x="265" y="118" font-size="13" font-weight="700" fill="#f59e0b">Expand</text>
    <text x="265" y="135" font-size="10" fill="#1d2438">Scale reach &amp; revenue</text>
    <text x="265" y="149" font-size="10" fill="#5b6680">Grow market share</text>
    <text x="265" y="167" font-size="10" fill="#5b6680">OKR: growth &amp; quality</text>

    <!-- Extract -->
    <rect x="441" y="98" width="172" height="78" rx="5" fill="#eaf6f6" stroke="#0ea5a4"/>
    <text x="451" y="118" font-size="13" font-weight="700" fill="#0ea5a4">Extract</text>
    <text x="451" y="135" font-size="10" fill="#1d2438">Maximize profit, cut cost</text>
    <text x="451" y="149" font-size="10" fill="#5b6680">Most value accrues here</text>
    <text x="451" y="167" font-size="10" fill="#5b6680">OKR: margin &amp; efficiency</text>
  </g>

  <!-- baseline stage ticks -->
  <text x="153" y="346" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">Explore</text>
  <text x="340" y="346" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle"> </text>
  <text x="527" y="346" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">Extract</text>

  <!-- note -->
  <text x="60" y="384" font-family="sans-serif" font-size="10" fill="#5b6680">Stages are fractal (sub-journeys repeat) · burned out while extracting? deliberately switch back to explore.</text>
</svg>
