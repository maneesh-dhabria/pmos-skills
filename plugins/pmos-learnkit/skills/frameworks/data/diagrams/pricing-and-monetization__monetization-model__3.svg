<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Monetization model friction spectrum diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="42" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">Monetization Model Friction Spectrum</text>
  <text x="32" y="66" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">Lower friction makes it easier for users to convert and engage.</text>

  <!-- gradient bar -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5a4"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1d2438"/>
    </marker>
  </defs>

  <rect x="70" y="150" width="500" height="22" rx="11" fill="url(#g)"/>
  <line x1="60" y1="195" x2="582" y2="195" stroke="#1d2438" stroke-width="1.2" marker-end="url(#a2)"/>

  <!-- low end -->
  <text x="70" y="135" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Low friction</text>
  <text x="70" y="218" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">Free / freemium &#183; usage-based</text>
  <text x="70" y="236" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">no upfront commitment</text>

  <!-- mid -->
  <text x="290" y="135" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#f59e0b" text-anchor="middle">Moderate</text>
  <text x="290" y="218" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680" text-anchor="middle">Transactional /</text>
  <text x="290" y="236" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680" text-anchor="middle">pay-per-use</text>

  <!-- high end -->
  <text x="570" y="135" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#ef4444" text-anchor="end">High friction</text>
  <text x="570" y="218" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680" text-anchor="end">Upfront / annual contract</text>
  <text x="570" y="236" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680" text-anchor="end">enterprise commitment</text>

  <!-- tick marks -->
  <line x1="70" y1="146" x2="70" y2="176" stroke="#ffffff" stroke-width="2"/>
  <line x1="320" y1="146" x2="320" y2="176" stroke="#ffffff" stroke-width="2"/>
  <line x1="570" y1="146" x2="570" y2="176" stroke="#ffffff" stroke-width="2"/>

  <text x="32" y="300" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">Friction rises as the buyer must commit more &#8212; in money, time, or contract length &#8212; before</text>
  <text x="32" y="320" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5b6680">getting value. Weigh conversion ease against revenue certainty for each choice.</text>
</svg>
