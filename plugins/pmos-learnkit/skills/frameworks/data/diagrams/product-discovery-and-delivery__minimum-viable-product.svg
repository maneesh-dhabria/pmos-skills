<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Minimum Viable Product diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Minimum Viable Product</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Smallest version that proves you've solved a real user problem</text>

  <defs>
    <marker id="mvparr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Staged steps ascending -->
  <g font-family="sans-serif">
    <!-- Step 1 -->
    <rect x="24" y="280" width="130" height="80" rx="8" fill="#f4f7ff" stroke="#2563eb"/>
    <circle cx="44" cy="300" r="11" fill="#2563eb"/>
    <text x="44" y="304" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="62" y="304" font-size="12" font-weight="700" fill="#1d2438">Identify</text>
    <text x="34" y="326" font-size="10.5" fill="#5b6680">Define the user</text>
    <text x="34" y="340" font-size="10.5" fill="#5b6680">&amp; their core</text>
    <text x="34" y="354" font-size="10.5" fill="#5b6680">problem</text>

    <!-- Step 2 -->
    <rect x="170" y="218" width="130" height="80" rx="8" fill="#f4f7ff" stroke="#2563eb"/>
    <circle cx="190" cy="238" r="11" fill="#2563eb"/>
    <text x="190" y="242" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="208" y="242" font-size="12" font-weight="700" fill="#1d2438">Hypothesize</text>
    <text x="180" y="264" font-size="10.5" fill="#5b6680">State the riskiest</text>
    <text x="180" y="278" font-size="10.5" fill="#5b6680">assumption to</text>
    <text x="180" y="292" font-size="10.5" fill="#5b6680">validate</text>

    <!-- Step 3 -->
    <rect x="316" y="156" width="130" height="80" rx="8" fill="#f4f7ff" stroke="#0ea5a4"/>
    <circle cx="336" cy="176" r="11" fill="#0ea5a4"/>
    <text x="336" y="180" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="354" y="180" font-size="12" font-weight="700" fill="#1d2438">Build MVP</text>
    <text x="326" y="202" font-size="10.5" fill="#5b6680">Minimum features</text>
    <text x="326" y="216" font-size="10.5" fill="#5b6680">for a meaningful</text>
    <text x="326" y="230" font-size="10.5" fill="#5b6680">experience</text>

    <!-- Step 4 -->
    <rect x="462" y="94" width="154" height="80" rx="8" fill="#f4f7ff" stroke="#f59e0b"/>
    <circle cx="482" cy="114" r="11" fill="#f59e0b"/>
    <text x="482" y="118" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">4</text>
    <text x="500" y="118" font-size="12" font-weight="700" fill="#1d2438">Measure &amp; Learn</text>
    <text x="472" y="140" font-size="10.5" fill="#5b6680">Ship to early adopters,</text>
    <text x="472" y="154" font-size="10.5" fill="#5b6680">get real feedback vs.</text>
    <text x="472" y="168" font-size="10.5" fill="#5b6680">success KPIs</text>
  </g>

  <!-- Ascending arrows between steps -->
  <g stroke="#2563eb" stroke-width="2" fill="none">
    <line x1="154" y1="300" x2="170" y2="280" marker-end="url(#mvparr)"/>
    <line x1="300" y1="238" x2="316" y2="218" marker-end="url(#mvparr)"/>
    <line x1="446" y1="176" x2="462" y2="156" marker-end="url(#mvparr)"/>
  </g>

  <!-- Iterate loop arrow back -->
  <path d="M 539 174 C 539 250, 90 260, 89 280" fill="none" stroke="#5b6680" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#mvparr)"/>
  <text x="320" y="120" font-family="sans-serif" font-size="11" fill="#5b6680" font-style="italic">iterate &#8635;</text>

  <!-- Footer: avoid -->
  <text x="24" y="388" font-family="sans-serif" font-size="11" fill="#ef4444">Not an MVP: a first release with no learning goal &#183; avoid over-building &amp; skipping real users</text>
</svg>
