<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Color Theory diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Color Theory</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Color wheels + harmonies built from the wheel</text>

  <!-- Color wheel (12 hue segments) -->
  <g transform="translate(170,230)">
    <text x="0" y="-120" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">Color wheel</text>
    <!-- 12 sectors via paths; r=92 -->
    <g stroke="#ffffff" stroke-width="2">
      <path d="M0 0 L92 0 A92 92 0 0 1 79.7 46 Z" fill="#ef4444"/>
      <path d="M0 0 L79.7 46 A92 92 0 0 1 46 79.7 Z" fill="#f97316"/>
      <path d="M0 0 L46 79.7 A92 92 0 0 1 0 92 Z" fill="#f59e0b"/>
      <path d="M0 0 L0 92 A92 92 0 0 1 -46 79.7 Z" fill="#eab308"/>
      <path d="M0 0 L-46 79.7 A92 92 0 0 1 -79.7 46 Z" fill="#84cc16"/>
      <path d="M0 0 L-79.7 46 A92 92 0 0 1 -92 0 Z" fill="#0ea5a4"/>
      <path d="M0 0 L-92 0 A92 92 0 0 1 -79.7 -46 Z" fill="#06b6d4"/>
      <path d="M0 0 L-79.7 -46 A92 92 0 0 1 -46 -79.7 Z" fill="#2563eb"/>
      <path d="M0 0 L-46 -79.7 A92 92 0 0 1 0 -92 Z" fill="#4f46e5"/>
      <path d="M0 0 L0 -92 A92 92 0 0 1 46 -79.7 Z" fill="#7c3aed"/>
      <path d="M0 0 L46 -79.7 A92 92 0 0 1 79.7 -46 Z" fill="#c026d3"/>
      <path d="M0 0 L79.7 -46 A92 92 0 0 1 92 0 Z" fill="#e11d48"/>
    </g>
    <circle cx="0" cy="0" r="36" fill="#ffffff"/>
    <text x="0" y="-4" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">hues by</text>
    <text x="0" y="9" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">wavelength</text>
  </g>

  <!-- Wheel models -->
  <g font-family="sans-serif">
    <text x="320" y="90" font-size="12" font-weight="700" fill="#1d2438">Three wheel models</text>
    <g transform="translate(320,104)">
      <rect x="0" y="0" width="300" height="26" rx="4" fill="#f4f7ff"/>
      <text x="10" y="17" font-size="11" font-weight="700" fill="#2563eb">RYB</text>
      <text x="56" y="17" font-size="11" fill="#5b6680">Artists / paint — red, yellow, blue</text>
    </g>
    <g transform="translate(320,134)">
      <rect x="0" y="0" width="300" height="26" rx="4" fill="#f4f7ff"/>
      <text x="10" y="17" font-size="11" font-weight="700" fill="#0ea5a4">RGB</text>
      <text x="56" y="17" font-size="11" fill="#5b6680">Additive / screens — red, green, blue</text>
    </g>
    <g transform="translate(320,164)">
      <rect x="0" y="0" width="300" height="26" rx="4" fill="#f4f7ff"/>
      <text x="10" y="17" font-size="11" font-weight="700" fill="#f59e0b">CMYK</text>
      <text x="56" y="17" font-size="11" fill="#5b6680">Subtractive / print — C, M, Y, K</text>
    </g>
  </g>

  <!-- Harmonies -->
  <g font-family="sans-serif">
    <text x="320" y="214" font-size="12" font-weight="700" fill="#1d2438">Harmonies (templates for a palette)</text>
    <g transform="translate(320,226)" font-size="10.5" fill="#1d2438">
      <circle cx="8" cy="11" r="4" fill="#2563eb"/>
      <text x="20" y="15"><tspan font-weight="700">Analogous</tspan> — neighbors · low contrast</text>
      <circle cx="8" cy="33" r="4" fill="#ef4444"/>
      <text x="20" y="37"><tspan font-weight="700">Complementary</tspan> — opposite · high contrast</text>
      <circle cx="8" cy="55" r="4" fill="#0ea5a4"/>
      <text x="20" y="59"><tspan font-weight="700">Split-comp.</tspan> — softened complement</text>
      <circle cx="8" cy="77" r="4" fill="#f59e0b"/>
      <text x="20" y="81"><tspan font-weight="700">Triadic</tspan> — three, 120° apart</text>
      <circle cx="8" cy="99" r="4" fill="#7c3aed"/>
      <text x="20" y="103"><tspan font-weight="700">Monochromatic</tspan> — one hue, tones &amp; shades</text>
    </g>
  </g>

  <text x="24" y="392" font-family="sans-serif" font-size="10" fill="#5b6680">Harmonies are the building blocks of a palette, derived by position on the wheel.</text>
</svg>
