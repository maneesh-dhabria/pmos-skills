<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Decoy Effect diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Decoy Effect</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">An inferior third option steers choice toward the option that dominates it</text>

  <!-- Panel A: two options -->
  <text x="32" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680">Two options — split is even</text>
  <rect x="32" y="104" width="120" height="120" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="92" y="138" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">A · Basic</text>
  <text x="92" y="162" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">$6</text>
  <text x="92" y="184" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">small</text>
  <text x="92" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">~50%</text>

  <rect x="168" y="104" width="120" height="120" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="228" y="138" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">B · Premium</text>
  <text x="228" y="162" font-family="sans-serif" font-size="13" fill="#5b6680" text-anchor="middle">$12</text>
  <text x="228" y="184" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">large</text>
  <text x="228" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">~50%</text>

  <!-- arrow -->
  <line x1="306" y1="164" x2="350" y2="164" stroke="#1d2438" stroke-width="2"/>
  <polygon points="350,158 362,164 350,170" fill="#1d2438"/>
  <text x="334" y="150" font-family="sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">add decoy</text>

  <!-- Panel B: three options -->
  <text x="378" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680">Add decoy D — choice tilts to B</text>
  <rect x="378" y="104" width="76" height="120" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
  <text x="416" y="138" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" text-anchor="middle">A</text>
  <text x="416" y="160" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">$6</text>
  <text x="416" y="178" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">small</text>
  <text x="416" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#5b6680" text-anchor="middle">~20%</text>

  <!-- decoy D -->
  <rect x="462" y="104" width="76" height="120" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="500" y="138" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">D · decoy</text>
  <text x="500" y="160" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">$11</text>
  <text x="500" y="178" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">small</text>
  <text x="500" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="middle">~0%</text>

  <!-- target B -->
  <rect x="546" y="104" width="76" height="120" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="3"/>
  <text x="584" y="138" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">B</text>
  <text x="584" y="160" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">$12</text>
  <text x="584" y="178" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">large</text>
  <text x="584" y="208" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">~80%</text>

  <!-- domination note -->
  <line x1="500" y1="232" x2="584" y2="232" stroke="#2563eb" stroke-width="1.5"/>
  <polygon points="584,228 592,232 584,236" fill="#2563eb"/>
  <text x="500" y="252" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">D is dominated by B</text>
  <text x="584" y="252" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">target</text>

  <!-- bottom explainer -->
  <rect x="32" y="284" width="576" height="92" rx="8" fill="#f4f7ff"/>
  <text x="48" y="310" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Asymmetric dominance</text>
  <text x="48" y="332" font-family="sans-serif" font-size="12" fill="#5b6680">The decoy is clearly worse than the target (B) on every dimension —</text>
  <text x="48" y="350" font-family="sans-serif" font-size="12" fill="#5b6680">but not clearly worse than the competitor (A). It makes B look like an</text>
  <text x="48" y="368" font-family="sans-serif" font-size="12" fill="#5b6680">obvious win, lifting B's share without changing B itself.</text>
</svg>
