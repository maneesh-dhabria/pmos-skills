<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="11 Star Experience diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The 11-Star Experience</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Push past 5 stars to the absurd, then work back to the realistic sweet spot</text>

  <!-- rising ladder of bars, 5 -> 11 -->
  <g font-family="sans-serif">
    <!-- baseline axis -->
    <line x1="60" y1="330" x2="600" y2="330" stroke="#1d2438" stroke-width="1.5"/>

    <!-- bars: x positions, increasing height -->
    <!-- 5 -->
    <rect x="72" y="262" width="56" height="68" rx="4" fill="#0ea5a4" opacity="0.85"/>
    <text x="100" y="252" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">5&#9733;</text>
    <text x="100" y="348" font-size="9" fill="#5b6680" text-anchor="middle">Expected</text>
    <!-- 6 -->
    <rect x="140" y="232" width="56" height="98" rx="4" fill="#0ea5a4"/>
    <text x="168" y="222" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">6&#9733;</text>
    <!-- 7 (sweet spot) -->
    <rect x="208" y="196" width="56" height="134" rx="4" fill="#2563eb"/>
    <text x="236" y="186" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">7&#9733;</text>
    <text x="236" y="348" font-size="9" font-weight="700" fill="#2563eb" text-anchor="middle">Sweet spot</text>
    <!-- 8 -->
    <rect x="276" y="166" width="56" height="164" rx="4" fill="#f59e0b" opacity="0.9"/>
    <text x="304" y="156" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">8&#9733;</text>
    <!-- 9 -->
    <rect x="344" y="138" width="56" height="192" rx="4" fill="#f59e0b" opacity="0.9"/>
    <text x="372" y="128" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">9&#9733;</text>
    <!-- 10 -->
    <rect x="412" y="112" width="56" height="218" rx="4" fill="#ef4444" opacity="0.85"/>
    <text x="440" y="102" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">10&#9733;</text>
    <!-- 11 -->
    <rect x="480" y="86" width="56" height="244" rx="4" fill="#ef4444"/>
    <text x="508" y="76" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">11&#9733;</text>
    <text x="508" y="348" font-size="9" fill="#5b6680" text-anchor="middle">Absurd</text>

    <!-- extrapolate arrow up -->
    <path d="M150 130 L500 130" stroke="#5b6680" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
    <text x="300" y="122" font-size="10" fill="#5b6680" text-anchor="middle">1 &#8212; extrapolate to the extreme &#8594;</text>

    <!-- work backward arrow down -->
    <path d="M500 372 L236 372" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#ar2)"/>
    <text x="370" y="388" font-size="10" fill="#2563eb" text-anchor="middle">&#8592; 2 &#8212; work backward to what&#8217;s feasible</text>
  </g>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
