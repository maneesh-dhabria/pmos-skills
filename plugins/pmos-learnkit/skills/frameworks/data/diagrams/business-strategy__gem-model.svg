<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="GEM Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">GEM Model</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">Rank Growth, Engagement &amp; Monetization to align teams and pick projects.</text>

  <!-- Ranked ladder: rank 1 at top -->
  <g font-family="sans-serif">
    <!-- Rank 1: Monetization -->
    <rect x="80" y="86" width="380" height="74" rx="10" fill="#2563eb"/>
    <circle cx="116" cy="123" r="20" fill="#ffffff"/>
    <text x="116" y="129" font-size="17" font-weight="700" fill="#2563eb" text-anchor="middle">1</text>
    <text x="152" y="116" font-size="16" font-weight="700" fill="#ffffff">Monetization</text>
    <text x="152" y="138" font-size="11.5" fill="#dbe6ff">Measured by LTV &amp; gross margin</text>

    <!-- Rank 2: Engagement -->
    <rect x="80" y="174" width="380" height="74" rx="10" fill="#0ea5a4"/>
    <circle cx="116" cy="211" r="20" fill="#ffffff"/>
    <text x="116" y="217" font-size="17" font-weight="700" fill="#0ea5a4" text-anchor="middle">2</text>
    <text x="152" y="204" font-size="16" font-weight="700" fill="#ffffff">Engagement</text>
    <text x="152" y="226" font-size="11.5" fill="#d6f3f2">Measured by monthly retention (product quality)</text>

    <!-- Rank 3: Growth -->
    <rect x="80" y="262" width="380" height="74" rx="10" fill="#f59e0b"/>
    <circle cx="116" cy="299" r="20" fill="#ffffff"/>
    <text x="116" y="305" font-size="17" font-weight="700" fill="#f59e0b" text-anchor="middle">3</text>
    <text x="152" y="292" font-size="16" font-weight="700" fill="#ffffff">Growth</text>
    <text x="152" y="314" font-size="11.5" fill="#fff3dc">Measured by YoY member growth rate</text>
  </g>

  <!-- priority arrow -->
  <g stroke="#5b6680" stroke-width="1.6" fill="none">
    <line x1="50" y1="100" x2="50" y2="322"/>
  </g>
  <path d="M50 100 l -6 12 l 12 0 z" fill="#5b6680"/>
  <text x="36" y="211" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" transform="rotate(-90 36 211)">Priority order</text>

  <!-- side note: Netflix example label -->
  <g font-family="sans-serif">
    <rect x="478" y="86" width="140" height="250" rx="10" fill="#f4f7ff"/>
    <text x="548" y="110" font-size="12.5" font-weight="700" fill="#1d2438" text-anchor="middle">Netflix</text>
    <text x="548" y="124" font-size="10.5" fill="#5b6680" text-anchor="middle">example ranking</text>

    <text x="548" y="158" font-size="11.5" font-weight="700" fill="#2563eb" text-anchor="middle">1. Monetization</text>
    <text x="548" y="174" font-size="10" fill="#5b6680" text-anchor="middle">LTV, margin</text>

    <text x="548" y="206" font-size="11.5" font-weight="700" fill="#0ea5a4" text-anchor="middle">2. Engagement</text>
    <text x="548" y="222" font-size="10" fill="#5b6680" text-anchor="middle">retention</text>

    <text x="548" y="254" font-size="11.5" font-weight="700" fill="#f59e0b" text-anchor="middle">3. Growth</text>
    <text x="548" y="270" font-size="10" fill="#5b6680" text-anchor="middle">~30% YoY</text>

    <line x1="498" y1="290" x2="598" y2="290" stroke="#cfd8ec" stroke-width="1"/>
    <text x="548" y="310" font-size="9.5" fill="#5b6680" text-anchor="middle">Ranking differs</text>
    <text x="548" y="323" font-size="9.5" fill="#5b6680" text-anchor="middle">per company.</text>
  </g>

  <text x="80" y="362" font-family="sans-serif" font-size="11" fill="#5b6680">A shared ranking ends cross-team (product, marketing, sales, finance) misalignment.</text>
</svg>
