<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Four product strategy misconceptions diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">Four Strategy-Stack Traps</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Common misconceptions (left) and the correction the stack enforces (right)</text>

  <g font-family="sans-serif">
    <!-- header chips -->
    <rect x="40" y="58" width="240" height="24" rx="4" fill="#fdecea"/>
    <text x="160" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Misconception</text>
    <rect x="360" y="58" width="240" height="24" rx="4" fill="#e7f6f5"/>
    <text x="480" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#0ea5a4">What the stack says</text>

    <!-- Trap 1 -->
    <rect x="40" y="92" width="240" height="58" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="52" y="112" font-size="11" font-weight="700" fill="#1d2438">1 · Goals = Strategy</text>
    <text x="52" y="130" font-size="9.5" fill="#5b6680">The plan and the measure of</text>
    <text x="52" y="143" font-size="9.5" fill="#5b6680">winning are treated as one.</text>
    <text x="300" y="124" font-size="16" fill="#5b6680">&#8594;</text>
    <rect x="360" y="92" width="240" height="58" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="372" y="112" font-size="11" font-weight="700" fill="#1d2438">Strategy is the plan;</text>
    <text x="372" y="130" font-size="9.5" fill="#5b6680">goals define what winning</text>
    <text x="372" y="143" font-size="9.5" fill="#5b6680">means — distinct layers.</text>

    <!-- Trap 2 -->
    <rect x="40" y="158" width="240" height="58" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="52" y="178" font-size="11" font-weight="700" fill="#1d2438">2 · Hit goals = won strategy</text>
    <text x="52" y="196" font-size="9.5" fill="#5b6680">Short-term wins are read as</text>
    <text x="52" y="209" font-size="9.5" fill="#5b6680">strategic progress.</text>
    <text x="300" y="190" font-size="16" fill="#5b6680">&#8594;</text>
    <rect x="360" y="158" width="240" height="58" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="372" y="178" font-size="11" font-weight="700" fill="#1d2438">Externals can move metrics;</text>
    <text x="372" y="196" font-size="9.5" fill="#5b6680">track strategic progress</text>
    <text x="372" y="209" font-size="9.5" fill="#5b6680">beyond the quarterly goal.</text>

    <!-- Trap 3 -->
    <rect x="40" y="224" width="240" height="58" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="52" y="244" font-size="11" font-weight="700" fill="#1d2438">3 · Product = Company strategy</text>
    <text x="52" y="262" font-size="9.5" fill="#5b6680">Product strategy assumed to</text>
    <text x="52" y="275" font-size="9.5" fill="#5b6680">be the whole company plan.</text>
    <text x="300" y="256" font-size="16" fill="#5b6680">&#8594;</text>
    <rect x="360" y="224" width="240" height="58" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="372" y="244" font-size="11" font-weight="700" fill="#1d2438">Sales, marketing &amp; support</text>
    <text x="372" y="262" font-size="9.5" fill="#5b6680">also drive it; align each</text>
    <text x="372" y="275" font-size="9.5" fill="#5b6680">function to win the market.</text>

    <!-- Trap 4 -->
    <rect x="40" y="290" width="240" height="58" rx="6" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="52" y="310" font-size="11" font-weight="700" fill="#1d2438">4 · Goal &#8594; Roadmap</text>
    <text x="52" y="328" font-size="9.5" fill="#5b6680">Set goals first, then build</text>
    <text x="52" y="341" font-size="9.5" fill="#5b6680">the roadmap to hit them.</text>
    <text x="300" y="322" font-size="16" fill="#5b6680">&#8594;</text>
    <rect x="360" y="290" width="240" height="58" rx="6" fill="#ffffff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="372" y="310" font-size="11" font-weight="700" fill="#1d2438">Roadmap &#8594; Goals.</text>
    <text x="372" y="328" font-size="9.5" fill="#5b6680">Goals flow from a customer-</text>
    <text x="372" y="341" font-size="9.5" fill="#5b6680">centric roadmap of value.</text>
  </g>

  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#5b6680">Each trap collapses two stack layers — the Product Strategy Stack keeps them separate and correctly ordered.</text>
</svg>
