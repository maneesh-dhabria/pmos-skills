<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Design Thinking diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Design Thinking</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Human-centered, iterative — five non-linear stages</text>

  <!-- circular loop arrows -->
  <g fill="none" stroke="#2563eb" stroke-width="2">
    <path d="M 320 92 A 130 100 0 0 1 432 158" marker-end="url(#ar)"/>
    <path d="M 446 178 A 130 100 0 0 1 396 296" marker-end="url(#ar)"/>
    <path d="M 372 312 A 130 100 0 0 1 268 312" marker-end="url(#ar)"/>
    <path d="M 244 296 A 130 100 0 0 1 194 178" marker-end="url(#ar)"/>
    <path d="M 208 158 A 130 100 0 0 1 320 92" marker-end="url(#ar)"/>
  </g>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- five stage nodes -->
  <!-- 1 Empathize top -->
  <g>
    <circle cx="320" cy="92" r="34" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="320" y="86" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">1</text>
    <text x="320" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Empathize</text>
  </g>
  <!-- 2 Define right -->
  <g>
    <circle cx="452" cy="172" r="34" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="452" y="166" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">2</text>
    <text x="452" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Define</text>
  </g>
  <!-- 3 Ideate bottom-right -->
  <g>
    <circle cx="392" cy="312" r="34" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <text x="392" y="306" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">3</text>
    <text x="392" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Ideate</text>
  </g>
  <!-- 4 Prototype bottom-left -->
  <g>
    <circle cx="248" cy="312" r="34" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="248" y="306" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">4</text>
    <text x="248" y="320" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#1d2438">Prototype</text>
  </g>
  <!-- 5 Test left -->
  <g>
    <circle cx="188" cy="172" r="34" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="188" y="166" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">5</text>
    <text x="188" y="180" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#1d2438">Test</text>
  </g>

  <!-- center note -->
  <text x="320" y="206" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">iterate</text>
  <text x="320" y="222" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">loop back on insights</text>
</svg>
