<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Bullet Journal (Bujo) diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Bullet Journal (Bujo)</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Rapid-logging in one analog notebook</text>

  <!-- LEFT: Rapid-logging bullet legend -->
  <text x="40" y="80" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Rapid logging</text>
  <!-- Task: dot -->
  <circle cx="52" cy="100" r="4" fill="#2563eb"/>
  <text x="68" y="104" font-family="sans-serif" font-size="12" fill="#1d2438"><tspan font-weight="700">·</tspan>  Task — action item</text>
  <!-- Event: circle -->
  <circle cx="52" cy="124" r="5" fill="none" stroke="#0ea5a4" stroke-width="2"/>
  <text x="68" y="128" font-family="sans-serif" font-size="12" fill="#1d2438">◦  Event — meeting</text>
  <!-- Note: dash -->
  <rect x="47" y="146" width="10" height="2.5" fill="#f59e0b"/>
  <text x="68" y="152" font-family="sans-serif" font-size="12" fill="#1d2438">–  Note — takeaway</text>

  <!-- The logs column -->
  <text x="40" y="190" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">The logs</text>
  <rect x="40" y="200" width="200" height="26" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="50" y="217" font-family="sans-serif" font-size="11" fill="#1d2438">Future Log — months ahead</text>
  <rect x="40" y="232" width="200" height="26" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="50" y="249" font-family="sans-serif" font-size="11" fill="#1d2438">Monthly Log — overview</text>
  <rect x="40" y="264" width="200" height="26" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="50" y="281" font-family="sans-serif" font-size="11" fill="#1d2438">Daily Log — today's entries</text>
  <rect x="40" y="296" width="200" height="26" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="50" y="313" font-family="sans-serif" font-size="11" fill="#1d2438">Collections — projects</text>
  <rect x="40" y="328" width="200" height="26" rx="4" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="50" y="345" font-family="sans-serif" font-size="11" fill="#1d2438">Index — find any page</text>

  <!-- RIGHT: Migration cycle/loop -->
  <text x="445" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Migration cycle</text>
  <!-- circular arrows -->
  <circle cx="445" cy="225" r="100" fill="none" stroke="#dbe6ff" stroke-width="2"/>
  <!-- nodes -->
  <circle cx="445" cy="125" r="30" fill="#2563eb"/>
  <text x="445" y="121" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ffffff">Log</text>
  <text x="445" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dbe6ff">capture</text>

  <circle cx="545" cy="225" r="30" fill="#0ea5a4"/>
  <text x="545" y="221" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ffffff">Review</text>
  <text x="545" y="234" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#e0fbf9">reflect</text>

  <circle cx="445" cy="325" r="30" fill="#f59e0b"/>
  <text x="445" y="321" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">Migrate</text>
  <text x="445" y="334" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#fff3dd">carry over</text>

  <circle cx="345" cy="225" r="30" fill="#5b6680"/>
  <text x="345" y="221" text-anchor="middle" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#ffffff">Do</text>
  <text x="345" y="234" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dfe3ec">complete</text>

  <!-- arrowheads on the loop -->
  <defs>
    <marker id="loop" markerWidth="9" markerHeight="9" refX="5" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <path d="M517 156 A100 100 0 0 1 517 294" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#loop)"/>
  <path d="M373 294 A100 100 0 0 1 373 156" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#loop)"/>
</svg>
