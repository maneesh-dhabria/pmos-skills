<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Maslow's Hierarchy of Needs diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Maslow&#8217;s Hierarchy of Needs</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Lower needs are met before higher ones emerge</text>

  <!-- pyramid: 5 stacked tiers, apex narrow -->
  <!-- Tier 1 base: Physiological -->
  <polygon points="70,360 570,360 510,300 130,300" fill="#1d2438"/>
  <text x="320" y="335" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">Physiological</text>
  <text x="320" y="350" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#b9c0d4">food, water, shelter, sleep</text>

  <!-- Tier 2: Safety -->
  <polygon points="130,298 510,298 456,244 184,244" fill="#2563eb"/>
  <text x="320" y="275" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">Safety</text>
  <text x="320" y="290" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#dbe6ff">security, protection from harm</text>

  <!-- Tier 3: Love & Belonging -->
  <polygon points="184,242 456,242 402,188 238,188" fill="#0ea5a4"/>
  <text x="320" y="219" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff">Love &amp; Belonging</text>
  <text x="320" y="234" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#d6f5f4">acceptance, group, affection</text>

  <!-- Tier 4: Esteem -->
  <polygon points="238,186 402,186 350,132 290,132" fill="#f59e0b"/>
  <text x="320" y="163" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Esteem</text>
  <text x="320" y="177" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3a2e10">respect, recognition</text>

  <!-- Tier 5 apex: Self-actualization -->
  <polygon points="290,130 350,130 320,72" fill="#ef4444"/>
  <text x="320" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Self-</text>
  <text x="320" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">actualization</text>

  <!-- ascending arrow -->
  <line x1="600" y1="360" x2="600" y2="80" stroke="#5b6680" stroke-width="2" marker-end="url(#up)"/>
  <defs>
    <marker id="up" markerWidth="9" markerHeight="9" refX="3" refY="6" orient="auto">
      <path d="M0,6 L3,0 L6,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <text x="618" y="220" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680" transform="rotate(90 618 220)">prepotency: needs ascend</text>

  <!-- 8-stage note -->
  <text x="40" y="385" font-family="sans-serif" font-size="9" fill="#5b6680">Later 8-stage extension adds: Cognitive, Aesthetic, Transcendence above Esteem.</text>
</svg>
