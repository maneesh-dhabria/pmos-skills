<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Double Diamond diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Double Diamond</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Alternating divergent exploration and convergent focus</text>

  <!-- Diamond 1: Discover (diverge) + Define (converge) -->
  <polygon points="48,210 188,140 188,280" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <polygon points="328,210 188,140 188,280" fill="#eef2ff" stroke="#2563eb" stroke-width="2"/>
  <!-- Diamond 2: Develop (diverge) + Deliver (converge) -->
  <polygon points="328,210 468,140 468,280" fill="#f0fdfa" stroke="#0ea5a4" stroke-width="2"/>
  <polygon points="608,210 468,140 468,280" fill="#e6fffd" stroke="#0ea5a4" stroke-width="2"/>

  <!-- centre divider line problem/solution -->
  <line x1="328" y1="120" x2="328" y2="300" stroke="#d6deef" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="188" y="110" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle">THE RIGHT PROBLEM</text>
  <text x="468" y="110" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">THE RIGHT SOLUTION</text>

  <!-- phase labels -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="118" y="214" font-size="14" font-weight="700" fill="#1d2438">Discover</text>
    <text x="118" y="232" font-size="9.5" fill="#5b6680">explore widely</text>
    <text x="258" y="214" font-size="14" font-weight="700" fill="#1d2438">Define</text>
    <text x="258" y="232" font-size="9.5" fill="#5b6680">frame the problem</text>
    <text x="398" y="214" font-size="14" font-weight="700" fill="#1d2438">Develop</text>
    <text x="398" y="232" font-size="9.5" fill="#5b6680">prototype &amp; test</text>
    <text x="538" y="214" font-size="14" font-weight="700" fill="#1d2438">Deliver</text>
    <text x="538" y="232" font-size="9.5" fill="#5b6680">scale &amp; launch</text>
  </g>

  <!-- diverge / converge cues -->
  <g font-family="sans-serif" font-size="9.5" fill="#5b6680" text-anchor="middle">
    <text x="118" y="312">diverge</text>
    <text x="258" y="312">converge</text>
    <text x="398" y="312">diverge</text>
    <text x="538" y="312">converge</text>
  </g>

  <!-- direction arrow -->
  <line x1="48" y1="338" x2="600" y2="338" stroke="#1d2438" stroke-width="1.5"/>
  <polygon points="600,333 612,338 600,343" fill="#1d2438"/>
  <text x="48" y="360" font-family="sans-serif" font-size="10" fill="#5b6680">Problem space</text>
  <text x="612" y="360" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">Solution space</text>
</svg>
