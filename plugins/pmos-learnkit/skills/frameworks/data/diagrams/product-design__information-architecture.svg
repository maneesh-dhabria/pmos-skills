<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Information Architecture diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Information Architecture</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Organize content for findability &#8212; 4 aspects, 8 principles</text>

  <!-- Left: 4 aspects as stacked rows -->
  <text x="40" y="76" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Four aspects</text>
  <g font-family="sans-serif">
    <rect x="40" y="86" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="54" y="106" font-size="12" font-weight="600" fill="#1d2438">Organization</text>
    <text x="54" y="122" font-size="10" fill="#5b6680">group into clear categories</text>

    <rect x="40" y="136" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="54" y="156" font-size="12" font-weight="600" fill="#1d2438">Labeling</text>
    <text x="54" y="172" font-size="10" fill="#5b6680">intuitive names for things</text>

    <rect x="40" y="186" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="54" y="206" font-size="12" font-weight="600" fill="#1d2438">Navigation</text>
    <text x="54" y="222" font-size="10" fill="#5b6680">move between pages easily</text>

    <rect x="40" y="236" width="250" height="44" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="54" y="256" font-size="12" font-weight="600" fill="#1d2438">Search</text>
    <text x="54" y="272" font-size="10" fill="#5b6680">locate known &amp; unknown items</text>
  </g>

  <!-- arrow to outcome -->
  <text x="165" y="304" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">&#8595; findability &amp; understanding</text>

  <!-- Right: 8 principles list -->
  <text x="330" y="76" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Eight design principles</text>
  <g font-family="sans-serif" font-size="11" fill="#1d2438">
    <text x="330" y="100"><tspan font-weight="700" fill="#2563eb">1</tspan> Objects &#8212; content lives &amp; evolves</text>
    <text x="330" y="123"><tspan font-weight="700" fill="#2563eb">2</tspan> Choices &#8212; keep them minimal</text>
    <text x="330" y="146"><tspan font-weight="700" fill="#2563eb">3</tspan> Disclosure &#8212; preview what&#8217;s deeper</text>
    <text x="330" y="169"><tspan font-weight="700" fill="#2563eb">4</tspan> Exemplars &#8212; show category examples</text>
    <text x="330" y="192"><tspan font-weight="700" fill="#2563eb">5</tspan> Front doors &#8212; entry isn&#8217;t the homepage</text>
    <text x="330" y="215"><tspan font-weight="700" fill="#2563eb">6</tspan> Multiple classifications &#8212; many paths</text>
    <text x="330" y="238"><tspan font-weight="700" fill="#2563eb">7</tspan> Focused navigation &#8212; don&#8217;t mix things</text>
    <text x="330" y="261"><tspan font-weight="700" fill="#2563eb">8</tspan> Growth &#8212; design to scale</text>
  </g>
</svg>
