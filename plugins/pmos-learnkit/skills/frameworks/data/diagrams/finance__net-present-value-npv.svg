<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Net Present Value (NPV) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Net Present Value (NPV)</text>
  <text x="24" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">Discount each future cash flow back to today, then net against the initial outlay.</text>

  <!-- baseline / timeline -->
  <line x1="40" y1="300" x2="600" y2="300" stroke="#1d2438" stroke-width="1.5"/>
  <text x="40" y="320" font-family="sans-serif" font-size="11" fill="#5b6680">today</text>
  <text x="560" y="320" font-family="sans-serif" font-size="11" fill="#5b6680">year 5</text>

  <!-- discount factor formula -->
  <rect x="380" y="70" width="236" height="40" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <text x="498" y="95" font-family="sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">PV = FV / (1 + r)&#8319;</text>

  <!-- future cash flow bars (full height) and their PV (shrunk) -->
  <!-- Year 1 -->
  <rect x="120" y="210" width="34" height="90" fill="#bcd0ff"/>
  <rect x="120" y="244" width="34" height="56" fill="#2563eb"/>
  <text x="137" y="206" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">$3.0k</text>
  <text x="137" y="290" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">2.73</text>

  <!-- Year 2 -->
  <rect x="200" y="195" width="34" height="105" fill="#bcd0ff"/>
  <rect x="200" y="240" width="34" height="60" fill="#2563eb"/>
  <text x="217" y="191" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">$4.0k</text>
  <text x="217" y="288" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">3.31</text>

  <!-- Year 3 -->
  <rect x="280" y="178" width="34" height="122" fill="#bcd0ff"/>
  <rect x="280" y="237" width="34" height="63" fill="#2563eb"/>
  <text x="297" y="174" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">$5.0k</text>
  <text x="297" y="287" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">3.80</text>

  <!-- Year 4 -->
  <rect x="360" y="160" width="34" height="140" fill="#bcd0ff"/>
  <rect x="360" y="234" width="34" height="66" fill="#2563eb"/>
  <text x="377" y="156" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">$6.0k</text>
  <text x="377" y="286" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">4.37</text>

  <!-- Year 5 -->
  <rect x="440" y="142" width="34" height="158" fill="#bcd0ff"/>
  <rect x="440" y="231" width="34" height="69" fill="#2563eb"/>
  <text x="457" y="138" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">$7.0k</text>
  <text x="457" y="285" font-family="sans-serif" font-size="9.5" fill="#ffffff" text-anchor="middle" font-weight="700">5.00</text>

  <!-- legend -->
  <rect x="120" y="334" width="12" height="12" fill="#bcd0ff"/>
  <text x="138" y="344" font-family="sans-serif" font-size="11" fill="#5b6680">future cash flow</text>
  <rect x="250" y="334" width="12" height="12" fill="#2563eb"/>
  <text x="268" y="344" font-family="sans-serif" font-size="11" fill="#5b6680">discounted to today (r = 10%)</text>

  <!-- result bridge -->
  <text x="500" y="200" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">&#931; PV</text>
  <text x="500" y="220" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">$19,196</text>
  <text x="500" y="244" font-family="sans-serif" font-size="12" fill="#ef4444" text-anchor="middle">&#8722; $10,000 outlay</text>

  <rect x="476" y="356" width="148" height="34" rx="8" fill="#0ea5a4"/>
  <text x="550" y="378" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">NPV = +$9,196</text>
  <text x="476" y="380" font-family="sans-serif" font-size="11" fill="#0ea5a4">positive &#8594; invest</text>
</svg>
