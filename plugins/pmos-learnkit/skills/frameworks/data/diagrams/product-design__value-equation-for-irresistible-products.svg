<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Value Equation for Irresistible Products diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="36" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Value Equation</text>
  <text x="32" y="56" font-family="sans-serif" font-size="12.5" fill="#5b6680">Hormozi: raise the top, shrink the bottom — to make an offer irresistible</text>

  <!-- Equation: Value = (Dream x Likelihood) / (Time x Effort) -->
  <text x="40" y="210" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Value</text>
  <text x="118" y="210" font-family="sans-serif" font-size="24" font-weight="700" fill="#5b6680">=</text>

  <!-- fraction bar -->
  <line x1="160" y1="200" x2="608" y2="200" stroke="#1d2438" stroke-width="2.5"/>

  <!-- Numerator (increase = arrows up) -->
  <text x="384" y="105" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">INCREASE  &#8593;</text>
  <g>
    <rect x="170" y="118" width="200" height="64" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="270" y="142" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438" text-anchor="middle">Dream Outcome</text>
    <text x="270" y="162" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">"How will this improve my life?"</text>
    <text x="270" y="176" font-family="sans-serif" font-size="9.5" fill="#0ea5a4" text-anchor="middle">value prop</text>

    <text x="386" y="158" font-family="sans-serif" font-size="22" font-weight="700" fill="#5b6680" text-anchor="middle">&#215;</text>

    <rect x="404" y="118" width="200" height="64" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="504" y="142" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438" text-anchor="middle">Likelihood</text>
    <text x="504" y="162" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">"How likely is this to happen?"</text>
    <text x="504" y="176" font-family="sans-serif" font-size="9.5" fill="#0ea5a4" text-anchor="middle">social proof</text>
  </g>

  <!-- Denominator (decrease = arrows down) -->
  <g>
    <rect x="170" y="218" width="200" height="64" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="270" y="242" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438" text-anchor="middle">Time Delay</text>
    <text x="270" y="262" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">"How long will this take?"</text>
    <text x="270" y="276" font-family="sans-serif" font-size="9.5" fill="#ef4444" text-anchor="middle">mini version</text>

    <text x="386" y="258" font-family="sans-serif" font-size="22" font-weight="700" fill="#5b6680" text-anchor="middle">&#215;</text>

    <rect x="404" y="218" width="200" height="64" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
    <text x="504" y="242" font-family="sans-serif" font-size="13.5" font-weight="700" fill="#1d2438" text-anchor="middle">Effort &amp; Sacrifice</text>
    <text x="504" y="262" font-family="sans-serif" font-size="10.5" fill="#5b6680" text-anchor="middle">"How much work will this take?"</text>
    <text x="504" y="276" font-family="sans-serif" font-size="9.5" fill="#ef4444" text-anchor="middle">free trial</text>
  </g>
  <text x="384" y="305" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">DECREASE  &#8595;</text>

  <!-- insight note -->
  <rect x="40" y="330" width="568" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <text x="56" y="352" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#2563eb">Tip:</text>
  <text x="92" y="352" font-family="sans-serif" font-size="11.5" fill="#1d2438">Teams over-invest in the numerator. It's often cheaper to shrink the</text>
  <text x="56" y="369" font-family="sans-serif" font-size="11.5" fill="#1d2438">denominator — fix time &amp; effort gaps in the customer journey.</text>
</svg>
