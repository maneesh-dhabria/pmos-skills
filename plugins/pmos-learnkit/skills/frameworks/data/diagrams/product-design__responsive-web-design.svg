<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Responsive Web Design diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Responsive Web Design</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">One HTML codebase; CSS breakpoints reflow a proportion-based grid per viewport</text>

  <!-- Breakpoint axis -->
  <line x1="40" y1="96" x2="616" y2="96" stroke="#5b6680" stroke-width="1.5"/>
  <text x="40" y="86" font-family="sans-serif" font-size="11" fill="#5b6680">narrow viewport</text>
  <text x="616" y="86" text-anchor="end" font-family="sans-serif" font-size="11" fill="#5b6680">wide viewport →</text>
  <!-- breakpoint ticks -->
  <line x1="234" y1="90" x2="234" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="428" y1="90" x2="428" y2="270" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>
  <circle cx="234" cy="96" r="4" fill="#f59e0b"/>
  <circle cx="428" cy="96" r="4" fill="#f59e0b"/>
  <text x="234" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#f59e0b">breakpoint</text>
  <text x="428" y="112" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#f59e0b">breakpoint</text>

  <!-- Phone: single column -->
  <rect x="62" y="128" width="120" height="160" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="76" y="142" width="92" height="16" rx="3" fill="#2563eb"/>
  <rect x="76" y="166" width="92" height="44" rx="3" fill="#0ea5a4"/>
  <rect x="76" y="218" width="92" height="28" rx="3" fill="#cfd8ee"/>
  <rect x="76" y="252" width="92" height="22" rx="3" fill="#cfd8ee"/>
  <text x="122" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Phone</text>
  <text x="122" y="322" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">1 column, stacked</text>

  <!-- Tablet: two column -->
  <rect x="256" y="128" width="150" height="160" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="270" y="142" width="122" height="16" rx="3" fill="#2563eb"/>
  <rect x="270" y="166" width="58" height="80" rx="3" fill="#0ea5a4"/>
  <rect x="334" y="166" width="58" height="38" rx="3" fill="#cfd8ee"/>
  <rect x="334" y="210" width="58" height="36" rx="3" fill="#cfd8ee"/>
  <rect x="270" y="252" width="122" height="22" rx="3" fill="#cfd8ee"/>
  <text x="331" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Tablet</text>
  <text x="331" y="322" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">2 columns reflow</text>

  <!-- Desktop: three column -->
  <rect x="450" y="128" width="166" height="160" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="464" y="142" width="138" height="16" rx="3" fill="#2563eb"/>
  <rect x="464" y="166" width="40" height="80" rx="3" fill="#0ea5a4"/>
  <rect x="513" y="166" width="40" height="80" rx="3" fill="#cfd8ee"/>
  <rect x="562" y="166" width="40" height="80" rx="3" fill="#cfd8ee"/>
  <rect x="464" y="252" width="138" height="22" rx="3" fill="#cfd8ee"/>
  <text x="533" y="306" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Desktop</text>
  <text x="533" y="322" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">3 columns, wide grid</text>

  <!-- footer principle -->
  <rect x="24" y="344" width="592" height="40" rx="8" fill="#f4f7ff"/>
  <text x="36" y="361" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Same HTML → CSS adapts layout.</text>
  <text x="36" y="377" font-family="sans-serif" font-size="10" fill="#5b6680">One codebase = faster build &amp; maintenance, but same bytes ship to every device (perf cost → consider adaptive design).</text>
</svg>
