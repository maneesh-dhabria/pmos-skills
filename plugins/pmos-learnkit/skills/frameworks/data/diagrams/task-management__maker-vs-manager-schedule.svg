<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Maker vs Manager Schedule diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Maker vs. Manager Schedule</text>
  <text x="320" y="50" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Two ways a day gets carved up</text>

  <!-- MANAGER column -->
  <text x="180" y="84" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Manager's Schedule</text>
  <text x="180" y="102" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Day sliced into small calendar blocks</text>
  <!-- day frame -->
  <rect x="110" y="112" width="140" height="220" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <!-- hour slices -->
  <rect x="120" y="122" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="180" y="137" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Meeting</text>
  <rect x="120" y="148" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.6"/>
  <text x="180" y="163" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">1:1</text>
  <rect x="120" y="174" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="180" y="189" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Review</text>
  <rect x="120" y="200" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.6"/>
  <text x="180" y="215" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Sync</text>
  <rect x="120" y="226" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="180" y="241" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Meeting</text>
  <rect x="120" y="252" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.6"/>
  <text x="180" y="267" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Decision</text>
  <rect x="120" y="278" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="180" y="293" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">1:1</text>
  <rect x="120" y="304" width="120" height="22" rx="3" fill="#f59e0b" opacity="0.6"/>
  <text x="180" y="319" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">Meeting</text>
  <text x="180" y="352" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Quick decisions, no deep focus</text>

  <!-- divider -->
  <line x1="320" y1="112" x2="320" y2="332" stroke="#dbe6ff" stroke-width="2"/>

  <!-- MAKER column -->
  <text x="460" y="84" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Maker's Schedule</text>
  <text x="460" y="102" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Long uninterrupted focus blocks</text>
  <rect x="390" y="112" width="140" height="220" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <!-- big morning block -->
  <rect x="400" y="122" width="120" height="96" rx="3" fill="#2563eb" opacity="0.9"/>
  <text x="460" y="166" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Deep Work</text>
  <text x="460" y="184" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dbe6ff">tackle hard problems</text>
  <!-- interrupting meeting -->
  <rect x="400" y="222" width="120" height="22" rx="3" fill="#ef4444"/>
  <text x="460" y="237" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ffffff">One meeting breaks flow</text>
  <!-- big afternoon block -->
  <rect x="400" y="248" width="120" height="78" rx="3" fill="#2563eb" opacity="0.9"/>
  <text x="460" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Deep Work</text>
  <text x="460" y="303" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#dbe6ff">resume costs context switch</text>
  <text x="460" y="352" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Complex progress needs unbroken time</text>

  <text x="320" y="384" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Know which schedule you — and those around you — are on</text>
</svg>
