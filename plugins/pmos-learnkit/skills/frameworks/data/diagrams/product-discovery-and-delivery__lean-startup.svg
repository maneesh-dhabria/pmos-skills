<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Lean Startup diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438" text-anchor="middle">Lean Startup: Build-Measure-Learn</text>
  <text x="320" y="54" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">Validated learning through fast iteration loops</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Loop arc -->
  <g fill="none" stroke="#2563eb" stroke-width="2.5">
    <path d="M 320 110 A 110 110 0 0 1 415 275" marker-end="url(#arr)"/>
    <path d="M 415 275 A 110 110 0 0 1 225 275" marker-end="url(#arr)"/>
    <path d="M 225 275 A 110 110 0 0 1 320 110" marker-end="url(#arr)"/>
  </g>

  <!-- Nodes -->
  <g font-family="sans-serif">
    <!-- Build (top) -->
    <circle cx="320" cy="120" r="44" fill="#2563eb"/>
    <text x="320" y="118" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">BUILD</text>
    <text x="320" y="135" font-size="10" fill="#dbe6ff" text-anchor="middle">ship an MVP</text>

    <!-- Measure (bottom right) -->
    <circle cx="430" cy="290" r="44" fill="#0ea5a4"/>
    <text x="430" y="288" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">MEASURE</text>
    <text x="430" y="305" font-size="10" fill="#d6fbf7" text-anchor="middle">actionable metrics</text>

    <!-- Learn (bottom left) -->
    <circle cx="210" cy="290" r="44" fill="#f59e0b"/>
    <text x="210" y="288" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">LEARN</text>
    <text x="210" y="305" font-size="10" fill="#1d2438" text-anchor="middle">data &#8594; insight</text>
  </g>

  <!-- Arc labels -->
  <g font-family="sans-serif" font-size="11" fill="#5b6680">
    <text x="410" y="180" text-anchor="middle">Ideas &#8594; Code</text>
    <text x="320" y="345" text-anchor="middle">Data &#8594; Learning</text>
    <text x="225" y="180" text-anchor="middle">Learning &#8594; Ideas</text>
  </g>

  <!-- Pivot/Persevere center -->
  <g font-family="sans-serif">
    <rect x="262" y="195" width="116" height="40" rx="20" fill="#f4f7ff" stroke="#5b6680"/>
    <text x="320" y="212" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Pivot or</text>
    <text x="320" y="226" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Persevere?</text>
  </g>

  <text x="320" y="388" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Minimize total time through the loop &#183; innovation accounting tracks progress</text>
</svg>
