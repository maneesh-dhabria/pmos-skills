<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Porter's 3 Generic Strategies diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Porter&#8217;s 3 Generic Strategies</text>
  <text x="32" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Competitive advantage &#215; competitive scope</text>

  <!-- axis labels -->
  <text x="295" y="88" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">COMPETITIVE ADVANTAGE</text>
  <text x="200" y="108" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Lower Cost</text>
  <text x="392" y="108" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Differentiation</text>

  <text x="40" y="180" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle" transform="rotate(-90 40 180)">COMPETITIVE SCOPE</text>
  <text x="68" y="180" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" transform="rotate(-90 68 180)">Broad</text>
  <text x="68" y="308" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle" transform="rotate(-90 68 308)">Narrow</text>

  <!-- grid -->
  <g>
    <!-- top-left: cost leadership -->
    <rect x="96" y="116" width="200" height="128" rx="6" fill="#2563eb"/>
    <text x="196" y="166" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Cost Leadership</text>
    <text x="196" y="190" font-family="sans-serif" font-size="11" fill="#dbe6ff" text-anchor="middle">Be the lowest-cost</text>
    <text x="196" y="205" font-family="sans-serif" font-size="11" fill="#dbe6ff" text-anchor="middle">producer at scale</text>
    <text x="196" y="226" font-family="sans-serif" font-size="11" font-style="italic" fill="#ffffff" text-anchor="middle">e.g. Walmart</text>

    <!-- top-right: differentiation -->
    <rect x="300" y="116" width="200" height="128" rx="6" fill="#0ea5a4"/>
    <text x="400" y="166" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Differentiation</text>
    <text x="400" y="190" font-family="sans-serif" font-size="11" fill="#d6f5f4" text-anchor="middle">Unique, superior value</text>
    <text x="400" y="205" font-family="sans-serif" font-size="11" fill="#d6f5f4" text-anchor="middle">customers pay more for</text>
    <text x="400" y="226" font-family="sans-serif" font-size="11" font-style="italic" fill="#ffffff" text-anchor="middle">e.g. Apple</text>

    <!-- bottom row spanning both: focus -->
    <rect x="96" y="248" width="404" height="100" rx="6" fill="#f59e0b"/>
    <text x="298" y="288" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Focus</text>
    <text x="298" y="310" font-family="sans-serif" font-size="11" fill="#fff3dd" text-anchor="middle">Serve one narrow niche &#8212; via cost focus or differentiation focus</text>
    <text x="298" y="330" font-family="sans-serif" font-size="11" font-style="italic" fill="#ffffff" text-anchor="middle">e.g. Southwest Airlines</text>
  </g>

  <!-- stuck in the middle warning -->
  <rect x="520" y="116" width="100" height="232" rx="6" fill="#fdecec" stroke="#ef4444" stroke-width="1.5"/>
  <text x="570" y="222" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle" transform="rotate(-90 570 222)">STUCK IN THE MIDDLE</text>
  <text x="570" y="244" font-family="sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" transform="rotate(-90 570 244)">pick one &#8212; don&#8217;t straddle</text>

  <text x="96" y="372" font-family="sans-serif" font-size="11" fill="#5b6680">Choose one generic strategy clearly. Trying to be all of them leaves a firm &#8220;stuck in the middle&#8221; with no edge.</text>
</svg>
