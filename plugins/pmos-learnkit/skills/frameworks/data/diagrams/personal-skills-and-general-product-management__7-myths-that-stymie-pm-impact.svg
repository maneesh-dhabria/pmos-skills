<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="7 Myths that Stymie PM Impact diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">7 Myths that Stymie PM Impact</text>
  <text x="24" y="50" font-family="sans-serif" font-size="12" fill="#5b6680">Conventional wisdom vs Shreyas's reframe</text>

  <!-- column headers -->
  <g font-family="sans-serif">
    <rect x="190" y="60" width="206" height="24" rx="4" fill="#5b6680"/>
    <text x="293" y="76" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">CONVENTIONAL MYTH</text>
    <rect x="402" y="60" width="210" height="24" rx="4" fill="#2563eb"/>
    <text x="507" y="76" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">SHREYAS'S TAKE</text>
  </g>

  <!-- rows -->
  <g font-family="sans-serif" font-size="10">
    <!-- 1 -->
    <circle cx="36" cy="103" r="10" fill="#0ea5a4"/><text x="36" y="107" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="54" y="100" font-size="10" font-weight="700" fill="#1d2438">Problem</text><text x="54" y="112" font-size="10" font-weight="700" fill="#1d2438">solving</text>
    <rect x="190" y="90" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="106" fill="#5b6680">Solve problems as they arise</text>
    <rect x="402" y="90" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="106" fill="#1d2438">Selectively prevent key problems</text>
    <!-- 2 -->
    <circle cx="36" cy="135" r="10" fill="#0ea5a4"/><text x="36" y="139" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="54" y="132" font-size="10" font-weight="700" fill="#1d2438">Strengths</text>
    <rect x="190" y="122" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="138" fill="#5b6680">Focus only on your strengths</text>
    <rect x="402" y="122" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="138" fill="#1d2438">Also fix weaknesses to lead</text>
    <!-- 3 -->
    <circle cx="36" cy="167" r="10" fill="#0ea5a4"/><text x="36" y="171" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="54" y="164" font-size="10" font-weight="700" fill="#1d2438">Effort</text>
    <rect x="190" y="154" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="170" fill="#5b6680">Always give your best at all</text>
    <rect x="402" y="154" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="170" fill="#1d2438">Seek leverage; prioritize</text>
    <!-- 4 -->
    <circle cx="36" cy="199" r="10" fill="#0ea5a4"/><text x="36" y="203" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="54" y="196" font-size="10" font-weight="700" fill="#1d2438">Titles</text>
    <rect x="190" y="186" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="202" fill="#5b6680">Climb to VP Product / CPO</text>
    <rect x="402" y="186" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="202" fill="#1d2438">Be strategic; don't chase titles</text>
    <!-- 5 -->
    <circle cx="36" cy="231" r="10" fill="#0ea5a4"/><text x="36" y="235" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="54" y="228" font-size="10" font-weight="700" fill="#1d2438">Logic</text>
    <rect x="190" y="218" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="234" fill="#5b6680">Make purely logical decisions</text>
    <rect x="402" y="218" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="234" fill="#1d2438">Explore psycho-logical solutions</text>
    <!-- 6 -->
    <circle cx="36" cy="263" r="10" fill="#0ea5a4"/><text x="36" y="267" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
    <text x="54" y="260" font-size="10" font-weight="700" fill="#1d2438">Companies</text>
    <rect x="190" y="250" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="266" fill="#5b6680">Join "PM-driven" companies</text>
    <rect x="402" y="250" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="266" fill="#1d2438">Join "PM-obsessed" companies</text>
    <!-- 7 -->
    <circle cx="36" cy="295" r="10" fill="#0ea5a4"/><text x="36" y="299" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>
    <text x="54" y="292" font-size="10" font-weight="700" fill="#1d2438">Confidence</text>
    <rect x="190" y="282" width="206" height="26" rx="4" fill="#f4f7ff"/><text x="200" y="298" fill="#5b6680">Be very confident</text>
    <rect x="402" y="282" width="210" height="26" rx="4" fill="#eff4ff"/><text x="412" y="298" fill="#1d2438">First be competent</text>
  </g>

  <rect x="24" y="324" width="588" height="56" rx="6" fill="#f59e0b"/>
  <text x="38" y="346" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">PREVENTABLE PROBLEM PARADOX</text>
  <text x="38" y="364" font-family="sans-serif" font-size="10.5" fill="#1d2438">Orgs reward those who solve visible problems — and rarely recognize those who quietly</text>
  <text x="38" y="377" font-family="sans-serif" font-size="10.5" fill="#1d2438">prevent them. The Superman who lets the boy fall, then heroically saves him, gets the glory.</text>
</svg>
