<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Hick's Law diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="36" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Hick's Law</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Decision time grows with the number of choices.</text>

  <!-- formula chip -->
  <rect x="430" y="70" width="178" height="34" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="519" y="92" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">RT = a + b · log₂(n)</text>

  <!-- axes -->
  <line x1="90" y1="330" x2="90" y2="90" stroke="#1d2438" stroke-width="2"/>
  <line x1="90" y1="330" x2="600" y2="330" stroke="#1d2438" stroke-width="2"/>
  <text x="56" y="210" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438" transform="rotate(-90 56 210)" text-anchor="middle">Decision time ↑</text>
  <text x="345" y="360" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Number of options (n) →</text>

  <!-- logarithmic curve -->
  <path d="M 90 322 Q 200 220 330 175 T 600 130" fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- few options marker -->
  <circle cx="160" cy="262" r="6" fill="#0ea5a4"/>
  <line x1="160" y1="262" x2="160" y2="330" stroke="#0ea5a4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="160" y="248" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">Few choices</text>
  <text x="160" y="234" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">fast, easy</text>

  <!-- many options marker -->
  <circle cx="520" cy="143" r="6" fill="#ef4444"/>
  <line x1="520" y1="143" x2="520" y2="330" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="520" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">Many choices</text>
  <text x="520" y="115" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">slow, overwhelming</text>

  <text x="320" y="388" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Design move: reduce &amp; group options to speed decisions — simpler menus, fewer features.</text>
</svg>
