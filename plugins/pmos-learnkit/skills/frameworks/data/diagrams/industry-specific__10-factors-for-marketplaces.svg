<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="10 Factors for Marketplaces diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">10 Factors for Marketplaces</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Bill Gurley's checklist for judging a marketplace opportunity</text>

  <!-- Left column -->
  <!-- Row template: number circle + bold label + sub -->
  <!-- 1 -->
  <circle cx="38" cy="80" r="11" fill="#2563eb"/><text x="38" y="84" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="56" y="78" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">New experience vs. status quo</text>
  <text x="56" y="92" font-family="sans-serif" font-size="10" fill="#5b6680">Enables what wasn't possible before</text>
  <!-- 2 -->
  <circle cx="38" cy="118" r="11" fill="#2563eb"/><text x="38" y="122" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="56" y="116" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Economic advantage</text>
  <text x="56" y="130" font-family="sans-serif" font-size="10" fill="#5b6680">Both sides come out ahead</text>
  <!-- 3 -->
  <circle cx="38" cy="156" r="11" fill="#2563eb"/><text x="38" y="160" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="56" y="154" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Tech adds value</text>
  <text x="56" y="168" font-family="sans-serif" font-size="10" fill="#5b6680">Cuts work, raises switching costs</text>
  <!-- 4 -->
  <circle cx="38" cy="194" r="11" fill="#2563eb"/><text x="38" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
  <text x="56" y="192" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">High fragmentation</text>
  <text x="56" y="206" font-family="sans-serif" font-size="10" fill="#5b6680">Many small buyers &amp; suppliers</text>
  <!-- 5 -->
  <circle cx="38" cy="232" r="11" fill="#2563eb"/><text x="38" y="236" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">5</text>
  <text x="56" y="230" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Supplier sign-up friction</text>
  <text x="56" y="244" font-family="sans-serif" font-size="10" fill="#5b6680">A moat later, a drag early on</text>

  <!-- divider -->
  <line x1="324" y1="68" x2="324" y2="256" stroke="#e3e8f5" stroke-width="2"/>

  <!-- Right column -->
  <!-- 6 -->
  <circle cx="344" cy="80" r="11" fill="#0ea5a4"/><text x="344" y="84" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">6</text>
  <text x="362" y="78" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Size of market (TAM)</text>
  <text x="362" y="92" font-family="sans-serif" font-size="10" fill="#5b6680">Big &#8212; but not all of it is reachable</text>
  <!-- 7 -->
  <circle cx="344" cy="118" r="11" fill="#0ea5a4"/><text x="344" y="122" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">7</text>
  <text x="362" y="116" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Expand the market</text>
  <text x="362" y="130" font-family="sans-serif" font-size="10" fill="#5b6680">Grows the whole pie, not just share</text>
  <!-- 8 -->
  <circle cx="344" cy="156" r="11" fill="#0ea5a4"/><text x="344" y="160" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">8</text>
  <text x="362" y="154" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Frequency</text>
  <text x="362" y="168" font-family="sans-serif" font-size="10" fill="#5b6680">Frequent purchases beat one-offs</text>
  <!-- 9 -->
  <circle cx="344" cy="194" r="11" fill="#0ea5a4"/><text x="344" y="198" font-family="sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">9</text>
  <text x="362" y="192" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Payment flow</text>
  <text x="362" y="206" font-family="sans-serif" font-size="10" fill="#5b6680">Be in the flow: revenue, not a tax</text>
  <!-- 10 -->
  <circle cx="344" cy="232" r="11" fill="#0ea5a4"/><text x="344" y="236" font-family="sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">10</text>
  <text x="362" y="230" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Network effects</text>
  <text x="362" y="244" font-family="sans-serif" font-size="10" fill="#5b6680">Each side pulls in the other</text>

  <!-- footer scale -->
  <rect x="24" y="288" width="592" height="88" rx="9" fill="#f4f7ff"/>
  <text x="320" y="312" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438" text-anchor="middle">Score each factor &#8212; the more that lean strong, the better the marketplace bet</text>
  <text x="60" y="350" font-family="sans-serif" font-size="11" fill="#ef4444" font-weight="700">Weak opportunity</text>
  <text x="580" y="350" font-family="sans-serif" font-size="11" fill="#0ea5a4" font-weight="700" text-anchor="end">Strong opportunity</text>
  <line x1="180" y1="346" x2="460" y2="346" stroke="#5b6680" stroke-width="2"/>
  <polygon points="460,346 452,342 452,350" fill="#5b6680"/>
</svg>
