<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="OODA Loop diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">OODA Loop</text>
  <text x="320" y="56" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#5b6680">Observe &#8594; Orient &#8594; Decide &#8594; Act &#8212; loop faster than the environment changes</text>

  <!-- cycle arrows -->
  <g fill="none" stroke="#5b6680" stroke-width="2.5">
    <path d="M 235 130 A 110 90 0 0 1 405 130" marker-end="url(#ah)"/>
    <path d="M 470 165 A 110 90 0 0 1 470 285" marker-end="url(#ah)"/>
    <path d="M 405 320 A 110 90 0 0 1 235 320" marker-end="url(#ah)"/>
    <path d="M 170 285 A 110 90 0 0 1 170 165" marker-end="url(#ah)"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>

  <!-- Observe -->
  <circle cx="170" cy="150" r="52" fill="#f4f7ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="170" y="146" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Observe</text>
  <text x="170" y="164" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">gather signals</text>

  <!-- Orient -->
  <circle cx="470" cy="150" r="52" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="3.5"/>
  <text x="470" y="142" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Orient</text>
  <text x="470" y="159" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#0ea5a4">the edge</text>
  <text x="470" y="172" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5b6680">make sense of it</text>

  <!-- Decide -->
  <circle cx="470" cy="300" r="52" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="470" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Decide</text>
  <text x="470" y="314" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">pick a move</text>

  <!-- Act -->
  <circle cx="170" cy="300" r="52" fill="#f4f7ff" stroke="#ef4444" stroke-width="2.5"/>
  <text x="170" y="296" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Act</text>
  <text x="170" y="314" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">test in reality</text>

  <!-- feedback note -->
  <text x="320" y="392" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Act feeds the next Observe &#8212; tighter loops beat a slower rival</text>
</svg>
