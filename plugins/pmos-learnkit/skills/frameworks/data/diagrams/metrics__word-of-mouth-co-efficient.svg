<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Word of Mouth Co-efficient diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Word of Mouth Coefficient</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">The rate at which active users generate new users through untracked talk</text>

  <!-- The ratio -->
  <g font-family="sans-serif" text-anchor="middle">
    <text x="200" y="150" font-size="20" font-weight="700" fill="#1d2438">WOM Coefficient  =</text>

    <!-- numerator -->
    <rect x="360" y="108" width="248" height="56" rx="8" fill="#0ea5a4" opacity="0.12" stroke="#0ea5a4"/>
    <text x="484" y="132" font-size="14" font-weight="700" fill="#0ea5a4">New Organic Users</text>
    <text x="484" y="152" font-size="11" fill="#5b6680">untraceable first-time users</text>

    <!-- fraction bar -->
    <line x1="360" y1="178" x2="608" y2="178" stroke="#1d2438" stroke-width="2"/>

    <!-- denominator -->
    <rect x="360" y="192" width="248" height="56" rx="8" fill="#2563eb" opacity="0.10" stroke="#2563eb"/>
    <text x="484" y="216" font-size="14" font-weight="700" fill="#2563eb">Active Users</text>
    <text x="484" y="236" font-size="11" fill="#5b6680">returning + non-organic new (D/W/M)</text>
  </g>

  <!-- explanation row -->
  <rect x="32" y="278" width="576" height="48" rx="8" fill="#f4f7ff" stroke="#f59e0b"/>
  <text x="48" y="298" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#1d2438">Engaged users talk at a fairly steady rate — longer engagement &#8594; more word of mouth.</text>
  <text x="48" y="316" font-family="sans-serif" font-size="11.5" fill="#5b6680">Match the active-user window to your retention metric (Daily / Weekly / Monthly).</text>

  <!-- why hard to measure -->
  <text x="32" y="350" font-family="sans-serif" font-size="11.5" fill="#5b6680" font-weight="700">WOM is hard to measure — most happens offline (texts, calls, emails).</text>
  <text x="32" y="372" font-family="sans-serif" font-size="11.5" fill="#5b6680">Common proxies: NPS &#183; attribution surveys &#183; social listening — each imperfect.</text>
</svg>
