<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="OKPS Tree variant diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="19" font-weight="700" fill="#1d2438">OKPS Tree — OST aligned to OKRs</text>
  <text x="320" y="50" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Objective → Key Result → Problem → Solution (Aakash Gupta)</text>

  <!-- connectors -->
  <g stroke="#5b6680" stroke-width="1.5" fill="none">
    <path d="M320 92 L180 132"/>
    <path d="M320 92 L460 132"/>
    <path d="M180 174 L110 214"/>
    <path d="M180 174 L250 214"/>
    <path d="M460 174 L390 214"/>
    <path d="M460 174 L530 214"/>
    <path d="M110 256 L110 296"/>
    <path d="M250 256 L250 296"/>
    <path d="M390 256 L390 296"/>
    <path d="M530 256 L530 296"/>
  </g>

  <!-- Objective -->
  <rect x="240" y="66" width="160" height="26" rx="6" fill="#2563eb"/>
  <text x="320" y="84" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Objective</text>

  <!-- Key Results -->
  <rect x="120" y="148" width="120" height="26" rx="6" fill="#0ea5a4"/>
  <text x="180" y="166" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Key Result</text>
  <rect x="400" y="148" width="120" height="26" rx="6" fill="#0ea5a4"/>
  <text x="460" y="166" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Key Result</text>

  <!-- Problems -->
  <rect x="62" y="230" width="96" height="26" rx="6" fill="#f59e0b"/>
  <text x="110" y="248" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Problem</text>
  <rect x="202" y="230" width="96" height="26" rx="6" fill="#f59e0b"/>
  <text x="250" y="248" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Problem</text>
  <rect x="342" y="230" width="96" height="26" rx="6" fill="#f59e0b"/>
  <text x="390" y="248" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Problem</text>
  <rect x="482" y="230" width="96" height="26" rx="6" fill="#f59e0b"/>
  <text x="530" y="248" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Problem</text>

  <!-- Solutions -->
  <rect x="62" y="310" width="96" height="26" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="328" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Solution</text>
  <rect x="202" y="310" width="96" height="26" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="328" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Solution</text>
  <rect x="342" y="310" width="96" height="26" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="390" y="328" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Solution</text>
  <rect x="482" y="310" width="96" height="26" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="530" y="328" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2438">Solution</text>

  <text x="320" y="372" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Ties the tree to OKRs and drops the fuzzy Opportunity-vs-Solution split.</text>
</svg>
