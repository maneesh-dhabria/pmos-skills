<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Customer Problems Stack Rank (CPSR) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Customer Problems Stack Rank (CPSR)</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">Rank your problem against the customer's other problems — does it matter enough?</text>

  <text x="32" y="98" font-family="sans-serif" font-size="12" font-weight="700" fill="#5b6680" letter-spacing="1">CUSTOMER'S PROBLEM STACK (most urgent at top)</text>

  <!-- Rank 1 -->
  <rect x="32" y="110" width="440" height="36" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <circle cx="52" cy="128" r="11" fill="#5b6680"/>
  <text x="52" y="132" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="74" y="132" font-family="sans-serif" font-size="13" fill="#1d2438">Cash flow / hitting revenue targets</text>

  <!-- Rank 2 -->
  <rect x="32" y="152" width="440" height="36" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <circle cx="52" cy="170" r="11" fill="#5b6680"/>
  <text x="52" y="174" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="74" y="174" font-family="sans-serif" font-size="13" fill="#1d2438">Retaining key staff</text>

  <!-- Rank 3 - YOUR PROBLEM highlighted -->
  <rect x="28" y="192" width="448" height="40" rx="6" fill="#eaf0ff" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="52" cy="212" r="11" fill="#2563eb"/>
  <text x="52" y="216" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="74" y="217" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">The problem YOUR product solves</text>
  <text x="500" y="217" font-family="sans-serif" font-size="13" font-weight="700" fill="#2563eb">&#8592; where does it land?</text>

  <!-- Rank 4 -->
  <rect x="32" y="238" width="440" height="36" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <circle cx="52" cy="256" r="11" fill="#5b6680"/>
  <text x="52" y="260" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="74" y="260" font-family="sans-serif" font-size="13" fill="#1d2438">Improving onboarding</text>

  <!-- Rank 5 -->
  <rect x="32" y="280" width="440" height="36" rx="6" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <circle cx="52" cy="298" r="11" fill="#5b6680"/>
  <text x="52" y="302" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="74" y="302" font-family="sans-serif" font-size="13" fill="#1d2438">Tidying internal docs</text>

  <!-- Arrow / urgency axis -->
  <line x1="510" y1="118" x2="510" y2="308" stroke="#0ea5a4" stroke-width="2"/>
  <polygon points="510,112 506,122 514,122" fill="#0ea5a4"/>
  <text x="528" y="160" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" transform="rotate(90 528 160)">MORE URGENT</text>

  <!-- Takeaway -->
  <rect x="32" y="330" width="576" height="48" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
  <text x="46" y="352" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">High in the stack &#8594; worth building.</text>
  <text x="46" y="370" font-family="sans-serif" font-size="12.5" fill="#5b6680">Good idea + great execution are necessary but not sufficient — the problem must rank high enough to matter.</text>
</svg>
