<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Pyramid of Communication Technology diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Pyramid of Communication Technology</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Evan Spiegel: content formats serve emotional needs — harder formats sit higher, fewer can make them</text>

  <!-- Pyramid, apex centre x=300, narrow top = hard/few -->
  <!-- Tier 1 apex: hard -->
  <polygon points="300,78 360,148 240,148" fill="#ef4444"/>
  <text x="300" y="120" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">TikTok dances</text>
  <text x="300" y="135" font-family="sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">hard, few can</text>

  <!-- Tier 2 -->
  <polygon points="240,152 360,152 412,212 188,212" fill="#f59e0b"/>
  <text x="300" y="186" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Produced video</text>

  <!-- Tier 3 -->
  <polygon points="188,216 412,216 464,276 136,276" fill="#0ea5a4"/>
  <text x="300" y="250" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Stories &amp; posts</text>

  <!-- Tier 4 base: easy -->
  <polygon points="136,280 464,280 516,340 84,340" fill="#2563eb"/>
  <text x="300" y="308" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Ephemeral photo / selfie</text>
  <text x="300" y="323" font-family="sans-serif" font-size="9" fill="#ffffff" text-anchor="middle">easy, anyone can</text>

  <!-- Effort axis (right side, up arrow) -->
  <line x1="540" y1="340" x2="540" y2="90" stroke="#1d2438" stroke-width="2"/>
  <path d="M540 90 l-5 10 h10 z" fill="#1d2438"/>
  <text x="556" y="220" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438" transform="rotate(-90 556 220)">Effort required</text>
  <text x="540" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">easy</text>
  <text x="540" y="86" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">hard</text>

  <!-- Emotional needs (left) -->
  <text x="24" y="360" font-family="sans-serif" font-size="11" fill="#5b6680">Emotional needs served: self-expression · status · communication</text>
</svg>
