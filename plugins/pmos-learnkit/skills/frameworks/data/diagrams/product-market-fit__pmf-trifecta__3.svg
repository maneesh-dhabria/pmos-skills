<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="The retention curve flattening signals product-market fit diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Retention Curve</text>
  <text x="24" y="51" font-family="sans-serif" font-size="12" fill="#5b6680">If the curve flattens, you have PMF for some target audience &#8212; the question is who, and how big</text>

  <!-- plot frame -->
  <line x1="80" y1="92" x2="80" y2="320" stroke="#1d2438" stroke-width="1.6"/>
  <line x1="80" y1="320" x2="600" y2="320" stroke="#1d2438" stroke-width="1.6"/>
  <text x="36" y="200" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" transform="rotate(-90 36 200)" text-anchor="middle">% of users retained</text>
  <text x="340" y="350" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="middle">time since signup &#8594;</text>

  <!-- gridline at the plateau -->
  <line x1="80" y1="232" x2="600" y2="232" stroke="#d8e0f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- No-PMF curve: decays to zero -->
  <path d="M80,108 C150,250 260,312 600,318" fill="none" stroke="#ef4444" stroke-width="2.6" stroke-dasharray="6 5"/>
  <text x="430" y="306" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444">decays to zero &#8212; no PMF</text>

  <!-- PMF curve: decays then flattens onto a plateau -->
  <path d="M80,108 C150,196 240,230 360,232 C460,233 520,232 600,232" fill="none" stroke="#2563eb" stroke-width="2.8"/>
  <text x="430" y="222" font-family="sans-serif" font-size="11" font-weight="700" fill="#2563eb">flattens &#8212; a sticky core remains</text>

  <!-- plateau marker -->
  <circle cx="360" cy="232" r="5" fill="#0ea5a4"/>
  <line x1="360" y1="232" x2="360" y2="320" stroke="#0ea5a4" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="360" y="248" font-family="sans-serif" font-size="9.5" fill="#0ea5a4" text-anchor="middle">curve flattens here</text>

  <!-- callout box -->
  <rect x="360" y="100" width="232" height="86" rx="9" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.3"/>
  <text x="374" y="120" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#0ea5a4">A flat plateau = PMF</text>
  <text x="374" y="138" font-family="sans-serif" font-size="10.5" fill="#5b6680">A stable group keeps coming back.</text>
  <text x="374" y="152" font-family="sans-serif" font-size="10.5" fill="#5b6680">Now ask:</text>
  <text x="374" y="168" font-family="sans-serif" font-size="10.5" fill="#1d2438">&#8226; What / who is that market?</text>
  <text x="374" y="182" font-family="sans-serif" font-size="10.5" fill="#1d2438">&#8226; How big is it?</text>
</svg>
