<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Miller's Law diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Miller's Law</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Working memory holds ~7 (±2) items — so chunk information into meaningful groups</text>

  <!-- Left panel: raw overload -->
  <rect x="32" y="84" width="262" height="280" rx="10" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="48" y="112" font-family="sans-serif" font-size="14" font-weight="700" fill="#ef4444">Unchunked — 11 digits</text>
  <text x="48" y="134" font-family="sans-serif" font-size="13" fill="#5b6680">exceeds working memory, hard to hold</text>
  <g font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">
    <rect x="48" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="56" y="174">9</text>
    <rect x="84" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="92" y="174">2</text>
    <rect x="120" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="128" y="174">8</text>
    <rect x="156" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="164" y="174">3</text>
    <rect x="192" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="200" y="174">5</text>
    <rect x="228" y="150" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="236" y="174">5</text>
    <rect x="48" y="190" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="56" y="214">0</text>
    <rect x="84" y="190" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="92" y="214">1</text>
    <rect x="120" y="190" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="128" y="214">7</text>
    <rect x="156" y="190" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="164" y="214">2</text>
    <rect x="192" y="190" width="30" height="34" rx="5" fill="#ffffff" stroke="#ef4444"/><text x="200" y="214">6</text>
  </g>
  <text x="48" y="268" font-family="sans-serif" font-size="34" fill="#5b6680">⟶</text>
  <text x="92" y="266" font-family="sans-serif" font-size="13" fill="#5b6680">chunk into</text>
  <text x="92" y="284" font-family="sans-serif" font-size="13" fill="#5b6680">meaningful groups</text>
  <text x="48" y="340" font-family="sans-serif" font-size="12" fill="#5b6680">11 separate items to track</text>

  <!-- Right panel: chunked -->
  <rect x="346" y="84" width="262" height="280" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="362" y="112" font-family="sans-serif" font-size="14" font-weight="700" fill="#0ea5a4">Chunked — 3 groups</text>
  <text x="362" y="134" font-family="sans-serif" font-size="13" fill="#5b6680">fits comfortably within ~7 ± 2</text>
  <g font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">
    <rect x="362" y="150" width="100" height="40" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="378" y="176">928</text>
    <rect x="476" y="150" width="116" height="40" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="496" y="176">355</text>
    <rect x="362" y="204" width="100" height="40" rx="7" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/><text x="384" y="230">0172</text>
  </g>
  <text x="362" y="268" font-family="sans-serif" font-size="13" fill="#0ea5a4" font-weight="700">"928 — 355 — 0172"</text>
  <text x="362" y="290" font-family="sans-serif" font-size="13" fill="#5b6680">3 chunks, not 11 digits</text>
  <text x="362" y="340" font-family="sans-serif" font-size="12" fill="#5b6680">3 grouped items to track</text>

  <!-- capacity band -->
  <text x="32" y="392" font-family="sans-serif" font-size="12" fill="#f59e0b">Capacity is ~7 ± 2 chunks — design grouping to expand what fits, not raw memory.</text>
</svg>
