<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Insight Execution and Impact framework for PM Evaluation diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Insight · Execution · Impact — PM Evaluation</text>
  <text x="320" y="49" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">9 questions across 3 areas, rated with judgement and stage-weighted</text>

  <!-- Insight column -->
  <rect x="20" y="62" width="196" height="252" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <rect x="20" y="62" width="196" height="34" rx="10" fill="#2563eb"/>
  <rect x="20" y="80" width="196" height="16" fill="#2563eb"/>
  <text x="118" y="85" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff">INSIGHT</text>
  <text x="34" y="120" font-family="sans-serif" font-size="10.5" fill="#1d2438">1 · Understand products,</text>
  <text x="44" y="134" font-family="sans-serif" font-size="10.5" fill="#1d2438">users, customers, domain</text>
  <text x="34" y="166" font-family="sans-serif" font-size="10.5" fill="#1d2438">2 · Translate into compelling</text>
  <text x="44" y="180" font-family="sans-serif" font-size="10.5" fill="#1d2438">strategy &amp; proposals</text>
  <text x="34" y="212" font-family="sans-serif" font-size="10.5" fill="#1d2438">3 · Turn into goals,</text>
  <text x="44" y="226" font-family="sans-serif" font-size="10.5" fill="#1d2438">priorities &amp; plans that</text>
  <text x="44" y="240" font-family="sans-serif" font-size="10.5" fill="#1d2438">stir action</text>

  <!-- Execution column -->
  <rect x="222" y="62" width="196" height="252" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <rect x="222" y="62" width="196" height="34" rx="10" fill="#0ea5a4"/>
  <rect x="222" y="80" width="196" height="16" fill="#0ea5a4"/>
  <text x="320" y="85" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff">EXECUTION</text>
  <text x="236" y="120" font-family="sans-serif" font-size="10.5" fill="#1d2438">4 · Delivery on your</text>
  <text x="246" y="134" font-family="sans-serif" font-size="10.5" fill="#1d2438">P0 goals</text>
  <text x="236" y="166" font-family="sans-serif" font-size="10.5" fill="#1d2438">5 · Communicate &amp;</text>
  <text x="246" y="180" font-family="sans-serif" font-size="10.5" fill="#1d2438">collaborate (team, XFN)</text>
  <text x="236" y="212" font-family="sans-serif" font-size="10.5" fill="#1d2438">6 · Overall quality of</text>
  <text x="246" y="226" font-family="sans-serif" font-size="10.5" fill="#1d2438">shipped features meets</text>
  <text x="246" y="240" font-family="sans-serif" font-size="10.5" fill="#1d2438">the company bar</text>

  <!-- Impact column -->
  <rect x="424" y="62" width="196" height="252" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="424" y="62" width="196" height="34" rx="10" fill="#f59e0b"/>
  <rect x="424" y="80" width="196" height="16" fill="#f59e0b"/>
  <text x="522" y="85" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff">IMPACT</text>
  <text x="438" y="120" font-family="sans-serif" font-size="10.5" fill="#1d2438">7 · Leading indicators</text>
  <text x="448" y="134" font-family="sans-serif" font-size="10.5" fill="#5b6680">adoption, feedback, usage</text>
  <text x="438" y="166" font-family="sans-serif" font-size="10.5" fill="#1d2438">8 · Lagging indicators</text>
  <text x="448" y="180" font-family="sans-serif" font-size="10.5" fill="#5b6680">revenue, growth, margin</text>
  <text x="438" y="212" font-family="sans-serif" font-size="10.5" fill="#1d2438">9 · Made team, org or</text>
  <text x="448" y="226" font-family="sans-serif" font-size="10.5" fill="#1d2438">company better</text>

  <!-- Ratings scale -->
  <text x="40" y="340" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Rate each:</text>
  <rect x="110" y="328" width="116" height="22" rx="4" fill="#ef4444"/>
  <text x="168" y="343" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">Misses (0)</text>
  <rect x="232" y="328" width="116" height="22" rx="4" fill="#f59e0b"/>
  <text x="290" y="343" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">Meets (1)</text>
  <rect x="354" y="328" width="116" height="22" rx="4" fill="#0ea5a4"/>
  <text x="412" y="343" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">Exceeds (2)</text>
  <rect x="476" y="328" width="144" height="22" rx="4" fill="#2563eb"/>
  <text x="548" y="343" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#ffffff">Exemplary (3-4)</text>

  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#5b6680">Set relative weights up front by product stage — Explore · Expand · Extract (3x heuristic)</text>
</svg>
