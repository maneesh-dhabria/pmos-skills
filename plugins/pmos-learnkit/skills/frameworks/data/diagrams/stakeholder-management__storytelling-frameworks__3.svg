<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Hero's Journey twelve-step cycle diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#1d2438">The Hero's Journey — 12 Steps</text>
  <text x="320" y="52" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#5b6680">A circular journey: depart the ordinary world, face the ordeal, return transformed</text>

  <!-- guiding circle -->
  <circle cx="320" cy="230" r="135" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.5"/>

  <!-- hub -->
  <circle cx="320" cy="230" r="42" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="226" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438">Ordinary</text>
  <text x="320" y="241" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#1d2438">World</text>

  <!-- 12 nodes around circle. angle starts at top (-90deg), clockwise -->
  <!-- helper labels positioned manually -->
  <!-- step nodes -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#1d2438">
    <!-- 1 top -->
    <circle cx="320" cy="95" r="15" fill="#2563eb"/><text x="320" y="99" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text><text x="320" y="80" text-anchor="middle" fill="#5b6680">Call to Adventure</text>
    <!-- 2 -->
    <circle cx="388" cy="113" r="15" fill="#2563eb"/><text x="388" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">2</text><text x="430" y="105" text-anchor="start" fill="#5b6680">Refusal</text>
    <!-- 3 -->
    <circle cx="437" cy="162" r="15" fill="#2563eb"/><text x="437" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3</text><text x="478" y="160" text-anchor="start" fill="#5b6680">Meet Mentor</text>
    <!-- 4 -->
    <circle cx="455" cy="230" r="15" fill="#2563eb"/><text x="455" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">4</text><text x="478" y="234" text-anchor="start" fill="#5b6680">Cross Threshold</text>
    <!-- 5 -->
    <circle cx="437" cy="298" r="15" fill="#f59e0b"/><text x="437" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">5</text><text x="478" y="302" text-anchor="start" fill="#5b6680">Tests / Allies</text>
    <!-- 6 -->
    <circle cx="388" cy="347" r="15" fill="#f59e0b"/><text x="388" y="351" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">6</text><text x="408" y="370" text-anchor="middle" fill="#5b6680">Approach</text>
    <!-- 7 (bottom - ordeal) -->
    <circle cx="320" cy="365" r="15" fill="#ef4444"/><text x="320" y="369" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">7</text><text x="320" y="388" text-anchor="middle" fill="#ef4444" font-weight="700">Ordeal</text>
    <!-- 8 -->
    <circle cx="252" cy="347" r="15" fill="#0ea5a4"/><text x="252" y="351" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">8</text><text x="232" y="370" text-anchor="middle" fill="#5b6680">Reward</text>
    <!-- 9 -->
    <circle cx="203" cy="298" r="15" fill="#0ea5a4"/><text x="203" y="302" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">9</text><text x="162" y="302" text-anchor="end" fill="#5b6680">Road Back</text>
    <!-- 10 -->
    <circle cx="185" cy="230" r="15" fill="#0ea5a4"/><text x="185" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">10</text><text x="162" y="234" text-anchor="end" fill="#5b6680">Resurrection</text>
    <!-- 11 -->
    <circle cx="203" cy="162" r="15" fill="#0ea5a4"/><text x="203" y="166" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">11</text><text x="162" y="160" text-anchor="end" fill="#5b6680">Return w/ Elixir</text>
    <!-- 12 -->
    <circle cx="252" cy="113" r="15" fill="#0ea5a4"/><text x="252" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">12</text><text x="210" y="105" text-anchor="end" fill="#5b6680">Master Worlds</text>
  </g>

  <!-- directional arrow on circle -->
  <path d="M 408 110 A 135 135 0 0 1 430 130" fill="none" stroke="#1d2438" stroke-width="2" marker-end="url(#ar2)"/>
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1d2438"/>
    </marker>
  </defs>
</svg>
