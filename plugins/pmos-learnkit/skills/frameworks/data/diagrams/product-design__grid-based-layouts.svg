<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Grid Based Layouts diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Grid Based Layouts</text>
  <text x="320" y="47" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Columns + gutters + margins structure every layout</text>

  <!-- page frame -->
  <rect x="60" y="70" width="520" height="230" rx="6" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>

  <!-- margins (shaded outer) -->
  <rect x="60" y="70" width="34" height="230" fill="#f4f7ff"/>
  <rect x="546" y="70" width="34" height="230" fill="#f4f7ff"/>

  <!-- 6 columns -->
  <g fill="#2563eb" opacity="0.18">
    <rect x="104" y="86" width="60" height="198"/>
    <rect x="176" y="86" width="60" height="198"/>
    <rect x="248" y="86" width="60" height="198"/>
    <rect x="320" y="86" width="60" height="198"/>
    <rect x="392" y="86" width="60" height="198"/>
    <rect x="464" y="86" width="60" height="198"/>
  </g>
  <g stroke="#2563eb" stroke-width="1" fill="none">
    <rect x="104" y="86" width="60" height="198"/>
    <rect x="176" y="86" width="60" height="198"/>
    <rect x="248" y="86" width="60" height="198"/>
    <rect x="320" y="86" width="60" height="198"/>
    <rect x="392" y="86" width="60" height="198"/>
    <rect x="464" y="86" width="60" height="198"/>
  </g>

  <!-- gutter callout -->
  <rect x="164" y="120" width="12" height="40" fill="#f59e0b" opacity="0.5"/>
  <line x1="170" y1="120" x2="170" y2="90" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="82" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#f59e0b" font-weight="600">gutter</text>

  <!-- column callout -->
  <text x="134" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2563eb" font-weight="600">column</text>

  <!-- margin callout -->
  <text x="77" y="316" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680" font-weight="600">margin</text>
  <line x1="77" y1="300" x2="77" y2="296" stroke="#5b6680"/>

  <!-- three grid types legend -->
  <text x="60" y="340" font-family="sans-serif" font-size="12" font-weight="700" fill="#1d2438">Three grid types</text>
  <g font-family="sans-serif" font-size="11" fill="#5b6680">
    <rect x="60" y="350" width="11" height="11" fill="#2563eb"/>
    <text x="78" y="360">Column &#8212; vertical columns</text>
    <rect x="290" y="350" width="11" height="11" fill="#0ea5a4"/>
    <text x="308" y="360">Modular &#8212; columns + rows</text>
  </g>
  <g font-family="sans-serif" font-size="11" fill="#5b6680">
    <rect x="60" y="370" width="11" height="11" fill="#f59e0b"/>
    <text x="78" y="380">Hierarchical &#8212; sized by importance</text>
  </g>
</svg>
