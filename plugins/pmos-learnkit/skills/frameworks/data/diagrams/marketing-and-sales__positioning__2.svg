<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three positioning traps diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Three common positioning traps</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11" fill="#5b6680">Where positioning exercises most often go wrong &#8212; and the move that corrects each one</text>

  <g font-family="sans-serif">
    <!-- Trap 1 -->
    <rect x="24" y="70" width="592" height="92" rx="10" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="52" cy="98" r="12" fill="#2563eb"/>
    <text x="52" y="102" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="76" y="94" font-size="13" font-weight="700" fill="#1d2438">Defining competitive alternatives</text>
    <text x="76" y="112" font-size="9.5" fill="#5b6680">What would customers do if your offering didn't exist?</text>
    <rect x="76" y="122" width="252" height="30" rx="6" fill="#fdecec" stroke="#ef4444"/>
    <text x="86" y="135" font-size="9" font-weight="600" fill="#ef4444">Trap</text>
    <text x="86" y="147" font-size="8.5" fill="#1d2438">Ignoring the &#8220;no decision&#8221; status quo</text>
    <rect x="344" y="122" width="262" height="30" rx="6" fill="#eafaf6" stroke="#0ea5a4"/>
    <text x="354" y="135" font-size="9" font-weight="600" fill="#0ea5a4">Fix</text>
    <text x="354" y="147" font-size="8.5" fill="#1d2438">Position vs. status quo &#8212; 25% of deals lost to it</text>

    <!-- Trap 2 -->
    <rect x="24" y="172" width="592" height="92" rx="10" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="52" cy="200" r="12" fill="#2563eb"/>
    <text x="52" y="204" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="76" y="196" font-size="13" font-weight="700" fill="#1d2438">Identifying actual competitors</text>
    <text x="76" y="214" font-size="9.5" fill="#5b6680">Which rivals genuinely shape the customer's choice?</text>
    <rect x="76" y="224" width="252" height="30" rx="6" fill="#fdecec" stroke="#ef4444"/>
    <text x="86" y="237" font-size="9" font-weight="600" fill="#ef4444">Trap</text>
    <text x="86" y="249" font-size="8.5" fill="#1d2438">Positioning against phantom competitors</text>
    <rect x="344" y="224" width="262" height="30" rx="6" fill="#eafaf6" stroke="#0ea5a4"/>
    <text x="354" y="237" font-size="9" font-weight="600" fill="#0ea5a4">Fix</text>
    <text x="354" y="249" font-size="8.5" fill="#1d2438">Focus on rivals you've lost to or actually seen</text>

    <!-- Trap 3 -->
    <rect x="24" y="274" width="592" height="92" rx="10" fill="#f4f7ff" stroke="#e2e8f0"/>
    <circle cx="52" cy="302" r="12" fill="#2563eb"/>
    <text x="52" y="306" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="76" y="298" font-size="13" font-weight="700" fill="#1d2438">Choosing a market category</text>
    <text x="76" y="316" font-size="9.5" fill="#5b6680">Which frame of reference makes your value obvious?</text>
    <rect x="76" y="326" width="252" height="30" rx="6" fill="#fef6e7" stroke="#f59e0b"/>
    <text x="86" y="339" font-size="9" font-weight="600" fill="#f59e0b">New category</text>
    <text x="86" y="351" font-size="8.5" fill="#1d2438">Invent a frame &#8212; high cost, must teach it</text>
    <rect x="344" y="326" width="262" height="30" rx="6" fill="#eafaf6" stroke="#0ea5a4"/>
    <text x="354" y="339" font-size="9" font-weight="600" fill="#0ea5a4">Existing category</text>
    <text x="354" y="351" font-size="8.5" fill="#1d2438">Borrow what customers already understand</text>
  </g>
</svg>
