<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="MoSCoW Method diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">MoSCoW Method</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Sort every requirement into four priority buckets &#8212; from non-negotiable to out of scope</text>

  <g font-family="sans-serif">
    <!-- Must-have -->
    <rect x="40" y="76" width="560" height="66" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <circle cx="76" cy="109" r="20" fill="#2563eb"/>
    <text x="76" y="116" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">M</text>
    <text x="112" y="104" font-size="15" font-weight="700" fill="#1d2438">Must-have</text>
    <text x="112" y="124" font-size="11.5" fill="#5b6680">Critical &#8212; release fails without it. Non-negotiable core.</text>
    <text x="588" y="113" font-size="11" font-weight="700" fill="#2563eb" text-anchor="end">ship it</text>

    <!-- Should-have -->
    <rect x="40" y="152" width="560" height="66" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <circle cx="76" cy="185" r="20" fill="#0ea5a4"/>
    <text x="76" y="192" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
    <text x="112" y="180" font-size="15" font-weight="700" fill="#1d2438">Should-have</text>
    <text x="112" y="200" font-size="11.5" fill="#5b6680">Important but not critical for the initial release &#8212; high value.</text>
    <text x="588" y="189" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="end">if time allows</text>

    <!-- Could-have -->
    <rect x="40" y="228" width="560" height="66" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="76" cy="261" r="20" fill="#f59e0b"/>
    <text x="76" y="268" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
    <text x="112" y="256" font-size="15" font-weight="700" fill="#1d2438">Could-have</text>
    <text x="112" y="276" font-size="11.5" fill="#5b6680">Nice to have, low impact &#8212; first to drop if scope tightens.</text>
    <text x="588" y="265" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="end">desirable</text>

    <!-- Won't-have -->
    <rect x="40" y="304" width="560" height="66" rx="8" fill="#fdecec" stroke="#ef4444" stroke-width="2"/>
    <circle cx="76" cy="337" r="20" fill="#ef4444"/>
    <text x="76" y="344" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">W</text>
    <text x="112" y="332" font-size="15" font-weight="700" fill="#1d2438">Won't-have (this time)</text>
    <text x="112" y="352" font-size="11.5" fill="#5b6680">Explicitly out of scope now &#8212; agreed, not forgotten.</text>
    <text x="588" y="341" font-size="11" font-weight="700" fill="#ef4444" text-anchor="end">not now</text>

    <!-- priority arrow -->
    <line x1="22" y1="80" x2="22" y2="366" stroke="#5b6680" stroke-width="1.5"/>
    <polygon points="22,366 18,358 26,358" fill="#5b6680"/>
    <text x="14" y="225" font-size="9.5" fill="#5b6680" transform="rotate(-90 14 225)" text-anchor="middle">decreasing priority</text>
  </g>
</svg>
