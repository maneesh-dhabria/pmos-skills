<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Initiatives, Epics and User Stories diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="36" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Initiatives, Epics &amp; User Stories</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Breaking delivery work from goal to detail</text>

  <!-- Pyramid tiers -->
  <!-- Initiative (top) -->
  <polygon points="320,76 232,140 408,140" fill="#1d2438"/>
  <text x="320" y="118" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Initiative</text>
  <!-- Epics (middle) -->
  <polygon points="232,144 408,144 452,212 188,212" fill="#2563eb"/>
  <text x="320" y="186" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Epics</text>
  <!-- Stories (bottom) -->
  <polygon points="188,216 452,216 500,288 140,288" fill="#0ea5a4"/>
  <text x="320" y="258" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">User Stories</text>

  <!-- side annotations -->
  <g font-family="sans-serif" font-size="10.5" fill="#5b6680">
    <text x="470" y="112">Collection of epics</text>
    <text x="470" y="126">toward one goal</text>
    <text x="470" y="125"></text>
    <text x="490" y="180">Large bodies of work,</text>
    <text x="490" y="194">delivered over sprints</text>
    <text x="530" y="248">INVEST-sized</text>
    <text x="530" y="262">requirements</text>
  </g>

  <!-- "1 to many" cues -->
  <g font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">
    <text x="148" y="138">1</text>
    <text x="120" y="200">many</text>
    <text x="96" y="262">many</text>
  </g>

  <!-- User story format card -->
  <rect x="64" y="312" width="512" height="62" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
  <text x="80" y="332" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">USER STORY FORMAT</text>
  <text x="80" y="352" font-family="sans-serif" font-size="13" fill="#1d2438">As a <tspan font-weight="700" fill="#2563eb">[user]</tspan>, I want <tspan font-weight="700" fill="#2563eb">[action]</tspan>, so that <tspan font-weight="700" fill="#2563eb">[benefit]</tspan>.</text>
  <text x="80" y="368" font-family="sans-serif" font-size="10.5" fill="#5b6680">INVEST: Independent · Negotiable · Valuable · Estimable · Small · Testable</text>
</svg>
