<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Goal-Gradient Effect diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Goal-Gradient Effect</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Effort accelerates as the goal nears — even an artificial head-start helps</text>

  <!-- axes -->
  <line x1="80" y1="320" x2="600" y2="320" stroke="#1d2438" stroke-width="2"/>
  <line x1="80" y1="320" x2="80" y2="100" stroke="#1d2438" stroke-width="2"/>
  <text x="340" y="356" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">progress toward goal  →</text>
  <text x="60" y="210" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle" transform="rotate(-90 60 210)">motivation / pace</text>

  <!-- rising curve: motivation climbs toward goal -->
  <path d="M80 300 C 240 296, 380 250, 520 130" fill="none" stroke="#2563eb" stroke-width="3"/>
  <circle cx="520" cy="130" r="6" fill="#2563eb"/>
  <text x="540" y="124" font-family="sans-serif" font-size="12" font-weight="700" fill="#2563eb">sprint to finish</text>

  <!-- start marker -->
  <circle cx="80" cy="300" r="5" fill="#5b6680"/>
  <text x="92" y="296" font-family="sans-serif" font-size="11" fill="#5b6680">start: slow</text>

  <!-- goal line -->
  <line x1="520" y1="100" x2="520" y2="320" stroke="#0ea5a4" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="520" y="92" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">GOAL</text>

  <!-- endowed progress panel -->
  <rect x="80" y="370" width="520" height="0" fill="none"/>
  <rect x="80" y="362" width="240" height="30" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="382" font-family="sans-serif" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">Endowed: 2 free stamps = head-start</text>

  <!-- annotation: artificial head-start shifts you up the curve -->
  <line x1="80" y1="300" x2="160" y2="278" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="160" cy="278" r="5" fill="#f59e0b"/>
  <text x="170" y="272" font-family="sans-serif" font-size="11" fill="#f59e0b">head-start moves you up the curve</text>
</svg>
