<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Discounted Cash-Flows (DCF) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Discounted Cash-Flows (DCF)</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">Future cash flows are worth less today &#8212; discount each one back at the cost of capital</text>

  <!-- timeline -->
  <line x1="70" y1="180" x2="600" y2="180" stroke="#5b6680" stroke-width="1.5"/>
  <polygon points="600,180 590,175 590,185" fill="#5b6680"/>
  <text x="600" y="200" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="end">time &#8594;</text>

  <!-- future cash flow nodes Y1..Y5, $100k each -->
  <g font-family="sans-serif" text-anchor="middle">
    <g>
      <rect x="150" y="92" width="68" height="40" rx="6" fill="#0ea5a4"/>
      <text x="184" y="110" font-size="11" font-weight="700" fill="#ffffff">$100k</text>
      <text x="184" y="125" font-size="9" fill="#e6fffb">Year 1</text>
    </g>
    <g>
      <rect x="240" y="92" width="68" height="40" rx="6" fill="#0ea5a4"/>
      <text x="274" y="110" font-size="11" font-weight="700" fill="#ffffff">$100k</text>
      <text x="274" y="125" font-size="9" fill="#e6fffb">Year 2</text>
    </g>
    <g>
      <rect x="330" y="92" width="68" height="40" rx="6" fill="#0ea5a4"/>
      <text x="364" y="110" font-size="11" font-weight="700" fill="#ffffff">$100k</text>
      <text x="364" y="125" font-size="9" fill="#e6fffb">Year 3</text>
    </g>
    <g>
      <rect x="420" y="92" width="68" height="40" rx="6" fill="#0ea5a4"/>
      <text x="454" y="110" font-size="11" font-weight="700" fill="#ffffff">$100k</text>
      <text x="454" y="125" font-size="9" fill="#e6fffb">Year 4</text>
    </g>
    <g>
      <rect x="510" y="92" width="68" height="40" rx="6" fill="#0ea5a4"/>
      <text x="544" y="110" font-size="11" font-weight="700" fill="#ffffff">$100k</text>
      <text x="544" y="125" font-size="9" fill="#e6fffb">Year 5</text>
    </g>
  </g>

  <!-- discount arrows pulling each back to present (left) -->
  <g stroke="#f59e0b" stroke-width="1.5" fill="none">
    <path d="M150,132 C120,150 110,165 100,205"/>
    <path d="M240,132 C190,160 130,175 102,212"/>
    <path d="M330,132 C250,170 140,185 104,220"/>
    <path d="M420,132 C300,182 150,195 106,228"/>
    <path d="M510,132 C340,196 160,205 108,236"/>
  </g>
  <text x="300" y="158" font-family="sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-anchor="middle">÷ (1 + r)&#8319;  &#160; discount @ r = 10%</text>

  <!-- Present value box -->
  <rect x="40" y="200" width="78" height="120" rx="8" fill="#2563eb"/>
  <text x="79" y="226" font-family="sans-serif" font-size="11" fill="#dbe6ff" text-anchor="middle">Present</text>
  <text x="79" y="240" font-family="sans-serif" font-size="11" fill="#dbe6ff" text-anchor="middle">Value</text>
  <text x="79" y="270" font-family="sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">$379k</text>
  <text x="79" y="290" font-family="sans-serif" font-size="9" fill="#dbe6ff" text-anchor="middle">sum of</text>
  <text x="79" y="302" font-family="sans-serif" font-size="9" fill="#dbe6ff" text-anchor="middle">discounted CFs</text>

  <!-- decision rule -->
  <rect x="150" y="248" width="430" height="72" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.2"/>
  <text x="170" y="272" font-family="sans-serif" font-size="13" font-weight="700" fill="#1d2438">Decision rule</text>
  <text x="170" y="294" font-family="sans-serif" font-size="12" fill="#1d2438">If PV of cash flows &#62; cost of the investment &#8594; <tspan fill="#0ea5a4" font-weight="700">invest</tspan></text>
  <text x="170" y="312" font-family="sans-serif" font-size="11.5" fill="#5b6680">Accounts for the time value of money &amp; risk via the discount rate.</text>

  <text x="32" y="386" font-family="sans-serif" font-size="11.5" fill="#5b6680">A dollar later is worth less than a dollar now &#8212; the further out, the steeper the discount.</text>
</svg>
