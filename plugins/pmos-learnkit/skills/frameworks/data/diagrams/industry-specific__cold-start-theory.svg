<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Cold Start Theory diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Cold Start Theory</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Andrew Chen's five stages of a network effect, over time</text>

  <!-- axes -->
  <line x1="60" y1="300" x2="616" y2="300" stroke="#5b6680" stroke-width="1.5"/>
  <line x1="60" y1="80" x2="60" y2="300" stroke="#5b6680" stroke-width="1.5"/>
  <text x="46" y="86" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">network value</text>
  <text x="608" y="318" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="end">time &#8594;</text>

  <!-- S-curve growth path -->
  <path d="M60 288 C 130 286, 150 270, 200 252 C 250 234, 270 150, 360 120 C 430 96, 480 92, 540 90 L 616 90"
        fill="none" stroke="#2563eb" stroke-width="3"/>

  <!-- ceiling dip then moat plateau shown via markers -->
  <!-- stage markers -->
  <!-- 1 Cold Start -->
  <circle cx="95" cy="285" r="6" fill="#ef4444"/>
  <text x="95" y="330" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Cold Start</text>
  <text x="95" y="345" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">get right users +</text>
  <text x="95" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">content at once</text>

  <!-- 2 Tipping Point -->
  <circle cx="205" cy="250" r="6" fill="#f59e0b"/>
  <text x="205" y="232" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Tipping Point</text>
  <text x="205" y="247" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle" display="none"> </text>
  <text x="205" y="345" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">new networks</text>
  <text x="205" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">tip faster</text>

  <!-- 3 Escape Velocity -->
  <circle cx="330" cy="138" r="6" fill="#0ea5a4"/>
  <text x="330" y="120" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Escape Velocity</text>
  <text x="330" y="345" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">acquisition + engage-</text>
  <text x="330" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">ment + economic</text>

  <!-- 4 Ceiling -->
  <circle cx="470" cy="92" r="6" fill="#ef4444"/>
  <text x="470" y="74" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Ceiling</text>
  <text x="470" y="345" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">growth stalls,</text>
  <text x="470" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">saturation</text>

  <!-- 5 Moat -->
  <circle cx="585" cy="90" r="6" fill="#2563eb"/>
  <text x="585" y="74" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Moat</text>
  <text x="585" y="345" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">fend off</text>
  <text x="585" y="356" font-family="sans-serif" font-size="9" fill="#5b6680" text-anchor="middle">competitors</text>

  <!-- Atomic-network callout -->
  <rect x="116" y="372" width="408" height="0" fill="none"/>
  <g transform="translate(0,0)">
    <rect x="120" y="372" width="2" height="2" fill="none"/>
  </g>
  <!-- tactic chip -->
  <rect x="150" y="368" width="340" height="26" rx="13" fill="#f4f7ff"/>
  <circle cx="172" cy="381" r="6" fill="#0ea5a4"/>
  <text x="320" y="385" font-family="sans-serif" font-size="10.5" fill="#1d2438" text-anchor="middle" font-weight="700">Tactic to start: build one small atomic network (e.g. Facebook @ Harvard)</text>
</svg>
