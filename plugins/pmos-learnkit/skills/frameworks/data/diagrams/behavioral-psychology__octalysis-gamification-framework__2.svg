<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Octalysis Left-Brain/Right-Brain and White-Hat/Black-Hat axes diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="19" font-weight="700" fill="#1d2438">Octalysis Axes: Two Dimensions of the Core Drives</text>

  <!-- Quadrant grid -->
  <rect x="120" y="64" width="400" height="280" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="320" y1="64" x2="320" y2="344" stroke="#1d2438" stroke-width="1.5"/>
  <line x1="120" y1="204" x2="520" y2="204" stroke="#1d2438" stroke-width="1.5"/>

  <!-- Axis labels -->
  <text x="220" y="58" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#2563eb">LEFT — Logic &amp; Ownership</text>
  <text x="420" y="58" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#0ea5a4">RIGHT — Creativity &amp; Social</text>

  <text x="112" y="134" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#1d2438" transform="rotate(-90 112 134)">TOP — White Hat (positive)</text>
  <text x="112" y="274" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="12.5" font-weight="700" fill="#ef4444" transform="rotate(-90 112 274)">BOTTOM — Black Hat (negative)</text>

  <!-- Top-left -->
  <text x="220" y="120" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">White Hat · Left-Brain</text>
  <text x="220" y="140" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Development &amp;</text>
  <text x="220" y="154" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Accomplishment</text>
  <text x="220" y="172" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Ownership &amp; Possession</text>

  <!-- Top-right -->
  <text x="420" y="120" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">White Hat · Right-Brain</text>
  <text x="420" y="140" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Epic Meaning &amp; Calling</text>
  <text x="420" y="158" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Empowerment &amp;</text>
  <text x="420" y="172" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Creativity / Feedback</text>

  <!-- Bottom-left -->
  <text x="220" y="252" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Black Hat · Left-Brain</text>
  <text x="220" y="272" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Scarcity &amp; Impatience</text>
  <text x="220" y="290" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Loss &amp; Avoidance</text>

  <!-- Bottom-right -->
  <text x="420" y="252" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Black Hat · Right-Brain</text>
  <text x="420" y="272" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Social Influence</text>
  <text x="420" y="286" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">&amp; Relatedness</text>
  <text x="420" y="304" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Unpredictability &amp; Curiosity</text>

  <text x="320" y="372" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="10.5" fill="#5b6680">Top drives are intrinsic / sustainable; bottom drives are urgent but can breed anxiety.</text>
</svg>
