<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Opportunity Solution Tree diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438" text-anchor="middle">Opportunity Solution Tree</text>

  <!-- Connector lines (drawn first, behind nodes) -->
  <g stroke="#5b6680" stroke-width="1.5" fill="none">
    <!-- outcome to opportunities -->
    <path d="M320 78 C 320 100, 150 100, 150 124"/>
    <path d="M320 78 C 320 100, 320 100, 320 124"/>
    <path d="M320 78 C 320 100, 490 100, 490 124"/>
    <!-- opportunity 1 to solutions -->
    <path d="M150 170 C 150 192, 90 192, 90 216"/>
    <path d="M150 170 C 150 192, 210 192, 210 216"/>
    <!-- opportunity 2 to solution -->
    <path d="M320 170 C 320 192, 320 192, 320 216"/>
    <!-- opportunity 3 to solution -->
    <path d="M490 170 C 490 192, 490 192, 490 216"/>
    <!-- solutions to experiments -->
    <path d="M90 258 L 90 300"/>
    <path d="M210 258 L 210 300"/>
    <path d="M320 258 L 320 300"/>
    <path d="M490 258 L 490 300"/>
  </g>

  <!-- Outcome -->
  <g font-family="sans-serif">
    <rect x="232" y="46" width="176" height="34" rx="17" fill="#2563eb"/>
    <text x="320" y="68" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">OUTCOME &#183; one metric</text>
  </g>

  <!-- Opportunities -->
  <g font-family="sans-serif">
    <rect x="88" y="124" width="124" height="46" rx="8" fill="#ecfdf5" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="150" y="143" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Opportunity</text>
    <text x="150" y="159" font-size="10" fill="#0ea5a4" text-anchor="middle">user pain point</text>

    <rect x="258" y="124" width="124" height="46" rx="8" fill="#ecfdf5" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="320" y="143" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Opportunity</text>
    <text x="320" y="159" font-size="10" fill="#0ea5a4" text-anchor="middle">unmet need</text>

    <rect x="428" y="124" width="124" height="46" rx="8" fill="#ecfdf5" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="490" y="143" font-size="11" font-weight="700" fill="#1d2438" text-anchor="middle">Opportunity</text>
    <text x="490" y="159" font-size="10" fill="#0ea5a4" text-anchor="middle">from research</text>
  </g>

  <!-- Solution ideas -->
  <g font-family="sans-serif">
    <rect x="40" y="216" width="100" height="42" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="90" y="234" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Solution</text>
    <text x="90" y="249" font-size="10" fill="#f59e0b" text-anchor="middle">idea</text>

    <rect x="160" y="216" width="100" height="42" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="210" y="234" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Solution</text>
    <text x="210" y="249" font-size="10" fill="#f59e0b" text-anchor="middle">idea</text>

    <rect x="270" y="216" width="100" height="42" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="320" y="234" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Solution</text>
    <text x="320" y="249" font-size="10" fill="#f59e0b" text-anchor="middle">idea</text>

    <rect x="440" y="216" width="100" height="42" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="490" y="234" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Solution</text>
    <text x="490" y="249" font-size="10" fill="#f59e0b" text-anchor="middle">idea</text>
  </g>

  <!-- Experiments -->
  <g font-family="sans-serif">
    <rect x="48" y="300" width="84" height="38" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
    <text x="90" y="324" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Experiment</text>
    <rect x="168" y="300" width="84" height="38" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
    <text x="210" y="324" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Experiment</text>
    <rect x="278" y="300" width="84" height="38" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
    <text x="320" y="324" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Experiment</text>
    <rect x="448" y="300" width="84" height="38" rx="8" fill="#f4f7ff" stroke="#5b6680" stroke-width="1.5"/>
    <text x="490" y="324" font-size="10.5" font-weight="700" fill="#1d2438" text-anchor="middle">Experiment</text>
  </g>

  <!-- Layer labels -->
  <g font-family="sans-serif" font-size="10" fill="#5b6680" font-weight="700">
    <text x="600" y="67" text-anchor="end">Desired outcome</text>
    <text x="600" y="150" text-anchor="end">Opportunities</text>
    <text x="600" y="241" text-anchor="end">Solution ideas</text>
    <text x="600" y="323" text-anchor="end">Experiments</text>
  </g>

  <text x="320" y="362" font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">Continuous discovery: outcome &#8594; opportunities &#8594; solutions &#8594; experiments to validate</text>
</svg>
