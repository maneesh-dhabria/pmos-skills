<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Four Myths of Bundling diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="32" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Four Myths of Bundling</text>
  <text x="24" y="52" font-family="sans-serif" font-size="12" fill="#5b6680">Shishir Mehrotra &#8212; each common myth, paired with its counter-thesis.</text>

  <!-- column headers -->
  <rect x="24" y="64" width="298" height="26" rx="6" fill="#ef4444"/>
  <text x="173" y="82" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">MYTH</text>
  <rect x="330" y="64" width="286" height="26" rx="6" fill="#0ea5a4"/>
  <text x="473" y="82" font-family="sans-serif" font-size="12.5" font-weight="700" fill="#ffffff" text-anchor="middle">THESIS</text>

  <g font-family="sans-serif">
    <!-- Row 1 -->
    <rect x="24" y="96" width="298" height="66" rx="7" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="36" y="116" font-size="11" font-weight="700" fill="#ef4444">1. Bundling benefits all</text>
    <text x="36" y="134" font-size="10.5" fill="#5b6680">Helps consumers &amp; providers</text>
    <text x="36" y="150" font-size="10.5" fill="#5b6680">equally.</text>
    <rect x="330" y="96" width="286" height="66" rx="7" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="342" y="116" font-size="10.5" fill="#1d2438">It creates value by reaching</text>
    <text x="342" y="132" font-size="10.5" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">CasualFans</tspan> &#8212; not just SuperFans,</text>
    <text x="342" y="148" font-size="10.5" fill="#1d2438">giving providers wider reach.</text>

    <!-- Row 2 -->
    <rect x="24" y="166" width="298" height="56" rx="7" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="36" y="186" font-size="11" font-weight="700" fill="#ef4444">2. Split revenue by usage</text>
    <text x="36" y="204" font-size="10.5" fill="#5b6680">Pay providers by how much</text>
    <text x="36" y="218" font-size="10.5" fill="#5b6680">each is consumed.</text>
    <rect x="330" y="166" width="286" height="56" rx="7" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="342" y="186" font-size="10.5" fill="#1d2438">Allocate by <tspan font-weight="700" fill="#2563eb">Marginal Churn</tspan></text>
    <text x="342" y="202" font-size="10.5" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">Contribution</tspan> &#8212; who'd churn if</text>
    <text x="342" y="216" font-size="10.5" fill="#1d2438">removed (ESPN &#8800; History Ch.).</text>

    <!-- Row 3 -->
    <rect x="24" y="226" width="298" height="56" rx="7" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="36" y="246" font-size="11" font-weight="700" fill="#ef4444">3. Bundles feel like rip-offs</text>
    <text x="36" y="264" font-size="10.5" fill="#5b6680">No choice &#8594; consumers feel</text>
    <text x="36" y="278" font-size="10.5" fill="#5b6680">short-changed.</text>
    <rect x="330" y="226" width="286" height="56" rx="7" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="342" y="246" font-size="10.5" fill="#1d2438">With a transparent <tspan font-weight="700" fill="#2563eb">a-la-carte</tspan></text>
    <text x="342" y="262" font-size="10.5" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">price</tspan>, consumers value it as</text>
    <text x="342" y="276" font-size="10.5" fill="#1d2438">"pay for X1+X2, get X3+X4 free."</text>

    <!-- Row 4 -->
    <rect x="24" y="286" width="298" height="56" rx="7" fill="#fff" stroke="#e0e6f5" stroke-width="1.2"/>
    <text x="36" y="306" font-size="11" font-weight="700" fill="#ef4444">4. Narrow, similar is best</text>
    <text x="36" y="324" font-size="10.5" fill="#5b6680">Tight, alike products make</text>
    <text x="36" y="338" font-size="10.5" fill="#5b6680">the most sense.</text>
    <rect x="330" y="286" width="286" height="56" rx="7" fill="#f4f7ff" stroke="#cfe0df" stroke-width="1.2"/>
    <text x="342" y="306" font-size="10.5" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">Minimize SuperFan overlap,</tspan></text>
    <text x="342" y="322" font-size="10.5" fill="#1d2438"><tspan font-weight="700" fill="#2563eb">maximize CasualFan overlap</tspan> &#8212;</text>
    <text x="342" y="336" font-size="10.5" fill="#1d2438">add products that draw new fans.</text>
  </g>

  <rect x="24" y="348" width="592" height="24" rx="6" fill="#f4f7ff"/>
  <text x="36" y="364" font-family="sans-serif" font-size="10.5" fill="#5b6680">Players: <tspan font-weight="700" fill="#1d2438">Consumer</tspan> buys &#183; <tspan font-weight="700" fill="#1d2438">Provider</tspan> supplies a good &#183; <tspan font-weight="700" fill="#1d2438">Bundler</tspan> packages &amp; sells. Bundles live or die on the CasualFan.</text>
</svg>
