<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Design Systems diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Design Systems</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Rules + reusable repositories + a maintaining team = consistent design at scale</text>

  <!-- Top: rules banner -->
  <rect x="24" y="70" width="592" height="34" rx="8" fill="#2563eb"/>
  <text x="320" y="92" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">A SET OF RULES — common language, consistent look across pages &amp; channels</text>

  <!-- Two pillars: Repositories + People -->
  <g font-family="sans-serif">
    <!-- connectors -->
    <path d="M320 104 L320 118" stroke="#5b6680" stroke-width="2"/>
    <path d="M170 118 L470 118" stroke="#5b6680" stroke-width="2"/>
    <path d="M170 118 L170 130" stroke="#5b6680" stroke-width="2"/>
    <path d="M470 118 L470 130" stroke="#5b6680" stroke-width="2"/>

    <!-- Repositories pillar -->
    <text x="170" y="146" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">1 · Design repositories</text>

    <rect x="40" y="156" width="260" height="52" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="54" y="176" font-size="11" font-weight="700" fill="#0ea5a4">Style guide</text>
    <text x="54" y="194" font-size="9.5" fill="#5b6680">Principles, branding &amp; visual references</text>

    <rect x="40" y="216" width="260" height="52" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="54" y="236" font-size="11" font-weight="700" fill="#0ea5a4">Component library</text>
    <text x="54" y="254" font-size="9.5" fill="#5b6680">Reusable UI elements + code snippets</text>

    <rect x="40" y="276" width="260" height="52" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="54" y="296" font-size="11" font-weight="700" fill="#0ea5a4">Pattern library</text>
    <text x="54" y="314" font-size="9.5" fill="#5b6680">Groupings, layouts &amp; templates</text>

    <!-- People pillar -->
    <text x="470" y="146" font-size="12" font-weight="700" fill="#1d2438" text-anchor="middle">2 · People (maintainers)</text>
    <rect x="340" y="156" width="260" height="172" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="356" y="178" font-size="9.5" fill="#5b6680">Continuous upkeep so it doesn't go stale.</text>
    <text x="356" y="192" font-size="9.5" fill="#5b6680">Recommended minimum team:</text>

    <g>
      <circle cx="372" cy="218" r="12" fill="#f59e0b"/>
      <text x="394" y="222" font-size="11" font-weight="700" fill="#1d2438">Interaction designer</text>
      <circle cx="372" cy="254" r="12" fill="#f59e0b"/>
      <text x="394" y="258" font-size="11" font-weight="700" fill="#1d2438">Visual designer</text>
      <circle cx="372" cy="290" r="12" fill="#f59e0b"/>
      <text x="394" y="294" font-size="11" font-weight="700" fill="#1d2438">Developer</text>
    </g>
  </g>

  <!-- Benefits footer -->
  <rect x="24" y="340" width="592" height="44" rx="6" fill="#eff6ff"/>
  <text x="36" y="358" font-family="sans-serif" font-size="10.5" font-weight="700" fill="#2563eb">Benefits</text>
  <text x="36" y="376" font-family="sans-serif" font-size="10" fill="#1d2438">Quick &amp; scalable work  ·  unified language  ·  visual consistency  ·  frees teams for hard problems  ·  educates juniors</text>
</svg>
