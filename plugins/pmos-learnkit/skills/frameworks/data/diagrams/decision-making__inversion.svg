<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Inversion diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Inversion</text>
  <text x="32" y="56" font-family="sans-serif" font-size="13" fill="#5b6680">Don't ask how to win — ask what guarantees failure, then avoid it.</text>

  <!-- Forward panel -->
  <rect x="32" y="84" width="266" height="276" rx="10" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <text x="48" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#5b6680">Forward (usual)</text>
  <text x="48" y="138" font-family="sans-serif" font-size="14" fill="#1d2438">Q: "How do we succeed?"</text>
  <text x="48" y="170" font-family="sans-serif" font-size="13" fill="#5b6680">- Brainstorm wins</text>
  <text x="48" y="192" font-family="sans-serif" font-size="13" fill="#5b6680">- Open-ended, many paths</text>
  <text x="48" y="214" font-family="sans-serif" font-size="13" fill="#5b6680">- Easy to fool yourself</text>
  <text x="48" y="236" font-family="sans-serif" font-size="13" fill="#5b6680">- Blind to fatal risks</text>

  <!-- Arrow / flip -->
  <text x="316" y="226" font-family="sans-serif" font-size="30" font-weight="700" fill="#2563eb">↻</text>
  <text x="304" y="252" font-family="sans-serif" font-size="11" fill="#5b6680">invert</text>

  <!-- Inverted panel -->
  <rect x="342" y="84" width="266" height="276" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="358" y="112" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Inverted</text>
  <text x="358" y="138" font-family="sans-serif" font-size="14" fill="#1d2438">Q: "What guarantees failure?"</text>
  <text x="358" y="170" font-family="sans-serif" font-size="13" fill="#1d2438">1. List ways to fail</text>
  <text x="358" y="192" font-family="sans-serif" font-size="13" fill="#1d2438">2. Make them vivid &amp; concrete</text>
  <text x="358" y="214" font-family="sans-serif" font-size="13" fill="#1d2438">3. Systematically avoid each</text>
  <text x="358" y="236" font-family="sans-serif" font-size="13" fill="#0ea5a4">→ Fewer fatal errors</text>
  <text x="358" y="258" font-family="sans-serif" font-size="13" fill="#0ea5a4">→ Sharper constraints</text>

  <text x="358" y="312" font-family="sans-serif" font-size="12" fill="#5b6680" font-style="italic">"All I want to know is where</text>
  <text x="358" y="330" font-family="sans-serif" font-size="12" fill="#5b6680" font-style="italic">I'm going to die, so I'll</text>
  <text x="358" y="348" font-family="sans-serif" font-size="12" fill="#5b6680" font-style="italic">never go there." — Munger</text>
</svg>
