<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Story Mapping diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Story Mapping</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Activities → steps across the top; details prioritized below; release lines slice the map</text>

  <!-- left axis labels -->
  <text x="34" y="74" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#2563eb" transform="rotate(-90 34 74)">ACTIVITY</text>
  <text x="34" y="108" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#0ea5a4" transform="rotate(-90 34 108)">STEPS</text>
  <text x="34" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#5b6680" transform="rotate(-90 34 240)">DETAILS ↓ priority</text>

  <!-- backbone narrative arrow -->
  <line x1="60" y1="92" x2="600" y2="92" stroke="#cdd6ec" stroke-width="1"/>
  <text x="600" y="88" text-anchor="end" font-family="sans-serif" font-size="9" fill="#5b6680">user journey →</text>

  <!-- Activities (top) -->
  <rect x="60" y="58" width="250" height="24" rx="4" fill="#2563eb"/>
  <text x="185" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Deposit a check</text>
  <rect x="330" y="58" width="270" height="24" rx="4" fill="#2563eb" opacity="0.85"/>
  <text x="465" y="74" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">Manage account</text>

  <!-- Steps (sequential) -->
  <g font-family="sans-serif" font-size="9" fill="#1d2438">
    <rect x="60" y="98" width="118" height="22" rx="4" fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4"/>
    <text x="119" y="113" text-anchor="middle">Capture photo</text>
    <rect x="192" y="98" width="118" height="22" rx="4" fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4"/>
    <text x="251" y="113" text-anchor="middle">Confirm amount</text>
    <rect x="330" y="98" width="128" height="22" rx="4" fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4"/>
    <text x="394" y="113" text-anchor="middle">View balance</text>
    <rect x="472" y="98" width="128" height="22" rx="4" fill="#0ea5a4" opacity="0.18" stroke="#0ea5a4"/>
    <text x="536" y="113" text-anchor="middle">See history</text>
  </g>

  <!-- Release line 1 (MVP) -->
  <line x1="56" y1="138" x2="604" y2="138" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="56" y="129" width="58" height="14" rx="3" fill="#2563eb"/>
  <text x="85" y="139" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#ffffff">MVP</text>

  <!-- Details under each step, above release line = release 1 -->
  <g font-family="sans-serif" font-size="8" fill="#1d2438">
    <rect x="60" y="146" width="118" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="119" y="159" text-anchor="middle">Auto-crop edges</text>
    <rect x="192" y="146" width="118" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="251" y="159" text-anchor="middle">Read amount</text>
    <rect x="330" y="146" width="128" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="394" y="159" text-anchor="middle">Current balance</text>
    <rect x="472" y="146" width="128" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="536" y="159" text-anchor="middle">Last 5 txns</text>
  </g>

  <!-- Release line 2 -->
  <line x1="56" y1="180" x2="604" y2="180" stroke="#0ea5a4" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="56" y="171" width="68" height="14" rx="3" fill="#0ea5a4"/>
  <text x="90" y="181" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#ffffff">Release 2</text>

  <g font-family="sans-serif" font-size="8" fill="#1d2438">
    <rect x="60" y="188" width="118" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="119" y="201" text-anchor="middle">Front+back scan</text>
    <rect x="192" y="188" width="118" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="251" y="201" text-anchor="middle">Edit amount</text>
    <rect x="330" y="188" width="128" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="394" y="201" text-anchor="middle">Pending holds</text>
    <rect x="472" y="188" width="128" height="20" rx="3" fill="#f4f7ff" stroke="#cdd6ec"/><text x="536" y="201" text-anchor="middle">Search txns</text>
  </g>

  <!-- Release line 3 -->
  <line x1="56" y1="222" x2="604" y2="222" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="56" y="213" width="68" height="14" rx="3" fill="#f59e0b"/>
  <text x="90" y="223" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#1d2438">Later</text>

  <g font-family="sans-serif" font-size="8" fill="#5b6680">
    <rect x="60" y="230" width="118" height="20" rx="3" fill="#ffffff" stroke="#e2e8f5"/><text x="119" y="243" text-anchor="middle">Multi-check batch</text>
    <rect x="192" y="230" width="118" height="20" rx="3" fill="#ffffff" stroke="#e2e8f5"/><text x="251" y="243" text-anchor="middle">Split deposit</text>
    <rect x="330" y="230" width="128" height="20" rx="3" fill="#ffffff" stroke="#e2e8f5"/><text x="394" y="243" text-anchor="middle">Forecast</text>
    <rect x="472" y="230" width="128" height="20" rx="3" fill="#ffffff" stroke="#e2e8f5"/><text x="536" y="243" text-anchor="middle">Export CSV</text>
  </g>

  <!-- arrow showing priority direction -->
  <line x1="630" y1="150" x2="630" y2="245" stroke="#5b6680" stroke-width="1" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#5b6680"/></marker></defs>

  <text x="320" y="285" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#1d2438">Whole product visible at once → scope MVP, slice releases by value</text>

  <!-- legend -->
  <g font-family="sans-serif" font-size="9">
    <rect x="120" y="300" width="14" height="14" fill="#2563eb"/><text x="140" y="311" fill="#5b6680">Activities</text>
    <rect x="220" y="300" width="14" height="14" fill="#0ea5a4" opacity="0.4"/><text x="240" y="311" fill="#5b6680">Steps</text>
    <rect x="300" y="300" width="14" height="14" fill="#f4f7ff" stroke="#cdd6ec"/><text x="320" y="311" fill="#5b6680">Details</text>
    <line x1="385" y1="307" x2="415" y2="307" stroke="#2563eb" stroke-width="1.6" stroke-dasharray="5 3"/><text x="420" y="311" fill="#5b6680">Release line</text>
  </g>

  <text x="320" y="338" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5b6680">Limitation: weak fit when the 3–6 month product is hard to predict.</text>
</svg>
