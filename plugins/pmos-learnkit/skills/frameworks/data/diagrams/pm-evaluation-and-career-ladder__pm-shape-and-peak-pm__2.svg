<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Four PM hemispheres 2x2 diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="30" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">The Four PM Hemispheres</text>
  <text x="320" y="50" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#5b6680">Know your shape, then fit the team together like puzzle pieces</text>

  <!-- axis labels -->
  <text x="320" y="78" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#2563eb">PRODUCT MANAGERS (master execution early)</text>
  <text x="320" y="384" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">PRODUCT LEADERS (work through people &amp; influence)</text>
  <text x="22" y="230" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#f59e0b" transform="rotate(-90 22 230)">PRODUCT BUILDERS (get things done)</text>
  <text x="624" y="230" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#ef4444" transform="rotate(90 624 230)">PRODUCT ARCHITECTS (move the needle)</text>

  <!-- quadrant grid -->
  <g stroke="#1d2438" stroke-width="1.5" fill="none">
    <rect x="60" y="92" width="520" height="276"/>
    <line x1="320" y1="92" x2="320" y2="368"/>
    <line x1="60" y1="230" x2="580" y2="230"/>
  </g>

  <!-- top-left: Builder x Manager -->
  <rect x="64" y="96" width="252" height="130" fill="#eef3ff"/>
  <text x="190" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d2438">Builder · Manager</text>
  <text x="190" y="158" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Ships exceptional products</text>
  <text x="190" y="174" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">through execution craft</text>

  <!-- top-right: Architect x Manager -->
  <rect x="324" y="96" width="252" height="130" fill="#fdeeee"/>
  <text x="450" y="135" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d2438">Architect · Manager</text>
  <text x="450" y="158" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Designs products that</text>
  <text x="450" y="174" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">move the needle</text>

  <!-- bottom-left: Builder x Leader -->
  <rect x="64" y="234" width="252" height="130" fill="#fef6e7"/>
  <text x="190" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d2438">Builder · Leader</text>
  <text x="190" y="299" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Drives delivery at scale</text>
  <text x="190" y="315" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">through &amp; across people</text>

  <!-- bottom-right: Architect x Leader -->
  <rect x="324" y="234" width="252" height="130" fill="#e7f7f6"/>
  <text x="450" y="276" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d2438">Architect · Leader</text>
  <text x="450" y="299" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Connects features to a</text>
  <text x="450" y="315" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">vision &amp; company strategy</text>
</svg>
