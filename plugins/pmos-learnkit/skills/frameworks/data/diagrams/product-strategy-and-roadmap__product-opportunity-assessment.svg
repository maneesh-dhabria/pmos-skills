<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Product Opportunity Assessment diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="26" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#1d2438">Product Opportunity Assessment</text>
  <text x="320" y="44" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Ten questions to vet any major opportunity before you invest</text>

  <g font-family="sans-serif">
    <!-- two columns of numbered question rows -->
    <!-- left column Q1-5 -->
    <g>
      <!-- row helper: number badge + theme + question -->
      <g>
        <circle cx="32" cy="78" r="13" fill="#2563eb"/><text x="32" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
        <text x="54" y="74" font-size="11" font-weight="700" fill="#1d2438">Value Proposition</text>
        <text x="54" y="88" font-size="9.5" fill="#5b6680">What problem will this solve?</text>
      </g>
      <g>
        <circle cx="32" cy="128" r="13" fill="#2563eb"/><text x="32" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
        <text x="54" y="124" font-size="11" font-weight="700" fill="#1d2438">Target Market</text>
        <text x="54" y="138" font-size="9.5" fill="#5b6680">For whom do we solve it?</text>
      </g>
      <g>
        <circle cx="32" cy="178" r="13" fill="#2563eb"/><text x="32" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
        <text x="54" y="174" font-size="11" font-weight="700" fill="#1d2438">Market Size</text>
        <text x="54" y="188" font-size="9.5" fill="#5b6680">How big is the opportunity?</text>
      </g>
      <g>
        <circle cx="32" cy="228" r="13" fill="#2563eb"/><text x="32" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
        <text x="54" y="224" font-size="11" font-weight="700" fill="#1d2438">Competitive Landscape</text>
        <text x="54" y="238" font-size="9.5" fill="#5b6680">What alternatives exist?</text>
      </g>
      <g>
        <circle cx="32" cy="278" r="13" fill="#2563eb"/><text x="32" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text>
        <text x="54" y="274" font-size="11" font-weight="700" fill="#1d2438">Differentiator</text>
        <text x="54" y="288" font-size="9.5" fill="#5b6680">Why are we best suited?</text>
      </g>
    </g>

    <!-- right column Q6-9 -->
    <g>
      <g>
        <circle cx="340" cy="78" r="13" fill="#0ea5a4"/><text x="340" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">6</text>
        <text x="362" y="74" font-size="11" font-weight="700" fill="#1d2438">Market Window</text>
        <text x="362" y="88" font-size="9.5" fill="#5b6680">Why now?</text>
      </g>
      <g>
        <circle cx="340" cy="128" r="13" fill="#0ea5a4"/><text x="340" y="132" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">7</text>
        <text x="362" y="124" font-size="11" font-weight="700" fill="#1d2438">Go-To-Market</text>
        <text x="362" y="138" font-size="9.5" fill="#5b6680">How will we reach the market?</text>
      </g>
      <g>
        <circle cx="340" cy="178" r="13" fill="#0ea5a4"/><text x="340" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">8</text>
        <text x="362" y="174" font-size="11" font-weight="700" fill="#1d2438">Monetization Model</text>
        <text x="362" y="188" font-size="9.5" fill="#5b6680">How do we measure / make money?</text>
      </g>
      <g>
        <circle cx="340" cy="228" r="13" fill="#0ea5a4"/><text x="340" y="232" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">9</text>
        <text x="362" y="224" font-size="11" font-weight="700" fill="#1d2438">Solution Requirements</text>
        <text x="362" y="238" font-size="9.5" fill="#5b6680">What is critical to success?</text>
      </g>
    </g>

    <!-- Q10 Go/No-Go decision, full width emphasis -->
    <rect x="19" y="306" width="602" height="72" rx="10" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
    <circle cx="52" cy="342" r="18" fill="#1d2438"/><text x="52" y="347" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">10</text>
    <text x="82" y="332" font-size="13" font-weight="700" fill="#1d2438">Go / No-Go</text>
    <text x="82" y="350" font-size="10.5" fill="#5b6680">Given all of the above — what's the recommendation?</text>
    <rect x="470" y="324" width="64" height="34" rx="8" fill="#0ea5a4"/>
    <text x="502" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">GO</text>
    <rect x="544" y="324" width="68" height="34" rx="8" fill="#ef4444"/>
    <text x="578" y="346" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">NO-GO</text>
  </g>
</svg>
