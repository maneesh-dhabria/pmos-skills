<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Crafting The First Mile diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Crafting The First Mile</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Onboarding flow: hook fast, do more than explain, land users in The Zone</text>

  <!-- Flow of 4 stages into The Zone -->
  <g font-family="sans-serif">
    <!-- Stage 1 -->
    <rect x="24" y="78" width="136" height="120" rx="8" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="92" y="100" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">First 30 seconds</text>
    <text x="92" y="116" font-size="9.5" fill="#5b6680" text-anchor="middle">Design the hook for:</text>
    <text x="40" y="136" font-size="10.5" fill="#1d2438"><tspan font-weight="700">Lazy</tspan> — min effort</text>
    <text x="40" y="155" font-size="10.5" fill="#1d2438"><tspan font-weight="700">Vain</tspan> — look good fast</text>
    <text x="40" y="174" font-size="10.5" fill="#1d2438"><tspan font-weight="700">Selfish</tspan> — quick payoff</text>
    <text x="92" y="190" font-size="9" fill="#5b6680" text-anchor="middle" font-style="italic">a hook earns attention</text>

    <!-- arrow -->
    <path d="M164 138 L188 138" stroke="#5b6680" stroke-width="2" marker-end="url(#ar)"/>

    <!-- Stage 2 -->
    <rect x="192" y="78" width="136" height="120" rx="8" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <text x="260" y="100" font-size="11" font-weight="700" fill="#0ea5a4" text-anchor="middle">Do &gt; Show &gt; Explain</text>
    <rect x="208" y="110" width="104" height="22" rx="4" fill="#0ea5a4"/>
    <text x="260" y="125" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">DO it for them</text>
    <rect x="216" y="138" width="88" height="20" rx="4" fill="#cffafe"/>
    <text x="260" y="152" font-size="9.5" fill="#0e7490" text-anchor="middle">SHOW (tips/anim)</text>
    <rect x="224" y="164" width="72" height="18" rx="4" fill="#f1f5f9"/>
    <text x="260" y="177" font-size="9" fill="#5b6680" text-anchor="middle">EXPLAIN (copy)</text>

    <!-- arrow -->
    <path d="M332 138 L356 138" stroke="#5b6680" stroke-width="2" marker-end="url(#ar)"/>

    <!-- Stage 3 -->
    <rect x="360" y="78" width="136" height="120" rx="8" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="428" y="100" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle">States &amp; utility</text>
    <text x="378" y="122" font-size="10" fill="#1d2438">Useful <tspan font-weight="700">defaults</tspan></text>
    <text x="378" y="141" font-size="10" fill="#1d2438">Engaging <tspan font-weight="700">empty</tspan> states</text>
    <text x="378" y="160" font-size="10" fill="#1d2438">Immediate <tspan font-weight="700">utility</tspan></text>
    <text x="378" y="179" font-size="9" fill="#5b6680" font-style="italic">novelty before network</text>

    <!-- arrow -->
    <path d="M500 138 L524 138" stroke="#5b6680" stroke-width="2" marker-end="url(#ar)"/>

    <!-- The Zone -->
    <rect x="528" y="78" width="96" height="120" rx="8" fill="#2563eb"/>
    <text x="576" y="118" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">The</text>
    <text x="576" y="136" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Zone</text>
    <text x="576" y="162" font-size="8.5" fill="#dbeafe" text-anchor="middle">user gets it</text>
  </g>

  <!-- The Zone = 3 things -->
  <g font-family="sans-serif">
    <text x="24" y="238" font-size="12" font-weight="700" fill="#1d2438">In The Zone, the user knows three things:</text>
    <g transform="translate(24,250)">
      <rect x="0" y="0" width="196" height="56" rx="6" fill="#eff6ff"/>
      <text x="14" y="24" font-size="20" font-weight="700" fill="#2563eb">1</text>
      <text x="40" y="22" font-size="11" font-weight="700" fill="#1d2438">WHY</text>
      <text x="40" y="40" font-size="10" fill="#5b6680">they're using it</text>
    </g>
    <g transform="translate(232,250)">
      <rect x="0" y="0" width="196" height="56" rx="6" fill="#eff6ff"/>
      <text x="14" y="24" font-size="20" font-weight="700" fill="#0ea5a4">2</text>
      <text x="40" y="22" font-size="11" font-weight="700" fill="#1d2438">WHAT</text>
      <text x="40" y="40" font-size="10" fill="#5b6680">they can achieve</text>
    </g>
    <g transform="translate(440,250)">
      <rect x="0" y="0" width="184" height="56" rx="6" fill="#eff6ff"/>
      <text x="14" y="24" font-size="20" font-weight="700" fill="#f59e0b">3</text>
      <text x="40" y="22" font-size="11" font-weight="700" fill="#1d2438">NEXT</text>
      <text x="40" y="40" font-size="10" fill="#5b6680">their next step</text>
    </g>
  </g>

  <!-- Budget note -->
  <rect x="24" y="324" width="600" height="48" rx="6" fill="#fef3c7"/>
  <text x="40" y="345" font-family="sans-serif" font-size="12" font-weight="700" fill="#b45309">Budget rule</text>
  <text x="40" y="364" font-family="sans-serif" font-size="11" fill="#92400e">For aggressive growth, spend at least 30% of energy on the first mile — new users drive growth.</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#5b6680"/>
    </marker>
  </defs>
</svg>
