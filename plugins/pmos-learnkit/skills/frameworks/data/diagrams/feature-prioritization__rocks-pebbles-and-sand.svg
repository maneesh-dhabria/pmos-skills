<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Rocks Pebbles and Sand diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">Rocks, Pebbles &amp; Sand</text>
  <text x="320" y="46" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680">Three kinds of work — each prioritized by a different goal, balanced over months</text>

  <!-- Column headers via icons + jar metaphor on left -->
  <!-- ROCK row -->
  <g>
    <rect x="40" y="70" width="560" height="86" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="82" cy="113" r="26" fill="#2563eb"/>
    <text x="82" y="118" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#ffffff">ROCK</text>
    <text x="128" y="92" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Rocks — Maximize Impact</text>
    <text x="128" y="111" font-family="sans-serif" font-size="10" fill="#5b6680">Strategic bets, 3–12 months. Must deliver dramatic, measurable impact.</text>
    <text x="128" y="128" font-family="sans-serif" font-size="10" fill="#5b6680">Don't optimize ROI — fully execute the strategy. Trap: not impactful enough.</text>
    <rect x="128" y="138" width="150" height="14" rx="3" fill="#2563eb" opacity="0.18"/>
    <text x="134" y="148" font-family="sans-serif" font-size="9" fill="#2563eb">goal: IMPACT</text>
  </g>

  <!-- PEBBLE row -->
  <g>
    <rect x="40" y="166" width="560" height="86" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1.5"/>
    <circle cx="82" cy="209" r="20" fill="#0ea5a4"/>
    <text x="82" y="213" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#ffffff">PEBBLE</text>
    <text x="128" y="188" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Pebbles — Maximize ROI</text>
    <text x="128" y="207" font-family="sans-serif" font-size="10" fill="#5b6680">Tactical wins, 1–4 sprints. Measurable value ÷ effort.</text>
    <text x="128" y="224" font-family="sans-serif" font-size="10" fill="#5b6680">If it balloons: cut scope, or promote it to a Rock.</text>
    <rect x="128" y="234" width="150" height="14" rx="3" fill="#0ea5a4" opacity="0.18"/>
    <text x="134" y="244" font-family="sans-serif" font-size="9" fill="#0ea5a4">goal: ROI (value ÷ effort)</text>
  </g>

  <!-- SAND row -->
  <g>
    <rect x="40" y="262" width="560" height="80" rx="10" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="82" cy="302" r="14" fill="#f59e0b"/>
    <text x="82" y="306" text-anchor="middle" font-family="sans-serif" font-size="8" font-weight="700" fill="#ffffff">SAND</text>
    <text x="128" y="284" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438">Sand — Maximize Throughput</text>
    <text x="128" y="302" font-family="sans-serif" font-size="10" fill="#5b6680">Tiny tweaks, &lt;1 sprint. Don't measure or debate — just ship in bulk.</text>
    <text x="128" y="319" font-family="sans-serif" font-size="10" fill="#5b6680">Impact emerges from volume; fills gaps between Rocks &amp; Pebbles.</text>
    <rect x="128" y="328" width="150" height="13" rx="3" fill="#f59e0b" opacity="0.22"/>
    <text x="134" y="338" font-family="sans-serif" font-size="9" fill="#1d2438">goal: THROUGHPUT</text>
  </g>

  <!-- Sprint order note -->
  <text x="320" y="362" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1d2438">Sprint order: time-critical → Rock stories → Pebble stories → Sand</text>
  <text x="320" y="380" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#5b6680">Don't just sequence big→small — balance the three over time, not every sprint.</text>
</svg>
