<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Porter's Five Forces diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="34" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Porter&#8217;s Five Forces</text>
  <text x="32" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Five forces that shape an industry&#8217;s profitability</text>

  <!-- arrows pointing into the centre -->
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5b6680"/>
    </marker>
  </defs>
  <g stroke="#5b6680" stroke-width="1.6" marker-end="url(#ar)" fill="none">
    <line x1="320" y1="138" x2="320" y2="178"/>            <!-- top down -->
    <line x1="320" y1="318" x2="320" y2="278"/>            <!-- bottom up -->
    <line x1="172" y1="228" x2="240" y2="228"/>            <!-- left right -->
    <line x1="468" y1="228" x2="400" y2="228"/>            <!-- right left -->
  </g>

  <!-- centre: rivalry -->
  <rect x="240" y="178" width="160" height="100" rx="10" fill="#ef4444"/>
  <text x="320" y="218" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Competitive</text>
  <text x="320" y="238" font-family="sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Rivalry</text>
  <text x="320" y="260" font-family="sans-serif" font-size="10" fill="#ffe0e0" text-anchor="middle">intensity among</text>
  <text x="320" y="272" font-family="sans-serif" font-size="10" fill="#ffe0e0" text-anchor="middle">existing competitors</text>

  <!-- top: new entrants -->
  <rect x="220" y="78" width="200" height="58" rx="8" fill="#2563eb"/>
  <text x="320" y="102" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Threat of New Entrants</text>
  <text x="320" y="122" font-family="sans-serif" font-size="10" fill="#dbe6ff" text-anchor="middle">barriers to entry, scale, capital, regulation</text>

  <!-- bottom: substitutes -->
  <rect x="220" y="320" width="200" height="58" rx="8" fill="#2563eb"/>
  <text x="320" y="344" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Threat of Substitutes</text>
  <text x="320" y="364" font-family="sans-serif" font-size="10" fill="#dbe6ff" text-anchor="middle">alternatives, price-performance, switching cost</text>

  <!-- left: suppliers -->
  <rect x="20" y="186" width="150" height="84" rx="8" fill="#0ea5a4"/>
  <text x="95" y="216" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Supplier</text>
  <text x="95" y="232" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Power</text>
  <text x="95" y="252" font-family="sans-serif" font-size="10" fill="#d6f5f4" text-anchor="middle">few suppliers,</text>
  <text x="95" y="263" font-family="sans-serif" font-size="10" fill="#d6f5f4" text-anchor="middle">unique inputs</text>

  <!-- right: buyers -->
  <rect x="470" y="186" width="150" height="84" rx="8" fill="#0ea5a4"/>
  <text x="545" y="216" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Buyer</text>
  <text x="545" y="232" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Power</text>
  <text x="545" y="252" font-family="sans-serif" font-size="10" fill="#d6f5f4" text-anchor="middle">price sensitivity,</text>
  <text x="545" y="263" font-family="sans-serif" font-size="10" fill="#d6f5f4" text-anchor="middle">ability to switch</text>

  <text x="320" y="394" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">Stronger forces &#8594; lower industry profitability. Weaker forces &#8594; a more attractive industry.</text>
</svg>
