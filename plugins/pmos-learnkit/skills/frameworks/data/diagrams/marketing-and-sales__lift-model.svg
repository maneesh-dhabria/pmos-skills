<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="LIFT Model diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="30" font-family="sans-serif" font-size="19" font-weight="700" fill="#1d2438">The LIFT Model</text>
  <text x="24" y="48" font-family="sans-serif" font-size="11" fill="#5b6680">Six conversion factors lift (or weigh down) a page experience</text>

  <!-- Central plane: value proposition as fuselage carrying conversion -->
  <g font-family="sans-serif">
    <rect x="170" y="178" width="300" height="58" rx="29" fill="#2563eb"/>
    <text x="320" y="203" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Value Proposition</text>
    <text x="320" y="223" font-size="10" fill="#cfe0ff" text-anchor="middle">The reason people buy &#8212; benefits vs. costs (WIIFM)</text>
  </g>

  <!-- Lift force arrow up -->
  <g font-family="sans-serif">
    <line x1="320" y1="178" x2="320" y2="120" stroke="#0ea5a4" stroke-width="3"/>
    <path d="M320 112 l-7 14 h14 z" fill="#0ea5a4"/>
    <text x="332" y="150" font-size="10" font-weight="600" fill="#0ea5a4">Conversion</text>
  </g>

  <!-- Boosters (lift up) -->
  <text x="60" y="86" font-family="sans-serif" font-size="11" font-weight="700" fill="#0ea5a4">Boosters &#8212; raise lift</text>
  <g font-family="sans-serif">
    <rect x="24" y="96" width="180" height="40" rx="8" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="36" y="113" font-size="11" font-weight="600" fill="#1d2438">Relevance</text>
    <text x="36" y="128" font-size="8.5" fill="#5b6680">Matches the visitor's expectation</text>

    <rect x="216" y="96" width="180" height="40" rx="8" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="228" y="113" font-size="11" font-weight="600" fill="#1d2438">Clarity</text>
    <text x="228" y="128" font-size="8.5" fill="#5b6680">Value prop &amp; CTA clearly stated</text>

    <rect x="408" y="96" width="180" height="40" rx="8" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="420" y="113" font-size="11" font-weight="600" fill="#1d2438">Urgency</text>
    <text x="420" y="128" font-size="8.5" fill="#5b6680">A reason to act now</text>
  </g>

  <!-- Drag force arrow down -->
  <g font-family="sans-serif">
    <line x1="320" y1="236" x2="320" y2="290" stroke="#ef4444" stroke-width="3"/>
    <path d="M320 298 l-7 -14 h14 z" fill="#ef4444"/>
    <text x="332" y="270" font-size="10" font-weight="600" fill="#ef4444">Drag</text>
  </g>

  <!-- Inhibitors (drag down) -->
  <g font-family="sans-serif">
    <rect x="120" y="312" width="180" height="40" rx="8" fill="#fff5f5" stroke="#ef4444"/>
    <text x="132" y="329" font-size="11" font-weight="600" fill="#1d2438">Anxiety</text>
    <text x="132" y="344" font-size="8.5" fill="#5b6680">Misgivings about converting</text>

    <rect x="340" y="312" width="180" height="40" rx="8" fill="#fff5f5" stroke="#ef4444"/>
    <text x="352" y="329" font-size="11" font-weight="600" fill="#1d2438">Distraction</text>
    <text x="352" y="344" font-size="8.5" fill="#5b6680">Elements pulling off the goal</text>
  </g>
  <text x="320" y="375" font-family="sans-serif" font-size="11" font-weight="700" fill="#ef4444" text-anchor="middle">Inhibitors &#8212; reduce lift</text>
</svg>
