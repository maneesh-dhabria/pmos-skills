<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Circles Method diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="36" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">CIRCLES Method</text>
  <text x="24" y="58" font-family="sans-serif" font-size="13" fill="#5b6680">Seven linear steps for any product-design question</text>

  <g font-family="sans-serif">
    <!-- step rows -->
    <g>
      <circle cx="60" cy="100" r="20" fill="#2563eb"/>
      <text x="60" y="106" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
      <rect x="92" y="84" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
      <text x="104" y="105" font-size="14" fill="#1d2438"><tspan font-weight="700">Comprehend</tspan> the situation — context, obstacles, how to approach</text>
    </g>
    <g>
      <circle cx="60" cy="140" r="20" fill="#2563eb"/>
      <text x="60" y="146" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">I</text>
      <rect x="92" y="124" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
      <text x="104" y="145" font-size="14" fill="#1d2438"><tspan font-weight="700">Identify</tspan> the customer — who the product is for</text>
    </g>
    <g>
      <circle cx="60" cy="180" r="20" fill="#2563eb"/>
      <text x="60" y="186" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">R</text>
      <rect x="92" y="164" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#2563eb" stroke-width="1"/>
      <text x="104" y="185" font-size="14" fill="#1d2438"><tspan font-weight="700">Report</tspan> the customer's needs — needs and expectations</text>
    </g>
    <g>
      <circle cx="60" cy="220" r="20" fill="#0ea5a4"/>
      <text x="60" y="226" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
      <rect x="92" y="204" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
      <text x="104" y="225" font-size="14" fill="#1d2438"><tspan font-weight="700">Cut</tspan> through prioritization — rank features and feedback</text>
    </g>
    <g>
      <circle cx="60" cy="260" r="20" fill="#0ea5a4"/>
      <text x="60" y="266" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">L</text>
      <rect x="92" y="244" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="1"/>
      <text x="104" y="265" font-size="14" fill="#1d2438"><tspan font-weight="700">List</tspan> solutions — brainstorm potential solutions</text>
    </g>
    <g>
      <circle cx="60" cy="300" r="20" fill="#f59e0b"/>
      <text x="60" y="306" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">E</text>
      <rect x="92" y="284" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
      <text x="104" y="305" font-size="14" fill="#1d2438"><tspan font-weight="700">Evaluate</tspan> tradeoffs — weigh pros and cons of each option</text>
    </g>
    <g>
      <circle cx="60" cy="340" r="20" fill="#f59e0b"/>
      <text x="60" y="346" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">S</text>
      <rect x="92" y="324" width="524" height="32" rx="6" fill="#f4f7ff" stroke="#f59e0b" stroke-width="1"/>
      <text x="104" y="345" font-size="14" fill="#1d2438"><tspan font-weight="700">Summarize</tspan> your recommendation — findings + clear pick</text>
    </g>
    <!-- connecting spine -->
    <line x1="60" y1="120" x2="60" y2="120" stroke="#5b6680" stroke-width="2"/>
    <path d="M60 120 L60 360" stroke="#cbd5e1" stroke-width="2" fill="none" opacity="0"/>
  </g>
  <line x1="60" y1="120" x2="60" y2="320" stroke="#94a3b8" stroke-width="2" stroke-dasharray="3 3"/>
</svg>
