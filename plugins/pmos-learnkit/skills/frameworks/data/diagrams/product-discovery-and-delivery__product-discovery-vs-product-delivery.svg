<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Product Discovery vs Product Delivery diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="21" font-weight="700" fill="#1d2438">Product Discovery vs. Product Delivery</text>
  <text x="32" y="59" font-family="sans-serif" font-size="13" fill="#5b6680">Two interleaved tracks: validate what to build, then build it.</text>

  <!-- Discovery column -->
  <g font-family="sans-serif">
    <rect x="32" y="78" width="278" height="218" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
    <text x="48" y="104" font-size="16" font-weight="700" fill="#2563eb">Product Discovery</text>
    <text x="48" y="123" font-size="11.5" fill="#5b6680">Build the right thing — validate what to build.</text>

    <g font-size="12.5" fill="#1d2438">
      <circle cx="56" cy="148" r="3" fill="#2563eb"/><text x="68" y="152">User research</text>
      <circle cx="56" cy="178" r="3" fill="#2563eb"/><text x="68" y="182">Problem definition</text>
      <circle cx="56" cy="208" r="3" fill="#2563eb"/><text x="68" y="212">Solution ideation</text>
      <circle cx="56" cy="238" r="3" fill="#2563eb"/><text x="68" y="242">Solution validation</text>
    </g>
    <text x="48" y="278" font-size="11.5" font-style="italic" fill="#5b6680">Goal: a well-validated plan.</text>
  </g>

  <!-- Delivery column -->
  <g font-family="sans-serif">
    <rect x="330" y="78" width="278" height="218" rx="10" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
    <text x="346" y="104" font-size="16" font-weight="700" fill="#0ea5a4">Product Delivery</text>
    <text x="346" y="123" font-size="11.5" fill="#5b6680">Build the thing right — ship and iterate.</text>

    <g font-size="12.5" fill="#1d2438">
      <circle cx="354" cy="148" r="3" fill="#0ea5a4"/><text x="366" y="152">Product development</text>
      <circle cx="354" cy="178" r="3" fill="#0ea5a4"/><text x="366" y="182">Testing</text>
      <circle cx="354" cy="208" r="3" fill="#0ea5a4"/><text x="366" y="212">Deployment</text>
      <circle cx="354" cy="238" r="3" fill="#0ea5a4"/><text x="366" y="242">Feedback gathering</text>
    </g>
    <text x="346" y="278" font-size="11.5" font-style="italic" fill="#5b6680">Goal: a valuable, sustainable product.</text>
  </g>

  <!-- Interleave arrows -->
  <g stroke="#5b6680" stroke-width="1.5" fill="none">
    <path d="M312 160 C322 160 322 160 328 160" marker-end="url(#a2)"/>
    <path d="M328 226 C322 226 322 226 312 226" marker-end="url(#a2b)"/>
  </g>
  <text x="320" y="150" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">→</text>

  <!-- Dual-track band -->
  <rect x="32" y="316" width="576" height="56" rx="10" fill="#1d2438"/>
  <text x="320" y="340" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Dual-Track Agile</text>
  <text x="320" y="360" font-family="sans-serif" font-size="11.5" fill="#cdd5e8" text-anchor="middle">Discovery and delivery run in parallel, continuously feeding each other.</text>

  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#5b6680"/></marker>
    <marker id="a2b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="#5b6680"/></marker>
  </defs>
</svg>
