<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="7 Powers diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">7 Powers</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Seven structural sources of durable competitive advantage</text>

  <!-- column headers -->
  <text x="316" y="80" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680">POWER</text>
  <text x="316" y="80" font-family="sans-serif" font-size="11" font-weight="700" fill="#5b6680" text-anchor="start"></text>

  <!-- rows -->
  <g font-family="sans-serif">
    <!-- row template: number badge, name, descriptor -->
    <g>
      <rect x="24" y="92" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="111" r="13" fill="#2563eb"/>
      <text x="46" y="115" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
      <text x="72" y="108" font-size="14" font-weight="700" fill="#1d2438">Scale Economies</text>
      <text x="72" y="123" font-size="11" fill="#5b6680">Lower unit cost as volume grows — hard for smaller rivals to match</text>
    </g>
    <g>
      <rect x="24" y="135" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="154" r="13" fill="#2563eb"/>
      <text x="46" y="158" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
      <text x="72" y="151" font-size="14" font-weight="700" fill="#1d2438">Network Effects</text>
      <text x="72" y="166" font-size="11" fill="#5b6680">Value rises with each user — a virtuous, self-reinforcing cycle</text>
    </g>
    <g>
      <rect x="24" y="178" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="197" r="13" fill="#0ea5a4"/>
      <text x="46" y="201" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
      <text x="72" y="194" font-size="14" font-weight="700" fill="#1d2438">Counter-Positioning</text>
      <text x="72" y="209" font-size="11" fill="#5b6680">A model incumbents can't copy without harming their own business</text>
    </g>
    <g>
      <rect x="24" y="221" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="240" r="13" fill="#0ea5a4"/>
      <text x="46" y="244" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
      <text x="72" y="237" font-size="14" font-weight="700" fill="#1d2438">Switching Costs</text>
      <text x="72" y="252" font-size="11" fill="#5b6680">Lock-in via data, integration or customization raises exit pain</text>
    </g>
    <g>
      <rect x="24" y="264" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="283" r="13" fill="#f59e0b"/>
      <text x="46" y="287" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
      <text x="72" y="280" font-size="14" font-weight="700" fill="#1d2438">Branding</text>
      <text x="72" y="295" font-size="11" fill="#5b6680">Trust &amp; recognition that command premium pricing</text>
    </g>
    <g>
      <rect x="24" y="307" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="326" r="13" fill="#f59e0b"/>
      <text x="46" y="330" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">6</text>
      <text x="72" y="323" font-size="14" font-weight="700" fill="#1d2438">Cornered Resource</text>
      <text x="72" y="338" font-size="11" fill="#5b6680">Exclusive access to scarce IP, talent, material or channel</text>
    </g>
    <g>
      <rect x="24" y="350" width="592" height="38" rx="6" fill="#f4f7ff"/>
      <circle cx="46" cy="369" r="13" fill="#ef4444"/>
      <text x="46" y="373" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">7</text>
      <text x="72" y="366" font-size="14" font-weight="700" fill="#1d2438">Process Power</text>
      <text x="72" y="381" font-size="11" fill="#5b6680">Embedded operating practices rivals can't quickly replicate</text>
    </g>
  </g>
</svg>
