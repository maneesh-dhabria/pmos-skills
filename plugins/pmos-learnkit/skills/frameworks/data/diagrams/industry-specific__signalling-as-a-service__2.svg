<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Physical goods vs software signaling economics diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="320" y="32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Physical Goods vs. Software</text>
  <text x="320" y="54" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5b6680">Who captures the signaling value</text>

  <!-- LEFT: Physical goods -->
  <rect x="32" y="78" width="265" height="288" rx="12" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <text x="164" y="106" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#2563eb">Physical Goods</text>
  <text x="164" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" font-style="italic">e.g. the Rolex watch</text>

  <!-- reach row -->
  <text x="52" y="158" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Reach</text>
  <text x="52" y="176" font-family="sans-serif" font-size="11" fill="#5b6680">Limited — only people</text>
  <text x="52" y="192" font-family="sans-serif" font-size="11" fill="#5b6680">in public, in person</text>

  <text x="52" y="226" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Value capture</text>
  <text x="52" y="244" font-family="sans-serif" font-size="11" fill="#5b6680">Captures the signal's</text>
  <text x="52" y="260" font-family="sans-serif" font-size="11" fill="#5b6680">value — you pay for the</text>
  <text x="52" y="276" font-family="sans-serif" font-size="11" fill="#5b6680">tangible status object</text>

  <rect x="52" y="300" width="225" height="46" rx="9" fill="#2563eb"/>
  <text x="164" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Monetizes the SIGNAL</text>
  <text x="164" y="338" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#dbe6ff">scarce + tangible = chargeable</text>

  <!-- RIGHT: Software -->
  <rect x="343" y="78" width="265" height="288" rx="12" fill="#f4f7ff" stroke="#0ea5a4" stroke-width="2"/>
  <text x="475" y="106" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Software</text>
  <text x="475" y="124" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5b6680" font-style="italic">e.g. the social network</text>

  <text x="363" y="158" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Reach</text>
  <text x="363" y="176" font-family="sans-serif" font-size="11" fill="#5b6680">Unlimited — anyone,</text>
  <text x="363" y="192" font-family="sans-serif" font-size="11" fill="#5b6680">anywhere, all at once</text>

  <text x="363" y="226" font-family="sans-serif" font-size="11.5" font-weight="700" fill="#1d2438">Value capture</text>
  <text x="363" y="244" font-family="sans-serif" font-size="11" fill="#5b6680">Intangible + fungible —</text>
  <text x="363" y="260" font-family="sans-serif" font-size="11" fill="#5b6680">can't monetize the wide</text>
  <text x="363" y="276" font-family="sans-serif" font-size="11" fill="#5b6680">distribution it provides</text>

  <rect x="363" y="300" width="225" height="46" rx="9" fill="#f59e0b"/>
  <text x="475" y="322" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="#ffffff">Monetizes AMPLIFICATION</text>
  <text x="475" y="338" text-anchor="middle" font-family="sans-serif" font-size="10.5" fill="#fff3df">free distribution, paid stand-out</text>

  <!-- divider -->
  <line x1="320" y1="92" x2="320" y2="352" stroke="#5b6680" stroke-width="1" stroke-dasharray="3 4"/>
</svg>
