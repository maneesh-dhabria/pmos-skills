<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Authority by Alignment influence matrix diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Authority &#215; Alignment: which drivers to lean on</text>

  <!-- axes -->
  <line x1="150" y1="70" x2="150" y2="350" stroke="#1d2438" stroke-width="2"/>
  <line x1="150" y1="350" x2="560" y2="350" stroke="#1d2438" stroke-width="2"/>

  <!-- axis labels -->
  <text x="138" y="210" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b6680" transform="rotate(-90 138 210)">Authority  (low &#8594; high)</text>
  <text x="355" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5b6680">Alignment  (low &#8594; high)</text>

  <!-- quadrants -->
  <!-- top-left: high authority, low alignment -->
  <rect x="152" y="72" width="202" height="136" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <!-- top-right: high authority, high alignment -->
  <rect x="356" y="72" width="202" height="136" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <!-- bottom-left: low authority, low alignment -->
  <rect x="152" y="210" width="202" height="138" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>
  <!-- bottom-right: low authority, high alignment -->
  <rect x="356" y="210" width="202" height="138" fill="#f4f7ff" stroke="#5b6680" stroke-width="1"/>

  <!-- TL content -->
  <text x="253" y="118" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Hi authority &#183; Lo align</text>
  <text x="253" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#0ea5a4">Use rigor &amp; trust</text>
  <text x="253" y="158" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">win agreement on merits</text>

  <!-- TR content -->
  <text x="457" y="118" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Hi authority &#183; Hi align</text>
  <text x="457" y="140" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb">Lean less on</text>
  <text x="457" y="158" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">credibility &amp; inspiration</text>

  <!-- BL content -->
  <text x="253" y="256" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Lo authority &#183; Lo align</text>
  <text x="253" y="278" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#ef4444">Rely most on</text>
  <text x="253" y="296" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">credibility &amp; inspiration</text>

  <!-- BR content -->
  <text x="457" y="256" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1d2438">Lo authority &#183; Hi align</text>
  <text x="457" y="278" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#f59e0b">Use storytelling</text>
  <text x="457" y="296" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">carry shared goal forward</text>

  <text x="355" y="396" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="10.5" fill="#5b6680">Authority &amp; alignment are least in your control when you sit lower on the org chart.</text>
</svg>
