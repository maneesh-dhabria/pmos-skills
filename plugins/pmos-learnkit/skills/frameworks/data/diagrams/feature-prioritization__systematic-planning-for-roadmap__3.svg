<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Allocation judgment axes diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d2438">Judgment Axes for Setting Allocation</text>
  <text x="32" y="60" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" fill="#5b6680">The leader's allocation answers a few framing tensions before any % is set.</text>

  <!-- Axis 1: Offense vs Defense -->
  <text x="32" y="108" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1d2438">Offense  vs  Defense</text>
  <line x1="32" y1="124" x2="608" y2="124" stroke="#5b6680" stroke-width="2"/>
  <circle cx="32" cy="124" r="6" fill="#2563eb"/>
  <circle cx="608" cy="124" r="6" fill="#ef4444"/>
  <text x="32" y="146" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Grow / pursue new bets</text>
  <text x="608" y="146" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Protect what we have</text>

  <!-- Axis 2: Explore vs Exploit -->
  <text x="32" y="196" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1d2438">Explore  vs  Exploit</text>
  <line x1="32" y1="212" x2="608" y2="212" stroke="#5b6680" stroke-width="2"/>
  <circle cx="32" cy="212" r="6" fill="#0ea5a4"/>
  <circle cx="608" cy="212" r="6" fill="#f59e0b"/>
  <text x="32" y="234" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Speculative bets, new ground</text>
  <text x="608" y="234" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Double down on what works</text>

  <!-- Axis 3: Growth vs Protect vs Foundation -->
  <text x="32" y="284" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1d2438">Growth  ·  Protect  ·  Foundation</text>
  <line x1="32" y1="300" x2="608" y2="300" stroke="#5b6680" stroke-width="2"/>
  <circle cx="32" cy="300" r="6" fill="#2563eb"/>
  <circle cx="320" cy="300" r="6" fill="#ef4444"/>
  <circle cx="608" cy="300" r="6" fill="#0ea5a4"/>
  <text x="32" y="322" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Push future growth</text>
  <text x="320" y="322" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Defend current base</text>
  <text x="608" y="322" text-anchor="end" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#5b6680">Lay groundwork</text>

  <rect x="32" y="346" width="576" height="40" rx="6" fill="#f4f7ff"/>
  <text x="320" y="371" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#1d2438">Read your position on each axis + highest Expected-Value initiatives → set the theme mix.</text>
</svg>
