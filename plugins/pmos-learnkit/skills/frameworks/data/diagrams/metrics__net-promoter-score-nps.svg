<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Net Promoter Score (NPS) diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="40" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Net Promoter Score (NPS)</text>
  <text x="32" y="62" font-family="sans-serif" font-size="13" fill="#5b6680">"How likely are you to recommend us?" — rated 0 to 10</text>

  <!-- Scale segments -->
  <g font-family="sans-serif">
    <!-- Detractors 0-6 -->
    <rect x="32" y="100" width="322" height="56" rx="6" fill="#ef4444" opacity="0.12" stroke="#ef4444"/>
    <text x="193" y="124" font-size="14" font-weight="700" fill="#ef4444" text-anchor="middle">Detractors</text>
    <text x="193" y="144" font-size="12" fill="#5b6680" text-anchor="middle">score 0 – 6</text>

    <!-- Passives 7-8 -->
    <rect x="362" y="100" width="110" height="56" rx="6" fill="#f59e0b" opacity="0.14" stroke="#f59e0b"/>
    <text x="417" y="124" font-size="14" font-weight="700" fill="#f59e0b" text-anchor="middle">Passives</text>
    <text x="417" y="144" font-size="12" fill="#5b6680" text-anchor="middle">7 – 8</text>

    <!-- Promoters 9-10 -->
    <rect x="480" y="100" width="128" height="56" rx="6" fill="#0ea5a4" opacity="0.14" stroke="#0ea5a4"/>
    <text x="544" y="124" font-size="14" font-weight="700" fill="#0ea5a4" text-anchor="middle">Promoters</text>
    <text x="544" y="144" font-size="12" fill="#5b6680" text-anchor="middle">9 – 10</text>
  </g>

  <!-- 0..10 tick labels -->
  <g font-family="sans-serif" font-size="11" fill="#5b6680" text-anchor="middle">
    <line x1="32" y1="170" x2="608" y2="170" stroke="#5b6680" stroke-width="1"/>
    <text x="32" y="186">0</text>
    <text x="172" y="186">3</text>
    <text x="345" y="186">6</text>
    <text x="417" y="186">8</text>
    <text x="608" y="186">10</text>
  </g>

  <!-- Formula -->
  <rect x="32" y="214" width="576" height="78" rx="8" fill="#f4f7ff" stroke="#2563eb"/>
  <text x="320" y="242" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438" text-anchor="middle">NPS = % Promoters &#8722; % Detractors</text>
  <text x="320" y="266" font-family="sans-serif" font-size="12" fill="#5b6680" text-anchor="middle">(passives are ignored) &#183; ranges from &#8722;100 to +100</text>
  <text x="320" y="284" font-family="sans-serif" font-size="12" fill="#2563eb" text-anchor="middle">e.g. 65% promoters &#8722; 30% detractors = 35</text>

  <!-- Caveats -->
  <g font-family="sans-serif" font-size="12.5" fill="#1d2438">
    <text x="32" y="322" font-weight="700" fill="#5b6680">Measures evangelism — not satisfaction, loyalty, or retention</text>
    <circle cx="40" cy="346" r="3" fill="#2563eb"/>
    <text x="52" y="350">Survey after repeated use, not on first touch</text>
    <circle cx="40" cy="370" r="3" fill="#2563eb"/>
    <text x="52" y="374">Read by segment — top scorers may not be your core persona</text>
  </g>
</svg>
