<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Agency versus Talent matrix diagram">
  <rect x="0" y="0" width="640" height="400" fill="#ffffff"/>
  <text x="320" y="34" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="20" font-weight="700" fill="#1d2438">Agency vs. Talent</text>
  <text x="320" y="56" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6680">Talent alone stalls; high agency converts it into impact</text>

  <!-- Axes labels -->
  <text x="20" y="230" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#5b6680" transform="rotate(-90 20 230)">Talent  &#8594;</text>
  <text x="350" y="392" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#5b6680">Agency  &#8594;</text>

  <!-- Quadrant grid -->
  <g>
    <rect x="60" y="80" width="290" height="135" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
    <rect x="350" y="80" width="290" height="135" fill="#f4f7ff" stroke="#1d2438" stroke-width="1.5"/>
    <rect x="60" y="215" width="290" height="135" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
    <rect x="350" y="215" width="290" height="135" fill="#ffffff" stroke="#1d2438" stroke-width="1.5"/>
  </g>

  <!-- Top-left: high talent, low agency -->
  <text x="205" y="130" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#ef4444">Frustrated Geniuses</text>
  <text x="205" y="152" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">High talent, low agency</text>
  <text x="205" y="178" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">A win or two, then</text>
  <text x="205" y="194" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">capitulate to &#8220;the system&#8221;</text>

  <!-- Top-right: high talent, high agency -->
  <text x="495" y="130" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#0ea5a4">Game Changers</text>
  <text x="495" y="152" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">High talent, high agency</text>
  <text x="495" y="178" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">Compound talent + agency</text>
  <text x="495" y="194" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">into outsized impact</text>

  <!-- Bottom-left: low talent, low agency -->
  <text x="205" y="270" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#5b6680">Passengers</text>
  <text x="205" y="292" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Low talent, low agency</text>
  <text x="205" y="318" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">Wait for perfect</text>
  <text x="205" y="334" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">conditions; blame circumstance</text>

  <!-- Bottom-right: low talent, high agency -->
  <text x="495" y="270" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#f59e0b">Go Getters</text>
  <text x="495" y="292" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6680">Lower talent, high agency</text>
  <text x="495" y="318" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">Use agency to sharpen craft</text>
  <text x="495" y="334" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1d2438">&#8594; rise toward Game Changers</text>

  <!-- Growth arrow Go Getters -> Game Changers -->
  <line x1="540" y1="248" x2="540" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
