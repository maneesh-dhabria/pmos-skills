<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Three waves of internet disruption diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="32" y="38" font-family="sans-serif" font-size="22" font-weight="700" fill="#1d2438">Three Waves of Internet Disruption</text>
  <text x="32" y="60" font-family="sans-serif" font-size="13" fill="#5b6680">Each wave breaks more links in the customer value chain than the last.</text>

  <!-- Ascending staged ladder: three steps rising left to right -->

  <!-- Wave 1 -->
  <rect x="32" y="260" width="176" height="96" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="58" cy="286" r="14" fill="#2563eb"/>
  <text x="58" y="291" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="80" y="284" font-family="sans-serif" font-size="11" fill="#5b6680">1990s &#183; first wave</text>
  <text x="80" y="301" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Unbundling</text>
  <text x="48" y="324" font-family="sans-serif" font-size="11.5" fill="#5b6680">Break goods into smaller</text>
  <text x="48" y="339" font-family="sans-serif" font-size="11.5" fill="#5b6680">components for more value.</text>
  <text x="48" y="352" font-family="sans-serif" font-size="10.5" font-style="italic" fill="#0ea5a4">Hit: music, text, content</text>

  <!-- Wave 2 -->
  <rect x="232" y="196" width="176" height="160" rx="10" fill="#f4f7ff" stroke="#2563eb" stroke-width="2"/>
  <circle cx="258" cy="222" r="14" fill="#2563eb"/>
  <text x="258" y="227" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="280" y="220" font-family="sans-serif" font-size="11" fill="#5b6680">2000s &#183; second wave</text>
  <text x="280" y="237" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Disintermediation</text>
  <text x="248" y="262" font-family="sans-serif" font-size="11.5" fill="#5b6680">Internet as low-cost, high-</text>
  <text x="248" y="277" font-family="sans-serif" font-size="11.5" fill="#5b6680">reach channel. Customers</text>
  <text x="248" y="292" font-family="sans-serif" font-size="11.5" fill="#5b6680">reach providers directly,</text>
  <text x="248" y="307" font-family="sans-serif" font-size="11.5" fill="#5b6680">removing intermediaries.</text>
  <text x="248" y="330" font-family="sans-serif" font-size="10.5" font-style="italic" fill="#0ea5a4">Hit: retail, hotels</text>

  <!-- Wave 3 -->
  <rect x="432" y="116" width="176" height="240" rx="10" fill="#eaf0ff" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="458" cy="142" r="14" fill="#2563eb"/>
  <text x="458" y="147" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="480" y="140" font-family="sans-serif" font-size="11" fill="#5b6680">2012+ &#183; third wave</text>
  <text x="480" y="157" font-family="sans-serif" font-size="15" font-weight="700" fill="#1d2438">Decoupling</text>
  <text x="448" y="182" font-family="sans-serif" font-size="11.5" fill="#5b6680">Split specific shopping</text>
  <text x="448" y="197" font-family="sans-serif" font-size="11.5" fill="#5b6680">activities apart. Research</text>
  <text x="448" y="212" font-family="sans-serif" font-size="11.5" fill="#5b6680">in store, then buy online —</text>
  <text x="448" y="227" font-family="sans-serif" font-size="11.5" fill="#5b6680">breaking the linkages</text>
  <text x="448" y="242" font-family="sans-serif" font-size="11.5" fill="#5b6680">between customer steps.</text>
  <text x="448" y="265" font-family="sans-serif" font-size="10.5" font-style="italic" fill="#0ea5a4">Hit: online &amp; offline alike</text>

  <!-- rising arrow across the tops -->
  <polyline points="120,256 320,192 520,112" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="2 6" stroke-linecap="round"/>
  <text x="556" y="104" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="end">more disruption &#8594;</text>
</svg>
