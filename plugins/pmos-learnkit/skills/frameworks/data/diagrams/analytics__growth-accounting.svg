<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="Growth Accounting diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="24" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">Growth Accounting</text>
  <text x="24" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">Decompose period-over-period revenue into six flows around a retained base</text>

  <!-- Retained base in the middle -->
  <rect x="250" y="150" width="140" height="90" rx="8" fill="#1d2438"/>
  <text x="320" y="186" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Retained</text>
  <text x="320" y="206" font-family="sans-serif" font-size="10" fill="#c5d6f9" text-anchor="middle">carried over from</text>
  <text x="320" y="220" font-family="sans-serif" font-size="10" fill="#c5d6f9" text-anchor="middle">last period</text>

  <text x="320" y="120" font-family="sans-serif" font-size="12" font-weight="700" fill="#0ea5a4" text-anchor="middle">GAINS (revenue up)</text>
  <text x="320" y="278" font-family="sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">LOSSES (revenue down)</text>

  <!-- GAINS: three boxes above, arrows pointing down into base -->
  <g font-family="sans-serif" font-size="11" text-anchor="middle">
    <rect x="40" y="128" width="150" height="40" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="115" y="146" font-weight="700" fill="#0ea5a4">New</text>
    <text x="115" y="161" fill="#5b6680" font-size="10">first-time customers</text>

    <rect x="245" y="60" width="150" height="40" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="320" y="78" font-weight="700" fill="#0ea5a4">Expansion</text>
    <text x="320" y="93" fill="#5b6680" font-size="10">existing spend more</text>

    <rect x="450" y="128" width="150" height="40" rx="6" fill="#f4f7ff" stroke="#0ea5a4"/>
    <text x="525" y="146" font-weight="700" fill="#0ea5a4">Resurrected</text>
    <text x="525" y="161" fill="#5b6680" font-size="10">churned, came back</text>
  </g>
  <g stroke="#0ea5a4" stroke-width="2" fill="none" marker-end="url(#arrG)">
    <path d="M150 168 L270 152"/>
    <path d="M320 100 L320 148"/>
    <path d="M490 168 L370 152"/>
  </g>

  <!-- LOSSES: three boxes below, arrows pointing away from base -->
  <g font-family="sans-serif" font-size="11" text-anchor="middle">
    <rect x="40" y="300" width="150" height="40" rx="6" fill="#fef2f2" stroke="#ef4444"/>
    <text x="115" y="318" font-weight="700" fill="#ef4444">Churned</text>
    <text x="115" y="333" fill="#5b6680" font-size="10">dropped to zero</text>

    <rect x="450" y="300" width="150" height="40" rx="6" fill="#fef2f2" stroke="#ef4444"/>
    <text x="525" y="318" font-weight="700" fill="#ef4444">Contraction</text>
    <text x="525" y="333" fill="#5b6680" font-size="10">existing spend less</text>
  </g>
  <g stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrR)">
    <path d="M270 238 L150 300"/>
    <path d="M370 238 L490 300"/>
  </g>

  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#0ea5a4"/></marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#ef4444"/></marker>
  </defs>

  <!-- Three statistics strip -->
  <g font-family="sans-serif" font-size="11">
    <rect x="24" y="356" width="192" height="34" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="34" y="370" font-weight="700" fill="#2563eb">Quick ratio</text>
    <text x="34" y="384" fill="#5b6680" font-size="10">gains &#247; losses &#160;(&lt;1 = shrinking)</text>

    <rect x="224" y="356" width="192" height="34" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="234" y="370" font-weight="700" fill="#2563eb">Gross retention</text>
    <text x="234" y="384" fill="#5b6680" font-size="10">retained &#247; prior-period total</text>

    <rect x="424" y="356" width="192" height="34" rx="6" fill="#f4f7ff" stroke="#2563eb"/>
    <text x="434" y="370" font-weight="700" fill="#2563eb">Net churn</text>
    <text x="434" y="384" fill="#5b6680" font-size="10">existing losses &#8722; gains, &#247; prior</text>
  </g>
</svg>
