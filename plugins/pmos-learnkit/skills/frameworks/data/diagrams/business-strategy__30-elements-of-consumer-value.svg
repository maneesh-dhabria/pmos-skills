<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="30 Elements of Consumer Value diagram">
  <rect width="640" height="400" fill="#ffffff"/>
  <text x="20" y="34" font-family="sans-serif" font-size="20" font-weight="700" fill="#1d2438">30 Elements of Consumer Value</text>
  <text x="20" y="54" font-family="sans-serif" font-size="12" fill="#5b6680">A value pyramid built on Maslow — higher tiers = more loyalty &amp; growth</text>

  <!-- Pyramid: 4 tiers, narrowing upward -->
  <!-- Tier 1 (base): Functional -->
  <polygon points="60,360 580,360 540,300 100,300" fill="#dbe6ff" stroke="#2563eb"/>
  <text x="320" y="328" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Functional · 14 elements</text>
  <text x="320" y="346" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">saves time · simplifies · makes money · reduces effort/risk · quality</text>

  <!-- Tier 2: Emotional -->
  <polygon points="100,298 540,298 500,238 140,238" fill="#bcd2ff" stroke="#2563eb"/>
  <text x="320" y="266" font-family="sans-serif" font-size="14" font-weight="700" fill="#1d2438" text-anchor="middle">Emotional · 10 elements</text>
  <text x="320" y="284" font-family="sans-serif" font-size="10" fill="#5b6680" text-anchor="middle">reduces anxiety · rewards me · wellness · design · fun · attractiveness</text>

  <!-- Tier 3: Life-changing -->
  <polygon points="140,236 500,236 460,176 180,176" fill="#7facff" stroke="#2563eb"/>
  <text x="320" y="204" font-family="sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Life-changing · 5 elements</text>
  <text x="320" y="222" font-family="sans-serif" font-size="10" fill="#eaf1ff" text-anchor="middle">motivation · heirloom · belonging · self-actualization · hope</text>

  <!-- Tier 4 (apex): Social impact -->
  <polygon points="180,174 460,174 320,84" fill="#0ea5a4" stroke="#0ea5a4"/>
  <text x="320" y="142" font-family="sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Social impact</text>
  <text x="320" y="158" font-family="sans-serif" font-size="10" fill="#eafaf9" text-anchor="middle">self-transcendence · 1 element</text>

  <!-- value/loyalty arrow on the side -->
  <line x1="606" y1="360" x2="606" y2="96" stroke="#f59e0b" stroke-width="2" marker-end="url(#up)"/>
  <defs>
    <marker id="up" markerWidth="9" markerHeight="9" refX="3" refY="2" orient="auto">
      <path d="M0,6 L3,0 L6,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="624" y="230" font-family="sans-serif" font-size="11" font-weight="700" fill="#f59e0b" text-anchor="middle" transform="rotate(90 624 230)">more loyalty &amp; sustained growth</text>
</svg>
