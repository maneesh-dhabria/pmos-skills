/* ---- 1. Design tokens ----------------------------------------------- */
:root {
  /* "Editorial Technical" — warm-paper canvas, ink text, hairline rules (story 260614-tcx). */
  --pmos-bg:        #f8f5ef;
  --pmos-surface:   #ffffff;
  --pmos-surface-2: #f1ede4;
  --pmos-surface-3: #e9e3d6;
  --pmos-border:    #e2dac9;
  --pmos-border-2:  #ece6da;
  /* Hairline section rule — quieter than a border, used under h2 + table heads. */
  --pmos-rule:      #d9cfbd;
  --pmos-text:      #201e1a;
  --pmos-muted:     #655e54;
  --pmos-faint:     #a59c8e;   /* decoration only — never body text (AA, FR-7) */
  /* Burnt-orange signal accent — shared by docs AND diagram themes (one palette). */
  --pmos-accent:        #b8431a;
  --pmos-accent-strong: #8f3413;
  --pmos-accent-bg:     #f6e4d6;
  /* Inline code — calm warm-grey on a light tint, NOT the loud accent (user feedback). */
  --pmos-code-bg:   #f1ece2;
  --pmos-code-fg:   #6f5848;
  --pmos-success:   #16a34a;
  --pmos-warning:   #b8651a;
  --pmos-error:     #b91c1c;

  --pmos-radius:    6px;
  --pmos-radius-lg: 12px;
  --pmos-shadow:    0 1px 2px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.04);
  --pmos-shadow-lg: 0 4px 14px rgba(0,0,0,.10), 0 12px 28px rgba(0,0,0,.08);

  /* Three-voice type system (story 260614-tcx): serif body, sans headings, mono structure.
     --pmos-font-serif → reading body; --pmos-font-sans → headings/UI; --pmos-font-display
     (bundled JetBrains Mono 700, see @font-face) → the structural layer (wordmark, section
     [NN] counters, table heads, eyebrows). Token names preserved — consumed across the repo. */
  --pmos-font-serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Charter", Georgia, "Times New Roman", serif;
  --pmos-font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --pmos-font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --pmos-font-display: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Reading measure (~65ch) + wide measure for full-bleed chrome and break-out blocks. */
  --pmos-measure: 730px;
  --pmos-wide:    880px;

  --pmos-fs-xs: 11px;
  --pmos-fs-sm: 12px;
  --pmos-fs-base: 14px;
  --pmos-fs-md: 15px;
  --pmos-fs-lg: 17px;
  --pmos-fs-xl: 22px;
  --pmos-fs-2xl: 28px;

  --pmos-sp-1: 4px;
  --pmos-sp-2: 8px;
  --pmos-sp-3: 12px;
  --pmos-sp-4: 16px;
  --pmos-sp-5: 24px;
  --pmos-sp-6: 32px;

  --pmos-sidebar-w: 280px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --pmos-bg:        #14110d;
    --pmos-surface:   #1b1813;
    --pmos-surface-2: #211d17;
    --pmos-surface-3: #2a251d;
    --pmos-border:    #322c23;
    --pmos-border-2:  #3d362b;
    --pmos-rule:      #4a4133;
    --pmos-text:      #f2ece1;
    --pmos-muted:     #b9ad9b;
    --pmos-faint:     #7c7160;
    --pmos-accent:        #e08a4a;
    --pmos-accent-strong: #f0a868;
    --pmos-accent-bg:     #3a210f;
    --pmos-code-bg:   #2a251d;
    --pmos-code-fg:   #d8c4a8;
  }
}

/* ---- 2. Reset + base ------------------------------------------------ */
*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--pmos-bg);
  color: var(--pmos-text);
  font-family: var(--pmos-font-serif);
  font-size: 17px;
  line-height: 1.66;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: var(--pmos-accent);
  text-decoration: none;
}
a:hover { text-decoration: underline; }
a:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 2px; border-radius: 2px; }

img, svg { max-width: 100%; height: auto; }

/* ---- 3. Typography -------------------------------------------------- */
h1, h2, h3, h4, h5, h6 {
  margin: 0 0 var(--pmos-sp-3);
  font-weight: 600;
  line-height: 1.3;
  color: var(--pmos-text);
}
/* Headings carry the sans face; the structural [NN] counter + wordmark stay mono (story 260614-tcx). */
h1, h2, h3 { font-family: var(--pmos-font-sans); }
h1 { font-size: 34px; font-weight: 700; line-height: 1.12; letter-spacing: -0.02em; margin-top: 0; }
h2 {
  font-size: 21px;
  font-weight: 700;
  text-transform: none;
  line-height: 1.25;
  letter-spacing: -0.01em;
  margin: var(--pmos-sp-6) 0 var(--pmos-sp-3);
  padding-top: var(--pmos-sp-5);
  border-top: 1px solid var(--pmos-rule);
  position: relative;
}
h3 { font-size: 17px; font-weight: 600; margin: var(--pmos-sp-5) 0 var(--pmos-sp-2); position: relative; }
h4 { font-size: var(--pmos-fs-md); }
h5, h6 { font-size: var(--pmos-fs-sm); color: var(--pmos-muted); }

p { margin: 0 0 var(--pmos-sp-4); }

/* Calm warm-grey inline code — soft tint, not the loud accent (user feedback). */
pre, code, kbd, samp { font-family: var(--pmos-font-mono); }
code {
  background: var(--pmos-code-bg);
  color: var(--pmos-code-fg);
  padding: 1.5px 6px;
  border-radius: 4px;
  font-size: 0.82em;
}
pre {
  background: #2a2620;
  color: #f0e9dd;
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius-lg);
  padding: var(--pmos-sp-4) 18px;
  overflow-x: auto;
  margin: var(--pmos-sp-4) 0;
  font-size: 13px;
  line-height: 1.55;
}
pre code { background: transparent; color: inherit; padding: 0; font-size: inherit; }

blockquote {
  margin: var(--pmos-sp-3) 0;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-left: 3px solid var(--pmos-accent);
  background: var(--pmos-surface-2);
  color: var(--pmos-muted);
}

/* Eyebrow + labelled lead (story 260614-tcx, AC5) — mono uppercase kicker over the
   title; the lead is a serif standfirst introduced by a small mono chip. No italic
   left-rule "mission" block — the chip carries the role instead. */
.pmos-eyebrow {
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent);
  margin: 0 0 var(--pmos-sp-2);
}
.pmos-lead {
  font-family: var(--pmos-font-serif);
  font-size: 19px;
  line-height: 1.55;
  color: var(--pmos-text);
  margin: 0 0 var(--pmos-sp-5);
}
.pmos-lead-label {
  display: inline-block;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: var(--pmos-fs-xs);
  font-weight: 700;
  color: var(--pmos-accent-strong);
  background: var(--pmos-accent-bg);
  padding: 2px 8px;
  border-radius: 4px;
  margin-right: 0.6ch;
}

/* ---- 4. Tables ------------------------------------------------------ */
/* Calmer tables (story 260614-tcx, AC6): mono uppercase heads, horizontal rules only
   (no vertical grid), zebra retained. Break-out width handled in §8. */
table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--pmos-sp-4) 0;
  font-size: 15px;
  line-height: 1.5;
}
caption { caption-side: top; text-align: left; font-style: italic; color: var(--pmos-muted); margin-bottom: var(--pmos-sp-2); }
thead th {
  background: transparent;
  font-family: var(--pmos-font-display);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-size: 11px;
  font-weight: 700;
  color: var(--pmos-muted);
  text-align: left;
  padding: 9px 14px;
  border-bottom: 2px solid var(--pmos-rule);
}
th, td {
  border: 0;
  border-bottom: 1px solid var(--pmos-border-2);
  padding: 11px 14px;
  vertical-align: top;
}
tbody tr:nth-child(even) td { background: var(--pmos-surface-2); }

/* ---- 5. Lists + DL -------------------------------------------------- */
ul, ol { margin: 0 0 var(--pmos-sp-3); padding-left: var(--pmos-sp-5); }
li { margin: var(--pmos-sp-1) 0; }
li > ul, li > ol { margin: var(--pmos-sp-1) 0; }

dl { margin: var(--pmos-sp-3) 0; }
dt {
  font-weight: 600;
  margin-top: var(--pmos-sp-3);
  color: var(--pmos-text);
}
dd { margin: var(--pmos-sp-1) 0 var(--pmos-sp-2) var(--pmos-sp-4); color: var(--pmos-muted); }

/* ---- 6. Figures ----------------------------------------------------- */
figure {
  margin: var(--pmos-sp-4) 0;
  background: var(--pmos-surface);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-3);
}
figure svg { display: block; max-width: 100%; height: auto; margin: 0 auto; }
figcaption {
  margin-top: var(--pmos-sp-2);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  font-style: italic;
  text-align: center;
}

/* ---- 7. Viewer chrome (index.html) --------------------------------- */
.pmos-viewer-shell {
  display: grid;
  grid-template-columns: var(--pmos-sidebar-w) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  background: var(--pmos-bg);
}

.pmos-toolbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-surface);
  border-bottom: 1px solid var(--pmos-border);
  position: sticky;
  top: 0;
  z-index: 10;
}
.pmos-toolbar h1 {
  margin: 0;
  font-size: var(--pmos-fs-md);
  font-weight: 600;
}
.pmos-toolbar .pmos-toolbar-meta {
  margin-left: auto;
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-muted);
}

.pmos-sidebar {
  background: var(--pmos-surface-2);
  border-right: 1px solid var(--pmos-border);
  overflow-y: auto;
  padding: var(--pmos-sp-3);
  height: calc(100vh - 48px);
  position: sticky;
  top: 48px;
}
.pmos-sidebar-group {
  margin-bottom: var(--pmos-sp-4);
}
.pmos-sidebar-group-h {
  font-size: var(--pmos-fs-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--pmos-muted);
  margin: var(--pmos-sp-3) 0 var(--pmos-sp-2);
  padding: 0 var(--pmos-sp-2);
}
.pmos-sidebar-item {
  display: block;
  padding: var(--pmos-sp-1) var(--pmos-sp-3);
  border-radius: var(--pmos-radius);
  font-size: var(--pmos-fs-sm);
  color: var(--pmos-text);
  text-decoration: none;
  margin: 1px 0;
}
.pmos-sidebar-item:hover {
  background: var(--pmos-surface-3);
  text-decoration: none;
}
.pmos-sidebar-item.is-active {
  background: var(--pmos-accent-bg);
  color: var(--pmos-accent-strong);
  font-weight: 500;
}
.pmos-sidebar-sub {
  display: block;
  padding: 2px var(--pmos-sp-3) 2px var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  text-decoration: none;
  border-radius: var(--pmos-radius);
}
.pmos-sidebar-sub:hover { color: var(--pmos-text); background: var(--pmos-surface-3); text-decoration: none; }
.pmos-sidebar-sub.is-active { color: var(--pmos-accent-strong); }

.pmos-main {
  background: var(--pmos-surface);
  border-left: 1px solid var(--pmos-border);
  height: calc(100vh - 48px);
  overflow: hidden;
}
.pmos-main iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}

.pmos-source-info {
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
}

/* ---- 8. Per-artifact body (template.html) -------------------------- */
/* Full-bleed toolbar bar (spans the viewport); inner content centered at the wide
   measure to line up with the prose column + its right break-out (story 260614-tcx). */
.pmos-artifact-toolbar {
  background: rgba(248, 245, 239, 0.86);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--pmos-rule);
  position: sticky;
  top: 0;
  z-index: 5;
}
.pmos-artifact-toolbar-inner {
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: 11px var(--pmos-sp-5);
}
@media (prefers-color-scheme: dark) {
  .pmos-artifact-toolbar { background: rgba(20, 17, 13, 0.86); }
}
/* Masthead wordmark (W11) — "pmos" in the display face + an accent block caret
   drawn in CSS (no glyph dependency). Appears top-left of every artifact toolbar. */
.pmos-wordmark {
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: var(--pmos-fs-lg);
  letter-spacing: -0.04em;
  color: var(--pmos-text);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-wordmark::after {
  content: "";
  display: inline-block;
  width: 0.32em;
  height: 0.95em;
  margin-left: 0.1em;
  background: var(--pmos-accent);
  border-radius: 1px;
  transform: translateY(0.05em);
}
/* Toolbar breadcrumb — a non-heading mono label (the real H1 lives in the body now,
   story 260614-tcx). .pmos-artifact-title kept as a back-compat alias. */
.pmos-crumb,
.pmos-artifact-title {
  margin: 0;
  font-family: var(--pmos-font-display);
  font-size: var(--pmos-fs-sm);
  font-weight: 400;
  color: var(--pmos-muted);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: var(--pmos-sp-3);
  border-left: 1px solid var(--pmos-border-2);
}
.pmos-artifact-actions { display: flex; gap: var(--pmos-sp-2); }

/* Body document title — the single real H1, opening the article column. */
.pmos-doc-title { margin: 0 0 var(--pmos-sp-5); }

.pmos-btn {
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border);
  color: var(--pmos-text);
  font-family: inherit;
  font-size: var(--pmos-fs-sm);
  padding: 4px 10px;
  border-radius: var(--pmos-radius);
  cursor: pointer;
  transition: background 0.12s;
}
.pmos-btn:hover { background: var(--pmos-surface-3); }
.pmos-btn:focus-visible { outline: 2px solid var(--pmos-accent); outline-offset: 1px; }
.pmos-btn:active { background: var(--pmos-border-2); }
.pmos-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

.pmos-artifact-body {
  max-width: var(--pmos-measure);
  margin: 0 auto;
  padding: 48px var(--pmos-sp-5) 96px;
  counter-reset: pmos-sec;
}
.pmos-artifact-body section {
  margin-bottom: var(--pmos-sp-5);
}

/* Break-out (story 260614-tcx, AC3): tables + code blocks extend past the reading
   measure to the RIGHT only — left edge stays aligned with the prose, capped at the
   wide measure. Symmetric centering would float them away from the text column. */
.pmos-artifact-body table,
.pmos-artifact-body pre,
.pmos-artifact-body figure {
  width: calc(100% + 150px);
  max-width: var(--pmos-wide);
  margin-left: 0;
}

/* Section signature (W11) — a zero-padded [NN] counter in the accent prefixes every
   content h2. CSS-generated, so it never enters the DOM text: heading ids, comment
   anchors, and Copy-MD all still see the clean heading. */
.pmos-artifact-body h2::before {
  counter-increment: pmos-sec;
  content: counter(pmos-sec, decimal-leading-zero);
  display: block;
  margin-bottom: 7px;
  font-family: var(--pmos-font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0;
  color: var(--pmos-accent);
}

/* Section anchor-icon hover state — per-section Copy MD (FR-24) */
.pmos-artifact-body h2,
.pmos-artifact-body h3 {
  position: relative;
}
.pmos-section-anchor {
  position: absolute;
  left: -28px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 0;
  color: var(--pmos-faint);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.12s, color 0.12s;
  font-size: 13px;
  padding: 0;
}
.pmos-artifact-body h2:hover .pmos-section-anchor,
.pmos-artifact-body h3:hover .pmos-section-anchor,
.pmos-section-anchor:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  outline: none;
}
.pmos-section-anchor:hover { color: var(--pmos-accent-strong); }

/* :target highlight for anchor-scroll (FR-90) */
:target {
  scroll-margin-top: 64px;
  background: linear-gradient(transparent 0, var(--pmos-accent-bg) 0) no-repeat;
  background-size: 100% 0;
  animation: pmos-target-flash 1.4s ease-out;
}
@keyframes pmos-target-flash {
  0%   { background-size: 100% 100%; }
  60%  { background-size: 100% 100%; }
  100% { background-size: 100% 0; }
}

.pmos-artifact-footer {
  margin-top: var(--pmos-sp-6);
  border-top: 1px solid var(--pmos-rule);
}
.pmos-artifact-footer-inner {
  max-width: var(--pmos-wide);
  margin: 0 auto;
  padding: var(--pmos-sp-4) var(--pmos-sp-5);
  font-size: var(--pmos-fs-xs);
  color: var(--pmos-muted);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5ch;
}
/* Footer wordmark (W11) — the brand mark, smaller than the toolbar lockup. */
.pmos-wordmark--footer {
  font-size: var(--pmos-fs-sm);
  margin-right: var(--pmos-sp-2);
}

/* Attribution — toolbar (right-aligned, small) and footer (inline after source).
   W11: dropped the 0.65-opacity italic ("legal boilerplate") for a visible,
   non-italic brand link that brightens to the accent on hover. */
.pmos-attribution {
  font-size: var(--pmos-fs-xs);
  font-style: normal;
  color: var(--pmos-muted);
  text-decoration: none;
  letter-spacing: 0.01em;
  opacity: 0.85;
  transition: opacity 120ms ease, color 120ms ease;
}
.pmos-attribution:hover,
.pmos-attribution:focus-visible {
  opacity: 1;
  color: var(--pmos-accent);
  text-decoration: underline;
  text-decoration-thickness: 1px;
  text-underline-offset: 2px;
}
.pmos-attribution--toolbar {
  margin-left: var(--pmos-sp-3);
  white-space: nowrap;
  flex-shrink: 0;
}
.pmos-attribution-sep {
  color: var(--pmos-muted);
  opacity: 0.5;
}

/* Toast (Copy confirmation) */
.pmos-toast {
  position: fixed;
  bottom: var(--pmos-sp-4);
  right: var(--pmos-sp-4);
  background: var(--pmos-text);
  color: var(--pmos-bg);
  font-size: var(--pmos-fs-sm);
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  border-radius: var(--pmos-radius);
  box-shadow: var(--pmos-shadow-lg);
  z-index: 100;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.18s, transform 0.18s;
  pointer-events: none;
}
.pmos-toast.is-visible {
  opacity: 1;
  transform: translateY(0);
}

/* ---- 9. Quickstart banner (W04, FR-26) ----------------------------- */
.pmos-quickstart-banner {
  margin: var(--pmos-sp-3) auto;
  max-width: 880px;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: var(--pmos-accent-bg);
  border: 1px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  display: flex;
  align-items: center;
  gap: var(--pmos-sp-3);
  font-size: var(--pmos-fs-sm);
}
.pmos-quickstart-banner strong { color: var(--pmos-accent-strong); }
.pmos-quickstart-banner .pmos-quickstart-dismiss {
  margin-left: auto;
}

/* ---- 10. file:// fallback banner ----------------------------------- */
.pmos-fallback-banner {
  margin: 0;
  padding: var(--pmos-sp-3) var(--pmos-sp-4);
  background: #fff7ed;
  border-bottom: 1px solid var(--pmos-warning);
  color: #9a3412;
  font-size: var(--pmos-fs-sm);
}
@media (prefers-color-scheme: dark) {
  .pmos-fallback-banner {
    background: #422006;
    color: #fdba74;
  }
}
.pmos-fallback-banner code {
  background: rgba(0,0,0,0.06);
  color: inherit;
}

/* ---- 11. Legacy MD shim (FR-22) ----------------------------------- */
.pmos-legacy-md {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--pmos-font-mono);
  font-size: var(--pmos-fs-sm);
  line-height: 1.5;
  background: var(--pmos-surface-2);
  border: 1px solid var(--pmos-border-2);
  border-radius: var(--pmos-radius);
  padding: var(--pmos-sp-4);
  margin: var(--pmos-sp-3);
  max-width: calc(880px - 2 * var(--pmos-sp-3));
  overflow-x: auto;
}
.pmos-legacy-md-banner {
  background: var(--pmos-warning);
  color: #fff;
  padding: var(--pmos-sp-2) var(--pmos-sp-4);
  font-size: var(--pmos-fs-sm);
  font-weight: 500;
}

/* ---- 12. Focus ring + keyboard nav (NFR-03) ----------------------- */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
  border-radius: 2px;
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--pmos-accent);
  outline-offset: 2px;
}

/* Skip link (a11y) */
.pmos-skip-link {
  position: absolute;
  left: -9999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
.pmos-skip-link:focus {
  position: fixed;
  left: var(--pmos-sp-3);
  top: var(--pmos-sp-3);
  width: auto;
  height: auto;
  background: var(--pmos-surface);
  color: var(--pmos-text);
  padding: var(--pmos-sp-2) var(--pmos-sp-3);
  border: 2px solid var(--pmos-accent);
  border-radius: var(--pmos-radius);
  z-index: 200;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* Print */
@media print {
  .pmos-artifact-toolbar,
  .pmos-toolbar,
  .pmos-sidebar,
  .pmos-quickstart-banner,
  .pmos-fallback-banner,
  .pmos-toast,
  .pmos-section-anchor,
  .pmos-attribution--toolbar { display: none !important; }
  .pmos-viewer-shell { display: block; }
  .pmos-main { height: auto; }
  body { background: white; color: black; }
}

body{margin:0;font-family:var(--pmos-font-sans);font-size:var(--pmos-fs-md);line-height:1.55;background:var(--pmos-bg);color:var(--pmos-text)}

#groups{padding:18px 20px}

.card .thumb[data-thumb]:empty{min-height:60px;background:var(--pmos-surface-2);border:1px dashed var(--pmos-border)}
.card .thumb svg{max-width:100%;max-height:118px;height:auto}
.card h4.name{margin:0 0 4px;font-family:var(--pmos-font-sans);font-size:16px}
.card .cat{color:var(--pmos-muted);font-family:var(--pmos-font-mono);font-size:var(--pmos-fs-sm);text-transform:uppercase;letter-spacing:.04em}
.card .sum{margin:8px 0 10px;color:var(--pmos-text)}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{background:var(--pmos-accent-bg);color:var(--pmos-accent-strong);border:1px solid var(--pmos-border);border-radius:999px;padding:2px 8px;font-size:var(--pmos-fs-xs)}
.dt{display:inline-block;background:var(--pmos-surface-2);color:var(--pmos-accent);border-radius:999px;padding:2px 8px;font-size:var(--pmos-fs-xs);margin-top:8px}
.compact .row{margin:4px 0;line-height:1.7}
.compact .row a{margin-right:2px}
.compact .row a.selected{color:var(--pmos-surface);background:var(--pmos-accent);border-radius:4px;padding:1px 5px;font-weight:600}
ul.listview{margin:0;padding-left:18px}
ul.listview li{margin:6px 0}
ul.listview li.selected{background:var(--pmos-accent-bg);border-radius:var(--pmos-radius);padding:2px 8px;margin-left:-8px;border-left:3px solid var(--pmos-accent)}
ul.listview li.selected>a{color:var(--pmos-accent);font-weight:600}
ul.listview .ls{color:var(--pmos-muted)}
.empty{color:var(--pmos-muted);text-align:center;padding:40px}
.reader{width:0;overflow:hidden;background:var(--pmos-surface-2);border-left:1px solid var(--pmos-border);transition:width .18s ease;align-self:stretch;position:sticky;top:0;max-height:100vh;overflow-y:auto}
.layout.reader-open .reader{width:min(440px,42%);padding:18px 20px}
.reader h2{margin:0 2px 2px 0;font-family:var(--pmos-font-sans)}
.reader .meta{color:var(--pmos-muted);font-family:var(--pmos-font-mono);font-size:var(--pmos-fs-sm);margin-bottom:12px}
.reader .actions{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 14px}
.reader .actions button{font-family:var(--pmos-font-sans);background:var(--pmos-surface);color:var(--pmos-text);border:1px solid var(--pmos-border);border-radius:var(--pmos-radius);padding:6px 10px;font-size:var(--pmos-fs-sm);cursor:pointer}
.reader .actions button:hover{border-color:var(--pmos-accent)}
.reader button.close{float:right;color:var(--pmos-muted)}
.reader .body{font-family:var(--pmos-font-serif)}
.take{background:var(--pmos-accent-bg);border-left:3px solid var(--pmos-accent);padding:10px 14px;border-radius:var(--pmos-radius);margin:12px 0;color:var(--pmos-text)}
.take b{color:var(--pmos-accent-strong)}
.when{display:flex;gap:18px;flex-wrap:wrap;margin:10px 0}
.when div{flex:1;min-width:160px}
.when h4{margin:0 0 4px;font-family:var(--pmos-font-mono);font-size:var(--pmos-fs-sm);text-transform:uppercase;color:var(--pmos-muted)}
.body ul{margin:6px 0;padding-left:20px}
.body blockquote{border-left:3px solid var(--pmos-rule);margin:8px 0;padding:2px 12px;color:var(--pmos-muted)}
.diagram{margin:10px 0}
.diagram svg{max-width:100%;height:auto;background:var(--pmos-surface);border-radius:var(--pmos-radius);padding:8px}
.diagrams-lead{margin-bottom:8px}
.refs a{margin-right:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--pmos-accent);color:var(--pmos-surface);font-weight:600;padding:8px 16px;border-radius:var(--pmos-radius);opacity:0;transition:opacity .2s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
@media(max-width:720px){.layout{flex-direction:column}.layout.reader-open .reader{width:100%;border-left:0;border-top:1px solid var(--pmos-border);position:static;max-height:none}}
</style>
</head>
<body>
<div class="layout" id="layout">
<main class="listing">
<header>
<div class="masthead"><span class="wordmark">PMOS</span><div class="mast-text"><h1>Fixture Library</h1><div class="subtitle"><span id="subtitleCount">2</span> items — browse</div></div></div>
<div class="controls">
<span class="searchwrap"><input id="search" type="search" placeholder="Search…" aria-label="Search"><button id="searchClear" type="button" class="search-clear" aria-label="Clear search" hidden>✕</button></span>
<div class="viewswitch" role="tablist" aria-label="View">
<button type="button" data-view="compact" aria-label="Compact list view"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1" y="2.5" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="11.5" width="14" height="2" rx="1"/></svg>Compact</button>
<button type="button" data-view="detailed" aria-label="Detailed cards view"><svg viewBox="0 0 16 16" aria-hidden="true"><rect x="1.5" y="1.5" width="6" height="6" rx="1"/><rect x="8.5" y="1.5" width="6" height="6" rx="1"/><rect x="1.5" y="8.5" width="6" height="6" rx="1"/><rect x="8.5" y="8.5" width="6" height="6" rx="1"/></svg>Detailed</button>
<button type="button" data-view="list" class="active" aria-label="List view"><svg viewBox="0 0 16 16" aria-hidden="true"><circle cx="2.5" cy="3.5" r="1.3"/><rect x="5.5" y="2.7" width="9.5" height="1.7" rx="0.8"/><circle cx="2.5" cy="8" r="1.3"/><rect x="5.5" y="7.2" width="9.5" height="1.7" rx="0.8"/><circle cx="2.5" cy="12.5" r="1.3"/><rect x="5.5" y="11.7" width="9.5" height="1.7" rx="0.8"/></svg>List</button>
</div>
<label>Group by <select id="groupBy" aria-label="Group by"><option value="category">Cats</option><option value="tags">Tags</option></select></label>
<select id="f-sc" aria-label="Filter by Area"><option value="">All</option><option value="SC1">Area One</option><option value="SC2">SC2</option></select>
<select id="f-cat" aria-label="Filter by Cat"><option value="">All</option><option value="Cat A">Cat A</option><option value="Cat B">Cat B</option></select>
<span class="count" id="count" aria-live="polite"></span>
</div>
<div class="filterbar" id="filterbar">
<div class="dropdown" id="dd-k">
<button type="button" class="dd-trigger" data-dd="k" aria-expanded="false" aria-controls="dd-k-panel">Kind <span class="caret" aria-hidden="true">▾</span></button>
<div class="panel" id="dd-k-panel" role="group" aria-label="Filter by k" hidden><label class="opt"><input type="checkbox" data-k="k1"> k1 <span class="cnt">(1)</span></label><label class="opt"><input type="checkbox" data-k="k2"> k2 <span class="cnt">(1)</span></label></div>
</div>
<div class="dropdown" id="dd-tags">
<button type="button" class="dd-trigger" data-dd="tags" aria-expanded="false" aria-controls="dd-tags-panel">Tags <span class="caret" aria-hidden="true">▾</span></button>
<div class="panel" id="dd-tags-panel" role="group" aria-label="Filter by tags" hidden><input type="search" class="tag-search" id="tagSearch" placeholder="Filter…" aria-label="Type to filter the list"><div class="checklist" id="tagChecklist"><label class="opt" data-tagopt="x"><input type="checkbox" data-tag="x"> x <span class="cnt">(1)</span></label><label class="opt" data-tagopt="y"><input type="checkbox" data-tag="y"> y <span class="cnt">(2)</span></label></div></div>
</div>
</div>
<div class="applied" id="applied"></div>
</header>
<div id="groups"></div>
</main>
<aside class="reader" id="reader" aria-label="Reader" aria-hidden="true"></aside>
</div>
<div class="toast" id="toast"></div>
<script id="lv-data" type="application/json">[{"id":"a1","name":"Alpha","category":"Cat A","super_category":"SC1","kind":"k1","tags":["x","y"],"summary":"first","when":"use a","body_html":"<p>A body</p>","body_md":"- a"},{"id":"b2","name":"Beta","category":"Cat B","super_category":"SC2","kind":"k2","tags":["y"],"summary":"second","when":"use b","body_html":"<p>B body</p>","body_md":"- b"}]</script>
<script id="lv-config" type="application/json">{"fields":{"id":"id","name":"name","summary":"summary","category":"category","thumb":"thumb","bodyHtml":"body_html"},"searchFields":["name","summary",{"field":"tags","array":true}],"defaultView":"list","groupBy":[{"value":"category","field":"category","array":false,"emptyLabel":"(untagged)"},{"value":"tags","field":"tags","array":true,"emptyLabel":"(untagged)"}],"defaultGroupValue":"category","single":[{"key":"sc","field":"super_category","controlId":"f-sc","chipLabel":"Area"},{"key":"cat","field":"category","controlId":"f-cat","chipLabel":"Cat"}],"multi":[{"key":"k","field":"kind","itemAttr":"k","array":false,"chipLabel":"Kind","search":false,"searchInputId":"kSearch","checklistId":"kChecklist"},{"key":"tags","field":"tags","itemAttr":"tag","array":true,"chipLabel":"Tag","search":true,"searchInputId":"tagSearch","checklistId":"tagChecklist"}],"reader":{"metaPrimaryField":"category","authorField":null,"pillField":null,"take":null,"columns":[{"field":"when","label":"When"}],"refsField":"references","markdownBodyField":"body_md"},"card":null}</script>
<script id="lv-labels" type="application/json">{"sc":{"SC1":"Area One"}}</script>
<script>

var DATA = JSON.parse(document.getElementById('lv-data').textContent);
var CFG = JSON.parse(document.getElementById('lv-config').textContent);
var VALUE_LABELS = JSON.parse(document.getElementById('lv-labels').textContent);
var F = CFG.fields;
function valueLabel(key, v){ var m=VALUE_LABELS[key]; return (m && m[v]!=null)?m[v]:v; }
var layout = document.getElementById('layout');
var reader = document.getElementById('reader');
var groupsEl = document.getElementById('groups');
var filterbar = document.getElementById('filterbar');
var appliedEl = document.getElementById('applied');
var search = document.getElementById('search');
var searchClear = document.getElementById('searchClear');
var groupBy = document.getElementById('groupBy');
var countEl = document.getElementById('count');
var subtitleCount = document.getElementById('subtitleCount');
var toastEl = document.getElementById('toast');
var byId = {}; DATA.forEach(function(f){ byId[f[F.id]]=f; });
var lastOpener = null;
var thumbObserver = null;
// state.<facetKey>: single-select → string; multi-dropdown → set (object map val→true).
var state = { view: 'list', groupBy: CFG.defaultGroupValue, q: '', openId: null };
CFG.single.forEach(function(f){ state[f.key]=''; });
CFG.multi.forEach(function(f){ state[f.key]={}; });

function esc(s){var d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function selectedKeys(obj){return Object.keys(obj).filter(function(k){return obj[k];});}
// ---- optional card-extras hook (CFG.card): link-out titles, badge, metarow pills ----
function cardLinkOut(){ return !!(CFG.card && CFG.card.link); }
function cardLinks(f){ var c=CFG.card&&CFG.card.link; if(!c) return true; if(!c.existsField) return true; return f[c.existsField]!==false; }
function cardHref(f){ var c=CFG.card&&CFG.card.link; return (c && f[c.hrefField]) ? f[c.hrefField] : ('#'+encodeURIComponent(f[F.id])); }
// title cell: when linking out, an <a href> that navigates (or plain text if the target is missing);
// otherwise the default in-page reader anchor (intercepted click → openReader).
function titleCell(f, cls){
  var t=esc(f[F.name]); var c=cls?(' class="'+cls+'"'):'';
  if(cardLinkOut()){ return cardLinks(f) ? '<a href="'+esc(cardHref(f))+'"'+c+'>'+t+'</a>' : '<span'+c+'>'+t+'</span>'; }
  return '<a href="#'+encodeURIComponent(f[F.id])+'" data-id="'+esc(f[F.id])+'"'+c+'>'+t+'</a>';
}
function cardBadge(f){ var b=CFG.card&&CFG.card.badge; if(!b||!b.field) return ''; var v=f[b.field]; if(v==null||v==='') return ''; return '<span class="badge '+esc(String(v).toLowerCase())+'">'+esc(v)+'</span>'; }
function cardPills(f){
  var ps=CFG.card&&CFG.card.pills; if(!ps||!ps.length) return '';
  var out=[];
  ps.forEach(function(p){
    if(p.whenFalse){ if(f[p.whenFalse]===false) out.push('<span class="pill '+esc(p.cls||'')+'">'+esc(p.text)+'</span>'); return; }
    var v=f[p.field]; if(v==null||v===''||(p.skip&&p.skip.indexOf(v)>=0)) return;
    var disp=(p.thousands&&typeof v==='number')?v.toLocaleString():v;
    out.push('<span class="pill">'+esc(disp)+esc(p.suffix||'')+'</span>');
  });
  return out.length?('<div class="metarow">'+out.join('')+'</div>'):'';
}
function matches(f, q){
  if(!q) return true;
  var parts=[];
  CFG.searchFields.forEach(function(sf){
    if(sf && typeof sf==='object'){ var v=f[sf.field]; parts.push(sf.array?((v||[]).join(' ')):(v||'')); }
    else parts.push(f[sf]||'');
  });
  var hay=parts.join(' ').toLowerCase();
  return q.toLowerCase().split(/\s+/).filter(Boolean).every(function(t){return hay.indexOf(t)>=0;});
}
function passes(f){
  for(var i=0;i<CFG.single.length;i++){ var s=CFG.single[i]; if(state[s.key] && f[s.field]!==state[s.key]) return false; }
  for(var j=0;j<CFG.multi.length;j++){
    var m=CFG.multi[j]; var sel=selectedKeys(state[m.key]);
    if(sel.length){
      var any = m.array
        ? sel.some(function(v){return (f[m.field]||[]).indexOf(v)>=0;})
        : sel.some(function(v){return f[m.field]===v;});
      if(!any) return false; // OR within a facet
    }
  }
  return matches(f, state.q); // AND across facets + search
}
function primaryCat(f){ return f[F.category]||'Uncategorized'; }
function groupKeysFor(f){
  if(state.view==='compact') return [primaryCat(f)];
  for(var i=0;i<CFG.groupBy.length;i++){
    var g=CFG.groupBy[i];
    if(state.groupBy===g.value){
      if(g.array){ var a=f[g.field]; return (a&&a.length)?a.slice():[g.emptyLabel]; }
      return [f[g.field]||'Uncategorized'];
    }
  }
  return [primaryCat(f)];
}
function trailingMap(){ var t={'Uncategorized':1}; CFG.groupBy.forEach(function(g){ if(g.array) t[g.emptyLabel]=1; }); return t; }
function sortGroupNames(names){ var trailing=trailingMap(); return names.sort(function(a,b){ var ta=trailing[a]?1:0, tb=trailing[b]?1:0; if(ta!==tb) return ta-tb; var la=a.toLowerCase(), lb=b.toLowerCase(); return la<lb?-1:la>lb?1:0; }); }
function buildGroups(list){ var map={}; list.forEach(function(f){ groupKeysFor(f).forEach(function(k){ (map[k]=map[k]||[]).push(f); }); }); return map; }
function thumbHtml(f){ return f[F.thumb]?('<div class="thumb" data-thumb="'+esc(f[F.id])+'"></div>'):''; }
function injectThumb(el){ var f=byId[el.getAttribute('data-thumb')]; if(f&&f[F.thumb]&&!el.firstChild){ el.innerHTML=f[F.thumb]; } }
function mountThumbs(){
  var placeholders=groupsEl.querySelectorAll('[data-thumb]');
  if(!('IntersectionObserver' in window)){ Array.prototype.forEach.call(placeholders, injectThumb); return; }
  if(thumbObserver) thumbObserver.disconnect();
  thumbObserver=new IntersectionObserver(function(entries){ entries.forEach(function(en){ if(en.isIntersecting){ injectThumb(en.target); thumbObserver.unobserve(en.target); } }); }, { rootMargin: '200px 0px' });
  Array.prototype.forEach.call(placeholders, function(el){ thumbObserver.observe(el); });
}
function updateSelection(){
  Array.prototype.forEach.call(groupsEl.querySelectorAll('[data-id]'), function(el){
    var on=el.getAttribute('data-id')===state.openId;
    if(el.classList.contains('card')){ el.classList.toggle('open', on); } else { el.classList.toggle('selected', on); }
  });
}
function cardHtml(f){
  if(CFG.card){
    // card-extras layout: badge + category, link-out title, declarative metarow.
    return '<div class="card" data-id="'+esc(f[F.id])+'">'
      +'<div class="top">'+cardBadge(f)+'<span class="cat">'+esc(f[F.category])+'</span></div>'
      +'<h4 class="name">'+titleCell(f)+'</h4>'
      +cardPills(f)+'</div>';
  }
  return '<div class="card'+(f[F.id]===state.openId?' open':'')+'" data-id="'+esc(f[F.id])+'">'
    +thumbHtml(f)
    +'<div class="cat">'+esc(f[F.category])+'</div><h4 class="name">'+esc(f[F.name])+'</h4>'
    +'<div class="sum">'+esc(f[F.summary])+'</div>'
    +'<div class="tags">'+(f.tags||[]).map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div>'
    +(f[CFG.reader.pillField]?'<span class="dt">'+esc(f[CFG.reader.pillField])+'</span>':'')+'</div>';
}
function render(){
  var sy=window.scrollY;
  state.q=search.value.trim();
  if(searchClear) searchClear.hidden=!state.q;
  var list=DATA.filter(passes);
  countEl.textContent=list.length+' of '+DATA.length;
  if(groupBy) groupBy.disabled=(state.view==='compact');
  if(!list.length){ groupsEl.innerHTML='<div class="empty">No matches. Try fewer words or clear the filters.</div>'; window.scrollTo(0, sy); return; }
  var map=buildGroups(list);
  var names=sortGroupNames(Object.keys(map));
  var html='';
  names.forEach(function(name){
    var items=map[name].slice().sort(function(a,b){return a[F.name].toLowerCase()<b[F.name].toLowerCase()?-1:1;});
    html+='<div class="group"><h3>'+esc(name)+'</h3>';
    if(state.view==='compact'){
      html+='<div class="compact"><div class="row">'+items.map(function(f){
        if(CFG.card) return titleCell(f, f[F.id]===state.openId?'selected':'');
        return '<a href="#'+encodeURIComponent(f[F.id])+'" data-id="'+esc(f[F.id])+'"'+(f[F.id]===state.openId?' class="selected"':'')+'>'+esc(f[F.name])+'</a>';
      }).join(', ')+'</div></div>';
    } else if(state.view==='list'){
      html+='<ul class="listview">'+items.map(function(f){
        if(CFG.card) return '<li>'+cardBadge(f)+titleCell(f)+cardPills(f)+'</li>';
        return '<li'+(f[F.id]===state.openId?' class="selected"':'')+'><a href="#'+encodeURIComponent(f[F.id])+'" data-id="'+esc(f[F.id])+'">'+esc(f[F.name])+'</a> <span class="ls">— '+esc(f[F.summary])+'</span></li>';
      }).join('')+'</ul>';
    } else {
      html+='<div class="cards">'+items.map(cardHtml).join('')+'</div>';
    }
    html+='</div>';
  });
  groupsEl.innerHTML=html;
  if(state.view==='detailed') mountThumbs();
  window.scrollTo(0, sy);
}
function readerHtml(f){
  var refs=(f[CFG.reader.refsField]||[]).map(function(r){return '<a href="'+esc(r.url)+'" target="_blank" rel="noopener">'+esc(r.type||'Link')+'</a>';}).join('');
  var meta=esc(f[CFG.reader.metaPrimaryField]);
  if(CFG.reader.authorField && f[CFG.reader.authorField]) meta+=' · '+esc(f[CFG.reader.authorField]);
  if(CFG.reader.pillField && f[CFG.reader.pillField]) meta+=' · <span class="dt">'+esc(f[CFG.reader.pillField])+'</span>';
  var take='';
  if(CFG.reader.take && f[CFG.reader.take.field]) take='<div class="take"><b>'+CFG.reader.take.labelHtml+':</b> '+esc(f[CFG.reader.take.field])+'</div>';
  var cols='';
  CFG.reader.columns.forEach(function(c){ if(f[c.field]) cols+='<div><h4>'+esc(c.label)+'</h4>'+esc(f[c.field])+'</div>'; });
  var when=cols?('<div class="when">'+cols+'</div>'):'';
  return '<button class="close" type="button" data-act="close">close ✕</button>'
    +'<h2>'+esc(f[F.name])+'</h2><div class="meta">'+meta+'</div>'
    +'<div class="actions"><button type="button" data-act="copy">Copy markdown</button><button type="button" data-act="copylink">Copy link</button><button type="button" data-act="share">Share</button></div>'
    +take+when
    +'<div class="body">'+(f[F.bodyHtml]||'')+'</div>'
    +(refs?'<div class="refs"><h4>References</h4>'+refs+'</div>':'');
}
function openReader(id){
  var f=byId[id]; if(!f) return;
  var opener=null;
  Array.prototype.forEach.call(groupsEl.querySelectorAll('[data-id]'), function(el){ if(el.getAttribute('data-id')===id) opener=el; });
  if(opener) lastOpener=opener;
  state.openId=id;
  reader.innerHTML=readerHtml(f);
  reader.setAttribute('aria-hidden','false');
  layout.classList.add('reader-open');
  reader.scrollTop=0;
  updateSelection();
  if(decodeURIComponent(location.hash.slice(1))!==id){ location.hash=encodeURIComponent(id); }
  var cb=reader.querySelector('button.close'); if(cb) cb.focus();
  if(window.matchMedia&&window.matchMedia('(max-width:720px)').matches){ reader.scrollIntoView({behavior:'smooth',block:'start'}); }
}
function closeReader(){
  state.openId=null; layout.classList.remove('reader-open'); reader.setAttribute('aria-hidden','true'); reader.innerHTML='';
  updateSelection();
  if(location.hash){ history.replaceState(null,'',location.pathname+location.search); }
  if(lastOpener&&lastOpener.focus){ lastOpener.focus(); lastOpener=null; }
}
function toMarkdown(f){
  var md='# '+f[F.name]+'\n\n';
  if(f[F.summary]) md+=f[F.summary]+'\n\n';
  CFG.reader.columns.forEach(function(c){ if(f[c.field]) md+='**'+c.label+':** '+f[c.field]+'\n\n'; });
  if(f[CFG.reader.markdownBodyField]) md+=f[CFG.reader.markdownBodyField]+'\n\n';
  var refs=f[CFG.reader.refsField]||[];
  if(refs.length){ md+='**References:**\n'; refs.forEach(function(r){ md+='- ['+(r.type||'Link')+']('+r.url+')\n'; }); }
  return md.replace(/\s+$/,'')+'\n';
}
function toShare(f){
  var s=f[F.name]+(f[F.summary]?' — '+f[F.summary]:'');
  var col0=CFG.reader.columns[0];
  if(col0 && f[col0.field]) s+='\n'+col0.label+': '+f[col0.field];
  var ref=(f[CFG.reader.refsField]||[]).filter(function(r){return r.url;})[0];
  if(ref) s+='\n'+ref.url;
  return s;
}
function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(function(){toastEl.classList.remove('show');},1400); }
function fallbackCopy(t){
  var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('Copied ✓'); }catch(e){ toast('Copy failed — select & copy manually'); }
  document.body.removeChild(ta);
}
function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){toast('Copied ✓');},function(){fallbackCopy(t);}); }
  else { fallbackCopy(t); }
}
function appliedChip(facet,value,attr){ return '<button type="button" class="applied-chip" '+attr+' aria-label="Remove filter: '+esc(value)+'">'+esc(facet)+': '+esc(value)+' ✕</button>'; }
function renderApplied(){
  var html='';
  var q=(search.value||'').trim();
  if(q) html+=appliedChip('Search', q, 'data-rm-q="1"');
  CFG.single.forEach(function(s){ if(state[s.key]) html+=appliedChip(s.chipLabel, valueLabel(s.key, state[s.key]), 'data-rm-single="'+esc(s.key)+'"'); });
  CFG.multi.forEach(function(m){ selectedKeys(state[m.key]).forEach(function(v){ html+=appliedChip(m.chipLabel, v, 'data-rm-multi="'+esc(m.key)+'" data-rm-val="'+esc(v)+'"'); }); });
  if(html) html+='<button type="button" class="clear-all" data-clear-all="1">Clear all</button>';
  appliedEl.innerHTML=html;
}
function syncChecks(){
  CFG.multi.forEach(function(m){
    Array.prototype.forEach.call(document.querySelectorAll('input[data-'+m.itemAttr+']'), function(c){ c.checked=!!state[m.key][c.getAttribute('data-'+m.itemAttr)]; });
  });
}
function closeDropdowns(except){
  Array.prototype.forEach.call(document.querySelectorAll('.dropdown'), function(dd){
    if(dd===except) return;
    dd.classList.remove('open');
    var t=dd.querySelector('.dd-trigger'); if(t) t.setAttribute('aria-expanded','false');
    var p=dd.querySelector('.panel'); if(p) p.hidden=true;
  });
}
var searchDebounce=null;
search.addEventListener('input', function(){ clearTimeout(searchDebounce); searchDebounce=setTimeout(function(){ render(); renderApplied(); }, 120); });
searchClear.addEventListener('click', function(){ search.value=''; search.focus(); render(); renderApplied(); });
CFG.single.forEach(function(s){
  var el=document.getElementById(s.controlId); if(!el) return;
  el.addEventListener('change', function(){ state[s.key]=el.value; renderApplied(); render(); });
});
if(groupBy) groupBy.addEventListener('change', function(){ state.groupBy=groupBy.value; render(); });
document.querySelector('.viewswitch').addEventListener('click', function(e){
  var b=e.target.closest('button[data-view]'); if(!b) return;
  state.view=b.getAttribute('data-view');
  Array.prototype.forEach.call(this.querySelectorAll('button'), function(x){x.classList.toggle('active', x===b);});
  render();
});
filterbar.addEventListener('click', function(e){
  var t=e.target.closest('.dd-trigger'); if(!t) return;
  var dd=t.closest('.dropdown'); var wasOpen=dd.classList.contains('open');
  closeDropdowns();
  if(!wasOpen){ dd.classList.add('open'); t.setAttribute('aria-expanded','true'); dd.querySelector('.panel').hidden=false; }
});
filterbar.addEventListener('change', function(e){
  var c=e.target.closest('input[type=checkbox]'); if(!c) return;
  CFG.multi.forEach(function(m){
    if(c.hasAttribute('data-'+m.itemAttr)){ var v=c.getAttribute('data-'+m.itemAttr); if(c.checked) state[m.key][v]=true; else delete state[m.key][v]; }
  });
  renderApplied(); render();
});
CFG.multi.forEach(function(m){
  if(!m.search) return;
  var si=document.getElementById(m.searchInputId); var cl=document.getElementById(m.checklistId);
  if(!si||!cl) return;
  si.addEventListener('input', function(){
    var q=si.value.trim().toLowerCase();
    Array.prototype.forEach.call(cl.querySelectorAll('[data-'+m.itemAttr+'opt]'), function(l){ l.style.display=(!q || l.getAttribute('data-'+m.itemAttr+'opt').toLowerCase().indexOf(q)>=0)?'':'none'; });
  });
});
appliedEl.addEventListener('click', function(e){
  var b=e.target.closest('button'); if(!b) return;
  if(b.hasAttribute('data-clear-all')){
    state.q=''; search.value='';
    CFG.single.forEach(function(s){ state[s.key]=''; var el=document.getElementById(s.controlId); if(el) el.value=''; });
    CFG.multi.forEach(function(m){ state[m.key]={}; });
  }
  else if(b.hasAttribute('data-rm-q')){ state.q=''; search.value=''; }
  else if(b.hasAttribute('data-rm-single')){ var sk=b.getAttribute('data-rm-single'); state[sk]=''; var el=document.getElementById((CFG.single.filter(function(s){return s.key===sk;})[0]||{}).controlId); if(el) el.value=''; }
  else if(b.hasAttribute('data-rm-multi')){ var mk=b.getAttribute('data-rm-multi'); delete state[mk][b.getAttribute('data-rm-val')]; }
  syncChecks(); renderApplied(); render();
});
document.addEventListener('keydown', function(e){
  if(e.key!=='Escape') return;
  var open=document.querySelector('.dropdown.open');
  if(open){ var t=open.querySelector('.dd-trigger'); closeDropdowns(); if(t) t.focus(); return; }
  if(layout.classList.contains('reader-open')) closeReader();
});
document.addEventListener('click', function(e){ if(!e.target.closest('.dropdown')) closeDropdowns(); });
groupsEl.addEventListener('click', function(e){
  if(cardLinkOut()) return; // titles are real <a href> links — let the browser navigate
  var el=e.target.closest('[data-id]'); if(!el) return; e.preventDefault(); openReader(el.getAttribute('data-id'));
});
reader.addEventListener('click', function(e){
  var b=e.target.closest('button[data-act]'); if(!b) return;
  var act=b.getAttribute('data-act');
  var f=DATA.filter(function(x){return x[F.id]===state.openId;})[0];
  if(act==='close') closeReader();
  else if(act==='copy'&&f) copyText(toMarkdown(f));
  else if(act==='copylink'&&f) copyText(location.origin+location.pathname+'#'+encodeURIComponent(f[F.id]));
  else if(act==='share'&&f) copyText(toShare(f));
});
window.addEventListener('hashchange', function(){
  if(cardLinkOut()) return; // no in-page reader when titles link out
  var id=decodeURIComponent(location.hash.slice(1));
  if(id===state.openId) return;
  if(byId[id]) openReader(id); else if(!id) closeReader();
});
if(subtitleCount) subtitleCount.textContent=DATA.length;
renderApplied();
render();
if(!cardLinkOut() && location.hash){ var id0=decodeURIComponent(location.hash.slice(1)); if(byId[id0]) openReader(id0); }

</script>
</body>
</html>
